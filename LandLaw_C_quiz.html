<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandLaw C quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;min-height:100vh;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}

/* 篩選列 */
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.74rem;padding:5px 12px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}

/* 進度條 */
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}

/* 章節標題 */
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.ch-header:first-of-type{margin-top:0;}

/* 題目卡片 */
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .2s;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.66rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}

/* 選項 */
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);transition:all .15s;}
.opt:disabled{cursor:default;}
.opt .ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}

/* 解析區 */
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}
.el.no{background:#b0b8c4;color:#fff;}
.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}
.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}

.hidden{display:none!important;}
</style>
</head>
<body>
<div class="app">
<h1>土地法 C篇 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">C1 規定地價 ／ C2 市地重劃 ／ C3 照價收買空地稅 ／ C4 申報登錄預售屋｜共 54 題</div>

<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>

<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-text"><span id="progDone">0</span> / <span id="progTotal">0</span> 已作答・正確率 <span id="progRate">-</span></div>
</div>

<div id="questionList"></div>
</div>

<script>
const CARDS = [{"ch": "C1", "chName": "C1 規定地價", "year": "100", "num": 1, "q": "依土地稅法規定，因重新規定地價增繳之地價稅就其移轉土地部分，准予抵繳土地增值稅之額度，以不超過土地移轉時應繳增值稅多少為限？", "opts": ["百分之一", "百分之三", "百分之五", "百分之十"], "ans": 2, "exps": ["❌ 1%不是重新規定地價增繳地價稅准予抵繳土增稅的上限比例。", "❌ 3%不是法定上限。", "✓ 土地稅法第31條：土地所有權人辦理土地移轉繳納土地增值稅時，在其持有土地期間內，因重新規定地價增繳之地價稅，准予抵繳其應納之土地增值稅，但以增繳地價稅之半數為限，以不超過原應納增值稅額百分之五為限。5%是法定上限，是C1的固定數字考點（111-3也考過同題型）。", "❌ 10%超過法定上限，為干擾選項。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "104", "num": 6, "q": "依平均地權條例規定，舉辦規定地價或重新規定地價時，私有土地所有權人未於公告期間申報地價者，以下列何者為其申報地價？", "opts": ["公告地價", "公告地價之百分之八十", "公告地價之百分之一百二十", "公告地價之百分之九十"], "ans": 1, "exps": ["❌ 若以公告地價100%作為申報地價，則未申報等於主動申報最高值，不合理，法律設計是以公告地價80%作為推定值。", "✓ 平均地權條例第16條：土地所有權人未於公告期間申報地價者，以公告地價百分之八十為其申報地價。80%是C1最高頻的固定數字，與地價稅計算密切相關，務必牢記。", "❌ 超過100%不合邏輯，為干擾選項。", "❌ 90%不是法定推定比例，為干擾選項。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "105", "num": 9, "q": "有關公告地價與公告土地現值的差別，下列敘述何者正確？", "opts": ["公告地價為課徵地價稅之依據，公告土地現值為課徵土地增值稅之依據", "公告地價每年公告 1 次，公告土地現值每 3 年公告 1 次", "公告地價比公告土地現值更貼近市價", "公告地價由地價及標準地價評議委員會評議決定之，公告土地現值由地方主管機關查估之"], "ans": 0, "exps": ["✓ 這是公告地價與公告土地現值最核心的區別：公告地價→地價稅（計算累進起點地價及稅基）；公告土地現值→土地增值稅（計算漲價總數額的基礎）。兩者每年都是1月1日公告，但用途完全不同。", "❌ 兩者都是每年公告1次（每年1月1日公告），而非3年一次。3年是房屋標準價格重新評定的頻率，與此無關。", "❌ 正好相反：公告土地現值才是更貼近市價的地價，公告地價通常低於公告土地現值（公告地價是計算申報地價和地價稅的基準，往往偏低）。", "❌ 兩者都須經地價及標準地價評議委員會評議，並非只有公告地價才經過委員會，本選項描述不完整且有誤。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "106", "num": 13, "q": "下列有關規定地價之規定，何者錯誤？", "opts": ["規定地價後，每2年重新規定地價一次。但必要時得延長之。重新規定地價者，亦同。", "舉辦規定地價或重新規定地價時，土地所有權人未於公告期間申報地價者，以公告地價80%為其申報地價", "已規定地價之土地，應按申報地價，依法徵收地價稅", "直轄市或縣（市）主管機關為辦理規定地價，應分區調查最近2年之土地買賣價格或收益價格"], "ans": 3, "exps": ["❌ 本選項描述正確，符合平均地權條例第14條規定，非錯誤。", "❌ 本選項描述正確，符合平均地權條例第16條規定，非錯誤。", "❌ 本選項描述正確，符合土地稅法規定，非錯誤。", "✓ 本選項為錯誤敘述：平均地權條例規定應分區調查最近「一年」之土地買賣價格或收益價格，不是2年。109-8也考過這個陷阱，「一年」是固定答案。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "107", "num": 21, "q": "配偶相互贈與之土地，得申請不課徵土地增值稅。但於再移轉第三人時，以該土地第一次贈與前之原規定地價或前次移轉現值為原地價，計算下列何種數值或數額，課徵土地增值稅？", "opts": ["公告現值", "申報移轉現值", "現值數額", "漲價總數額"], "ans": 3, "exps": ["❌ 配偶贈與再移轉時，原地價認定是「漲價總數額」，不是當時的公告現值。", "❌ 申報移轉現值是計算土增稅的申報基準，不是此題問的「原地價認定」。", "❌ 「現值數額」非法定用語，為干擾選項。", "✓ 土地稅法第28條之2：配偶相互贈與之土地，得申請不課徵土地增值稅，但於再移轉第三人時，其土地漲價總數額應自「第一次贈與前之原規定地價或前次移轉時申報之移轉現值」起算，亦即再移轉時以「漲價總數額」（從最早的基期地價起算）計算稅基，不得因配偶贈與而重設原地價，以防止規避土增稅。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "108", "num": 24, "q": "依規定民國109年需辦理重新規定地價，下列對規定地價或重新規定地價之敘述，何項錯誤？", "opts": ["規定地價或重新規定地價後，每二年重新規定地價一次，但必要時得延長之", "須分區調查最近一年之土地買賣價格或收益價格", "公告及申報地價，其期限為三十日", "申報地價未滿公告地價百分之八十時，得照價收買或以公告地價為其申報地價"], "ans": 3, "exps": ["❌ 本選項描述正確，符合平均地權條例規定，非錯誤。", "❌ 本選項描述正確（一年），非錯誤。", "❌ 本選項描述正確（公告期限30日），非錯誤。", "✓ 本選項為錯誤敘述：申報地價低於公告地價80%時，主管機關得「照價收買」，但「以公告地價（100%）為其申報地價」的說法有誤——法條規定是以「公告地價的80%」為其申報地價（未申報地價者的推定值），而非以公告地價全額作為申報地價。本選項將80%下限和照價收買、以公告地價全額作為申報地價混為一談。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "109", "num": 8, "q": "關於規定地價，依平均地權條例之規定，下列敘述何者正確？", "opts": ["規定地價後，每三年重新規定地價一次。但必要時得延長之", "直轄市或縣（市）主管機關辦理規定地價或重新規定地價時，須分區調查最近一年之土地買賣 價格或收益價格", "土地所有權人申報之地價未滿公告地價百分之八十時，得徵收之", "土地所有權人未於公告期間申報地價者，以公告地價為其申報地價"], "ans": 1, "exps": ["❌ 重新規定地價的週期是「每二年」一次，不是每三年，此為陷阱選項，常與房屋標準價格「每三年重新評定」混淆。", "✓ 平均地權條例施行細則規定，辦理規定地價或重新規定地價時，應分區調查最近「一年」之土地買賣價格或收益價格，作為評定地價的依據。「一年」是本考點的固定正確答案（106-13選D也考同一概念）。", "❌ 法條規定：申報地價低於公告地價80%時，得照價收買（非徵收）。照價收買和徵收是不同的法律概念，混淆是常見陷阱。", "❌ 未申報地價者，以公告地價「百分之八十」為其申報地價，不是公告地價全額，此為C1最常考的數字陷阱。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "111", "num": 3, "q": "依土地稅法規定，土地所有權人辦理土地移轉繳納土地增值稅時，在其持有土地期間內，因重新規定地價增繳之地價稅，准予抵繳其應納之土地增值稅之總額，以不超過土地移轉時應繳增值稅總額多少為限？", "opts": ["百分之一", "百分之二", "百分之三", "百分之五"], "ans": 3, "exps": ["❌ 1%不是法定上限，為干擾選項。", "❌ 2%不是法定上限，為干擾選項。", "❌ 3%不是法定上限。注意本題答案與100-1相同，都是5%。", "✓ 同100-1，土地稅法第31條規定，重新規定地價增繳地價稅准予抵繳土增稅，上限為應納土增稅額的5%。「5%」是C1的固定數字，這道題在100年和111年都考過，要記住不是1%也不是3%。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "112", "num": 3, "q": "依土地稅法規定，已規定地價之土地設定典權時之預繳土地增值稅，下列何者正確？", "opts": ["典權人回贖時，原繳之土地增值稅，應加計利息退還", "典權人回贖時，原繳之土地增值稅，應無息退還", "出典人回贖時，原繳之土地增值稅，應加計利息退還", "出典人回贖時，原繳之土地增值稅，應無息退還"], "ans": 3, "exps": ["❌ 設典是「出典人」移轉土地使用收益給典權人，預繳土增稅的義務人是出典人，回贖的也是出典人，非典權人。且退還時不加計利息。", "❌ 同上，出典人才是預繳人，且回贖的主體是出典人，不是典權人。", "❌ 出典人方向正確（出典人預繳、出典人回贖），但退還時「無息退還」（不加計利息），此選項的「加計利息」部分錯誤。", "✓ 土地稅法第28條：已規定地價之土地，設定典權時，出典人應依規定預繳土地增值稅；出典人回贖時，原預繳之土地增值稅，應「無息退還」出典人。兩個關鍵：①主體是出典人（非典權人）②無息退還（非加計利息）。"]}, {"ch": "C1", "chName": "C1 規定地價", "year": "113", "num": 21, "q": "依土地稅法規定，有關累進起點地價，下列何者正確？", "opts": ["累進起點地價，以各該直轄市或縣（市）土地七公畝之平均地價為準。只有工業用地、礦業用 地及農業用地不包括在內", "土地所有權人之地價總額未超過戶籍所在地直轄市或縣（市）累進起點地價者，其地價稅按基 本稅率徵收", "累進起點地價以百元為單位，以下四捨五入", "累進起點地價，應於舉辦規定地價或重新規定地價後當年地價稅開徵前計算完竣，並報請財政 部及內政部備查"], "ans": 3, "exps": ["❌ 前半段（七公畝平均地價）正確，但免予累進的用地類型不只這三種，本選項列舉不完整，且說法不精確。", "❌ 本選項描述正確（未超過累進起點地價，按基本稅率千分之十課徵），非錯誤。", "❌ 本選項描述正確（累進起點地價以百元為單位計算），非錯誤。", "✓ 平均地權條例第16條：累進起點地價應於規定或重新規定地價後，當年地價稅開徵前計算完竣，報請「中央地政機關（內政部）及財政部」備查，不是只報內政部或財政部其中一個，本選項說法可能有誤（應報主管機關，需以官方答案D為準）。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "99", "num": 27, "q": "依平均地權條例之規定，在何種情況下得申請該管直轄市或縣（市）政府核准後優先實施市地重劃？", "opts": ["適當地區內之私有土地所有權人半數以上，而其所有土地面積超過區內私有土地總面積半數者之同意", "適當地區內之私有土地所有權人三分之二以上，而其所有土地面積超過區內私有土地總面積半數者之同意", "適當地區內之私有土地所有權人半數以上，而其所有土地面積超過區內私有土地總面積三分之二以上之同意", "適當地區內之私有土地所有權人三分之二以上，而其所有土地面積超過區內私有土地總面積三分之二以上之同意"], "ans": 0, "exps": ["✓ 平均地權條例第58條：私有土地所有權人申請優先辦理市地重劃，需要「土地所有權人半數以上，且其所有土地面積超過私有土地總面積半數」的同意。「半數人數＋半數面積」是C2自辦重劃的同意門檻，與34-1多數決（人數過半+面積過半）類似，務必記住。", "❌ 人數門檻說三分之二，過高，不符合法條規定。", "❌ 面積門檻說三分之二，過高，不符合法條規定。", "❌ 人數和面積都說三分之二，均過高，不符合法條規定。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "100", "num": 17, "q": "依平均地權條例之規定，重劃地區選定後，政府得公告禁止區內土地移轉，其禁止期間最長不得超過：", "opts": ["六個月", "一年六個月", "二年六個月", "三年六個月"], "ans": 1, "exps": ["❌ 六個月不是市地重劃禁止移轉的最長期間。", "✓ 平均地權條例第56條：重劃地區選定公告後，政府得公告禁止區內土地移轉、分割、設定負擔及新建、增建、改建房屋，其禁止期間，不得超過「一年六個月」。「1.5年」是C2最重要的固定數字考點。", "❌ 2.5年過長，不是法定最長期間。", "❌ 3.5年過長，不是法定期間。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "100", "num": 19, "q": "依平均地權條例之規定，自辦市地重劃之獎勵事項不包括：", "opts": ["給予低利之重劃貸款", "優先辦理公有土地之撥用", "免收或減收地籍整理規費", "免徵或減徵地價稅與田賦"], "ans": 1, "exps": ["❌ 低利貸款是平均地權條例規定的自辦市地重劃獎勵事項之一，屬獎勵範圍內。", "✓ 本選項為「不包括」之答案：自辦市地重劃的獎勵不包括「公有土地撥用」，撥用是政府機關需用公有土地的程序，與自辦重劃獎勵無關。獎勵項目包括：低利貸款、免收減收規費、免徵減徵地價稅與田賦等，但不含公有土地撥用優先。", "❌ 免收或減收地籍整理規費（換發書狀費用）是自辦重劃的獎勵事項之一。", "❌ 免徵或減徵地價稅是自辦重劃的獎勵事項之一。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "100", "num": 20, "q": "依平均地權條例之規定，市地重劃後，重行分配與原土地所有權人之土地，自何時起視為其原有之土地？", "opts": ["市地重劃核定之日", "分配結果確定之日", "地籍整理完成之日", "土地權利登記之日"], "ans": 1, "exps": ["❌ 重劃核定只是計畫確定，尚未分配完成，土地不能從此時起視為原有土地。", "✓ 平均地權條例第60條：重劃後分配與原土地所有權人之土地，自「分配結果確定之日」起視為其原有之土地。從此日起，新分配土地在法律上等同原有土地，先前設定的抵押等他項權利依法移設到重劃後分配的土地上。", "❌ 地籍整理完成是行政程序，不是視為原有土地的起算時點。", "❌ 登記是公示行為，但視為原有土地的起算點早於登記完成日。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "102", "num": 9, "q": "出租之公、私有耕地，因實施市地重劃致不能達到原租賃之目的者，直轄市或縣（市）政府依法如何處理？", "opts": ["逕予分配土地予租用人", "協調租用當事人變更為基地租用", "重新調整分配為耕地", "逕為註銷其租約並通知當事人"], "ans": 3, "exps": ["❌ 出租耕地因市地重劃致不能達到租賃目的，不是直接將土地分配給承租人（承租人不是所有權人）。", "❌ 直接改變租賃性質（從耕地改為基地）需要雙方同意，不是政府逕為處理的方式。", "❌ 市地重劃的目的是整理土地供建築使用，不會重新調整為耕地。", "✓ 平均地權條例第63條：出租之公私有耕地，因實施市地重劃致不能達到原租賃之目的者，由直轄市或縣（市）政府「逕為註銷其租約」並通知當事人，承租人並得依規定請求補償（公告土地現值1/3扣除預計稅額後）。「逕為註銷」是政府主動行為，不需雙方同意。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "102", "num": 10, "q": "政府依平均地權條例規定，實施市地重劃時，法定共同負擔的十項公共設施用地中，下列何者不屬之？", "opts": ["國民中學", "體育場", "綠地", "廣場"], "ans": 1, "exps": ["❌ 國民中學是市地重劃法定十項共同負擔公共設施用地之一，屬於負擔範圍內。", "✓ 平均地權條例第60條規定的十項共同負擔公共設施包括：道路、公園、綠地、兒童遊樂場、廣場、停車場、市場、國民學校（國小國中）等，但「體育場」不在法定十項清單內，故為「不屬之」的答案。", "❌ 綠地是法定十項共同負擔之一。", "❌ 廣場是法定十項共同負擔之一。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "102", "num": 11, "q": "平均地權條例施行細則規定所稱改良土地中，下列何者係屬農地改良事項？", "opts": ["埋設基地管道", "鋪築基地道路", "土壤改良及防風設施", "整平或填挖基地"], "ans": 2, "exps": ["❌ 埋設基地管道屬於「基地改良」（供建築基地使用的改良），不是農地改良。", "❌ 鋪築基地道路屬於基地改良，不是農地改良。", "✓ 平均地權條例施行細則所稱改良土地中，農地改良包括：農地整理（灌排水設備、開鑿水井、土壤改良、防風設施等）。土壤改良和防風設施是針對農業生產條件的改善，屬農地改良事項。", "❌ 整平或填挖基地屬於基地改良（為供建築使用而整地），不是農地改良。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "102", "num": 33, "q": "某直轄市市政府因辦理市地重劃而登記為該直轄市有之抵費地，於出售時其程序為何？", "opts": ["應經內政部同意", "應經行政院同意", "應經該直轄市議會同意", "該直轄市政府可自行公開標售"], "ans": 3, "exps": ["❌ 抵費地出售不需要內政部同意，不是中央機關核准事項。", "❌ 抵費地出售不需要行政院同意，層級過高。", "❌ 抵費地出售不需要議會同意，抵費地本質上是重劃費用扣除後的剩餘土地，政府可自行處理。", "✓ 平均地權條例第60條：重劃費用由參加重劃土地所有權人按比例共同負擔，由主管機關以重劃區內適當之土地抵充（即抵費地）。抵費地屬直轄市或縣市有土地，不在土地法第25條「非經民意機關同意不得處分」的限制範圍內，主管機關得自行公開標售。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "103", "num": 34, "q": "土地重劃得因重劃區內土地所有權人過半數，而其所有土地面積，除公有土地外，超過重劃區內土地總面積一半者之共同請求，由何機關核准為之？", "opts": ["內政部土地測量局核准為之", "內政部土地重劃工程處核准為之", "直轄市或縣（市）地政機關核准為之", "直轄市或縣（市）建設機關核准為之"], "ans": 2, "exps": ["❌ 土地測量局不是重劃核准機關，為干擾選項（且土地測量局已裁併）。", "❌ 此機關（已改制）不是重劃申請核准機關。", "✓ 平均地權條例第58條：土地所有權人請求辦理市地重劃，應向直轄市或縣（市）地政機關提出申請，由該機關核准後辦理。地政機關是核准機關，不是中央機關（內政部）。", "❌ 建設機關負責的是建設工程，不是土地重劃的核准機關。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "104", "num": 8, "q": "依平均地權條例規定，下列何種公共設施用地，非屬參加市地重劃土地所有權人應共同負擔之用地？", "opts": ["國民中學用地", "廣場用地", "兒童遊樂場用地", "機關用地"], "ans": 3, "exps": ["❌ 國民中學（含國小）用地是市地重劃法定十項共同負擔之一，屬應負擔的範圍。", "❌ 廣場用地是法定十項共同負擔之一。", "❌ 兒童遊樂場用地是法定十項共同負擔之一。", "✓ 平均地權條例第60條規定的十項共同負擔公共設施用地不包含「機關用地」（辦公廳舍）。機關辦公用地的取得應由政府自行負擔，不能要求參加重劃的土地所有人共同負擔，故機關用地「非屬之」。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "104", "num": 10, "q": "依平均地權條例施行細則之規定，政府實施市地重劃時，有關查估重劃前後地價，提經地價評議委員會評定後，有其規定之作用，下列何者不屬之？", "opts": ["計算公共用地負擔", "計算費用負擔", "計算標售抵費地之底價", "土地交換分配及變通補償"], "ans": 2, "exps": ["❌ 公共用地負擔的計算依據是土地面積和重劃前地價，不是「計算底價」用的。", "❌ 費用負擔的計算依據同上，不是計算標售底價。", "✓ 平均地權條例施行細則規定，查估重劃後分配位置的地價，提經地價評議委員會評定後，主要作為「計算標售抵費地底價」的依據，確保抵費地標售有合理的定價基礎。", "❌ 土地交換分配和變通補償的計算是依重劃前後的面積比例換算，不是主要使用「查估底價」的場合。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "104", "num": 11, "q": "依平均地權條例規定，市地重劃分配結果公告期間，土地所有權人對分配結果提出異議，經主管機關調處不成者，下列有關後續處理之敘述，何者正確？", "opts": ["由主管機關報請上級主管機關裁決之", "由主管機關提請不動產糾紛調處委員會調處之", "由異議人循民事訴訟程序訴請司法機關裁判", "由異議人提起行政訴訟謀求救濟"], "ans": 0, "exps": ["✓ 平均地權條例第62條：市地重劃分配結果公告期間，土地所有權人對分配結果提出異議，調處不成，應由主管機關「報請上級主管機關裁決」，不是循司法途徑（這是行政裁決，非司法訴訟），也不是民事調處，而是向上級行政機關申請裁決。", "❌ 不動產糾紛調處委員會是處理一般不動產糾紛的機關，不是市地重劃分配異議的處理機關。", "❌ 市地重劃是行政程序，分配異議不循民事訴訟，而是行政裁決途徑。", "❌ 正確救濟程序是先由主管機關報請上級機關裁決，而非直接提行政訴訟，行政訴訟是對行政裁決不服後的後續救濟。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "107", "num": 11, "q": "耕地以外之出租土地，因市地重劃而不能達到原租賃之目的者，承租人得終止租約，並得向出租人請求如何之補償？", "opts": ["按重劃計畫書公告當期公告土地現值扣除預計土地增值稅後餘額之三分之一", "按重劃計畫書公告當期公告土地現值之三分之一", "相當六個月租金", "相當一年租金"], "ans": 3, "exps": ["❌ 此為「耕地」承租人的補償標準，不是非耕地的補償標準。", "❌ 此選項無扣除稅額，且適用對象有疑問。", "❌ 六個月租金不是法定補償標準。", "✓ 平均地權條例施行細則：耕地以外之出租土地因市地重劃不能達到原租賃目的者，承租人得終止租約，並得向出租人請求「相當一年租金」之補償。注意區分：耕地承租人補償是「公告現值1/3扣除預計稅額」，非耕地承租人補償是「相當一年租金」，兩者不同。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "108", "num": 14, "q": "出租之公、私有耕地因實施市地重劃致不能達到原租賃之目的者，可由直轄市或縣（市）政府逕為註銷其租約並通知當事人，如重劃後分配土地者，承租人得請求之補償，下列何項為正確？", "opts": ["按重劃計畫書公告當期該土地公告土地現值減除預計土地增值稅後餘額之三分之一", "按重劃計畫書公告當期該土地查估之市價減除預計土地增值稅後餘額之三分之一", "按重劃計畫書公告當期該土地之公告土地現值之三分之一", "按重劃計畫書公告當期該土地查估之市價之三分之一"], "ans": 2, "exps": ["❌ 此選項有「減除預計增值稅」，但依官方公告答案，正確是直接按公告土地現值的三分之一，不扣除稅額。", "❌ 基準是「公告土地現值」，不是「市價」，且有扣除稅額，雙重錯誤。", "✓ 平均地權條例第63條：出租之公私有耕地因市地重劃不能達到租賃目的，直轄市或縣市政府逕為註銷租約，承租人得向出租人請求按重劃計畫書公告當期「公告土地現值三分之一」之補償。公告土地現值×1/3是耕地承租人的法定補償標準（此為耕地，與107-11的非耕地一年租金不同）。", "❌ 基準是「公告土地現值」，不是「市價」。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "109", "num": 5, "q": "依平均地權條例規定，為促進土地利用，擴大辦理市地重劃，得獎勵土地所有權人自行組織重劃會辦理市地重劃，下列對獎勵土地所有權人辦理市地重劃之敘述，何者錯誤？", "opts": ["減半收取土地權利變更登記及換發權利書狀費用", "土地所有權人參加自辦市地重劃所需費用，得向政府指定之銀行或實施平均地權基金申請低利貸款", "自辦市地重劃區抵費地出售時，不計徵土地增值稅", "免徵或減徵地價稅與田賦"], "ans": 0, "exps": ["✓ 本選項為本題「不包括」的錯誤敘述：自辦市地重劃的獎勵是「免收或減收換發權利書狀費用」，但「土地權利變更登記費」的減收不一定明確包含在內，本選項說的是「土地權利變更登記」費用減半，此描述不夠精確。以官方答案A為準，A為不包括之獎勵項目。", "❌ 低利貸款是法定獎勵事項之一，屬包含在內，非「不包括」。", "❌ 抵費地出售免徵土增稅是法定獎勵，屬包含在內，非「不包括」。", "❌ 此為法定獎勵事項之一，屬包含在內，非「不包括」。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "111", "num": 23, "q": "依平均地權條例規定，實施市地重劃時，重劃區內供公共使用之道路等十項用地，應優先以下列何種土地抵充？", "opts": ["原廣場、綠地、停車場、零售市場地", "原公有道路、溝渠、河川及未登記地", "原兒童遊樂場、鄰里公園、國民小學、國民中學地", "原國有地、學產地、直轄市縣（市）有地、鄉鎮（市）有地"], "ans": 1, "exps": ["❌ 此類土地不是優先抵充的第一順序。", "✓ 市地重劃實施辦法規定，重劃區內公共設施用地，應「優先」以下列土地抵充：原有公有道路、溝渠、河川及未登記地。這些本已屬公共使用性質的土地優先轉為重劃後的公共用地，減少私有土地被扣除的比例。", "❌ 此類公共設施用地不是第一順序抵充項目。", "❌ 各類公有土地在抵充順序上排列在公有道路、溝渠、河川之後。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "111", "num": 24, "q": "下列何者不屬於平均地權條例獎勵土地所有權人自行辦理市地重劃事業之獎勵事項？", "opts": ["優先興建重劃區之公共設施", "免收或減收換發權利書狀費用", "免徵或減徵地價稅與田賦", "給予免息之重劃貸款"], "ans": 3, "exps": ["❌ 優先興建公共設施是自辦重劃的獎勵事項之一，屬包含範圍。", "❌ 免收或減收換發書狀費用是法定獎勵事項之一。", "❌ 此為法定獎勵事項之一。", "✓ 自辦重劃的獎勵是「低利貸款」，不是「免息貸款」。免息比低利更優惠，法條並未提供免息貸款，「免息」說法過度，故本選項「給予免息之重劃貸款」不在獎勵清單內，為「不屬之」的正確答案。注意：低利≠免息。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "112", "num": 11, "q": "依市地重劃實施辦法之規定，土地所有權人重劃後應分配土地面積已達重劃區最小分配面積標準二分之一，經主管機關按最小分配面積標準分配後，如申請放棄分配土地而改領現金補償，下列何者正確？", "opts": ["以其重劃前原有面積按原位置評定重劃後地價發給現金補償", "以其重劃前原有面積按原位置評定重劃前地價發給現金補償", "以其應分配權利面積，按重劃後分配位置之評定重劃後地價予以計算補償", "以其應分配權利面積，按重劃後分配位置之評定重劃前地價予以計算補償"], "ans": 2, "exps": ["❌ 計算基準應是「應分配權利面積」（重劃後按比例應分得的面積），不是「重劃前原有面積」；且位置應按「重劃後分配位置」，不是原位置。", "❌ 同上，面積基準和位置基準均有誤，且應按「重劃後」地價（非重劃前地價）計算補償。", "✓ 市地重劃實施辦法：土地所有權人應分配面積達最小分配面積標準1/2但未達標準者，改以現金補償，補償金額以「應分配權利面積 × 重劃後分配位置之評定地價」計算。兩個關鍵：①應分配權利面積（非原有面積）②重劃後地價（非重劃前地價）。", "❌ 面積基準正確（應分配權利面積），但地價基準錯誤（應按重劃「後」地價，非重劃前）。"]}, {"ch": "C2", "chName": "C2 市地重劃", "year": "114", "num": 20, "q": "有關自辦土地重劃，依相關法規之規定，下列敘述何者正確？", "opts": ["重劃會組織、職權、重劃業務、獎勵措施等事項之辦法，由地方主管機關定之", "重劃會辦理市地重劃時，應由重劃區內私有土地所有權人半數以上，而其所有土地面積超過重 劃區私有土地總面積半數以上者之同意，並經主管機關核准後實施之", "自辦農地重劃，應經重劃區內私有土地所有權人半數以上，而其所有面積亦達私有土地面積半 數以上者之同意，就重劃區全部土地辦理重劃，並經該管直轄市或縣（市）主管機關核准", "重劃會辦理農村社區土地重劃時，應經重劃區內私有土地所有權人合計超過三分之二，且其所 有面積合計超過私有土地面積三分之二者之同意，就重劃區全部土地辦理重劃，並經該管直轄 市或縣（市）主管機關核准後實施"], "ans": 1, "exps": ["❌ 重劃會組織辦法應由「中央」主管機關（內政部）訂定，而非地方主管機關，以確保全國一致性。", "✓ 平均地權條例第58條：自辦市地重劃，需「私有土地所有權人半數以上，且其所有土地面積超過私有土地總面積半數者之同意」，即人數過半+面積過半的雙過半門檻。本選項正確描述了自辦重劃的同意比例，與99-27考的是同一條文。", "❌ 農地重劃（農業區土地重劃）的同意比例與市地重劃不同，不是半數，以官方答案B為正確選項。", "❌ 農村社區重劃的同意比例並非三分之二，為干擾選項。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "99", "num": 3, "q": "依平均地權條例之規定，直轄市或縣（市）政府對於尚未建築之私有建築用地，應限制土地所有權人所有面積之最高額，請問以多少面積為限？", "opts": ["十甲", "十畝", "十公畝", "十公頃"], "ans": 2, "exps": ["❌ 十甲是較大的面積單位（1甲=9699.17平方公尺），不是法定上限。", "❌ 十畝是中國傳統面積單位，在台灣法規中採公制，非法定上限。", "✓ 平均地權條例第26條：直轄市或縣（市）政府對尚未建築之私有建築用地，應限制土地所有權人所有面積之最高額，以「十公畝」為限（1公畝=100平方公尺，10公畝=1000平方公尺≈302坪）。「10公畝」是C3最重要的固定數字考點，在105-38、107-10、108-13等題也都考過。", "❌ 十公頃（100,000平方公尺）遠大於法定上限，為干擾選項。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "100", "num": 8, "q": "依土地稅法規定，地方政府核定應徵空地稅之土地，按該宗土地應納地價稅基本稅額加徵多少之空地稅？", "opts": ["一倍至三倍", "二倍至五倍", "三倍至五倍", "五倍至十倍"], "ans": 1, "exps": ["❌ 1至3倍不是空地稅的加徵倍數，為干擾選項。", "✓ 土地稅法第18條：地方政府核定應徵空地稅之土地，按該宗土地應納地價稅基本稅額加徵「二倍至五倍」之空地稅。「2至5倍」是C3的固定數字考點，注意是加徵基本稅額的2至5倍，不是加徵1至3倍或5至10倍。", "❌ 3至5倍不是法定加徵範圍。", "❌ 5至10倍遠超法定範圍。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "100", "num": 15, "q": "依平均地權條例規定，出租耕地經依法終止租約，實際收回耕地屆滿多久後，不依照使用計畫建築使用者，直轄市或縣（市）政府得照價收買之？", "opts": ["一年", "六個月", "三個月", "一個月 100年專門職業及技術人員高等考試建築師、技師、第2次"], "ans": 0, "exps": ["✓ 平均地權條例第76條：耕地出租人依規定終止租約，實際收回耕地屆滿「一年」後，不依照使用計畫建築使用者，政府得照價收買。一年是照價收買的等待期限，是C3的固定數字考點。", "❌ 六個月不是法定期限。", "❌ 三個月不是法定期限。", "❌ 一個月不是法定期限，過短。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "103", "num": 29, "q": "下列何者是平均地權條例對以經營土地買賣，違背土地法律，從事土地壟斷、投機者所定之處罰規定？", "opts": ["處三年以下有期徒刑，並得併科七千元以上罰金", "處三年以下有期徒刑，並得併科七千元以下罰金", "處三年以上有期徒刑，並得併科七千元以上罰金", "處三年以上有期徒刑，並得併科七千元以下罰金"], "ans": 1, "exps": ["❌ 「以上」錯誤，法條是「以下」罰金。", "✓ 平均地權條例第84條：以經營土地買賣為業，違背土地法律，從事土地壟斷、投機者，處「三年以下有期徒刑，並得併科七千元以下罰金」。三年「以下」、七千元「以下」是固定組合，不可搞錯「以上/以下」。", "❌ 「以上」兩處均錯誤，法條是「以下」。", "❌ 有期徒刑「以上」錯誤。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "104", "num": 7, "q": "依平均地權條例規定，農業用地閒置不用，經加徵荒地稅滿三年仍不使用者，得照價收買。下列收買地價標準何者正確？", "opts": ["收買當期之公告地價", "收買當期之申報地價", "收買當期之公告土地現值", "收買當期之市價"], "ans": 2, "exps": ["❌ 公告地價是申報地價和地價稅的基準，不是照價收買的地價標準。", "❌ 申報地價是地主自行申報的地價，不是照價收買的標準。", "✓ 平均地權條例第26條：農業用地閒置不用，加徵荒地稅滿三年仍不使用，得照價收買，收買地價按「收買當期之公告土地現值」為準。公告土地現值是最接近市價的官方地價，用於徵收補償和照價收買的基準。", "❌ 市價（實際市場價格）不是法定照價收買的計算基準，使用公告土地現值是為了有統一的客觀標準。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "105", "num": 1, "q": "有關土地法及平均地權條例規定照價收買之時機，下列何者正確？", "opts": ["所有權人申報地價未達公告現值之百分之八十時", "荒地限期使用並經加徵荒地稅滿 2 年後仍不使用者", "土地所有權人認為標準地價過高，不能為其百分之二十以內增減之申報時，得聲請該管直轄市或縣（市） 政府照價收買", "私有土地超過最高限額限期 1 年未出售或使用者"], "ans": 2, "exps": ["❌ 申報地價低於公告地價（不是公告現值）80%時才涉及照價收買，且本選項基準用「公告現值」有誤（應是「公告地價」），且低於80%時是得照價收買，不是一定得照價收買。", "❌ 加徵荒地稅滿三年（不是兩年）後仍不使用，才得照價收買，2年的數字錯誤。", "✓ 平均地權條例規定，土地所有權人認為主管機關評定之地價過高，超過20%的增減幅度無法接受，可聲請照價收買（讓政府按其申報地價買下土地），這是保障地主權利同時防止低報地價的機制。", "❌ 超額土地限期應是2年（不是1年）才涉及照價收買，1年的時間數字有誤。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "105", "num": 38, "q": "依平均地權條例規定，為避免私人壟斷，應對私有土地面積有最高額之限制。其相關限制內容，下列何者正確？", "opts": ["對於未建築私有建築用地最高面積以 10 公畝為限", "對於宅地最高面積以 10 公畝為限", "超額土地當於 1 年內出售", "逾期未出售之土地，政府得予以徵收"], "ans": 0, "exps": ["✓ 同99-3，平均地權條例第26條：私有建築用地面積最高以10公畝為限。本選項正確。", "❌ 「宅地」（住宅用地）的最高限額與未建築建築用地相同，但選項說法略有不同——法條針對的是「尚未建築之私有建築用地」，而非「宅地」，描述有差異。", "❌ 超額私有建築用地，主管機關通知後應於「2年」內出售或建築使用，不是1年。", "❌ 逾期未出售，政府得「照價收買」（非徵收），照價收買和徵收是不同的法律概念和程序。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "106", "num": 39, "q": "依土地法及平均地權條例對於空地及荒地之規定，下列敘述何者錯誤？", "opts": ["土地法規定，土地建築改良物價值不及所占地基申報地價20%者，視為空地", "平均地權條例規定，空地係指已完成道路、排水及電力設施，於有自來水地區並已完成自來水系統，而仍未依法建築使用；或雖建築使用，而其建築改良物價值不及所占基地申報地價10%，且經直轄市或縣（市）政府認定應予增建、改建或重建之私有及公有非公用建築用地", "土地法規定，凡編為農業或其他直接生產用地，未依法使用者為荒地", "平均地權條例規定，農業用地閒置不用，經直轄市或縣（市）政府報經行政院農業委員會核准通知限期使用或命其委託經營，逾期仍未使用或委託經營者，按應納田賦加徵1倍至3倍之荒地稅"], "ans": 3, "exps": ["❌ 本選項描述正確，符合土地法第87條規定，非錯誤。", "❌ 本選項描述正確，符合平均地權條例的空地定義，非錯誤。", "❌ 本選項描述正確，符合土地法第84條規定，非錯誤。", "✓ 本選項為錯誤敘述：荒地稅加徵倍數應是「1倍至3倍」，但農業用地閒置案件，通知程序應是「直轄市縣市政府通知」後，不需要報請農委會核准，且加徵荒地稅的程序也不相同。以官方答案D為本題錯誤的選項。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "107", "num": 10, "q": "依平均地權條例規定，直轄市或縣（市）政府對於尚未建築之超額私有建築用地之處理，下列敘述，何者正確？", "opts": ["應通知土地所有權人於三年內出售", "應通知土地所有權人於三年內建築使用", "逾期未出售或未建築使用者，得予強制拍賣", "逾期未出售或未建築使用者，得予照價收買"], "ans": 3, "exps": ["❌ 通知期間是「二年」（不是三年）內出售或建築使用。", "❌ 同上，應是「二年」，不是三年。", "❌ 逾期處理方式是「照價收買」，不是強制拍賣，兩者性質不同。", "✓ 平均地權條例第26條：超額私有建築用地，主管機關通知後二年內仍未出售或建築使用者，「得予照價收買」。照價收買是政府依地主申報地價強制收購，不是市場拍賣，也不是徵收。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "108", "num": 3, "q": "平均地權條例規定照價收買後之土地，其權屬應為？", "opts": ["國有", "直轄市、縣（市）有", "鄉鎮有", "公營事業有"], "ans": 1, "exps": ["❌ 照價收買後不歸屬中央政府（國有），而是歸屬地方政府所有。", "✓ 平均地權條例規定，照價收買後之土地，歸屬執行照價收買之直轄市或縣（市）所有，成為直轄市有或縣市有土地（地方政府有），不是國有，也不是鄉鎮有。", "❌ 照價收買的執行機關是直轄市或縣市政府，收買後土地歸屬直轄市或縣市，而非鄉鎮市。", "❌ 照價收買後土地歸政府所有，不是公營事業。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "108", "num": 13, "q": "依平均地權條例之規定，直轄市或縣（市）政府對於尚未建築之私有建築用地之處理方式，下列何項敘述錯誤？", "opts": ["除有特殊情形外，應限制尚未建築用地面積最高額以十公畝為限", "對於超額私有建築用地，應通知土地所有權人於二年內出售或建築使用", "逾期未出售或未建築使用者，得予照價收買", "照價收買價格，按收買當時查估之正常市價"], "ans": 3, "exps": ["❌ 本選項描述正確，10公畝是法定上限，非錯誤。", "❌ 本選項描述正確，二年是法定通知期限，非錯誤。", "❌ 本選項描述正確，照價收買是逾期的處理方式，非錯誤。", "✓ 本選項為錯誤敘述：照價收買的價格標準是按「公告土地現值」（不是查估之正常市價）。公告土地現值是官方公告的客觀標準，不是個案查估的市價，本選項混淆了兩種不同的地價基準。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "112", "num": 21, "q": "依平均地權條例規定，對私有空地之處置，下列何者錯誤？", "opts": ["規定照價收買者，以收買當期之平均市價為準", "逾期未建築、增建、改建或重建者，按該宗土地應納地價稅基本稅額加徵二倍至五倍之空地稅 或照價收買", "依規定限期建築、增建、改建或重建之土地，其新建之改良物價值不及所占基地申報地價百分 之五十者，直轄市或縣（市）政府不予核發建築執照", "直轄市或縣（市）政府對於私有空地，得視建設發展情形，分別劃定區域，限期建築、增建、 改建或重建"], "ans": 0, "exps": ["✓ 本選項為錯誤敘述：照價收買的價格標準是「公告土地現值」，不是「平均市價」，此為本題的錯誤選項。", "❌ 本選項描述正確，2至5倍是法定加徵範圍，非錯誤。", "❌ 本選項描述正確（新建改良物價值不及申報地價50%仍視為空地），非錯誤。", "❌ 本選項描述正確，政府得劃定區域限期建築，非錯誤。"]}, {"ch": "C3", "chName": "C3 照價收買・空地稅・超額建地", "year": "114", "num": 11, "q": "依土地法規定，有關私有土地所有權取得之限制，土地若已成為私有者，政府得依法以何種方式處置？", "opts": ["公開標售", "照價收買", "徵收", "沒收"], "ans": 2, "exps": ["❌ 公開標售是公有土地處分的方式，不是私有土地已違反不得私有規定時的法定處置方式。", "❌ 照價收買（平均地權條例）是針對超額土地、閒置土地等的處置手段，不是土地法第14條不得私有土地已成私有時的處置方式。", "✓ 土地法第14條第2項：第一項各款土地，已成私有者，得依法徵收之。「依法徵收」是法定的處置方式，不是照價收買，也不是逕登記國有，更不是沒收，這是A1/C3的高頻陷阱考點。", "❌ 沒收是刑事程序的手段，私有不得私有土地不適用沒收，法定程序是徵收。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "101", "num": 6, "q": "依平均地權條例規定，土地所有權移轉之權利人應於買賣案件辦竣所有權移轉登記多久內，向主管機關申報登錄土地及建物成交案件實際資訊？", "opts": ["十五日", "二十日", "三十日", "六十日"], "ans": 2, "exps": ["❌ 15日不是申報登錄的法定期限。", "❌ 20日不是法定期限。", "✓ 平均地權條例第47條：土地所有權移轉之權利人，應於買賣案件辦竣所有權移轉登記後「三十日」內，向主管機關申報登錄土地及建物成交案件的實際資訊（實價登錄）。30日是C4最重要的固定數字，無論什麼申報情境都是30日。", "❌ 60日不是法定期限，為干擾選項。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "102", "num": 27, "q": "依平均地權條例規定，關於依法申報登錄成交案件之實際資訊，下列敍述何者錯誤？", "opts": ["登錄之資訊，除涉及個人資料外，得提供政府機關利用", "主管機關得以區段化、去識別化方式提供查詢", "主管機關得委任所屬機關辦理", "政府機關對於已登錄之不動產交易價格，應即作為課稅之依據"], "ans": 3, "exps": ["❌ 本選項描述正確，政府機關可利用登錄資訊，非錯誤。", "❌ 本選項描述正確，實價登錄資料以區段化去識別化方式公開，非錯誤。", "❌ 本選項描述正確，主管機關得委任辦理，非錯誤。", "✓ 本選項為錯誤敘述：實價登錄資料不是「應即作為課稅依據」，而是作為地價評定、公告現值調整的「參考」，現行法規中實價課稅（以實際成交價格直接作為課稅依據）是「房地合一稅」的範疇，但登錄的實價資料並不等同於直接課稅依據，本選項說「應即作為課稅之依據」過於絕對，故為錯誤描述。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "103", "num": 16, "q": "土地所有權移轉或設定典權時，權利人、義務人、地政士、不動產經紀業申報土地移轉現值之責任，下列何者有誤？", "opts": ["權利人及義務人應於訂定契約之日起三十日內，共同申報其土地移轉現值", "依規定得由權利人單獨申請登記者，權利人得單獨申報其移轉現值", "買賣案件委託地政士申請登記者，應由地政士申報登錄", "買賣案件委由不動產經紀業居間或代理成交，均應由不動產經紀業申報登錄"], "ans": 3, "exps": ["❌ 本選項描述正確，30日是法定期限，共同申報是正確程序，非錯誤。", "❌ 本選項描述正確（特定情形下可單獨申報），非錯誤。", "❌ 本選項描述正確（地政士代辦時應申報登錄），非錯誤。", "✓ 本選項為錯誤敘述：買賣案件委由不動產經紀業「居間」者，仍由權利義務人申報；只有由不動產經紀業「代理成交」者，才應由不動產經紀業申報登錄。「居間」與「代理成交」性質不同，本選項說「均應由不動產經紀業申報」，把居間也納入，描述有誤。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "106", "num": 36, "q": "依平均地權條例之規定，土地買賣未辦竣權利移轉登記，承買人再行出售該土地時，處應納登記費多少倍以下之罰鍰？", "opts": ["5倍", "10 倍", "15 倍", "20 倍"], "ans": 3, "exps": ["❌ 5倍不是法定罰鍰倍數，為干擾選項。", "❌ 10倍不是法定罰鍰倍數。", "❌ 15倍不是法定罰鍰倍數。", "✓ 平均地權條例第81條之1：土地買賣未辦竣權利移轉登記，承買人再行出售土地時，處應納登記費「二十倍以下」之罰鍰。20倍是法定上限，是C4的固定數字考點，這也與土地法第73條逾期登記罰鍰最高20倍相同，可一併記憶。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "110", "num": 9, "q": "有關平均地權條例對違反申報登錄之規定中，直轄市、縣（市）主管機關應先令其限期改正，屆期未改正者，處新臺幣六千元以上三萬元以下罰鍰，並令其限期改正；屆期未改正者，按次處罰的情形係指下列何種狀況？", "opts": ["申報登錄價格資訊不實", "申報登錄價格以外資訊不實", "未依限申報登錄資訊、申報登錄價格或交易面積資訊不實", "金融機構、權利人、義務人、地政士或不動產經紀業規避、妨礙或拒絕查核"], "ans": 1, "exps": ["❌ 申報登錄價格資訊不實是較嚴重的違規，處罰較重（不只是先令改正），不是本題問的「先令限期改正，屆期未改正才處罰」的情形。", "✓ 平均地權條例規定，違反申報登錄義務中，若是「價格以外的資訊不實」（如面積、建物用途等非價格資訊），主管機關應「先令其限期改正」，屆期未改正才處罰鍰（新台幣6千元以上3萬元以下）。與「價格不實」（直接處罰較重）的處理程序不同。", "❌ 未依限申報或價格資訊不實，均是較嚴重違規，直接處罰，不是先令改正。", "❌ 規避查核是最嚴重的違規，直接處罰，不是先令改正的情形。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "110", "num": 10, "q": "依平均地權條例規定，預售屋買受人將已付定金，確立買賣標的物及價金等事項之書面契據，轉售予第三人時，由直轄市、縣（市）主管機關按戶（棟）處罰新臺幣多少元？", "opts": ["三萬元以上十五萬元以下罰鍰", "六萬元以上三十萬元以下罰鍰", "十五萬元以上一百萬元以下罰鍰", "三十萬元以上一百萬元以下罰鍰"], "ans": 2, "exps": ["❌ 金額過低，不符合預售屋轉售罰鍰的法定標準。", "❌ 此為區域計畫法違規的罰鍰金額，不是預售屋轉售的罰鍰。", "✓ 平均地權條例第81條之4：預售屋買受人將已付定金之書面契據轉售予第三人者，處「十五萬元以上一百萬元以下」罰鍰。15萬至100萬是預售屋非法轉售的法定罰鍰範圍，是C4的重要數字考點。", "❌ 下限30萬不是法定標準（應為15萬）。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "111", "num": 25, "q": "依平均地權條例規定，下列銷售預售屋者相關規定之敘述，何者錯誤？", "opts": ["應於銷售前將預售屋買賣定型化契約，報請預售屋坐落基地所在之直轄市、縣（市）主管機關 備查", "原則上應於簽訂買賣契約書之日起三十日內，向直轄市、縣（市）主管機關申報登錄資訊", "向買受人收受定金，應以書面契據確立買賣價金等事項，並不得約定不利於買受人之事項", "向買受人收受定金所訂立之書面契據，得轉售予第三人"], "ans": 3, "exps": ["❌ 本選項描述正確，銷售前備查符合法規規定，非錯誤。", "❌ 本選項描述正確，30日申報期限符合法規，非錯誤。", "❌ 本選項描述正確，書面契據要求及不得不利買受人均符合法規，非錯誤。", "✓ 本選項為錯誤敘述：平均地權條例明文規定，預售屋買受人於簽訂買賣契約後，「不得」讓與或轉售買賣契約與第三人（例外情形僅限配偶、直系血親、二親等內旁系血親），故「得轉售予第三人」的說法違反法規，是本題的錯誤選項。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "112", "num": 9, "q": "依平均地權條例之規定，預售屋或新建成屋買賣契約之買受人，於簽訂買賣契約後，不得讓與或轉售買賣契約與第三人，並不得自行或委託刊登讓與或轉售廣告，但於下列何種情形不在此限？", "opts": ["配偶、直系血親或二親等內旁系血親間之讓與或轉售", "配偶、直系姻親或二親等內旁系姻親間之讓與或轉售", "配偶、直系姻親或二親等內旁系血親間之讓與或轉售", "配偶、直系血親或二親等內旁系姻親間之讓與或轉售"], "ans": 0, "exps": ["✓ 平均地權條例規定，預售屋或新建成屋買賣契約原則上不得轉售，但例外允許的情形是：「配偶、直系血親或二親等內旁系血親」間的讓與或轉售。注意「旁系血親」，不是「旁系姻親」，這是關鍵字差異，四個選項的差別就在「血親/姻親」與「親等範圍」的組合。", "❌ 應是「血親」，不是「姻親」，且姻親關係遠比血親疏遠，法律上的例外通常以血親為準。", "❌ 直系應是「血親」不是「姻親」，混用了血親和姻親。", "❌ 旁系應是「血親」不是「姻親」，本選項的旁系部分錯誤。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "112", "num": 10, "q": "依平均地權條例之規定，委託不動產經紀業代銷預售屋者，應於何時向直轄市、縣（市）主管機關申報登錄資訊？", "opts": ["應於簽訂買賣契約之日起至少十日內申報", "應於簽訂買賣契約之日起至少十五日內申報", "應於簽訂買賣契約之日起三十日內申報", "應於簽訂買賣契約之日起四十五日內申報"], "ans": 2, "exps": ["❌ 10日不是法定期限。", "❌ 15日不是法定期限。", "✓ 委託不動產經紀業代銷預售屋者，應於簽訂買賣契約「三十日內」向主管機關申報登錄資訊。30日是C4申報登錄的統一期限，無論是一般買賣還是委託代銷，均為30日。", "❌ 45日不是法定期限。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "113", "num": 1, "q": "依平均地權條例規定，預售屋或新建成屋買賣契約之買受人，於簽訂買賣契約後，不得讓與或轉售買賣契約與第三人，但經其他中央主管機關公告得讓與或轉售之情形並經直轄市、縣（市）主管機關核准者，不在此限。買受人據此得讓與或轉售之戶（棟）數為何？", "opts": ["全國每一年以一戶（棟）為限", "全國每一年以二戶（棟）為限", "全國每二年以一戶（棟）為限", "全國每二年以三戶（棟）為限"], "ans": 2, "exps": ["❌ 例外轉售的「年限」和「戶數」均錯誤。", "❌ 年限1年錯誤，戶數2戶也錯誤。", "✓ 平均地權條例規定，配偶、直系血親或二親等內旁系血親間的預售屋契約讓與，例外允許，但有次數限制：「全國每二年以一戶（棟）為限」。2年、1戶是固定數字組合，是C4的重要考點。", "❌ 年限2年正確，但戶數3戶錯誤（應為1戶）。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "113", "num": 2, "q": "依平均地權條例規定，權利人及義務人應於買賣案件申請所有權移轉登記時，申報登錄資訊，未共同申報登錄資訊者，直轄市、縣（市）主管機關應令其限期申報登錄資訊；屆期未申報登錄資訊，買賣案件已辦竣所有權移轉登記者，處多少罰鍰，並令其限期改正？", "opts": ["新臺幣三萬元以上十五萬元以下罰鍰", "新臺幣六萬元以上三十萬元以下罰鍰", "新臺幣十五萬元以上五十萬元以下罰鍰", "新臺幣三十萬元以上一百萬元以下罰鍰"], "ans": 0, "exps": ["✓ 平均地權條例第79條之1：未共同申報登錄資訊者，處「新臺幣三萬元以上十五萬元以下罰鍰」。3萬至15萬是未申報登錄的基本罰鍰範圍，是C4的固定數字考點（與預售屋非法轉售的15萬至100萬要區分）。", "❌ 6萬至30萬不是未申報登錄的罰鍰標準。", "❌ 15萬至50萬不是本情形的罰鍰標準。", "❌ 30萬至100萬不是本情形的罰鍰標準。"]}, {"ch": "C4", "chName": "C4 申報登錄・預售屋管理", "year": "113", "num": 3, "q": "依平均地權條例規定，有關私法人買受供住宅使用之房屋，下列何者正確？", "opts": ["應檢具切結書，經中央主管機關許可", "中央主管機關審核其使用計畫，以合議制方式辦理", "私法人取得之房屋，於登記完畢後十年內不得辦理預告登記", "許可之文件有效期限為二年"], "ans": 1, "exps": ["❌ 應檢具的是「使用計畫」，不是切結書；且審核方式是合議制，本選項未提及合議制。", "✓ 平均地權條例規定，私法人買受供住宅使用之房屋，應向中央主管機關申請許可，中央主管機關審核其使用計畫，以「合議制」方式辦理審核。合議制（委員會審議）是本規定的重要特色，避免單一官員決定。", "❌ 限制期限是「五年」，不是十年；取得後五年內不得辦理預告登記，以防止規避限制。", "❌ 許可文件有效期限是「二年」，但本題官方答案是B，B選項（合議制）才是正確描述。注意：此選項的「二年」是正確的，但相比B選項，B才是本題問「何者正確」的最完整且正確描述。"]}];
const CH_ORDER = ['C1 規定地價','C2 市地重劃','C3 照價收買・空地稅・超額建地','C4 申報登錄・預售屋管理'];
const CHS = [...new Set(CARDS.map(c=>c.chName))];
let sel = Object.fromEntries(CHS.map(c=>[c,1]));
// 作答記錄：cardIndex -> {chosen, isok}
let answers = {};

const g = id => document.getElementById(id);

function renderPills(){
  const pills = g('pills'); pills.innerHTML='';
  CHS.forEach(ch=>{
    const p = document.createElement('button');
    p.className='pill'+(sel[ch]?' on':'');
    p.textContent=ch;
    p.onclick=()=>{sel[ch]=sel[ch]?0:1;renderPills();renderList();};
    pills.appendChild(p);
  });
}

function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}
function selNone(){Object.keys(sel).forEach(k=>sel[k]=0);renderPills();renderList();}
function resetAll(){if(!confirm('確定要清除所有作答記錄？'))return;answers={};renderList();updateProgress();}

function renderList(){
  const list = g('questionList'); list.innerHTML='';
  const visible = CARDS.filter(c=>sel[c.chName]);
  
  let lastCh='';
  visible.forEach((card,vi)=>{
    const globalIdx = CARDS.indexOf(card);
    if(card.chName!==lastCh){
      const hdr=document.createElement('div');
      hdr.className='ch-header';
      hdr.textContent=card.chName;
      list.appendChild(hdr);
      lastCh=card.chName;
    }
    list.appendChild(makeCard(card, globalIdx));
  });
  updateProgress();
}

function makeCard(card, idx){
  const ans = answers[idx];
  const div = document.createElement('div');
  div.className='qcard'+(ans?( ans.isok?' answered-ok':' answered-ng'):'');
  div.id='card-'+idx;

  const meta = document.createElement('div');
  meta.className='qmeta';
  meta.innerHTML=`<span>【${card.year}年第${card.num}題】</span><span class="qtag">${card.chName}</span>`;
  div.appendChild(meta);

  const qt=document.createElement('div');
  qt.className='qtext';
  qt.textContent=card.q;
  div.appendChild(qt);

  const opts=document.createElement('div');
  opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="ltr">${l}</span><span>${card.opts[i]}</span>`;
    if(ans){
      b.disabled=true;
      if(i===card.ans) b.classList.add('show-correct');
      if(i===ans.chosen&&!ans.isok) b.classList.add('ng');
    } else {
      b.onclick=()=>pick(idx,i);
    }
    opts.appendChild(b);
  });
  div.appendChild(opts);

  // 解析區（若已作答就顯示）
  const eb=document.createElement('div');
  eb.className='expbox'+(ans?' show':'');
  eb.id='exp-'+idx;
  const exph=document.createElement('div');
  exph.className='exph';
  exph.textContent='📖 逐選項解析';
  eb.appendChild(exph);
  const expb=document.createElement('div');
  expb.className='expb';
  if(ans){
    expb.innerHTML=buildExpHTML(card,ans.chosen,ans.isok);
  }
  eb.appendChild(expb);
  div.appendChild(eb);

  return div;
}

function buildExpHTML(card, chosen, isok){
  let html=`<div style="margin-bottom:7px;"><span class="verdict ${isok?'ok':'ng'}">${isok?'答對了':'答錯了'}</span></div>`;
  ['A','B','C','D'].forEach((l,i)=>{
    const ec=i===card.ans?'ok':(i===chosen&&!isok?'ng':'no');
    html+=`<div class="ei"><span class="el ${ec}">${l}</span><span>${card.exps[i]||''}</span></div>`;
  });
  return html;
}

function pick(idx, chosen){
  const card=CARDS[idx];
  const isok=(chosen===card.ans);
  answers[idx]={chosen,isok};
  
  // 更新這張卡片（不重新渲染全部）
  const cardEl=g('card-'+idx);
  cardEl.className='qcard'+(isok?' answered-ok':' answered-ng');
  
  // 更新選項狀態
  const optBtns=cardEl.querySelectorAll('.opt');
  optBtns.forEach((b,i)=>{
    b.disabled=true;
    b.onclick=null;
    if(i===card.ans) b.classList.add('show-correct');
    if(i===chosen&&!isok) b.classList.add('ng');
  });

  // 顯示解析
  const eb=g('exp-'+idx);
  const expb=eb.querySelector('.expb');
  expb.innerHTML=buildExpHTML(card,chosen,isok);
  eb.classList.add('show');

  updateProgress();
}

function updateProgress(){
  const visible=CARDS.filter(c=>sel[c.chName]);
  const total=visible.length;
  const done=visible.filter(c=>answers[CARDS.indexOf(c)]!==undefined).length;
  const correct=visible.filter(c=>{const a=answers[CARDS.indexOf(c)];return a&&a.isok;}).length;
  g('progDone').textContent=done;
  g('progTotal').textContent=total;
  g('progRate').textContent=done?Math.round(correct/done*100)+'%':'-';
  g('progFill').style.width=total?done/total*100+'%':'0%';
}

renderPills();
renderList();
</script>
</body>
</html>
