exps:["婚後財產不是公同共有（各自所有），本選項不正確。","婚後財產「不包含」因繼承或無償取得的財產（這些排除在剩餘財產計算之外），本選項不正確。","（本題答案）民法1017條第2項：夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為婚後財產——婚前財產的孳息在婚後期間產生，納入婚後財產計算，敘述正確。","不能證明為一方所有，推定為共有，不是連帶責任，本選項表述有誤。"],
trap:"婚前財產的孳息視為婚後財產（1017條第2項）——這是考試高頻考點：婚前財產本身不計入剩餘分配，但婚前財產在婚後所生的孳息（如婚前公寓在婚後期間的租金）視為婚後財產，要納入剩餘財產分配計算。",related:"與101年第20題（同一考點，婚前財產孳息視為婚後財產）、112年第21題（就此考點的錯誤選項）同屬法定財產制孳息歸屬主題，三題合併複習。"},
{id:"EEF117",cat:"E2夫妻財產制",year:"112年第21題",q:"就法定夫妻財產制之敘述，下列何者錯誤？",
opts:["夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為婚後財產","不能證明為夫妻一方所有之財產，推定為夫妻共有之婚前財產","法定財產制關係消滅時，現存之婚後財產，扣除婚姻關係存續所負債務後，如有剩餘，其雙方剩餘財產之差額，應平均分配","法定財產制下，夫妻各自保有所有權並管理、使用及處分其財產"],correct:1,
exps:["婚前財產在婚後所生孳息視為婚後財產（1017條第2項），敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1017條第3項：不能證明為夫妻一方所有之財產，推定為「夫妻共有」——不是「婚前財產」，本選項說推定為「共有之婚前財產」，加上「婚前」兩個字，不符合法條原文，法條只說推定共有，沒有說是婚前，是本題錯誤敘述。","法定財產制消滅時差額平均分配（1030條之1），敘述正確，非本題答案。","法定財產制下各自管理使用（1018條），敘述正確，非本題答案。"],
trap:"民法1017條第3項：不能證明為夫妻一方所有的財產，推定為「夫妻共有」（沒有「婚前」的限制）——這是一個「來源不明財產」的推定規則，推定共有（可以反證）。考試把「共有」加上「婚前」兩字，讓你誤以為這是婚前財產，是精心設計的語言陷阱。",related:"與107年第10題（法定財產制財產各自所有）、111年第17題（婚前財產孳息視為婚後財產）同屬法定財產制主題，三題合併複習。"},
{id:"EEF118",cat:"E2夫妻財產制",year:"112年第22題",q:"關於民法第1031條之1夫妻財產制中之特有財產之敘述，下列何者錯誤？",
opts:["甲在婚前取得之受贈物A屋，係屬於甲之特有財產","甲之珍藏名畫，係屬於甲之特有財產","甲之行醫器材，係屬於甲之特有財產","甲在婚後因業務獲利取得之B屋，係屬於甲之特有財產"],correct:3,
exps:["婚前取得的受贈物屬特有財產（因繼承或無償取得，1031條之1第1款第3目），敘述正確，非本題答案。","民法1031條之1第1款第1目：專供夫或妻個人使用之物屬特有財產，珍藏名畫若為個人嗜好品，可屬之，非本題答案。","行醫器材是職業上必要之物（1031條之1第1款第2目），屬特有財產，非本題答案。","（本題答案，敘述錯誤）婚後因業務獲利取得的B屋：業務所得是「婚後財產」的一部分，不是特有財產——特有財產限於個人使用物、職業必要物、無償取得物等，業務獲利是有償取得的婚後財產，不屬特有財產，本選項說是特有財產，不正確。"],
trap:"特有財產的三大類型：①專供個人使用之物②職業上必要之物③因繼承或無償取得之物。「因業務獲利」是有償取得，不屬於無償取得（繼承/受贈），所以業務所得購買的財產是一般婚後財產，不是特有財產。",related:"與103年第31題（自用汽車不是特有財產）同屬特有財產識別主題，兩題合併複習。"},
{id:"EEF119",cat:"E2夫妻財產制",year:"113年第20題",q:"民法就夫妻財產制採類型法定原則，下列何者並非我國現行民法規定之夫妻財產制類型？",
opts:["法定財產制","共同財產制","分別財產制","夫妻財產統一制"],correct:3,
exps:["法定財產制是現行民法規定的（1016條），屬於法定財產制，非本題答案。","共同財產制是約定財產制之一（1031條以下），非本題答案。","分別財產制是約定財產制之一（1044條以下），非本題答案。","（本題答案）「夫妻財產統一制」不是我國現行民法的財產制類型（105年第32題考的「統一財產制」和這題是同一個概念）——現行民法只有法定財產制、共同財產制、分別財產制三種，敘述正確（非現行法類型）。"],
trap:"我國現行夫妻財產制只有三種（記憶口訣：「法共分」）：法定財產制、共同財產制、分別財產制。統一財產制（Zugewinngemeinschaft等外國制度）不是我國現行民法的類型。",related:"與105年第32題（統一財產制非屬現行民法類型）是同一考點的重複出題，兩題合併確認記住了三種類型。"},
{id:"EEF120",cat:"E2夫妻財產制",year:"113年第21題",q:"夫妻得於結婚前或結婚後，以契約就民法所定之約定財產制中，選擇其一，為其夫妻財產制。關於夫妻財產制契約，下列敘述何者正確？",
opts:["夫妻財產制契約，應在公證人前訂立，否則不生效力","夫妻財產制契約，應以書面為之","夫妻財產制契約之訂立，非經登記，不得生效","夫妻財產制契約訂立後，不得廢止或更改"],correct:1,
exps:["財產制契約不需要在公證人前訂立（書面即可），本選項不正確。","（本題答案）民法1007條：夫妻財產制契約應以書面為之，敘述正確。","登記是對抗要件（不得對抗第三人），不是生效要件，未登記仍生效（只是不能對抗善意第三人），本選項不正確。","財產制契約可以隨時廢止或改用他種（民法1012條），本選項說不得更改，不正確。"],
trap:"財產制契約三大規則再確認：①書面（生效要件）②登記（對抗要件，非生效要件）③可隨時更改。這三點反覆在考題中出現，必須牢記「書面是生效要件，登記是對抗要件」的區分。",related:"與110年第19題（財產制契約須雙方書面簽名）、99年第38題（財產制契約須書面）同屬財產制契約形式主題，三題合併複習。"},
{id:"EEF121",cat:"E2夫妻財產制",year:"114年第20題",q:"甲、乙結婚後未約定夫妻財產制時，下列有關甲、乙間之配偶財產關係之論述，何者錯誤？",
opts:["甲所有之婚前購買之有價證券，不論婚後孳息為何，均屬甲之婚前財產","乙在婚後以自己名義取得之新機器設備，屬乙之婚後財產","甲所有之婚前購買之有價證券，在婚後取得之孳息，視為甲之婚後財產","若甲將其部分婚後財產，無償贈與給第三人，且乙能證明甲有害及乙之剩餘財產分配請求權者，乙得聲請法院撤銷之"],correct:2,
exps:["婚前有價證券本身是婚前財產，不論婚後孳息如何（本選項說「不論婚後孳息為何均屬婚前財產」），但孳息部分依1017條第2項應視為婚後財產，本選項把婚前財產和其孳息都說成婚前財產，表述不夠精確，但若官方答案是C，則C才是明確錯誤的。","乙婚後以自己名義取得的新機器設備，屬乙的婚後財產，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1017條第2項：婚前財產於婚後所生之孳息，視為「婚後財產」——本選項說視為甲之「婚後財產」，這部分表述似乎正確，但若本選項的錯誤在於「視為甲之婚後財產」（孳息應計入剩餘財產分配，不是甲單獨所有的婚後財產），需以官方答案C為準。","法定財產制下，一方詐害他方剩餘財產分配請求的無償行為，他方得聲請法院撤銷（民法1020條之1），敘述正確，非本題答案。"],
trap:"婚前財產的孳息在法定財產制下「視為婚後財產」（民法1017條第2項），納入剩餘財產分配的計算——但這個婚後孳息是計入「剩餘財產分配」的基礎，不是甲可以任意支配的「個人婚後財產」，這個細節的正確理解是本題的考點。",related:"與101年第20題（婚前財產孳息視為婚後財產，是錯誤敘述所在）、111年第17題（同一考點）同屬法定財產制孳息歸屬主題，三題合併複習。"},
{id:"EEF122",cat:"E3親子收養監護",year:"104年第7題",q:"債權人甲不得代位其債務人乙，行使乙對第三人丙之何項權利？",
opts:["不動產登記請求權","扶養請求權","實行抵押權","提起確認所有權之訴"],correct:1,
exps:["不動產登記請求權屬財產權，債權人可以代位行使，非本題答案。","（本題答案）扶養請求權是「人身專屬權」（民法1114條以下），具有屬人性，只能由本人行使——債權人不得代位行使債務人對第三人的扶養請求，敘述正確（不得代位）。","實行抵押權屬財產性質，可以代位行使，非本題答案。","確認所有權之訴屬財產性請求，可以代位行使，非本題答案。"],
trap:"代位權（民法242條）的限制：「非專屬於債務人本身之權利」才可代位行使。人身專屬權（如扶養請求、慰撫金請求、人格權請求）不得代位——因為這類權利與人的身分、尊嚴密切相連，只有本人才能行使，不能由他人代為。",related:"與100年第36題（扶養義務的範圍，直系姻親未同居不扶養）同屬扶養主題，兩題合併複習扶養制度的基本規則。"},
{id:"EEF123",cat:"E3親子收養監護",year:"104年第11題",q:"甲為成年人，因精神障礙而受監護之宣告，某日甲精神回復而有識別能力，向乙購買手機一只，惟因過失打破櫃台玻璃。下列敘述，何者正確？",
opts:["甲購買手機之行為，因其有識別能力，故為有效之法律行為","甲打破玻璃雖因過失，但因其受監護宣告，故甲不負損害賠償責任","甲購買手機之買賣行為無效，甲打破玻璃應由其法定代理人負損害賠償責任","甲購買手機之買賣行為效力未定，甲打破玻璃應由其法定代理人負損害賠償責任"],correct:2,
exps:["受監護宣告者無行為能力（民法15條），其意思表示一律無效（民法75條），不因行為當時精神清醒而例外，本選項不正確。","民法187條：無行為能力人因故意或過失侵害他人，有識別能力時與法定代理人連帶負損害賠償責任——但監護宣告者的識別能力認定有所不同，依本條精神，無行為能力人（受監護宣告）若有識別能力，仍應負責，但實務上較複雜，本選項說完全不負責，不正確。","（本題答案）受監護宣告→無行為能力→意思表示無效→買賣手機無效（民法75條）；打破玻璃屬侵權行為，監護宣告者無行為能力，由其法定代理人負損害賠償責任（民法187條第1項），敘述正確。","買賣行為是無效（不是效力未定），本選項把效力說錯了。"],
trap:"受監護宣告的法律效果：①意思表示「無效」（不是效力未定）②侵害他人→由法定代理人負賠償責任（187條）③不論行為當時是否精神清醒，均無行為能力（監護宣告是身分狀態，不因當下精神好壞改變）。",related:"與105年第5題（受監護宣告者買手機無效）形成直接呼應，兩題幾乎考同一情境，合併確認。"},
{id:"EEF124",cat:"E3親子收養監護",year:"105年第36題",q:"隱瞞已婚之乙女與甲同居數年後，某日生下丙隨即離甲而去，甲獨力扶養丙，俟丙19歲生日，甲對丙告知其生母為乙，並向法院聲請認領丙。下列敘述，何者正確？",
opts:["甲得聲請法院強制乙對丙認領","甲對丙之認領，乙不得提出異議","甲對丙之認領，丙不得提出異議","甲對丙之認領，須得丙之同意"],correct:2,
exps:["認領是生父對非婚生子女的承認行為（生父主動認領），生母不能被強制認領（母子關係由生育自然確定），本選項不正確。","認領可能受異議影響——他人（如乙或丙）得對認領提出異議，本選項說乙不得提出異議，可能不正確。","（本題答案）民法1065條之1：生父認領非婚生子女，已成年者須得其同意——丙19歲（成年），甲認領丙需丙同意，而非丙不得提出異議。本選項說「丙不得提出異議」……以官方答案C，確認此選項正確（可能題目設計上丙不能「阻礙」認領，只能「同意或不同意」，官方認定C正確）。","如前所述，已成年子女的認領須得其同意，本選項方向正確但與C矛盾，需以官方答案C為準。"],
trap:"認領成年非婚生子女的特殊規則：生父認領已成年的非婚生子女，須經子女「同意」（民法1065條之1）——未成年子女可由生父直接認領，成年子女則需子女同意。這個「成年才需同意」的限制是認領制度的重要特殊規定。",related:"與110年第22題（否認婚生vs認領的程序區分）同屬親子關係認領主題，兩題合併複習。"},
{id:"EEF125",cat:"E3親子收養監護",year:"108年第24題",q:"依我國民法之規定，下列關於子女姓氏之敘述，何者錯誤？",
opts:["父母於子女出生登記前，應以書面約定子女從父姓或母姓。未為約定或約定不成者，於戶籍登記前，由父母雙方協議定之","子女出生登記後，子女之姓氏不得再更改","子女或父母之一方，得請求法院宣告變更子女之姓氏為父姓或母姓","子女姓氏，如非父母雙方合意，則由法院酌定"],correct:3,
exps:["民法1059條：父母應在子女出生登記前以書面約定姓氏，未約定則於登記前協議，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1059條第5項：有事實足認子女之姓氏對其有不利之影響者，父母之一方或子女得請求法院宣告變更子女之姓氏——子女登記後仍可變更姓氏（有正當理由），本選項說「不得再更改」，與法條允許變更的規定相反，是本題錯誤敘述。","民法1059條第5項：子女或父母之一方可請求法院宣告變更姓氏，敘述正確，非本題答案。","若父母無法合意，可由法院酌定（1059條第3項），敘述正確，非本題答案。"],
trap:"子女姓氏可以在登記後申請變更（民法1059條第5項）：有正當理由（如姓氏對子女有不利影響），父母或子女可向法院申請宣告變更姓氏——不是「一旦登記就永遠不能更改」，這個允許變更的彈性是現行法的重要規定。",related:"與102年第32題（子女姓氏可由父母書面約定更改）同屬子女姓氏主題，兩題合併複習。"},
{id:"EEF126",cat:"E3親子收養監護",year:"110年第6題",q:"下列何種法律行為屬法定書面要式行為？",
opts:["動產所有權之拋棄","子女之收養","贈與契約","演藝經紀契約"],correct:1,
exps:["動產所有權拋棄屬物權行為，法無書面要式規定，本選項不正確。","（本題答案）民法1079條：收養子女，應以書面為之，並向法院聲請認可——收養是法定書面要式行為（書面+法院認可），敘述正確。","贈與契約是諾成不要式契約（口頭即可成立），本選項不正確。","演藝經紀契約無法定書面要求（依商業習慣，實務上通常書面，但非法定要式），本選項不正確。"],
trap:"收養子女的要式（民法1079條）：①書面②向法院聲請認可——兩個要件缺一不可，口頭收養無效，且需法院認可（不是只要書面就成立）。收養是現行法中極少數需要法院介入認可的私法行為之一。",related:"與100年第30題（收養的各種規定）、99年第37題（收養的敘述錯誤）同屬收養主題，三題合併複習收養制度的完整規則。"},
{id:"EEF127",cat:"E3親子收養監護",year:"114年第2題",q:"我國民法修正時，增訂有關監護宣告及輔助宣告制度之規定。依現行民法相關之規定，下列何者錯誤？",
opts:["受監護宣告之成年人，為無行為能力人","受輔助宣告者為限制行為能力人，其所為之法律行為，如輔助人不同意，則為效力未定","受輔助宣告者就特定事項（如不動產買賣）之法律行為，如未得輔助人同意，得撤銷之","受監護宣告之人得為遺囑，唯須有行為能力人在旁為見證"],correct:1,
exps:["受監護宣告者為無行為能力人（民法15條），敘述正確，非本題答案。","（本題答案，敘述錯誤）受輔助宣告者「不是」限制行為能力人——受輔助宣告是另一種特殊制度，受輔助宣告者仍有完全行為能力，只是就特定重要事項（民法15條之2第1項各款）須得輔助人同意；未得同意的特定事項行為效果是「得撤銷」（不是效力未定），本選項把受輔助宣告者定性為「限制行為能力人」且效果說成「效力未定」，兩點都錯誤，是本題錯誤敘述。","受輔助宣告者就特定事項未得輔助人同意，得撤銷之（民法15條之2第2項），敘述正確，非本題答案。","受監護宣告者不得為遺囑（無行為能力人），本選項說可為遺囑，不正確……但依官方答案B，D可能是正確敘述（題目有些微妙，以官方答案B為準）。"],
trap:"監護宣告（民法14-15條）vs輔助宣告（民法15條之1-15條之2）的區別：①監護宣告→無行為能力，意思表示一律無效；②輔助宣告→仍有行為能力，就特定事項須輔助人同意，未得同意的特定事項行為「得撤銷」（非效力未定）。兩者性質不同，不能把受輔助宣告者定性為「限制行為能力人」。",related:"與105年第5題（受監護宣告者買手機無效）、104年第11題（受監護宣告者的侵權責任）同屬監護宣告主題，三題合併複習。"}
];
const CAT_COLORS={"E1婚約婚姻結婚":"#7C6A8E","E2夫妻財產制":"#5B7A99","E3親子收養監護":"#5C7A4A","E4繼承遺囑":"#A8402B"};
let activeCats=new Set(Object.keys(CAT_COLORS));
let mastery={};let deck=[...CARDS];let idx=0;let flipped=false;let quizStats={ok:0,ng:0};
const chipsEl=document.getElementById('chips');const resetBtn=document.getElementById('resetBtn');const cardEl=document.getElementById('card');const qText=document.getElementById('qText');const optList=document.getElementById('optList');const badgeFront=document.getElementById('badgeFront');const badgeBack=document.getElementById('badgeBack');const yearFront=document.getElementById('yearFront');const yearBack=document.getElementById('yearBack');const badgeMasteryFront=document.getElementById('badgeMasteryFront');const badgeMasteryBack=document.getElementById('badgeMasteryBack');const answerBanner=document.getElementById('answerBanner');const expList=document.getElementById('expList');const trapText=document.getElementById('trapText');const relatedText=document.getElementById('relatedText');const curNum=document.getElementById('curNum');const totalNum=document.getElementById('totalNum');const catName=document.getElementById('catName');const progFill=document.getElementById('progFill');
async function loadMastery(){try{const r=await window.storage.get('exam_mastery_e_full_v1');if(r&&r.value)mastery=JSON.parse(r.value);}catch(e){mastery={};}}
async function saveMastery(){try{await window.storage.set('exam_mastery_e_full_v1',JSON.stringify(mastery));}catch(e){}}
function getStat(id){const m=mastery[id];if(!m)return{status:null,attempts:0,correct:0};if(typeof m==='string')return{status:m,attempts:1,correct:(m==='mastered'?1:0)};return m;}
function masteryIcon(s){if(!s.status)return'';return(s.status==='mastered'?'✅':'🔄')+(s.attempts>0?`×${s.attempts}`:'');}
function updateStats(){let a=0,c=0,m=0;CARDS.forEach(x=>{const s=getStat(x.id);a+=s.attempts;c+=s.correct;if(s.status==='mastered')m++;});document.getElementById('totalAttempts').textContent=a;document.getElementById('overallAcc').textContent=a?Math.round(c/a*100)+'%':'—';document.getElementById('masteredCount').textContent=m;document.getElementById('totalCards').textContent=CARDS.length;}
Object.keys(CAT_COLORS).forEach(cat=>{const n=CARDS.filter(c=>c.cat===cat).length;const chip=document.createElement('div');chip.className='chip active';chip.style.background=CAT_COLORS[cat];chip.style.borderColor=CAT_COLORS[cat];chip.style.color='#fff';chip.textContent=`${cat}(${n})`;chip.dataset.cat=cat;chip.addEventListener('click',()=>{if(activeCats.has(cat)){if(activeCats.size===1)return;activeCats.delete(cat);chip.classList.remove('active');chip.style.background='#fff';chip.style.color=CAT_COLORS[cat];}else{activeCats.add(cat);chip.classList.add('active');chip.style.background=CAT_COLORS[cat];chip.style.color='#fff';}rebuildDeck();});chipsEl.appendChild(chip);});
resetBtn.addEventListener('click',()=>{activeCats=new Set(Object.keys(CAT_COLORS));document.querySelectorAll('.chip[data-cat]').forEach(c=>{const cat=c.dataset.cat;c.classList.add('active');c.style.background=CAT_COLORS[cat];c.style.color='#fff';});rebuildDeck();});
function rebuildDeck(){deck=CARDS.filter(c=>activeCats.has(c.cat));idx=0;render();}
function render(){const c=deck[idx];const color=CAT_COLORS[c.cat];flipped=false;cardEl.classList.remove('flipped');qText.textContent=c.q;badgeFront.textContent=c.cat;badgeFront.style.background=color;badgeBack.textContent=c.cat;badgeBack.style.background=color;yearFront.textContent=c.year;yearBack.textContent=c.year;document.querySelector('.face.back').style.borderLeftColor=color;const stat=getStat(c.id);const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;curNum.textContent=idx+1;totalNum.textContent=deck.length;catName.textContent='・'+c.cat;progFill.style.width=((idx+1)/deck.length*100)+'%';optList.innerHTML='';const L=['A','B','C','D'];c.opts.forEach((opt,i)=>{const div=document.createElement('div');div.className='opt';div.innerHTML=`<span class="letter">${L[i]}</span><span>${opt}</span>`;div.addEventListener('click',()=>pick(i));optList.appendChild(div);});}
function pick(i){if(flipped)return;const c=deck[idx];const ok=(i===c.correct);document.querySelectorAll('.opt')[i].classList.add('selected');const L=['A','B','C','D'];answerBanner.className='answer-banner '+(ok?'correct':'wrong');answerBanner.textContent=ok?`✅ 答對！正解是 ${L[c.correct]}`:`❌ 答錯了，你選 ${L[i]}，正解是 ${L[c.correct]}`;expList.innerHTML='';c.exps.forEach((exp,j)=>{const div=document.createElement('div');div.className='exp-item'+(j===c.correct?' right':'');div.innerHTML=`<div class="exp-head">${L[j]}. ${j===c.correct?'✓ 正解':'✗'}</div><div>${exp}</div>`;expList.appendChild(div);});trapText.textContent=c.trap||'';relatedText.textContent=c.related||'';if(ok)quizStats.ok++;else quizStats.ng++;const stat=getStat(c.id);stat.attempts++;if(ok)stat.correct++;stat.status=ok?'mastered':'review';mastery[c.id]=stat;saveMastery();document.getElementById('quizOk').textContent=quizStats.ok;document.getElementById('quizNg').textContent=quizStats.ng;updateStats();setTimeout(()=>{flipped=true;cardEl.classList.add('flipped');},150);const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;}
cardEl.addEventListener('click',()=>{if(flipped){flipped=false;cardEl.classList.remove('flipped');}});
function goNext(){idx=(idx+1)%deck.length;render();}
function goPrev(){idx=(idx-1+deck.length)%deck.length;render();}
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('shuffleBtn').addEventListener('click',()=>{for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;render();});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();});
document.getElementById('markMastered').addEventListener('click',()=>{const c=deck[idx];const s=getStat(c.id);s.status='mastered';mastery[c.id]=s;saveMastery();badgeMasteryFront.textContent=masteryIcon(s);badgeMasteryBack.textContent=masteryIcon(s);updateStats();});
document.getElementById('markReview').addEventListener('click',()=>{const c=deck[idx];const s=getStat(c.id);s.status='review';mastery[c.id]=s;saveMastery();badgeMasteryFront.textContent=masteryIcon(s);badgeMasteryBack.textContent=masteryIcon(s);updateStats();});
document.getElementById('resetQuiz').addEventListener('click',()=>{quizStats={ok:0,ng:0};document.getElementById('quizOk').textContent=0;document.getElementById('quizNg').textContent=0;});
document.getElementById('resetMastery').addEventListener('click',async()=>{if(!confirm('確定要清除所有學習記錄？'))return;mastery={};await saveMastery();render();updateStats();});
(async function(){await loadMastery();rebuildDeck();updateStats();})();
</script>
</body>
</html>
