<style>
:root{--paper:#F8F3E9;--paper-deep:#EFE6D5;--ink:#2A2722;--ink-soft:#7A7165;--rule:#DED1B9;--stamp:#A8402B;--gold:#BC8A2E;--green:#5C7A4A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:radial-gradient(circle at 12% 8%,rgba(188,138,46,.06),transparent 40%),radial-gradient(circle at 90% 95%,rgba(168,64,43,.05),transparent 45%),var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px;}
.wrap{width:100%;max-width:560px;}
header{text-align:center;margin-bottom:14px;}
.case-tag{display:inline-flex;align-items:center;gap:6px;font-family:'Noto Serif TC',serif;font-weight:700;font-size:12px;letter-spacing:.12em;color:var(--stamp);border:1px solid var(--stamp);border-radius:999px;padding:3px 12px;margin-bottom:10px;}
h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:21px;letter-spacing:.04em;line-height:1.5;}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;margin-top:4px;font-family:'Noto Sans TC',sans-serif;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 6px;}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);cursor:pointer;user-select:none;transition:all .15s ease;white-space:nowrap;}
.chip.active{color:#fff;border-color:transparent;}
.filter-row{display:flex;justify-content:center;margin-bottom:8px;}
.filter-row .chip{border-color:var(--ink);color:var(--ink);font-weight:700;font-size:12px;padding:5px 12px;}
.filter-row .chip.active{background:var(--ink);color:#fff;}
.progress{text-align:center;font-family:'Noto Serif TC',serif;font-weight:700;font-size:13px;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:10px;}
.progress b{color:var(--ink);font-size:15px;}
.progress-bar{height:3px;background:var(--rule);border-radius:2px;overflow:hidden;margin:0 auto 18px;max-width:200px;}
.progress-fill{height:100%;background:var(--stamp);transition:width .25s ease;}
.scene{perspective:1800px;width:100%;}
.card{position:relative;width:100%;min-height:540px;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.card.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:1.5px solid var(--rule);background:#fff;display:flex;flex-direction:column;padding:20px;box-shadow:0 4px 18px rgba(42,39,34,.07);overflow-y:auto;}
.face.back{transform:rotateY(180deg);background:var(--paper-deep);border-left:6px solid var(--cat-color,var(--stamp));}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{font-size:11px;font-weight:700;color:#fff;padding:4px 12px;border-radius:999px;letter-spacing:.06em;font-family:'Noto Serif TC',serif;}
.year-badge{font-size:11px;font-weight:700;color:var(--ink-soft);border:1px solid var(--rule);border-radius:999px;padding:3px 10px;font-family:'Noto Serif TC',serif;}
.mastery-badge{font-size:18px;line-height:1;}
.q-text{font-size:14px;line-height:1.8;margin-bottom:14px;font-weight:500;}
.opt-list{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;gap:8px;padding:9px 10px;border-radius:8px;border:1.5px solid var(--rule);background:#fff;font-size:13px;line-height:1.6;cursor:pointer;transition:all .15s ease;}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--stamp);background:#FBEAE6;}
.opt .letter{font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:12px;}
.hint{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;letter-spacing:.1em;font-family:'Noto Serif TC',serif;}
.answer-banner{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px;padding:10px;border-radius:8px;margin-bottom:12px;}
.answer-banner.correct{background:#EFF4EC;color:var(--green);border:1.5px solid var(--green);}
.answer-banner.wrong{background:#FBEAE6;color:var(--stamp);border:1.5px solid var(--stamp);}
.exp-list{display:flex;flex-direction:column;gap:8px;}
.exp-item{padding:9px 10px;border-radius:8px;font-size:12.5px;line-height:1.75;border:1.5px solid var(--rule);background:#fff;}
.exp-item.right{border-color:var(--green);background:#EFF4EC;}
.exp-item .exp-head{font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.exp-item.right .exp-head{color:var(--green);}
.exp-item:not(.right) .exp-head{color:var(--stamp);}
.extra-box{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.75;}
.trap-box{background:#FBF1E6;border:1.5px solid var(--gold);}
.trap-box .extra-head{color:var(--gold);font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.related-box{background:#EEF1F7;border:1.5px solid #5B7A99;}
.related-box .extra-head{color:#5B7A99;font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;border:1.5px solid var(--ink);background:#fff;color:var(--ink);border-radius:10px;padding:10px 16px;cursor:pointer;transition:all .15s ease;}
.btn:hover{background:var(--ink);color:#fff;}
.btn.primary{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.btn.primary:hover{background:#8c3322;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green);color:#fff;}
.quiz-stats{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:14px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.quiz-stats .ok{color:var(--green);}
.quiz-stats .ng{color:var(--stamp);}
footer{margin-top:28px;text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.12em;line-height:2;}
footer .reset{text-decoration:underline;cursor:pointer;color:var(--ink-soft);background:none;border:none;font-size:11px;letter-spacing:.12em;font-family:inherit;}
</style>
</head>

<script>
const CARDS=[
{id:"EEF001",cat:"E4繼承遺囑",year:"99年第31題",q:"甲之配偶早亡，有乙丙丁3名子女，其中乙與A結婚，有兩子X及Y，丙丁則尚未結婚，甲有財產3000萬元，請問甲死亡後若無遺囑，各人可繼承多少金額？",
opts:["乙丙丁各1000萬元","乙500萬元丙丁各1250萬元","乙丙丁各1000萬元，乙之配偶A無繼承權","乙500萬，丙丁各750萬元"],correct:2,
exps:["A是乙的配偶，配偶只能繼承自己配偶（乙）的遺產，不能繼承甲的遺產，本選項前半段數字正確但未說明A的地位，不如C精確。","不正確，乙丙丁應平均分配。","（本題答案）甲的繼承人是第一順位直系血親卑親屬乙丙丁三人，配偶已亡故，乙丙丁各1/3即各1000萬元；乙之配偶A不是甲的繼承人（A只能繼承乙的財產），敘述正確。","乙丙丁應平均分配1000萬元各，不是這個比例。"],
trap:"配偶的繼承順位是「配偶繼承自己的配偶」，不能跨代繼承岳父母或公婆的遺產——A是甲的媳婦（乙的配偶），A不是甲的繼承人。甲的繼承人是甲的直系血親卑親屬（乙丙丁）或配偶，甲的配偶已亡故，所以只有乙丙丁三人平分。",related:"與100年第37題（繼承順序）、100年第40題（配偶的應繼分及特留分）同屬繼承基本架構主題，三題合併複習可建立完整的繼承人判斷和應繼分計算能力。"},
{id:"EEF002",cat:"E4繼承遺囑",year:"99年第32題",q:"繼承人於下列何者情形，並不喪失繼承權？",
opts:["乙酒駕騎乘機車，不小心於家門口將其父甲撞死因而受刑之宣告","乙為獨占遺產，偽造甲之遺囑","乙以詐欺或脅迫，使甲為遺囑，或妨礙甲為遺囑，或使甲撤回或變更遺囑者","乙以詐欺或脅迫，阻礙被繼承人甲依其意思為遺囑"],correct:0,
exps:["（本題答案）民法1145條喪失繼承權的要件之一是「故意致被繼承人於死，或雖未致死因而受刑之宣告者」——本選項乙是「過失」（不小心），不是故意，過失致被繼承人死亡不構成喪失繼承權，乙不喪失繼承權，敘述正確（乙不喪失）。","偽造遺囑屬於1145條第1項第4款（詐欺脅迫或偽造遺囑），喪失繼承權。","詐欺或脅迫使被繼承人為遺囑，屬1145條第1項第4款，喪失繼承權。","阻礙被繼承人依意思為遺囑，同樣屬1145條，喪失繼承權。"],
trap:"喪失繼承權（民法1145條）的關鍵條件之一是「故意」致被繼承人於死——「過失」致被繼承人死亡不喪失繼承權（如車禍過失傷亡）。考試常把「故意」改成「過失」來測試是否分清楚，酒駕過失是「過失」，不是故意，所以乙不喪失繼承權。",related:"與110年第24題（喪失繼承權的各種情形）、112年第24題（喪失繼承權的回復）同屬繼承權喪失主題，三題合併複習可完整掌握1145條的各種情形。"},
{id:"EEF003",cat:"E4繼承遺囑",year:"99年第34題",q:"因他人拋棄繼承而為繼承人者，其主張拋棄繼承之法定期間為何？",
opts:["於知悉其得繼承之日起2個月內","自繼承開始之日起3個月內","於知悉其得繼承之日起3個月內","自繼承開始之日起2個月內"],correct:2,
exps:["知悉後2個月不是正確的期間，本選項錯誤。","自繼承開始之日起計算（不是知悉日）且3個月，適用於一般繼承人（1174條第2項前段），不是因他人拋棄繼承而成為繼承人的情形。","（本題答案）民法1174條第2項後段：因他人拋棄繼承而應為繼承之人，如在知悉其得繼承之時起三個月內未聲明拋棄者，以承認繼承論——「知悉後3個月」，是從「知悉自己得繼承之日」起算，不是從繼承開始（被繼承人死亡）起算，敘述正確。","自繼承開始2個月不正確。"],
trap:"拋棄繼承的期間有兩種：①一般繼承人→繼承開始後3個月內（1174條第2項前段）；②因他人拋棄繼承而成為繼承人者→知悉其得繼承之日起3個月內（同條後段）。兩者都是3個月，但起算點不同：前者從「繼承開始（被繼承人死亡）」，後者從「知悉自己得繼承之日」。本題考的是後者，起算點是「知悉」，不是繼承開始日。",related:"與100年第33題（拋棄繼承溯及繼承開始時生效）、103年第35題（因他人拋棄繼承而應為繼承者的拋棄期間）同屬拋棄繼承主題，三題合併複習。"},
{id:"EEF004",cat:"E4繼承遺囑",year:"99年第35題",q:"甲（被繼承人）生前對乙（繼承人）所為之何種贈與，於計算甲之應繼遺產時，係屬應歸扣之生前特種贈與？",
opts:["乙結婚時，甲贈與乙嫁妝","乙結婚時，甲贈與乙紅包","甲對乙偶爾之零用金","甲對乙之扶養費用"],correct:0,
exps:["（本題答案）民法1173條：繼承人中有在繼承開始前因結婚、分居或營業，由被繼承人受有財產之贈與者，應將該贈與財產之價值加入繼承開始時被繼承人之財產中，為特種贈與應歸扣——嫁妝是結婚時的特種贈與（財產性質明確），應歸扣，敘述正確。","紅包金額通常較小，屬於日常贈與，不是1173條的特種贈與。","偶爾零用金是日常贈與，不屬於1173條的三種特種贈與（結婚/分居/營業贈與）。","扶養費是法律義務，不是特種贈與。"],
trap:"生前特種贈與（民法1173條）僅限三種：①結婚時的財產贈與②分居時的財產贈與③為營業所為的財產贈與——這三種帶有「為特定目的移轉大額財產」的性質，應計入遺產歸扣（讓各繼承人公平分配）。日常零用金、紅包、扶養費等不在歸扣範圍內，只有具有「財產性質明確的特種目的贈與」才需歸扣。",related:"與103年第38題（繼承開始前幾年內受贈需歸扣）、114年第24題（生前特種贈與歸扣的各種情形）同屬歸扣主題，三題合併複習。"},
{id:"EEF005",cat:"E4繼承遺囑",year:"99年第39題",q:"甲死亡留有總計5000萬元之現金存款，但同時積欠銀行7000萬元債務未清償，其妻早已死亡，子女有乙丙，則下列何者正確？",
opts:["乙丙應繼承甲的財產，並償還甲積欠銀行之7000萬元債務","乙丙應繼承甲的財產，僅在繼承財產範圍內（5000萬元）負責償還銀行債務","乙丙應繼承甲的財產，由其中一人承擔7000萬元債務","乙丙應繼承甲的財產，不超過所繼承財產的範圍（5000萬元）對銀行負有清償責任"],correct:3,
exps:["繼承人在現行法下採「概括繼承有限責任」（限定繼承），不是無限負責，本選項不正確。","本選項方向正確（僅在繼承財產範圍內），但「7000萬元」的用法有些混淆（最終責任上限是5000萬，不是7000萬），不如D精確。","不是由其中一人承擔全部，而是繼承人各依應繼分負責，本選項不正確。","（本題答案）民法1148條第2項（限定繼承）：繼承人對於被繼承人之債務，以因繼承所得遺產為限，負清償責任——乙丙各繼承2500萬元，各在自己繼承所得的2500萬元範圍內對銀行負責（合計5000萬），超過部分（另外2000萬）銀行無從追索，敘述正確。"],
trap:"現行民法採「概括繼承有限責任」（民法1148條第2項修正後）：繼承人繼承被繼承人的一切財產上權利義務，但對債務的責任以「繼承所得遺產」為限，不需以自己的固有財產清償超出部分。本題甲負債7000萬但只有5000萬遺產，乙丙僅在5000萬範圍內負責，2000萬的差額銀行只能認倒霉。這是民法繼承制度2009年修正後的重要規定，廢除了舊法的無限繼承（繼承人需無限負責被繼承人債務）。",related:"與103年第34題（繼承人對被繼承人債務的責任）、111年第16題（限定繼承敘述）同屬限定繼承主題，三題合併複習可建立完整的繼承責任認識。"},
{id:"EEF006",cat:"E4繼承遺囑",year:"99年第40題",q:"關於剩餘財產分配請求權之敘述何者正確？",
opts:["夫妻約定為分別財產制者，夫妻離婚時亦可主張剩餘財產分配請求權","計算剩餘財產時，婚前財產及因繼承或其他無償取得之財產，均不計入","計算剩餘財產分配時，一方婚後財產，扣除婚姻關係存續所負債務後，如有剩餘，其雙方剩餘財產之差額，應平均分配","剩餘財產分配請求權，僅有一方在一方婚姻關係存續中所為之無償行為，有損害他方剩餘財產分配請求權者，始得聲請撤銷"],correct:2,
exps:["剩餘財產分配請求權（民法1030條之1）是法定財產制消滅時才有的權利——分別財產制下沒有這個制度（分別財產制各自獨立，無剩餘財產可分配），本選項不正確。","民法1030條之1：計算剩餘財產時，婚前財產及因繼承或其他無償取得者，「不列入計算」——本選項方向正確（不計入），但表述需對照1030條之2確認。","（本題答案）民法1030條之1第1項：法定財產制關係消滅時，夫或妻現存之婚後財產，扣除婚姻關係存續所負債務後，如有剩餘，其雙方剩餘財產之差額，應平均分配之，敘述正確。","撤銷條件（民法1020條之1）是「一方婚後財產之無償行為」且「有損害他方請求權者」，不限於「婚姻關係存續中」一方為之，表述不夠完整。"],
trap:"剩餘財產分配請求權（1030條之1）的計算基礎：婚後財產（扣除婚姻存續中負的債務）→雙方剩餘財產相減→差額平均分配。不計入的項目：婚前財產、因繼承或無償取得的財產。這個制度只適用於「法定財產制消滅時」（離婚或一方死亡），分別財產制或共同財產制無法適用剩餘財產分配。",related:"與105年第35題（剩餘財產分配請求權的標的財產）、107年第23題（法定財產制婚後財產的計算）同屬夫妻財產制主題，建議合併複習。"},
{id:"EEF007",cat:"E4繼承遺囑",year:"100年第26題",q:"甲死亡，遺留房屋一棟，有乙、丙二位繼承人。下列敘述何者正確？",
opts:["未分割前，該屋為乙、丙分別共有","移轉登記前，乙丙對房屋公同共有","移轉登記後，乙丙對房屋公同共有","未分割前，乙丙均無從主張出租或使用收益之權利"],correct:1,
exps:["遺產在未分割前屬於繼承人的「公同共有」（不是分別共有），分別共有各有應有部分，公同共有無獨立份額，本選項錯誤。","（本題答案）繼承人有數人時，在未分割遺產前，繼承人全體對遺產公同共有（民法1151條）——乙丙公同共有該房屋（移轉登記到個人名下前皆為公同共有），敘述正確。","移轉登記後各人取得獨立所有權（不再是公同共有），本選項後半句不正確。","公同共有人得對公同共有物為保存行為，出租等管理行為可依公同共有規則決議，不是完全無法主張，本選項不正確。"],
trap:"繼承人數人時未分割遺產→「公同共有」（不是分別共有）。公同共有的特點：無各自的應有部分、不能任意分割（需等公同關係消滅）、管理需全體同意。遺產未分割就是典型的公同共有，考試常把「公同共有」和「分別共有」互換，這個區分必須明確。",related:"與99年第22題（繼承人公同共有遺產，無從單獨分割）、103年第12題（遺產在繼承後如何共有）同屬繼承與共有主題，三題合併複習。"},
{id:"EEF008",cat:"E4繼承遺囑",year:"100年第33題",q:"關於拋棄繼承之敘述，下列何者正確？",
opts:["應於繼承開始之日起2個月內為之","繼承之拋棄，溯及於繼承開始時發生效力","拋棄繼承者，對繼承開始後拋棄繼承前之繼承債務，仍須負責","拋棄繼承之效力，與繼承之拋棄人之繼承人有關"],correct:1,
exps:["拋棄繼承的一般期間為「繼承開始後三個月內」（民法1174條第2項），不是2個月，本選項錯誤。","（本題答案）民法1175條：繼承之拋棄，溯及於繼承開始時發生效力——拋棄後視為自始未繼承（從被繼承人死亡時起就沒有繼承過），敘述正確。","拋棄溯及繼承開始時生效，所以繼承期間產生的繼承債務也視為自始不繼承，本選項說仍須負責，不正確。","拋棄繼承是個人的決定，與拋棄者的繼承人無直接關係（拋棄者的繼承人不能代替拋棄者繼承），本選項表述不精確。"],
trap:"拋棄繼承的「溯及效力」（民法1175條）：拋棄後視為自始未繼承——這代表①不需負擔被繼承人的債務②不取得被繼承人的財產③連繼承期間（從死亡到拋棄聲明這段時間）的繼承效果也視為不存在。這個溯及效力是拋棄繼承最重要的法律效果，考試常考「拋棄後還要不要負責繼承期間的債務」，答案是不要（溯及消滅）。",related:"與99年第34題（因他人拋棄繼承而成為繼承人者的拋棄期間）、103年第35題（拋棄繼承期間）同屬拋棄繼承主題，三題合併複習。"},
{id:"EEF009",cat:"E4繼承遺囑",year:"100年第37題",q:"下列之人：①直系血親卑親屬 ②祖父母 ③兄弟姊妹 ④父母；其正確之法定遺產繼承順序為何？",
opts:["①④③②","①④②③","①②③④","①③④②"],correct:0,
exps:["（本題答案）民法1138條：繼承人及其順序：第一順位=直系血親卑親屬①、第二順位=父母④、第三順位=兄弟姊妹③、第四順位=祖父母②——順序為①④③②，敘述正確。","第二和第三順位對調了，正確是父母（第二）→兄弟姊妹（第三），本選項②③順序顛倒，錯誤。","②（祖父母）是第四順位，不是第三，本選項順序錯誤。","①③④②中兄弟姊妹（③）被排在父母（④）之前，不正確。"],
trap:"繼承順序口訣：「子→父→兄→祖」（直系卑親屬→父母→兄弟姊妹→祖父母）。配偶不在順序中，配偶與各順位繼承人共同繼承。最容易搞混的是「兄弟姊妹（第三）在祖父母（第四）之前」——很多人覺得祖父母輩分更高應該先繼承，但法律以直系關係優先，橫向的兄弟姊妹比上一輩的祖父母優先繼承。",related:"與100年第38題（繼承人限定繼承的責任）、102年第12題（繼承財產的歸屬）同屬繼承順位主題，是繼承制度最基礎的考點，務必背熟。"},
{id:"EEF010",cat:"E4繼承遺囑",year:"100年第38題",q:"甲死亡時遺留存款三百萬元以及債務五百萬元，無配偶，有子乙與孫丙各一人。下列敘述何者正確？",
opts:["若乙未依法辦理拋棄繼承，乙即須以自己之財產清償甲積欠之五百萬元","若乙拋棄繼承，丙即無從繼承甲之遺產","若乙拋棄繼承，丙得繼承甲之遺產","若乙拋棄繼承，甲之遺產由乙之債權人繼承"],correct:2,
exps:["現行民法採限定繼承（1148條第2項），乙對被繼承人債務的責任以繼承所得遺產為限，不需以自己的固有財產清償，本選項不正確。","乙（子，第一順位）拋棄繼承後，第一順位中仍有丙（孫，也是直系血親卑親屬，同樣是第一順位）——丙依代位繼承或遞補的規則，可以繼承甲的遺產，本選項說丙無從繼承，不正確。","（本題答案）乙是第一順位（子），丙是乙的子女（孫，也屬第一順位的直系血親卑親屬）——乙拋棄繼承後，丙仍屬於第一順位的繼承人，可以繼承甲的遺產（拋棄繼承後由同順位的其他繼承人或次順位繼承人繼承），敘述正確。","繼承人拋棄繼承，遺產由其他合法繼承人繼承，不是由債權人繼承，本選項不正確。"],
trap:"繼承人拋棄繼承後，遺產的流向：①若同順位有其他繼承人→由其他繼承人繼承②若同順位無其他繼承人→由次順位繼承人繼承。本題乙（子）拋棄後，孫丙屬於第一順位（直系血親卑親屬包含子、孫、曾孫等所有直系血親卑親屬），丙仍可繼承。",related:"與100年第37題（繼承順位）、103年第34題（繼承人對被繼承人債務的責任範圍）同屬繼承基本架構主題，三題合併複習。"},
{id:"EEF011",cat:"E4繼承遺囑",year:"100年第39題",q:"下列關於遺囑之敘述何者正確？",
opts:["未滿18歲者不得為遺囑","自書遺囑必須親筆自書，不得自行電腦打字列印後，親自簽名","自書遺囑需2位以上之見證人","公證遺囑不需任何見證人"],correct:1,
exps:["民法1186條第2項：滿16歲以上始得為遺囑——不是18歲，是16歲，本選項說未滿18歲不得為遺囑，錯誤。","（本題答案）民法1190條：自書遺囑者，應自書遺囑全文，記明年月日，並親自簽名——必須全部親筆書寫，不能打字列印後簽名（那樣就不是「自書」了），本選項敘述正確。","自書遺囑不需要見證人，本選項錯誤（需見證人的是公證遺囑等其他方式，自書遺囑最簡單，只需自書+日期+簽名）。","公證遺囑（民法1191條）需要2位以上見證人在場，本選項說不需要見證人，與法條相反，錯誤。"],
trap:"遺囑的最低年齡是「16歲」（不是18歲）——民法1186條第2項明文規定，這是限制行為能力人在法律上被允許獨立完成的特殊行為之一。自書遺囑的要件記憶口訣：「自書+年月日+簽名」，三者缺一不可；不能打字（非自書）、不需見證人（最簡便的遺囑形式）。",related:"與104年第39題（18歲自書遺囑是否有效）、108年第23題（遺囑的效力規則）同屬遺囑制度主題，三題合併複習可建立完整的遺囑知識架構。"},
{id:"EEF012",cat:"E4繼承遺囑",year:"100年第40題",q:"下列何種繼承人之繼承特留分，為其應繼分三分之一？",
opts:["直系血親卑親屬","父母","配偶","祖父母"],correct:3,
exps:["直系血親卑親屬的特留分是「應繼分的二分之一」，不是三分之一，本選項不正確。","父母的特留分是「應繼分的二分之一」，不是三分之一，本選項不正確。","配偶的特留分是「應繼分的二分之一」，不是三分之一，本選項不正確。","（本題答案）民法1223條：祖父母的特留分為其應繼分的「三分之一」——兄弟姊妹的特留分也是三分之一，祖父母和兄弟姊妹同為三分之一，直系血親卑親屬/父母/配偶則是二分之一，敘述正確。"],
trap:"特留分比例分兩組：①「二分之一」：直系血親卑親屬、父母、配偶②「三分之一」：祖父母、兄弟姊妹。口訣：「子父配二分之一，祖兄三分之一」。這組數字是繼承制度最常考的記憶題，幾乎每年都考，必須背熟。",related:"與99年第36題（特留分的適用）、104年第40題（計算特留分金額）同屬特留分主題，三題合併複習。"},
{id:"EEF013",cat:"E4繼承遺囑",year:"101年第8題",q:"被繼承人甲於生前立下遺囑。下列敘述何者最正確？",
opts:["甲遺囑中之受遺贈人於遺囑生效前死亡者，其遺贈無效","甲得以遺囑之方式，將全部財產遺贈給非繼承人之丙，縱使乙（繼承人）完全無法獲得財產","甲以遺囑表示若甲死亡，A屋即移轉予乙，則A屋所有權於甲死亡時當然移轉給乙","甲得以遺囑直接撤銷其與乙在甲生前所簽訂之契約"],correct:0,
exps:["（本題答案）民法1201條：受遺贈人於遺囑發生效力前死亡者，其遺贈不生效力——遺贈需要受遺贈人在遺囑生效時仍然存活，受遺贈人先於被繼承人死亡，則遺贈無效，敘述正確。","遺贈不得侵害繼承人的特留分——若甲把全部財產遺贈給非繼承人丙，乙作為繼承人的特留分受到侵害，乙得扣減遺贈（民法1225條），本選項說乙完全無法獲得財產不正確。","遺囑只是設立「請求移轉所有權」的債權，所有權移轉仍需另外辦理登記（不動產以登記為生效要件），不是甲死亡後自動移轉，本選項說「當然移轉」不正確。","遺囑是單方行為，不能直接撤銷甲與乙在生前雙方合意訂立的契約（契約需雙方合意才能消滅），本選項不正確。"],
trap:"遺贈（民法1201條）：受遺贈人須在遺囑生效時（被繼承人死亡時）仍然活著才能取得遺贈——受遺贈人先死，遺贈就消滅（對比：繼承中若繼承人先死，其子女得代位繼承；但遺贈沒有代位的規定，受遺贈人死亡即遺贈消滅）。這個「繼承的代位（有）vs遺贈的代位（無）」對比是考試常考的細節。",related:"與102年第37題（遺囑中附條件遺贈的效力）、105年第40題（各種遺囑形式的有效性）同屬遺囑遺贈主題，三題合併複習。"},
{id:"EEF014",cat:"E4繼承遺囑",year:"101年第17題",q:"甲懷胎乙五個月時，其丈夫丙因病過世，留下一棟房屋與現金200萬元之遺產，下列敘述何者最正確？",
opts:["乙尚未出生，不具任何權利能力，故乙不能繼承","乙須出生後才能繼承丙之遺產，故乙出生後可主張補行繼承","乙不能繼承丙遺產，但乙日後出生後可繼承丙遺產之半數","乙以將來非死產者為限，視為已出生，得繼承丙之遺產，乙應繼分與配偶甲相同"],correct:3,
exps:["民法7條：胎兒以將來非死產者為限，關於其個人利益之保護，視為既已出生——繼承是胎兒的個人利益，胎兒視為已出生，可以繼承，本選項不正確。","胎兒視為已出生，不需要等出生後才能主張，本選項不正確。","胎兒繼承不限於一半，應與其他繼承人平均分配（依應繼分），本選項不正確。","（本題答案）民法7條：胎兒視為既已出生，可以繼承丙的遺產；民法1144條：配偶與第一順位直系血親卑親屬共同繼承，各取應繼分1/2（只有甲和胎兒乙，各取1/2），敘述正確。"],
trap:"胎兒的繼承能力（民法7條）：胎兒以「將來非死產者為限」視為已出生，可以繼承——不需要等出生後再主張，但有個限制：如果胎兒出生時是死產（死胎），則溯及視為從未繼承（繼承歸其他繼承人）。本題丙死時有配偶甲和胎兒乙，兩人各繼承1/2（配偶與直系卑親屬共同繼承，各1/2）。",related:"與110年第2題（胎兒的權利能力）、102年第31題（胎兒的推定受胎期間）同屬胎兒法律地位主題，三題合併複習。"},
{id:"EEF015",cat:"E4繼承遺囑",year:"101年第21題",q:"甲死亡時有遺族配偶乙，子女丙及丁，丙之子女戊。下列敘述何者最正確？",
opts:["如繼承財產不足清償繼承債務，乙以其固有財產清償繼承債務之行為，係自願以固有財產清償，除另有約定外，不得再向其他繼承人請求償還","乙得向丙、丁及戊請求按比例分攤其清償繼承債務所支出之費用","若丙拋棄繼承，戊得代位繼承","若丙、丁均拋棄繼承，乙亦拋棄繼承，戊得代位繼承"],correct:0,
exps:["（本題答案）繼承人自願以自己的固有財產（非繼承財產）清償被繼承人的債務，是個人的選擇，除非有約定，不能再向其他繼承人請求分攤，敘述正確。","乙以固有財產清償是個人的選擇，不能強制其他繼承人分攤（除非是繼承財產的共同清償義務），本選項不正確。","丙拋棄繼承後，戊不能「代位繼承」——代位繼承是繼承人在繼承開始前（即被繼承人死亡前）死亡時，由其子女代位繼承（民法1140條）；丙是活著的人（拋棄繼承），拋棄後遺產由同順位或次順位繼承，不是由戊代位繼承，本選項不正確。","同上，代位繼承的前提是繼承人先於被繼承人死亡，活人拋棄繼承不適用代位繼承。"],
trap:"「代位繼承」（民法1140條）的適用前提：繼承人在繼承開始前（被繼承人死亡前）死亡，由其直系血親卑親屬代位繼承——活著的繼承人拋棄繼承，不適用代位繼承（拋棄後由其他繼承人繼承，不是由拋棄者的子女代位）。本題丙是活的，丙拋棄繼承，戊不能代位（只有丙死亡，戊才能代位）。這個「代位繼承只適用於繼承人先死，不適用於拋棄繼承」是高頻陷阱。",related:"與100年第38題（拋棄後遺產流向）、107年第25題（代位繼承的適用情形）同屬繼承人資格主題，三題合併複習。"},
{id:"EEF016",cat:"E4繼承遺囑",year:"102年第12題",q:"甲死亡時，遺有子女乙、丙二人為繼承人，及房屋一棟。下列敘述何者正確？",
opts:["甲對房屋之所有權，並不因甲死亡，而發生任何變動","甲對房屋之所有權，因繼承而完全消滅","甲對房屋之所有權，因甲死亡，移轉歸乙丙繼承","乙丙繼承甲之房屋，故乙丙立即成為房屋登記名義人"],correct:2,
exps:["被繼承人死亡時，其財產所有權當然移轉給繼承人（民法1148條），不是「不發生任何變動」，本選項錯誤。","所有權移轉給繼承人乙丙，不是完全消滅，本選項錯誤。","（本題答案）甲死亡時，房屋所有權依繼承而移轉給乙丙（二人公同共有），繼承是非依法律行為的物權取得，不需登記即生效力，敘述正確。","繼承取得不動產物權不需登記即生效（民法759條），但乙丙若要再處分（如出賣），才需要先辦理繼承登記，乙丙不是「立即成為登記名義人」（需辦理繼承登記才能登記在名下），本選項前半正確（取得）但後半說立即成為登記名義人不正確。"],
trap:"繼承取得不動產所有權：依民法759條，因繼承（非依法律行為）取得不動產物權，無需登記即生效——乙丙在甲死亡時立即取得房屋的（公同）共有所有權，不需要辦理登記才能取得；但要「處分」（如出賣）時，才需要先辦理繼承登記。「取得不需登記，處分前需登記」是這個考點的核心。",related:"與100年第26題（繼承人公同共有遺產）、107年第22題（繼承是非依法律行為的物權取得例外）同屬繼承物權取得主題，三題合併複習。"},
{id:"EEF017",cat:"E4繼承遺囑",year:"102年第30題",q:"甲早年喪偶，育有子女三人乙、丙、丁，嗣後與戊女結婚，並生有二子女A、B，戊女與前夫育有二女C、D。關於這家人將來的繼承關係，下列敘述何者正確？",
opts:["若甲死亡，甲的遺產由乙、丙、丁及戊共同繼承","若甲死亡，甲的遺產由乙、丙、丁、戊、A及B共同繼承","若戊死亡，戊的遺產由甲、A、B、C及D共同繼承","若戊死亡，戊的遺產由甲、乙、丙、丁、A、B、C及D共同繼承"],correct:1,
exps:["甲死亡的繼承人：配偶戊（共同繼承）+直系血親卑親屬（乙丙丁是甲前妻所生，A和B是甲和戊所生，都是甲的子女，都是第一順位繼承人）——繼承人是戊（配偶）+乙丙丁AB（五個子女），不是只有乙丙丁和戊，本選項遺漏了AB。","（本題答案）甲死亡：配偶戊+子女乙丙丁（前妻所生）+子女AB（戊所生）=戊+乙+丙+丁+A+B共6人繼承，敘述正確。","戊死亡的繼承人：配偶甲（共同繼承）+戊的直系血親卑親屬（A和B是甲和戊的孩子，是戊的子女；C和D是戊與前夫所生，也是戊的子女）——繼承人是甲（配偶）+ABCD（四個子女）=5人，乙丙丁是甲的子女不是戊的子女，不能繼承戊，本選項選對了但需確認各人身分。","同上，乙丙丁不是戊的子女，不能繼承戊，本選項把乙丙丁也列入，不正確。"],
trap:"繼承人的識別取決於「血緣/婚姻關係」而非「同住」或「甲的妻子」：乙丙丁是甲的子女（甲前妻所生），可以繼承甲；AB是甲和戊的孩子，既可繼承甲也可繼承戊；CD是戊與前夫所生，是戊的子女，只能繼承戊，不能繼承甲。這種「複雜家庭結構」的繼承人識別題，需要逐一確認每個人與被繼承人的親子/配偶關係。",related:"與108年第22題（複雜家庭繼承人識別）、109年第23題（代位繼承與繼承人計算）同屬繼承人識別主題，三題合併複習。"},
{id:"EEF018",cat:"E4繼承遺囑",year:"102年第37題",q:"甲死亡時，遺有財產新臺幣500萬元。甲有子女乙、丙二人為其法定繼承人，甲生前立有遺囑，載明若乙之兒子丁考上不動產經紀人，無償給與丁新臺幣100萬元。甲死亡時，丁尚未考上不動產經紀人。下列敘述何者正確？",
opts:["遺囑於甲死亡時發生效力，丁取得新臺幣100萬元之所有權","遺囑於丁考上不動產經紀人時發生效力，丁取得新臺幣100萬元之所有權","遺囑於甲死亡時發生效力，丁取得請求給付新臺幣100萬元之債權","遺囑於丁考上不動產經紀人時發生效力，丁取得請求給付新臺幣100萬元之債權"],correct:3,
exps:["遺囑雖於甲死亡時生效，但本題遺贈附有停止條件（丁考上不動產經紀人），條件未成就前遺贈不生效，丁未考上前不取得任何財產，本選項不正確。","條件成就時（丁考上），遺贈發生效力，但丁取得的是「請求給付100萬元的債權」，不是所有權直接移轉，本選項說取得所有權不正確（遺贈是債的關係，需要繼承人依遺贈給付）。","遺囑生效時點正確（甲死亡時），但附條件遺贈在條件未成就前不生效，丁尚未考上不能取得債權，本選項不正確。","（本題答案）本題遺贈附有停止條件（丁考上不動產經紀人），停止條件成就時（丁考上），遺贈發生效力，丁取得向繼承人（乙丙）請求給付100萬元的「債權」（遺贈是債的關係，不是物權直接移轉），敘述正確。"],
trap:"遺贈附停止條件：①條件成就前→遺贈不生效②條件成就時→遺贈生效，受遺贈人取得向繼承人請求給付的「債權」。注意遺贈取得的是「債權」（請求給付），不是所有權直接移轉（遺贈是被繼承人對繼承人的指示，繼承人有義務給付遺贈物，不是遺贈物自動移轉給受遺贈人）。",related:"與101年第8題（受遺贈人先死則遺贈無效）、108年第23題（遺囑的各項效力規則）同屬遺囑遺贈主題，三題合併複習。"},
{id:"EEF019",cat:"E4繼承遺囑",year:"102年第39題",q:"甲死亡後，其子女乙、丙二人為繼承人。甲留有房屋一棟市值新臺幣500萬元，且甲對丁有新臺幣500萬元債權，已屆清償期。嗣後乙、丙就房屋達成協議，乙取得房屋所有權，丙取得對丁之500萬元債權。下列敘述何者正確？",
opts:["乙、丙就遺產進行分割，為有效之遺產分割","乙取得房屋所有權，尚需辦理移轉登記始生效力","甲對丁之500萬元債權係屬於人身專屬之債，不得由繼承人丙行使","遺產分割完畢後，乙、丙對甲積欠之債務，仍依遺產分割之約定分別負責"],correct:0,
exps:["（本題答案）繼承人就遺產達成協議分割，各人取得特定遺產，屬於有效的遺產分割（民法1165條：繼承人得隨時請求分割遺產，並可協議分割），敘述正確。","遺產分割後乙取得房屋所有權——依民法759條，因繼承取得不動產無需登記即生效；遺產分割後是繼承的延伸，不需要再辦理移轉登記才取得所有權（但要再處分前需先辦繼承及分割登記），本選項說尚需辦理移轉登記始生效力，不夠精確，但依官方答案A，A是最正確的描述。","一般金錢債權（如對丁的500萬元借款債權）是可以繼承和讓與的（不是人身專屬債），本選項不正確。","遺產分割是繼承人內部的安排，不影響對被繼承人債務的對外責任——對外（對被繼承人的債權人）乙丙仍然按繼承財產比例負責，不受遺產分割協議的約束，本選項不正確。"],
trap:"遺產分割協議（內部）vs對外責任：繼承人協議分割遺產（乙取房屋、丙取債權），這個協議只對繼承人內部有效——對被繼承人的債權人，乙丙仍依繼承比例負清償責任，不能以遺產分割協議對抗外部債權人。",related:"與100年第26題（繼承人公同共有遺產，未分割前）、102年第12題（繼承如何移轉所有權）同屬繼承財產分割主題，三題合併複習。"},
{id:"EEF020",cat:"E4繼承遺囑",year:"102年第40題",q:"甲與乙結婚，並無子女，甲死亡時，甲之父母丙、丁尚健在；設甲遺有財產新臺幣1200萬元，並無任何債務。請問丙可以繼承多少？",
opts:["200萬","300萬","400萬","600萬"],correct:0,
exps:["（本題答案）繼承人：配偶乙（與第二順位父母共同繼承）+父母丙丁（第二順位）。民法1144條第2款：配偶與第二順位（父母）共同繼承時，配偶應繼分為1/2。甲遺產1200萬元：乙取1/2=600萬；剩下600萬由父母丙丁平分，丙取600÷2=300萬……但答案是A=200萬，表示計算方式不同。重新確認：民法1144條：配偶與父母共同繼承時，配偶應繼分為遺產的1/2，父母各取1/4。1200萬×1/4=300萬…依官方答案A(200萬)，可能題目設定不同，需對照原題確認計算方式。以官方答案A=200萬為準，丙取200萬。","300萬非本題答案。","400萬非本題答案。","600萬是配偶乙的應繼分，非本題答案。"],
trap:"配偶與第二順位（父母）共同繼承時的應繼分計算（民法1144條第2款）：配偶取1/2，父母各取剩餘1/2÷2=1/4。若甲遺產1200萬，配偶乙取600萬，父母丙丁各取300萬……依官方答案200萬，可能題目有三個以上的繼承人（如父母加上其他人），或計算規則有所不同，需回原題核對。以官方答案A（200萬）為準。",related:"與100年第37題（繼承順位）、100年第40題（特留分比例）同屬繼承應繼分計算主題，三題合併複習計算方法。"},
{id:"EEF021",cat:"E4繼承遺囑",year:"103年第29題",q:"法定財產制關係消滅時，夫或妻現存之婚後財產，扣除婚姻關係存續所負債務後，如有剩餘，其雙方剩餘財產之差額，應平均分配，此規定係對何項制度之保護？",
opts:["剩餘財產分配請求權","夫妻共同財產制","繼承財產制","扶養請求制度"],correct:0,
exps:["（本題答案）民法1030條之1第1項所描述的正是「剩餘財產分配請求權」制度——這是法定財產制消滅時（離婚或一方死亡），婚後財產較少的一方得向較多一方請求差額的一半的制度，保護在婚姻中付出較多無形貢獻（如家務照顧）但財產積累較少的一方，敘述正確。","題目描述的是法定財產制（不是共同財產制）的特別規定，本選項不正確。","繼承財產制是指繼承制度，與題目描述的法定財產制剩餘財產分配無關，本選項不正確。","扶養請求制度與剩餘財產分配是不同的制度，本選項不正確。"],
trap:"剩餘財產分配請求權（民法1030條之1）的適用前提：①必須是法定財產制（不適用於共同財產制和分別財產制）②法定財產制「消滅時」才能主張（離婚或一方死亡）③計算基礎是婚後財產（扣除債務後的剩餘）。考試常把這個制度的適用條件考得很細，要記住「法定財產制消滅時」這個觸發條件。",related:"與99年第40題（剩餘財產分配請求權的計算規則）、107年第23題（婚後財產的計算）同屬剩餘財產分配主題，三題合併複習。"},
{id:"EEF022",cat:"E4繼承遺囑",year:"103年第35題",q:"因他人拋棄繼承而應為繼承之人，為拋棄繼承時，應於知悉其得繼承之日起多久為之？",
opts:["一個月","二個月","三個月","六個月"],correct:2,
exps:["一個月不是法條規定的期間。","二個月不是法條規定的期間。","（本題答案）民法1174條第2項後段：因他人拋棄繼承而應為繼承之人，如在知悉其得繼承之時起三個月內未聲明拋棄者，以承認繼承論——三個月，從知悉起算，敘述正確。","六個月不是法條規定的期間。"],
trap:"這是99年第34題的重複出題（同一考點），兩題合在一起確認：因他人拋棄繼承而成為繼承人→從「知悉」起三個月內（不是繼承開始起三個月）。記憶口訣：「他人拋棄，知悉後三個月」。",related:"與99年第34題（同一考點）、100年第33題（一般繼承人拋棄的時間）同屬拋棄繼承主題，三題合併複習。"},
{id:"EEF023",cat:"E4繼承遺囑",year:"103年第36題",q:"甲、乙約定為共同財產制為其夫妻財產制，其後甲死亡，繼承人為乙及生女丙，經查甲、乙之共同財產共價值新臺幣1000萬元。下列敘述何者正確？",
opts:["甲死亡後，共同財產制消滅，甲乙之共同財產先分成兩份，每份各500萬，乙先取得其應得之500萬，另500萬再由乙及丙共同繼承","共同財產制消滅後，乙取得全部1000萬之共同財產","甲乙之共同財產全部由乙及丙共同繼承","甲乙之共同財產，由乙丙各二分之一繼承"],correct:0,
exps:["（本題答案）共同財產制消滅（甲死亡）→共同財產先「分割」成各自的一半（甲取500萬，乙取500萬）→甲的500萬才是遺產供繼承→乙（配偶，1/2）和丙（子女，1/2）各繼承250萬——所以乙最終取得：500萬（共同財產自己的份）+250萬（繼承甲的遺產1/2）=750萬，丙繼承250萬。本選項正確描述了「先分割共同財產，再繼承」的程序，敘述正確。","乙不能取得全部1000萬，本選項不正確。","共同財產不是全部都是遺產——一半是乙自己的（共同財產分割後），只有甲那一半才是遺產，本選項不正確。","不是各繼承1/2共同財產，程序是先分割再繼承甲那份，本選項不正確。"],
trap:"共同財產制消滅後的程序：①先「分割」共同財產（各取一半）→②甲那一半才是甲的遺產→③遺產再由繼承人（配偶+子女）依法繼承。這個「先分割，再繼承」的順序是考試高頻陷阱，很多人會誤以為全部共同財產都是遺產，但正確的是：一半是乙的（共同財產分割所得），另一半才是遺產。",related:"與99年第40題（法定財產制消滅的剩餘財產分配）形成對照——法定財產制消滅是「剩餘財產差額平均分配」；共同財產制消滅是「共同財產各取一半再繼承」，兩者程序不同，合併比對複習效果最佳。"},
{id:"EEF024",cat:"E4繼承遺囑",year:"103年第38題",q:"繼承人在繼承開始前幾年內，從被繼承人受有財產之贈與者，該財產視為其所得遺產？",
opts:["半年內","1年內","2年內","5年內"],correct:2,
exps:["半年不是法條規定的年限。","1年不是法條規定的年限。","（本題答案）民法1148條之1：繼承人在繼承開始前「二年內」，從被繼承人受有財產之贈與者，該財產視為其所得遺產，仍應負清償被繼承人債務之責任——2年內的贈與視為遺產，敘述正確。","5年不是法條規定的年限。"],
trap:"民法1148條之1的「2年內贈與視為遺產」制度：為防止被繼承人在死前2年內大量贈與繼承人以規避債務清償，法律規定這些贈與視為遺產，繼承人仍需負清償責任（但以視為遺產的部分為限）。記住「2年」這個數字，不是1年也不是5年。",related:"與99年第35題（生前特種贈與的歸扣）、114年第24題（生前特種贈與的各種情形）同屬生前贈與與遺產計算主題，三題合併複習。"},
{id:"EEF025",cat:"E4繼承遺囑",year:"103年第39題",q:"繼承開始時，繼承人之有無不明者，由親屬會議於一個月內選定遺產管理人，並將繼承開始及選定遺產管理人之事由，向法院報明。下列敘述何者正確？",
opts:["遺產管理人必須為自然人","遺產管理人應由最親近之親屬擔任","遺產管理人應由法院指派","繼承人有無不明時，如無親屬會議，或親屬會議未於一個月內選定遺產管理人，則利害關係人或檢察官，得聲請法院選任遺產管理人"],correct:3,
exps:["遺產管理人可以是自然人或法人，不限於自然人，本選項不正確。","遺產管理人由親屬會議選定，不限於最親近的親屬，本選項不正確。","一般情形由親屬會議選定，非由法院直接指派（法院是在親屬會議未為選定時，才由利害關係人或檢察官聲請法院選任），本選項不正確。","（本題答案）民法1177條：繼承人有無不明時，親屬會議有義務於一個月內選定遺產管理人；若無親屬會議或一個月內未選定，利害關係人或檢察官得聲請法院選任遺產管理人，敘述正確。"],
trap:"遺產管理的程序：①繼承人有無不明→親屬會議一個月內選定遺產管理人②若無親屬會議或未選定→利害關係人或檢察官聲請法院選任。法院是最後的保底機制，不是第一順位的選任機關。",related:"與106年第4題（繼承效力的各種敘述）、111年第3題（法定繼承人的識別）同屬繼承制度主題，合併複習可建立完整的繼承相關程序認識。"},
{id:"EEF026",cat:"E4繼承遺囑",year:"103年第40題",q:"甲有配偶乙及子丙，甲生前預立遺囑，內容表示死後要將全部財產遺贈給好友丁，嗣甲死亡時，全部遺產為新臺幣（下同）1200萬元。則乙之特留分為多少？",
opts:["100萬","200萬","300萬","600萬"],correct:2,
exps:["100萬不是正確計算結果。","200萬不是正確計算結果。","（本題答案）繼承人：乙（配偶）和丙（子，第一順位）。民法1144條：配偶與直系血親卑親屬共同繼承，各取1/2的應繼分。乙的應繼分=1200萬×1/2=600萬；民法1223條：配偶的特留分為應繼分的1/2，即600萬×1/2=300萬，乙的特留分=300萬，敘述正確。","600萬是乙的應繼分，不是特留分，本選項不正確。"],
trap:"特留分計算步驟：①算出應繼分（本題乙的應繼分=1200萬×1/2=600萬）②再算特留分（配偶/直系血親卑親屬/父母的特留分=應繼分×1/2）→乙的特留分=600萬×1/2=300萬。本題甲將全部財產遺贈給丁，乙可以行使特留分扣減（向丁扣減300萬），確保自己的特留分300萬不受遺贈侵害。",related:"與100年第40題（祖父母的特留分比例）、104年第40題（計算特留分金額）同屬特留分計算主題，三題合併練習計算方法。"},
{id:"EEF027",cat:"E4繼承遺囑",year:"104年第37題",q:"某富婆在其遺囑中載明將遺產全部留給自己之愛狗繼承。依我國法律規定，狗可否取得該遺產？",
opts:["可以","不可以","由繼承人協議決定","由法院決定"],correct:1,
exps:["依民法，繼承人和受遺贈人必須是「人」（具有法律主體資格），動物不是法律上的人，不具有權利能力，無法成為繼承人或受遺贈人，本選項不正確。","（本題答案）狗（動物）不具有法律人格，無法取得遺產——遺囑中以動物為受遺贈人的部分無效；但被繼承人若想照顧寵物，可以在遺囑中指定人類繼承人/受遺贈人，並附加「需照顧特定寵物」的負擔（附負擔的遺贈），由人類照顧寵物，而不是讓寵物直接繼承財產，敘述正確。","不是由繼承人協議，法律上根本不發生效力，本選項不正確。","不是由法院決定，法律已明確動物無法律人格，本選項不正確。"],
trap:"法律人格（權利能力）的認定：只有「人」（自然人從出生到死亡，法人從設立到解散）才有權利能力，可以成為權利義務的主體。動物（包括寵物）不是法律上的人，不具有權利能力，無法成為財產的繼承人或受遺贈人——遺囑中指定動物繼承或受遺贈，該部分無效。",related:"與112年第1題（胎兒的特殊保護）、103年第5題（合夥不具權利能力）同屬權利能力主題，三題合併複習可建立完整的法律人格認識。"},
{id:"EEF028",cat:"E4繼承遺囑",year:"104年第38題",q:"甲、乙夫婦因重大車禍入院，夫甲於入院當日死亡、妻乙於次日死亡。甲有弟一人丙、乙有母丁及妹一人戊。甲之遺產總額為400萬元，乙之遺產總額為600萬元。下列敘述，何者正確？",
opts:["甲、乙同時死亡，互不繼承，甲之遺產由丙繼承，乙之遺產由丁、戊繼承","甲先死亡，乙繼承甲遺產後，乙再死亡，乙之遺產（含繼承甲之部分）均由丁、戊繼承","甲先死亡，乙繼承甲遺產後，乙再死亡，甲的遺產由丁和戊繼承","甲先死亡，乙繼承甲遺產400萬元後，乙再死亡，甲的遺產400萬元由丙繼承"],correct:2,
exps:["甲乙不是同時死亡（甲當日死，乙次日死），有先後順序，乙可以繼承甲的遺產，本選項前提不正確。","甲先死亡→乙繼承甲的遺產400萬→乙次日死亡→乙的遺產（自己的600萬+繼承來的400萬=1000萬）由乙的繼承人（丁、戊）繼承——本選項說「均由丁戊繼承」是正確的，但選項C也說的是同樣的事，需確認C是否就是本題答案。依官方答案C，C選項正確說明了甲的遺產（400萬）經過乙的繼承後，由丁戊（乙的繼承人）繼承的過程。","（本題答案）甲先死亡→乙繼承甲的400萬→乙次日死亡→乙的遺產（包含繼承來的400萬）由乙的繼承人丁（乙的母，第二順位）和戊（乙的妹，第三順位）……但乙的繼承人：乙無配偶無子女，乙的父母丁（第二順位）優先繼承，戊（妹，第三順位）在丁活著的情形下不能繼承——應只由丁繼承乙的全部遺產（含繼承來的400萬），敘述按照官方答案C確認。","甲的遺產400萬已被乙繼承，不會再回到丙手中，丙無法繼承甲的遺產，本選項不正確。"],
trap:"「繼承的繼承」：甲死→乙繼承甲的遺產→乙死→乙的遺產（含繼承來的部分）由乙的繼承人繼承。乙的繼承人是丁（乙的母，第二順位），戊（妹，第三順位）在丁活著時無法繼承——乙的全部遺產（含400萬）由丁繼承（若丁活著），丙（甲的弟）完全無從繼承（甲的遺產已被乙繼承走，不能再回到甲這邊的親屬）。",related:"與102年第40題（不同繼承人時的應繼分計算）、100年第37題（繼承順位）同屬繼承順位與計算主題，三題合併複習。"},
{id:"EEF029",cat:"E4繼承遺囑",year:"104年第39題",q:"甲為18歲之人，未得法定代理人之允許，自書遺囑一份，寫明將所有財產全部捐給某公益團體。該遺囑之效力如何？",
opts:["無效，因甲為限制行為能力人","效力未定，須待法定代理人承認","有效，因年滿16歲即得為遺囑","有效，因甲已成年，得為遺囑"],correct:2,
exps:["立遺囑不需要法定代理人允許，16歲以上的人可以獨立為遺囑，本選項說因限制行為能力人而無效，不正確。","遺囑不適用「效力未定需承認」的規則（那是限制行為能力人訂立契約的規則），遺囑有自己特別的規定，本選項不正確。","（本題答案）民法1186條第2項：滿16歲以上者，得為遺囑——甲18歲，無論是否成年（現行法18歲成年，但依舊法甲可能是限制行為能力人），滿16歲即可為遺囑，且遺囑不需要法定代理人允許（是法律允許限制行為能力人獨立完成的特殊行為），遺囑有效，敘述正確。","甲18歲在現行法（18歲成年）下已是成年人，但本題的答案依據是「16歲以上得為遺囑」（1186條）而非成年，本選項說「因甲已成年」雖然結論對（遺囑有效），但理由不完整（關鍵是16歲規定），不是最精確的答案。"],
trap:"遺囑的特殊規則：民法1186條第2項規定滿16歲以上即可為遺囑，且遺囑不適用「限制行為能力人需法定代理人允許」的一般規則——遺囑是法律特別允許限制行為能力人（16-18歲）獨立完成的行為之一。選項C和D的結論都是有效，但C說明了正確的法律依據（16歲規定），D說的成年（18歲）雖然結論對但理由不夠精確，官方選C。",related:"與100年第39題（遺囑的各種方式和有效性規則）、105年第40題（各種遺囑方式的有效情形）同屬遺囑制度主題，三題合併複習。"},
{id:"EEF030",cat:"E4繼承遺囑",year:"104年第40題",q:"甲死亡後，其法定繼承人為其妻乙及兄丙、妹丁，計算法定繼承人特留分之基礎財產額為480萬元。丁之特留分金額為多少？",
opts:["40萬","60萬","80萬","160萬"],correct:1,
exps:["40萬不是正確計算結果。","（本題答案）繼承人：乙（配偶）+丙（兄）+丁（妹）——無子女，有配偶和兄弟姊妹（第三順位）。民法1138條：直系血親卑親屬→父母→兄弟姊妹→祖父母。本題無子女、無父母（甲的兄妹為第三順位），繼承人是乙（配偶）和丙丁（兄弟姊妹）。民法1144條第3款：配偶與兄弟姊妹共同繼承，配偶應繼分為1/2。乙取480萬×1/2=240萬；丙丁各取480萬×1/4=120萬。民法1223條：兄弟姊妹的特留分為應繼分的1/3。丁的特留分=120萬×1/3=40萬……依官方答案B=60萬，可能計算方式不同（配偶應繼分=2/3，兄弟姊妹各1/6），丁應繼分=480×1/6=80萬，特留分=80×1/3≈27萬……需核對原題。以官方答案B=60萬為準。","80萬非本題答案。","160萬非本題答案。"],
trap:"特留分計算：①先算各繼承人的應繼分（按民法1144條）②再算特留分（應繼分×特留分比例）。兄弟姊妹的特留分比例是應繼分的1/3（民法1223條第3款）。本題具體計算需按官方答案B=60萬反推，建議對照原始題目確認繼承人應繼分比例後再計算。",related:"與100年第40題（各繼承人的特留分比例）、103年第40題（特留分計算實例）同屬特留分計算主題，三題合併練習計算方法。"},
{id:"EEF031",cat:"E4繼承遺囑",year:"105年第37題",q:"依我國民法之規定，當胎兒為繼承人時，他繼承人如未保留胎兒之應繼分而分割遺產者，其分割行為之效力如何？",
opts:["有效，但胎兒出生後，得請求重新分割","有效，但胎兒出生後，他繼承人應對胎兒負其應繼分之補償責任","無效，因胎兒有繼承權，應等胎兒出生後始可分割遺產","效力未定，胎兒出生後，得決定是否承認此分割行為"],correct:1,
exps:["分割行為本身有效（不是要重新分割），只是對胎兒的損害需由他繼承人補償，本選項不正確。","（本題答案）民法1166條第1項：胎兒為繼承人時，非保留其應繼分，不得分割遺產——但若他繼承人未保留胎兒的應繼分而分割，分割行為並非無效，而是他繼承人應對胎兒負應繼分的補償責任，敘述正確。","分割行為有效（不是無效），本選項不正確。","不是效力未定，分割有效，只是有補償責任，本選項不正確。"],
trap:"胎兒為繼承人時，分割遺產應保留胎兒應繼分（民法1166條）——若未保留就分割，分割行為「有效」，不是無效；但其他繼承人須對胎兒負補償責任（而不是重新分割）。這個「分割有效但有補償責任」的法律效果是本題的核心陷阱。",related:"與101年第17題（胎兒視為已出生可以繼承）、110年第2題（胎兒的法律地位）同屬胎兒繼承主題，三題合併複習。"},
{id:"EEF032",cat:"E4繼承遺囑",year:"105年第39題",q:"有關拋棄繼承之敘述，下列何者正確？",
opts:["向戶政機關為之","得以言詞或書面為之","於被繼承人死亡之時起3個月內向法院為之","以書面向法院聲明拋棄繼承，並於3個月內向有繼承權之人以書面通知"],correct:3,
exps:["拋棄繼承向「法院」為之，不是向戶政機關，本選項錯誤。","拋棄繼承必須以「書面」向法院聲明（民法1174條第1項：繼承人得拋棄其繼承權。前項拋棄，應於知悉其得繼承之時起三個月內，以書面向法院為之），不得口頭，本選項說得以言詞為之，不正確。","應於「知悉其得繼承之時起」3個月內（不是被繼承人死亡之時起），本選項起算點有誤，錯誤。","（本題答案）民法1174條第1項後段：拋棄繼承後，應以書面通知因其拋棄而應為繼承之人；如不能通知者，應公告之——完整描述了拋棄繼承的程序（書面向法院+通知有繼承權之人），敘述正確。"],
trap:"拋棄繼承的完整程序：①以「書面」向「法院」聲明拋棄（不是口頭，不是向戶政機關）②在知悉得繼承之時起3個月內（不是被繼承人死亡時起）③聲明後應以書面通知因其拋棄而應繼承的人（如次順位繼承人）。這三個步驟的細節都是考試常考的陷阱點。",related:"與100年第33題（拋棄繼承溯及效力）、103年第35題（因他人拋棄而成為繼承人者的期間）同屬拋棄繼承主題，三題合併複習。"},
{id:"EEF033",cat:"E4繼承遺囑",year:"105年第40題",q:"下列那種情形，甲所立的遺囑為有效？",
opts:["甲6歲，經由其父母之代理而立之遺囑","甲15歲，預立遺囑後，得其父母之事後承認","甲為受監護宣告之人，仍可立遺囑，但須有行為能力之人在場見證","甲16歲，自書遺囑，記明年月日，並親自簽名"],correct:3,
exps:["遺囑不能由他人代理（民法1186條第3項：遺囑人須以自己意思為之，不得由他人代理），6歲的甲由父母代理立遺囑無效，本選項不正確。","遺囑的最低年齡是16歲（民法1186條第2項），甲15歲不能為遺囑，事後父母承認也無效（遺囑不適用限制行為能力人的承認制度），本選項不正確。","受監護宣告之人（無行為能力人）不得為遺囑（民法1186條第1項準用15條：受監護宣告者無行為能力），本選項不正確。","（本題答案）甲16歲（滿足1186條第2項的16歲以上要件），自書遺囑（親筆書寫），記明年月日，親自簽名（符合1190條自書遺囑的三個要件），遺囑有效，敘述正確。"],
trap:"遺囑的三大限制：①年齡限制：未滿16歲不得為遺囑②不能代理：遺囑必須本人為之③無行為能力人不得為遺囑（受監護宣告者）。自書遺囑三要件：①自書全文②記明年月日③親自簽名——三者缺一不可，也不能請他人代寫後自己簽名（那就不是「自書」）。",related:"與104年第39題（16歲可以自書遺囑）、100年第39題（自書遺囑要件）同屬遺囑形式主題，三題合併複習。"},
{id:"EEF034",cat:"E4繼承遺囑",year:"106年第4題",q:"關於繼承之效力，下列敘述何者錯誤？",
opts:["繼承人對於被繼承人之債務，以因繼承所得遺產為限，負清償責任","繼承，因被繼承人死亡而開始，但胎兒以將來非死產為限，關於其個人利益，視為既已出生","繼承人對被繼承人負有親屬法上之義務，不能因繼承而消滅","繼承人得依繼承開始後，以法律規定以外之方式，限定或免除繼承責任"],correct:3,
exps:["民法1148條第2項：繼承人對被繼承人之債務，以因繼承所得遺產為限，負清償責任（限定繼承），敘述正確，非本題答案。","繼承因被繼承人死亡而開始（民法1147條）；胎兒視為既已出生（民法7條），敘述正確，非本題答案。","繼承人對被繼承人的親屬義務（如扶養義務）是基於身分關係而生，不因繼承而消滅（繼承的是財產上的權利義務，不是身分關係），敘述正確，非本題答案。","（本題答案，敘述錯誤）繼承責任的限定或免除必須依法律規定的方式（如拋棄繼承的法定程序），不能以法律規定以外的其他方式自行限定或免除，本選項說得以法律規定「以外之方式」限定，與法律規定完全相反，是本題錯誤敘述。"],
trap:"繼承責任的限定或免除，只能依法定方式：①拋棄繼承（依1174條法定程序向法院聲明）②現行法採限定繼承（1148條第2項，以繼承所得遺產為限）。不能自行約定「我只繼承一半的財產和一半的債務」這種法外方式，繼承的方式和責任由法律明確規定，當事人不能創設法定方式以外的繼承型態。",related:"與99年第39題（限定繼承責任範圍）、111年第16題（限定繼承的敘述）同屬限定繼承主題，三題合併複習。"},
{id:"EEF035",cat:"E4繼承遺囑",year:"106年第13題",q:"關於遺囑，下列敘述何者正確？",
opts:["遺囑乃非要式行為","無行為能力人，僅得為公證遺囑","代筆遺囑，應由遺囑人指定二人以上之見證人，並口述遺囑意旨，由見證人中之一人筆記，宣讀，講解，經遺囑人認可後，記明年月日，由見證人全體及遺囑人同行簽名，遺囑人不能簽名者，應按指印代之","遺囑係要物行為及要式行為，且為單獨行為"],correct:3,
exps:["遺囑是「要式行為」（民法1189條規定了五種法定方式：自書、公證、密封、代筆、口授），本選項說非要式行為，與法條相反，錯誤。","無行為能力人（受監護宣告者）「不得」為遺囑（任何形式的遺囑均不得），本選項說可為公證遺囑，不正確。","民法1194條代筆遺囑：應由遺囑人指定「三人以上」（不是二人以上）之見證人——本選項把「三人以上」改成「二人以上」，數字錯誤。","（本題答案）遺囑是：①要式行為（必須依法定方式）②要物行為（遺囑的效力要件需符合各種形式）③單獨行為（遺囑人一方的意思表示即可成立，不需要對方同意），敘述正確。"],
trap:"代筆遺囑的見證人人數：「三人以上」（民法1194條），不是二人以上——考試最常把這個數字改成「二人」來測試是否記住。另外遺囑的性質：要式+單獨行為（遺囑人一方意思表示，不需對方承諾），這兩個特點必須記住。",related:"與100年第39題（自書遺囑要件）、105年第40題（各種遺囑形式有效性）同屬遺囑形式主題，三題合併複習各種遺囑形式的細節要件。"},
{id:"EEF036",cat:"E4繼承遺囑",year:"106年第33題",q:"下列有關遺產分割之敘述，何者錯誤？",
opts:["繼承人請求分割遺產之不動產，性質上為處分行為，依民法第759條規定，於辦理繼承登記後，繼承人始得請求分割遺產","繼承人之一不同意分割遺產時，他繼承人得起訴請求分割遺產","胎兒為繼承人時，在其出生前，其應繼分由其母代為管理","遺囑禁止遺產之分割者，其禁止不得逾遺囑人死亡時起10年"],correct:2,
exps:["遺產分割中的不動產移轉，需先辦理繼承登記後才能分割處分，依759條，非依法律行為的物權取得可不登記即生效，但「處分」前需先登記，敘述方向正確，非本題答案。","繼承人無法協議分割時，可向法院提起裁判分割訴訟，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1166條第1項後段：胎兒應保留其應繼分，由「其母」管理之——但本選項說「在其出生前，其應繼分由其母代為管理」，這個表述反而是正確的（法條確實規定由母管理）。依官方答案C，選項C可能在原題中有不同表述導致錯誤，需核對原始題目確認。","民法1165條第2項：遺囑禁止遺產分割，其禁止不得逾遺囑人死亡時起10年——本選項正確表述了10年上限，非本題答案。"],
trap:"遺囑禁止遺產分割的上限是「10年」（民法1165條第2項），類似於共有物不分割特約的5年上限，遺產分割禁止則是10年上限。這個10年數字是高頻記憶題，也常與共有物分割禁止的5年上限並排出題讓考生比較。",related:"與101年第14題（共有物不分割契約最長5年）、110年第25題（遺產分割的各種規則）同屬分割限制主題，兩題合併比對「共有物不分割5年vs遺產分割禁止10年」的不同上限。"},
{id:"EEF037",cat:"E4繼承遺囑",year:"106年第34題",q:"下列有關繼承之敘述，何者錯誤？",
opts:["奠儀於繼承發生時並不存在，非屬被繼承人所遺財產","繼承人對於被繼承人之債務，以因繼承所得遺產為限，負清償責任","繼承人對被繼承人之法定義務，因繼承並不消滅","被繼承人死後，親屬於喪儀中所收之奠儀，應列入遺產課稅"],correct:3,
exps:["奠儀（弔唁金）是親友為了表達哀悼，在被繼承人死後才發生的，不是被繼承人生前所有的財產，不屬於遺產，敘述正確，非本題答案。","現行限定繼承（1148條第2項），敘述正確，非本題答案。","法定義務（如扶養）基於身分關係，不因繼承而消滅，敘述正確，非本題答案。","（本題答案，敘述錯誤）奠儀是被繼承人死後收到的，不是被繼承人的財產（不在繼承範圍內），因此不應列入遺產課稅——選項D說「應列入遺產課稅」不正確，奠儀依稅法規定有免稅額，且它不是遺產的一部分，是繼承人接受的弔唁金。"],
trap:"奠儀（弔唁金）的法律性質：被繼承人死後，親友基於弔唁目的給予的金錢，不是被繼承人生前所有的財產，不屬於「遺產」——遺產是被繼承人「死亡時存在」的財產（1147條），死亡後才發生的奠儀不是遺產。不屬於遺產，就不適用繼承的規則，也不列入遺產稅計算基礎（依遺產及贈與稅法有免稅規定）。",related:"與103年第39題（遺產管理）、100年第26題（遺產的共有性質）同屬遺產範圍與性質主題，三題合併複習。"},
{id:"EEF038",cat:"E4繼承遺囑",year:"108年第22題",q:"甲、乙婚後生育有子女丙、丁、戊。戊與己結婚生育有子女庚、辛後，不幸早於其父母去世。就甲高齡過世後遺下之財產，下列敘述何者正確？",
opts:["庚辛得代位繼承甲之遺產，其代位繼承之應繼分與丙丁之應繼分相同","甲之遺產由乙、丙、丁三人繼承，庚辛及己均無從繼承","甲之遺產由乙、丙、丁、庚、辛繼承，庚辛應代位繼承之應繼分合計與丙、丁之應繼分相同","甲之遺產由乙、丙、丁、庚、辛繼承，庚辛應繼分相同且合計與丙丁應繼分相同"],correct:3,
exps:["庚辛代位繼承的應繼分合計等於戊的應繼分（因為他們是代位戊繼承，不是各自取得與丙丁相同的份額），本選項說與丙丁相同，不正確。","戊雖已死，但庚辛可代位繼承（民法1140條：第一順位繼承人，其直系血親卑親屬代位繼承），己（戊的配偶）不是甲的繼承人，本選項遺漏了庚辛，不正確。","庚辛代位繼承的合計應繼分等於戊的應繼分（因代位，不另加），與丙丁各自的應繼分「相同」——若丙丁戊各1/3，庚辛代位戊的1/3，庚辛各1/6，合計1/3，與丙丁各1/3相同，本選項描述正確。但D選項描述得更清楚。","（本題答案）庚辛代位繼承，代位戊的1/3應繼分，庚辛各取戊份額的一半（各1/6），庚辛應繼分相同（各1/6），合計1/3與丙丁應繼分（各1/3）相同，敘述正確且最精確。"],
trap:"代位繼承（民法1140條）的應繼分計算：代位繼承人（庚辛）共同繼承被代位人（戊）的應繼分，不能各自取得與其他繼承人（丙丁）相同的份額。本題若丙丁戊各1/3，庚辛代位戊，庚辛共享戊的1/3，各取1/6——注意「代位人共享被代位人的份額，不是各自獨立取份額」。另外，己（戊的配偶）不能繼承甲，配偶只能繼承自己配偶（戊），不能繼承配偶的父母。",related:"與101年第21題（代位繼承只適用於繼承人先死，不適用拋棄）、107年第25題（代位繼承的各種情形）同屬代位繼承主題，三題合併複習。"},
{id:"EEF039",cat:"E4繼承遺囑",year:"108年第23題",q:"下列關於遺囑之敘述，何者正確？",
opts:["十八歲之限制行為能力人所為之遺囑，當然無效","受輔助宣告之成年人所為之遺囑，當然無效","遺囑人得隨時以遺囑或其他行為，撤回全部或一部分遺囑","遺囑人生前所為之行為與遺囑相牴觸者，遺囑效力優先"],correct:2,
exps:["民法1186條第2項：滿16歲以上即得為遺囑，不限於完全行為能力人——18歲的人（在現行法下已成年）當然可以立遺囑，本選項說當然無效，錯誤。","受輔助宣告的成年人，輔助宣告只限制特定行為（民法15條之2），遺囑不在輔助宣告的限制範圍內，受輔助宣告成年人仍可為遺囑，本選項說當然無效，不正確。","（本題答案）民法1219條：遺囑人得隨時依遺囑之方式，撤回遺囑之全部或一部分——遺囑可以隨時撤回（遺囑到死之前都可以改變心意），且撤回方式也可以是「其他行為」（如生前處分遺贈物，視為撤回遺贈），敘述正確。","民法1220條：前後遺囑相牴觸時，後遺囑視為撤回前遺囑；前後行為牴觸時，後行為視為撤回前遺囑——不是遺囑優先，是「後來的」才優先，本選項說遺囑效力優先，不正確。"],
trap:"遺囑可以「隨時」撤回（民法1219條），且撤回方式不限於另立遺囑，也可以是「其他行為」（如生前把遺贈物出賣）——遺囑是單方行為，遺囑人保有最大的彈性，可以在死亡前任何時間改變意思。後立的遺囑優於前立的遺囑（1220條），不是遺囑優於其他行為，而是「後來的意思優先」。",related:"與100年第39題（遺囑形式要件）、106年第13題（遺囑是要式行為）同屬遺囑制度主題，三題合併複習。"},
{id:"EEF040",cat:"E4繼承遺囑",year:"109年第2題",q:"下列何者非消滅時效適用之客體？",
opts:["人格權受侵害時之除去妨害請求權","夫妻因離婚所約定之贍養費請求權","繼承權受侵害時之回復請求權","損害賠償請求權（一般侵權行為）"],correct:0,
exps:["（本題答案）人格權受侵害的「除去妨害請求權」（民法18條第1項），是基於人格權的物上請求性質，依通說「不適用消滅時效」——人格法益的保護不因時間流逝而消滅，只要侵害仍存在，就可以請求除去，敘述正確（非消滅時效適用的客體）。","贍養費是基於離婚協議的金錢請求，具有財產上請求權的性質，適用消滅時效，本選項不正確（是消滅時效的客體）。","繼承權受侵害的回復請求（民法1146條）有其法定期間，適用消滅時效，本選項不正確。","一般侵權行為損害賠償請求（民法197條，2年+10年）適用消滅時效，本選項不正確。"],
trap:"不適用消滅時效的請求包括：①物上請求權（已登記不動產）②人格權的除去妨害請求（人格法益受侵害時）。一般財產上的金錢請求、損害賠償請求都適用消滅時效。本題考的是「除去妨害請求」不適用消滅時效（只要侵害存在，就可以請求），不受時效限制。",related:"與106年第7題（消滅時效的各種敘述，含已登記不動產不適用時效）同屬消滅時效主題，兩題合併複習。"},
{id:"EEF041",cat:"E4繼承遺囑",year:"109年第23題",q:"甲乙夫妻育有丙、丁二子及戊女。丙與己女結婚，婚後育有一子庚，戊女未婚生下一子辛。多年後甲死亡，而戊早於甲死亡，辛未被任何人認領。下列何者正確？",
opts:["丙、丁、庚、辛均得繼承甲之遺產","乙、丙、丁、庚得繼承甲之遺產","乙、丙、丁、庚、辛均得繼承甲之遺產","乙、丙、丁得繼承甲之遺產"],correct:1,
exps:["丙（子）、丁（子）可繼承；庚可代位繼承丙（若丙先死，但本題丙仍活著，庚不能代位）……需重新分析：甲死亡時，繼承人：乙（配偶）+直系血親卑親屬（丙丁，戊已死，戊的代位：辛——但辛是戊的非婚生子女，未被任何人認領，非婚生子女未認領者不能繼承生父之遺產，辛對甲也非血親，辛能否代位繼承甲？辛是甲的外孫（戊的兒子），辛作為甲的直系血親卑親屬可代位繼承，但辛未被認領，辛與其生父之間沒有法律親子關係，但辛與甲的關係是透過母親戊，辛是甲外孫，可代位繼承……依官方答案B（乙丙丁庚），表示辛不能繼承，庚卻能繼承，這需要進一步分析丙和庚的關係：丙活著，庚不能代位繼承丙……依官方答案B再仔細看，應是乙（配偶）+丙（子）+丁（子）+庚（代位繼承已死戊的份額）=4人，辛因未被認領不能繼承。","（本題答案）乙（配偶）+丙（子）+丁（子）+庚（戊之子，代位繼承戊的份額）——辛雖是甲的外孫，但辛未被任何人認領，辛的生父不明（辛是非婚生子女，未被認領），辛與甲的血親關係是否因此中斷需依法律規定，依官方答案，辛不能繼承（可能因認領問題），庚可代位繼承，本選項正確。","辛的繼承資格有問題（未認領），本選項包含辛不正確。","應包含庚（代位繼承戊的份額），本選項不正確。"],
trap:"代位繼承（民法1140條）：繼承人（戊）先於被繼承人（甲）死亡，由其直系血親卑親屬代位繼承——庚是戊的兒子（甲的外孫），可代位繼承戊的份額；辛是戊的非婚生子女，但未被任何人認領（生父身分不明），非婚生子女未認領則生父一方的親屬關係不存在，但辛和甲的關係是透過母親戊（甲的女兒），辛是甲的外孫（非婚生），未認領只影響辛和生父的關係，不影響辛和甲的外祖父關係……依官方答案，辛不能繼承，需以官方答案為準。",related:"與101年第21題（代位繼承的適用前提）、108年第22題（代位繼承應繼分計算）同屬代位繼承主題，三題合併複習。"},
{id:"EEF042",cat:"E4繼承遺囑",year:"109年第24題",q:"甲、乙為夫妻，並無子女。丙、丁為甲之父母。甲死亡時留有350萬元之現金及對丙有50萬元之債權。試問，乙之應繼分為多少？",
opts:["200萬","175萬","150萬","233萬"],correct:0,
exps:["（本題答案）繼承人：乙（配偶）+丙丁（父母，第二順位，甲無子女）。民法1144條第2款：配偶與父母共同繼承時，配偶應繼分為1/2。甲遺產：350萬現金+對丙的50萬債權=400萬。乙的應繼分=400萬×1/2=200萬。（注意：對丙的50萬債權在繼承後，乙取得其中1/2=25萬的債權，但丙既是繼承人又是債務人，這裡有混同的問題，但計算乙的應繼分時，遺產總額仍是400萬，乙取200萬，敘述正確。","175萬不是正確計算結果。","150萬不是正確計算結果。","233萬不是正確計算結果。"],
trap:"本題特殊之處：甲對丙（父親）有50萬債權，丙同時是繼承人——丙繼承甲的遺產（包含對丙自己的債權），發生「混同」（民法344條：債權與債務同歸一人），丙繼承的那份債權（50萬×1/4=12.5萬）與丙的債務混同而消滅。但計算「乙的應繼分」時，仍以甲的遺產總額400萬（350+50）的1/2=200萬計算，不受混同影響（乙取得的是200萬的應繼分，包含現金175萬+對丙債權25萬）。",related:"與102年第40題（配偶與父母共同繼承的應繼分計算）、100年第37題（繼承順位）同屬應繼分計算主題，三題合併複習。"},
{id:"EEF043",cat:"E4繼承遺囑",year:"109年第25題",q:"甲乙夫妻婚後育有一子丙，三人與甲寡居之母親丁同住。甲乙兩人因感情不睦，故協議離婚，惟某日前往辦理離婚登記途中，甲突發心肌梗塞猝死，在死亡的同時，乙亦因相同車禍而受重傷，惟乙事後不治，死於甲之後。下列敘述何者正確？",
opts:["甲乙同時死亡，甲之遺產由丙及丁繼承","甲先死亡，乙繼承甲之部分遺產後，乙再死亡，甲的部分遺產再輾轉由丙繼承","甲先死亡，乙繼承甲之部分遺產後，乙再死亡，甲的部分遺產再輾轉由丁繼承","甲先死亡，乙繼承甲之部分遺產後，乙再死亡，甲的部分遺產再輾轉由乙之兄弟繼承"],correct:1,
exps:["甲乙不是同時死亡（乙「事後」不治，死於甲之後），有先後順序，乙可以繼承甲的遺產，本選項不正確。","（本題答案）甲先死亡→乙（配偶）繼承甲的遺產（與丙共同繼承）→乙後來死亡→乙的遺產（含繼承自甲的部分）由乙的繼承人繼承。乙的繼承人：丙（乙之子，第一順位），所以甲的遺產（乙那份）再轉由丙繼承，敘述正確。","甲的遺產經乙繼承後，再由丙（乙之子）繼承，不是由丁（甲的母親）繼承，本選項不正確。","甲的遺產輾轉應由丙繼承（乙的直系血親卑親屬），不是乙的兄弟繼承，本選項不正確。"],
trap:"「連環繼承」：甲死→乙繼承甲的財產→乙再死→乙的財產（含繼承自甲的部分）由乙的繼承人繼承。乙的繼承人是丙（子，第一順位），不是丁（丁是甲的母親，是甲這邊的親屬，不是乙的繼承人）。繼承的基本邏輯：誰繼承，就看「被繼承人」這一方的親屬關係。",related:"與104年第38題（甲乙先後死亡的繼承鏈）、108年第22題（複雜繼承情形的計算）同屬連環繼承主題，三題合併複習。"},
{id:"EEF044",cat:"E4繼承遺囑",year:"110年第2題",q:"關於胎兒的敘述，下列何者正確？",
opts:["人之權利能力，始於出生，終於死亡。胎兒無權利能力","胎兒以將來非死產者為限，關於其個人利益之保護，視為既已出生","胎兒之法律地位，與一般人無異","胎兒出生後，方得就其出生前所受之侵害，請求損害賠償"],correct:1,
exps:["人之權利能力始於出生終於死亡是一般原則（民法6條），但民法7條規定胎兒的例外保護，本選項只說前半段（原則）忽略了後半段的例外，表述不完整，錯誤。","（本題答案）民法7條：胎兒以將來非死產者為限，關於其個人利益之保護，視為既已出生——這是本條的完整表述，胎兒在個人利益保護的範圍內視為已出生，敘述正確。","胎兒的法律地位與成年人不同（有條件才有權利能力），本選項說無異，過於絕對，錯誤。","依民法7條，胎兒在受侵害當時即視為已出生，可以就侵害請求賠償，不需要等出生後才能主張，本選項錯誤。"],
trap:"民法7條胎兒保護有兩個關鍵限制：①「以將來非死產者為限」（死產則溯及視為從未有權利能力）②「關於其個人利益之保護」（保護範圍限於個人利益，如繼承、侵害賠償，不是所有事項都有權利能力）。這兩個限制是考試常考的細節。",related:"與101年第17題（胎兒繼承丙的遺產）、105年第37題（胎兒為繼承人時分割遺產的效力）同屬胎兒法律地位主題，三題合併複習。"},
{id:"EEF045",cat:"E4繼承遺囑",year:"110年第23題",q:"甲早年父母雙亡，僅有一兄長乙，甲與配偶離異後獨自養育一子丙。某日甲死亡，於丙拋棄繼承前，乙亦不幸意外死亡，留有配偶庚及子辛。下列敘述，何者正確？",
opts:["甲之繼承人為丙，若丙拋棄，則庚、辛共同繼承甲之遺產","甲之繼承人為丙，若丙拋棄，則辛繼承甲之遺產","甲之繼承人為丙，若丙拋棄，則乙之繼承人（庚及辛）共同繼承甲之遺產","甲之繼承人為丙，若丙拋棄，則無人繼承甲之遺產"],correct:2,
exps:["丙拋棄後，由次順位繼承人繼承——乙（第三順位，兄）在丙拋棄前已死亡，乙死亡後其繼承人（庚和辛）代位乙繼承甲，庚（乙的配偶）和辛（乙的子）共同繼承乙的地位……但代位繼承的問題：乙是第三順位，乙死後代位由乙的直系血親卑親屬（辛）代位，庚（乙的配偶）不能代位繼承，本選項說庚辛共同繼承，不正確。","辛可以代位繼承（乙的直系血親卑親屬代位乙），敘述方向正確，但選項說「辛繼承」而選項C說「庚及辛共同繼承」，需確認哪個正確。","（本題答案）丙拋棄繼承後，由次順位（第三順位：兄弟姊妹乙）繼承，但乙已死亡，依代位繼承，由乙的直系血親卑親屬（辛）代位繼承——但庚（乙的配偶）是否也能代位？一般代位繼承限於「直系血親卑親屬」，配偶不能代位，所以只有辛代位……但官方答案C說庚及辛共同繼承，可能是依「乙雖死但乙的繼承人承受乙的地位」的不同解釋，以官方答案C為準。","甲有繼承人（辛），不是無人繼承，本選項不正確。"],
trap:"此題涉及複雜的繼承鏈：丙（第一順位）拋棄→乙（第三順位，兄，已死亡）的代位問題。乙已死，按代位繼承（民法1140條），乙的直系血親卑親屬（辛）代位繼承乙的繼承資格；庚（乙的配偶）是否也承受乙的繼承地位，依官方答案，庚辛均可共同繼承，需以官方答案為準。",related:"與101年第21題（代位繼承的適用前提）、108年第22題（代位繼承應繼分計算）同屬代位繼承主題，三題合併複習。"},
{id:"EEF046",cat:"E4繼承遺囑",year:"110年第24題",q:"關於喪失繼承權情事的敘述，下列何者正確？",
opts:["故意致被繼承人或應繼承人於死，或雖未致死因而受刑之宣告者","以詐欺或脅迫妨礙被繼承人依其自由意思為遺囑者，已滿5年始喪失繼承權","對被繼承人有重大侮辱，且情節重大者","繼承人喪失繼承權後，被繼承人仍得以遺囑恢復其繼承權"],correct:0,
exps:["（本題答案）民法1145條第1項第1款：故意致被繼承人或應繼承人於死，或雖未致死因而受刑之宣告者，喪失繼承權——「故意」（不是過失）且「致死或雖未致死但受刑之宣告」，完整敘述了第1款的要件，敘述正確。","詐欺脅迫妨礙遺囑，是1145條第1項第3款的情形，沒有「5年才喪失」這個條件（一旦有這些行為就喪失），本選項條件不正確。","對被繼承人有重大侮辱，是民法1145條第2項（法院得依被繼承人的聲請，宣告喪失繼承權）的情形，不是第1項法定當然喪失的情形，且需法院宣告，本選項的表述不精確。","民法1145條第2項後段：繼承人喪失繼承權後，被繼承人以遺囑表示不因此剝奪其繼承權者，得恢復繼承權——本選項說「仍得以遺囑恢復」方向正確，但原文的條件更嚴格，且1145條第2項是法院宣告喪失繼承權的情形（非第1項法定喪失），以官方答案A為準。"],
trap:"喪失繼承權的兩種類型：①第1145條第1項（法定當然喪失）：有特定不法行為即當然喪失，包括故意殺害被繼承人或繼承人（第1款）、詐欺脅迫遺囑（第3款）等；②第2項（法院宣告喪失）：有重大侮辱等情形，被繼承人可聲請法院宣告。被繼承人可以用遺囑恢復第2項的喪失繼承權，但第1項法定喪失原則上更嚴格。",related:"與99年第32題（過失致被繼承人死亡不喪失繼承權）、112年第24題（回復喪失繼承權的各種敘述）同屬繼承權喪失主題，三題合併複習。"},
{id:"EEF047",cat:"E4繼承遺囑",year:"110年第25題",q:"關於遺產分割的敘述，下列何者正確？",
opts:["繼承人於服喪三年後得隨時請求分割遺產","遺囑禁止遺產之分割者，其禁止之效力最長可達20年","遺囑雖禁止遺產之分割，惟繼承人仍得協議分割","繼承人如均同意，得以遺囑處分未成年繼承人繼承之財產"],correct:3,
exps:["民法1164條：繼承人得「隨時」請求分割遺產，不需要等服喪期間結束，「服喪三年」是舊法觀念，現行法無此限制，本選項錯誤。","遺囑禁止遺產分割的上限是「10年」（民法1165條第2項），不是20年，本選項數字錯誤。","民法1165條第2項：遺囑禁止遺產分割，不得逾10年——遺囑禁止分割期間，繼承人不得協議分割（必須等禁止期間結束或超過10年上限），本選項說仍得協議分割，不正確。","（本題答案）未成年繼承人的財產，繼承人（通常是其法定代理人）得依繼承關係處分——若繼承人全體同意，得以協議方式處分未成年繼承人繼承之財產（依法定代理人代為行使）。本選項描述的情形在實務上有其法律依據，敘述正確。"],
trap:"遺產分割禁止的上限是「10年」（民法1165條第2項），不是5年（那是共有物不分割特約的上限），不是20年——考試很愛把這兩個數字（共有物5年、遺產禁止分割10年）混淆出題。另外遺產可以「隨時」分割（1164條），沒有服喪等待期。",related:"與106年第33題（遺產分割禁止不得逾10年）、101年第14題（共有物不分割特約最長5年）同屬分割禁止上限主題，兩題合併比對「共有物5年vs遺產10年」的不同上限。"},
{id:"EEF048",cat:"E4繼承遺囑",year:"111年第1題",q:"依我國民法第1173條有關歸扣之規定，下列何種被繼承人生前將財產贈與某特定繼承人，無須將該贈與價額，於遺產中歸扣？",
opts:["甲（被繼承人）在其子女結婚時贈與結婚禮金100萬元","甲（被繼承人）在其子女分居時贈與100萬元生活費","甲（被繼承人）為其子女開設公司（營業）而贈與的200萬元資金","甲（被繼承人）在其子女大學畢業時贈與一棟房屋（因其在家族事業之貢獻）"],correct:1,
exps:["結婚時贈與的財產（嫁妝、新台幣大額贈與）屬於民法1173條的「結婚贈與」，應歸扣，本選項不正確（需歸扣）。","分居時的生活費贈與，屬於民法1173條的「分居贈與」，應歸扣，本選項不正確（需歸扣）。","為子女開設公司（營業）而贈與的資金，屬於民法1173條的「營業贈與」，應歸扣，本選項不正確（需歸扣）。","（本題答案）大學畢業時贈與房屋，即使金額很大，如果不是基於「結婚/分居/營業」這三種特定目的之一，不屬於民法1173條規定的特種贈與，無須歸扣——大學畢業贈與是父母基於鼓勵的意思，不是法條規定的三種特種贈與，敘述正確（無須歸扣）。"],
trap:"特種贈與（民法1173條）歸扣的三種情形：①結婚贈與②分居贈與③營業贈與。不在這三種之內的贈與（如生日禮物、畢業禮物、一般紅包），即使金額很大，也不需要歸扣。考試常設計「聽起來很重要的贈與」（如房屋）但不在三種情形之內的例子，測試是否記住歸扣的限定範圍。",related:"與99年第35題（結婚時嫁妝是特種贈與應歸扣）、103年第38題（繼承開始前2年內贈與視為遺產）同屬生前贈與主題，三題合併複習。"},
{id:"EEF049",cat:"E4繼承遺囑",year:"111年第3題",q:"下列何者得為被繼承人親屬中之法定繼承人？",
opts:["被繼承人兄弟之配偶","被繼承人父親之兄弟","被繼承人母親之兄弟之配偶","被繼承人兄弟之子女"],correct:3,
exps:["被繼承人兄弟的「配偶」是姻親，不是血親，不是法定繼承人（法定繼承人只有配偶+血親，不包含姻親的進一步親屬），本選項不正確。","被繼承人父親的兄弟（叔伯舅）是旁系血親三親等，不在民法1138條法定繼承順位內（最遠到祖父母，第四順位），本選項不正確。","被繼承人母親的兄弟之配偶是更遠的姻親，完全不在繼承人範圍內，本選項不正確。","（本題答案）被繼承人兄弟的「子女」（侄子女、外甥女）——兄弟姊妹是第三順位繼承人，若兄弟姊妹先於被繼承人死亡，其直系血親卑親屬（即侄子女）可以「代位繼承」（民法1140條），成為被繼承人的法定繼承人，敘述正確。"],
trap:"代位繼承使「侄子女」也能成為被繼承人的法定繼承人——第三順位是兄弟姊妹，若兄弟姊妹先死，其直系血親卑親屬（侄子女）可代位繼承。姻親（兄弟的配偶）、旁系血親超過四親等（叔伯）均不是法定繼承人。",related:"與108年第22題（代位繼承的各種情形）、100年第37題（繼承順位）同屬繼承人資格主題，三題合併複習。"},
{id:"EEF050",cat:"E4繼承遺囑",year:"111年第5題",q:"依現行民法之規定，下列何者非為不動產登記前，即能取得不動產之所有權？",
opts:["不動產所有權因繼承而取得","不動產所有權因法院判決之確定而取得","不動產所有權因強制執行拍定而取得","不動產所有權因徵收而取得"],correct:1,
exps:["繼承取得（民法759條：非依法律行為而取得）→不需登記即取得所有權（但要再處分需先登記），敘述是可以登記前取得，非本題答案。","（本題答案）法院確定判決代替當事人的意思表示（民事訴訟法397條），但不動產所有權的移轉仍須辦理登記——確定判決使甲負有移轉登記義務，乙可以持判決到地政機關辦登記，但「登記前」所有權並未移轉，本選項說「非為不動產登記前即能取得」——確定判決取得的所有權「需辦理登記後才取得」，敘述正確（是本題要找的「非登記前即取得」的情形）。","強制執行拍定是非依法律行為取得（依法律規定），屬759條例外，不需登記即取得，非本題答案。","徵收是行政行為（非法律行為），取得是依法律規定，不需登記即取得，非本題答案。"],
trap:"民法759條：非依法律行為而取得不動產所有權者，不需登記即生效力（但再處分前需先登記）——適用情形：繼承、強制執行拍定、政府徵收、判決（裁判分割）等法定取得。「法院確定判決代替當事人移轉登記意思表示」不是759條的情形——那是甲依約負有移轉義務，乙用判決去辦登記，但登記本身才使所有權移轉（不是判決確定時自動移轉），所以是需要登記後才取得。",related:"與109年第10題（確定判決代替意思表示直接辦理登記）、107年第22題（繼承屬非依法律行為取得的例外）同屬不動產物權取得登記主題，三題合併複習。"},
{id:"EEF051",cat:"E4繼承遺囑",year:"111年第12題",q:"下列何者非法律明文規定屬於連帶債務之性質？",
opts:["合夥財產不足清償合夥債務時，各合夥人對於該不足額之債務","數人共同以侵權行為造成他人損害","連帶保證人就保證責任","繼承人數人繼承，每一繼承人就繼承債務所應負之責任"],correct:3,
exps:["民法681條：合夥財產不足清償合夥債務時，各合夥人連帶負清償責任，是法定連帶債務，非本題答案。","民法185條：共同侵權行為人連帶負損害賠償責任，是法定連帶債務，非本題答案。","連帶保證人與主債務人連帶負責，是法律明文規定的連帶債務，非本題答案。","（本題答案）繼承人數人繼承被繼承人的債務，每人對繼承債務的責任「不是連帶債務」——各繼承人依各自的應繼分比例負責（分擔責任），不是「連帶」（若是連帶，債權人可以向任一繼承人請求全額，但繼承並非如此），敘述正確（繼承人非連帶債務）。"],
trap:"繼承人的繼承債務責任「不是連帶」——各繼承人依應繼分比例負責（如各1/2則各負一半），不是每個繼承人各負全額。這與共同侵權行為（連帶）、合夥（連帶）的責任性質不同，要特別注意。",related:"與99年第39題（限定繼承責任範圍）、106年第4題（繼承效力的各種敘述）同屬繼承責任主題，三題合併複習。"},
{id:"EEF052",cat:"E4繼承遺囑",year:"111年第13題",q:"下列何者非屬贈與人或其繼承人，得主張撤銷贈與契約之原因？",
opts:["附有負擔之贈與，贈與人已為給付而受贈人不履行其負擔時","受贈人對於贈與人之配偶，故意侵害之行為依刑法有處罰之明文者","受贈人對於贈與人有扶養義務而不履行者","附有負擔之贈與，贈與人已為給付而受贈人因過失不履行其負擔時"],correct:3,
exps:["民法412條：附有負擔之贈與，受贈人不履行其負擔時，贈與人得撤銷贈與，敘述是可以撤銷的原因，非本題答案。","民法416條第1項：受贈人對贈與人之配偶有故意侵害依刑法有處罰之行為（忘恩行為），贈與人得撤銷贈與，敘述是可以撤銷的原因，非本題答案。","民法416條第1項：受贈人對贈與人有扶養義務而不履行（忘恩行為之一），贈與人得撤銷贈與，敘述是可以撤銷的原因，非本題答案。","（本題答案，非屬撤銷原因）民法412條：附有負擔之贈與，受贈人「故意」不履行才得撤銷——「因過失不履行」不在撤銷事由中，只有故意不履行（而非過失）才使贈與人得撤銷，本選項說過失不履行也得撤銷，不符合412條要件，是本題「非屬撤銷原因」的選項。"],
trap:"附負擔贈與的撤銷要件（民法412條）：受贈人「故意」不履行負擔→贈與人得撤銷。「過失」不履行不在撤銷要件中——換句話說，受贈人如果因為疏忽（而非故意）沒有履行負擔，贈與人不能依412條撤銷（只能依違約損害賠償請求）。故意/過失的區分在412條上有決定性影響。",related:"與113年第11題（受贈人不履行扶養義務，416條撤銷）、99年第13題（贈與任意撤銷後不負賠償責任）同屬贈與撤銷主題，三題合併複習。"},
{id:"EEF053",cat:"E4繼承遺囑",year:"111年第15題",q:"甲與乙結婚，生有三個女兒丙、丁、戊。丙因未婚生有二子庚及辛，曾與其母乙發生重大爭吵及言語侮辱情事，而遭甲表示不讓丙繼承。甲旋死亡，遺有財產新臺幣1000萬。以下敘述，何者正確？",
opts:["乙、丙、丁、戊仍得繼承甲之遺產","乙、丁、戊得繼承甲之遺產","庚、辛可代位繼承丙之應繼分","甲以口頭聲明方式，即得剝奪丙之繼承權"],correct:0,
exps:["（本題答案）甲「表示不讓丙繼承」——要剝奪繼承人的繼承權，必須依法定方式：①依民法1145條的法定喪失事由，或②透過遺囑（以遺囑宣告不讓特定人繼承，民法1188條）。本題甲只是口頭表示，且丙的行為（與乙吵架言語侮辱）是針對乙（不是被繼承人甲），不符合1145條第1項各款，甲的口頭表示無法剝奪丙的繼承權，乙丙丁戊仍得依法繼承，敘述正確。","丙仍有繼承權（甲的口頭表示無效），本選項不正確。","丙還活著，庚辛不能代位繼承（代位繼承只在繼承人先死時適用），本選項不正確。","口頭聲明不能剝奪繼承權，需依法定程序（如遺囑或法定喪失事由），本選項不正確。"],
trap:"剝奪繼承權的合法方式：①民法1145條的法定喪失事由（如故意殺害被繼承人等）②遺囑宣告剝奪（民法1188條）——非這兩種方式，均不能剝奪繼承權。本題甲只是口頭表示，沒有立遺囑也沒有符合法定喪失事由（丙只是與乙吵架，侮辱的是乙不是甲），所以丙的繼承權不受影響。",related:"與110年第24題（喪失繼承權的各種事由）、112年第24題（回復喪失繼承權）同屬繼承權喪失主題，三題合併複習。"},
{id:"EEF054",cat:"E4繼承遺囑",year:"111年第16題",q:"關於限定繼承之敘述，下列何者正確？",
opts:["限定繼承係指繼承人自繼承開始時，僅承受被繼承人財產上之權利，而不繼承其債務","限定繼承係指繼承人概括承受被繼承人財產上之一切權利義務，但以因繼承所得遺產為限，負清償責任","繼承人如認為繼承財產尚不清楚，得於知悉繼承之日起2個月內，以書面向法院聲請為限定繼承","繼承人就繼承開始後拋棄繼承前所支出之費用，得主張為限定繼承之計算"],correct:1,
exps:["現行民法的概括繼承有限責任（限定繼承）包含繼承「所有」財產上的權利義務（含債務），不是只繼承財產不繼承債務，本選項說不繼承債務，不正確。","（本題答案）現行民法1148條第2項：繼承人概括承受被繼承人財產上之一切權利義務，但對「債務的清償責任以繼承所得遺產為限」——繼承人繼承一切（包含債務），但清償責任有上限（只用繼承來的財產清償，自己的固有財產不需拿出來），敘述正確。","現行法採自動限定繼承（1148條第2項），繼承人不需要向法院聲請，現行法已廢除舊法的向法院聲請限定繼承程序，本選項的「聲請程序」是舊法概念，不正確。","限定繼承是現行法的默認狀態（自動適用），不需要特別計算，且拋棄前的費用另有處理規定，本選項表述不精確。"],
trap:"現行民法（2010年後修正）採「概括繼承有限責任」：繼承人自動繼承被繼承人的一切（含財產和債務），但對「債務的清償責任」只限於繼承所得遺產範圍——不需要像舊法那樣向法院聲請「限定繼承」，現在是自動適用的限定責任。舊法需向法院聲請，新法不需要，這個修法後的改變是考試重點。",related:"與99年第39題（繼承人以繼承所得遺產為限負責）、106年第4題（繼承效力的各種敘述）同屬限定繼承主題，三題合併複習。"},
{id:"EEF055",cat:"E4繼承遺囑",year:"112年第3題",q:"有關限制行為能力之敘述，下列何者正確？",
opts:["滿16歲之未成年人寫遺囑時，仍須經法定代理人同意，否則效力未定","滿16歲之未成年人可以自行訂立遺囑，不須經法定代理人同意","未成年人雖有識別能力，仍不負侵權行為損害賠償責任","未成年人至法院辦理拋棄繼承，無須得法定代理人之同意"],correct:1,
exps:["遺囑是法律特別允許限制行為能力人（滿16歲）獨立完成的行為，不需要法定代理人同意，本選項說需要法定代理人同意，不正確。","（本題答案）民法1186條第2項：滿16歲以上得為遺囑，且遺囑不適用「需法定代理人允許」的一般規定——滿16歲可以自行立遺囑，無需法定代理人同意，敘述正確。","民法187條：未成年人有識別能力時，對侵權行為仍需負損害賠償責任（與法定代理人連帶），本選項說不負責，不正確。","拋棄繼承是財產上的重要事項，未成年人拋棄繼承通常需要法定代理人（父母）的同意才能進行，本選項說不需要同意，不正確。"],
trap:"遺囑的特殊規則（1186條）：①滿16歲才能立遺囑（不是18歲）②立遺囑不需要法定代理人同意（遺囑是法律允許的例外獨立行為）。這兩個「例外規定」是遺囑制度最常考的特殊性，要特別記住「遺囑=16歲+不需同意」這個組合。",related:"與104年第39題（18歲自書遺囑有效，因16歲以上即得為遺囑）、105年第40題（各種遺囑形式有效性）同屬遺囑年齡與要件主題，三題合併複習。"},
{id:"EEF056",cat:"E4繼承遺囑",year:"112年第23題",q:"關於遺產繼承之敘述，下列何者錯誤？",
opts:["非婚生子女非經生父認領或準正，不得繼承其生父之遺產","遺產繼承人，除配偶外，依直系血親卑親屬等四順位繼承","繼承人拋棄繼承後，若繼承人另有其他有繼承權之血親，其血親之配偶得代位繼承","繼承人有拋棄繼承、喪失繼承資格或其他法律規定，導致繼承人之選位順序可能發生變動"],correct:2,
exps:["非婚生子女與生父的親子關係，需要生父認領（或準正）才確立法律關係——未認領時，非婚生子女在法律上沒有與生父的父子/父女關係，不能繼承生父，敘述正確，非本題答案。","民法1138條：繼承人除配偶外，第一順位直系血親卑親屬、第二順位父母、第三順位兄弟姊妹、第四順位祖父母，共四順位，敘述正確，非本題答案。","（本題答案，敘述錯誤）代位繼承（民法1140條）適用的主體是繼承人的「直系血親卑親屬」（如子女），不是「配偶」——血親的配偶是姻親，不在代位繼承的適用範圍內，本選項說血親的配偶得代位繼承，與1140條規定相反，是本題錯誤敘述。","繼承人資格的變動（拋棄、喪失等）確實會影響繼承順序，敘述正確，非本題答案。"],
trap:"代位繼承（民法1140條）只適用於繼承人的「直系血親卑親屬」代位——繼承人的配偶（姻親）不能代位繼承。例如：第一順位繼承人（子）先於被繼承人死亡，子的直系血親卑親屬（孫）可代位；但子的配偶（媳婦）不能代位繼承被繼承人（甲）的遺產，媳婦只能繼承自己配偶（子）的遺產。",related:"與111年第3題（兄弟之子女可代位繼承）、101年第21題（代位繼承只適用繼承人先死）同屬代位繼承主題，三題合併複習。"},
{id:"EEF057",cat:"E4繼承遺囑",year:"112年第24題",q:"關於回復喪失繼承權之敘述，下列何者錯誤？",
opts:["子女為了遺產而謀殺父親，即喪失對父親之繼承權，因被繼承人原諒繼承人，繼承人得以回復繼承權","繼承人對被繼承人以詐欺妨礙其所立之遺囑者，喪失其繼承權","繼承人隱匿遺囑情節重大者，被繼承人得向法院聲請宣告喪失繼承權","繼承人偽造關於繼承之文書，情節重大者，法院得依被繼承人之聲請，宣告喪失繼承權"],correct:0,
exps:["（本題答案，敘述錯誤）民法1145條第1項第1款：故意殺害被繼承人，喪失繼承權——此款為「絕對喪失」（當然喪失，無法回復），即使被繼承人原諒，也不能以遺囑恢復其繼承權（第1項是法定喪失，不適用第2項的可恢復機制），本選項說被繼承人原諒後可以回復，與法律規定相反，是本題錯誤敘述。","民法1145條第1項第3款：以詐欺妨礙遺囑，喪失繼承權，敘述正確，非本題答案。","民法1145條第2項：繼承人隱匿遺囑情節重大者，被繼承人得向法院聲請宣告喪失繼承權，敘述正確，非本題答案。","民法1145條第2項：繼承人偽造繼承文書情節重大者，被繼承人得聲請法院宣告喪失繼承權，敘述正確，非本題答案。"],
trap:"喪失繼承權分「自動喪失（第1項）」和「法院宣告喪失（第2項）」：第1項（如故意殺害被繼承人）→自動當然喪失，不能被被繼承人的原諒而恢復；第2項（如情節重大的隱匿遺囑等）→法院宣告後喪失，被繼承人可以用遺囑恢復。本題的謀殺屬第1項，不能回復，是最嚴重的喪失事由。",related:"與110年第24題（喪失繼承權的各種事由）、99年第32題（過失不喪失繼承權）同屬繼承權喪失主題，三題合併複習。"},
{id:"EEF058",cat:"E4繼承遺囑",year:"112年第25題",q:"關於拋棄繼承之敘述，下列何者錯誤？",
opts:["應於知悉其得繼承之時起三個月內，以書面向法院為之","拋棄繼承後，應通知因其拋棄而應繼承之人；如不能通知者，得以公告代之（毋須再通知）","拋棄繼承後，其應繼分歸屬其他同順位之繼承人","繼承之拋棄，溯及於繼承開始時發生效力"],correct:1,
exps:["民法1174條第1項：知悉得繼承之時起三個月內，以書面向法院聲明拋棄，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1174條第3項：拋棄繼承者，應以書面通知因其拋棄而應為繼承之人；如不能通知者，應「公告之」——公告不能取代通知，當通知可行時，必須通知；只有在不能通知的情形下，才改以公告代替。本選項說「毋須再通知」，暗示公告後就不需通知，與法條要求先嘗試通知、不能通知才公告的精神不符，是本題錯誤敘述。","拋棄後應繼分歸其他同順位繼承人，敘述正確，非本題答案。","民法1175條：拋棄繼承溯及繼承開始時生效，敘述正確，非本題答案。"],
trap:"拋棄繼承後的通知義務：①能通知→以書面通知因其拋棄而應繼承的人；②不能通知→才以公告代替。公告不是「毋須再通知」的工具，而是在無法通知時才用的替代方式。考試常把「不能通知才公告」說成「可以直接公告不需通知」，製造陷阱。",related:"與105年第39題（拋棄繼承的完整程序）、103年第35題（拋棄繼承的期間）同屬拋棄繼承主題，三題合併複習。"},
{id:"EEF059",cat:"E4繼承遺囑",year:"113年第23題",q:"甲男與乙女結婚後，並無任何子女。嗣後，甲男死亡，繼承人為乙與甲之父母丙丁。關於乙女之應繼分，下列敘述，何者正確？",
opts:["乙女之應繼分為遺產三分之一","乙女之應繼分為遺產二分之一","乙女之應繼分為遺產四分之三","乙女之應繼分為遺產四分之一"],correct:1,
exps:["遺產1/3不是正確的計算結果（配偶與父母共同繼承，配偶應繼分為1/2）。","（本題答案）民法1144條第2款：配偶與第二順位（父母）共同繼承時，配偶應繼分為「1/2」——甲無子女，繼承人是配偶乙和父母丙丁，乙取1/2，丙丁各取1/4，乙的應繼分=遺產的1/2，敘述正確。","3/4不是正確的計算結果。","1/4不是正確的計算結果。"],
trap:"配偶與第二順位（父母）共同繼承：配偶應繼分1/2，父母共享剩下的1/2（各取1/4）。與配偶和第一順位（子女）共同繼承：各1/2。與配偶和第三順位（兄弟姊妹）共同繼承：配偶2/3，兄弟姊妹共享1/3。與配偶和第四順位（祖父母）共同繼承：配偶2/3，祖父母共享1/3。這四種組合是繼承應繼分計算的核心，必須背熟。",related:"與102年第40題（配偶與父母共同繼承）、104年第38題（複雜繼承計算）同屬應繼分計算主題，三題合併複習各種組合的計算方式。"},
{id:"EEF060",cat:"E4繼承遺囑",year:"113年第24題",q:"民法關於特留分比例之規定，下列敘述，何者錯誤？",
opts:["直系血親卑親屬之特留分為其應繼分二分之一","父母之特留分為其應繼分二分之一","兄弟姊妹之特留分為其應繼分二分之一","祖父母之特留分為其應繼分三分之一"],correct:2,
exps:["民法1223條第1款：直系血親卑親屬的特留分為應繼分的1/2，敘述正確，非本題答案。","民法1223條第2款：父母的特留分為應繼分的1/2，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1223條第3款：兄弟姊妹的特留分為應繼分的「1/3」，不是1/2——本選項說兄弟姊妹特留分為應繼分1/2，把兄弟姊妹的特留分比例說成跟直系血親卑親屬一樣，與法條規定不符，是本題錯誤敘述。","民法1223條第4款：祖父母的特留分為應繼分的1/3，敘述正確，非本題答案。"],
trap:"特留分比例分兩組（再次確認）：①1/2：直系血親卑親屬、父母、配偶（民法1223條第1-3款中前三種）②1/3：兄弟姊妹、祖父母（1223條後兩種）。本題把兄弟姊妹的1/3說成1/2，是典型的特留分比例混淆陷阱——兄弟姊妹和祖父母同屬1/3，這個組合要背牢。",related:"與100年第40題（祖父母特留分為應繼分1/3）、104年第40題（計算特留分金額）同屬特留分主題，三題合併複習。"},
{id:"EEF061",cat:"E4繼承遺囑",year:"113年第25題",q:"甲死亡後留有土地一筆，由其妻乙、兒子丙及女兒丁及戊繼承，因丙不想繼承該筆土地，故向法院以書面聲明拋棄繼承，並依法通知有繼承權之人。下列敘述，何者正確？",
opts:["丙之拋棄繼承，溯及繼承開始後3個月時生效","丙之拋棄繼承後，丙的兒子己可代位繼承丙的應繼分","拋棄繼承後，丙之應繼分由乙承繼","拋棄繼承後，丙之應繼分由乙、丁、戊承繼，三人依其本來應繼分之比例繼承"],correct:3,
exps:["拋棄繼承溯及「繼承開始時」生效（民法1175條），不是3個月後，本選項錯誤。","丙是活著的人拋棄繼承，己不能代位繼承（代位繼承只在繼承人先死時適用），本選項不正確。","丙拋棄後，其應繼分由同順位的其他繼承人（乙丁戊）承繼，不是只歸乙，本選項不正確。","（本題答案）丙（第一順位）拋棄後，丙的應繼分由同順位的乙（配偶，與第一順位共同繼承）、丁和戊（同為第一順位直系血親卑親屬）承繼，依三人本來應繼分的比例分配丙的份額，敘述正確。"],
trap:"拋棄繼承後的應繼分流向：由「同順位其他繼承人」依其原應繼分比例承繼——不是單獨歸某一人，不是由下一順位繼承人繼承（只要同順位還有其他人），也不適用代位繼承（代位繼承只在繼承人先死時才發生）。",related:"與100年第38題（丙拋棄後孫丙仍可繼承的情形）、105年第39題（拋棄繼承的完整程序）同屬拋棄繼承主題，三題合併複習。"},
{id:"EEF062",cat:"E4繼承遺囑",year:"114年第21題",q:"民法對於法定繼承人及其順序，於第1138條設有明文規定。下列相關之說明，何者正確？",
opts:["被繼承人死亡時之配偶，不得與直系血親卑親屬共同為繼承人","被繼承人之父母，其順序先於被繼承人之兄弟姊妹","被繼承人之祖父母，其順序先於被繼承人之兄弟姊妹","被繼承人之祖父母，其繼承順序排列在被繼承人之兄弟姊妹之後"],correct:3,
exps:["配偶是「當然繼承人」，可以和任何順位的繼承人共同繼承，本選項說不得共同繼承，不正確。","父母（第二順位）確實先於兄弟姊妹（第三順位），敘述正確，非本題答案（本題問「正確」，多個選項可能正確，但D更直接正確）。","祖父母（第四順位）排在兄弟姊妹（第三順位）之「後」，不是之「前」，本選項說祖父母先於兄弟姊妹，是錯誤的（與D完全相反）。","（本題答案）民法1138條：第三順位是兄弟姊妹，第四順位是祖父母——祖父母的繼承順序排在兄弟姊妹之後，敘述正確。"],
trap:"繼承順位口訣再確認：「子（第一）→父母（第二）→兄弟姊妹（第三）→祖父母（第四）」。祖父母排在兄弟姊妹之後是最容易搞錯的——很多人直覺認為「長輩應該優先」，但民法設計是「血親的疏遠程度」決定順位，兄弟姊妹（旁系二親等）比祖父母（直系二親等）更近……不對，祖父母是直系二親等，兄弟姊妹是旁系二親等，照理說直系應優先。考試直接背順序：子/父母/兄弟姊妹/祖父母，不要用邏輯推導。",related:"與100年第37題（繼承順位記憶）、111年第3題（兄弟之子女可代位繼承）同屬繼承順位主題，三題合併複習。"},
{id:"EEF063",cat:"E4繼承遺囑",year:"114年第22題",q:"我國現行民法對於繼承制度，原則上採取概括繼承有限責任之規範型態。下列何者屬於正確之敘述？",
opts:["概括繼承人如對於被繼承人之特定債務，拋棄其繼承，僅該特定債務不被概括繼承","繼承人因限定繼承，僅繼承被繼承人財產上之積極財產（即資產），而不繼承被繼承人財產上之消極財產（即負債）","概括繼承人對被繼承人之特定財產，拋棄其繼承，僅該特定財產不被概括繼承","繼承人以自己之固有財產，負責清償被繼承人之所有債務"],correct:0,
exps:["（本題答案）繼承制度採「全部或全不」原則——繼承人不能選擇性地拋棄特定債務或特定財產而繼承其餘，拋棄繼承必須針對全部遺產一次拋棄，不能「只拋棄某一筆債務」。本選項描述了「部分拋棄」是不可行的，敘述正確（概括繼承人不能只拋棄特定債務）。","現行限定繼承（1148條第2項）是概括繼承一切（含積極和消極財產），只是清償責任以繼承財產為限，不是「只繼承資產不繼承負債」，本選項不正確。","同選項A的邏輯：不能選擇性拋棄特定財產，本選項說可以只拋棄特定財產，不正確。","現行限定繼承，繼承人對被繼承人債務的清償責任以繼承所得遺產為限，不需用固有財產清償，本選項不正確。"],
trap:"繼承的「全部或全不」原則：繼承人要不就全部繼承（概括繼承），要不就全部拋棄（拋棄繼承），不能「選擇性繼承」（如只繼承財產不繼承債務，或只拋棄特定債務）——這是繼承制度的重要基本原則，也是考試常考的概念。",related:"與111年第16題（限定繼承的正確定義）、106年第4題（不能以法律規定以外方式限定繼承責任）同屬繼承責任制度主題，三題合併複習。"},
{id:"EEF064",cat:"E4繼承遺囑",year:"114年第23題",q:"依我國民法有關遺囑之規定，下列敘述何者錯誤？",
opts:["甲立遺囑，遺囑中將A地贈與好友乙。乙於甲之遺囑生效前意外死亡，甲之繼承人依遺囑應將A地移轉予乙之繼承人","未滿16歲之人得立遺囑，但應由法定代理人代立","自書遺囑須由遺囑人親筆書寫遺囑全文、記明年、月、日並親自簽名","遺囑人得隨時以遺囑或其他行為撤回遺囑，並不影響其撤回之效力"],correct:0,
exps:["（本題答案，敘述錯誤）民法1201條：受遺贈人於遺囑生效前死亡，遺贈不生效力——乙在甲遺囑生效前死亡，遺贈無效，A地應回到遺產中由繼承人繼承，不是移轉給乙的繼承人，本選項說應移轉予乙之繼承人，與1201條規定相反，是本題錯誤敘述。","未滿16歲不得立遺囑（1186條第1項準用無行為能力的規定），且遺囑不得由他人代立（不得代理），本選項兩個說法都錯誤，但依官方答案A（A才是最錯的），B的「未滿16歲得立遺囑」本身就錯，但本題問的是唯一的錯誤，可能A的錯誤更直接對應1201條。","自書遺囑三要件：自書全文、記明年月日、親自簽名，敘述正確，非本題答案。","遺囑人得隨時撤回遺囑（民法1219條），敘述正確，非本題答案。"],
trap:"受遺贈人先死→遺贈無效（民法1201條）：受遺贈人必須在遺囑生效時（被繼承人死亡時）仍活著，才能取得遺贈——受遺贈人先死，遺贈消滅，不發生由受遺贈人的繼承人繼承遺贈物的效果（遺贈沒有代位制度）。這與繼承的代位繼承（繼承人先死，其子女代位）完全不同，要特別記住「遺贈=受遺贈人先死，遺贈失效，無代位」。",related:"與101年第8題（受遺贈人先死遺贈無效）、108年第23題（遺囑可以隨時撤回）同屬遺囑遺贈主題，三題合併複習。"},
{id:"EEF065",cat:"E4繼承遺囑",year:"114年第24題",q:"關於生前特種贈與的歸扣，下列何者錯誤？",
opts:["生前特種贈與，包括因結婚、分居、營業所為之贈與","須有其他繼承人行使歸扣，且其應繼分因而受影響者，始能主張歸扣","繼承人之一同意拋棄歸扣，於遺產分割時，其應得部分依歸扣計算後，以原應繼分計算之","生前特種贈與之歸扣，被繼承人可以以遺囑排除，亦可由繼承人自行達成協議不計算"],correct:3,
exps:["民法1173條：特種贈與包括結婚、分居、營業三種情形，敘述正確，非本題答案。","歸扣制度需要有其他繼承人主張，且其應繼分受影響，才有歸扣的意義，敘述正確，非本題答案。","繼承人之一同意拋棄歸扣（免除歸扣），計算其本身的應繼分時仍依原應繼分計算，敘述符合1173條的精神，非本題答案。","（本題答案，敘述錯誤）民法1173條第3項：被繼承人為了特種贈與，得以遺囑聲明不在歸扣之列——被繼承人確實可以用遺囑排除歸扣；但「繼承人自行協議不計算」則需視具體情形，依規定歸扣是繼承人的「權利」（不是義務），繼承人可以拋棄這個歸扣請求，但不能以「協議」代替遺囑指示，本選項把兩者並列說法有問題，且說「亦可由繼承人自行達成協議不計算」混淆了繼承人可拋棄歸扣請求（個別行使）和繼承人協議整體排除（可能與遺嘱衝突）的不同，依官方答案D，本選項是本題錯誤敘述。"],
trap:"特種贈與歸扣的排除：①被繼承人可以用遺囑指明不歸扣（1173條第3項）；②個別繼承人可以自願放棄歸扣請求（那是那個繼承人的自由）——但繼承人全體協議「不計算歸扣」是否有效，需視是否與遺囑或法律規定牴觸，本題說法過於簡化，是本段的進階考點。",related:"與111年第1題（何種贈與無須歸扣）、99年第35題（結婚贈與應歸扣）同屬特種贈與歸扣主題，三題合併複習。"},
{id:"EEF066",cat:"E4繼承遺囑",year:"114年第25題",q:"甲夫乙妻，一起到夏威夷旅遊，租車亂跑，不幸墜入山谷。下列何者錯誤？",
opts:["甲、乙被發現時，由屍體的腐壞程度可以斷定甲先於乙死亡，則甲之遺產由乙先繼承","甲、乙同時死亡，或無法確定何人先死亡，則甲乙互不繼承","甲、乙死亡之先後無從確認時，推定其同時死亡，互不繼承","甲、乙死亡之先後無從確認，在繼承上，推定甲乙互不繼承，故甲乙各自之繼承人分別繼承甲乙之遺產"],correct:1,
exps:["可以確認甲先死亡時（有科學依據），乙可以繼承甲的遺產，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法11條：二人以上同時遇難，不能證明其死亡之先後時，「推定其同時死亡」——不是「同時死亡或無法確認時」就絕對互不繼承，而是推定同時死亡（如果能推翻推定，仍可繼承），本選項把「推定」說成「必然」，且表述不夠精確，是本題錯誤敘述。","民法11條：無從確認死亡先後→推定同時死亡→互不繼承，敘述正確，非本題答案。","推定同時死亡→各自的繼承人各自繼承，敘述正確，非本題答案。"],
trap:"同時死亡的推定（民法11條）：二人以上同時遇難，不能確認死亡先後時，推定「同時死亡」，互不繼承——但這是「推定」（可以舉反證推翻），若有科學依據（如屍體腐壞程度）可確認死亡先後，就不適用推定，先死者的遺產由後死者（若後死者還活著）先繼承。",related:"與101年第17題（胎兒繼承甲的遺產）、109年第25題（甲先死乙後死的連環繼承）同屬繼承的時間問題主題，三題合併複習。"},
{id:"EEF067",cat:"E1婚約婚姻結婚",year:"100年第32題",q:"依民法關於結婚之規定，下列敘述何者錯誤？",
opts:["未成年人結婚，應由法定代理人代為意思表示","表兄妹結婚者，無效","有配偶者再婚者，其婚姻無效","當事人之一方於結婚時不能人道而不能治者，他方得向法院請求撤銷之"],correct:0,
exps:["（本題答案，敘述錯誤）未成年人結婚須法定代理人「同意」，不是「代為意思表示」——結婚屬人性，須本人為之，法定代理人只能同意不能代理，本選項錯誤。","表兄妹（舊法）禁止結婚無效，在當時法律下敘述正確。","重婚無效（民法985條），敘述正確。","不能人道不能治，他方得向法院請求撤銷（民法995條），敘述正確。"],
trap:"結婚屬人性：法定代理人只能「同意」（允許），不能「代為意思表示」——這是婚姻制度最基本的人身屬性體現，也是最常考的結婚要件細節。",related:"與102年第33題（未達婚齡結婚的效力）、106年第19題（結婚各種規定）同屬結婚要件主題。"},
{id:"EEF068",cat:"E1婚約婚姻結婚",year:"100年第36題",q:"下列親屬若未同居一處，何者不互負扶養義務？",
opts:["父母子女間","夫妻之間","兄弟姊妹相互間","直系姻親相互間"],correct:3,
exps:["父母子女互負扶養義務，不需同居，非本題答案。","夫妻互負扶養義務，不需同居，非本題答案。","兄弟姊妹相互間負扶養義務，不需同居，非本題答案。","（本題答案）直系姻親（婆媳、翁婿）須「同居」才互負扶養義務——未同居，直系姻親不互負扶養義務，敘述正確。"],
trap:"直系姻親的扶養義務需「同居」——這是與父母子女/兄弟姊妹不同的特別限制，直系姻親間的扶養以同居為前提。",related:"與104年第7題（扶養請求屬人身專屬不得代位）同屬扶養主題。"},
{id:"EEF069",cat:"E1婚約婚姻結婚",year:"101年第26題",q:"甲十八歲，已婚，下列敘述何者最正確？",
opts:["甲已成年","甲得獨立為有效之單獨行為","甲授與代理權給乙，其授權行為效力未定","甲得自行訂立任何契約，均生效力"],correct:1,
exps:["舊法20歲成年，甲18歲未成年，本選項在舊法下不正確。","（本題答案）民法13條第3項：未成年人已結婚者，有行為能力——甲已婚，視為有行為能力，可獨立為單獨行為，敘述正確。","甲已婚取得行為能力，授權行為確定有效，非效力未定，不正確。","雖有行為能力，仍受其他限制，不是「任何契約均生效」，過於絕對。"],
trap:"婚姻賦予未成年人完全行為能力（民法13條第3項）——已婚未成年人視為有行為能力，可以獨立進行法律行為。現行法18歲成年後此條意義減少，但仍是重要法律知識。",related:"與108年第6題（已婚未成年人監護）同屬婚姻與行為能力主題。"},
{id:"EEF070",cat:"E1婚約婚姻結婚",year:"102年第6題",q:"甲男乙女結婚時約定，雙方婚後若有婚外情之情事發生，雙方無條件離婚，並賠償對方新臺幣1000萬元。此約定的法律效力為何？",
opts:["此約定有效，因甲乙係以雙方自由意志達成合意","此約定有效，因離婚係法律所允許","此約定有效，但賠償金額1000萬若過高，法院得予酌減","此約定因違反公序良俗而無效"],correct:3,
exps:["自由意志不能突破公序良俗，不正確。","離婚合法但預先強制安排違反婚姻自由，不正確。","約定本身無效，無須討論酌減，不正確。","（本題答案）婚前預設「婚外情即無條件離婚」，規避離婚法定程序，違反公序良俗（民法72條）而無效，敘述正確。"],
trap:"婚姻法定程序不得以事前契約規避——離婚須依法辦理（協議離婚或裁判離婚），預先以婚約約定自動離婚的安排違反公序良俗。",related:"與106年第18題（婚約不得強制履行）同屬婚姻效力主題。"},
{id:"EEF071",cat:"E1婚約婚姻結婚",year:"102年第16題",q:"甲男與乙女已經訂婚，而且同居，雖尚未結婚，但感情非常好。甲男某日外出工作，遭無照駕駛之丙喝酒闖紅燈撞擊，當場死亡。下列敘述何者正確？",
opts:["乙女為甲之未婚妻，得請求丙賠償精神上損害","乙女為甲之未婚妻，得繼承甲之遺產","乙女為甲之配偶，得請求丙賠償精神上損害","乙女僅得依一般侵權行為法則對丙主張損害賠償，且其範圍有限制"],correct:3,
exps:["乙是未婚妻（非配偶），不在195條特別保護範圍，本選項不正確。","未婚妻無繼承權，本選項不正確。","乙不是甲的配偶，本選項不正確。","（本題答案）乙無法依195條（配偶身分）請求，但仍可依一般侵權行為向丙主張有限度的損害賠償，敘述正確。"],
trap:"婚約不給予配偶的法律地位——未婚妻無繼承權、無195條配偶精神損害賠償請求，只有完成婚姻登記才取得配偶身分。",related:"與106年第18題（婚約效力）同屬婚約法律效果主題。"},
{id:"EEF072",cat:"E1婚約婚姻結婚",year:"102年第33題",q:"甲男20歲，乙女15歲，二人一見鍾情，決定廝守終身，於是結婚。乙女尚未滿適婚年齡，亦尚未懷孕。下列敘述何者正確？",
opts:["乙女未滿適婚年齡，故甲乙間之婚姻當然無效","乙女未滿適婚年齡，故甲乙間之婚姻效力未定，需法院審查","乙女未滿適婚年齡（修法前），甲或乙之父母得向法院請求撤銷之","乙女未滿適婚年齡，故乙女得拋棄結婚之意思表示，使婚姻歸於無效"],correct:2,
exps:["未達婚齡是得撤銷，不是當然無效，不正確。","不是效力未定，是得撤銷，不正確。","（本題答案）民法989條（舊法）：未達婚齡結婚，當事人或法定代理人得向法院請求撤銷，敘述正確。","撤銷需向法院請求，不是自行拋棄意思表示，不正確。"],
trap:"婚齡瑕疵：未達法定婚齡→得撤銷（非無效）→當事人或法定代理人向法院請求撤銷。",related:"與100年第32題（未成年人結婚須同意非代理）、106年第19題（結婚要件）同屬婚齡主題。"},
{id:"EEF073",cat:"E1婚約婚姻結婚",year:"102年第34題",q:"關於姻親關係，下列敘述何者正確？",
opts:["甲之兒子乙與丙女結婚，甲與丙無姻親關係","甲之配偶乙，乙有一個哥哥丙，甲與丙無姻親關係","甲男與乙女結婚，乙女與前夫所生之子丙，甲與丙無姻親關係","甲死亡後，甲之配偶乙與丁男再婚，乙與甲之父母間的姻親關係消滅"],correct:3,
exps:["甲是乙父親，乙妻丙是甲的直系姻親，甲與丙有姻親關係，不正確。","乙哥哥丙（旁系姻親二親等），甲與丙有姻親關係，不正確。","乙前夫所生之子丙是乙的子女，甲（繼父）與丙有姻親關係，不正確。","（本題答案）民法971條：姻親因配偶死亡消滅——甲死後，乙與甲父母的姻親關係消滅，敘述正確。"],
trap:"姻親消滅時機：配偶死亡或離婚後，對應的姻親關係消滅。甲死→乙（甲前配偶）與甲家人的姻親關係消滅。",related:"與104年第33題（親等計算）、108年第20題（直系vs旁系姻親識別）同屬親屬關係主題。"},
{id:"EEF074",cat:"E1婚約婚姻結婚",year:"104年第33題",q:"甲之兄長乙與丙結婚，丙有兄長丁。關於四人之親系及親等關係，下列敘述，何者錯誤？",
opts:["甲與乙為旁系血親二親等","乙與丁為旁系姻親二親等","甲與丁為旁系姻親三親等","甲與丙為直系姻親一親等"],correct:3,
exps:["甲乙是兄弟，旁系血親二親等，正確，非本題答案。","乙（甲兄）與丁（丙兄，大舅子），旁系姻親二親等，正確，非本題答案。","甲（乙弟）與丁（丙兄）：甲→乙二親等→丁二親等，旁系姻親三親等，正確，非本題答案。","（本題答案，敘述錯誤）甲與丙（嫂子）：乙（甲兄）的妻丙是甲的旁系姻親（二親等），不是直系姻親，本選項說直系姻親一親等，錯誤。"],
trap:"嫂子/弟媳是「旁系姻親」不是「直系姻親」——直系姻親=配偶的直系血親（公婆/岳父母/媳婦/女婿），配偶的兄弟姊妹是旁系姻親。",related:"與108年第20題（直系vs旁系姻親的識別）同屬親等計算主題。"},
{id:"EEF075",cat:"E1婚約婚姻結婚",year:"104年第34題",q:"甲男婚外情，甲妻丁得知忿而與甲離婚，並完成登記。甲旋即與乙女於教堂牧師見證下，宣布結為夫妻，並請鄰近攤販丙、戊於結婚證書上簽名。下列敘述，何者正確？",
opts:["甲丁之離婚有效，甲乙之結婚有效","甲丁之離婚有效，甲乙之結婚有效，但因甲有婚外情，丙戊之見證不合乎道德","甲丁之離婚有效，甲乙之結婚無效，因應在戶政機關完成登記","甲丁之離婚有效，甲乙之結婚無效，因未依法辦理結婚登記"],correct:3,
exps:["甲乙未辦戶政登記，現行法下結婚不成立，不正確。","見證人道德問題不影響法律效力，不正確。","C方向正確但不夠完整。","（本題答案）現行法（民法982條）：結婚須書面+二人以上見證人+向戶政機關登記——甲乙未辦戶政登記，結婚不成立（無效），敘述正確。"],
trap:"現行法結婚三要件：書面、二人以上見證人、向戶政機關登記——缺少任一要件，結婚不成立。",related:"與100年第32題（結婚不得代理，須本人為之）同屬結婚成立要件主題。"},
{id:"EEF076",cat:"E1婚約婚姻結婚",year:"105年第31題",q:"下列何者違反近親禁婚範圍之規定？",
opts:["甲先收養丙男，再收養丁女，丙與丁之結婚","甲有一子乙，再收養一女丙，之後乙與丙結婚","甲有一子乙，乙與丙結婚，丙有一兄丁，丁與甲之女兒戊結婚","甲有一女乙，丙收養乙，丙之兒子丁與乙結婚"],correct:0,
exps:["（本題答案）甲先後收養丙男和丁女，丙丁是養兄妹（法律上視同血親兄弟姊妹，旁系血親二親等），依民法983條禁止結婚，違反禁婚規定，敘述正確（違反）。","乙是親生子，丙是養女，乙丙是法律上的兄妹（兄弟姊妹），同樣禁婚……但官方答案A，表示B不違反（可能B中乙丙年齡或條件有所不同，以官方答案A為準）。","丁戊無血親或養親關係，可以結婚，不違反。","丁是丙的親生子，乙是丙的養女，丁乙是養兄妹，應屬禁婚……以官方答案A為準，只有A違反。"],
trap:"養兄妹（養父母分別收養的子女）在法律上視同血親兄弟姊妹，禁止結婚——收養確立的擬制血親關係等同真實血親，禁婚規定同樣適用。",related:"與111年第2題（哪種不在禁婚範圍）同屬近親禁婚主題。"},
{id:"EEF077",cat:"E1婚約婚姻結婚",year:"106年第18題",q:"關於婚約下列敘述何者正確？",
opts:["婚約，得由未成年人之法定代理人代理為之","未成年人訂定婚約，無須經法定代理人之同意","婚約，得請求法院強制履行","婚約須男女雙方合意，並向戶政機關辦理登記，始為有效"],correct:3,
exps:["婚約不得代理，具屬人性，不正確。","未成年人訂婚須法定代理人同意，本選項說無須，不正確。","婚約不得強制履行（民法975條），只能請求損害賠償，不正確。","（本題答案）婚約須男女雙方合意（屬人性）；婚約不需戶政登記（無登記制度）……本選項說須向戶政機關登記，實際上婚約不需登記，但官方答案D，以此為準。"],
trap:"婚約屬人性：①不得代理②未成年須法定代理人同意③不得強制履行（違反只能請求賠償）。",related:"與102年第16題（婚約不給配偶身分）同屬婚約效力主題。"},
{id:"EEF078",cat:"E1婚約婚姻結婚",year:"106年第19題",q:"關於結婚，下列敘述何者正確？",
opts:["男未滿17歲，女未滿15歲者，不得結婚","結婚應以公開儀式為之","直系血親及直系姻親在相互間永遠不能結婚","夫妻之一方以惡意遺棄他方在繼續狀態中者，他方得向法院請求裁判離婚"],correct:3,
exps:["現行法男女均須年滿18歲，舊法數字已修改，本選項用舊法數字，不正確。","現行法結婚須書面+見證人+戶政登記，不是「公開儀式」，不正確。","直系姻親禁婚具永久性，但本選項說法過於絕對，C可能正確但D更直接，以官方答案D為準。","（本題答案）民法1052條第1項第5款：惡意遺棄他方在繼續狀態中，他方得請求裁判離婚，敘述正確。"],
trap:"裁判離婚事由（民法1052條）：惡意遺棄在繼續狀態是明文的裁判離婚事由——惡意+遺棄+繼續狀態，三個要件都要具備。",related:"與104年第34題（現行法結婚須戶政登記）同屬婚姻要件主題。"},
{id:"EEF079",cat:"E1婚約婚姻結婚",year:"108年第20題",q:"甲育有子女乙，丙育有子女丁、戊，乙男與丁女結婚後育有子女己。就此情形，下列敘述何者錯誤？",
opts:["甲、丁為直系姻親","乙、戊為旁系姻親二親等","乙與己為直系血親一親等","乙、丙為直系姻親一親等"],correct:2,
exps:["甲是乙父，丁是乙妻，甲與丁（乙妻）是直系姻親，正確，非本題答案。","乙（丁夫）與戊（丁兄弟）是旁系姻親二親等，正確，非本題答案。","（本題答案，敘述錯誤）乙是己的父親，乙與己是直系血親一親等——這個敘述本身「正確」，但本題官方答案C，表示C的表述有某種錯誤，以官方答案C為準。","丙是丁的父親（乙的岳父），乙與丙是直系姻親一親等，正確，非本題答案。"],
trap:"直系姻親vs旁系姻親：公婆/岳父母/媳婦/女婿=直系姻親；大伯/小叔/大姑/小姨等配偶的旁系血親=旁系姻親。",related:"與104年第33題（親等計算）同屬親屬關係計算主題。"},
{id:"EEF080",cat:"E1婚約婚姻結婚",year:"110年第22題",q:"民法關於非婚生子女之規定，下列何者錯誤？",
opts:["如有受推定為婚生子女情形，夫妻之一方或子女能證明子女非為婚生子女者，得提起認領之訴","非婚生子女，其生母無須認領即為其親生母親","非婚生子女與生父之關係，須生父認領後，始視為婚生子女","非婚生子女由其生母扶養，但法院得命其生父負擔相當之費用"],correct:0,
exps:["（本題答案，敘述錯誤）有婚生推定時要否認，應提「否認子女之訴」，不是「認領之訴」——兩種訴訟的方向完全相反，本選項混淆程序名稱，是本題錯誤敘述。","非婚生子女與生母的關係不需認領自然確立，正確，非本題答案。","與生父的關係須認領後確立，正確，非本題答案。","非婚生子女由生母扶養，法院可命生父分擔費用，正確，非本題答案。"],
trap:"否認婚生（否認子女之訴）vs認領非婚生（認領）：方向完全相反，不能互換。有婚生推定→否認需提「否認子女之訴」；無婚生推定→確認父子關係需「認領」。",related:"與113年第22題（否認婚生子女之訴的期間）同屬親子關係主題。"},
{id:"EEF081",cat:"E1婚約婚姻結婚",year:"111年第2題",q:"下列何種情況是非屬於近親禁止結婚之規範範圍？",
opts:["與離婚後無依無靠之前小姨子結婚","與終止收養後之前養女結婚","與自己兒子前妻結婚","與終止收養後之前養父結婚"],correct:0,
exps:["（本題答案）前小姨子（前妻的妹妹）：離婚後旁系姻親關係消滅，可以結婚，不在禁婚範圍，敘述正確。","終止收養後的前養女：養親關係確立的禁婚永久，仍屬禁婚，不正確（是禁婚範圍）。","兒子前妻（直系姻親）：直系姻親禁婚永久，仍禁婚，不正確。","終止收養後的前養父：養親禁婚永久，仍禁婚，不正確。"],
trap:"旁系姻親禁婚：離婚後消滅（不再禁婚）；直系姻親/養親關係確立的禁婚：永久，不因離婚或終止收養而消滅。",related:"與105年第31題（養兄妹結婚違反禁婚）同屬近親禁婚主題。"},
{id:"EEF082",cat:"E1婚約婚姻結婚",year:"112年第16題",q:"甲委託乙代為尋覓對象結婚，並承諾事成後給予乙報酬新臺幣10萬元。關於婚姻居間契約，下列何者正確？",
opts:["甲乙間的契約，為婚姻居間契約，甲應依約給付報酬","甲乙間的契約，非屬婚姻居間，而係一般委任","甲乙間的契約為婚姻居間契約，但違反公序良俗而無效","甲乙間的契約為婚姻居間契約，且依民法有效"],correct:2,
exps:["婚姻居間有效但報酬約定無效（民法575條後段），不正確。","是居間不是委任，不正確。","（本題答案）婚姻居間不得請求報酬，以報酬為條件違反公序良俗而無效，敘述正確。","婚姻居間不得請求報酬，有報酬約定則無效，不正確。"],
trap:"婚姻居間不得請求報酬（民法575條後段）——婚姻不能商品化，以金錢利誘促成婚姻違反公序良俗。",related:"與102年第6題（婚前約定婚外情賠償違反公序良俗）同屬婚姻效力主題。"},
{id:"EEF083",cat:"E1婚約婚姻結婚",year:"113年第10題",q:"有關意思表示之敘述，下列何者正確？",
opts:["甲與乙本為夫妻，為逃避債務，通謀虛偽離婚，並辦理離婚登記完畢，甲乙間已無婚姻關係","甲被乙詐欺以意思表示訂定合約，若甲於知悉被詐欺後2年內未撤銷，其撤銷之意思表示無效","甲被乙詐欺以意思表示訂定合約，若甲撤銷意思表示，則乙不得依不當得利法律規定，請求甲返還已給付之金錢","甲與乙通謀虛偽離婚，其離婚為無效，但不得以無效對抗善意第三人"],correct:2,
exps:["通謀虛偽離婚（民法87條）→離婚無效，婚姻仍存在，不正確。","詐欺撤銷期間是「知悉後一年內」（民法93條），非2年，不正確。","（本題答案）甲撤銷後契約視為自始無效（民法114條），乙已受領的款項依不當得利可請求返還——本選項說乙「不得」依不當得利請求，以官方答案C為準。","通謀虛偽離婚無效，是絕對無效，可以對抗第三人（87條），本選項後半不正確。"],
trap:"通謀虛偽離婚（87條）→離婚無效，婚姻仍存在；詐欺撤銷期間是一年而非兩年——這兩個細節都是考試常考的陷阱點。",related:"與104年第1-2題（通謀虛偽買賣，善意第三人保護）同屬通謀虛偽主題。"},
{id:"EEF084",cat:"E1婚約婚姻結婚",year:"113年第22題",q:"甲男與乙女結婚後，乙女與丙男發生婚外情，並生下丁。下列敘述，何者錯誤？",
opts:["丁係在甲與乙婚姻關係存續中受胎，推定為甲乙之婚生子女","甲得提起否認子女之訴，否認丁為其婚生子女","丁出生後，如有否認子女之訴，其起訴期間應自丁出生之日起算一年內","甲如想承認丁為婚生子女，因丁已受婚生推定，甲毋需另為認領，即係丁之法律上父親"],correct:2,
exps:["丁在婚姻存續中受胎，推定為婚生子女（民法1063條），正確，非本題答案。","甲可提否認子女之訴，正確，非本題答案。","（本題答案，敘述錯誤）民法1063條第3項：否認子女之訴應於「知悉」後「二年」內提起——不是「出生後一年」，起算點（知悉）和期間（二年）都與本選項不符，是本題錯誤敘述。","丁已受婚生推定，甲自然是法律上的父親，不需另外認領，正確，非本題答案。"],
trap:"否認子女之訴的期間：從「知悉」子女非婚生後「兩年內」——不是從「出生後一年」。起算點和期間兩個細節都要記對。",related:"與110年第22題（否認婚生vs認領程序的區分）同屬親子關係主題。"},
{id:"EEF085",cat:"E1婚約婚姻結婚",year:"105年第38題",q:"甲乙為夫妻育有二女丙與丁，甲為傳香火認識已婚之戊女，同居一年後生下己男，甲把己接回家中同住將其養育成人，但丙乙強烈反對而甲未辦認領之登記。試問甲己之間成立何法律關係？",
opts:["準正關係","認領關係","收養關係","撫育關係"],correct:3,
exps:["準正是指非婚生子女的生父母事後結婚，使其取得婚生子女地位（民法1064條）——本題甲乙已婚，甲無法再與戊結婚，準正的前提（生父母結婚）不能成立，本選項不正確。","認領是生父對非婚生子女承認親子關係的行為——本題甲未辦認領登記（題目明確說「未辦認領之登記」），認領未完成，本選項不正確。","收養需要一定程序（聲請法院認可等），本題沒有進行收養程序，本選項不正確。","（本題答案）甲雖未辦理認領登記，但甲把己接回家中同住並養育，形成了「撫育關係」——民法1065條第2項：非婚生子女，其生父撫育者，視為認領——「以撫育之意思，公然撫育」可以產生準認領（視為認領）的效果，甲己之間成立撫育關係（準認領），敘述正確。"],
trap:"「撫育」（事實認領）是民法1065條第2項的特殊規定：生父若有以撫育之意思公然撫育非婚生子女，即視為認領，不需要書面或登記——這個「撫育視為認領」的制度是為了保護實際上已被生父養育的非婚生子女，避免因生父未辦理書面認領而使子女失去法律上的親子關係保障。考試常考「撫育」這個概念及其法律效果（視為認領）。",related:"與102年第35題（非婚生子女的認領與準正）、110年第22題（婚生子女推定及否認）同屬非婚生子女主題，三題合併複習可完整掌握非婚生子女的法律地位規則。"},
{id:"EEF086",cat:"E1婚約婚姻結婚",year:"100年第31題",q:"關於離婚之敘述，下列何者錯誤？",
opts:["兩願離婚，雙方當事人須以書面為之","兩願離婚時，不得請求贍養費及損害賠償","法院得依職權為子女之利益，改定親權行使者","裁判離婚事由，採法定事由主義，以民法所定之事由為限"],correct:3,
exps:["兩願離婚（協議離婚）應以書面為之，有二人以上證人之簽名並辦理離婚登記（民法1050條），敘述正確，非本題答案。","兩願離婚（協議離婚）時，可以自行約定是否給付贍養費等，法律沒有強制請求權，但也沒有禁止——本選項說「不得請求」稍有不精確，但在「兩願離婚」的情境下，通常沒有法定損害賠償請求（不同於裁判離婚有法定損害賠償），方向大致正確，非本題的最明顯錯誤。","民法1055條之1：法院為子女利益得依職權改定親權行使者，為法院維護子女利益的職權，敘述正確，非本題答案。","（本題答案，敘述錯誤）裁判離婚（民法1052條）確實採「法定事由主義」（需有法定事由才可裁判離婚）——但民法1052條第2項又規定：「有前項以外之重大事由，難以維持婚姻者，夫妻之一方得請求離婚」，這是「概括條款」，不限於列舉事由，因此「以民法所定之事由為限」的說法不完整（因為有概括條款），敘述不完全正確，是本題的錯誤敘述。"],
trap:"裁判離婚的法定事由（1052條）：第1項列舉了10種法定事由（如重婚、惡意遺棄等），第2項有概括條款（有其他重大事由難以維持婚姻）——本題選項D說「以民法所定之事由為限」看似正確（因為都在民法裡），但其實第2項的概括條款讓裁判離婚事由不是封閉性列舉，而是開放性的（只要有重大難以維持婚姻的事由即可），「以民法所定事由為限」這種絕對化的表述忽略了第2項的開放性概括條款，是本題的陷阱所在。",related:"與106年第32題（離婚後的效力，含親權財產等）同屬離婚制度主題，兩題合併複習可建立完整的離婚法律效果架構。"},
{id:"EEF087",cat:"E1婚約婚姻結婚",year:"106年第32題",q:"下列有關夫妻離婚後所生身分及財產上效力之說明，何者正確？",
opts:["夫妻離婚後，其子女對未享有親權之父母一方，喪失原本享有之繼承權","夫妻離婚後，僅因裁判離婚者，有過失之一方得請求損害賠償","夫妻離婚後，其子女對生父母雙方，均不再有法定扶養請求權","夫妻離婚後，無過失之一方，若陷於生活困難，得請求他方為相當之贍養費"],correct:3,
exps:["夫妻離婚不影響親子關係——子女對父母（不論享有或未享有親權）仍有繼承權，離婚只解消夫妻關係，不改變父母子女關係，本選項錯誤。","裁判離婚損害賠償（民法1056條）：夫妻因裁判離婚，無過失之一方因此受有損害者，得請求賠償——「有過失之一方」不能請求損害賠償（有過失者不受保護），本選項說「有過失之一方得請求」不正確。","夫妻離婚不影響父母子女間的扶養義務——父母對未成年子女的扶養義務（依親屬關係）在離婚後仍然存在，本選項說不再有扶養請求權，不正確。","（本題答案）民法1057條：夫妻離婚後，無過失之一方，因判決離婚而致陷於生活困難者，他方縱無過失，亦應給與相當之贍養費——贍養費保護離婚後生活困難的無過失一方，敘述正確。"],
trap:"離婚的效力範圍：①解消夫妻關係②不影響親子關係（子女仍有繼承權和扶養請求權）③可能產生損害賠償（1056條，無過失方對有過失方）④可能產生贍養費（1057條，無過失方陷生活困難）。本題四個選項分別對應四個考點，要全部記住才能作答，是E1段難度最高的題目。",related:"與100年第31題（離婚制度各項規定）同屬離婚制度主題，兩題合併複習可完整掌握離婚的方式和法律效果。"},
{id:"EEF088",cat:"E1婚約婚姻結婚",year:"99年第37題",q:"關於收養子女，下列敘述，何者錯誤？",
opts:["收養子女應輩分相當","被收養人已結婚者，其出養之意思，自己決定，不必得配偶之同意","除夫妻共同收養外，一人不得收養二人以上為養子女","養子女與本生父母及其親屬之關係，於收養關係成立時起，暫時停止"],correct:1,
exps:["民法1073條：收養者應長於被收養者二十歲以上，且輩分相當，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1076條之1：被收養者已結婚者，收養應得其配偶之同意——被收養人已婚，其出養須得配偶同意，不能自行決定，本選項說不必得配偶同意，與法條相反，是本題錯誤敘述。","一人通常不得收養二人以上（除共同收養），敘述正確，非本題答案。","養子女與本生父母的關係在收養成立時暫時停止（民法1083條），敘述正確，非本題答案。"],
trap:"收養已婚人士的特殊要件：被收養者已結婚時，需得配偶同意（民法1076條之1）——婚姻是雙方共同生活的基礎，一方出養會影響家庭結構，故須得配偶同意。這個「被收養者配偶同意」的要件是收養制度中容易被忽略的細節。",related:"與100年第30題（收養的各種規定）、110年第6題（收養須書面並向法院聲請認可）同屬收養主題，三題合併複習。"},
{id:"EEF089",cat:"E1婚約婚姻結婚",year:"100年第30題",q:"關於收養之敘述，下列何者錯誤？",
opts:["限於未成年人，方得被收養","養父母死亡後，養子女得聲請法院許可終止收養","夫妻應共同收養子女，但有正當理由，亦得單獨收養","養子女與生父母之親屬關係，於收養關係存續期間停止，但養子女未成年且無養父母監護時，自然回復親子關係"],correct:0,
exps:["（本題答案，敘述錯誤）民法1073條：成年人亦得被收養（如收養成年人為養子女），不限於未成年人，本選項說限於未成年人，與法條不符，是本題錯誤敘述。","民法1080條：養父母死亡後，養子女得聲請法院許可終止收養，敘述正確，非本題答案。","夫妻應共同收養（民法1074條），但有正當理由，一方得單獨收養，敘述正確，非本題答案。","收養期間與生父母的關係停止，若無養父母監護時有回復機制，敘述符合民法規定，非本題答案。"],
trap:"收養不限於未成年人——成年人也可以被收養（如收養成年子女為傳承宗嗣）。民法1073條的要件是收養者應長於被收養者20歲以上（且輩分相當），不管被收養者是未成年或成年。",related:"與99年第37題（收養的各種敘述）、110年第6題（收養須書面）同屬收養主題，三題合併複習。"},
{id:"EEF090",cat:"E1婚約婚姻結婚",year:"100年第34題",q:"甲男乙女欲結婚，請問下列何種情形，甲乙不得結婚？",
opts:["甲男曾與乙女之母親結婚，後因不孕而離婚","甲18歲，乙17歲","甲之祖父與乙之父為兄弟","甲之舅父曾娶乙之舅媽，後因個性不合離婚"],correct:0,
exps:["（本題答案）甲曾與乙的母親結婚（後離婚）：甲與乙是直系姻親（甲是乙的前繼父），依民法983條，直系姻親禁止結婚，且這種禁婚在離婚後仍不消滅（直系姻親的禁婚永久性）——甲乙不得結婚，敘述正確（不得結婚）。","甲18歲乙17歲：舊法女須16歲（修法後18歲），17歲在修法後不得結婚，但此題100年時舊法女16歲就可結婚，乙17歲可以結婚（依舊法），本選項不正確（依舊法可以結婚）。","甲祖父與乙父為兄弟→甲乙為旁系血親四親等（表兄妹）：舊法禁止六親等以內，修法後僅禁止四親等以內，表兄妹是否禁婚視修法前後而定，以官方答案#（本題更正一律給分）確認。","甲舅父曾娶乙舅媽：離婚後姻親關係消滅（旁系姻親），甲與乙無禁婚關係，可以結婚。"],
trap:"直系姻親禁婚（民法983條第1項第3款）永久有效：即使離婚，直系姻親間的禁婚仍然存在——甲曾為乙母親的配偶（直系姻親），離婚後甲乙仍禁止結婚。這與旁系姻親（離婚後消滅禁婚）不同，直系姻親的禁婚具有永久性。",related:"與111年第2題（哪種情形非禁婚範圍）、105年第31題（近親禁婚的各種情形）同屬近親禁婚主題，三題合併複習。"},
{id:"EEF091",cat:"E1婚約婚姻結婚",year:"102年第32題",q:"趙男與錢女結婚，婚後產下一子登記姓名為趙大富。下列敘述何者錯誤？",
opts:["趙大富未成年前，得由父母以書面約定變更為錢大富","嗣後趙男與錢女離婚，趙大富由錢女監護，錢女得為趙大富申請更改姓氏","趙大富之姓氏，依民法規定，未滿一歲前可申請更改一次","趙大富成年後，得自行申請改從母姓"],correct:2,
exps:["父母可以書面約定子女從父姓或母姓（民法1059條），敘述正確，非本題答案。","依監護親（錢女）的申請，在有事實足認對子女有不利影響時，可為子女申請變更姓氏，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1059條並沒有「未滿一歲前可申請更改一次」的規定——子女姓氏的變更有其條件（有事實足認不利影響，法院宣告），不是「未滿一歲前自由更改」，本選項捏造了不存在的法律規定，是本題錯誤敘述。","成年後，子女得自行申請改從父姓或母姓（民法1059條第4項），敘述正確，非本題答案。"],
trap:"子女姓氏變更的條件（民法1059條）：①未成年時→父母協議或法院宣告②成年後→子女自行申請。沒有「未滿一歲前可自由更改一次」這種規定，這是本題虛構的條件，是考試捏造法條內容的典型陷阱手法。",related:"與108年第24題（子女姓氏的敘述）同屬子女姓氏主題，兩題合併複習。"},
{id:"EEF092",cat:"E1婚約婚姻結婚",year:"104年第35題",q:"關於子女之監護，下列敘述，何者錯誤？",
opts:["夫妻離婚者，對於未成年子女權利義務之行使或負擔，原則上由夫任之","夫妻未為協議或協議不成者，法院得依夫妻之一方，主管機關或社會福利機構之請求，酌定之","法院亦得依職權酌定之","夫妻離婚後，就未成年子女之監護事項，得隨時請求法院重新酌定"],correct:0,
exps:["（本題答案，敘述錯誤）夫妻離婚後，未成年子女的監護「原則上由協議決定」（民法1055條第1項），而非「原則上由夫任之」——舊法有「父為優先」的規定，但現行民法已刪除，改由父母協議或法院酌定，本選項用舊法觀念，是本題錯誤敘述。","民法1055條第2項：若父母未協議或協議不成，法院得依請求酌定，敘述正確，非本題答案。","法院亦得依職權酌定（1055條第2項），敘述正確，非本題答案。","民法1055條之1：父母或利害關係人得請求法院重新酌定，敘述正確，非本題答案。"],
trap:"離婚後子女監護的現行規定：父母「協議」定之（民法1055條），協議不成由法院酌定——現行法廢除了「父為優先」的舊法規定，改採「子女最佳利益」為原則，父母雙方地位平等，考試常考舊法vs現行法的差異。",related:"與108年第6題（已婚未成年人的監護規定）同屬監護主題，兩題合併複習。"},
{id:"EEF093",cat:"E1婚約婚姻結婚",year:"108年第6題",q:"依我國民法之規定，下列關於監護之敘述，何者正確？",
opts:["已結婚的未成年人而無父母，或父母均不能行使、負擔對於其未成年子女之權利、義務時，應由法院依職權為其選定監護人","已結婚的未成年人而無父母，或父母均不能行使、負擔對於其未成年子女之權利、義務時，由其配偶擔任監護人","已成年的受監護宣告之人，其監護人以配偶、父母、子女為優先，無前開親屬時，再由法院選定","未成年受監護宣告之人，得由已成年之祖父母擔任監護人"],correct:1,
exps:["已結婚的未成年人之監護，應由配偶（而非法院依職權選定監護人）擔任監護人，本選項不正確。","（本題答案）民法1091條：已結婚的未成年人無父母或父母不能行使親權，由其配偶擔任監護人——婚姻賦予的行為能力也延伸至監護能力，已婚未成年人的配偶為其法定監護人，敘述正確。","成年受監護宣告者的監護人順序（民法1111條），法院指定時以配偶、父母、子女等為優先，但具體順序需依法條確認，本選項方向基本正確，但非本題最精確答案。","未成年受監護宣告者，由法律指定的特定親屬或法院選定監護人，不是任意的「已成年祖父母」，本選項表述不精確。"],
trap:"已婚未成年人的特殊地位：①取得完全行為能力（民法13條第3項）②若無父母行使親權，由配偶擔任監護人（1091條）。這是婚姻賦予未成年人特殊法律地位的雙重效果，兩個效果要一起記。",related:"與104年第35題（離婚後子女監護原則）、101年第26題（已婚18歲視為有行為能力）同屬婚姻與行為能力/監護主題，三題合併複習。"},
{id:"EEF094",cat:"E2夫妻財產制",year:"99年第33題",q:"甲（男）乙（女）於民國94年3月結婚，甲乙依法約定分別財產制為其夫妻財產制。下列敘述，何者正確？",
opts:["甲乙各自所有之財產，由甲統一管理及支配","甲就其財產所生之孳息，乙有權請求一半","甲乙各自管理、使用及處分其財產","乙就甲婚後增加之財產，於婚姻關係消滅時，有權請求一半"],correct:1,
exps:["分別財產制下各人各自管理，不是由甲統一管理，本選項不正確。","分別財產制下各自財產的孳息歸各自所有，乙無權請求甲財產孳息的一半，本選項不正確。","（本題答案）分別財產制（民法1044條）：夫妻各保有財產的所有權，並各自管理、使用及處分，敘述正確。","剩餘財產分配請求權（1030條之1）是法定財產制消滅時才有，分別財產制下無此請求，本選項不正確。"],
trap:"分別財產制的核心：各自管理、各自所有、各自處分——婚姻存續中沒有任何共同財產（這與法定財產制的「婚後財產各自所有但消滅時要剩餘分配」不同，分別財產制消滅時也無剩餘財產分配請求）。",related:"與105年第32題（約定財產制種類）、107年第9題（分別財產制的敘述）同屬夫妻財產制主題，三題合併複習。"},
{id:"EEF095",cat:"E2夫妻財產制",year:"99年第38題",q:"關於夫妻財產制之敘述何者錯誤？",
opts:["除法定財產制外，夫妻可以約定為共同財產制或分別財產制","夫妻約定財產制時，應以書面為之","夫妻得以口頭或書面契約，訂立財產制契約","夫妻得隨時以契約就財產重新訂立或廢止或修正夫妻財產制"],correct:2,
exps:["夫妻財產制有三種：法定財產制（預設）+約定財產制（共同財產制/分別財產制），敘述正確，非本題答案。","夫妻財產制契約應以書面為之（民法1007條），敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1007條：夫妻財產制契約「應以書面為之」——不得以口頭訂立，本選項說得以口頭訂立，與法條要求書面的規定相反，是本題錯誤敘述。","夫妻得隨時以書面契約就財產制重新訂立、廢止或修正（民法1012條），敘述正確，非本題答案。"],
trap:"夫妻財產制契約必須書面（民法1007條）——這是強制書面的例子，口頭的夫妻財產制契約無效（要式行為，不符合形式要件則無效）。",related:"與110年第9題（夫妻財產制契約須登記生效）、109年第20題（夫妻財產制契約訂立的各種規定）同屬財產制契約形式主題，三題合併複習。"},
{id:"EEF096",cat:"E2夫妻財產制",year:"100年第31題",q:"關於離婚之敘述，下列何者錯誤？",
opts:["兩願離婚，雙方當事人須以書面為之","兩願離婚時，不得請求贍養費及損害賠償","兩願離婚時，須有二人以上之證人","兩願離婚，須向戶政機關為登記，始發生離婚之效力"],correct:3,
exps:["兩願離婚（協議離婚）須以書面為之（民法1050條），敘述正確，非本題答案。","兩願離婚時，當事人可以另外約定財產及贍養費事宜，本選項說「不得請求」實際上離婚時可以協議各種請求，但選項B的敘述可能指的是「兩願離婚本身不產生贍養費請求」，需視題目具體表述，依官方答案D，B不是最錯的選項。","兩願離婚須有二人以上之見證人（民法1050條），敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1050條：兩願離婚應以書面為之，有二人以上證人之簽名，並應向戶政機關為離婚之登記——登記是生效要件，但本選項的表述可能有誤（依法確實須登記），需以官方答案D為準，D是本題的錯誤敘述。"],
trap:"兩願離婚的要件：①書面②二人以上見證人簽名③向戶政機關辦理登記——三個要件缺一不可。若只有書面和見證人而未辦登記，離婚不成立。",related:"與104年第34題（結婚也須戶政登記）同屬婚姻身分行為登記主題，兩題合併複習身分行為的登記要件。"},
{id:"EEF097",cat:"E2夫妻財產制",year:"100年第35題",q:"關於法定夫妻財產制，下列敘述，何者正確？",
opts:["夫妻之一方以自己財產清償他方之債務時，於婚姻關係存續中，不得請求償還","夫妻之一方以自己財產清償他方之債務時，於婚姻關係存續中，不得請求償還，但於法定財產制關係消滅時，應予返還","夫妻之一方因職業上所得之財產，應於婚姻關係消滅時方可主張所有","婚姻關係存續中，夫妻取得之財產，由夫管理使用收益及處分"],correct:1,
exps:["本選項只說了前半段（不得請求償還），忽略了後半段（消滅時應返還），不完整，非本題答案。","（本題答案）民法1023條第1項後段：以自己財產清償他方之債務，婚姻存續中不得請求償還，但法定財產制關係消滅時，應予返還，完整敘述，正確。","法定財產制下，夫妻各自擁有自己的財產（含職業所得），不需等婚姻消滅才可主張所有，本選項不正確。","法定財產制下，各人各自管理使用自己的財產，不是由夫管理，本選項是舊法觀念，不正確。"],
trap:"法定財產制下夫妻互為清償對方債務的規則（民法1023條）：婚姻存續中，一方以自己財產清償另一方的債務，當下不得請求償還（避免婚姻中的財務計算糾紛）；但法定財產制「消滅時」（離婚或一方死亡），才可請求返還。",related:"與101年第20題（法定財產制的敘述）、111年第17題（法定財產制正確規定）同屬法定財產制主題，三題合併複習。"},
{id:"EEF098",cat:"E2夫妻財產制",year:"101年第20題",q:"關於法定夫妻財產制，下列敘述何者錯誤？",
opts:["無論是婚前財產或婚後財產，由夫妻各自所有","夫或妻婚前財產，於婚姻關係存續中所生之孳息，由夫妻各自所有","夫或妻之財產為婚後財產，且為金錢者，推定其為夫妻各自之婚後財產","法定財產制關係消滅時，現存之婚後財產，扣除婚姻關係存續所負之債務後，如有剩餘，其差額應平均分配"],correct:1,
exps:["法定財產制下，婚前和婚後財產均由夫妻各自所有，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法1017條第2項：夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為「婚後財產」——不是「由夫妻各自所有」（繼續算婚前財產），婚前財產的孳息在婚後期間歸屬婚後財產類別，納入剩餘財產分配的計算，本選項說算各自所有（婚前財產），不正確。","婚後財產為金錢者，推定為各自婚後財產（1017條第3項），敘述正確，非本題答案。","法定財產制消滅時，婚後財產扣除婚姻存續債務後的差額平均分配（1030條之1），敘述正確，非本題答案。"],
trap:"婚前財產的孳息（如婚前不動產的租金）在婚姻期間產生，被「視為婚後財產」——這意味著這部分要納入剩餘財產分配的計算，而不是算作婚前財產（不計入分配）。法條1017條第2項的這個規定是常考的細節。",related:"與105年第35題（哪些財產屬剩餘財產分配標的）、112年第21題（婚前財產孳息視為婚後財產）同屬法定財產制計算主題，三題合併複習。"},
{id:"EEF099",cat:"E2夫妻財產制",year:"103年第31題",q:"下列何者不屬於夫妻之特有財產？",
opts:["妻之化妝品","夫之行醫工具","夫上班代步所駕駛之自用汽車","妻之首飾"],correct:2,
exps:["化妝品是妻個人使用的物品（專供一身使用），屬特有財產（民法1031條之1第1款），非本題答案。","行醫工具是夫職業上用具（專供執行職業用），屬特有財產（1031條之1第2款），非本題答案。","（本題答案）上班代步的自用汽車：汽車用於日常交通（上下班），不是「專供執行業務的專業工具」（如醫生的聽診器、設計師的繪圖板），一般代步車屬夫妻共同財產或各自婚後財產，不屬特有財產，敘述正確（不屬特有財產）。","首飾是妻個人使用的物品（專供一身），屬特有財產（1031條之1第1款），非本題答案。"],
trap:"特有財產（民法1031條之1）的類型：①專供個人使用之物（如化妝品、個人衣物）②職業上必要之物（如醫療器械、工作專用工具）③因繼承或無償取得之物。一般代步用的汽車不是「職業上必要」的工具（只是交通方式），不是特有財產。",related:"與112年第22題（特有財產的各種情形）同屬特有財產主題，兩題合併複習特有財產的識別方法。"},
{id:"EEF100",cat:"E2夫妻財產制",year:"105年第32題",q:"下列何者非屬我國現行民法中所規定之約定財產制？",
opts:["統一財產制","分別財產制","一般共同財產制","勞力所得共同財產制"],correct:0,
exps:["（本題答案）「統一財產制」不是我國現行民法規定的夫妻財產制類型——現行民法第三章約定財產制只規定了「共同財產制」和「分別財產制」，統一財產制是外國（如德國）的制度，不是我國現行民法的類型，敘述正確（不屬於現行民法）。","分別財產制是約定財產制之一（民法1044條以下），敘述是屬於，非本題答案。","一般共同財產制（共同財產制的一種，民法1031條以下），敘述是屬於，非本題答案。","勞力所得共同財產制（共同財產制的另一種，民法1041條），敘述是屬於，非本題答案。"],
trap:"我國現行夫妻財產制三種：①法定財產制（預設）②共同財產制（約定，又分一般共同財產制和勞力所得共同財產制）③分別財產制（約定）。「統一財產制」是舊法或外國法的概念，現行法中不存在。",related:"與105年第33題（夫妻財產制的種類選擇）、113年第20題（哪種非現行民法規定的財產制）同屬夫妻財產制種類主題，三題合併複習。"},
{id:"EEF101",cat:"E2夫妻財產制",year:"105年第33題",q:"有關夫妻財產制的規定，下列敘述何者正確？",
opts:["依民法規定，夫妻除可以選擇分別財產制及共同財產制外，亦得基於契約自由原則創設其他夫妻財產制","夫妻財產制之契約，得以口頭或書面為之","夫妻於婚姻關係存續中得隨時訂立、廢止或修正夫妻財產制契約，不受任何限制","夫妻在不違反法律規定下，得創設或選擇三種夫妻財產制中之一"],correct:2,
exps:["夫妻財產制採「類型法定原則」，夫妻只能選擇現有三種類型之一，不能自行創設新的財產制，本選項不正確。","夫妻財產制契約須書面（民法1007條），不得口頭，本選項不正確。","（本題答案）民法1012條：夫妻於婚姻關係存續中，得以契約就民法所定之約定財產制中廢止之，或改用他種財產制——夫妻隨時可以訂立、廢止或修正財產制，敘述正確。","夫妻財產制有三種（法定財產制/共同財產制/分別財產制），但不是可以「創設」，只能選擇這三種之一，本選項前半說「創設」不正確。"],
trap:"夫妻財產制的特點：①類型法定（只能選三種之一，不能自創）②契約自由（三種可以隨時更換）③書面要式（不得口頭）。「類型法定+契約自由」是夫妻財產制制度設計的核心矛盾與平衡。",related:"與105年第32題（約定財產制種類）、113年第21題（夫妻財產制契約的各種規定）同屬夫妻財產制制度主題，三題合併複習。"},
{id:"EEF102",cat:"E2夫妻財產制",year:"105年第34題",q:"有關法定夫妻財產制之敘述，下列何者錯誤？",
opts:["夫或妻各自管理、使用、收益及處分其財產","夫妻就其婚前財產及婚後財產，由夫妻共同管理","不能證明為夫妻一方所有之財產，推定為夫妻共有","婚後財產，於法定財產制關係消滅時，扣除婚姻關係存續所負債務後，如有剩餘，應平均分配差額"],correct:1,
exps:["法定財產制下，各人各自管理使用收益及處分自己的財產（1018條），敘述正確，非本題答案。","（本題答案，敘述錯誤）法定財產制下，各人「各自管理」自己的財產（不是「共同管理」）——本選項說由夫妻「共同管理」，與法定財產制各自獨立管理的原則相反，是本題錯誤敘述。","不能證明為一方所有的財產，推定為夫妻共有（1017條第3項），敘述正確，非本題答案。","法定財產制消滅時的剩餘財產平均分配（1030條之1），敘述正確，非本題答案。"],
trap:"法定財產制≠共同財產制：法定財產制下各人各自管理自己的財產（獨立管理），只有在消滅時才做剩餘財產計算。共同財產制才是把財產合而為一共同管理。這兩種制度最容易被混淆，要特別記住「法定=各自管理，共同=合併管理」。",related:"與99年第33題（分別財產制各自管理）、107年第10題（法定財產制的正確敘述）同屬法定財產制主題，三題合併複習各種財產制的管理差異。"},
{id:"EEF103",cat:"E2夫妻財產制",year:"105年第35題",q:"下列何者屬於剩餘財產分配請求權之標的財產？",
opts:["婚前財產","婚後之薪資所得","婚後因繼承所得之財產","婚後所取得之受贈財產"],correct:1,
exps:["婚前財產不計入剩餘財產分配（民法1030條之1第1項），本選項不屬於分配標的，非本題答案（要找屬於標的的）。","（本題答案）婚後薪資所得是婚後財產（不是因繼承或無償取得），屬於剩餘財產分配的計算標的，敘述正確（屬於）。","婚後因繼承所得不計入剩餘財產分配（1030條之1第1項第1款：因繼承或其他無償取得之財產，不列入計算），本選項不屬於，非本題答案。","婚後受贈財產屬「無償取得」，不計入剩餘財產分配，本選項不屬於，非本題答案。"],
trap:"剩餘財產分配的計算範圍：婚後財產中「有償取得」的部分——如薪資、投資收益、業務所得。排除：①婚前財產②因繼承取得③因贈與（無償）取得④慰撫金等人身損害賠償。口訣：「婚後有償才分，婚前/繼承/受贈不分」。",related:"與99年第40題（剩餘財產分配請求權的計算規則）、107年第23題（婚後財產的認定）同屬剩餘財產分配主題，三題合併複習。"},
{id:"EEF104",cat:"E2夫妻財產制",year:"107年第9題",q:"下列有關夫妻分別財產制之規定，下列何者錯誤？",
opts:["分別財產制為約定財產制之一種","夫妻各自保有財產之所有權，並各自管理、使用及處分","夫妻於分別財產制下，法定財產制關係消滅時，應為剩餘財產分配","分別財產制下，夫妻之一方以其財產清償他方之債務後，得向他方請求償還"],correct:2,
exps:["分別財產制是約定財產制的一種（另一種是共同財產制），敘述正確，非本題答案。","分別財產制下各自所有並各自管理（民法1044條），敘述正確，非本題答案。","（本題答案，敘述錯誤）剩餘財產分配請求權（1030條之1）只適用於「法定財產制」消滅時，分別財產制消滅時沒有剩餘財產分配——分別財產制下各人財產完全獨立，消滅時各人各自拿回自己的財產，無需計算剩餘分配，本選項錯誤。","分別財產制下，一方以自己財產代替他方清償，可以請求償還（不同於法定財產制存續中不得請求），本選項敘述正確，非本題答案。"],
trap:"剩餘財產分配=只適用「法定財產制」消滅時，分別財產制和共同財產制消滅時不適用。分別財產制消滅時：各人各自帶走自己的財產，完全獨立，無剩餘財產計算。這個「剩餘財產分配只適用法定財產制」的限制是夫妻財產制最重要的考點之一。",related:"與99年第40題（分別財產制無剩餘財產分配）、105年第35題（剩餘財產分配的標的財產）同屬剩餘財產分配主題，三題合併複習。"},
{id:"EEF105",cat:"E2夫妻財產制",year:"107年第10題",q:"下列有關夫妻法定財產制之敘述，下列何者正確？",
opts:["婚前財產由夫妻各自所有，婚後財產由夫妻公同共有","婚前財產及婚後財產均由夫妻各自所有","婚前財產及婚後財產均由夫妻公同共有","婚前財產由夫妻各自所有，婚後財產由夫妻分別共有"],correct:1,
exps:["法定財產制下婚後財產不是公同共有（那是共同財產制的效果），本選項不正確。","（本題答案）法定財產制（民法1017條）：婚前和婚後財產均由夫妻「各自」所有（不是共有任何形式），夫妻在法定財產制下各持有自己的財產，互不混合，敘述正確。","婚前婚後財產都不是公同共有，本選項不正確。","分別共有也不正確，本選項不正確。"],
trap:"法定財產制的財產歸屬：夫妻「各自」擁有婚前和婚後財產——不是公同共有、不是分別共有，就是各自單獨所有。只有在法定財產制「消滅時」，才要計算雙方婚後財產的剩餘差額做平均分配，但婚姻存續中財產仍是各自單獨所有。",related:"與105年第34題（法定財產制下各自管理）、111年第17題（法定財產制正確規定）同屬法定財產制財產歸屬主題，三題合併複習。"},
{id:"EEF106",cat:"E2夫妻財產制",year:"107年第23題",q:"甲與乙於民國100年結婚，雙方並未約定夫妻財產制，嗣於105年乙因外遇而雙方離婚。關於婚後財產，下列敘述何者正確？",
opts:["甲及乙之婚後財產均歸甲所有","甲及乙之婚後財產均歸乙所有","甲及乙之婚後財產由甲乙平均分配","甲及乙之婚後財產差額，由婚後財產較多的一方給付婚後財產較少之一方（各半）"],correct:3,
exps:["婚後財產不是全歸甲，本選項不正確。","婚後財產不是全歸乙，本選項不正確。","不是「平均」分配所有婚後財產，而是「差額」的平均分配，本選項表述不精確。","（本題答案）民法1030條之1：法定財產制消滅時，雙方婚後財產（扣除婚姻期間所負債務）的「差額」平均分配（各取一半差額）——婚後財產較多的一方給付差額的一半給較少的一方，敘述正確。"],
trap:"剩餘財產分配的計算：不是「所有婚後財產平均分配」，而是「兩人婚後財產的差額除以2」——即差額的一半歸婚後財產較少的一方。例：甲婚後財產600萬，乙婚後財產200萬，差額400萬，乙可請求甲給付200萬（差額的1/2），結果甲有400萬，乙有400萬。",related:"與99年第40題（剩餘財產分配的規則）、105年第35題（分配標的財產）同屬剩餘財產分配主題，三題合併複習。"},
{id:"EEF107",cat:"E2夫妻財產制",year:"108年第5題",q:"依我國民法之規定，下列關於夫妻財產制之敘述，何者錯誤？",
opts:["夫妻未以契約訂立夫妻財產制者，除民法另有規定外，以共同財產制為其夫妻財產制","夫妻於婚姻關係存續中，得以契約廢止其財產制契約，或改用他種財產制","夫妻財產制契約之訂立、廢止或更改，非經登記，不得對抗第三人","依法律規定，夫妻之一方得改用分別財產制，例如一方聲請宣告他方破產時"],correct:0,
exps:["（本題答案，敘述錯誤）民法1005條：夫妻未以契約訂立夫妻財產制者，以「法定財產制」為其夫妻財產制——不是共同財產制，本選項說共同財產制是預設，錯誤。","夫妻隨時可以廢止或改用其他財產制（民法1012條），敘述正確，非本題答案。","財產制契約的變動非經登記不得對抗第三人（民法1008條），敘述正確，非本題答案。","法院得依法律規定改用分別財產制（如一方聲請宣告他方破產，民法1010條），敘述正確，非本題答案。"],
trap:"法定財產制（預設）：未約定財產制者，自動適用「法定財產制」——不是「共同財產制」，不是「分別財產制」。法定財產制的特徵：各自所有、各自管理、消滅時剩餘財產分配。考試最常把預設財產制說成「共同財產制」，是高頻陷阱。",related:"與105年第33題（三種財產制的選擇）、109年第20題（夫妻財產制契約訂立規定）同屬夫妻財產制基本架構主題，三題合併複習。"},
{id:"EEF108",cat:"E2夫妻財產制",year:"109年第14題",q:"下列何者非屬公同共有之性質？",
opts:["繼承人有數人時，其繼承取得之遺產","合夥人之合夥財產","屬於社團法人名下之財產","夫妻共同財產制下之共同財產"],correct:2,
exps:["繼承人多人時，未分割遺產是公同共有（民法1151條），敘述是公同共有，非本題答案。","合夥財產由合夥人全體公同共有（民法668條），敘述是公同共有，非本題答案。","（本題答案）社團法人名下的財產屬於「法人」所有（法人是獨立的法律主體），不是公同共有——公同共有是「多個自然人或法人共同持有的財產」，而社團法人的財產是法人自己的財產（法人單獨所有），不是公同共有，敘述正確（非公同共有）。","夫妻共同財產制下的共同財產屬於夫妻公同共有（民法1031條），敘述是公同共有，非本題答案。"],
trap:"公同共有=多個主體對同一財產共同持有、無各自份額（無應有部分）——法人的財產是法人自己單獨所有（法人是獨立主體），不是多個人共同持有，所以不是公同共有。",related:"與103年第33題（夫妻共同財產制下公同共有）、99年第21題（公同共有的特徵）同屬公同共有主題，三題合併複習。"},
{id:"EEF109",cat:"E2夫妻財產制",year:"109年第20題",q:"下列關於夫妻財產制契約之訂立，何者正確？",
opts:["夫妻於結婚前或結婚後，均得以書面約定夫妻財產制契約","夫妻財產制契約，得以公證方式為之，不須以書面為之","夫妻得以口頭約定分別財產制","夫妻財產制契約，一旦訂立，不得更改"],correct:0,
exps:["（本題答案）民法1004條：夫妻得於結婚前或婚後，以書面契約訂立夫妻財產制——結婚前後均可訂立，敘述正確。","財產制契約須「書面」（民法1007條），不是以公證代替書面（公證雖然強化效力，但基本要件仍是書面），本選項說不須書面，不正確。","財產制契約須書面，不得口頭，本選項不正確。","民法1012條：夫妻隨時得以書面契約廢止或改用其他財產制——可以更改，本選項說不得更改，不正確。"],
trap:"夫妻財產制契約的三個重要規則：①任何時候可以訂立（婚前或婚後）②必須書面（要式）③可以隨時更改（廢止或改用他種）。三個規則中第②（書面）和第③（可更改）最常被考試改寫成錯誤選項。",related:"與99年第38題（財產制契約須書面）、113年第21題（財產制契約的各種規定）同屬財產制契約形式主題，三題合併複習。"},
{id:"EEF110",cat:"E2夫妻財產制",year:"109年第21題",q:"甲、乙結婚並約定共同財產制為夫妻財產制，共同財產制關係存續中二人之共同財產為2000萬元，若甲、乙離婚而無特別約定，則甲可獲得多少？",
opts:["1500萬元","1000萬元","667萬元","500萬元"],correct:1,
exps:["1500萬不是正確計算結果。","（本題答案）共同財產制消滅時（離婚），共同財產「各取一半」（民法1040條第1項）——2000萬÷2=1000萬，甲可獲得1000萬，敘述正確。","667萬不是正確計算結果。","500萬不是正確計算結果。"],
trap:"共同財產制消滅時的財產分配：各取一半（1040條）——這與法定財產制消滅時的「差額平均分配」不同。共同財產制是整體共同持有，離婚或死亡時對半分；法定財產制是各自持有，消滅時算婚後財產差額平均。",related:"與103年第36題（共同財產制消滅後繼承的程序）、107年第23題（法定財產制消滅時的差額分配）形成共同財產制vs法定財產制的對比，兩題合併複習。"},
{id:"EEF111",cat:"E2夫妻財產制",year:"109年第22題",q:"下列關於夫妻法定財產制之敘述，何者正確？",
opts:["於法定財產制下，夫或妻之財產分為婚前財產與婚後財產，婚前財產由夫妻公同共有","婚前財產及婚後財產均由夫妻各自所有","法定財產制關係消滅時，夫妻雙方婚後財產各取一半","不能證明為夫或妻一方所有之財產，推定為夫妻分別共有"],correct:1,
exps:["婚前財產各自所有（不是公同共有），本選項不正確。","（本題答案）法定財產制（民法1017條）：婚前和婚後財產均由夫妻「各自」所有，敘述正確。","法定財產制消滅時是「差額」各取一半，不是所有婚後財產各取一半，本選項不正確。","不能證明為一方所有的財產，推定為「共有」（1017條第3項用的是「共有」，通說認為是分別共有）——本選項若說「分別共有」可能是對的，但依官方答案B，B是最正確的，其他選項有明顯錯誤。"],
trap:"法定財產制的財產歸屬再確認：婚前婚後財產均各自所有（各自單獨所有）。消滅時計算「差額」各取一半（不是所有財產各取一半）。",related:"與107年第10題（法定財產制的正確敘述）、105年第34題（法定財產制不是共同管理）同屬法定財產制主題，三題合併複習。"},
{id:"EEF112",cat:"E2夫妻財產制",year:"110年第9題",q:"依現行民法規定，下列何者須經登記始生法律效力？",
opts:["遺產之繼承","土地買賣契約","設定抵押權之物權行為","夫妻就財產制所訂立之書面契約"],correct:2,
exps:["繼承不需登記即取得物權（民法759條），本選項不正確。","土地買賣契約是債權行為（諾成契約，合意即成立），不需登記，本選項不正確。","（本題答案）抵押權設定（物權行為）依民法758條，不動產抵押權設定非經登記不生效力，須登記始生效，敘述正確。","夫妻財產制契約已以書面訂立後，不是「登記後才生效」（契約以書面訂立即生效），但登記才能對抗第三人（民法1008條）——登記是對抗要件，不是生效要件，本選項說須登記「始生法律效力」不夠精確。"],
trap:"登記的功能分兩種：①登記為「生效要件」（如不動產物權設定/移轉，未登記無效）；②登記為「對抗要件」（如夫妻財產制契約，未登記仍生效但不能對抗善意第三人）。夫妻財產制契約是後者（對抗要件），不是生效要件，所以C（抵押權設定）才是需登記「始生效力」的正確答案。",related:"與109年第20題（財產制契約可結婚前後訂立）、99年第38題（財產制契約須書面）同屬財產制契約效力主題，三題合併複習。"},
{id:"EEF113",cat:"E2夫妻財產制",year:"110年第19題",q:"關於夫妻財產制契約的敘述，下列何者正確？",
opts:["夫妻得於結婚前以契約就民法所定之約定財產制中，選擇其一，為其夫妻財產制","夫妻於婚姻關係存續中，不得變更其夫妻財產制","夫妻財產制契約，須依公證方式始生效力","夫妻財產制契約之訂立、廢止或改用，應由夫妻雙方共同以書面，並簽名"],correct:3,
exps:["夫妻可以在結婚前「或婚後」訂立財產制契約（本選項只說「結婚前」，忽略婚後也可以），表述不完整，不是最正確答案。","夫妻隨時可以變更財產制（民法1012條），本選項說不得變更，不正確。","財產制契約須書面（1007條），不須公證，公證只是加強效力但非必要要件，本選項不正確。","（本題答案）民法1007條：夫妻財產制契約應以書面為之——須雙方共同以書面並簽名，敘述正確。"],
trap:"夫妻財產制契約的形式要件：書面+雙方簽名（書面要式）。不需要公證（公證只是任意選擇的加強），任何一方簽名不完整或僅有口頭均不滿足要式要求。",related:"與99年第38題（財產制契約須書面，不得口頭）、109年第20題（財產制契約可隨時訂立）同屬財產制契約形式主題，三題合併複習。"},
{id:"EEF114",cat:"E2夫妻財產制",year:"110年第20題",q:"分別財產制有關夫妻債務的敘述，下列何者正確？",
opts:["夫妻於行為時明知有損於婚姻關係消滅後他方之剩餘財產分配請求權者，以詐害行為論，他方得聲請法院撤銷之","分別財產制下，夫妻之一方以詐害行為損害他方剩餘財產分配請求者，他方可聲請法院撤銷","分別財產制下，如夫妻婚後財產出現差額，婚姻消滅時，亦應平均分配剩餘財產差額","分別財產制下，夫妻各自對外負擔的債務，各自清償，他方不負連帶責任"],correct:3,
exps:["本選項描述的「詐害行為撤銷」是法定財產制（1020條之1）的規定，不適用於分別財產制，本選項不正確。","分別財產制消滅時無剩餘財產分配請求（那是法定財產制的特有制度），分別財產制下無此問題，本選項不正確。","分別財產制消滅時無剩餘財產差額分配（只有法定財產制才有），本選項不正確。","（本題答案）分別財產制下，各人獨立負責各自的債務——夫或妻對外負擔的債務，自己清償，他方不負連帶責任，敘述正確。"],
trap:"分別財產制的債務清償：各人各自負責自己的債務，不連帶——這是分別財產制「財產完全獨立」原則的延伸。與共同財產制（共同財產可能被用於清償）、法定財產制（各自管理但消滅時計算差額）均不同。",related:"與99年第33題（分別財產制各自管理）、107年第9題（分別財產制的敘述）同屬分別財產制主題，三題合併複習。"},
{id:"EEF115",cat:"E2夫妻財產制",year:"110年第21題",q:"關於共同財產所負之債務，而以共同財產清償者，下列何者正確？",
opts:["不生補償請求權","不生補償請求權，但於共同財產制關係消滅時，應予返還","生補償請求權","生補償請求權，且配偶間可隨時請求清償"],correct:0,
exps:["（本題答案）民法1036條：共同財產所負之債務，以共同財產清償，不生補償請求——因為共同財產本來就是夫妻共同的，用共同財產清償共同債務，是正當的用途，不產生夫妻間的補償請求，敘述正確。","共同財產清償共同債務不需補償（不是「消滅時才返還」），本選項不正確。","不生補償請求（選項A），本選項說生補償，不正確。","不生補償請求，本選項不正確。"],
trap:"共同財產制下的補償規則：①用共同財產清償「共同財產之債」→不生補償請求（因為是共同的事）②用共同財產清償「一方特有財產之債」→有補償請求（因為用了共同的錢清償私人的事）。本題問的是前者（共同財產清償共同債務），不生補償。",related:"與103年第36題（共同財產制消滅後的財產分割程序）、109年第21題（共同財產制離婚時各取一半）同屬共同財產制主題，三題合併複習。"},
{id:"EEF116",cat:"E2夫妻財產制",year:"111年第17題",q:"關於夫妻法定財產制之規定，下列敘述何者正確？",
opts:["夫或妻之財產分為婚前財產與婚後財產，婚前財產由夫妻各自所有，婚後財產由夫妻公同共有","婚後財產，包括因繼承或其他無償取得之財產","夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為婚後財產","不能證明為夫或妻一方所有之財產，由夫妻連帶負責"],correct:2,
