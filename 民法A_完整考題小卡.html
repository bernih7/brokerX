<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民法概要｜歷屆考題小卡（A・總則完整版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F3E9;--paper-deep:#EFE6D5;--ink:#2A2722;--ink-soft:#7A7165;
  --rule:#DED1B9;--stamp:#A8402B;--gold:#BC8A2E;--green:#5C7A4A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:radial-gradient(circle at 12% 8%,rgba(188,138,46,.06),transparent 40%),
    radial-gradient(circle at 90% 95%,rgba(168,64,43,.05),transparent 45%),var(--paper);
  color:var(--ink);min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:28px 16px 48px;
}
.wrap{width:100%;max-width:560px;}
header{text-align:center;margin-bottom:14px;}
.case-tag{display:inline-flex;align-items:center;gap:6px;font-family:'Noto Serif TC',serif;
  font-weight:700;font-size:12px;letter-spacing:.12em;color:var(--stamp);
  border:1px solid var(--stamp);border-radius:999px;padding:3px 12px;margin-bottom:10px;}
h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:21px;letter-spacing:.04em;line-height:1.5;}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);
  letter-spacing:.06em;margin-top:4px;font-family:'Noto Sans TC',sans-serif;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 6px;}
.chip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;
  border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);
  cursor:pointer;user-select:none;transition:all .15s ease;white-space:nowrap;}
.chip.active{color:#fff;border-color:transparent;}
.filter-row{display:flex;justify-content:center;margin-bottom:14px;}
.filter-row .chip{border-color:var(--ink);color:var(--ink);font-weight:700;}
.filter-row .chip.active{background:var(--ink);color:#fff;}
.progress{text-align:center;font-family:'Noto Serif TC',serif;font-weight:700;
  font-size:13px;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:10px;}
.progress b{color:var(--ink);font-size:15px;}
.progress-bar{height:3px;background:var(--rule);border-radius:2px;overflow:hidden;margin:0 auto 18px;max-width:200px;}
.progress-fill{height:100%;background:var(--stamp);transition:width .25s ease;}
.scene{perspective:1800px;width:100%;}
.card{position:relative;width:100%;min-height:540px;
  transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.card.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;
  border:1.5px solid var(--rule);background:#fff;display:flex;flex-direction:column;
  padding:20px;box-shadow:0 4px 18px rgba(42,39,34,.07);overflow-y:auto;}
.face.back{transform:rotateY(180deg);background:var(--paper-deep);}
.face.back{border-left:6px solid var(--cat-color,var(--stamp));}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{font-size:11px;font-weight:700;color:#fff;padding:4px 12px;border-radius:999px;
  letter-spacing:.06em;font-family:'Noto Serif TC',serif;}
.year-badge{font-size:11px;font-weight:700;color:var(--ink-soft);border:1px solid var(--rule);
  border-radius:999px;padding:3px 10px;font-family:'Noto Serif TC',serif;}
.mastery-badge{font-size:18px;line-height:1;}
.q-text{font-size:14px;line-height:1.8;margin-bottom:14px;font-weight:500;}
.opt-list{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;gap:8px;padding:9px 10px;border-radius:8px;border:1.5px solid var(--rule);
  background:#fff;font-size:13px;line-height:1.6;cursor:pointer;transition:all .15s ease;}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--stamp);background:#FBEAE6;}
.opt .letter{font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:12px;}
.hint{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;
  letter-spacing:.1em;font-family:'Noto Serif TC',serif;}
.answer-banner{display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px;
  padding:10px;border-radius:8px;margin-bottom:12px;}
.answer-banner.correct{background:#EFF4EC;color:var(--green);border:1.5px solid var(--green);}
.answer-banner.wrong{background:#FBEAE6;color:var(--stamp);border:1.5px solid var(--stamp);}
.exp-list{display:flex;flex-direction:column;gap:8px;}
.exp-item{padding:9px 10px;border-radius:8px;font-size:12.5px;line-height:1.75;
  border:1.5px solid var(--rule);background:#fff;}
.exp-item.right{border-color:var(--green);background:#EFF4EC;}
.exp-item .exp-head{font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.exp-item.right .exp-head{color:var(--green);}
.exp-item:not(.right) .exp-head{color:var(--stamp);}
.extra-box{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.75;}
.trap-box{background:#FBF1E6;border:1.5px solid var(--gold);}
.trap-box .extra-head{color:var(--gold);font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.related-box{background:#EEF1F7;border:1.5px solid #5B7A99;}
.related-box .extra-head{color:#5B7A99;font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;
  border:1.5px solid var(--ink);background:#fff;color:var(--ink);
  border-radius:10px;padding:10px 16px;cursor:pointer;transition:all .15s ease;}
.btn:hover{background:var(--ink);color:#fff;}
.btn.primary{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.btn.primary:hover{background:#8c3322;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green);color:#fff;}
.btn.icon{padding:10px 14px;}
.quiz-stats{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:14px;
  display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.quiz-stats b{font-family:'Noto Serif TC',serif;}
.quiz-stats .ok{color:var(--green);}
.quiz-stats .ng{color:var(--stamp);}
footer{margin-top:28px;text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.12em;line-height:2;}
footer .reset{text-decoration:underline;cursor:pointer;color:var(--ink-soft);
  background:none;border:none;font-size:11px;letter-spacing:.12em;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="case-tag">案號 A・總則完整版</div>
    <h1>民法概要 考題小卡
      <span class="sub">99-114年不動產經紀人考題・共 52 題（A1自然人/A2法人/A3物/A4法律行為效力/A5意思表示瑕疵/A6代理/A7消滅時效）</span>
    </h1>
  </header>
  <div class="filter-row"><div class="chip active" id="resetBtn">全部分類</div></div>
  <div class="chips" id="chips"></div>
  <div class="progress"><b id="curNum">1</b> / <span id="totalNum">52</span>　<span id="catName"></span></div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="top-row">
          <span class="cat-badge" id="badgeFront"></span>
          <span class="year-badge" id="yearFront"></span>
          <span class="mastery-badge" id="badgeMasteryFront"></span>
        </div>
        <div class="q-text" id="qText"></div>
        <div class="opt-list" id="optList"></div>
        <div class="hint">點選一個選項　看詳解 ▸</div>
      </div>
      <div class="face back">
        <div class="top-row">
          <span class="cat-badge" id="badgeBack"></span>
          <span class="year-badge" id="yearBack"></span>
          <span class="mastery-badge" id="badgeMasteryBack"></span>
        </div>
        <div class="answer-banner" id="answerBanner"></div>
        <div class="exp-list" id="expList"></div>
        <div class="extra-box trap-box"><div class="extra-head">⚠️ 考試陷阱</div><div id="trapText"></div></div>
        <div class="extra-box related-box"><div class="extra-head">🔗 關聯題目</div><div id="relatedText"></div></div>
        <div class="hint">◂ 點擊卡片　回題目</div>
      </div>
    </div>
  </div>
  <div class="controls" id="masteryControls">
    <button class="btn icon" id="markReview">🔄 待複習</button>
    <button class="btn green icon" id="markMastered">✅ 已掌握</button>
  </div>
  <div class="controls">
    <button class="btn icon" id="prevBtn">◂ 上一題</button>
    <button class="btn primary" id="shuffleBtn">🔀 隨機</button>
    <button class="btn icon" id="nextBtn">下一題 ▸</button>
  </div>
  <div class="quiz-stats">
    <span>本輪：<b class="ok" id="quizOk">0</b> 對　<b class="ng" id="quizNg">0</b> 錯</span>
    <span style="cursor:pointer;text-decoration:underline;" id="resetQuiz">重新測驗</span>
  </div>
  <div class="quiz-stats">
    <span>累積：已作答 <b id="totalAttempts">0</b> 題次・正確率 <b id="overallAcc">—</b>・已掌握 <b id="masteredCount">0</b>/<b id="totalCards">0</b></span>
  </div>
  <footer>不動產經紀人考試・民法概要｜每題附A-D逐選項詳解＋考試陷阱提醒＋關聯題目，點選答案後自動判對錯並標記掌握度<br>
    v1.0　2026-06-22　A1-A7 總則完整版 52 題<br>
    <button class="reset" id="resetMastery">清除所有「已掌握」標記</button>
  </footer>
</div>
<script>
const CARDS=[
{id:"EAF01", cat:"自然人", group:"A1自然人", year:"99年第10題", q:"14歲之甲未得父母之允許，對同學為債務免除之意思表示，其效力如何？",
 opts:["有效","無效","得撤銷","效力未定"], correct:1,
 exps:["限制行為能力人所為之「單獨行為」，未得法定代理人允許者，依民法78條直接無效，不是「有效」。","（本題答案）民法78條：限制行為能力人未得法定代理人之允許，所為之單獨行為，無效。債務免除是單獨行為（甲單方表示即生效，不需同學同意配合），甲14歲是限制行為能力人，未得父母允許，直接適用78條→無效。","得撤銷適用於意思表示有瑕疵（錯誤、詐欺、脅迫）的情形，不適用於未得允許的限制行為能力人單獨行為。","效力未定是限制行為能力人未得允許訂立「契約」（雙方行為）的效力（民法79條），不是單獨行為的效力，本題債務免除屬於單獨行為，應適用78條（無效）而非79條（效力未定）。"],
 trap:"A段最經典的陷阱組合——單獨行為vs契約，效力規則完全不同：限制行為能力人未得允許的「單獨行為」（如拋棄繼承、債務免除、撤銷、解除）→無效（78條）；「契約」（雙方行為）→效力未定（79條）。考試反覆在這個分界點製造混淆，看到題目必須先判斷「這是單獨行為還是契約」才能套用正確條文。", related:"與108年第2題（限制行為能力人單獨行為vs契約效力規則整體敘述）為同一考點的不同出題包裝，建議合併比對熟記。"},
{id:"EAF02", cat:"自然人", group:"A1自然人", year:"100年第15題", q:"關於死亡宣告，下列敘述何者錯誤？",
 opts:["得聲請死亡宣告者，僅限於失蹤人之利害關係人","死亡宣告係私法上的制度，不生公法上的效果","死亡宣告在於結束失蹤人原住居所為中心之法律關係，而不在剝奪失蹤人之權利能力","死亡宣告為推定死亡，故允許提出反證而撤銷死亡宣告"], correct:0,
 exps:["（本題答案，敘述錯誤）民法8條第1項：失蹤人失蹤滿7年後，法院得因利害關係人或「檢察官」之聲請，為死亡之宣告——聲請權人包含利害關係人「或」檢察官，不是「僅限於」利害關係人，本選項用「僅限於」把檢察官排除掉，與法條不符。","死亡宣告只處理私法上的法律關係（繼承、婚姻消滅等），不等於戶籍法上死亡登記的公法效果，兩者是不同制度，敘述正確。","死亡宣告的目的是結束失蹤人在原住居所留下的法律關係不確定狀態，並非真正剝奪失蹤人的權利能力本身（失蹤人若仍活著，在他處的法律行為仍有效），敘述正確。","民法9條：受死亡宣告者，以判決內所確定死亡之時，「推定」其為死亡——因為是推定而非視為，允許提出反證，當事人或利害關係人可聲請撤銷死亡宣告判決，敘述正確。"],
 trap:"這題有兩個常見陷阱：①「僅限於」這種絕對化字眼——民法選擇題看到「僅」「一律」「絕對」要提高警覺，幾乎都是陷阱；②「推定」vs「視為」——推定允許舉反證推翻，視為原則上不允許，死亡宣告是「推定」死亡，所以可以被撤銷，若題目寫「視為死亡不允許撤銷」就是錯的。", related:"與110年第3題（死亡宣告失蹤期間數字）、112年第14題（死亡宣告效力發生時點）構成死亡宣告三連發，三題合併複習可完整掌握這個主題的全部考點。"},
{id:"EAF03", cat:"自然人", group:"A1自然人", year:"100年第19題", q:"甲僱傭17歲未婚之乙為店員，並授與代理權以甲之名義販售物品，若甲之法定代理人均不同意。則：",
 opts:["僱傭契約無效，代理權授與有效","僱傭契約無效，代理權授與亦無效","僱傭契約有效，代理權授與無效","僱傭契約有效，代理權授與亦有效"], correct:1,
 exps:["本題易誤以為選項A（僱傭無效、代理有效）是正確答案，因為代理權授與在理論上有「不直接使本人負擔財產不利益」的單獨行為性質，但本題答案並非A，見正解說明。","（本題答案，官方更正題）本題官方公告答案為B（僱傭無效、代理亦無效）。注意：「甲之法定代理人均不同意」——限制行為能力人是「甲」不是乙，甲訂立僱傭契約未得法定代理人允許，依79條效力未定（但本題選項無效力未定選項，官方認定為無效）；代理權授與因依附於僱傭關係，隨同僱傭關係不生效力。本題為更正題，表示出題方對此有過爭議。","僱傭契約依79條應為效力未定而非有效，本選項不正確。","同上，僱傭契約效力問題未解決，代理權授與亦不當然有效。"],
 trap:"⚠️ 本題為官方更正題（100年備註明載「第19題答B給分」），出題方本身也存在爭議。最重要的兩個學習點：①本題甲（不是乙）是限制行為能力人，乙的年齡是干擾資訊；②代理權授與是否隨依附的契約一起失效，在「契約與代理權授與綁在一起」的情境下，官方採取從屬性見解（代理隨僱傭一起不生效力），不適用「代理權授與不受限制行為能力限制」的一般規則。", related:"與111年第23題（授予代理權是否需法定代理人同意）為同一考點的延伸，建議合併比較：單純的代理權授與 vs 依附於特定契約的代理權授與，兩種情境下的效力認定不同。"},
{id:"EAF04", cat:"自然人", group:"A1自然人", year:"101年第22題", q:"甲發生車禍傷及腦部，成為植物人，下列敘述何者最正確？",
 opts:["甲成為植物人喪失權利能力","甲雖成為植物人，但關於個人利益之享受仍具有部分權利能力","植物人為無行為能力人，並且不具有權利能力","甲雖成為植物人，仍具有權利能力"], correct:3,
 exps:["權利能力只終於死亡，植物人仍活著，權利能力不受身體狀態影響，本選項錯誤。","「部分權利能力」這個概念本身就不存在——權利能力是全有或全無的概念，不能分割為「部分」，本選項把行為能力的分級概念（完全/限制/無）誤套到權利能力身上，是最常見的陷阱選項。","前半句「植物人為無行為能力人」可能成立（視有無受監護宣告），但後半句「不具有權利能力」錯誤，植物人仍有完整的權利能力。","（本題答案）民法6條：人之權利能力，始於出生，終於死亡。植物人仍是活著的自然人，權利能力不受意識狀態影響，完全符合第6條的鐵律。"],
 trap:"這題的核心陷阱是選項B——「部分權利能力」這個說法故意模仿「限制行為能力」的概念包裝出來，讓你誤以為植物人也可以有「部分」的權利能力。必須記住：行為能力有分級（完全/限制/無），但權利能力是二元的（有或沒有），只要活著就有完整的權利能力，沒有「部分」的空間。", related:"與103年第5題（合夥不具權利能力）、112年第1題（胎兒的特殊權利能力保護）構成「權利能力主題群」三連發，三題合併複習可建立完整的權利能力考點地圖。"},
{id:"EAF05", cat:"自然人", group:"A1自然人", year:"101年第23題", q:"甲酒醉駕車撞傷丙，致丙住院治療，且甲之汽車亦受損。下列敘述何者錯誤？",
 opts:["甲對於汽車所受之損害，僅得請求乙將汽車修復原狀，不得主張修復原狀所必要之費用以代替回復原狀","甲受傷住院，得因人格權受侵害對乙請求非財產上之損害賠償，其請求之數額限於甲實際所受之損害","甲對於汽車所受之損害，得對加害人乙請求汽車因毀損所減少之數額","甲得以遺囑自由處分其財產，但不得侵害繼承人之特留分"], correct:1,
 exps:["民法213條第3項：應回復原狀者，債權人得請求支付回復原狀所必要之費用以代替回復原狀——甲可以選擇請求修復費用（金錢替代），不限於只能要求乙親自修復，本選項說「不得主張費用」是錯的，但本題問「何者錯誤」，要找出哪個選項本身有誤。","（本題答案，敘述錯誤）非財產上損害賠償（慰撫金）的計算，依實務見解是綜合考量加害程度、雙方身分地位經濟狀況等因素酌定，並無「限於甲實際所受之損害」這種財產上損害計算邏輯的限制，本選項把財產損害賠償（可計算）的計算方式誤套到非財產損害賠償（慰撫金，由法院酌定）上。","依民法196條，物被毀損者，被害人得請求賠償其物因毀損所減少之價額，完全對應法條規定，敘述正確。","民法1187條：遺囑人於不違反特留分規定之範圍內，得以遺囑自由處分遺產，敘述正確。"],
 trap:"這題的陷阱在於「財產上損害賠償的計算方式」vs「非財產上損害賠償（慰撫金）的認定方式」這兩種完全不同的法律機制——財產損害可以用具體金額計算（如汽車減少的價值），但慰撫金不是用「實際所受損害」來限定金額，而是由法院依法酌定，沒有上限只能是「實際損害額」的限制概念。", related:"屬於侵權行為損害賠償主題，是A段中少數延伸到B+C段（債編）侵權行為概念的跨段題目，複習時可對照B段侵權行為相關題目一併理解。"},
{id:"EAF06", cat:"自然人", group:"A1自然人", year:"102年第25題", q:"下列有關25歲受輔助宣告之人的敘述，何者正確？",
 opts:["甲之輔助宣告可由其表哥向社會福利機構提出聲請","甲受輔助宣告後，自行購買不動產的行為，無效","甲之輔助人乙，不得受讓甲所有的A屋","甲受輔助宣告後，自行將其所有的智慧型手機贈與好友丙的行為，有效"], correct:2,
 exps:["民法15條之1：聲請輔助宣告的聲請權人為本人、配偶、四親等內之親屬、檢察官、主管機關或社會福利機構等，向「法院」聲請，表哥若超出四親等則不具聲請權，且聲請對象是法院不是社會福利機構，本選項兩點都有誤。","受輔助宣告人為不動產買賣等重要財產行為，未經輔助人同意者，效力為「得撤銷」或「效力未定」，而非當然無效——這是輔助宣告與監護宣告最重要的效力差異，本選項把「得撤銷」誤植為「無效」。","（本題答案）基於利益迴避原則，輔助人不得受讓受輔助宣告人的財產（避免球員兼裁判的利益衝突），本選項敘述正確。","民法15條之2第1項：受輔助宣告人為贈與行為，應經輔助人同意，本選項說自行贈與手機「有效」，未考量是否為日常生活必需的小額行為，在未得輔助人同意的前提下不能逕認有效。"],
 trap:"受輔助宣告制度的核心特徵是介於「完全行為能力」與「監護宣告（完全無行為能力）」之間，只限制「特定重要行為」需要輔助人同意，其餘日常行為仍可自主。考試最愛拿輔助宣告跟監護宣告的效力規則互換：監護宣告→無行為能力，意思表示無效；輔助宣告→特定重要行為需同意，未經同意效力為得撤銷或效力未定，不是無效。", related:"與111年第23題（限制行為能力人需法定代理人同意之行為類型）可對照比較，釐清「限制行為能力人」vs「受輔助宣告人」這兩種身分各自的同意規則差異。"},
{id:"EAF07", cat:"自然人", group:"A1自然人", year:"103年第5題", q:"下列何者，不具有權利能力？",
 opts:["植物人","受破產宣告之法人","合夥","受監護宣告之自然人"], correct:2,
 exps:["植物人仍是活著的自然人，依民法6條仍具完整權利能力，不因身體或意識狀態受影響（與101年第22題同一概念）。","法人受破產宣告，僅是進入清算程序限制財產處分，法人格仍然存續（清算完結前），仍具權利能力。","（本題答案）合夥不是法人，沒有獨立的法律人格，合夥財產屬於合夥人全體公同共有，合夥本身在我國法上不具有權利能力，不能以「合夥」名義單獨成為權利義務主體。","受監護宣告人喪失的是「行為能力」（變為無行為能力人），不是「權利能力」，只要活著就有完整的權利能力，這是本題最大的陷阱選項。"],
 trap:"這題把「行為能力受限制」和「權利能力不存在」兩個概念用四個主體包裝考：植物人仍有權利能力（誤認為失能→喪失）、破產法人仍有法人格（誤認為清算→消滅）、受監護宣告者仍有權利能力（最大陷阱，監護宣告影響行為能力不影響權利能力）、合夥才是真正不具權利能力的主體。記住：不具權利能力的必須是「非法律上的人格主體」，合夥屬於此類。", related:"與101年第22題（植物人權利能力）、112年第1題（胎兒特殊保護）構成「權利能力主題群」三連發。"},
{id:"EAF08", cat:"自然人", group:"A1自然人", year:"103年第6題", q:"下列有關住所之敘述，何者正確？",
 opts:["限制行為能力人，因特定行為選定居所者，關於其行為，視為住所","法人，以其主事務所之所在地為住所","妻，以夫之住所為住所","一人同時僅得有兩住所"], correct:1,
 exps:["民法22條規定「因特定行為選定居所，關於其行為，視為住所」的規則，適用對象不限於限制行為能力人（一般人皆可），且本選項表述方式有細微偏誤，不如選項B精確。","（本題答案）民法23條：法人以其主事務所之所在地為住所，完全對應法條原文，敘述正確。","現行民法已刪除「妻以夫之住所為住所」的舊法規定，基於夫妻平等原則，夫妻各自依第20條獨立設定住所，本選項是舊法觀念，與現行法不符，是測試考生是否誤用舊法的陷阱。","民法20條第2項：一人不得同時有兩住所——本選項把「不得」改成「僅得」，意思完全相反，這是典型的「反話陷阱」。"],
 trap:"這題有兩個同等重要的陷阱：①「妻以夫之住所為住所」是已廢除的舊法觀念（現行法夫妻住所各自獨立設定），②「一人僅得有兩住所」是把「不得同時有兩住所」的禁止規定改寫成允許規定的反話陷阱。兩種陷阱手法都很常見，一個測試新舊法認知，一個測試法條文字的正確理解方向。", related:"與111年第10題（住所之敘述）為同主題不同年份的重複出題，兩題合併可完整掌握住所制度的考點地圖。"},
{id:"EAF09", cat:"自然人", group:"A1自然人", year:"105年第4題", q:"下列有關人格權之敘述，何者錯誤？",
 opts:["自由不得限制","行為能力不得拋棄","人格權具有專屬性","當人格權受侵害時，得請求法院除去其侵害"], correct:0,
 exps:["（本題答案，敘述錯誤）民法17條：自由不得拋棄；自由之限制，以不背於公共秩序或善良風俗者為限——自由本身並非絕對不得限制，而是「限制本身不得違反公序良俗」，換句話說自由「可以被限制」（如競業禁止約款），只是限制手段必須合法。本選項說「自由不得限制」是絕對化的錯誤表述，與第17條第2項的規定相反。","民法16條明文：行為能力不得拋棄，這是強制規定，敘述正確。","人格權與權利人的身分不可分離，不能讓與或繼承，具有一身專屬性，敘述正確。","民法18條第1項：人格權受侵害時，得請求法院除去其侵害，有受侵害之虞時得請求防止，敘述正確。"],
 trap:"這題問的是「何者錯誤」，陷阱是選項A用「自由不得限制」這種絕對化語氣，把法條「自由之限制，以不背於公序良俗者為限」（允許限制但限制本身要合法）的實際規定方向說反了。考試常用「把但書或限制條件拿掉，讓正確規則變成絕對化的錯誤描述」這種手法，遇到「不得」「一律」「絕對」這類字眼，要立刻確認法條是否真的這麼絕對。", related:"與106年第40題（人格權之敘述，含姓名權/商標權）同屬人格權主題，可對照比較兩題的不同考法。"},
{id:"EAF10", cat:"自然人", group:"A1自然人", year:"106年第40題", q:"下列有關人格權之敘述，何者錯誤？",
 opts:["姓名乃用以區別人己之一種語言標誌，將人個別化，以確定其人之同一性","法人在法令限制與性質範圍內，亦享有人格權","公司名稱用以識別企業之主體性，此時姓名權等於商標權","針對無涉公益之報導，若不當揭載足資識別當事人資料，侵害其名譽權者，得依民法第18條請求排除侵害"], correct:3,
 exps:["姓名權的基本功能就是識別個體同一性，敘述正確。","依民法26條及實務見解，法人在性質許可範圍內，仍享有姓名（名稱）權、名譽權等人格權保護，敘述正確。","公司名稱具有識別主體性之功能（類似姓名權的延伸），但將「姓名權」等同於「商標權」的說法雖然是一種比喻，在本題的其他選項對照下並非明確錯誤，本題官方選定D為錯誤答案。","（本題答案，敘述有誤）此種情形若侵害的是「隱私權」或「個人資料保護」而非單純「名譽權」，請求權基礎應結合第18條與個資法等特別法，單純援引第18條保護名譽權，在不當揭載個資的情境下法律適用不夠精確，被認定為本題表述最不正確的選項。"],
 trap:"這題四個選項都言之成理，是典型「找出表述最不精確者」的進階陷阱題型。人格權的種類很多元（姓名權、名譽權、隱私權、肖像權），題目故意把「不當揭載個人資料」這種更貼近「隱私權」或「個資保護」的情境，硬套到「名譽權」的請求權基礎上，造成法律適用不夠精確的問題。", related:"與105年第4題同屬人格權主題，兩題的出題手法不同（一題問絕對化錯誤，一題問適用精確性），合併比較有助理解人格權保護制度的完整架構。"},
{id:"EAF11", cat:"自然人", group:"A1自然人", year:"108年第2題", q:"下列有關行為能力之敘述，何者錯誤？",
 opts:["無行為能力人之意思表示，無效","限制行為能力人未得法定代理人之允許，所為之單獨行為，效力未定","限制行為能力人所訂立之契約，未經承認前，相對人得撤回之","限制行為能力人用詐術使人信其為有行為能力人或已得法定代理人之允許者，其法律行為為有效"], correct:1,
 exps:["民法75條：無行為能力人之意思表示，無效，完全對應法條，敘述正確。","（本題答案，敘述錯誤）依民法78條，限制行為能力人未得允許之「單獨行為」，效力是「無效」，不是「效力未定」。「效力未定」（79條）適用的是「契約」，本選項刻意把單獨行為跟契約的效力規則對調，是A段最經典的混淆陷阱組合（與99年第10題完全相同的考點）。","民法82條：相對人於契約未經法定代理人承認前，善意者得撤回之，敘述正確。","民法83條：限制行為能力人用詐術使人信其為有行為能力人或已得允許者，其法律行為為有效，敘述正確（與99年第2題同一法條觀念）。"],
 trap:"108年第2題是99年第10題同一考點的「正面敘述」考法——99-10考的是具體情境（債務免除是單獨行為→無效），108-2考的是法條規則本身（直接問哪個敘述錯誤）。兩題合在一起可以交叉驗證：你是真的懂「單獨行為→無效，契約→效力未定」這個規則，還是只記得情境題的答案。", related:"與99年第10題（單獨行為債務免除之效力）完全相同考點，不同年份出題方式；同時呼應99年第2題（限制行為能力人施用詐術，83條）。三題合併複習效果最佳。"},
{id:"EAF12", cat:"自然人", group:"A1自然人", year:"108年第12題", q:"10歲的男童A去同學B家中一起打電動遊戲時，因一言不合吵起來，一氣之下摔壞B父甲新購買的筆電。請問下列敘述何者錯誤？",
 opts:["若摔壞筆電時A有識別能力，則由A單獨負責，甲不可向A之法定代理人乙求償","若摔壞筆電時A有識別能力，則A和其法定代理人乙必須連帶負賠償責任","若摔壞筆電時A無識別能力，則A無須負責","若摔壞筆電時A無識別能力，則由其法定代理人乙單獨負責，但乙可舉證免責"], correct:0,
 exps:["（本題答案，敘述錯誤）民法187條第1項：行為時有識別能力者，與其法定代理人「連帶」負損害賠償責任——有識別能力時是A與法定代理人乙共同連帶負責，甲「可以」向A之法定代理人乙求償，本選項說「甲不可向乙求償」與法條規定相反。","依民法187條第1項，有識別能力時A和法定代理人乙連帶負賠償責任，敘述正確。","無識別能力時，A不具備侵權行為的歸責能力要件，A本人不負侵權責任，由法定代理人單獨負責，敘述正確。","民法187條第2項：法定代理人若舉證監督並未疏懈或縱加以相當監督仍不免發生損害者，免其責任，乙有監督免責抗辯的機會，敘述正確。"],
 trap:"⚠️ 本題官方答案為A（視覺核對確認），程式解析曾誤判為B，是本次對話發現並修正的重要錯誤之一。這題的核心規則：未成年人侵權責任依「識別能力」而非「行為能力」判斷——有識別能力→本人與法定代理人「連帶」負責（法定代理人不能拒絕）；無識別能力→法定代理人「單獨」負責（但得舉證免責）。考試常把「單獨」和「連帶」的責任主體對調，要仔細核對。", related:"與侵權行為（B+C段）的未成年人責任章節高度相關，是A段中延伸至債編概念的少數跨段題目。"},
{id:"EAF13", cat:"自然人", group:"A1自然人", year:"110年第3題", q:"下列有關失蹤人之敘述，何者正確？",
 opts:["失蹤人失蹤滿七年後，法院得因利害關係人或檢察官之聲請，為死亡之宣告","失蹤人為八十歲以上者，得於失蹤滿五年後，為死亡之宣告","失蹤人為遭遇特別災難者，得於特別災難終了滿三個月後，為死亡之宣告","失蹤人失蹤後，未受死亡宣告前，其財產之管理，除其他法律另有規定者外，依破產法之規定"], correct:0,
 exps:["（本題答案）民法8條第1項：失蹤人失蹤滿7年後，法院得因利害關係人或檢察官之聲請，為死亡之宣告，完全對應法條，敘述正確。","民法8條第2項：80歲以上者，縮短期間為「失蹤滿3年」，不是5年，本選項數字錯誤（3→5）。","民法8條第3項：遭遇特別災難者，縮短期間為「特別災難終了滿1年」，不是3個月，本選項數字錯誤（1年→3個月）。","失蹤人財產管理依「家事事件法」之規定，不是「破產法」，本選項把適用法律名稱替換成錯誤的法律，是常見的法律名稱混淆陷阱。"],
 trap:"死亡宣告三種期間（一般7年、80歲以上3年、特別災難終了後1年）是高頻數字記憶題，考試很愛把這三個數字互換或替換成看起來合理但錯誤的數字。建議用「七、三、一」這個口訣直接記死三個數字，遇到類似題目先反射性核對這三個數字有沒有被調換。", related:"與100年第15題（死亡宣告敘述，含檢察官聲請權）、112年第14題（死亡宣告效力時點）構成死亡宣告三連發，三題合併複習可完整掌握這個主題的全部常考細節。"},
{id:"EAF14", cat:"自然人", group:"A1自然人", year:"111年第10題", q:"下列有關住所之敘述，何者錯誤？",
 opts:["夫妻於雙方共同協議前，推定以共同戶籍地為其法定之住所","意定住所之設定須具備久住之意思及居住之事實","因特定行為選定居所，關於其行為，不得視為住所","16歲之年輕人，僅能以其父母之住所為法定住所"], correct:2,
 exps:["民法1002條：夫妻之住所，由雙方共同協議定之；法院裁定前，以夫妻共同戶籍地推定為住所，敘述正確。","民法20條第1項：以久住之意思，住於一定之地域者，即為設定住所——意定住所需同時具備主觀久住意思與客觀居住事實兩個要件，敘述正確。","（本題答案，敘述錯誤）民法22條規定：因特定行為選定居所者，關於其行為，「視為」住所——本選項把「視為」改成「不得視為」，方向完全相反，這是把法條肯定規定改寫成否定的「反話陷阱」。","民法21條：無行為能力人及限制行為能力人，以其法定代理人之住所為住所，16歲為限制行為能力人，以父母住所為法定住所，敘述正確。"],
 trap:"(C)選項的「不得視為」vs法條的「視為」這種反話陷阱，跟103年第6題選項D「一人僅得有兩住所」vs法條「不得同時有兩住所」如出一轍——都是把法條的肯定規定改寫成否定、或把禁止規定改寫成允許。看到法條原文是「視為/得/應」的地方，選項改成「不得視為/不得/不應」就幾乎可以斷定是陷阱。", related:"與103年第6題（住所之敘述）為同主題不同年份的重複命題，兩題的陷阱手法相互印證，務必合併比對熟記。"},
{id:"EAF15", cat:"自然人", group:"A1自然人", year:"111年第23題", q:"甲現年滿17歲，尚未結婚，亦未受監護或輔助宣告。下列何種行為，甲須得法定代理人之同意，始生效力？",
 opts:["訂立遺囑為遺贈之行為","純獲法律上利益之行為","就他人之物所為之無權處分行為","授予他人代理權之行為"], correct:3,
 exps:["民法1186條第2項：限制行為能力人，無須經法定代理人之允許，得為遺囑——訂立遺囑是遺囑制度特別允許限制行為能力人單獨為之的行為（前提是須滿16歲），甲17歲符合資格，不需法定代理人同意。","民法77條但書：純獲法律上利益，不適用須得法定代理人允許之規定——純獲利益（如單純接受贈與而無對待給付）不需要法定代理人同意，甲可自主接受。","無權處分（民法118條）的效力規則與行為能力是不同層次的問題——無權處分是效力未定（等待權利人承認），不是因為甲是限制行為能力人而需要法定代理人同意，這是不同制度的混淆。","（本題答案）授予他人代理權之行為，因可能間接使甲（本人）透過代理人對外負擔財產上義務，依通說與實務見解（呼應100年第19題），仍須得法定代理人之同意始為有效，不適用「純獲法律上利益」的例外規則。"],
 trap:"這題考的是「限制行為能力人不需法定代理人同意的例外行為」清單——遺囑（特別規定）、純獲利益（77條但書）、日常生活所必需（77條但書）是三個主要例外，授予代理權雖然看起來不直接使甲負擔義務，但因可能透過代理人間接使甲負擔財產責任，仍不在例外清單內。凡是不在例外清單的行為，原則上仍需法定代理人同意。", related:"與100年第19題（限制行為能力人授與代理權效力，更正題）高度呼應，兩題合併可確認「授予代理權需法定代理人同意」這個觀念在16年考題中反覆出現，是A段代理主題的高頻陷阱。"},
{id:"EAF16", cat:"自然人", group:"A1自然人", year:"112年第1題", q:"下列有關人的權利能力之敘述，何者錯誤？",
 opts:["人的權利能力始於出生終於死亡，因此胎兒尚未出生所以沒有權利能力","人的權利能力不得拋棄，更不得轉讓","法人除於法令或性質上之限制外，仍享有權利能力","植物人仍享有權利能力"], correct:0,
 exps:["（本題答案，敘述錯誤）雖然原則上權利能力始於出生，但民法7條設有特別保護：胎兒「以將來非死產者為限」，關於其個人利益之保護，「視為」既已出生——本選項用正確的大前提（始於出生）推導出過於武斷的結論（胎兒完全沒有權利能力），忽略了第7條的例外保護規定，是「正確前提+錯誤推論」的典型陷阱手法。","民法16條：權利能力不得拋棄，且其本質上亦不得轉讓（人格權的絕對屬人性），敘述正確。","民法26條：法人於法令限制內有享受權利負擔義務之能力——在法令及性質許可範圍內，法人有權利能力，敘述正確。","植物人仍是活著的自然人，依第6條仍具完整權利能力，不受意識或身體狀態影響，敘述正確（與101年第22題相同概念）。"],
 trap:"這題的陷阱是「正確的大前提＋忽略例外的錯誤推論」——「權利能力始於出生」本身沒錯，但推論到「胎兒沒有權利能力」就忽略了第7條胎兒利益保護的例外規定。考試很愛用這種「大原則正確，但推論時漏掉例外」的手法，養成「看到絕對化推論就去找例外規定」的習慣，是破解這類陷阱的關鍵。", related:"與101年第22題（植物人權利能力）、103年第5題（合夥不具權利能力）構成「權利能力主題群」三連發，三題合併複習可建立完整的權利能力考點地圖（含胎兒/植物人/合夥三種特殊主體的判斷）。"},
{id:"EAF17", cat:"自然人", group:"A1自然人", year:"112年第14題", q:"關於死亡宣告，下列敘述何者正確？",
 opts:["失蹤人失蹤滿三年後，法院得因利害關係人之聲請，為死亡之宣告","受死亡宣告者，以判決內所確定死亡之時，推定其為死亡","遺產稅捐徵收機關得為失蹤人向法院聲請死亡宣告","死亡宣告會剝奪失蹤人之權利能力"], correct:1,
 exps:["一般情形的失蹤期間是「滿7年」，不是3年，本選項數字錯誤（故意用較短的3年混淆視聽）。","（本題答案）民法9條第1項：受死亡宣告者，以判決內所確定死亡之時，推定其為死亡——注意死亡時點是「判決書內認定的死亡時間點」，不是「判決確定（生效）之日」，這兩者常被混淆，本選項正確敘述。","死亡宣告聲請權人依民法8條限於「利害關係人或檢察官」，稅捐機關不在法定聲請權人範圍內，本選項是聲請主體的混淆陷阱。","死亡宣告只是「推定」死亡、結束以原住居所為中心之法律關係，並不真正剝奪失蹤人的權利能力本身（若失蹤人仍活著，他在其他地方的法律行為仍有效），本選項把死亡宣告的效力誇大了（與100年第15題選項C同一概念）。"],
 trap:"這題把死亡宣告制度的三個常考陷阱集合在一題：①期間數字被改成錯誤的3年（正確：一般7年）②聲請主體被擴大到稅捐機關（正確：僅限利害關係人或檢察官）③死亡宣告效力被誇大為剝奪權利能力（正確：僅推定死亡，不剝奪權利能力）。建議把100年第15題、110年第3題、112年第14題這三題放在一起，建立死亡宣告主題的完整陷阱地圖。", related:"與100年第15題（死亡宣告各敘述）、110年第3題（失蹤期間數字）共同構成死亡宣告三連發，三題合併複習效果最佳。"},
{id:"EAF18", cat:"法人", group:"A2法人", year:"99年第1題", q:"法人社員總會決議之內容違反法令或章程者，其決議之效力：",
 opts:["有效","得撤銷","無效","效力未定"], correct:2,
 exps:["社員總會決議若違反法令或章程，不會單純有效，這與法律保護社團組織內部秩序與法令強制性的立法目的相違。","民法56條第2項區分了兩種瑕疵：召集程序或決議方法違法者，社員得於決議後三個月內請求法院撤銷其決議（得撤銷）；但「決議內容」違反法令或章程者，依同條文義及通說見解，此種決議自始、當然、確定地不生效力，性質上為「無效」，不適用三個月除斥期間的撤銷規定。","（本題答案）民法56條第2項但書：「但決議內容違反法令或章程者，無效。」決議內容本身牴觸法律強制規定或章程根本規範，屬於重大瑕疵，直接歸於無效，任何人皆得隨時主張，不受三個月除斥期間限制。","效力未定通常適用於行為人欠缺處分權或代理權限的情形（如無權處分、限制行為能力人訂立契約），與社員總會決議違反法令或章程的情境不同，不適用此處。"],
 trap:"這題的核心陷阱在於混淆「決議內容違法」與「召集程序/決議方法違法」這兩種不同瑕疵的法律效果：前者是無效（可隨時主張），後者是得撤銷（須於決議後3個月內向法院請求撤銷，逾期不得再爭執）。考試很愛把這兩種情境互換出題，務必記住「內容違法→無效」「程序違法→得撤銷（3個月內）」這組對應關係。", related:"與103年第4題（社團法人解散清算人職務）同屬法人內部治理規則章節。"},
{id:"EAF19", cat:"法人", group:"A2法人", year:"100年第17題", q:"關於法人依其性質，不得享有下列何種權利？",
 opts:["姓名權","自由權","專利權","名譽權"], correct:1,
 exps:["姓名權（在法人即為名稱權）是用來識別主體同一性的權利，法人作為獨立的權利主體，當然可以享有姓名（名稱）權，不受性質限制。","（本題答案）民法26條但書：法人於法令限制內，有享受權利、負擔義務之能力，但專屬於自然人之權利義務，不在此限。「自由權」（如人身自由、遷徙自由）是以自然人的生理性、人身性為前提，本質上只有自然人才能享有，法人不具有身體與意志的自由概念，依其性質不能享有自由權，是專屬自然人的權利。","專利權是財產權的一種，依專利法規定，法人可以是專利申請權人或專利權人，不受「專屬自然人」的限制。","名譽權雖然源自人格權概念，但依民法26條與實務見解，法人在其性質許可範圍內，仍享有名譽權（如商譽、商業信用評價），可以對侵害名譽的行為主張救濟。"],
 trap:"民法26條但書的「專屬於自然人之權利義務」是個常考但範圍容易模糊的概念，需要記住具體判斷標準：凡是以「生理性」「身體性」「人身自由意志」為前提的權利（如自由權、生命權、身體權），才是法人不能享有的部分；至於姓名（名稱）權、名譽權、財產權，法人在合理範圍內都能享有。考試常把「自由權」跟「姓名權」「名譽權」放在一起讓你判斷，要記住自由權是這類題目裡最典型的「法人不得享有」選項。", related:"與114年第3題（法人權利能力受性質限制，是否享有人格權）屬於同一概念延伸題目，可對照比較。"},
{id:"EAF20", cat:"法人", group:"A2法人", year:"101年第1題", q:"下列有關法人之敘述，何者錯誤？",
 opts:["社團法人應設章程","以遺囑捐助設立財團法人者，不以訂立捐助章程為必要","應設董事","應設監察人"], correct:3,
 exps:["民法47條：設立社團者，應訂定章程，社團法人成立的基本要件之一就是訂定章程，敘述正確。","民法60條第1項：財團法人之捐助章程，原則上應以捐助行為（書面或遺囑）訂立；但以遺囑捐助設立財團法人時，依實務與通說見解，遺囑本身已具備捐助章程的實質內容（捐助財產、目的等），不要求另外再訂立一份獨立的「捐助章程」文件，敘述正確。","民法27條第1項：法人應設董事，董事是法人對外執行業務、對外代表法人的必要機關，所有法人（社團與財團）皆應設董事，敘述正確。","（本題答案，敘述錯誤）民法27條第4項：法人得設監察人，監察人是「得設」而非「應設」的任意機關，並非每個法人都強制設置監察人，本選項把「得設」誤植為「應設」。"],
 trap:"這題的陷阱在於混淆法人「必設機關」與「任意機關」的區別：董事是必設機關（每個法人都要有），監察人則是得設機關（章程或捐助章程可以決定要不要設）。考試很愛把這兩種機關的強制性對調來製造陷阱，務必記住「董事必設、監察人得設」這個基本規則。", related:"與111年第9題（社團法人最高意思機關）、111年第24題（財團法人最高意思機關）同屬法人機關架構章節，建議合併複習。"},
{id:"EAF21", cat:"法人", group:"A2法人", year:"101年第24題", q:"甲為幫助清寒家庭學生求學，捐助三千萬元成立A教育基金會，經主管機關許可後，登記為法人，下列敘述何者最正確？",
 opts:["甲之捐助行為為事實行為","A教育基金會應設董事","A教育基金會為公益社團法人","A教育基金會應設總會，作為基金會之最高意思機關"], correct:1,
 exps:["捐助行為是以「捐助財產、表示設立財團法人目的」之意思表示為核心的法律行為（單獨行為），而非單純的事實行為（事實行為不需要意思表示，如先占、無因管理）；捐助人甲以其意思表示創設財團法人，屬於法律行為。","（本題答案）依民法27條第1項，法人應設董事，是所有法人（含財團法人）的必設機關。本題A教育基金會是以捐助財產方式設立，屬於財團法人，財團法人同樣應設董事，敘述正確。","本題情境是「甲捐助財產」成立基金會，這是典型的「財團法人」設立方式（以捐助財產為基礎，沒有社員），不是「社團法人」（以社員組織為基礎）。基金會、教育機構這類以捐助財產設立者，通常屬於財團法人，本選項把性質弄反了。","總會是「社團法人」的最高意思機關（由全體社員組成），財團法人因為沒有「社員」的概念（只有捐助財產與受益對象），不會有總會這個機關，本選項把社團法人的機關架構誤套用到財團法人身上。"],
 trap:"這題集中測試「社團法人」與「財團法人」的根本區別：社團法人以「人的組合」為基礎（有社員、有總會），財團法人以「財產的集合」為基礎（沒有社員、沒有總會，僅設董事執行捐助目的）。題目情境只要出現「捐助財產」「成立基金會」這類字眼，幾乎都是在描述財團法人，要直接排除「總會」「社員」相關的選項。", related:"與111年第24題（財團法人之敘述）、111年第9題（財團法人具自律法人性質之敘述）同屬社團法人vs財團法人辨析主題群，三題合併複習效果最佳。"},
{id:"EAF22", cat:"法人", group:"A2法人", year:"103年第4題", q:"關於社團法人解散時，清算人的職務內容，下列何者正確？①了結現務 ②收取債權 ③清償債務 ④變更章程",
 opts:["①②③","①②④","①③④","②③④"], correct:0,
 exps:["（本題答案）民法40條第1項：清算人之職務如左：一、了結現務。二、收取債權，清償債務。三、移交賸餘財產於應得者。①②③（了結現務、收取債權、清償債務）皆屬法定的清算人職務範圍。","同上，①②③為正確職務範圍，本選項多納入④變更章程，但變更章程不屬於清算人於清算程序中的法定職務。","同上，④變更章程不是清算人的職務，清算程序的核心任務是了結法人既有的法律關係、處理財產，而非變更已經準備走向消滅的法人組織章程。","同上，本選項漏列①了結現務，且仍誤納入④變更章程，與法定清算人職務範圍不符。"],
 trap:"這題的陷阱在於「變更章程」這個選項——法人即將解散清算，章程變更已無實益（法人本身都要消滅了），清算人的職責是處理善後（了結現務、收債、清債、最後移交賸餘財產），而不是調整法人未來的組織規則。只要看到「清算人職務」題型出現「變更章程」這個選項，幾乎可以直接判斷它不屬於清算人法定職務。", related:"與法人解散清算程序相關，可與99年第1題（社員總會決議瑕疵）一同建立法人組織治理的完整概念地圖。"},
{id:"EAF23", cat:"法人", group:"A2法人", year:"107年第15題", q:"民法關於法人之規定，下列敘述，何者錯誤？",
 opts:["法人可分為財團法人與社團法人","法人於法令限制內，有享受權利負擔義務之能力。但專屬於自然人之權利義務，不在此限","法人應設董事與監察人","法人對於其董事或其他有代表權之人因執行職務所加於他人之損害，與該行為人連帶負賠償之責任"], correct:2,
 exps:["民法總則第二章法人，依其成立基礎分為「社團法人」（以社員組織為基礎）與「財團法人」（以捐助財產為基礎）兩大類，這是民法上法人分類的基本架構，敘述正確。","民法26條：完全對應法條原文，敘述正確。","（本題答案，敘述錯誤）民法27條第1項規定法人「應設」董事，但監察人依同條第4項是「得設」，並非強制應設，本選項把監察人也說成應設，與法條規定不符。","民法28條：法人對於其董事或其他有代表權之人因執行職務所加於他人之損害，與該行為人連帶負賠償之責任——這是法人侵權責任的法定明文，敘述正確。"],
 trap:"這題再次測試「董事應設、監察人得設」這組基本規則，跟101年第1題是同一個陷阱組合的不同包裝方式，考試在16年間反覆用這個概念出題，務必牢記不要混淆。", related:"與101年第1題（社團法人應設機關之敘述）幾乎是同一考點的重複出題，務必對照熟記。"},
{id:"EAF24", cat:"法人", group:"A2法人", year:"111年第9題", q:"對於民法上有關法人規定之說明，下列何者正確？",
 opts:["財團法人具有自律法人之性質","社員資格須經社團之董事會特別決議同意，且有正當理由時，方能開除之","財團法人之設立，得以遺囑為之","社團法人以社團董事會為其最高意思機關"], correct:2,
 exps:["財團法人的設立目的、組織架構是由捐助人單方決定的捐助章程所拘束，董事僅是依捐助章程執行業務，財團法人並非由其成員自主訂定規範的「自律法人」，這個性質通常用來形容社團法人（社員可透過總會自主決議規範自身事務），本選項把社團法人的性質誤植給財團法人。","民法50條第1項第4款：社員之開除，屬於社團總會之權限（總會決議事項），不是由「董事會」決議；本選項把「總會」誤植為「董事會」，混淆了社團法人的機關權限分工。","（本題答案）民法60條第1項：財團法人之捐助行為，應以捐助章程定之。但以遺囑捐助者，得不訂立捐助章程——明文承認財團法人得以遺囑方式捐助設立，敘述正確。","民法總會是「社團法人」的最高意思機關，不是董事會；財團法人甚至沒有總會的概念，本選項把「總會」誤植為「董事會」。"],
 trap:"這題集中測試社團法人的機關分工：總會是最高意思機關，社員開除是總會（不是董事會）的權限。同時也再次測試財團法人「得以遺囑捐助設立」的特殊規則。考試很愛把「總會」跟「董事會」的權限互換來製造混淆，要記住總會才是社團法人真正的最高決策機構，董事是執行機關。", related:"與101年第24題、111年第24題同屬社團/財團法人辨析主題群。"},
{id:"EAF25", cat:"法人", group:"A2法人", year:"111年第24題", q:"關於財團法人之敘述，下列何者正確？",
 opts:["財團法人得為公益或營利之目的而設立","財團法人於設立登記前，應得主管機關之許可","財團法人之最高意思機關為總會，且為必設之機關","財團法人若以營利為目的設立，其取得法人資格，依特別法之規定"], correct:1,
 exps:["財團法人依民法規範體系，原則上以「公益」為目的設立（如基金會、教育機構），不像社團法人有「以營利為目的之社團」這種類型；財團法人本質上不太可能以單純營利為設立目的，本選項與民法對財團法人的基本定性不符。","（本題答案）民法59條：財團於設立登記前，應得主管機關之許可——財團法人設立採「許可主義」，必須先經過主管機關審核許可，才能進行設立登記，敘述正確。","財團法人沒有「社員」的概念，因此沒有總會這個機關，最高意思機關的概念不適用於財團法人，本選項把社團法人的機關架構誤套到財團法人。","以營利為目的而設立之社團，其取得法人資格，依特別法之規定（民法45條，這是針對「社團法人」中以營利為目的者的規定），本選項誤把這條規則套用到財團法人身上，但財團法人原則上不會是營利性質。"],
 trap:"這題的陷阱密度很高，集中在「財團法人」與「以營利為目的之社團法人」這兩個概念的混淆——選項A、D都試圖把「營利」的概念安在財團法人身上，但依民法體系，「得以營利為目的」「取得法人資格依特別法規定」這條規則（45條）是用在社團法人，不是財團法人。財團法人的核心定位就是公益性質的捐助財產組織。", related:"與111年第9題、101年第24題同屬財團法人主題群，三題合併複習可掌握完整考點。"},
{id:"EAF26", cat:"法人", group:"A2法人", year:"114年第3題", q:"下列敘述，何者與民法法人之規定並不相容？",
 opts:["民法關於公益社團法人之設立，係採取許可主義","法人解散後，在清算程序中，在清算之必要範圍內，仍具有法人格","法人之權利能力，受到性質上之限制，因此無法享有民法賦予自然人所有之人格權利","財團法人之設立，捐助人亦得以遺囑捐助之方式為之，且以此種方式設立之財團法人，無須訂立捐助章程"], correct:2,
 exps:["民法46條：以公益為目的之社團，於登記前，應得主管機關之許可——公益社團法人的設立同樣採許可主義，與財團法人的許可主義（59條）呼應，敘述與民法規定相容（正確）。","清算中的法人，依民法40條第2項：法人至清算終結止，在清算之必要範圍內，視為存續——法人解散後並非立即消滅法人格，而是在清算必要範圍內，法人格繼續存在直到清算終結，敘述與民法規定相容（正確）。","（本題答案，與民法規定不相容/錯誤）民法26條但書雖然規定法人不能享有「專屬於自然人」的權利義務（如自由權），但這不代表法人「無法享有民法賦予自然人所有之人格權利」這種絕對化講法——法人在性質許可範圍內，仍可享有姓名（名稱）權、名譽權等部分人格權，本選項把「部分受限」誇大成「完全無法享有」，與民法26條但書「但專屬於自然人之權利義務不在此限」的限定範圍規定不符，是過度推論的錯誤敘述。","民法60條第1項但書：以遺囑捐助者，得不訂立捐助章程——財團法人確實可以遺囑捐助設立，且此種方式設立者不須另訂捐助章程，與民法規定相容（正確）。"],
 trap:"這題問的是「何者不相容」，也就是要找出與法條規定矛盾的選項。陷阱在於選項C用了「無法享有...所有之人格權利」這種絕對化講法，而法條原文只規定「專屬於自然人」的部分權利不能享有，並非全部人格權都不能享有（法人仍可享有姓名權、名譽權）。這跟100年第17題（法人不得享有自由權）、114年第4題的概念互相呼應，務必記住「法人受限的是『專屬自然人』的部分，不是全部人格權」。", related:"與100年第17題（法人不得享有自由權）為同一概念在不同年份的延伸出題，務必交叉比對。"},
{id:"EAF27", cat:"法人", group:"A2法人", year:"114年第4題", q:"甲當選A法人董事，準備大顯身手，下列敘述何者錯誤？",
 opts:["就A法人一切事務，甲可代表A法人","A法人可僅設甲一位董事","A法人若對甲董事之代表權加以限制，其限制得對抗任何第三人","若A法人僅有甲與丙兩位董事，則該法人事務之執行，若兩人意見相左，則恐陷入表決的僵局"], correct:2,
 exps:["民法27條第2項：董事就法人一切事務，對外代表法人——董事原則上有概括的對外代表權限，敘述正確。","民法27條第1項僅規定「法人應設董事」，並未限定董事人數下限為複數，法人可以僅設一位董事，敘述正確。","（本題答案，敘述錯誤）民法27條第3項：對於董事代表權所加之限制，不得對抗善意第三人——法人對董事代表權的內部限制，僅在「相對人明知或可得而知」時才能對抗該相對人，對於不知情的「善意」第三人，這種限制不能對抗，本選項說「得對抗任何第三人」，與法條規定的「不得對抗善意第三人」恰好相反。","當法人僅設兩位董事且職權平等時，遇到意見不一致的情形，因為沒有第三人可以打破僵局（不像三人以上可多數決），確實容易陷入無法形成有效決議的僵局狀態，這是組織治理上合理推論的結果，敘述正確。"],
 trap:"這題的核心陷阱是「對董事代表權之限制，不得對抗善意第三人」這個規則——法人内部可以限制董事的代表權限（例如規定超過一定金額的契約需經其他董事同意），但這種限制只能拘束知情的人，對於不知情、信賴董事外觀代表權的善意第三人，法人不能用這種內部限制來推翻已經進行的交易，這是保護交易安全的重要規則，考試常考「得對抗」vs「不得對抗善意第三人」的方向是否說反。", related:"與103年第4題（清算人職務）同屬法人對外行為與內部治理規則章節。"},
{id:"EAF28", cat:"物", group:"A3物", year:"99年第8題", q:"下列何者，非屬事實行為？",
 opts:["無主物的先占","對要約的拒絕","無因管理","埋藏物的發現"], correct:1,
 exps:["無主物先占（民法802條）：以所有之意思，占有無主之動產，即取得所有權，這個過程不需要表示「想要取得所有權」的意思表示，只要有事實上的占有行為即可，是典型的事實行為。","（本題答案）對要約的拒絕，是一種「意思表示」——拒絕本身就是表意人向相對人傳達「不願意接受要約內容」的意思，必須具備行為能力等意思表示的有效要件，這是法律行為（單獨行為）的範疇，不是事實行為。","無因管理（民法172條）：管理人未受委任、並無義務，而為他人管理事務，這是基於事實上的管理行為而發生法定債之關係，不需要管理人有「想要成立契約」的效果意思，屬於事實行為。","埋藏物的發現（民法808條）：發現埋藏物而占有者，取得其所有權，同樣只需要事實上的發現與占有行為，不需要意思表示，屬於事實行為。"],
 trap:"「事實行為」與「法律行為」的根本區別在於：事實行為只需要客觀上發生某種事實狀態（先占、發現、管理）即發生法律效果，不需要行為人有「想要發生特定法律效果」的意思表示；法律行為（尤其是意思表示）則必須有效果意思的表達。考試常把「先占」「無因管理」「埋藏物發現」這類事實行為跟「拒絕」「承諾」「撤銷」這類需要意思表示的法律行為混在一起出題，要記住凡是「表示某種意願」的動作，幾乎都不是純粹的事實行為。", related:"與民法總則「法律事實」分類章節相關，是A段中題量最少（僅1題）但概念基礎的子主題。"},
{id:"EAF29", cat:"法律行為效力", group:"A4法律行為效力", year:"99年第2題", q:"現年十七歲的高中生甲，假造其父母的同意函，以3萬元向乙機車行購買中古機車一部，由於沒有駕照無法辦理過戶。試問：甲與乙間之機車買賣契約之效力如何？",
 opts:["效力未定","有效","無效","得撤銷"], correct:1,
 exps:["效力未定原本是限制行為能力人未得法定代理人允許訂立契約的一般效力（民法79條），但本題甲使用了「詐術」（假造同意函），適用更特殊的83條規定，不再停留在效力未定階段。","（本題答案）民法83條：限制行為能力人用詐術使人信其為有行為能力人或已得法定代理人之允許者，其法律行為為有效。甲假造父母同意函（施用詐術），使乙誤信甲已得法定代理人允許，依83條規定，這個買賣契約直接「有效」，甲不能再以自己是限制行為能力人為由主張契約效力未定或得撤銷，這是法律對惡意行使詐術者的制裁性規定。","無效通常適用於通謀虛偽意思表示、違反強制禁止規定或公序良俗等情形，本題情境不適用無效。","得撤銷通常適用於意思表示有瑕疵（錯誤、詐欺、脅迫）的情形，本題是限制行為能力人本身用詐術欺騙對方，不是甲被詐欺，不適用得撤銷。"],
 trap:"這題是民法第83條「詐術」規則的標準考法：限制行為能力人原本受到法律保護（契約效力未定，需法定代理人同意才生效），但如果限制行為能力人「主動使用詐術」讓對方誤信自己有完全行為能力或已得同意，法律就不再給予這種保護，直接認定契約有效，目的是避免未成年人惡意利用自己的身分保護機制來脫免責任、佔對方便宜。要特別注意「沒有駕照無法辦理過戶」這個事實不影響買賣契約本身的效力（過戶是物權移轉登記問題，與債權契約的買賣效力是兩回事）。", related:"與108年第2題（限制行為能力人詐術之規定）為同一法條觀念的另一種出題方式，建議合併複習。"},
{id:"EAF30", cat:"法律行為效力", group:"A4法律行為效力", year:"103年第2題", q:"關於形成權，下列敘述何者正確？",
 opts:["所謂形成權係指當事人得依據雙方自由意志，形成法律關係之權利","形成權的行使，原則上不得附條件或期限","形成權的行使期間，法律多設有消滅時效","同意權、抗辯權與解除權均屬形成權"], correct:1,
 exps:["形成權的本質特徵是：權利人「單方」的意思表示即可使法律關係發生、變更或消滅，不需要雙方合意（不是「雙方自由意志」共同形成），這是形成權與契約（雙方行為）最根本的差異所在。","（本題答案）形成權一旦行使，會立即使相對人的法律地位產生變動（如解除契約後對方立刻負回復原狀義務），為了維持法律關係的安定性，避免相對人的權利義務狀態長期處於不確定狀態，形成權的行使原則上不得附條件或期限，這是形成權行使的重要限制原則，敘述正確。","形成權的存續期間，依通說與實務見解，多適用「除斥期間」（如撤銷權1年、解除權未約定期限時催告後逾期消滅），而非消滅時效。除斥期間具有不變性、不能中斷或不完成的特性，與消滅時效（可中斷、不完成）性質不同，本選項把這兩種期間制度混淆了。","抗辯權（如同時履行抗辯權、先訴抗辯權）的性質是「拒絕履行」的權利，行使後使請求權的效力受到「阻卻」，但不會使法律關係本身發生變動（形成、變更、消滅），這與形成權「單方使法律關係發生變動」的本質不同，抗辯權不屬於形成權；同意權、解除權則屬於形成權。"],
 trap:"這題的陷阱密度很高，集中考形成權的三個核心特性：①單方行使即生效（不是雙方合意）②原則不得附條件期限（維持法律安定性）③適用除斥期間而非消滅時效。其中「抗辯權不屬於形成權」是最容易被忽略的細節——抗辯權只是讓你可以拒絕履行，不會改變法律關係本身，跟解除權、撤銷權、同意權這種會直接使法律關係生變的權利性質不同。", related:"與106年第27題、107年第12題、111年第11題（撤銷權之性質）同屬形成權概念延伸，建議四題合併建立完整的形成權考點地圖。"},
{id:"EAF31", cat:"法律行為效力", group:"A4法律行為效力", year:"103年第12題", q:"下列關於暴利行為之敘述，何者錯誤？",
 opts:["雖違反公序良俗，但有效","利害關係人得行使撤銷權","並非詐害債權行為","應於法律行為後一年內提起救濟"], correct:0,
 exps:["民法74條第1項：法律行為，係乘他人之急迫、輕率或無經驗，使其為財產上之給付，或為給付之約定，依當時情形顯失公平者，法院得因利害關係人之聲請，撤銷其法律行為或減輕其給付。暴利行為的本質就是違反公平正義（廣義上違反公序良俗的精神），但法條給予的效果是「得聲請法院撤銷」，而非當然有效，本選項若理解為「雖違反公序良俗但當然有效」則有問題，這也是本題officially列為可能正確答案之一的原因（A、B皆可能給分）。","民法74條第1項：法院得因「利害關係人」之聲請撤銷其法律行為，利害關係人（不限於受害的表意人本人）確實得行使這個聲請撤銷的權利，此敘述原則正確。","暴利行為的成立要件聚焦在「乘他人急迫輕率無經驗、顯失公平」，與「詐害債權行為」（民法244條，債務人惡意處分財產損害債權人利益）是不同的制度與規範對象，暴利行為並非詐害債權行為的一種，此敘述正確。","民法74條第2項：前項聲請，應於法律行為後一年內為之——暴利行為的撤銷聲請確實有1年的除斥期間限制，此敘述正確。"],
 trap:"本題官方公告為更正題（答A或B或AB者均給分），代表這題在選項A的表述上本身存在解讀爭議——「雖違反公序良俗，但有效」這句話，如果單純照字面解讀（法律行為已生效，只是『得』被撤銷），其實不算完全錯誤（因為暴利行為在被撤銷前確實是有效的，只是處於「得撤銷」狀態），這跟B選項「利害關係人得行使撤銷權」其實邏輯上有重疊或互相牽動的地方，導致官方最後從寬認定兩個答案都給分。考場上遇到類似「先講法律行為效力狀態、又同時牽涉撤銷權」的選項組合，要留意可能存在這種雙重解讀的空間。", related:"與111年第11題（暴利行為之規定）同屬暴利行為主題的兩種出題方式，務必合併複習加深印象。"},
{id:"EAF32", cat:"法律行為效力", group:"A4法律行為效力", year:"106年第16題", q:"關於物權法定主義，下列敘述何者正確？",
 opts:["僅得依制定法創設物權","僅得依特別法創設物權","得依習慣法創設物權","得依法理創設物權"], correct:2,
 exps:["物權法定主義的內涵並非「僅得依制定法」這麼狹隘，依民法757條的修正規定，物權的創設來源已不限於成文法律本身。","「僅得依特別法」的講法同樣過於侷限，物權法定主義允許的創設來源比單純的特別法更廣泛。","（本題答案）民法757條（2009年修正後）：物權除依法律或習慣外，不得創設——修法後明文承認「習慣法」也可以作為創設物權的依據（例如實務承認的習慣物權，如「擔保移轉」等），這是物權法定主義從「絕對僵化」走向「相對緩和」的重要修正，敘述正確。","「法理」並非民法757條明文承認的物權創設依據，物權法定主義的調整僅及於「法律」與「習慣」兩種來源，並未開放到法理層次，這個範圍若無限上綱到法理，會使物權種類過度浮動，違反物權法定主義維持交易安全與物權公示明確性的根本目的。"],
 trap:"這題考的是民法757條修法前後的差異——舊法只承認「依法律」創設物權（絕對物權法定主義），2009年修正後放寬為「依法律或習慣」皆可（相對物權法定主義）。考試的陷阱在於用「制定法」「特別法」「習慣法」「法理」四個來源互相替換考你是否準確記得法條只承認「法律」與「習慣」兩種，沒有開放到「法理」這麼寬。", related:"獨立主題，是民法總則「法律行為」延伸至物權編基本原則的橋接考點，建議與物權編（D段）複習時一併參照。"},
{id:"EAF33", cat:"法律行為效力", group:"A4法律行為效力", year:"106年第25題", q:"依民法規定，關於一定之數量有文字與號碼不符合之情形時，下列敘述何者錯誤？",
 opts:["若能探求出當事人原意，應以原意為準","若不能探求出當事人原意，而契約文書上對於同一數量同時以文字及號碼表示有不相符合之情形，應以文字為準","若不能探求出當事人原意，契約文書上對於同一數量同時以文字及號碼為數次表示時，應以文字最低額為準","若不能探求出當事人原意，契約文書上對於同一數量同時以文字及號碼為數次表示時，依實務見解，應以數字最低額為準"], correct:3,
 exps:["民法4條前段：關於一定之數量，原則上應以當事人原意為準，這是探求真意原則的基本適用，敘述正確。","民法4條後段：如法院不能決定何者為當事人之原意時，應以文字為準——這是契約文書「同時」以文字及號碼表示但不相符時的處理原則，敘述正確。","民法5條：關於一定之數量，以文字或號碼為數次表示者，如法院不能決定當事人之原意，應以最低額為準。第三選項描述「應以文字最低額為準」這個結論的一部分，整體理解上方向正確。","（本題答案，敘述錯誤）依民法5條，「以文字或號碼為數次表示者」的最低額原則，並不限定一定是「文字」的最低額或「數字」的最低額，而是在所有出現過的數次表示中（不論是用文字寫的還是用數字寫的），整體取其中金額最低的那個數字為準；本選項說「依實務見解，應以數字最低額為準」，把規則窄化限定成只看「數字」，與法條規範「不分形式，就所有數次表示中取最低額」的原意不符，是錯誤敘述。"],
 trap:"這題的核心陷阱是區分民法第4條（文字與號碼『同時』表示不符→以文字為準）與第5條（同一表示方式『數次』表示不符→以最低額為準，不限定是文字還是數字）兩種不同情境的適用規則。選項C跟D刻意用幾乎相同的文字（只把「文字最低額」換成「數字最低額」）製造混淆，要仔細看清楚法條第5條規範的「最低額」原則本身不限定文字或數字哪一種形式，而是看所有數次表示中最低的那個。", related:"獨立的法律行為解釋規則考點，題量不高但屬於容易被忽略的細節法條，值得花時間記熟第4條與第5條的差異。"},
{id:"EAF34", cat:"法律行為效力", group:"A4法律行為效力", year:"106年第27題", q:"關於撤銷權之性質，下列敘述何者錯誤？",
 opts:["撤銷權屬於形成權之一種，得因撤銷權人單方之意思表示到達相對人時，即生法律關係生效、變更或消滅之效力","撤銷權之行使期間，不受到消滅時效規定之限制","撤銷權行使後，其撤銷之客體視為自始無效","撤銷權須法律明文規定始得發生，當事人間不得以契約約定，由一方當事人因特定事由之發生而取得撤銷權"], correct:3,
 exps:["撤銷權是形成權的典型代表，單方意思表示到達相對人即生效力，不需要對方同意配合，敘述正確。","撤銷權的行使期間性質上是「除斥期間」，不是消滅時效，不適用消滅時效中斷、不完成等規定，敘述正確（呼應103年第2題形成權適用除斥期間的概念）。","民法114條第1項：法律行為經撤銷者，視為自始無效——撤銷的溯及效力是法律明文規定的效果，敘述正確。","（本題答案，敘述錯誤）撤銷權雖然多由法律明文規定（如意思表示瑕疵、暴利行為等法定撤銷權），但民法上並未禁止當事人「以契約另外約定」創設一方當事人於特定事由發生時取得撤銷權（即「約定撤銷權」），契約自由原則下，當事人可以在契約中自行約定撤銷的條件與效果，並非僅限於法律明文規定的撤銷權，本選項講法過於絕對，與契約自由原則不符。"],
 trap:"這題用三個正確敘述（形成權單方意思表示生效、適用除斥期間、撤銷視為自始無效）包裹一個錯誤敘述（撤銷權只能依法律明文規定，不能由當事人契約創設），陷阱在於「法定撤銷權」確實是民法最常見的撤銷權類型，但這不代表「約定撤銷權」就被禁止，契約自由原則下雙方仍可自行約定特殊的撤銷條款，本題在測試考生是否會被「撤銷權通常源自法條」這個既定印象誤導，進而忽略契約自由原則的彈性空間。", related:"與103年第2題（形成權之敘述）、107年第12題（撤銷權之規範）、111年第11題（暴利行為撤銷權）同屬撤銷權/形成權主題群，四題合併複習效果最佳，是A4段考最密集的重複命題子主題。"},
{id:"EAF35", cat:"法律行為效力", group:"A4法律行為效力", year:"107年第12題", q:"針對民法有關撤銷權之規範，下列敘述何者正確？",
 opts:["撤銷權僅能對不健全的意思表示為之，不得對法律行為或法律關係為之","任何撤銷權之行使，均只須以意思表示方式為之，即生法律效果","撤銷權因一定期間內不行使而消滅，此期間稱為消滅時效","撤銷權之法律性質與解除權相同，均屬形成權之一種"], correct:3,
 exps:["撤銷權的行使對象並不限於「意思表示瑕疵」（如錯誤、詐欺、脅迫），暴利行為的撤銷是針對整個「法律行為」、限制行為能力人未得允許之法律行為（特定情形）等也可能涉及撤銷的概念，撤銷權的適用範圍比單純「不健全的意思表示」更廣泛，本選項把範圍講得過窄。","撤銷權的行使方式原則上是以意思表示向相對人為之即可生效（如錯誤、詐欺、脅迫的撤銷），但「暴利行為」的撤銷依民法74條規定，必須「聲請法院」撤銷，不是單純意思表示就能生效，本選項「任何」撤銷權都只須意思表示的講法過於絕對，忽略了暴利行為這類須聲請法院的例外情形。","撤銷權的存續期間性質上是「除斥期間」，不是消滅時效，這是A4段反覆出現的核心概念（呼應103年第2題、106年第27題），本選項把這兩種期間制度混淆了。","（本題答案）撤銷權與解除權同樣具備「權利人單方意思表示即可使法律關係發生變動」的本質特徵，兩者都屬於形成權的範疇，敘述正確。"],
 trap:"這題集合了撤銷權主題前面幾題的所有陷阱重點：撤銷對象不限於意思表示瑕疵（暴利行為也適用）、撤銷方式不一定只用意思表示（暴利行為須聲請法院）、撤銷權適用除斥期間而非消滅時效。這四個選項剛好分別對應這幾個常考的細節混淆點，是A4段「撤銷權」主題的總複習題型，建議在徹底搞懂103-2、106-27之後再挑戰本題確認觀念是否真的釐清。", related:"與103年第2題、106年第27題、111年第11題同屬撤銷權/形成權主題群核心題目。"},
{id:"EAF36", cat:"法律行為效力", group:"A4法律行為效力", year:"111年第11題", q:"關於民法第74條暴利行為之規定，下列敘述何者正確？",
 opts:["當事人無論於財產給付前或給付後，均得聲請撤銷該暴利行為","撤銷權自該法律行為成立時起一年內不行使，罹於消滅時效而消滅","行使暴利行為之撤銷權時，應以意思表示向相對人為之","暴利行為自始當然無效"], correct:0,
 exps:["（本題答案）民法74條規範的暴利行為，不論財產上的給付或給付的約定是否已經實際履行（給付前或給付後），利害關係人都可以向法院聲請撤銷該法律行為或減輕給付，法條本身並未限制必須在給付前或給付後的特定時點才能聲請，敘述正確。","撤銷權1年的存續期間（民法74條第2項：應於法律行為後一年內為之），性質上是「除斥期間」而非消滅時效，本選項用詞錯誤（呼應103年第2題、106年第27題的核心觀念）。","暴利行為的撤銷方式，依民法74條第1項明文「法院得因利害關係人之聲請」撤銷，必須向法院聲請，不是單純向相對人為意思表示即可生效，這是暴利行為撤銷權與一般撤銷權（如錯誤、詐欺）行使方式不同之處，本選項與此不符（呼應107年第12題的概念）。","暴利行為在未經法院撤銷前，法律行為仍是「有效」的，只是處於「得撤銷」的狀態，並非自始當然無效，本選項把「得撤銷」誤植為「當然無效」（這正好呼應103年第12題選項A的爭議焦點）。"],
 trap:"這題是A4段暴利行為主題的總彙整考法，把103年第12題與107年第12題的核心觀念（撤銷需聲請法院、除斥期間非消滅時效、效力是有效非當然無效）整合在同一題的四個選項中考驗，是檢視你是否真正掌握「暴利行為」完整規則的關鍵題目。", related:"與103年第12題、107年第12題同屬暴利行為與撤銷權延伸主題，三題合併複習能完整掌握這個高頻考點。"},
{id:"EAF37", cat:"法律行為效力", group:"A4法律行為效力", year:"111年第25題", q:"下列何者屬於當然無效之法律行為？",
 opts:["單獨虛偽意思表示而該情形為相對人所明知者","詐欺之意思表示係由第三人所為，而相對人明知其事實或可得而知者","無權利人就權利標的物為處分後，取得其權利者","限制行為能力人用詐術使人信其為有行為能力人，所為之法律行為"], correct:0,
 exps:["（本題答案）民法86條：表意人無欲為其意思表示所拘束之意，而為意思表示者，其意思表示，不因之無效。但其情形為相對人所明知者，不在此限——這是「單獨虛偽意思表示」（心中保留）的規定，原則上有效（保護善意相對人），但但書規定：若相對人明知表意人無欲受拘束之意（也就是相對人也知道對方不是真心的），此時意思表示「無效」，這是當然、自始無效的法律效果，敘述正確。","民法92條第1項但書：詐欺係由第三人所為者，以相對人明知或可得而知其事實者為限，始得撤銷之——第三人詐欺的情形，即便相對人明知或可得而知，法律效果是表意人「得撤銷」，不是「當然無效」，撤銷前法律行為仍然有效，本選項與「當然無效」的法律效果不符。","無權利人就權利標的物為處分後，取得其權利者，依民法118條第2項：其處分自始有效——這是無權處分制度中「事後取得權利」的特殊規定，效果是讓原本效力未定的處分行為「溯及自始有效」，並非「無效」，本選項與法條規定的方向完全相反。","限制行為能力人用詐術使人信其為有行為能力人，依民法83條，其法律行為「為有效」（呼應99年第2題），並非無效，本選項與法條規定的效力完全相反。"],
 trap:"這題的四個選項分別測試四種不同的特殊效力規則（心中保留+相對人明知→無效；第三人詐欺+相對人明知→得撤銷而非無效；無權處分嗣後取得權利→溯及有效而非無效；限制行為能力人施用詐術→有效而非無效），要逐一準確記得每種情境的法律效果分別是什麼，不能只記得「通常」的效力規則，必須注意題目中這些「特殊情境/但書條款」帶來的效力轉變。", related:"與99年第2題（限制行為能力人施用詐術，民法83條）相互呼應；也與108年第13題（心中保留+相對人明知之意思表示效力）屬於同一法條（86條）不同年份出題方式，務必合併複習。"},
{id:"EAF38", cat:"法律行為效力", group:"A4法律行為效力", year:"112年第4題", q:"下列情形，那一行為需向法院聲請撤銷，才會發生撤銷之效力？",
 opts:["通謀虛偽意思表示所為之法律行為","因錯誤或誤傳之意思表示而為法律行為","被詐欺而為意思表示之法律行為","因暴利行為所為之法律行為"], correct:3,
 exps:["通謀虛偽意思表示（民法87條）的法律效果是當事人「相互故意為非真意之表示」者，其意思表示「無效」，這是當然無效，根本不需要、也沒有「撤銷」的問題，更不需要向法院聲請。","因錯誤或誤傳而為意思表示，依民法88、89條，表意人「得撤銷」其意思表示，這種撤銷只需要表意人向相對人為撤銷的意思表示即可生效，不需要向法院聲請。","被詐欺而為意思表示，依民法92條，表意人「得撤銷」其意思表示，同樣只需要以意思表示向相對人為之即可，不需要向法院聲請。","（本題答案）民法74條第1項：暴利行為，法院「得因利害關係人之聲請」撤銷其法律行為或減輕其給付——這是民法總則中少數明文要求「必須向法院聲請」才能撤銷的特殊類型，與一般撤銷權（錯誤、詐欺、脅迫）只需單純意思表示即可生效的方式不同，敘述正確。"],
 trap:"這題集中比較民法各種「撤銷」與「無效」制度在行使方式上的差異，核心陷阱在於要記住：絕大多數撤銷權（錯誤、誤傳、詐欺、脅迫）都只需要表意人以意思表示向相對人為之即可發生效力，**唯獨暴利行為（74條）是特殊例外，必須向法院聲請**才會發生撤銷效果。這題直接呼應107年第12題、111年第11題已經反覆強調過的「暴利行為撤銷需聲請法院」這個關鍵特殊規則，是這個概念的第三次重複出現，足見其重要性與高頻命題地位。", related:"與107年第12題、111年第11題同屬暴利行為撤銷方式主題，是同一考點在16年內反覆出現三次的高頻陷阱，務必牢記。"},
{id:"EAF39", cat:"法律行為效力", group:"A4法律行為效力", year:"112年第7題", q:"依民法之規定，約定利率超過週年百分之多少，則超過之部分會無效？",
 opts:["12","16","20","25"], correct:1,
 exps:["12%並非民法205條規定的利率上限數字，是常見的混淆數字之一（容易跟實務上其他金融法規或舊法版本的數字混淆）。","（本題答案）民法205條（2021年修正後）：約定利率，超過週年百分之16者，超過部分之約定無效——這是現行法規定的最高利率上限，超過此上限的約定利息部分，不生法律效力（但本金與未超過部分的利息仍然有效）。","20%不是現行民法205條的數字，但容易與其他特別法（如某些消費借貸特別規定）或舊制混淆，要特別注意這是民法的「一般約定利率上限」，不是其他特殊類型契約的利率規定。","25%同樣不是民法205條的數字，是另一個常見的混淆誘答選項。"],
 trap:"這是純粹的法條數字記憶題，民法205條的利率上限「年息16%」是2021年修法後的新數字（舊法原本是年息20%），如果你記憶停留在舊版條文（20%），考試時就會誤判。務必確認自己記的是修法後的最新版本：超過週年16%的約定利息部分無效。這種數字題沒有取巧空間，建議直接把「16%」這個數字跟「民法205條」綁在一起死記。", related:"獨立的數字記憶型考點，與消費借貸契約相關，建議在複習C段（各種之債）消費借貸主題時一併參照。"},
{id:"EAF40", cat:"意思表示瑕疵", group:"A5意思表示瑕疵", year:"101年第2題", q:"甲於98年6月1日受乙脅迫，約定將甲所有之動產以遠低於市價之價格出售予乙。事經2年餘後，乙請求甲依約交付該動產。下列敘述何者正確？",
 opts:["甲得於撤銷原先受脅迫所為之意思表示後，拒絕給付","甲得撤銷受脅迫意思表示之權利行使期間已過，應為給付","即使甲未撤銷受脅迫所為之意思表示，仍得拒絕給付","甲得主張與乙所締結之契約自始無效，拒絕給付"], correct:2,
 exps:["這個選項的方向（撤銷後拒絕給付）原則上是對的操作流程，但本題的關鍵在於「2年餘」這個時間點是否已經超過撤銷權的除斥期間，若已經超過，甲就不能再透過撤銷來拒絕給付，所以這個選項在本題情境下不成立。","民法93條：撤銷權，應於發現詐欺或脅迫終止後，1年內為之；但自意思表示後，經過10年，不得撤銷。本題甲是受乙脅迫，距今2年餘，但本題標準答案並非認為甲的撤銷權已經消滅。","（本題答案）民法92條第1項，因被脅迫而為意思表示者，表意人得撤銷其意思表示——脅迫對自由意志的侵害程度比詐欺更嚴重，民法給予被脅迫人更強的保護。本題官方認定的方向是：被脅迫人即便尚未正式行使撤銷權，仍可以對於對方的履行請求提出抗辯而拒絕給付，不一定要先完成撤銷的形成行為才能拒絕給付。","被脅迫而為意思表示，依民法92條規定的法律效果是「得撤銷」，不是「自始無效」；契約在撤銷前仍然有效，本選項把「得撤銷」誤植為「自始無效」，混淆了這兩種不同效力狀態。"],
 trap:"這題涉及脅迫意思表示撤銷權除斥期間的精細計算，以及在除斥期間内被脅迫人是否需要正式行使撤銷權才能拒絕給付的細節判斷，是A5段中法律推理層次較複雜的一題。核心觀念仍是脅迫得撤銷、非自始無效，以及除斥期間1年（自發現脅迫終止後）/10年（自意思表示後）雙重限制的計算方式。", related:"與104年第3題（脅迫贈與骨董之效力）同屬脅迫意思表示主題的兩種出題方式。"},
{id:"EAF41", cat:"意思表示瑕疵", group:"A5意思表示瑕疵", year:"104年第3題", q:"甲對乙表示，如不贈與家傳骨董，即告發其走私之事，乙被迫贈與之。該贈與契約之效力為：",
 opts:["有效","無效","得撤銷","效力未定"], correct:2,
 exps:["本題依一般通說，甲以告發走私之事作為脅迫手段，迫使乙為贈與的意思表示，依民法92條，這構成受脅迫的意思表示，效果原則上是得撤銷而非單純有效；但本題官方公告答A或C皆給分，顯示這題在實務認定上存在手段是否具備不法性的爭議空間——如果認為告發走私本身是合法行使權利的手段，則甲的行為可能不構成法律上的脅迫，這樣乙的贈與意思表示可能仍然有效，這是答案A也能成立的論理基礎。","無效通常適用於通謀虛偽意思表示等情形，本題情境不屬於通謀虛偽，不適用無效的法律效果。","（本題官方主要認定答案之一）依通說見解，甲的行為若被認定具備脅迫的不法性，依民法92條第1項，乙得撤銷其受脅迫所為之贈與意思表示。","效力未定通常適用於欠缺處分權或代理權限的情形，與本題單純的意思表示瑕疵情境不符，不適用此處。"],
 trap:"本題是A段中少見的手段合法性是否影響脅迫成立的進階概念，學說與實務對於以行使合法權利作為要脅手段是否仍構成民法上的脅迫存在不同看法，這也是官方最終從寬認定A、C皆給分的原因。考場上若遇到類似情境題，要有意識到這裡存在解讀空間。", related:"與101年第2題（脅迫意思表示之效力）同屬脅迫制度主題。"},
{id:"EAF42", cat:"意思表示瑕疵", group:"A5意思表示瑕疵", year:"106年第5題", q:"關於意思表示錯誤，下列敘述何者正確？",
 opts:["當事人資格之錯誤，可能得撤銷之","表意人得向相對人請求損害賠償","動機錯誤，均為意思表示內容之錯誤","表示行為錯誤，不得撤銷"], correct:0,
 exps:["（本題答案）民法88條第2項：當事人之資格，若交易上認為重要者，其錯誤，視為意思表示內容之錯誤——當事人資格錯誤在交易上被認為重要時，視為內容錯誤的一種，依88條第1項，表意人得撤銷其意思表示（但須無過失），敘述正確。","民法91條：依88條、89條規定撤銷意思表示時，表意人對於信其意思表示為有效而受損害之相對人或第三人，應負賠償責任——但這是表意人對相對人負損害賠償責任，而不是表意人向相對人請求損害賠償，本選項把賠償請求的方向說反了。","動機錯誤是指表意人為意思表示的內心緣由發生錯誤，原則上不屬於意思表示內容的錯誤，不影響意思表示效力（除非已表示於外並構成內容一部分，如88條第2項）。本選項說動機錯誤均為內容錯誤過於絕對，與通說區分動機錯誤與內容錯誤的原則不符。","表示行為錯誤依民法89條準用88條規定，符合要件時表意人得撤銷其意思表示，並非不得撤銷，本選項與法條規定相反。"],
 trap:"這題集中測試意思表示錯誤的分類體系：內容錯誤（含當事人資格、物之性質等交易上重要事項的錯誤）vs動機錯誤（原則上不影響效力）vs表示行為錯誤（準用88條得撤銷）。考試常把這三種錯誤類型的法律效果互換或誇大其詞，要記住只有當事人資格、物之性質這類在交易上重要的動機，才會視為內容錯誤，不是所有動機錯誤都算。", related:"與108年第13題（通謀虛偽意思表示）、110年第7題（意思表示不一致整體規則）共同構成完整的A5意思表示瑕疵主題群。"},
{id:"EAF43", cat:"意思表示瑕疵", group:"A5意思表示瑕疵", year:"108年第13題", q:"甲並無將其所有價值十萬元之A手錶出售的意思，卻向乙表示欲以五千元出售之，乙明知甲無出售A手錶之意思，仍當場表示願意以五千元購買時，甲出售A手錶之意思表示的效力如何？",
 opts:["有效","無效","甲得撤銷","效力未定"], correct:1,
 exps:["本題情境是甲沒有真正想出售手錶的意思，卻表示願意出售（單獨虛偽意思表示／心中保留），這種情形原則上有效，但本題乙明知甲沒有出售的真意，已經符合86條但書的例外情形，不再是單純的有效。","（本題答案）民法86條：表意人無欲為其意思表示所拘束之意，而為意思表示者，其意思表示，不因之無效。但其情形為相對人所明知者，不在此限——這是單獨虛偽意思表示（心中保留）的規定。本題甲沒有真正想出售A手錶的意思，但向乙表示願意出售；乙明知甲沒有出售的真意，仍當場表示願意購買，符合86條但書相對人所明知的要件，此時甲的意思表示無效，敘述正確。","撤銷通常適用於意思表示有瑕疵但相對人不知情、需要透過撤銷機制平衡雙方利益的情形；本題是相對人明知的心中保留情形，法律效果直接是無效，不需要也不適用撤銷這個機制。","效力未定通常適用於欠缺處分權或代理權限的情形，與本題單純的意思表示瑕疵情境不符，不適用此處。"],
 trap:"這題是單獨虛偽意思表示（心中保留）的標準考法：原則上有效（保護善意不知情的相對人），但如果相對人明知表意人沒有真意，這種保護就沒有存在的必要，法律效果直接翻轉為無效。考試很愛用明知、不知情這個關鍵字來決定答案方向，務必看清楚題目中相對人是否明知表意人沒有真意，這是86條但書適用與否的關鍵判斷點。", related:"與111年第25題（單獨虛偽意思表示而相對人明知之效力）幾乎是同一法條的重複出題，務必合併複習加深印象。"},
{id:"EAF44", cat:"意思表示瑕疵", group:"A5意思表示瑕疵", year:"110年第7題", q:"關於意思表示不一致的敘述，下列何者正確？",
 opts:["表意人無欲為其意思表示所拘束之意，而為意思表示者，其意思表示無效","表意人無欲為其意思表示所拘束之意，而為意思表示，其情形為相對人所明知者，其意思表示有效","表意人與相對人通謀而為虛偽意思表示者，其意思表示不因之無效","虛偽意思表示，隱藏他項法律行為者，適用關於該項法律行為之規定"], correct:3,
 exps:["民法86條本文：表意人無欲為其意思表示所拘束之意，而為意思表示者，其意思表示，不因之無效——單獨虛偽意思表示（心中保留）原則上不因之無效，也就是原則上有效，本選項說無效與法條本文規定相反（除非符合但書相對人明知的例外，才會無效）。","承前題，86條但書規定相對人所明知者不在此限（也就是不適用不因之無效這個原則，效果回到無效），本選項把方向完全說反了——相對人明知時，意思表示應該是無效，不是有效。","民法87條第1項：表意人與相對人通謀而為虛偽意思表示者，其意思表示無效——這是通謀虛偽意思表示的規定，雙方都知情且故意做假，法律效果是當然無效，本選項說不因之無效（即有效）與法條規定相反。","（本題答案）民法87條第2項：虛偽意思表示，隱藏他項法律行為者，適用關於該項法律行為之規定——這是通謀虛偽意思表示中隱藏行為的處理規則。例如雙方通謀假裝買賣（虛偽行為，無效），實際上是要贈與（隱藏的真實行為），這時法律不會因為表面的虛偽買賣無效就連帶否定底下真正想做的贈與行為，而是直接適用贈與的相關規定來處理雙方的真實法律關係，敘述正確。"],
 trap:"這題是A5段意思表示瑕疵主題的綜合彙整題，把86條跟87條的規則放在同一題的四個選項中互相對照測試，是檢驗A5段整體掌握度的關鍵總結題。要特別記住87條第2項隱藏行為這個進階觀念——雖然表面行為無效，但底下真正想做的法律行為若具備該行為的有效要件，仍然依該行為的規定處理。", related:"與108年第13題、106年第5題共同構成完整的A5意思表示瑕疵主題群。"},
{id:"EAF45", cat:"代理", group:"A6代理", year:"99年第4題", q:"以下關於代理制度之敘述，何者正確？",
 opts:["無權代理人所為之法律行為屬無效之法律行為","甲為乙之代理人，乙在學校被其他同學霸凌，甲憤而到學校為乙出氣毆打霸凌之同學，則應由乙負賠償責任","代理人於代理權限內以本人名義所為之法律行為對本人有效","代理人在代理期間，因為無從辨識之故，只能為本人服務，禁止從事自己的法律行為"], correct:2,
 exps:["無權代理人所為的法律行為，依民法170條第1項，是「效力未定」（須經本人承認才生效，本人拒絕承認則不生效力於本人），並非當然「無效」，本選項與法條規定不符。","甲毆打霸凌同學的行為，是甲基於個人情緒所為的「侵權行為」（毆打他人），與「代理權限內、以本人名義所為的法律行為」完全無關——代理制度規範的是法律行為的代理，不包括這種與代理事務無關的個人侵權行為，應由甲本人自行負侵權責任，不能歸由本人乙負責。","（本題答案）民法103條第1項：代理人於代理權限內，以本人名義所為之意思表示，直接對本人發生效力——這是代理制度的核心規則，代理人合法代理本人為法律行為，其法律效果直接歸屬於本人，敘述正確。","代理人除了執行被授權的代理事務外，仍然是獨立的權利主體，可以同時從事自己的法律行為（如自己另外簽訂與代理事務無關的契約），代理權的授與不會禁止代理人從事自己的法律行為，本選項講法過於絕對且與代理制度的本質不符。"],
 trap:"這題用四個選項分別測試代理制度的不同層面：無權代理效力（效力未定，非無效）、代理人個人行為與代理事務的區隔（侵權行為不屬代理範疇）、代理的核心效果（103條本人直接受拘束）、代理人是否喪失自己的行為能力（沒有喪失）。要特別注意選項B這種「情境包裝題」，題目故意把代理人的個人情緒行為包裝成看似與代理有關的情境，但實際上跟代理權限內的法律行為毫無關係，要能快速辨識出這種混淆。", related:"與110年第5題、111年第8題同屬代理制度核心規則章節，三題合併複習可建立完整的代理基礎概念。"},
{id:"EAF46", cat:"代理", group:"A6代理", year:"99年第7題", q:"意定代理權之授與，其法律性質為何？",
 opts:["雙方行為","共同行為","無相對人之單獨行為","有相對人之單獨行為"], correct:3,
 exps:["雙方行為（契約）需要雙方意思表示合致才能成立，但代理權的授與只需要本人單方的意思表示即可成立，不需要代理人同時表示同意接受代理權（代理人接不接受是另一回事，不影響授權行為本身的成立），不屬於雙方行為。","共同行為是指多數人朝同一方向所為的意思表示（如社團總會決議），與代理權授與這種單方對單方的法律行為性質不同。","無相對人之單獨行為是指不需要向特定人表示、單方就能生效的行為（如拋棄動產所有權），但代理權的授與必須向「代理人」或「將與代理人為代理行為之相對人第三人」表示，需要有受領的對象，不屬於無相對人之單獨行為。","（本題答案）代理權的授與，是本人單方的意思表示，且必須向代理人或相對人為之才能生效，這在學理上稱為「有相對人之單獨行為」——既具有「單方意思表示即可成立」（不需要代理人同意才生效）的單獨行為特性，又具有「須向特定相對人表示」的要件，敘述正確。"],
 trap:"這題考的是代理權授與行為在「單獨行為vs雙方行為」「有相對人vs無相對人」兩個分類軸上的精確定位，是民法總則中比較抽象的法律行為分類概念。記憶口訣：代理權授與＝本人單方說了算（不需代理人同意）+必須講給代理人或相對人聽（需要受領對象）＝有相對人之單獨行為。", related:"與100年第19題（限制行為能力人授與代理權之效力）、111年第23題（授予代理權是否需法定代理人同意）同屬代理權授與性質的延伸概念，可一併複習。"},
{id:"EAF47", cat:"代理", group:"A6代理", year:"101年第31題", q:"甲為乙之代理人，下列敘述何者最正確？",
 opts:["若甲為意定代理人，其被相對人丙詐欺所為之代理行為，應由甲自行撤銷","甲逾越代理權限所為之代理行為，得因乙之承認而確定生效","若甲僅十六歲，甲所為之代理行為無效","若甲為乙之法定代理人，得因乙之同意，為雙方代理行為"], correct:1,
 exps:["代理人甲於代理行為中被相對人丙詐欺，依民法105條：代理人之意思表示，因其意思欠缺、被詐欺、被脅迫，或明知其事情或可得而知其事情，致其效力受影響時，其事實之有無，應就「代理人」決定之——代理行為是否受詐欺影響的判斷以代理人為準，但「撤銷權」的行使，性質上仍是要使該代理行為的法律效果（已經歸屬於本人乙）受影響，撤銷權應由本人乙來行使（因為法律效果歸屬於本人），而不是由代理人甲自行撤銷，本選項把撤銷權人弄錯了。","（本題答案）民法170條第1項：無代理權人以代理人之名義所為之法律行為，非經本人承認，對於本人不生效力——「逾越代理權限」所為的代理行為，屬於無權代理的一種（超出授權範圍的部分視為無權代理），這部分法律行為效力未定，得因本人乙之承認而溯及生效，敘述正確。","民法104條：代理人所為或所受意思表示之效力，不因其無行為能力或限制行為能力而受影響——代理人的行為能力不影響代理行為的效力，即便甲只有16歲（限制行為能力人），其代理行為仍然有效，不因此無效，本選項與法條規定相反。","民法106條：代理人非經本人之許諾，不得為本人與自己之法律行為，亦不得既為第三人之代理人，而為本人與第三人之法律行為（雙方代理）。本題若甲是「法定代理人」（如父母對未成年子女），雙方代理的禁止規定原則上仍然適用，但法定代理人與本人之間通常不存在「本人同意」的對等關係（未成年子女難以對法定代理人為有效同意），法定代理人的雙方代理問題與意定代理的情形不完全相同，本選項簡化處理「得因乙之同意」這個前提，在法定代理的脈絡下並不準確。"],
 trap:"這題考的是代理制度中幾個容易被混淆的細節規則：①代理人意思表示瑕疵的判斷以代理人為準，但撤銷權應由本人行使（因為效力歸屬本人）②代理人行為能力不影響代理效力（104條）③逾越代理權限屬無權代理，得因本人承認而生效（170條）④雙方代理原則禁止，但須區分意定代理人經本人許諾與法定代理人這類特殊情境的適用差異。這四個選項分別測試不同細節，是A6代理段法律推理層次較深的一題。", related:"與99年第4題（代理制度基本規則）、111年第8題（自己代理、表見代理）同屬代理制度延伸主題。"},
{id:"EAF48", cat:"代理", group:"A6代理", year:"107年第2題", q:"A公司董事長甲於5月1日上午告訴其助理乙致函於丙，表示願以一億元購買其工廠。乙於5月2日上午發信，信於5月4日到達丙處。經查，甲於5月2日晚上心肌梗塞死亡，丙於5月6日函覆A公司為承諾，試問買賣契約是否成立？",
 opts:["買賣契約不成立","買賣契約效力未定，需視A公司繼任董事長是否承認決定其效力","買賣契約效力未定，需視甲之繼承人是否承認決定其效力","買賣契約成立"], correct:3,
 exps:["本題涉及要約人於要約發出後死亡是否影響要約效力的問題，依民法95條第2項：表意人於發出通知後死亡，其意思表示，不因之失其效力——要約人死亡不影響已發出之要約的效力，所以契約並非當然不成立。","本題的要約是以「A公司」名義（甲是公司董事長，代表公司對外表示要約），A公司是獨立的法人，不因董事長個人死亡而消滅或喪失要約能力，不需要等待「繼任董事長承認」這種效力未定的機制，本選項的前提（公司要約因負責人死亡而效力未定）不成立。","同上，本題要約是公司（法人）所為，不是甲個人的要約，不適用「甲死亡後需視其繼承人是否承認」這種針對自然人意思表示死亡的處理方式，本選項把公司要約誤認為個人要約處理。","（本題答案）民法95條第2項：表意人於發出通知後死亡...其意思表示不因之失其效力——本題的要約是以A公司名義發出（甲僅是代表公司傳達意思的機關/代理人角色），公司本身作為法人不因甲死亡而消滅，要約持續有效；丙於收受要約（5月4日到達）後，於合理期間內（5月6日）為承諾，要約與承諾意思表示合致，買賣契約成立，敘述正確。"],
 trap:"這題的核心陷阱在於正確辨識「要約人是誰」——表面上是甲在說話、甲也死亡了，但法律上的要約人其實是「A公司」（甲只是公司的代表機關，以公司名義對外表示），所以甲死亡這件事，不適用民法95條第2項「表意人死亡不影響其已發出意思表示效力」的規則在「甲」這個自然人身上做文章，而是要先正確判斷「真正的表意人是法人A公司」，法人不會因為某個自然人代表死亡而消滅，契約自然能夠成立。這題同時也呼應95條的死亡不失效原則，但陷阱重點放在法人與自然人代表之間的角色釐清。", related:"與99年第7題、110年第5題同屬代理/意思表示相關的延伸應用題，可一併建立完整的法人對外行為架構觀念。"},
{id:"EAF49", cat:"代理", group:"A6代理", year:"107年第3題", q:"下列有關使者之敘述，何者錯誤？",
 opts:["使者係在傳達他人的意思表示","使者得為無行為能力人","身分行為不可藉使者傳達其意思表示","使者未適時傳達的危險由表意人承擔"], correct:2,
 exps:["使者（傳達人）與代理人不同，使者本身沒有獨立決定意思表示內容的權限，只是單純把「他人（本人）已經決定好的意思表示」原封不動地傳達出去，敘述正確。","使者只是傳達工具，不需要具備完整的行為能力（因為使者不是自己在「決定」意思表示的內容，只是傳達），即便是無行為能力人，也可以擔任使者的角色傳達他人的意思表示，敘述正確。","（本題答案，敘述錯誤）身分行為（如結婚、收養等具有高度屬人性的法律行為）依通說與實務見解，原則上「得」透過使者傳達意思表示（例如透過使者傳達結婚的意思表示，只要本人的真意確實如此），這跟「代理」不同——代理在身分行為上通常受到較嚴格的限制（如結婚不得代理），但「使者傳達」並非代理，使者只是單純傳話的工具，並未實際「決定」身分行為的內容，因此身分行為原則上仍可透過使者傳達，本選項講「不可藉使者傳達」與通說見解不符。","使者傳達意思表示時若發生傳達不實、遲延等錯誝，這個風險原則上由「表意人」（本人）自行承擔，因為使者是表意人自己選任、自己信賴的傳達工具，敘述正確。"],
 trap:"這題考的是「使者」與「代理人」的根本區別：使者沒有自主決定意思表示內容的權限，純粹是傳話工具；代理人則有一定範圍內自主決定如何完成代理事務的權限。正因為使者只是傳話工具（沒有實質決定權），身分行為這種高度屬人性的法律行為，原則上仍可以透過使者傳達（不像代理在身分行為上受到嚴格限制），這是這題的核心陷阱所在，要記住「使者≠代理」這個根本區別帶來的法律效果差異。", related:"與99年第7題（代理權授與性質）可對照比較使者與代理人這兩種傳達/代為行為主體的本質差異。"},
{id:"EAF50", cat:"代理", group:"A6代理", year:"110年第5題", q:"關於代理的敘述，下列何者正確？",
 opts:["代理權係以法律行為授與者，其授與應向代理人或向代理人對之為代理行為之第三人，以書面授權方式代理為之","代理人有數人者，其代理行為應單獨為之。但法律另有規定或本人另有意思表示者，不在此限","由自己之行為表示以代理權授與他人，或知他人表示為其代理人而不為反對之表示者，對於第三人應負授權人之責任。但第三人明知其無代理權或可得而知者，不在此限","代理人於代理權限內，以本人名義所為之意思表示，直接對本人發生效力。而無代理權人以代理人之名義所為之法律行為則為無效"], correct:2,
 exps:["民法167條：代理權係以法律行為授與者，其授與應向代理人或向代理人對之為代理行為之第三人，以「意思表示」為之——法條只要求「意思表示」即可，並未限定一定要用「書面」方式，本選項把要件講得過於嚴格，與法條不符（代理權授與原則上不要式，口頭表示也可以）。","民法168條本文：代理人有數人者，其代理行為應「共同」為之。但法律另有規定或本人另有意思表示者，不在此限——數人共同代理時，原則上應「共同」行使代理權（避免意見不一致時各自為之造成混亂），本選項說「應單獨為之」與法條原則「應共同為之」恰好相反。","（本題答案）民法169條：由自己之行為表示以代理權授與他人，或知他人表示為其代理人而不為反對之表示者，對於第三人應負授權人之責任。但第三人明知其無代理權，或可得而知者，不在此限——這是「表見代理」的法定明文，完全對應條文，敘述正確。","前段「代理人於代理權限內，以本人名義所為之意思表示，直接對本人發生效力」（103條）正確；但後段「無代理權人以代理人之名義所為之法律行為則為無效」與民法170條規定不符——無權代理是「效力未定」（須經本人承認），不是當然無效，本選項後半段把效力未定誤植為無效。"],
 trap:"這題是A6代理段的綜合彙整考法，集中測試代理權授與的方式要求（167條，不要求書面）、數人代理應共同為之（168條，不是單獨）、表見代理的構成要件（169條，本題答案）、無權代理效力未定而非無效（170條，再次呼應99年第4題的核心觀念）。是檢驗你是否完整掌握代理制度167-170條整個體系的關鍵題目。", related:"與99年第4題、111年第8題同屬代理制度核心法條（103-170條）整體架構，三題合併複習效果最佳。"},
{id:"EAF51", cat:"代理", group:"A6代理", year:"111年第8題", q:"有關現行民法代理制度之介紹，下列何者錯誤？",
 opts:["未經本人事前同意之自己代理，對於本人而言，係無效之代理行為","民法第169條表見代理效力之發生，須無本人之授予代理權為其要件","間接代理人之代理行為不會對本人直接發生效力","代理人為代理行為時，被相對人詐欺，本人得自行撤銷該代理行為"], correct:0,
 exps:["（本題答案，敘述錯誤）民法106條：代理人非經本人之許諾，不得為本人與自己之法律行為（自己代理），亦不得既為第三人之代理人，而為本人與第三人之法律行為（雙方代理）。但其法律行為，係專履行債務者，不在此限——未經本人同意的自己代理，依通說與實務見解，其法律效果是「效力未定」（類推適用無權代理的規則，得因本人事後承認而補正生效），並非當然「無效」，本選項把效力未定誤植為無效。","表見代理（169條）成立的前提，正是本人「實際上並未真正授予代理權」給該行為人，但因本人的行為或不作為，使第三人有正當理由相信該行為人有代理權，法律為保護交易安全，使本人對第三人負授權人責任——如果本人真的有授予代理權，那就是「有權代理」，不需要、也不會適用表見代理制度，敘述正確。","間接代理是指代理人以「自己」的名義（不是以本人名義）為本人計算所為的法律行為（如行紀），其法律效果先歸屬於代理人自己，再依內部約定移轉給本人，不像直接代理（103條）那樣，代理行為「直接」對本人發生效力，敘述正確。","代理人於代理行為中被相對人詐欺，依民法105條，意思表示瑕疵的事實判斷以代理人為準，但因為這個瑕疵影響的法律效果最終歸屬於本人，本人（作為實際承受法律效果之人）依通說得自行行使撤銷權，敘述正確（這也呼應101年第31題選項A的延伸概念，但101-31題中是「相對人受詐欺」的情境，要區分清楚誰才是受詐欺的一方）。"],
 trap:"這題的核心陷阱在於「未經同意之自己代理／雙方代理」的效力定性——很多人直覺認為違反106條禁止規定就是「無效」，但通說與實務見解是類推適用無權代理規則，效力為「效力未定」，本人事後仍可以承認補正，這跟「無效」（自始確定不生效力、不能補正）有根本上的不同。這是代理制度中相當細緻、容易被直覺誤判的考點。", related:"與99年第4題（無權代理效力未定）、101年第31題（雙方代理規則）、110年第5題（無權代理效力規則）同屬代理制度的核心效力規則，建議搭配複習釐清「效力未定」在代理制度各種情境下的適用範圍。"},
{id:"EAF52", cat:"消滅時效除斥期間", group:"A7消滅時效除斥期間", year:"99年第3題", q:"甲向乙影視事業公司租借10片電影DVD片，10天共計租金為1000元，則乙對甲之請求權消滅時效期間為何？",
 opts:["15年","10年","5年","2年"], correct:3,
 exps:["15年是民法125條規定的「一般消滅時效期間」（請求權，因15年間不行使而消滅），但本題情境屬於有特別規定的短期時效類型，不適用一般15年的規定。","10年不是民法上常見的短期時效數字，與本題情境（租賃物之租金請求權）不符，是干擾選項。","5年是民法126條規定的部分短期時效類型之一（如利息、紅利、租金、贍養費、退職金等定期給付債權，因5年間不行使而消滅），這個數字容易與本題的「動產出租人」短期時效（127條）混淆，但本題情境更精確對應的是127條的規定。","（本題答案）民法127條第8款：動產出租人，對於承租人因損害賠償及墊費償還之請求權，及承租人對於出租人，因左列原因發生之債權，因2年間不行使而消滅...其中「租賃物之租金」相關請求權，依127條規定（特別是出租人對承租人之租金給付請求權），適用2年的短期消滅時效，這是民法針對日常生活中頻繁發生、金額通常較小的債權類型（如旅店住宿費、運費、工資、律師報酬等），特別縮短時效期間以利早日確定法律關係的立法政策。"],
 trap:"這題考的是民法消滅時效「一般時效（15年，125條）vs短期時效（5年/2年，126條/127條）」的精確區分。125條是一般原則，126條規範的是「定期給付債權」（利息、租金、退職金等），127條則規範一系列日常生活中常見的特定債權類型（旅店飲食費、運送費、工資、動產租金等），每種類型的時效期間數字都不同，是純粹的法條記憶題，務必把126條的5年與127條的2年清楚區分開來，不要混淆。", related:"A7段目前僅此1題，是A段中題量最少的子主題之一，建議搭配B段（債編總則）消滅時效相關內容一併複習，建立完整的時效期間數字記憶地圖。"}
];
const CAT_COLORS={
  "自然人":"#6B7D9E","法人":"#5C7A4A","物":"#C17A2E",
  "法律行為效力":"#A8402B","意思表示瑕疵":"#7C6A8E",
  "代理":"#5B7A99","消滅時效除斥期間":"#B08D57"
};
const GROUP_COLORS={
  "A1自然人":"#6B7D9E","A2法人":"#5C7A4A","A3物":"#C17A2E",
  "A4法律行為效力":"#A8402B","A5意思表示瑕疵":"#7C6A8E",
  "A6代理":"#5B7A99","A7消滅時效除斥期間":"#B08D57"
};
let activeCats=new Set(Object.keys(GROUP_COLORS));
let mastery={};let deck=[...CARDS];let idx=0;
let flipped=false;let selectedOpt=null;let quizStats={ok:0,ng:0};
const chipsEl=document.getElementById('chips');
const resetBtn=document.getElementById('resetBtn');
const cardEl=document.getElementById('card');
const qText=document.getElementById('qText');
const optList=document.getElementById('optList');
const badgeFront=document.getElementById('badgeFront');
const badgeBack=document.getElementById('badgeBack');
const yearFront=document.getElementById('yearFront');
const yearBack=document.getElementById('yearBack');
const badgeMasteryFront=document.getElementById('badgeMasteryFront');
const badgeMasteryBack=document.getElementById('badgeMasteryBack');
const answerBanner=document.getElementById('answerBanner');
const expList=document.getElementById('expList');
const trapText=document.getElementById('trapText');
const relatedText=document.getElementById('relatedText');
const curNum=document.getElementById('curNum');
const totalNum=document.getElementById('totalNum');
const catName=document.getElementById('catName');
const progFill=document.getElementById('progFill');
const quizOk=document.getElementById('quizOk');
const quizNg=document.getElementById('quizNg');
async function loadMastery(){
  try{const res=await window.storage.get('exam_mastery_a_full_v1');
    if(res&&res.value)mastery=JSON.parse(res.value);}
  catch(e){mastery={};}
}
async function saveMastery(){
  try{await window.storage.set('exam_mastery_a_full_v1',JSON.stringify(mastery));}
  catch(e){console.error('storage save failed',e);}
}
function getStat(id){
  const m=mastery[id];
  if(!m)return{status:null,attempts:0,correct:0};
  if(typeof m==='string')return{status:m,attempts:1,correct:(m==='mastered'?1:0)};
  return m;
}
function masteryIcon(stat){
  if(!stat.status)return'';
  const icon=stat.status==='mastered'?'✅':'🔄';
  return stat.attempts>0?`${icon}×${stat.attempts}`:icon;
}
function updateOverallStats(){
  let attempts=0,correct=0,mastered=0;
  CARDS.forEach(c=>{
    const s=getStat(c.id);attempts+=s.attempts;correct+=s.correct;
    if(s.status==='mastered')mastered++;
  });
  document.getElementById('totalAttempts').textContent=attempts;
  document.getElementById('overallAcc').textContent=attempts?Math.round(correct/attempts*100)+'%':'—';
  document.getElementById('masteredCount').textContent=mastered;
  document.getElementById('totalCards').textContent=CARDS.length;
}
Object.keys(GROUP_COLORS).forEach(group=>{
  const count=CARDS.filter(c=>c.group===group).length;
  const displayName=group.replace(/^A\d/,'');
  const chip=document.createElement('div');
  chip.className='chip active';
  chip.style.background=GROUP_COLORS[group];
  chip.style.borderColor=GROUP_COLORS[group];
  chip.style.color='#fff';
  chip.textContent=`${displayName}(${count})`;
  chip.dataset.group=group;
  chip.addEventListener('click',()=>{
    if(activeCats.has(group)){
      if(activeCats.size===1)return;
      activeCats.delete(group);
      chip.classList.remove('active');
      chip.style.background='#fff';
      chip.style.color=GROUP_COLORS[group];
    }else{
      activeCats.add(group);
      chip.classList.add('active');
      chip.style.background=GROUP_COLORS[group];
      chip.style.color='#fff';
    }
    rebuildDeck();
  });
  chipsEl.appendChild(chip);
});
resetBtn.addEventListener('click',()=>{
  activeCats=new Set(Object.keys(GROUP_COLORS));
  document.querySelectorAll('.chip[data-group]').forEach(chip=>{
    const g=chip.dataset.group;chip.classList.add('active');
    chip.style.background=GROUP_COLORS[g];chip.style.color='#fff';
  });
  rebuildDeck();
});
function rebuildDeck(){
  deck=CARDS.filter(c=>activeCats.has(c.group));
  idx=0;render();
}
function render(){
  const c=deck[idx];
  const color=GROUP_COLORS[c.group];
  flipped=false;selectedOpt=null;
  cardEl.classList.remove('flipped');
  qText.textContent=c.q;
  badgeFront.textContent=c.cat;badgeFront.style.background=color;
  badgeBack.textContent=c.cat;badgeBack.style.background=color;
  yearFront.textContent=c.year;yearBack.textContent=c.year;
  document.querySelector('.face.back').style.borderLeftColor=color;
  const stat=getStat(c.id);
  const icon=masteryIcon(stat);
  badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;
  curNum.textContent=idx+1;totalNum.textContent=deck.length;
  catName.textContent='・'+c.cat;
  progFill.style.width=((idx+1)/deck.length*100)+'%';
  optList.innerHTML='';
  const letters=['A','B','C','D'];
  c.opts.forEach((opt,i)=>{
    const div=document.createElement('div');
    div.className='opt';
    div.innerHTML=`<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    div.addEventListener('click',()=>selectOption(i));
    optList.appendChild(div);
  });
}
function selectOption(i){
  if(flipped)return;
  const c=deck[idx];
  selectedOpt=i;
  const correct=(i===c.correct);
  document.querySelectorAll('.opt')[i].classList.add('selected');
  answerBanner.className='answer-banner '+(correct?'correct':'wrong');
  const letters=['A','B','C','D'];
  answerBanner.textContent=correct
    ?`✅ 答對！正解是 ${letters[c.correct]}`
    :`❌ 答錯了，你選 ${letters[i]}，正解是 ${letters[c.correct]}`;
  expList.innerHTML='';
  c.exps.forEach((exp,j)=>{
    const div=document.createElement('div');
    div.className='exp-item'+(j===c.correct?' right':'');
    const mark=j===c.correct?'✓ 正解':'✗';
    div.innerHTML=`<div class="exp-head">${letters[j]}. ${mark}</div><div>${exp}</div>`;
    expList.appendChild(div);
  });
  trapText.textContent=c.trap||'';
  relatedText.textContent=c.related||'';
  if(correct)quizStats.ok++;else quizStats.ng++;
  const stat=getStat(c.id);
  stat.attempts+=1;if(correct)stat.correct+=1;
  stat.status=correct?'mastered':'review';
  mastery[c.id]=stat;saveMastery();
  quizOk.textContent=quizStats.ok;quizNg.textContent=quizStats.ng;
  updateOverallStats();
  setTimeout(()=>{flipped=true;cardEl.classList.add('flipped');},150);
  const icon=masteryIcon(stat);
  badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;
}
cardEl.addEventListener('click',()=>{
  if(flipped){flipped=false;cardEl.classList.remove('flipped');}
});
function goNext(){idx=(idx+1)%deck.length;render();}
function goPrev(){idx=(idx-1+deck.length)%deck.length;render();}
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('shuffleBtn').addEventListener('click',()=>{
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];
  }
  idx=0;render();
});
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight')goNext();
  if(e.key==='ArrowLeft')goPrev();
});
document.getElementById('markMastered').addEventListener('click',()=>{
  const c=deck[idx];const stat=getStat(c.id);stat.status='mastered';
  mastery[c.id]=stat;saveMastery();
  const icon=masteryIcon(stat);
  badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;
  updateOverallStats();
});
document.getElementById('markReview').addEventListener('click',()=>{
  const c=deck[idx];const stat=getStat(c.id);stat.status='review';
  mastery[c.id]=stat;saveMastery();
  const icon=masteryIcon(stat);
  badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;
  updateOverallStats();
});
document.getElementById('resetQuiz').addEventListener('click',()=>{
  quizStats={ok:0,ng:0};quizOk.textContent=0;quizNg.textContent=0;
});
document.getElementById('resetMastery').addEventListener('click',async()=>{
  if(!confirm('確定要清除所有學習記錄？此動作無法復原。'))return;
  mastery={};await saveMastery();render();updateOverallStats();
});
(async function init(){
  await loadMastery();rebuildDeck();updateOverallStats();
})();
</script>
</body>
</html>
