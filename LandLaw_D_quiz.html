<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandLaw D quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.72rem;padding:5px 11px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.64rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);}
.opt:disabled{cursor:default;}
.ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}.el.no{background:#b0b8c4;color:#fff;}.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}</style>
</head>
<body>
<div class="app">
<h1>土地法 D篇 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">D1 徵收程序 ／ D2 徵收補償標準 ／ D3 區段徵收 ／ D4 撤銷廢止徵收與收回權｜共 78 題</div>
<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>
<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text"><span id="pd">0</span>/<span id="pt">0</span> 已答・正確率 <span id="pr">-</span></div>
</div>
<div id="list"></div>
</div>
<script>const CARDS=[{"ch": "D1", "chName": "D1 徵收程序與要件", "year": "100", "num": 12, "q": "下列何者非為土地徵收時依法應進行之程序？", "opts": ["協議價購", "舉辦公聽會", "舉辦聽證會", "舉辦說明會"], "ans": 2, "exps": ["❌ 協議價購（土地徵收條例第11條）是徵收前的法定必要程序，需用土地人應先與所有權人協議，屬必要程序。", "❌ 公聽會（土地徵收條例第10條）是需用土地人申請徵收前必須舉辦的法定程序，屬必要程序。", "✓ 聽證（非公聽會）只有在特定農業區農牧用地遭徵收且所有權人有爭議時才需舉辦，一般徵收程序不需要舉行聽證會。公聽會是一般必要程序，聽證是特殊情形才需要，兩者不同，這是本題的核心陷阱。", "❌ 說明會也是徵收程序的一環（對居民說明徵收計畫），屬必要程序。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "100", "num": 14, "q": "同一土地有二以上需用土地人申請徵收時，其核定原則為：", "opts": ["以其申請書之安置計畫妥善性為核定原則", "以其申請之單位層級為核定原則", "以興辦事業性質之輕重為核定原則", "以興辦事業規模之大小為核定原則"], "ans": 2, "exps": ["❌ 安置計畫妥善性不是同一土地多方申請時的核定原則，此選項為干擾。", "❌ 申請單位層級（中央or地方）不是核定原則。", "✓ 土地徵收條例第15條：同一土地有二以上需用土地人申請徵收時，以「興辦事業之性質輕重」為核定原則；國防、交通等重要性較高的事業優先。", "❌ 規模大小不是核定原則，性質輕重才是。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "101", "num": 7, "q": "依土地徵收條例規定，中央主管機關為審議徵收案件，應遴聘（派）專家學者、民間團體及相關機關代表，以合議制方式辦理之。其中專家學者及民間團體代表不得少於多少比例？", "opts": ["二分之一", "三分之二", "四分之三", "五分之二"], "ans": 0, "exps": ["✓ 土地徵收條例第14條：中央主管機關審議徵收案件，應遴聘（派）專家學者、民間團體及相關機關代表，以合議制方式辦理，其中「專家學者及民間團體代表不得少於二分之一」。1/2是法定最低比例，確保外部獨立性。", "❌ 過高，非法定比例。", "❌ 過高，非法定比例。", "❌ 低於1/2，不符法定要求。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "101", "num": 9, "q": "依土地徵收條例第11條規定協議價購，應由需用土地人依何種價格與所有權人協議？", "opts": ["土地公告現值加四成", "市場正常收益價格", "市場正常交易價格", "毗鄰該地之平均公告土地現值"], "ans": 2, "exps": ["❌ 公告現值加四成是舊制徵收補償標準，現行土地徵收條例協議價購不是以此為基準。", "❌ 收益價格是估價方法之一，不是協議價購的法定價格基準。", "✓ 土地徵收條例第11條：需用土地人申請徵收土地前，應與所有權人協議，協議之價格以「市場正常交易價格」為準。強調「正常交易價格」（非公告現值、非收益價格），確保補償合理。", "❌ 毗鄰地的平均現值是公設保留地補償的方式，不是協議價購的法定基準。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "102", "num": 2, "q": "土地徵收條例規定，需用土地人因興辦事業而徵收土地時，應綜合何種因素，以評估是否具備公益性及必要性？①社會因素②經濟因素③文化及生態因素④地價因素", "opts": ["①②③", "①②④", "①③④", "②③④"], "ans": 0, "exps": ["✓ 土地徵收條例第3條之1：需用土地人因興辦事業而徵收土地，應依比例原則就社會、經濟、文化及生態等因素，評估有無公益性及必要性。注意：「地價因素」④不在法定評估因素之列，這是本題的核心陷阱——地價是徵收後補償的問題，不是判斷是否徵收的公益必要性評估因素。", "❌ 含地價因素，但地價不在法定評估因素內。", "❌ 含地價因素，不符法定規定。", "❌ 含地價因素，且漏掉社會因素①。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "103", "num": 15, "q": "有關徵收土地地點選擇，下列何者為非？", "opts": ["興辦公益事業應避免使用公有土地或國營事業土地", "特定農業區農牧用地，除零星夾雜難以避免者外，不得徵收", "申請徵收之土地，遇有登錄之歷史建築應於可能範圍內避免之", "興辦公益事業應儘量避免耕地"], "ans": 0, "exps": ["✓ 本選項為本題「何者為非」的答案。土地徵收條例規定，徵收應「優先使用公有土地」，再考慮私有土地；「避免使用公有土地」正好相反，是錯誤描述。「應優先使用公有土地→再使用私有土地」才是正確順序。", "❌ 本選項描述正確，符合土地徵收條例規定，非錯誤。", "❌ 本選項描述正確，徵收應避免歷史建築，非錯誤。", "❌ 本選項描述正確，徵收應儘量避免耕地，非錯誤。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "107", "num": 12, "q": "依土地徵收條例規定，關於特定農業區農牧用地之徵收，下列何者錯誤？", "opts": ["除零星夾雜難以避免者外，不得徵收。但國防所必須或經行政院核定之重大建設所需者，不在此限", "除零星夾雜難以避免者外，不得徵收。但交通所必須或經行政院核定之重大建設所需者，不在此限", "特定農業區經行政院核定為重大建設須辦理徵收者，若有爭議，應依行政程序法舉行聽證", "特定農業區經行政院核定為重大建設須辦理徵收者，若有爭議，應依行政程序法舉行公聽會"], "ans": 3, "exps": ["❌ 本選項描述正確，國防例外符合法條，非錯誤。", "❌ 本選項說的是「交通所必須」而非「國防所必須」，與法條文字有差，但依官方答案，此選項非本題錯誤答案。", "❌ 本選項描述正確，有爭議時需舉行聽證，符合法條，非錯誤。", "✓ 本選項為錯誤敘述：特定農業區有爭議時，應舉行的是「聽證」（不是公聽會）。聽證與公聽會是不同的程序，聽證的正式程度更高、當事人參與權更完整。公聽會是一般徵收的程序，聽證是特農有爭議時的特別程序，本選項混淆兩者。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "113", "num": 8, "q": "依土地徵收條例規定，有關徵收之程序，下列何者正確？", "opts": ["特定農業區經行政院核定為重大建設須辦理徵收者，應依行政程序法舉行聽證", "需用土地人於事業計畫報請目的事業主管機關許可後，應舉行公聽會", "協議價購時，依其他法律規定有優先購買權者，無優先購買權之適用", "需用土地人於所有權人拒絕參與協議或經開會未能達成協議時，則改申請徵收"], "ans": 2, "exps": ["❌ 本選項描述正確，特農有爭議應舉行聽證，符合法條。", "❌ 本選項描述有誤：公聽會應於「申請徵收前」舉行，不是「報請目的事業主管機關許可後」；且本選項說的是一般公聽會，時序描述有誤。但官方答案是C，故B非本題正確答案。", "✓ 土地徵收條例第11條第2項：依其他法律規定有優先購買權者，於協議價購時，「無優先購買權之適用」。例如，耕地承租人依耕地三七五減租條例有優先購買權，但在協議價購情形下不適用此優先購買權。", "❌ 本選項描述正確，協議不成可申請徵收，符合法條流程。"]}, {"ch": "D1", "chName": "D1 徵收程序與要件", "year": "114", "num": 3, "q": "辦理土地徵收時，徵收事業經行政院核定為重大建設，徵收範圍內之特定農業區農牧用地，如土地所有權人對於土地列入徵收範圍有爭議，經說明後仍有異議，則中央目的事業主管機關應辦理那一項民眾參與方式？", "opts": ["聽證", "說明會", "公聽會", "陳述意見"], "ans": 0, "exps": ["✓ 同107-12的考點：特定農業區農牧用地因行政院核定重大建設須辦理徵收，若土地所有權人對列入徵收範圍有爭議，經說明後仍有異議，則中央目的事業主管機關應依行政程序法舉行「聽證」（不是公聽會）。此考點在107和114年都考了，是D1的固定陷阱。", "❌ 說明會是一般程序，不是有爭議時的救濟程序。", "❌ 公聽會是一般徵收的法定程序（申請徵收前舉辦），不是特農有爭議時的特別程序。", "❌ 陳述意見是行政處分前給予當事人的程序保障，不是本情形的特別程序。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "99", "num": 18, "q": "被徵收土地之所有權人，對於其土地之權利義務，於何時終止？", "opts": ["於市縣地政機關接到徵收土地案核准通知時", "於徵收補償發給完竣屆滿1年時", "於應受補償費發給完竣時", "於徵收公告期滿時"], "ans": 2, "exps": ["❌ 核准通知只是行政程序，所有權人的權利義務此時尚未終止。", "❌ 1年後是收回權的起算點，不是權利義務終止的時點。", "✓ 土地徵收條例第27條：被徵收土地所有權人之權利義務，於「應受補償費發給完竣時」終止。「應受」是關鍵字——即使當事人拒絕受領，存入保管專戶時也視同發給完竣，此時權利義務即告終止。", "❌ 公告期滿代表徵收程序完成，但所有權人的權利義務要等到補償發給完竣才終止，兩個時點不同。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "99", "num": 19, "q": "依土地徵收條例規定，因興辦臨時性公共建設工程而徵用土地時，每年其使用補償費應如何計算？", "opts": ["依市價", "依公告土地現值", "依公告土地現值加四成", "依公告土地現值百分之十"], "ans": 3, "exps": ["❌ 市價是一般徵收補償的基準，不是徵用補償的計算方式。", "❌ 公告土地現值是地價稅和土增稅的基準，不是徵用使用補償費的計算方式。", "❌ 公告現值加四成是特殊情形下徵收補償的加成方式，不是徵用使用補償費的計算方式。", "✓ 土地徵收條例第58條：因興辦臨時性公共建設工程而徵用土地，每年使用補償費按「公告土地現值的10%」計算。10%是徵用（臨時使用）的固定比例，與永久徵收的補償標準完全不同，是D2的數字考點。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "99", "num": 21, "q": "被存入專戶保管之徵收補償費，受領人自通知送達生效之日起，逾幾年未領取者即歸屬國庫？", "opts": ["3", "9", "10", "15"], "ans": 3, "exps": ["❌ 3年是收回權觸發條件（補償完竣後3年未開始使用），不是保管專戶歸國庫的年限。", "❌ 9年不是任何法定期限，為干擾選項。", "❌ 10年是一個容易混淆的選項，112年後的修法重點是10年（後來法條修改過，但本題依官方公告答案為D即15年，以舊法為準）。", "✓ 依本題考選部官方答案，逾「15年」未領取歸屬國庫（注意：112年後修法改為10年，但本題99年版本答案為15年，以題庫官方答案D為準）。陷阱：113年第7題答案卻是「逾10年未領取者應歸屬國庫」（A選項錯誤），顯示法律已修改，新版為10年。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "100", "num": 11, "q": "依土地徵收條例規定，建築改良物徵收當時之補償費，按下列何種價格估定之？", "opts": ["重置價格", "重建價格", "重定價格", "重購價格"], "ans": 1, "exps": ["❌ 重置價格是將資產恢復到相同功能的現代成本，與重建價格略有不同；建築改良物徵收補償用「重建價格」，非「重置價格」。", "✓ 土地徵收條例第31條：建築改良物之補償費，按徵收當時該建築改良物之「重建價格」估定。重建價格指重新建造相同建物所需費用（考慮折舊），是B選項正確的關鍵字，不是重置、重定或重購。", "❌ 「重定價格」為虛構名詞，非法定用語。", "❌ 「重購價格」為虛構名詞，非法定用語。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "100", "num": 13, "q": "依土地徵收條例規定，有關徵收補償標準之描述，下列何者錯誤？", "opts": ["建築改良物，按徵收當時該建築改良物之重建價格估定之", "農作改良物之補償費，按徵收當時該農作改良物之成本估定", "被徵收之土地，按照徵收當期之公告土地現值，補償其地價，必要時得加成補償", "公共設施保留地，按毗鄰非公共設施保留地之平均公告土地現值補償"], "ans": 1, "exps": ["❌ 本選項描述正確（重建價格），非錯誤。", "✓ 本選項為錯誤敘述：農作改良物的補償費，依孳息成熟時期分兩種標準——距成熟不超過1年者按「成熟時之孳息」估定，超過1年者按「種植及培育費用並參酌現值」估定。並非一律「按成本」，本選項描述不完整且有誤。", "❌ 本選項描述正確，符合土地徵收條例第30條。", "❌ 本選項描述正確，符合土地徵收條例第30條第2項。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "102", "num": 6, "q": "依土地法規定關於農作改良物之定義，下列何者不屬之？", "opts": ["農作物", "維護保育", "水利土壤之改良", "農作物以外之其他植物"], "ans": 1, "exps": ["❌ 農作物（農田種植的作物）是農作改良物的一種，屬之。", "✓ 土地法所稱農作改良物包括：農作物、農林作物之外的其他植物、水利土壤之改良等；「維護保育」是一種行為或目的，不是具體的農作改良物項目，故本選項「不屬之」。", "❌ 水利土壤改良（如灌溉設施、土壤改良）屬農地改良的一種，屬農作改良物範疇，故屬之。", "❌ 農作物以外的其他植物（如樹木、花草）也是農作改良物，屬之。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "102", "num": 8, "q": "在都市計畫區內之公共設施保留地被徵收時，其地價補償之標準為何？", "opts": ["應按一般徵收當期之市價", "應按徵收當期公告土地現值加成補償", "應按鄰近公共設施用地之市價", "應按毗鄰非公共設施保留地之平均市價"], "ans": 3, "exps": ["❌ 公設保留地的補償基準不是市價，而是毗鄰非公設保留地的平均市價（注意：此題公告答案為D，但D說的是「平均市價」而非「平均公告土地現值」，表示本題的公設保留地補償特指市價而非公告現值，以官方答案D為準）。", "❌ 一般土地徵收按公告土地現值補償，但公設保留地有特殊規定（按毗鄰非公設地補償）。", "❌ 應按「毗鄰非公共設施保留地」的市價，而非其他公設用地的市價。", "✓ 土地徵收條例第30條第2項：在都市計畫區內之公共設施保留地，其地價補償以「毗鄰非公共設施保留地之平均市價」為準，必要時得加成補償，但最高不超過40%。注意本題答案是「市價」，與重點筆記的「平均公告土地現值」略有不同，以官方公告答案D「平均市價」為準。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "103", "num": 6, "q": "各直轄市、縣（市）主管機關應經常調查轄區地價動態，提交地價評議委員會評定被徵收土地市價變動幅度，作為調整徵收補償地價之依據，此一頻率需多久期間為之？", "opts": ["每月提交", "每季提交", "每六個月提交", "每十二個月提交"], "ans": 2, "exps": ["❌ 頻率過高，不是法定要求。", "❌ 每季（3個月）不是法定頻率。", "✓ 土地徵收條例第30條第3項：各直轄市縣市主管機關應「每六個月」調查轄區地價動態，提交地價評議委員會評定被徵收土地市價變動幅度，作為調整補償地價依據。6個月（半年）是固定數字，不是每月也不是每年。", "❌ 每年一次，頻率低於法定要求。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "103", "num": 18, "q": "依據土地徵收條例之規定，有關被徵收之土地、建築改良物、農作改良物之補償規定，下列敘述何者正確？", "opts": ["徵收土地應按照徵收當期之公告現值加成補償其地價", "都市計畫區內之公共設施保留地，應按毗鄰非公共設施保留地之平均市價補償其地價", "建築改良物之補償費，按起造當時該建築改良物之價格估定之", "農作改良物之補償費，於農作改良物被徵收時與其孳息成熟時期相距在一年以內者，按其種植及培育費用，並參酌現值估定之"], "ans": 1, "exps": ["❌ 本選項有誤：應按「公告土地現值」補償，必要時得加成，不是「應按公告現值加成」（加成是附加條件，不是一定要加成）。但依官方答案B，本選項非本題正確選項。", "✓ 同102-8，公設保留地按毗鄰非公設地平均市價補償，本選項正確。", "❌ 建築改良物補償費應按「徵收當時」的重建價格，不是「起造當時」（起造時可能很久以前，已不符現值），此為重要陷阱。", "❌ 本選項與正確規定相反：距孳息成熟不超過1年者，應按「成熟時之孳息」估定（非種植培育費用）；超過1年者才按「種植及培育費用」估定。本選項把兩種標準搞反了。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "103", "num": 23, "q": "徵收土地時，其土地改良物原應一併徵收。但下列情形何者得不受此一限制？", "opts": ["墳墓及其他紀念物必須遷移", "依法令規定得建造之建築改良物", "土地改良物所有權人要求取回，並自公告期滿之日起三十日內自行遷移", "農作改良物之種類或數量與正常種植情形不相當者，其全部之農作改良物"], "ans": 0, "exps": ["✓ 土地徵收條例第34條但書：土地改良物原應隨土地一併徵收，但下列情形得不一併徵收：①墳墓及其他紀念物必須遷移②土地改良物所有人要求取回並30日內自行遷移③農作改良物種類數量與正常種植不相當④依法令規定不得建造者。本選項A「墳墓必須遷移」屬可「不一併徵收」的情形，得讓所有人自行遷移，不需強制徵收。", "❌ 「依法令規定得建造」的建築物是合法建物，應一併徵收，不是例外不徵收的情形。", "❌ 本選項描述的是另一個不一併徵收的例外，但本題「何者得不受一併徵收限制」是問A選項，A（墳墓必須遷移）最直接符合法條文字，以官方答案A為準。", "❌ 本選項也是例外不徵收的情形，但官方答案為A。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "104", "num": 12, "q": "政府為促進產業創新開發產業園區，徵收私有土地，其徵收補償標準應優先適用下列何種法律？", "opts": ["產業創新條例", "平均地權條例", "土地法", "土地徵收條例"], "ans": 3, "exps": ["❌ 產業創新條例有其土地取得規定，但補償標準的優先適用法律是土地徵收條例。", "❌ 平均地權條例涉及地價、地稅，不是土地徵收補償的優先適用法律。", "❌ 土地法是土地制度的基本法，但徵收補償有專法（土地徵收條例）優先適用。", "✓ 土地徵收條例第58條（特別法）：政府因開發產業園區而徵收私有土地，其徵收補償「優先適用」土地徵收條例的規定。特別法優先於普通法，土地徵收條例是土地徵收的特別法，優先適用。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "104", "num": 14, "q": "需用土地人興辦交通事業徵收私有土地之地上權，因事業之興辦，致土地不能為相當之使用時，土地所有權人得於下列何段期間內請求需用土地人徵收其土地所有權？", "opts": ["自徵收公告之日起一年內", "自徵收公告之日起五年內", "自補償費發給完竣屆滿一年之次日起五年內", "自施工之日起至完工後一年內"], "ans": 3, "exps": ["❌ 1年不是地上權被徵收後土地所有人請求一併徵收所有權的期限。", "❌ 5年不是正確期限。", "❌ 此期限描述不符合法條規定，且起算點有誤。", "✓ 土地徵收條例第57條：地上權因事業興辦致土地不能為相當使用時，土地所有人得「自施工之日起至完工後一年內」請求需用土地人徵收其土地所有權。「施工到完工後一年內」是法定請求期限。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "104", "num": 15, "q": "依法被徵收土地之所有權人，對於其被徵收土地權利義務終止時機之認定，下列何者正確？", "opts": ["公告徵收之日", "公告徵收期滿之日", "應受補償費發給完竣時", "土地經完成登記為需用土地人管有時"], "ans": 2, "exps": ["❌ 公告日只是徵收程序啟動，所有權尚未終止。", "❌ 公告期滿是徵收確定，但所有權終止要等補償發給完竣。", "✓ 同99-18，土地徵收條例第27條明文：權利義務於「應受補償費發給完竣時」終止。「應受」而非「實際受領」——拒絕受領而存入保管專戶亦視同發給完竣。", "❌ 登記是所有權轉移的公示行為，但權利義務終止早於登記完成（補償發給完竣時即終止）。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "105", "num": 13, "q": "關於徵收不動產的敘述，下列何者錯誤？", "opts": ["甲出賣A地於乙，但A地仍登記為甲所有；嗣後A地經政府依法徵收，則乙得向甲請求讓與其徵收補償請求權", "甲與乙二人公同共有的A地被徵收，該徵收補償金仍為甲與乙二人公同共有", "甲將其A地設定最高限額抵押權於乙，嗣後A地被徵收，甲取得的徵收補償金為A地的代位物", "甲的A地被徵收，於A地登記於需用土地人乙之時，甲始喪失A地所有權"], "ans": 3, "exps": ["❌ 本選項描述正確：A地登記為甲，徵收補償發給給甲，乙（實際買受人）得依債權關係向甲請求讓與補償請求權（民法上的代位請求），非錯誤。", "❌ 本選項描述正確：公同共有土地被徵收，補償金仍為公同共有，非錯誤。", "❌ 本選項描述正確：補償金是土地的代位物，抵押權效力及於代位物，非錯誤。", "✓ 本選項為錯誤敘述：依土地徵收條例第27條，所有權人的權利義務於「補償費發給完竣時」終止（即甲喪失所有權），而非等到登記完成時才喪失。甲喪失所有權的時點是補償完竣，不是登記完成。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "105", "num": 36, "q": "有關土地徵收補償之性質，下列何者正確？", "opts": ["補償內容僅有地價補償", "屬於一般犧牲", "屬於損害賠償", "屬於損失補償"], "ans": 3, "exps": ["❌ 土地徵收的補償不只是地價，還包括地上物（建築改良物）補償、農作改良物補償、農業損失補償、遷移費等多項。", "❌ 一般犧牲是指社會上人人均可能承受的負擔，徵收屬特別犧牲（針對特定人的財產）。", "❌ 損害賠償是因違法行為造成損害的補償；徵收是合法行為（依法徵收），其補償性質是「損失補償」而非「損害賠償」。", "✓ 土地徵收補償的性質是「損失補償」：國家合法（依法令）地侵害人民財產，對受到特別犧牲的人民予以補償，以填補其損失。這是行政法上的重要概念區分（損失補償≠損害賠償）。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "105", "num": 40, "q": "關於地用與徵收的敘述，下列何者正確？", "opts": ["甲於90年將A耕地出租於乙，則須經甲同意，乙始得將A地轉租於丙", "甲的A地被徵收，卻拒絕受領補償費，則於該補償費繳存土地徵收補償費保管專戶保管時，甲喪失A地所有權", "甲將其A地出租於乙，如市地重劃後該租賃權消滅，則乙得主張具物權效力的先買權而請求塗銷因市地重劃而為之A地所有權移轉登記", "甲於90年將位於苗栗縣的A耕地出租於乙，如因市地重劃致不能達原租賃目的，則由苗栗縣政府註銷其租約並通知甲與乙"], "ans": 1, "exps": ["❌ 本選項描述正確：承租人未經出租人同意不得轉租，符合民法及耕地租佃法規，非錯誤。", "✓ 同104-15、99-18的考點：補償費存入保管專戶時「視同補償完竣」，從此時起甲的所有權即告終止（不是等甲領取補償費後才終止）。本選項正確描述了「拒絕受領→存入專戶→視同完竣→所有權終止」的法律效果。", "❌ 市地重劃後租約逕為註銷（不是「消滅」，且承租人的補償請求權也不是物權效力的先買權），本選項描述有多處錯誤。", "❌ 本選項描述正確，符合平均地權條例規定（逕為註銷並通知），非錯誤，但本題要選正確選項，故B是正確答案。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "107", "num": 14, "q": "依土地徵收條例規定，徵收土地之殘餘部分面積過小或形勢不整，致不能為相當之使用者，所有權人得向何機關申請一併徵收？", "opts": ["需用土地人", "該管直轄市或縣（市）主管機關", "內政部", "行政院"], "ans": 1, "exps": ["❌ 需用土地人是徵收的申請人，不是「一併徵收」的申請受理機關。", "✓ 土地徵收條例第8條第1項：徵收土地之殘餘部分，若面積過小或形勢不整，所有權人得向「該管直轄市或縣（市）主管機關」申請一併徵收。地方主管機關（非中央機關）是申請一併徵收的受理機關。", "❌ 內政部是中央主管機關，負責審議徵收案，但一併徵收的申請是向地方主管機關提出。", "❌ 行政院是最高行政機關，不是一併徵收的申請受理機關。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "109", "num": 9, "q": "都市計畫法有關公共設施保留地之規定，下列敘述何者正確？", "opts": ["公共設施保留地劃設逾二十五年未經政府取得者，得優先辦理徵收", "公共設施保留地，其地價補償以徵收當期毗鄰公共設施保留地之平均公告土地現值為準，必要時得加成補償之", "都市計畫公共設施保留地臨時建築使用辦法，由直轄市、縣（市）政府定之", "依法指定之公共設施保留地，得繼續為原來之使用或改為妨礙目的較輕之使用"], "ans": 3, "exps": ["❌ 逾20年（非25年）得優先辦理土地交換，不是「逾25年才辦徵收」，數字和方式均有誤。", "❌ 應按「毗鄰非公共設施保留地」的市價（不是毗鄰公設保留地），且「非公設保留地」是關鍵，本選項把「非」字漏掉，是典型的陷阱題。", "❌ 臨時建築使用辦法由「內政部」訂定（中央主管機關），不是地方政府。", "✓ 都市計畫法第50條：公共設施保留地在未取得前，得繼續為原來之使用或改為妨礙目的較輕之使用。這是公設保留地最核心的使用權保障規定，本選項正確。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "109", "num": 12, "q": "有關徵收補償，依土地徵收條例相關規定，下列敘述何者正確？", "opts": ["農作改良物之補償費，於農作改良物被徵收時與其孳息成熟時期相距在1年以內者，按成熟時之孳息估定之", "徵收當期市價指徵收公告期滿次日起算第十日經地價評議委員會評定之當期市價", "建築改良物之補償費，按起造當時該建築改良物之重建價格估定之", "被徵收土地在都市計畫區內之公共設施保留地，應按毗鄰公共設施保留地之平均市價補償其地價"], "ans": 0, "exps": ["✓ 土地徵收條例第31條：農作改良物補償費，與孳息成熟相距1年以內者，按「成熟時之孳息」估定；超過1年者按「種植及培育費用並參酌現值」估定。本選項正確描述了1年以內的計算方式。", "❌ 徵收當期市價是「徵收公告期滿次日」起算由地價評議委員會評定，但並非第十日，此描述不精確。", "❌ 建築改良物補償費應按「徵收當時」的重建價格，不是「起造當時」，同103-18的常見陷阱。", "❌ 應按「毗鄰非公共設施保留地」之市價，而非「毗鄰公共設施保留地」，同109-9的陷阱。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "109", "num": 20, "q": "依土地徵收條例第25條規定，被徵收之土地，所有權人死亡未辦竣繼承登記，其徵收補償費如何處理？", "opts": ["歸屬國庫", "納入平均地權基金", "歸目的事業主管機關所有", "得由部分繼承人按其應繼分領取之"], "ans": 3, "exps": ["❌ 非直接歸屬國庫，仍應依繼承法律關係處理。", "❌ 此選項為干擾，補償費不歸入平均地權基金。", "❌ 補償費不歸目的事業主管機關，目的事業主管機關只是興辦事業的主管，不是補償費的受益人。", "✓ 土地徵收條例第25條第2項：被徵收土地之所有權人死亡未辦竣繼承登記，其徵收補償費得由部分繼承人按其「法定應繼分」領取，不需等全體繼承人辦完繼承登記才能領取，以保障繼承人的補償利益。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "110", "num": 12, "q": "拒絕受領之徵收補償費，依土地徵收條例規定存入專戶保管，並通知應受補償人。自通知送達發生效力之日起，最長逾幾年未領取之補償費，歸屬國庫？", "opts": ["5年", "10年", "15年", "20年"], "ans": 2, "exps": ["❌ 5年太短，不是法定期限。", "❌ 10年是修法後（新法）的標準，但本題依官方答案為C（15年），表示本題適用舊法版本。", "✓ 依本題考選部官方答案，逾15年未領取歸屬國庫（舊法版本）。注意113年第7題答案A選項說「逾10年」為錯誤敘述，表示現行法已改為10年，但此題（110年）官方答案仍為15年，以各題官方公告答案為準。", "❌ 20年是收回權的最長申請期限，不是補償費歸國庫的年限。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "110", "num": 13, "q": "依土地徵收條例規定，建築改良物之補償費，按徵收當時該建築改良物之下列何種價格估定之？", "opts": ["市價", "重置價格", "重建價格", "房屋評定現值"], "ans": 2, "exps": ["❌ 市價是一般土地徵收的補償基準，不是建築改良物的估價方式。", "❌ 重置價格與重建價格相近但有別；法條明文規定是「重建價格」。", "✓ 同100-11，土地徵收條例第31條：建築改良物補償費按「重建價格」估定，不是重置、市價或房屋評定現值。", "❌ 房屋評定現值是房屋稅的計稅基礎，不是徵收補償的估價標準。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "112", "num": 13, "q": "依土地徵收條例規定，因受領遲延、拒絕受領或不能受領之補償費，下列何者正確？", "opts": ["依提存法提存於直轄市或縣（市）主管機關於國庫設立之土地徵收補償費保管專戶", "直轄市或縣（市）主管機關應於補償費發給期限屆滿之日起三個月內存入專戶保管", "保管專戶儲存之補償費應給付利息", "已依規定繳存專戶保管之徵收補償費，自徵收公告期滿之日起，逾十五年未領取者，歸屬國庫"], "ans": 2, "exps": ["❌ 本選項描述有誤：保管補償費「不適用提存法」（土地徵收條例明文排除提存法之適用），而是依主管機關規定存入保管專戶，兩種程序不同。", "❌ 應於「補償費發給期限屆滿之次日起」（不是「屆滿之日起」）三個月內存入，且題目說的是「屆滿之日起」有誤。但本題官方答案為C，故B並非正確答案。", "✓ 土地徵收條例第26條：補償費保管專戶應給付利息，利息歸應受領補償費之人所有，確保受補償人的財產價值不因存放而受損。本選項正確。", "❌ 本選項描述有兩處錯誤：①歸國庫的期限是10年（新法）或15年（舊法，以官方答案為準）；②起算點是「通知送達發生效力之日」，不是「徵收公告期滿之日」，起算點說法有誤。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "113", "num": 6, "q": "依土地徵收條例規定，有關徵收補償費，下列何者正確？", "opts": ["在都市計畫區內之公共設施保留地，應按照徵收當期之市價補償其地價", "徵收補償之地價，由不動產估價師評定之", "建築改良物之補償費，按徵收當時該建築改良物之重置價格估定之", "農作改良物之補償費，於農作改良物被徵收時與其孳息成熟時期相距在一年以內者，按成熟時之孳息估定之"], "ans": 3, "exps": ["❌ 公設保留地按「毗鄰非公共設施保留地之平均市價」補償，不是直接按徵收當期市價（計算基準不同）。", "❌ 徵收補償地價由「地價評議委員會評定」，不是由不動產估價師個別評定。", "❌ 應是「重建價格」，不是「重置價格」，同樣是本科的固定陷阱。", "✓ 同109-12，距孳息成熟1年以內者按「成熟時之孳息」估定，本選項正確描述了農作改良物補償的規則。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "113", "num": 7, "q": "依土地徵收條例規定，有關直轄市或縣（市）主管機關應於國庫設立土地徵收補償費保管專戶部分，下列何者錯誤？", "opts": ["自通知送達發生效力之日起，逾十年未領取之補償費，歸屬國庫", "應於規定應發給補償費之期限屆滿次日起三個月內存入專戶保管", "保管未受領之徵收補償費，不適用提存法之規定", "未受領之徵收補償費，依規定繳存專戶保管時，視同補償完竣"], "ans": 0, "exps": ["✓ 本選項為本題「錯誤」的答案（此題問「何者錯誤」）。依土地徵收條例（現行修正版本），保管補償費逾「十五年」未領取者歸屬國庫（舊法），或依近年修法後的「十年」（新法）。本題官方公告A為錯誤，代表本題適用的版本下是「15年」而非「10年」，「逾十年」的說法不正確（以官方公告為準）。", "❌ 本選項描述正確，3個月存入期限符合法條，非錯誤。", "❌ 本選項描述正確，明文排除提存法之適用，非錯誤。", "❌ 本選項描述正確，視同補償完竣是法條明文規定，非錯誤。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "114", "num": 22, "q": "下列何者並非土地法中的農作改良物？", "opts": ["置於農地上的盆栽", "附著於農地上的芒果樹", "農田的灌溉設施", "農地上所施加的肥料"], "ans": 0, "exps": ["✓ 土地法所稱農作改良物指「附著於土地之農作物、農林作物之外的其他植物以及水利土壤改良等」，重點是「附著於土地」。「置於農地上的盆栽」放在花盆裡，並未附著於土地本身，故不屬農作改良物。芒果樹、灌溉設施、施加的肥料都是附著或融入土地的，屬農作改良物；盆栽是可移動的，不屬之。", "❌ 芒果樹附著於農地，屬農林作物類的農作改良物，屬之。", "❌ 灌溉設施屬「水利土壤改良」類，屬農作改良物，屬之。", "❌ 肥料施於土壤後融入土地成為改良物，屬農作改良物，屬之。"]}, {"ch": "D2", "chName": "D2 徵收補償標準", "year": "104", "num": 9, "q": "關於市地重劃區內之土地改良物或墳墓拆遷補償費，係屬下列何項計算之範圍？", "opts": ["重劃費用", "工程費用", "整地費用", "公共用地施工費用"], "ans": 0, "exps": ["✓ 平均地權條例施行細則：市地重劃區內之土地改良物及墳墓拆遷補償費，係屬「重劃費用」的計算範圍（由全體參加重劃之土地所有人共同負擔），不是工程費用或整地費用。", "❌ 工程費用是指公共設施興建的直接工程支出，補償費不屬此類。", "❌ 整地費用是地形整理費，補償費不屬此類。", "❌ 公共用地施工費用是公共設施建設費，補償費不屬此類。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "99", "num": 16, "q": "依土地徵收條例之規定，在某些情形下得為區段徵收，下列何者不屬之？", "opts": ["新設都市地區之全部或一部，實施開發建設者", "都市地區為公共安全、衛生、交通之需要或促進土地之合理使用實施更新者", "都市土地之農業區、保護區變更為建築用地或工業區變更為住宅區、商業區者", "都市土地閒置未開發利用而實施開發建設者"], "ans": 3, "exps": ["❌ 新設都市地區開發建設是法定得為區段徵收的情形之一（土地徵收條例第44條），屬之。", "❌ 舊都市地區更新是法定得為區段徵收的情形之一，屬之。", "❌ 都市計畫地目或分區變更為較高強度使用時，得為區段徵收，屬之。", "✓ 本選項為「非屬」得為區段徵收的情形。土地徵收條例第44條列舉的區段徵收事由，「閒置土地開發建設」不在其中（政府不能單純因土地閒置就實施區段徵收）。注意選項D的尾端有頁碼標記（原PDF頁眉污染），已清除。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "99", "num": 39, "q": "依土地徵收條例規定，下列各款情形，何者非屬得為區段徵收之適用者？", "opts": ["新設都市地區實施開發建設者", "都市土地之工業區變更為住宅區者", "都市土地之住宅區變更為商業區者", "都市土地之農業區變更為建築用地者"], "ans": 2, "exps": ["❌ 屬得為區段徵收的情形。", "❌ 工業區變更為住宅區（使用性質改變）屬得為區段徵收的情形（同99-16選項C的類型）。", "✓ 同一強度類型的地目變更（住宅區→商業區）不在土地徵收條例第44條法定的區段徵收事由清單內。比較：農業區→建築用地（農→建）才是屬之；住宅區→商業區（建→建，性質類似）則不在法定事由中。", "❌ 農業區變更為建築用地（農地轉建地）屬得為區段徵收的情形。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "100", "num": 18, "q": "依平均地權條例規定，下列何種情形取得土地所需之資金，得由中央或直轄市主管機關發行土地債劵？", "opts": ["一般徵收", "市地重劃", "權利變換", "區段徵收"], "ans": 3, "exps": ["❌ 一般徵收（普通土地徵收）不需發行土地債券，資金由政府預算支應。", "❌ 市地重劃的費用由參加重劃的土地所有人共同負擔，不涉及發行土地債券。", "❌ 權利變換是都市更新的資金籌措方式，不是平均地權條例規定的土地債券發行情形。", "✓ 平均地權條例第58條：辦理市地重劃或區段徵收所需資金，中央或直轄市主管機關得發行「土地債券」。區段徵收規模大、所需資金多，法律授權可透過發行土地債券籌資，是C2/D3的共同考點。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "101", "num": 8, "q": "依土地徵收條例規定，需用土地人應俟補償費發給完竣或核定發給抵價地後，始得進入被徵收土地內工作。但興辦下列何種事業，因公共安全急需先行使用者，不在此限？", "opts": ["公共衛生事業", "環境保護事業", "社會福利事業", "交通及水利事業"], "ans": 3, "exps": ["❌ 公共衛生事業不在法定因公共安全急需得先行使用的例外範圍，仍須等補償發給完竣後才能進入。", "❌ 環境保護事業不在例外範圍。", "❌ 社會福利事業不在例外範圍（111-10也考過這個陷阱，社福不算）。", "✓ 土地徵收條例第27條但書：因公共安全急需，得在補償發給完竣前先行使用的例外事業為「國防事業、交通事業及水利事業」。三種為一組，本題選D（交通及水利事業）。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "102", "num": 7, "q": "依土地徵收條例規定實施區段徵收時，原土地所有權人不願領取現金補償者，應於下列何期間內，檢具有關證明文件，以書面向主管機關申請發給抵價地？", "opts": ["徵收公告期間", "徵收補償地價發放時", "分配抵價地公告時", "舉行公聽會期間"], "ans": 0, "exps": ["✓ 土地徵收條例第44條第3項：原土地所有權人不願領取現金補償者，應於「徵收公告期間」內，檢具有關證明文件，以書面向主管機關申請發給抵價地。公告期間（30日）是申請的法定時限，逾期未申請視為選擇現金補償。", "❌ 補償發放時已過申請抵價地的截止期間，此時才申請已太晚。", "❌ 分配公告是抵價地分配結果的公告，非申請發給抵價地的時機。", "❌ 公聽會在徵收申請前舉行，此時尚未公告徵收，不是申請抵價地的時機。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "103", "num": 19, "q": "區段徵收土地時，有關抵價地面積及移轉時課徵土地增值稅之規定，下列何者為非？", "opts": ["抵價地總面積，以徵收總面積百分之五十為原則", "經農地重劃者，該重劃地區部分不得少於百分之四十五", "領回抵價地後第一次移轉時，以原土地所有人徵收時原有土地之地價為原地價", "區段徵收後，領回抵價地後第一次移轉時，其土地增值稅減徵百分之四十"], "ans": 2, "exps": ["❌ 本選項描述正確，50%是法定原則，非錯誤。", "❌ 本選項描述正確，曾經農地重劃地區的抵價地比例不得低於45%，非錯誤。", "✓ 本選項為錯誤敘述：正確規定是以「原土地所有權人實際領回抵價地之地價」為原地價，不是「徵收時原有土地之地價」（被徵收土地的地價）。這個考點在104-34、106-4、102-17都出現，答案固定是「實際領回抵價地之地價」。", "❌ 本選項描述正確，抵價地第一次移轉減徵40%土地增值稅，非錯誤。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "104", "num": 13, "q": "依土地徵收條例第56條規定，政府依法徵收之土地，得於徵收計畫書載明各種開發方式提供民間機構投資建設。下列何者不屬之？", "opts": ["設定地上權或出租", "聯合開發或委託開發", "信託或合作經營", "調整地形或整體開發"], "ans": 3, "exps": ["❌ 設定地上權或出租是法定的民間投資開發方式之一，屬之。", "❌ 聯合開發或委託開發是法定的民間投資開發方式之一，屬之。", "❌ 信託或合作經營是法定的民間投資開發方式之一，屬之。", "✓ 土地徵收條例第56條規定的提供民間投資建設方式包括：設定地上權或出租、聯合開發或委託開發、信託或合作經營；「調整地形或整體開發」不在法定列舉的提供民間投資方式內（這是政府自行開發的規劃手段，不是提供民間的投資方式）。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "104", "num": 16, "q": "依土地徵收條例之規定，下列何者得依法實施區段徵收？", "opts": ["配合區域整體發展者", "促進農地再生產者", "非都市土地實施開發建設者", "配合原住民聚落更新者"], "ans": 2, "exps": ["❌ 「配合區域整體發展」雖是開發目的，但不是土地徵收條例第44條列舉的法定區段徵收事由，屬太籠統的描述。", "❌ 農地再生產不是區段徵收的法定事由，區段徵收是整體開發手段，不是農業促進工具。", "✓ 土地徵收條例第44條第1項第2款：「非都市土地實施開發建設者」是法定得為區段徵收的事由。注意：「非都市土地」也可以區段徵收，不是只有都市土地。", "❌ 原住民聚落更新不是土地徵收條例第44條列舉的法定區段徵收事由（農村社區更新才是法定事由，且需「加強公共設施、改善公共衛生或配合農業發展」）。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "104", "num": 17, "q": "區段徵收規劃整理後之可建築用地，依土地徵收條例規定得以讓售者，下列何項用地不屬之？", "opts": ["安置原住戶用地", "抵價地", "國民住宅用地", "經行政院專案核准所需之土地"], "ans": 1, "exps": ["❌ 安置原住戶所需土地得以讓售，屬法定可讓售的情形。", "✓ 抵價地是發交給原土地所有人的回饋地，不在「得以讓售」的清單內（抵價地是義務返還給原所有人，不由政府讓售）。本題問「不屬得以讓售者」，答案是抵價地（B）。", "❌ 國民住宅用地得以讓售，屬法定可讓售的情形。", "❌ 經行政院專案核准之用地得以讓售，屬法定可讓售的情形。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "104", "num": 18, "q": "實施區段徵收之土地，得以抵價地補償方式為之，依土地徵收條例規定，請指出抵價地總面積，以下列何項原則為之？", "opts": ["以徵收總面積百分之五十為原則", "以上級主管機關核准者為原則", "以區內每一土地所有權人擁有土地面積百分之四十為原則", "曾經農地重劃者，以該重劃地區百分之四十五為原則"], "ans": 0, "exps": ["✓ 土地徵收條例第44條：抵價地總面積以徵收總面積「50%」為原則。50%是最重要的基本數字，若因特殊情況經上級核准可低於50%，但不得低於40%（農地重劃地區不得低於45%）。", "❌ 上級核准是「例外調整」的條件，不是「原則」，原則是50%。", "❌ 40%是「下限」（情況特殊時的最低底線），不是「原則」。", "❌ 農地重劃地區的規定是「不得少於45%」（下限），不是「以45%為原則」，且這只是農地重劃地區的特殊規定，不是一般原則。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "104", "num": 34, "q": "關於區段徵收土地，於領回抵價地後第一次移轉時，用以計算漲價總數額之原地價，有其規定之標準，下列何者正確？", "opts": ["以區段徵收區之開發成本為原地價", "以原土地所有權人移轉時之申報現值為原地價", "以政府核定之原規定地價為原地價", "以原土地所有權人實際領回抵價地之地價為原地價"], "ans": 3, "exps": ["❌ 開發成本不是法定的抵價地原地價認定基準。", "❌ 移轉時的申報現值是一般土地移轉的申報基礎，不是抵價地的特殊原地價認定方式。", "❌ 原規定地價是規定地價時的地價，不是抵價地的原地價。", "✓ 土地稅法第31條之1：區段徵收領回抵價地後第一次移轉，計算漲價總數額之原地價，以「原土地所有權人實際領回抵價地之地價」為準。這個答案在102-17、103-19、104-34、106-4都反覆出現，是D3/E2最重要的固定考點。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "105", "num": 8, "q": "有關實施區段徵收之土地，其土地之租稅優惠，下列敘述何者錯誤？", "opts": ["以現金補償其地價者，免徵土地增值稅", "區段徵收領回抵價地後第一次移轉，免徵土地增值稅", "以抵價地補償其地價者，免徵土地增值稅", "自辦理完成之日起地價稅減半徵收2年"], "ans": 1, "exps": ["❌ 本選項描述正確，以現金補償者免徵土增稅（土地稅法第39條），非錯誤。", "✓ 本選項為錯誤敘述：領回抵價地後第一次移轉，土地增值稅「減徵40%」（不是免徵）。「以現金補償者免徵」vs「以抵價地補償者第一次移轉減徵40%」是D3/E2最重要的稅務對比，務必區分。", "❌ 本選項描述正確：領取抵價地時（尚未移轉）免徵土地增值稅，第一次移轉時才減徵40%。本選項說的是「補償時」免徵，是正確的（移轉前不課稅）。", "❌ 本選項描述正確，區段徵收完成後地價稅減半2年，非錯誤。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "106", "num": 2, "q": "區段徵收之抵價地總面積，以徵收總面積百分之多少為原則？", "opts": ["50", "45", "40", "30"], "ans": 0, "exps": ["✓ 同104-18，抵價地總面積以徵收總面積50%為原則，是D3最基本也最常考的數字。", "❌ 45%是農地重劃地區的下限，不是一般原則比例。", "❌ 40%是情況特殊時的最低下限，不是一般原則比例。", "❌ 30%低於法定最低下限，不符規定。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "106", "num": 4, "q": "區段徵收之土地，領回抵價地後第一次移轉，應課徵土地增值稅時，原地價應如何認定？", "opts": ["以原土地所有權人完成移轉登記之日當期公告土地現值", "以原土地所有權人權利取得之日當期公告土地現值", "以原土地所有權人實際領回抵價地之地價", "以原土地所有權人領得之補償地價總額"], "ans": 2, "exps": ["❌ 移轉登記日的公告現值是計算漲價總數額的「移轉現值」（分子），不是「原地價」（分母）。", "❌ 此選項混淆了一般土地的原地價（前次移轉申報現值）和抵價地的特殊原地價認定方式。", "✓ 同104-34，領回抵價地的地價是計算漲價總數額的「原地價」基準。", "❌ 補償地價總額是被徵收土地的現金補償金額，與抵價地的地價認定無關。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "107", "num": 15, "q": "實施區段徵收時，申請發給抵價地者，對其被徵收土地之權利義務，於何時終止？", "opts": ["向直轄市或縣（市）主管機關申請發給抵價地時", "接到直轄市或縣（市）主管機關核定發給抵價地通知時", "直轄市或縣（市）主管機關將抵價地登記為申請人所有時", "直轄市或縣（市）主管機關將抵價地點交申請人接管時"], "ans": 1, "exps": ["❌ 申請只是程序的開始，此時權利義務尚未終止。", "✓ 依土地徵收條例第44條第4項：申請發給抵價地者，對其被徵收土地之權利義務，於「直轄市或縣（市）主管機關核定發給抵價地通知時」終止。注意：現金補償者是「補償費發給完竣時」終止；抵價地者是「核定發給抵價地通知時」終止，兩者時點不同。", "❌ 登記是之後的程序，權利義務終止早於登記完成。", "❌ 點交接管是最後一道程序，早於點交接管的「核定通知時」就已終止。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "108", "num": 23, "q": "區段徵收土地時，地價補償得經土地所有權人申請，以徵收後可供建築之抵價地折算抵付，而抵價地總面積，以徵收總面積百分之五十為原則，如因情況特殊，經上級主管機關核准者，不在此限，但不得少於百分之四十；惟曾經農地重劃者，該重劃地區部分之抵價地不得少於多少？", "opts": ["百分之四十三", "百分之四十五", "百分之四十七", "百分之四十九"], "ans": 1, "exps": ["❌ 43%不是任何法定的抵價地比例。", "✓ 土地徵收條例第44條：一般情形抵價地50%為原則，情況特殊不得低於40%；但「曾經農地重劃者，該重劃地區部分不得少於45%」。農地重劃地區的特殊規定是45%，比一般下限40%高5個百分點，因為農地重劃已整理過，政府無需再承擔太多費用，故回饋比例較高。", "❌ 47%不是法定比例。", "❌ 49%不是法定比例。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "111", "num": 9, "q": "依都市計畫法指定供公用事業設施使用之公共設施保留地，應由各該事業機構依法徵收或購買；其餘由公用事業設施所屬政府或鄉、鎮、縣轄市公所依何種方式取得？", "opts": ["徵收、區段徵收、市地重劃", "協議價購、公私土地交換、都市更新", "都市更新、市地重劃、區段徵收", "徵收、協議價購、公私土地交換"], "ans": 0, "exps": ["✓ 都市計畫法第48條：供公用事業設施使用的公設保留地，除各該事業機構依法徵收或購買外，其餘由政府或公所依「徵收、區段徵收或市地重劃」方式取得。三種方式為一組，本選項正確。", "❌ 協議價購是徵收前的程序，公私土地交換（第50條之1）是私有公設保留地的另一種取得方式，但都市更新不在法定的政府取得方式清單內。", "❌ 都市更新不是都市計畫法第48條規定的政府取得公設保留地方式。", "❌ 協議價購不是政府主動取得的方式之一（協議價購是徵收前的準備程序），公私土地交換是私人申請的程序。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "111", "num": 10, "q": "下列何類徵收事業之需用土地人在補償費未發給完竣前，或未核定發給抵價地前，因公共安全急需，得先進入被徵收土地內工作？", "opts": ["國防事業、平價住宅事業、水利事業", "交通事業、水利事業、社會福利事業", "高齡化事業、少子化事業、防疫事業", "國防事業、交通事業、水利事業"], "ans": 3, "exps": ["❌ 平價住宅事業不在法定三種例外事業中，此選項混入了不在清單的事業。", "❌ 社會福利事業不在法定三種例外事業中（這是本考點最常見的干擾選項）。", "❌ 此三種均不在法定例外事業清單中，為完全干擾選項。", "✓ 同101-8，法定可因公共安全急需先行使用的例外三種事業為「國防、交通、水利」，缺一不可，其他事業（社福、環保、衛生等）均不在此例外範圍內。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "111", "num": 17, "q": "依土地徵收條例規定，區段徵收範圍內土地，經規劃整理後，有關其處理方式，下列敘述何者錯誤？", "opts": ["抵價地發交被徵收土地所有權人領回", "國民住宅用地得以讓售", "安置原住戶所需土地得以讓售", "可供建築土地依規定標租時，其期限不得逾二十五年"], "ans": 3, "exps": ["❌ 本選項描述正確，抵價地發還給原所有人，非錯誤。", "❌ 本選項描述正確，國民住宅用地可讓售，非錯誤。", "❌ 本選項描述正確，安置原住戶用地可讓售，非錯誤。", "✓ 本選項為錯誤敘述：土地徵收條例第57條規定，區段徵收後可供建築土地標租期限不得逾「99年」（九十九年），不是25年。113-18的答案C也確認是99年。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "113", "num": 18, "q": "依土地徵收條例規定，有關區段徵收範圍內土地，經規劃整理後之處理方式，下列何者正確？", "opts": ["抵費地發交被徵收土地所有權人領回", "零售市場無償登記為當地直轄市有、縣（市）有或鄉（鎮、市）有", "標租時，其期限不得逾九十九年", "安置原住戶土地得以標售"], "ans": 2, "exps": ["❌ 本選項有誤：「抵費地」（抵充費用的土地，政府保留部分）是標售給外人的，不是「發交被徵收土地所有權人領回」；「抵價地」才是發還給原所有人的。兩者名稱相似但完全不同。", "❌ 本選項描述正確，零售市場無償登記為地方政府所有，非錯誤。", "✓ 同111-17，標租期限是99年，本選項正確。", "❌ 安置原住戶土地是以「讓售」（不是標售）方式處理，讓售是政府同意讓特定對象買入，標售是公開競標，兩者不同。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "114", "num": 9, "q": "區段徵收地區如為經實施農地重劃者，此一地區抵價地總面積比例不得少於徵收總面積多少？", "opts": ["百分之四十", "百分之四十五", "百分之五十", "百分之五十五"], "ans": 1, "exps": ["❌ 40%是一般情形（情況特殊時）的下限，不是農地重劃地區的規定。", "✓ 同108-23，農地重劃地區的抵價地下限是45%（高於一般下限40%）。45%是本考點的固定答案，在108年和114年都考過。", "❌ 50%是一般原則（非下限），農地重劃地區適用特殊的45%下限。", "❌ 55%高於原則比例（50%），不是任何情況的法定比例。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "114", "num": 23, "q": "依土地徵收條例規定，有關得為區段徵收之情形，下列何項非屬之？", "opts": ["舊都市地區為公共安全、衛生、交通之需要或促進土地之合理使用實施更新者", "非都市土地實施開發建設者", "興辦國營事業或公安事業者", "農村社區為加強公共設施、改善公共衛生之需要或配合農業發展之規劃實施更新者"], "ans": 2, "exps": ["❌ 舊都市地區更新是法定區段徵收事由之一，屬之。", "❌ 非都市土地開發建設是法定區段徵收事由，屬之（同104-16）。", "✓ 「興辦國營事業或公安事業」不在土地徵收條例第44條列舉的法定區段徵收事由中。區段徵收的事由以「整體開發建設、都市更新、社區更新、配合政府重要政策」為主，興辦一般國營事業不在此類別內（一般徵收用於取得特定事業用地，不需區段徵收）。", "❌ 農村社區更新是法定區段徵收事由之一，屬之。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "99", "num": 25, "q": "依都市計畫法徵收或區段徵收之公共設施保留地，其地價補償以徵收當期毗鄰非公共設施保留地之平均公告土地現值為準，必要時得加成補償之。但加成最高以不超過多少為限？", "opts": ["百分之十", "百分之二十", "百分之三十", "百分之四十"], "ans": 3, "exps": ["❌ 10%過低，不是公設保留地加成補償的最高上限。", "❌ 20%不是法定上限。", "❌ 30%不是法定上限。", "✓ 土地徵收條例第30條第2項：都市計畫區內公共設施保留地，依法徵收或區段徵收者，其地價補償按毗鄰非公設保留地之平均市價，必要時得加成補償，但最高以不超過「百分之四十」為限。40%是法定加成上限，是D2/D3的固定數字考點。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "100", "num": 16, "q": "依平均地權條例規定，下列何種方式取得之土地公開出售時，須受土地法第二十五條之限制？", "opts": ["徵收", "區段徵收", "土地重劃", "照價收買"], "ans": 0, "exps": ["✓ 平均地權條例第26條：政府以「徵收」方式取得之土地，若要公開出售，仍受土地法第25條（公有土地處分須民意機關同意及行政院核准）之限制。而區段徵收、土地重劃、照價收買取得之土地，平均地權條例特別授權可不受土地法第25條限制。", "❌ 平均地權條例明文規定，區段徵收取得之土地出售時，「不受土地法第25條限制」（可自行公開標售）。", "❌ 市地重劃取得之抵費地出售時，「不受土地法第25條限制」。", "❌ 照價收買取得之土地，「不受土地法第25條限制」（可隨時公開出售）。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "102", "num": 17, "q": "依土地稅法規定，因區段徵收完竣而領回之抵價地，於第一次移轉時，其計算漲價總數額之原地價，以何者為準？", "opts": ["應以原土地所有權人申報之移轉現值為準", "應以被徵收土地之公告土地現值為準", "應以抵付徵收補償地價之總額為準", "應以原土地所有權人實際領回抵價地之地價為準"], "ans": 3, "exps": ["❌ 申報移轉現值是一般土地移轉的申報基礎，不是抵價地的特殊原地價基準。", "❌ 被徵收土地的公告現值是現金補償的基礎，不是領回抵價地的原地價基準。", "❌ 補償地價總額是現金補償金額，不是抵價地的原地價認定基準。", "✓ 同104-34、106-4，抵價地第一次移轉的原地價以「實際領回抵價地之地價」為準，這是D3/E2最重要的固定答案。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "102", "num": 24, "q": "依土地徵收條例第59條規定，關於私有土地經依徵收計畫使用後，依法變更原使用目的，而由土地管理機關標售該土地之案件，下列敘述何者錯誤？", "opts": ["應公告一個月", "被徵收之原他項權利人得申請恢復其權利", "被徵收之原土地所有權人或其繼承人有依同樣條件優先購買權", "於區段徵收之土地不適用本條項之規定"], "ans": 1, "exps": ["❌ 本選項描述正確，標售前應公告1個月，非錯誤。", "✓ 本選項為本題「錯誤」的答案（此題問「何者錯誤」）：土地徵收條例第59條規定，徵收後依法變更用途標售時，被徵收之原「土地所有權人或其繼承人」有優先購買權；「原他項權利人」（抵押權人、地上權人等）並無申請恢復其權利的規定，本選項描述的權利不存在。", "❌ 本選項描述正確，符合土地徵收條例第59條規定，非錯誤。", "❌ 本選項描述正確，第59條優先購買權明文排除區段徵收之土地，非錯誤。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "103", "num": 37, "q": "有關土地增值稅得申請不課徵之規定，下列何者為是？", "opts": ["區段徵收之土地，以現金補償其地價者", "配偶間相互贈與之土地", "領回抵價地不足最小建築單位面積而領取現金補償者", "私有土地因繼承而移轉者"], "ans": 1, "exps": ["❌ 以現金補償者是「免徵」土增稅，屬於土地稅法第39條的免徵情形。本選項的「不課徵」（土地稅法第28條之2等規定）和「免徵」（第39條）在法律上是不同機制，以官方答案B（配偶贈與屬不課徵）為準。", "✓ 土地稅法第28條之2：配偶相互贈與之土地，得申請「不課徵」土地增值稅（注意：是「不課徵」而非「免徵」，兩者性質不同——不課徵是暫緩、將來再課；免徵是永久不課）。本選項是本題「得申請不課徵」的正確答案。", "❌ 此情形涉及小面積抵價地改領現金的特殊規定，不是「不課徵」的情形。", "❌ 繼承移轉屬「免徵」土地增值稅（土地稅法第28條），不是「不課徵」。「不課徵」和「免徵」是不同概念，本題問的是「不課徵」。"]}, {"ch": "D3", "chName": "D3 區段徵收", "year": "110", "num": 20, "q": "依土地稅法免徵土地增值稅之土地，主管稽徵機關依相關規定核定其移轉現值並發給免稅證明，以憑辦理土地所有權移轉登記，下列有關移轉現值核定之敘述何者正確？", "opts": ["各級政府出售之公有土地，以實際出售價額為準", "各級政府贈與或受贈之土地，以土地點交日之公告土地現值為準", "區段徵收抵價地，以區段徵收時實際測量及登記完竣之地價為準", "私人捐贈供興辦社會福利事業之土地，以社會福利事業核准日之公告土地現值為準"], "ans": 0, "exps": ["✓ 土地稅法第29條：免徵土增稅之土地（如公有土地、農業用地等），主管機關核定其移轉現值，以「實際出售價額」（公有土地出售）或其他法定基準為準。公有土地免徵土增稅，其移轉現值按實際出售價額核定，本選項正確。", "❌ 政府贈與或受贈土地，應以「贈與或受贈時」的公告土地現值，而非「土地點交日」，時點說法有誤。", "❌ 抵價地的移轉現值核定基準不是「區段徵收時測量登記完竣之地價」，此說法不符法定規定。", "❌ 私人捐贈供社會福利事業，其移轉現值的核定時點不是「核准日」，說法有誤。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "99", "num": 28, "q": "被徵收之土地，除區段徵收及依土地徵收條例或其他法律另有規定外，在某些情形發生時，原土地所有權人得於徵收公告之日起20年內，向該管直轄市或縣（市）主管機關申請照原徵收補償價額收回其土地，不適用土地法第219條之規定，下列敘述何者錯誤？", "opts": ["徵收補償費發給完竣屆滿3年，未依徵收計畫開始使用者", "未依核准徵收原定興辦事業使用者", "經監察院糾正確定者", "依原徵收計畫開始使用後未滿5年，不繼續依原徵收計畫使用者"], "ans": 2, "exps": ["❌ 本選項描述正確，補償完竣3年未開始使用是收回權的法定事由之一，非錯誤。", "❌ 本選項描述正確，未依原定事業使用也是收回權的法定事由，非錯誤。", "✓ 本選項為錯誤敘述：監察院糾正是監察權的行使，不是土地徵收條例規定的收回權法定事由。收回權的三種法定事由：①補償完竣3年未開始使用②未依核准事業使用③開始使用後未滿5年不繼續使用。「監察院糾正」不在這三種之列。", "❌ 本選項描述正確，使用後未滿5年中斷是收回權的法定事由，非錯誤。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "102", "num": 35, "q": "依土地徵收條例規定，採一般徵收之土地，於徵收補償費發給完竣屆滿三年，未依徵收計畫開始使用者，原土地所有權人得於何期限內申請收回其土地？", "opts": ["自徵收補償費發給完竣之日起二十年內", "自徵收公告之日起二十年內", "自未依徵收計畫使用屆滿三年之日起二十年內", "自原土地所有權人領取補償費之日起二十年內"], "ans": 1, "exps": ["❌ 起算點說法有誤：應從「徵收公告之日」起算，不是從「補償費發給完竣之日」起算。", "✓ 土地徵收條例第9條第1項：原土地所有權人得於徵收「公告之日起20年內」申請收回。注意起算點是「公告之日」（不是補償完竣日），且20年是最長期限（在此期限內，只要觸發收回事由就可申請）。", "❌ 起算點說法有誤，應從徵收公告之日起算，不是從「未使用屆滿三年之日」起算。", "❌ 領取補償費日不是收回權的起算點，起算點是徵收公告之日。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "103", "num": 7, "q": "下列何種情形屬於已公告徵收之土地，應辦理撤銷徵收之規定？", "opts": ["因作業錯誤，致原徵收之土地不在工程用地範圍內", "因工程變更設計，致原徵收之土地不在工程用地範圍內", "依徵收計畫開始使用前，興辦之事業改變、興辦事業計畫經註銷、開發方式改變或取得方式改變", "已依徵收計畫開始使用，尚未依徵收計畫完成使用之土地，因情事變更，致原徵收土地之全部或一部已無徵收之必要"], "ans": 0, "exps": ["✓ 土地徵收條例第49條（撤銷徵收）：已公告徵收之土地，有下列情形應辦理「撤銷徵收」：①因「作業錯誤」致原徵收土地不在工程用地範圍內②公告徵收時都市計畫已規定以聯合開發等方式開發（但所有權人不願參與者除外）。注意：作業錯誤→撤銷徵收；工程變更→廢止徵收。兩者常被混淆。", "❌ 工程變更設計是「廢止徵收」（土地徵收條例第50條），不是撤銷徵收。作業錯誤→撤銷；工程變更→廢止，這個對比是D4的核心考點。", "❌ 本選項描述的是「廢止徵收」（在開始使用前的情事變更），不是撤銷徵收。", "❌ 本選項描述的是「廢止徵收」（已開始使用後的情事變更），不是撤銷徵收。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "103", "num": 8, "q": "被徵收之土地，除區段徵收及土地徵收條例或其他法律另有規定外，有下列何種情形，原土地所有權人得於徵收公告之日起20年內，向該管直轄市或縣（市）主管機關申請照原徵收補償價額收回其土地，不適用土地法第219條之規定？", "opts": ["徵收補償費發給完竣屆滿一年，未依徵收計畫開始使用者", "徵收補償費發給完竣屆滿二年，未依徵收計畫開始使用者", "依原徵收計畫開始使用後未滿五年，不繼續依原徵收計畫使用者", "依原徵收計畫開始使用後未滿十年，不繼續依原徵收計畫使用者"], "ans": 2, "exps": ["❌ 法定標準是「屆滿3年」未開始使用，不是1年，數字錯誤。", "❌ 法定標準是「屆滿3年」，2年也不符合。", "✓ 土地徵收條例第9條第1項第3款：依原徵收計畫開始使用後「未滿5年」，不繼續依原徵收計畫使用者，原所有人得申請收回。5年是法定期間，不是3年也不是10年。", "❌ 法定標準是「未滿5年」，10年錯誤。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "106", "num": 22, "q": "被徵收之土地，有下列何種情形時，原土地所有權人得於徵收公告之日起20年內，向該管直轄市或縣（市）主管機關申請照原徵收補償價額收回其土地？", "opts": ["徵收補償費發給完竣屆滿2年，未依徵收計畫開始使用者", "徵收土地之殘餘部分面積過小或形勢不整，致不能為相當之使用者", "未依核准徵收原定興辦事業使用者", "依原徵收計畫開始使用後未滿6年，不繼續依原徵收計畫使用者"], "ans": 2, "exps": ["❌ 法定標準是「3年」，2年未達門檻，不構成收回事由。", "❌ 此為一併徵收的申請事由（第8條），不是收回權的事由。", "✓ 土地徵收條例第9條第1項第2款：「未依核准徵收原定興辦事業使用」是收回權的法定事由之一，與第3款（使用後未滿5年中斷）和第1款（3年未開始使用）並列。本選項正確描述了其中一種收回事由。", "❌ 法定標準是「未滿5年」，6年超過5年（已超過保護期），不構成收回事由。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "106", "num": 23, "q": "下列何者為撤銷徵收之原因？", "opts": ["因工程變更設計，致原徵收之土地不在工程用地範圍內", "公告徵收時，都市計畫已規定以聯合開發、市地重劃或其他方式開發。但以聯合開發方式開發之土地，土地所有權人不願參與聯合開發者，不在此限", "依徵收計畫開始使用前，興辦之事業改變、興辦事業計畫經註銷、開發方式改變或取得方式改變", "已依徵收計畫開始使用，尚未依徵收計畫完成使用之土地，因情事變更，致原徵收土地之全部或一部已無徵收之必要"], "ans": 1, "exps": ["❌ 工程變更設計是「廢止徵收」的事由，不是撤銷徵收（同103-7的對比）。", "✓ 土地徵收條例第49條（撤銷徵收）：公告徵收時，都市計畫已規定以聯合開發或市地重劃方式開發者，應辦理撤銷徵收（因有更好的方式可達成目的，不需徵收）。但以聯合開發方式，若所有權人不願參與者，仍可維持徵收（不撤銷）。", "❌ 使用前事業改變是「廢止徵收」，不是撤銷徵收。", "❌ 已開始使用後的情事變更是「廢止徵收」，不是撤銷徵收。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "107", "num": 13, "q": "依土地徵收條例有關徵用之規定，下列敘述，何者正確？", "opts": ["國家因興辦繼續性之公共建設工程，得徵用私有土地或土地改良物", "徵用期間逾六年，或二次以上徵用，期間合計逾六年者，需用土地人應於申請徵用前，以書面通知", "土地或土地改良物所有權人於收到徵用通知書之日起三十日內，得請求需用土地人徵收所有權", "因徵用而請求徵收土地或土地改良物所有權者，必要時所有權人得申請收回其土地或土地改良物"], "ans": 2, "exps": ["❌ 本選項有誤：土地徵收條例的「徵用」是針對「臨時性（非繼續性）」公共建設工程。繼續性工程通常應辦理徵收（取得所有權），臨時性才徵用（取得使用權）。", "❌ 本選項有誤：應於「申請徵用前以書面通知」，所有權人收到後「30日內」得請求徵收所有權，但此選項只說「以書面通知」，未提後續30日請求徵收的權利，且時序描述有誤。", "✓ 土地徵收條例第58條：徵用期間逾6年（或合計逾6年），需用土地人應書面通知所有權人，所有權人於「收到通知書之日起30日內」，得請求需用土地人徵收所有權（改為永久取得）。30日是法定請求期限。", "❌ 本選項與正確規定相反：「需用土地人」得於完工後申請收回（返還）土地給所有人，不是「所有人」申請收回。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "108", "num": 17, "q": "已公告徵收之土地，需用土地人應切實按核准計畫及所定期限使用。在未依徵收計畫完成使用前，需用土地人應每年檢討其興辦事業計畫，並由其上級事業主管機關列管。有下列那種情形，應辦理撤銷徵收？", "opts": ["因工程變更設計，致原徵收之土地不在工程用地範圍內", "土地徵收計畫開始使用前，興辦之事業改變、興辦事業計畫經註銷、開發方式改變或取得方式改變", "公告徵收時，都市計畫已規定以市地重劃或其他方式開發", "已依徵收計畫開始使用，尚未依徵收計畫完成使用之土地，因情事變更，致原徵收土地之全部或一部已無徵收之必要"], "ans": 2, "exps": ["❌ 工程變更設計是「廢止徵收」（第50條），不是撤銷徵收（第49條）。同103-7，作業錯誤→撤銷；工程變更→廢止。", "❌ 開始使用前的情事變更（事業改變等）是「廢止徵收」，不是撤銷徵收。", "✓ 同106-23，公告徵收時都市計畫已規定以市地重劃（或聯合開發等）方式開發者，應辦理「撤銷徵收」。本選項正確，為本題「應辦理撤銷徵收」的情形。", "❌ 已開始使用後情事變更是「廢止徵收」，不是撤銷徵收。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "109", "num": 11, "q": "關於原土地所有權人申請已徵收土地之收回權，依土地徵收條例規定，下列敘述何者錯誤？", "opts": ["被徵收之土地，依原徵收計畫開始使用後未滿五年，不繼續依原徵收計畫使用者", "原土地所有權人應於該管直轄市或縣（市）主管機關通知後三個月內繳還原受領之補償地價及地價加成補償，逾期視為放棄收回權", "申請收回土地案件，應由該管直轄市或縣（市）主管機關受理", "被徵收之土地，徵收補償費發給完竣屆滿三年，未依徵收計畫開始使用者"], "ans": 1, "exps": ["❌ 本選項描述正確，「開始使用後未滿5年中斷」是收回權的法定事由之一，非錯誤。", "✓ 本選項為本題「錯誤」的答案：依土地徵收條例第9條，主管機關通知後，原所有人應「繳還補償費」並無附加利息的規定，且逾期「應繳還補償費」的期限是「3個月」，但逾期的效果是「視為放棄收回」此部分正確。然而，本選項說的是「視為放棄收回權」，而法條效果可能更細緻。以官方答案B為錯誤選項。", "❌ 本選項描述正確，地方主管機關受理收回申請，非錯誤。", "❌ 本選項描述正確，補償完竣3年未開始使用是收回事由，非錯誤。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "111", "num": 11, "q": "依土地徵收條例之規定，下列敘述何者正確？", "opts": ["撤銷或廢止徵收者，徵收前原設定之他項權利及耕地租約得予回復", "撤銷或廢止徵收者，如原土地所有權人及他項權利人申請於發給之抵價地上設定抵押權或典權時，其原抵押權或典權不予回復", "撤銷或廢止徵收，由需用土地人向中央主管機關申請之", "撤銷或廢止徵收，由該管直轄市或縣（市）主管機關單獨向中央主管機關申請之"], "ans": 2, "exps": ["❌ 本選項描述正確（撤銷廢止後原他項權利得回復），非錯誤。", "❌ 本選項描述正確（在抵價地設定抵押後原抵押不回復，以保護新的抵押權人），非錯誤。", "✓ 土地徵收條例第49條、第50條：撤銷或廢止徵收，均由「需用土地人」向「中央主管機關（內政部）」申請。本選項正確描述了申請主體（需用土地人，不是地方政府）和受理機關（中央，不是地方）。", "❌ 申請主體是「需用土地人」，不是「直轄市或縣（市）主管機關」，本選項的申請主體說法錯誤。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "111", "num": 19, "q": "依土地徵收條例規定，已公告徵收之土地，因作業錯誤，致原徵收之土地不在工程用地範圍內者，應如何處理？", "opts": ["應辦理廢止徵收", "應辦理撤銷徵收", "應辦理徵收收回", "應辦理徵收失效"], "ans": 1, "exps": ["❌ 廢止徵收（第50條）是針對使用前/後的情事變更（事業改變、無必要等），不是作業錯誤。", "✓ 同103-7，因「作業錯誤」致徵收土地不在工程用地範圍內者，應辦理「撤銷徵收」（第49條）。作業錯誤→撤銷是D4的固定規則。", "❌ 徵收收回（收回權）是已完成徵收後，因未依計畫使用所觸發的救濟，不是針對作業錯誤的處理。", "❌ 徵收失效是補償費逾期未發給的效果（第21條），不是作業錯誤的處理方式。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "111", "num": 21, "q": "徵收土地或土地改良物應發給之補償費，需用土地人應於公告期滿後十五日內將補償費繳交該管直轄市或縣（市）主管機關發給完竣，逾期者該部分土地或土地改良物之法律效力為何？", "opts": ["仍具徵收效力", "徵收從此失其效力", "被徵收之所有權人得申請撤銷徵收", "需用土地人得申請保留徵收"], "ans": 1, "exps": ["❌ 逾期未發給補償費，法律效果是徵收失效，不是繼續有效。", "✓ 土地徵收條例第21條：需用土地人應於公告期滿後15日內將補償費繳交地方主管機關發給完竣，逾期未繳者，「該部分土地之徵收從此失其效力」（即徵收失效）。這是為保障被徵收人在合理期間內獲得補償的制度設計。", "❌ 補償逾期是「法律上自動失效」（徵收失效），不是所有權人申請撤銷徵收的程序（撤銷徵收是需用土地人申請的程序）。", "❌ 不存在「保留徵收」的法律制度，為虛構選項。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "112", "num": 14, "q": "已公告徵收之土地，依徵收計畫開始使用前，興辦之事業改變時，依土地徵收條例之規定，下列何者正確？", "opts": ["應撤銷徵收", "應廢止徵收", "土地所有權人得行使收回權", "應舉行聽證"], "ans": 1, "exps": ["❌ 撤銷徵收（第49條）是針對公告徵收前就有問題（作業錯誤、都市計畫已規定其他方式開發），不是使用前事業改變的情形。", "✓ 土地徵收條例第50條（廢止徵收）：依徵收計畫「開始使用前」，有下列情形之一，需用土地人應辦理廢止徵收：①興辦之事業改變②計畫經註銷③開發方式改變④取得方式改變。「興辦之事業改變」正是廢止徵收的法定事由。", "❌ 收回權（第9條）是在補償完竣後一定期間內未依計畫使用時才能行使，不是使用前事業改變的救濟手段。", "❌ 聽證是特農有爭議時的特別程序，不是處理廢止徵收事由的方式。"]}, {"ch": "D4", "chName": "D4 撤銷・廢止徵收與收回權", "year": "113", "num": 5, "q": "依土地徵收條例規定，有關徵收之撤銷或廢止之敘述，下列何者錯誤？", "opts": ["撤銷或廢止徵收，由需用土地人向中央主管機關申請之", "在未依徵收計畫完成使用前，需用土地人應每年檢討其興辦事業計畫，並由該管直轄市或縣（市）政府列管", "依徵收計畫開始使用前，開發方式改變，應廢止徵收", "因作業錯誤，致原徵收之土地不在工程用地範圍內，應撤銷徵收"], "ans": 1, "exps": ["❌ 本選項描述正確（需用土地人申請，向中央申請），非錯誤。", "✓ 本選項為本題「錯誤」的答案：土地徵收條例規定，未依計畫完成使用前，需用土地人每年應檢討計畫，並由其「上級事業主管機關」（不是「直轄市或縣市政府」）列管。地方政府不是列管機關，上級事業主管機關才是，本選項的列管機關說法錯誤。", "❌ 本選項描述正確（開始使用前開發方式改變→廢止徵收），非錯誤。", "❌ 本選項描述正確（作業錯誤→撤銷徵收），非錯誤。"]}];
const CHS=[...new Set(CARDS.map(c=>c.chName))];
let sel=Object.fromEntries(CHS.map(c=>[c,1]));
let ans={};
const g=id=>document.getElementById(id);
function renderPills(){
  const p=g('pills');p.innerHTML='';
  CHS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='pill'+(sel[ch]?' on':'');
    b.textContent=ch;
    b.onclick=()=>{sel[ch]=sel[ch]?0:1;renderPills();renderList();};
    p.appendChild(b);
  });
}
function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}
function selNone(){Object.keys(sel).forEach(k=>sel[k]=0);renderPills();renderList();}
function resetAll(){if(!confirm('確定要清除所有作答記錄？'))return;ans={};renderList();updateProg();}
function renderList(){
  const list=g('list');list.innerHTML='';
  const vis=CARDS.filter(c=>sel[c.chName]);
  let lastCh='';
  vis.forEach(card=>{
    const idx=CARDS.indexOf(card);
    if(card.chName!==lastCh){
      const h=document.createElement('div');h.className='ch-header';h.textContent=card.chName;list.appendChild(h);lastCh=card.chName;
    }
    list.appendChild(makeCard(card,idx));
  });
  updateProg();
}
function makeCard(card,idx){
  const a=ans[idx];
  const div=document.createElement('div');
  div.className='qcard'+(a?(a.ok?' answered-ok':' answered-ng'):'');
  div.id='c'+idx;
  div.innerHTML='<div class="qmeta"><span>【'+card.year+'年第'+card.num+'題】</span><span class="qtag">'+card.chName+'</span></div><div class="qtext">'+card.q+'</div>';
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="ltr">'+l+'</span><span>'+card.opts[i]+'</span>';
    if(a){b.disabled=true;if(i===card.ans)b.classList.add('show-correct');if(i===a.chosen&&!a.ok)b.classList.add('ng');}
    else b.onclick=(i=>()=>pick(idx,i))(i);
    opts.appendChild(b);
  });
  div.appendChild(opts);
  const eb=document.createElement('div');eb.className='expbox'+(a?' show':'');eb.id='e'+idx;
  eb.innerHTML='<div class="exph">&#128218; 逐選項解析</div><div class="expb" id="eb'+idx+'">'+(a?buildExp(card,a.chosen,a.ok):'')+'</div>';
  div.appendChild(eb);
  return div;
}
function buildExp(card,chosen,ok){
  let h='<div style="margin-bottom:7px;"><span class="verdict '+(ok?'ok':'ng')+'">'+(ok?'答對了':'答錯了')+'</span></div>';
  ['A','B','C','D'].forEach((l,i)=>{
    const ec=i===card.ans?'ok':(i===chosen&&!ok?'ng':'no');
    h+='<div class="ei"><span class="el '+ec+'">'+l+'</span><span>'+(card.exps[i]||'')+'</span></div>';
  });
  return h;
}
function pick(idx,chosen){
  const card=CARDS[idx];const ok=(chosen===card.ans);
  ans[idx]={chosen,ok};
  const div=g('c'+idx);
  div.className='qcard'+(ok?' answered-ok':' answered-ng');
  div.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;b.onclick=null;
    if(i===card.ans)b.classList.add('show-correct');
    if(i===chosen&&!ok)b.classList.add('ng');
  });
  g('eb'+idx).innerHTML=buildExp(card,chosen,ok);
  g('e'+idx).classList.add('show');
  updateProg();
}
function updateProg(){
  const vis=CARDS.filter(c=>sel[c.chName]);
  const tot=vis.length,done=vis.filter(c=>ans[CARDS.indexOf(c)]!==undefined).length;
  const cor=vis.filter(c=>{const a=ans[CARDS.indexOf(c)];return a&&a.ok;}).length;
  g('pd').textContent=done;g('pt').textContent=tot;
  g('pr').textContent=done?Math.round(cor/done*100)+'%':'-';
  g('pf').style.width=tot?done/tot*100+'%':'0%';
}
renderPills();renderList();</script>
