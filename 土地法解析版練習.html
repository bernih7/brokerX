A1 總則", "text": "下列有關外國人取得我國土地之規定，何者正確？", "options": ["外國人依土地法規定取得土地時，應檢附相關文件，申請內政部核准", "農、林、漁、牧用地不得移轉、設定負擔或租賃於外國人", "外國人依土地法規定取得之土地，其面積及所在地點，應受該管直轄市或縣（市）政府依法所定之限制", "外國人為有助於國內重大建設、整體經濟或農牧經營之投資所取得之土地，應先經行政院核准"], "answer": 2}, {"id": 294, "year": "106", "num": 15, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "個人及營利事業出售依農業發展條例申請興建的農舍，應如何計徵所得稅？", "options": ["依 104 年 12 月 31 日前實施之舊制，僅就土地部分計算財產交易所得，課徵綜合所得稅", "依 104 年 12 月 31 日前實施之舊制，僅就房屋部分計算財產交易所得，課徵綜合所得稅", "依 105 年 1 月 1 日起實施之新制，房屋、土地均應按實價計算交易所得課稅", "不論新、舊制，均免徵所得稅"], "answer": 1}, {"id": 295, "year": "106", "num": 16, "chapter": "G1", "chapterName": "G1 契稅", "text": "下列有關契稅之申報起算日規定，何者錯誤？", "options": ["不動產移轉發生糾紛時，其申報契稅之起算日期，應以法院判決確定日為準", "向政府機關標購或領買公產，以政府機關核發產權移轉證明書之日為申報起算日", "向法院標購拍賣之不動產，以法院發給權利移轉證明書之日為申報起算日", "不動產分割時，以其完成移轉登記之日為申報起算日"], "answer": 3}, {"id": 296, "year": "106", "num": 17, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "下列何者非申請自住房屋稅稅率之要件？", "options": ["土地所有權人或其配偶、直系親屬於房屋所在地辦竣戶籍登記", "房屋無出租使用", "供本人、配偶或直系親屬實際居住使用", "本人、配偶及未成年子女全國合計 3 戶以內"], "answer": 0}, {"id": 297, "year": "106", "num": 18, "chapter": "E1", "chapterName": "E1 地價稅", "text": "甲之土地於106年10月1日贈與並移轉登記予乙，請問106年期地價稅之納稅義務人為何？", "options": ["甲", "乙", "甲乙協議", "甲乙依持有月數分別負擔"], "answer": 0}, {"id": 298, "year": "106", "num": 19, "chapter": "G1", "chapterName": "G1 契稅", "text": "甲之土地、房屋於106年7月1日設定典權並完成移轉登記予乙。下列有關納稅義務人之規定，何者錯誤？", "options": ["當年度地價稅之納稅義務人為甲", "107 年期房屋稅之納稅義務人為乙", "典權契稅之納稅義務人為乙", "土地增值稅之納稅義務人為甲"], "answer": 0}, {"id": 299, "year": "106", "num": 20, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "甲出售市價2,000萬元之房屋連同基地，出售時土地公告現值總額為1,000萬元，房屋課稅現值為300萬元，繳納土地增值稅100萬元。如果甲符合自用住宅用地之規定，請問甲至少應買多少錢之房屋土地才能申請退還土地增值稅100萬元？", "options": ["不問市價，只要新購土地之公告土地現值大於 900 萬元", "不問市價，只要新購土地之公告土地現值大於 1,000 萬元", "新購之房屋現值大於 300 萬元，房屋連同基地之市價大於 2,000 萬元", "新購房屋連同基地之市價大於 2,000 萬元"], "answer": 1}, {"id": 300, "year": "106", "num": 21, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "土地稅法規定農業用地移轉與自然人時，得申請不課徵土地增值稅。此處所稱農業用地，下列規定何者錯誤？", "options": ["農業發展條例第3條第11款所稱之耕地", "依區域計畫法劃定為各種使用分區內所編定之林業用地、養殖用地、水利用地、生態保護用地、國土保安用地及供農路使用之土地，或上開分區內暫未依法編定用地別之土地", "依區域計畫法劃定為農業區、山坡地保育區、森林區以外之分區內所編定之農牧用地", "依都市計畫法劃定為農業區、保護區內之土地"], "answer": 2}, {"id": 301, "year": "106", "num": 22, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "被徵收之土地，有下列何種情形時，原土地所有權人得於徵收公告之日起20年內，向該管直轄市或縣（市）主管機關申請照原徵收補償價額收回其土地？", "options": ["徵收補償費發給完竣屆滿 2 年，未依徵收計畫開始使用者", "徵收土地之殘餘部分面積過小或形勢不整，致不能為相當之使用者", "未依核准徵收原定興辦事業使用者", "依原徵收計畫開始使用後未滿 6 年，不繼續依原徵收計畫使用者"], "answer": 2}, {"id": 302, "year": "106", "num": 23, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "下列何者為撤銷徵收之原因？", "options": ["因工程變更設計，致原徵收之土地不在工程用地範圍內", "公告徵收時，都市計畫已規定以聯合開發、市地重劃或其他方式開發。但以聯合開發方式開發之土地，土地所有權人不願參與聯合開發者，不在此限", "依徵收計畫開始使用前，興辦之事業改變、興辦事業計畫經註銷、開發方式改變或取得方式改變", "已依徵收計畫開始使用，尚未依徵收計畫完成使用之土地，因情事變更，致原徵收土地之全部或一部已無徵收之必要"], "answer": 1}, {"id": 303, "year": "106", "num": 24, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "下列有關違反區域計畫管制使用土地者之處罰規定，何者錯誤？", "options": ["由該管直轄市、縣（市）政府處新臺幣 6 萬元以上 30 萬元以下罰鍰", "經限期變更使用、停止使用或拆除地上物恢復原狀而不遵從者，得按次處罰", "經限期變更使用而不遵從者，並得停止供水、供電、封閉、強制拆除或採取其他恢復原狀之措施", "不依限變更土地使用者，除依強制執行法辦理外，並得處 6 個月以下有期徒刑或拘役"], "answer": 3}, {"id": 304, "year": "106", "num": 25, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "下列何者非區域計畫法規定區域計畫得隨時檢討變更之原因？", "options": ["發生或避免重大災害", "興辦重大開發或建設事業", "為適應國防或經濟發展之需要", "區域建設推行委員會之建議"], "answer": 2}, {"id": 305, "year": "106", "num": 26, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "下列有關都市計畫法中公共設施用地之設置規定，何者錯誤？", "options": ["公共設施用地，應就人口、土地使用、交通等現狀及未來發展趨勢，決定其項目、位置與面積", "公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置，除具有特殊情形外，其占用土地總面積不得少於全部計畫面積10%", "道路系統、停車場所及加油站，應按土地使用分區及交通情形與預期之發展配置之。鐵路、公路通過實施都市計畫之區域者，應避免穿越市區中心", "（本題實際僅3個有效選項列於原文，第4選項可能因排版省略，請以官方公告四個選項核對）"], "answer": 1}, {"id": 306, "year": "106", "num": 27, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法第22條規定，下列何者非細部計畫應以細部計畫書及細部計畫圖應表明之事項？", "options": ["名勝、古蹟及具有紀念性或藝術價值應予保存之建築", "居住密度及容納人口", "土地使用分區管制", "道路系統"], "answer": 0}, {"id": 307, "year": "106", "num": 28, "chapter": "A2", "chapterName": "A2 土地登記", "text": "重新實施地籍測量時，已依法設立界標之土地所有權人，於重測結果公告後認為測量結果有錯誤者，應如何辦理？", "options": ["土地所有權人得於公告期間內，向該管地政機關繳納複丈費，聲請複丈", "土地所有權人得於公告期滿後，向該管地政機關申請重新實施地籍測量", "應由該管地政機關予以調處，不服調處者，應於接到調處通知後 15 日內，向司法機關訴請處理", "應由該管地政機關予以調處，不服調處者，應於接到調處通知後 15 日內，循行政救濟程序辦理"], "answer": 0}, {"id": 308, "year": "106", "num": 29, "chapter": "A2", "chapterName": "A2 土地登記", "text": "下列有關逾期未辦繼承登記土地之處理程序，何者正確？", "options": ["自繼承開始之日起逾1年未辦理繼承登記者，直轄市或縣市地政機關查明後，應公告繼承人於6個月內聲請登記", "逾期未辦理繼承登記，經限期聲請登記仍未聲請者，地政機關予以列冊管理期間為10年", "經地政機關列冊管理，期滿仍未聲請登記者，由地政機關將該土地或建築改良物清冊移請行政執行署公開標售", "經公開標售之土地，自登記完畢之日起10年內，原權利人得檢附證明文件按其法定應繼分，申請發給價金"], "answer": 3}, {"id": 309, "year": "106", "num": 30, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法第103條規定，租用建築房屋之基地，非因下列何種情形，出租人不得收回？", "options": ["出租人收回自住或重新建築時", "承租人違反租賃契約時", "承租人積欠租金額，除擔保金抵償外，達 2 個月以上時", "承租人損壞出租人之房屋或附著財物，而不為相當之賠償時"], "answer": 1}, {"id": 310, "year": "106", "num": 31, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "關於房地交易課徵所得稅之稅率規定，下列敘述何者錯誤？", "options": ["個人持有房屋、土地之期間在 1 年以內者，稅率為 45%", "個人持有房屋、土地之期間超過 1 年，未逾 2 年者，稅率為 35%", "個人持有房屋、土地之期間超過 2 年，未逾 10 年者，稅率為 25%", "個人持有房屋、土地之期間超過 10 年者，稅率為 15%"], "answer": 2}, {"id": 311, "year": "106", "num": 32, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例之規定，契稅之課稅基礎是？", "options": ["實價", "市價", "房價", "契價"], "answer": 3}, {"id": 312, "year": "106", "num": 33, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "土地所有權人曾使用自用住宅用地優惠稅率後，再出售其自用住宅用地，符合下列何項規定，為不受一次優惠稅率限制條件之一：", "options": ["出售都市土地面積未超過 3 公畝部分或非都市土地面積未超過 7 公畝部分", "出售時土地所有權人與其配偶及未成年子女，無該自用住宅以外之房屋", "出售前持有該土地 5 年以上", "土地所有權人或其配偶、未成年子女於土地出售前，在該地設有戶籍且持有該自用住宅連續滿 5 年"], "answer": 1}, {"id": 313, "year": "106", "num": 34, "chapter": "E1", "chapterName": "E1 地價稅", "text": "下列敘述之地價稅稅率，何者錯誤？", "options": ["自用住宅用地之地價稅稅率是 2‰", "依都市計畫法規定設置供公眾使用之停車場用地之地價稅稅率是 10‰", "公有非公用土地之地價稅稅率是 10‰", "都市計畫公共設施保留地，在保留期間仍為建築使用者，地價稅稅率是 10‰"], "answer": 3}, {"id": 314, "year": "106", "num": 35, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "山坡地範圍內森林區、山坡地保育區及風景區之土地，在未編定使用地類別之前，適用那項用地之管制？", "options": ["林業用地", "遊憩用地", "生態保護用地", "國土保安用地"], "answer": 0}, {"id": 315, "year": "106", "num": 36, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依平均地權條例之規定，土地買賣未辦竣權利移轉登記，承買人再行出售該土地時，處應納登記費多少倍以下之罰鍰？", "options": ["5倍", "10 倍", "15 倍", "20 倍"], "answer": 3}, {"id": 316, "year": "106", "num": 37, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "都市計畫發布實施後，應依何法之規定，實施建築管理？", "options": ["建築法", "建築技術規則", "建築師法", "建築管理規則"], "answer": 0}, {"id": 317, "year": "106", "num": 38, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法之規定，聲請為土地權利變更登記，應檢附什麼文件？", "options": ["原發土地所有權狀及地段圖", "原發土地所有權狀及地段圖或土地他項權利證明書", "原發土地所有權狀及地段圖及土地他項權利證明書", "原發土地所有權狀或地段圖及土地他項權利證明書"], "answer": 1}, {"id": 318, "year": "106", "num": 39, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "依土地法及平均地權條例對於空地及荒地之規定，下列敘述何者錯誤？", "options": ["土地法規定，土地建築改良物價值不及所占地基申報地價20%者，視為空地", "平均地權條例規定，空地係指已完成道路、排水及電力設施，於有自來水地區並已完成自來水系統，而仍未依法建築使用；或雖建築使用，而其建築改良物價值不及所占基地申報地價10%，且經直轄市或縣（市）政府認定應予增建、改建或重建之私有及公有非公用建築用地", "土地法規定，凡編為農業或其他直接生產用地，未依法使用者為荒地", "平均地權條例規定，農業用地閒置不用，經直轄市或縣（市）政府報經行政院農業委員會核准通知限期使用或命其委託經營，逾期仍未使用或委託經營者，按應納田賦加徵1倍至3倍之荒地稅"], "answer": 3}, {"id": 319, "year": "106", "num": 40, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "甲105年6月買入A房地，購入成本1,300萬元，於106年2月以2,000萬元出售A房地時，繳納土地增值稅10萬元（土地漲價總數額為100萬元），因取得、改良及移轉而支付的費用50萬元，其應納交易所得稅若干？", "options": ["1,925,000 元", "2,240,000 元", "2,475,000 元", "2,880,000 元"], "answer": 2}, {"id": 320, "year": "107", "num": 1, "chapter": "A2", "chapterName": "A2 土地登記", "text": "關於土地權利變更登記，下列何者正確？", "options": ["其係繼承登記者，應由全體繼承人聲請之", "其係繼承登記者，依法應自繼承開始之日起二個月內為之", "聲請逾期者，每逾一個月得處應納登記費額二倍之罰鍰", "罰鍰最高不得超過應納登記費額二十倍"], "answer": 3}, {"id": 321, "year": "107", "num": 2, "chapter": "A1", "chapterName": "A1 總則", "text": "下列土地，何者非屬土地法規定不得為私有之土地？", "options": ["礦泉地", "瀑布地", "國家公園土地", "名勝古蹟"], "answer": 2}, {"id": 322, "year": "107", "num": 3, "chapter": "A2", "chapterName": "A2 土地登記", "text": "下列何種登記，應繳納登記費？", "options": ["土地權利信託登記", "土地權利塗銷登記", "土地標示變更登記", "因土地重劃之變更登記"], "answer": 0}, {"id": 323, "year": "107", "num": 4, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "土地法第34條之1第1項有關以多數決處分共有土地之規定，下列處分方式，何者不適用該規定？", "options": ["設定農育權", "設定不動產役權", "設定典權", "辦理共有物分割"], "answer": 3}, {"id": 324, "year": "107", "num": 5, "chapter": "A2", "chapterName": "A2 土地登記", "text": "重新實施地籍測量，遇有土地所有權人因設立界標或到場指界發生界址爭議時，地政機關應如何處理？", "options": ["逕行參照舊地籍圖施測", "請當事人逕行向法院提起確認界址之訴，俟判決確定後再行辦理", "逕行依地方習慣施測", "準用土地法第 59 條第 2 項規定之調處程序處理之"], "answer": 3}, {"id": 325, "year": "107", "num": 6, "chapter": "A2", "chapterName": "A2 土地登記", "text": "逾期未辦繼承登記之土地，經依土地法第73條之1規定程序列冊管理期滿，移請國有財產署標售五次不成，而登記為國有者，自登記完畢之日起多少年內，原權利人得檢附證明文件按其法定應繼分請求國有財產署發給價金？", "options": ["10 年", "12 年", "15 年", "20 年"], "answer": 0}, {"id": 326, "year": "107", "num": 7, "chapter": "A2", "chapterName": "A2 土地登記", "text": "預告登記，對於因下列何種事由而為之新登記，具有排除之效力？", "options": ["土地交換", "徵收", "強制執行", "法院判決"], "answer": 0}, {"id": 327, "year": "107", "num": 8, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "為保護基地承租人，依土地法規定，租用基地建築房屋，應由出租人與承租人會同聲請該管直轄市或縣（市）地政機關為何種權利之登記？", "options": ["租賃權", "地上權", "典權", "不動產役權"], "answer": 1}, {"id": 328, "year": "107", "num": 9, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法規定，關於租用建築房屋之基地，下列何者，非屬出租人得收回之情形？", "options": ["出租人收回自行建築時", "契約年限屆滿時", "承租人以基地供違反法令之使用時", "承租人轉租基地於他人時"], "answer": 0}, {"id": 329, "year": "107", "num": 10, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "依平均地權條例規定，直轄市或縣（市）政府對於尚未建築之超額私有建築用地之處理，下列敘述，何者正確？", "options": ["應通知土地所有權人於三年內出售", "應通知土地所有權人於三年內建築使用", "逾期未出售或未建築使用者，得予強制拍賣", "逾期未出售或未建築使用者，得予照價收買"], "answer": 3}, {"id": 330, "year": "107", "num": 11, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "耕地以外之出租土地，因市地重劃而不能達到原租賃之目的者，承租人得終止租約，並得向出租人請求如何之補償？", "options": ["按重劃計畫書公告當期公告土地現值扣除預計土地增值稅後餘額之三分之一", "按重劃計畫書公告當期公告土地現值之三分之一", "相當六個月租金", "相當一年租金"], "answer": 3}, {"id": 331, "year": "107", "num": 12, "chapter": "D1", "chapterName": "D1 徵收程序要件", "text": "依土地徵收條例規定，關於特定農業區農牧用地之徵收，下列何者錯誤？", "options": ["除零星夾雜難以避免者外，不得徵收。但國防所必須或經行政院核定之重大建設所需者，不在 此限", "除零星夾雜難以避免者外，不得徵收。但交通所必須或經行政院核定之重大建設所需者，不在 此限", "特定農業區經行政院核定為重大建設須辦理徵收者，若有爭議，應依行政程序法舉行聽證", "特定農業區經行政院核定為重大建設須辦理徵收者，若有爭議，應依行政程序法舉行公聽會"], "answer": 3}, {"id": 332, "year": "107", "num": 13, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "依土地徵收條例有關徵用之規定，下列敘述，何者正確？", "options": ["國家因興辦繼續性之公共建設工程，得徵用私有土地或土地改良物", "徵用期間逾六年，或二次以上徵用，期間合計逾六年者，需用土地人應於申請徵用前，以書面 通知", "土地或土地改良物所有權人於收到徵用通知書之日起三十日內，得請求需用土地人徵收所有權", "因徵用而請求徵收土地或土地改良物所有權者，必要時所有權人得申請收回其土地或土地改良物"], "answer": 2}, {"id": 333, "year": "107", "num": 14, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "依土地徵收條例規定，徵收土地之殘餘部分面積過小或形勢不整，致不能為相當之使用者，所有權人得向何機關申請一併徵收？", "options": ["需用土地人", "該管直轄市或縣（市）主管機關", "內政部", "行政院"], "answer": 1}, {"id": 334, "year": "107", "num": 15, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "實施區段徵收時，申請發給抵價地者，對其被徵收土地之權利義務，於何時終止？", "options": ["向直轄市或縣（市）主管機關申請發給抵價地時", "接到直轄市或縣（市）主管機關核定發給抵價地通知時", "直轄市或縣（市）主管機關將抵價地登記為申請人所有時", "直轄市或縣（市）主管機關將抵價地點交申請人接管時"], "answer": 1}, {"id": 335, "year": "107", "num": 16, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "區域計畫法有關非都市土地許可開發之規定，下列敘述，何者錯誤？", "options": ["開發許可前，應先將申請開發案提報各該區域計畫委員會審議之", "申請開發許可，申請人應先取得開發地區內全部土地及建築物之所有權", "開發許可後，辦理分區或用地變更前，應將開發區內公共設施用地完成分割移轉登記為各該直 轄市、縣（市）有或鄉、鎮（市）有，並繳交開發影響費", "直轄市、縣（市）政府受理開發申請案後，除情形特殊者外，應於六十日內報請各該區域計畫 擬定機關審議"], "answer": 1}, {"id": 336, "year": "107", "num": 17, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "依非都市土地使用管制規則規定，山坡地範圍內之土地，在未編定使用地類別前，適用林業用地之管制，下列何者不包含在內？", "options": ["森林區", "風景區", "國家公園區", "山坡地保育區"], "answer": 2}, {"id": 337, "year": "107", "num": 18, "chapter": "A1", "chapterName": "A1 總則", "text": "下列土地他項權利，何者為土地法所創設？", "options": ["地上權", "農育權", "耕作權", "不動產役權"], "answer": 2}, {"id": 338, "year": "107", "num": 19, "chapter": "E1", "chapterName": "E1 地價稅", "text": "下列土地關係人，何者非屬土地稅法第3條所定之地價稅納稅義務人？", "options": ["承領土地，為承領人", "承墾土地，為耕作權人", "權屬不明土地，為主管稅捐稽徵機關指定之土地使用人", "設有典權土地，為典權人"], "answer": 2}, {"id": 339, "year": "107", "num": 20, "chapter": "E1", "chapterName": "E1 地價稅", "text": "土地為信託財產者，於信託關係存續中，以何人為地價稅或田賦之納稅義務人？", "options": ["委託人", "受託人", "受益人", "信託監察人"], "answer": 1}, {"id": 340, "year": "107", "num": 21, "chapter": "C1", "chapterName": "C1 規定地價", "text": "配偶相互贈與之土地，得申請不課徵土地增值稅。但於再移轉第三人時，以該土地第一次贈與前之原規定地價或前次移轉現值為原地價，計算下列何種數值或數額，課徵土地增值稅？", "options": ["公告現值", "申報移轉現值", "現值數額", "漲價總數額"], "answer": 3}, {"id": 341, "year": "107", "num": 22, "chapter": "E1", "chapterName": "E1 地價稅", "text": "自用住宅用地得適用優惠稅率課徵地價稅，下列有關自用住宅用地要件之敘述，何者錯誤？", "options": ["須土地所有權人或其配偶、直系親屬於該地有居住事實並辦竣戶籍登記", "須為無出租或供營業使用之住宅用地", "土地面積，都市土地未超過三公畝部分，非都市土地未超過七公畝部分", "土地上之建築改良物屬土地所有權人或其配偶、直系親屬所有者為限"], "answer": 0}, {"id": 342, "year": "107", "num": 23, "chapter": "G1", "chapterName": "G1 契稅", "text": "買賣契稅之稅率，為其契價百分之六。所稱契價，以何者為準？", "options": ["以實際買賣價格為準", "以當地不動產評價委員會評定之標準價格為準", "以當地地價及標準地價評議委員會評定之標準價格為準", "以當地建築主管機關公告之房屋造價為準"], "answer": 1}, {"id": 343, "year": "107", "num": 24, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例規定，私有房屋受重大災害時，有關房屋稅之減免，下列敘述何者正確？", "options": ["毀損面積佔整棟面積三成以上，不及五成之房屋，免徵房屋稅", "毀損面積佔整棟面積五成以上，必須修復始能使用之房屋，免徵房屋稅", "毀損面積佔整棟面積五成以上，其房屋稅減半徵收", "毀損面積佔整棟面積五成以上，必須修復始能使用之房屋，其房屋稅減半徵收"], "answer": 1}, {"id": 344, "year": "107", "num": 25, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "依所得稅法規定，有關出售自住房屋，其房地交易所得稅之優惠，下列敘述，何者錯誤？", "options": ["免稅所得額，以按該法第 14 條之 4 第 3 項規定計算之餘額不超過四百萬元為限", "個人或其配偶、直系親屬辦竣戶籍登記、持有並居住於該房屋連續滿六年", "交易前六年內，無出租、供營業或執行業務使用", "個人與其配偶及未成年子女於交易前六年內未曾適用該法第 4 條之 5 第 1 項第 1 款規定"], "answer": 1}, {"id": 345, "year": "108", "num": 1, "chapter": "A1", "chapterName": "A1 總則", "text": "私有土地所有權之移轉、設定負擔或租賃，如有妨害基本國策者，中央地政機關得報請下列何機關制止之？", "options": ["立法院", "司法院", "行政院", "監察院"], "answer": 2}, {"id": 346, "year": "108", "num": 2, "chapter": "A2", "chapterName": "A2 土地登記", "text": "因登記錯誤遺漏或虛偽致受有損害者，由該地政機關負損害賠償責任，此項損害賠償之請求，如經該地政機關拒絕，受損害人得採取下列何種處理方式？", "options": ["向行政院申訴", "向立法院告發", "向司法機關起訴", "向監察院告發"], "answer": 2}, {"id": 347, "year": "108", "num": 3, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "平均地權條例規定照價收買後之土地，其權屬應為？", "options": ["國有", "直轄市、縣（市）有", "鄉鎮有", "公營事業有"], "answer": 1}, {"id": 348, "year": "108", "num": 4, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "下列有關土地徵收條例的優先購買權敘述，何者正確？", "options": ["行使主體係被徵收之原土地所有權人或其繼承人", "行使原因須被徵收土地經依徵收計畫使用後，依法變更原使用目的而讓售", "行使條件須與讓售條件相同，且應公告三個月", "行使期間須於讓售決定後十日內表示優先購買"], "answer": 0}, {"id": 349, "year": "108", "num": 5, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "下列有關基地房屋之優先購買權敘述，何者正確？", "options": ["基地出賣時，抵押權人有依同樣條件優先購買之權", "房屋出賣時，抵押權人有依同樣條件優先購買之權", "優先購買權人，於接到出賣通知後一個月內不表示者，其優先權視為放棄", "出賣人未通知優先購買權人而與第三人訂立買賣契約者，其契約不得對抗優先購買權人"], "answer": 3}, {"id": 350, "year": "108", "num": 6, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "下列有關土地所有權移轉或設定典權，申報移轉現值之審核標準，係以何時之當期公告土地現值為準？", "options": ["申報人逾訂定契約之日起三十日始申報者，以訂約日", "遺贈之土地，以遺贈人死亡後六個月", "依法院判決移轉登記者，以申報人向法院起訴日", "經法院拍賣之土地，以強制執行日"], "answer": 2}, {"id": 351, "year": "108", "num": 7, "chapter": "E1", "chapterName": "E1 地價稅", "text": "下列有關平均地權條例及土地稅法中有關累進課地價稅之敘述，何者正確？", "options": ["超過累進起點地價未達五倍者，就其超過部分課徵千分之三十", "超過累進起點地價五倍至十倍者，就其超過部分課徵千分之三十五", "超過累進起點地價十倍至十五倍者，就其超過部分課徵千分之四十", "超過累進起點地價十五倍至二十倍者，就其超過部分課徵千分之四十五"], "answer": 3}, {"id": 352, "year": "108", "num": 8, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "預告登記，對於因下列何種法律行為或事實而為之新登記，無排除之效力？", "options": ["重劃", "繼承", "徵收", "都市更新"], "answer": 2}, {"id": 353, "year": "108", "num": 9, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "山坡地範圍內森林區、山坡地保育區及風景區之土地，在未編定使用地之類別前，適用何種管制？", "options": ["林業用地", "農牧用地", "國土保安用地", "原住民保留地"], "answer": 0}, {"id": 354, "year": "108", "num": 10, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "下列敘述何者正確？", "options": ["個人房屋、土地交易損失，得自交易日以後五年內之房屋、土地交易所得減除之", "個人房屋、土地交易損失，得自交易日以後七年內之房屋、土地交易所得減除之", "重購之自住房屋、土地，於重購後五年內改作其他用途或再行移轉時，應追繳原扣抵或退還稅額", "重購之自住房屋、土地，於重購後七年內改作其他用途或再行移轉時，應追繳原扣抵或退還稅額"], "answer": 2}, {"id": 355, "year": "108", "num": 11, "chapter": "E1", "chapterName": "E1 地價稅", "text": "依土地稅法規定，關於地價稅之納稅義務人，下列何項敘述錯誤？", "options": ["信託土地，於信託關係存續中，為受託人", "設有典權土地，為出典人", "承領土地，為承領人", "承墾土地，為耕作權人"], "answer": 1}, {"id": 356, "year": "108", "num": 12, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法規定，都市計畫區內之公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置，除具有特殊情形外，其占用土地總面積不得少於全部計畫面積百分之幾？", "options": ["百分之十", "百分之十二", "百分之十五", "百分之十七"], "answer": 0}, {"id": 357, "year": "108", "num": 13, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "依平均地權條例之規定，直轄市或縣（市）政府對於尚未建築之私有建築用地之處理方式，下列何項敘述錯誤？", "options": ["除有特殊情形外，應限制尚未建築用地面積最高額以十公畝為限", "對於超額私有建築用地，應通知土地所有權人於二年內出售或建築使用", "逾期未出售或未建築使用者，得予照價收買", "照價收買價格，按收買當時查估之正常市價"], "answer": 3}, {"id": 358, "year": "108", "num": 14, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "出租之公、私有耕地因實施市地重劃致不能達到原租賃之目的者，可由直轄市或縣（市）政府逕為註銷其租約並通知當事人，如重劃後分配土地者，承租人得請求之補償，下列何項為正確？", "options": ["按重劃計畫書公告當期該土地公告土地現值減除預計土地增值稅後餘額之三分之一", "按重劃計畫書公告當期該土地查估之市價減除預計土地增值稅後餘額之三分之一", "按重劃計畫書公告當期該土地之公告土地現值之三分之一", "按重劃計畫書公告當期該土地查估之市價之三分之一"], "answer": 2}, {"id": 359, "year": "108", "num": 15, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "都市計畫應依據現在及既往情況，並預計未來幾年內之發展情形訂定之？", "options": ["十五年", "二十年", "二十五年", "三十年"], "answer": 2}, {"id": 360, "year": "108", "num": 16, "chapter": "A2", "chapterName": "A2 土地登記", "text": "甲將其所有X地號土地出售予乙後，由甲會同乙申辦土地買賣移轉登記時，請問本案應按何標準計收千分之一的登記費？", "options": ["該筆土地的公告現值", "該筆土地的公告地價", "該筆土地的買賣實價", "該筆土地的申報地價"], "answer": 3}, {"id": 361, "year": "108", "num": 17, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "已公告徵收之土地，需用土地人應切實按核准計畫及所定期限使用。在未依徵收計畫完成使用前，需用土地人應每年檢討其興辦事業計畫，並由其上級事業主管機關列管。有下列那種情形，應辦理撤銷徵收？", "options": ["因工程變更設計，致原徵收之土地不在工程用地範圍內", "土地徵收計畫開始使用前，興辦之事業改變、興辦事業計畫經註銷、開發方式改變或取得方式 改變", "公告徵收時，都市計畫已規定以市地重劃或其他方式開發", "已依徵收計畫開始使用，尚未依徵收計畫完成使用之土地，因情事變更，致原徵收土地之全部 或一部已無徵收之必要"], "answer": 2}, {"id": 362, "year": "108", "num": 18, "chapter": "A5", "chapterName": "A5 公有土地", "text": "下列土地何者屬於土地法第四條所稱的公有土地？", "options": ["所有權人登記為台灣糖業股份有限公司", "所有權人登記為臺灣石門農田水利會", "所有權人登記為國家中山科學研究院", "所有權人登記為埔里鎮"], "answer": 3}, {"id": 363, "year": "108", "num": 19, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，任何共有人得申請該管直轄市、縣（市）地政機關調處，不服調處者，應於接到調處通知後幾日內向司法機關訴請處理？", "options": ["十五日", "二十日", "二十五日", "三十日"], "answer": 0}, {"id": 364, "year": "108", "num": 20, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "非都市土地申請開發達一定規模者，應辦理土地使用分區變更，下列何項敘述錯誤？", "options": ["申請開發社區之計畫達五十戶或土地面積在一公頃以上，應變更為鄉村區", "申請開發為工業使用之土地面積達十公頃以上，應變更為工業區", "申請開發遊憩設施之土地面積達五公頃以上，應變更為特定專用區", "申請開發高爾夫球場之土地面積達五公頃以上，應變更為特定專用區"], "answer": 3}, {"id": 365, "year": "108", "num": 21, "chapter": "A2", "chapterName": "A2 土地登記", "text": "關於繼承登記，下列何項敘述錯誤？", "options": ["繼承登記，得自繼承開始之日起，六個月內為之。申請逾期者，每逾一個月得處應納登記費額 一倍之罰鍰", "自繼承開始之日起逾六個月未辦繼承登記者，經該管直轄市或縣市地政機關查明後，應即公告 繼承人於三個月內申請登記；逾期仍未申請者，得由地政機關予以列冊管理", "前項列冊管理期間為十五年，逾期仍未申請登記者，由地政機關將該土地或建築改良物清冊移 請財政部國有財產署公開標售", "標售所得之價款應於國庫設立專戶儲存，繼承人得依其法定應繼分領取，逾十年無繼承人申請 提領該價款者，歸屬國庫"], "answer": 1}, {"id": 366, "year": "108", "num": 22, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "土地所有權辦理買賣移轉登記時，申報土地移轉現值之審核標準，下列何項敘述錯誤？", "options": ["申報人於訂定契約之日起三十日內申報者，以訂約日當期之公告土地現值為準", "申報人逾訂定契約之日起三十日始申報者，以受理申報機關收件日當期之公告土地現值為準", "遺贈之土地，以遺贈人死亡日當期之公告土地現值為準", "依法院判決移轉登記者，以判決確定日當期之公告土地現值為準"], "answer": 3}, {"id": 367, "year": "108", "num": 23, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "區段徵收土地時，地價補償得經土地所有權人申請，以徵收後可供建築之抵價地折算抵付，而抵價地總面積，以徵收總面積百分之五十為原則，如因情況特殊，經上級主管機關核准者，不在此限，但不得少於百分之四十；惟曾經農地重劃者，該重劃地區部分之抵價地不得少於多少？", "options": ["百分之四十三", "百分之四十五", "百分之四十七", "百分之四十九"], "answer": 1}, {"id": 368, "year": "108", "num": 24, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "依規定民國109年需辦理重新規定地價，下列對規定地價或重新規定地價之敘述，何項錯誤？", "options": ["規定地價或重新規定地價後，每二年重新規定地價一次，但必要時得延長之", "須分區調查最近一年之土地買賣價格或收益價格", "公告及申報地價，其期限為三十日", "申報地價未滿公告地價百分之八十時，得照價收買或以公告地價為其申報地價"], "answer": 3}, {"id": 369, "year": "108", "num": 25, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "非都市土地依區域計畫法施行細則之規定，得劃定幾種使用區？編定幾種使用地？", "options": ["十種使用區；十八種使用地", "十種使用區；十九種使用地", "十一種使用區；十八種使用地", "十一種使用區；十九種使用地"], "answer": 3}, {"id": 370, "year": "109", "num": 1, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例規定，下列敘述何者錯誤？", "options": ["合法登記之工廠供直接生產使用之自有房屋，免徵房屋稅", "受重大災害，毀損面積佔整棟面積五成以上，必須修復始能使用之私有房屋，免徵房屋稅", "房屋標準價格，每三年重行評定一次，並應依其耐用年數予以折舊，按年遞減其價格", "各級政府機關及地方自治機關之公有辦公房屋及其員工宿舍，免徵房屋稅"], "answer": 0}, {"id": 371, "year": "109", "num": 2, "chapter": "G1", "chapterName": "G1 契稅", "text": "關於契稅稅率依契稅條例之規定，下列敘述何者錯誤？", "options": ["買賣契稅為其契價百分之六", "贈與契稅為其契價百分之六", "占有契稅為其契價百分之六", "典權契稅為其契價百分之六"], "answer": 3}, {"id": 372, "year": "109", "num": 3, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "土地所有權人於出售土地後，依土地稅法規定，下列何種情形得申請就其已納土地增值稅額內，退還其不足支付新購土地地價之數額？", "options": ["土地所有權人於先購買土地後，自完成移轉登記之日起二年後，始行出售土地者", "其新購土地地價超過原出售土地地價，扣除繳納房地交易所得稅後之餘額者", "自耕之農業用地出售後，於二年內另行購買仍供自耕之農業用地者", "土地出售前一年內，曾供營業使用或出租者"], "answer": 2}, {"id": 373, "year": "109", "num": 4, "chapter": "E1", "chapterName": "E1 地價稅", "text": "依土地稅法規定，有關地價稅優惠稅率與減免，下列敘述何者錯誤？", "options": ["依都市計畫法劃設並經目的事業主管機關核准供公眾停車使用之停車場用地，按千分之十計徵 地價稅", "經目的事業主管機關核准設立之私立公園、體育場所使用範圍內之土地，免徵地價稅", "公有土地按基本稅率徵收地價稅。但公有土地供公共使用者，免徵地價稅", "都市計畫公共設施保留地，在保留期間仍為建築使用者，除自用住宅用地依第 17 條之規定外， 統按千分之六計徵地價稅"], "answer": 1}, {"id": 374, "year": "109", "num": 5, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "依平均地權條例規定，為促進土地利用，擴大辦理市地重劃，得獎勵土地所有權人自行組織重劃會辦理市地重劃，下列對獎勵土地所有權人辦理市地重劃之敘述，何者錯誤？", "options": ["減半收取土地權利變更登記及換發權利書狀費用", "土地所有權人參加自辦市地重劃所需費用，得向政府指定之銀行或實施平均地權基金申請低利貸款", "自辦市地重劃區抵費地出售時，不計徵土地增值稅", "免徵或減徵地價稅與田賦"], "answer": 0}, {"id": 375, "year": "109", "num": 6, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法之規定，關於都市計畫之變更，下列敘述何者正確？", "options": ["都市計畫之變更，如直接限制一定區域人民之權利者，則其性質即屬公法上之觀念通知", "都市計畫之變更屬法規性質，並非行政處分，都市計畫個別變更範圍外之人民，如因都市計畫 個別變更致其權利或法律上利益受侵害時，無法提起行政訴訟以資救濟", "為適應國防或經濟發展之需要而變更都市計畫時，應以通盤檢討變更之方式辦理", "為避免重大災害之發生而變更都市計畫時，應以個案迅行變更之方式辦理"], "answer": 3}, {"id": 376, "year": "109", "num": 7, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "依非都市土地使用管制規則規定，關於區域計畫擬定機關核發開發許可後，直轄市或縣（市）政府應報經區域計畫擬定機關廢止原開發許可之情形，下列敘述何者錯誤？", "options": ["興辦事業計畫經目的事業主管機關廢止或依法失其效力、整地排水計畫之核准經直轄市或縣 （市）政府廢止或水土保持計畫之核准經水土保持主管機關廢止或依法失其效力", "申請人自行申請廢止", "與水源供應、鄰近之交通設施、排水系統、電力、電信及垃圾處理等公共設施及公用設備服務 未能相互配合者", "違反核定之土地使用計畫、目的事業或環境影響評估等相關法規，經該管主管機關提出要求處 分並經限期改善而未改善"], "answer": 2}, {"id": 377, "year": "109", "num": 8, "chapter": "C1", "chapterName": "C1 規定地價", "text": "關於規定地價，依平均地權條例之規定，下列敘述何者正確？", "options": ["規定地價後，每三年重新規定地價一次。但必要時得延長之", "直轄市或縣（市）主管機關辦理規定地價或重新規定地價時，須分區調查最近一年之土地買賣 價格或收益價格", "土地所有權人申報之地價未滿公告地價百分之八十時，得徵收之", "土地所有權人未於公告期間申報地價者，以公告地價為其申報地價"], "answer": 1}, {"id": 378, "year": "109", "num": 9, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "都市計畫法有關公共設施保留地之規定，下列敘述何者正確？", "options": ["公共設施保留地劃設逾二十五年未經政府取得者，得優先辦理徵收", "公共設施保留地，其地價補償以徵收當期毗鄰公共設施保留地之平均公告土地現值為準，必要 時得加成補償之", "都市計畫公共設施保留地臨時建築使用辦法，由直轄市、縣（市）政府定之", "依法指定之公共設施保留地，得繼續為原來之使用或改為妨礙目的較輕之使用"], "answer": 3}, {"id": 379, "year": "109", "num": 10, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "依平均地權條例之規定，土地所有權移轉或設定典權時，權利人及義務人應於訂定契約之日起幾日內，檢同契約及有關文件，共同申請土地所有權移轉或設定典權登記，並共同申報其土地移轉現值？", "options": ["10 日", "20 日", "30 日", "40 日"], "answer": 2}, {"id": 380, "year": "109", "num": 11, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "關於原土地所有權人申請已徵收土地之收回權，依土地徵收條例規定，下列敘述何者錯誤？", "options": ["被徵收之土地，依原徵收計畫開始使用後未滿五年，不繼續依原徵收計畫使用者", "原土地所有權人應於該管直轄市或縣（市）主管機關通知後三個月內繳還原受領之補償地價及 地價加成補償，逾期視為放棄收回權", "申請收回土地案件，應由該管直轄市或縣（市）主管機關受理", "被徵收之土地，徵收補償費發給完竣屆滿三年，未依徵收計畫開始使用者"], "answer": 1}, {"id": 381, "year": "109", "num": 12, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "有關徵收補償，依土地徵收條例相關規定，下列敘述何者正確？", "options": ["農作改良物之補償費，於農作改良物被徵收時與其孳息成熟時期相距在 1 年以內者，按成熟時 之孳息估定之", "徵收當期市價指徵收公告期滿次日起算第十日經地價評議委員會評定之當期市價", "建築改良物之補償費，按起造當時該建築改良物之重建價格估定之", "被徵收土地在都市計畫區內之公共設施保留地，應按毗鄰公共設施保留地之平均市價補償其地價"], "answer": 0}, {"id": 382, "year": "109", "num": 13, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "關於耕地終止租約與補償，依平均地權條例規定，下列敘述何者正確？", "options": ["耕地出租人依規定終止租約收回耕地時，應補償承租人為改良土地所支付之費用及已收穫之農 作改良物", "耕地出租人依規定終止租約，實際收回耕地屆滿二年後，不依照使用計畫建築使用者，直轄市 或縣（市）政府得照價收買之", "耕地出租人依規定終止租約收回耕地時，承租人得向出租人請求按公告當期該土地之公告土地 現值三分之一之補償", "出租耕地經依法編為建築用地者，出租人為收回自行建築或出售作為建築使用時，得終止租約"], "answer": 3}, {"id": 383, "year": "109", "num": 14, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "甲有A屋一棟，出租給乙居住使用。依土地法第100條之規定，出租人因下列何項情形，得收回房屋？", "options": ["承租人乙因疾病、意外產生有長期住院療養之需要時", "承租人乙積欠租金額，以擔保金抵償之後，尚有 1 個月租金未繳時", "承租人乙違反民法第 443 條第 1 項規定，將該屋轉租給他高中同學時", "承租人乙因為工作調動，無法繼續居住時"], "answer": 2}, {"id": 384, "year": "109", "num": 15, "chapter": "A2", "chapterName": "A2 土地登記", "text": "土地或建築改良物，自繼承開始之日起逾1年未辦理繼承登記者，依土地法之規定，其處理程序何者正確？", "options": ["經縣市地政機關查明後，應即公告繼承人於 6 個月內聲請登記；逾期仍未聲請者，得由地政機 關予以列冊管理", "繼承人占有或第三人占有無合法使用權者，於標售後喪失其占有之權利；土地或建築改良物租 賃期間超過 5 年者，於標售後以 5 年為限", "標售所得之價款應於國庫設立專戶儲存，繼承人得依其法定應繼分領取。逾 15 年無繼承人申 請提領該價款者，歸屬國庫", "標售土地或建築改良物前應公告 10 日，繼承人、合法使用人或其他共有人就其使用範圍依序 有優先購買權"], "answer": 1}, {"id": 385, "year": "109", "num": 16, "chapter": "A2", "chapterName": "A2 土地登記", "text": "甲有A屋，與乙簽訂買賣契約但尚未為移轉登記，乙對甲的A屋移轉請求權申請預告登記。下列敘述何者最正確？", "options": ["該預告登記為保全登記、暫時登記，其登記免納登記費", "該預告登記，對於因繼承、強制執行、徵收、法院判決而為之新登記，無排除之效力", "預告登記完畢後，如甲將 A 屋移轉於丙，該處分絕對無效", "嗣後甲欲就 A 屋申辦抵押權次序變更登記時，應檢附乙的同意書，始得為之"], "answer": 0}, {"id": 386, "year": "109", "num": 17, "chapter": "A1", "chapterName": "A1 總則", "text": "依土地法規定，下列何種土地不得移轉、設定負擔或租賃於外國人？", "options": ["農地", "墳場用地", "礦地", "學校用地"], "answer": 2}, {"id": 387, "year": "109", "num": 18, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例規定，買賣契稅，應由下列何者申報納稅？", "options": ["銀行", "出賣人", "買受人", "不動產仲介公司"], "answer": 2}, {"id": 388, "year": "109", "num": 19, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例規定，房屋為信託財產者，於信託關係存續中，下列何者為房屋稅之納稅義務人？", "options": ["委託人", "受託人", "受益人", "監察人"], "answer": 1}, {"id": 389, "year": "109", "num": 20, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "依土地徵收條例第25條規定，被徵收之土地，所有權人死亡未辦竣繼承登記，其徵收補償費如何處理？", "options": ["歸屬國庫", "納入平均地權基金", "歸目的事業主管機關所有", "得由部分繼承人按其應繼分領取之"], "answer": 3}, {"id": 390, "year": "109", "num": 21, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法規定，下列何種公共設施應按閭鄰單位或居民分布情形適當配置之？", "options": ["社會福利設施", "垃圾處理場", "污水處理廠", "屠宰場"], "answer": 0}, {"id": 391, "year": "109", "num": 22, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法規定，土地登記損害賠償之請求，如經該地政機關拒絕，受損害人得向下列何者起訴？", "options": ["監察院", "行政院", "立法院", "司法機關"], "answer": 3}, {"id": 392, "year": "109", "num": 23, "chapter": "A5", "chapterName": "A5 公有土地", "text": "依土地法第53條規定，因地籍整理而發現之公有土地，下列敘述何者正確？", "options": ["視為無主土地", "應辦理囑託登記", "地政機關逕為登記", "登記時所有權人欄註明為縣（市）有"], "answer": 2}, {"id": 393, "year": "109", "num": 24, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "關於不動產共有關係，依土地法第34條之1規定，下列敘述何者正確？", "options": ["甲、乙、丙共有一筆土地，其應有部分各三分之一，該地之應有部分出賣時，地上權人、典權 人或房屋承租人有依同樣條件優先購買之權", "土地共有人欲出租共有土地於他人時，得以共有人過半數及其應有部分合計過半數之同意行之", "區分所有建物之專有部分連同其基地應有部分之所有權一併移轉與同一人所有者，應適用土地 法第 34 條之 1 第 4 項規定", "依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，任何共有人得申請該管直 轄市、縣（市）地政機關調處。不服調處者，應於接到調處通知後十五日內，向司法機關訴請 處理，屆期不起訴者，依原調處結果辦理之"], "answer": 3}, {"id": 394, "year": "109", "num": 25, "chapter": "B3", "chapterName": "B3 國土計畫法", "text": "依國土計畫法規定，縣（市）主管機關應於縣（市）國土計畫公告實施後幾年內，依中央主管機關指定之日期，公告國土功能分區圖？", "options": ["一", "二", "三", "四"], "answer": 3}, {"id": 395, "year": "110", "num": 1, "chapter": "A1", "chapterName": "A1 總則", "text": "依土地法規定，外國人投資有助於國內重大建設、整體經濟或農牧經營而需要取得土地時，應先經下列何者程序？", "options": ["中央地政機關備查", "中央目的事業主管機關同意", "該直轄市或縣（市）民意機關同意", "該直轄市或縣（市）政府層請行政院同意"], "answer": 1}, {"id": 396, "year": "110", "num": 2, "chapter": "A2", "chapterName": "A2 土地登記", "text": "有關重新實施地籍測量時，依土地法規定，下列敘述何者正確？", "options": ["土地所有權人發生界址爭議時，應由該管直轄市或縣（市）地政機關予以調處", "土地所有權人不服界址爭議調處者，應於接到調處通知後三十日內，向司法機關訴請處理", "土地所有權人認為測量結果有錯誤時，得於重測結果公告期滿三十日內聲請複丈", "重測結果未經聲請複丈者，地政機關應即據以辦理土地更正登記"], "answer": 0}, {"id": 397, "year": "110", "num": 3, "chapter": "A5", "chapterName": "A5 公有土地", "text": "依土地法之規定，無保管或使用機關之公有土地及因地籍整理而發現之公有土地，應如何處理？", "options": ["由該管直轄市或縣（市）地政機關囑託登記，其所有權人欄註明為國有", "由該管直轄市或縣（市）地政機關逕為登記，其所有權人欄註明為國有", "由該管直轄市或縣（市）地政機關囑託登記，其所有權人欄註明為直轄市或縣（市）有", "由該管直轄市或縣（市）地政機關逕為登記，其所有權人欄註明為直轄市或縣（市）有"], "answer": 1}, {"id": 398, "year": "110", "num": 4, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法規定，聲請為土地權利變更登記，應繳納登記費，下列敘述何者正確？", "options": ["由權利人與義務人雙方共同按公告地價或權利價值千分之一繳納登記費", "由權利人按公告現值或權利價值千分之二繳納登記費", "由權利人按申報地價或權利價值千分之一繳納登記費", "由義務人按公告現值或權利價值千分之二繳納登記費"], "answer": 2}, {"id": 399, "year": "110", "num": 5, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法規定，房屋租用相關規定，下列何者錯誤？", "options": ["城市地方房屋之租金，以不超過土地及其建築物申報總價年息百分之十為限", "約定房屋租金，超過土地法規定者，該管直轄市或縣（市）政府得依土地法所定標準強制減定之", "房屋租金擔保之金額，不得超過二個月房屋租金之總額", "以現金為租賃之擔保者，其現金視為租金之一部"], "answer": 3}, {"id": 400, "year": "110", "num": 6, "chapter": "I1", "chapterName": "I1 耕地三七五減租", "text": "依土地法之規定，遇有荒歉，直轄市或縣（市）政府得按照當地當年收穫實況為減租或免租之決定。但應經何機關同意？", "options": ["行政院", "財政部", "民意機關", "農業發展委員會"], "answer": 2}, {"id": 401, "year": "110", "num": 7, "chapter": "E1", "chapterName": "E1 地價稅", "text": "依平均地權條例規定，應納地價稅額因公告地價調整致納稅義務人繳納困難者，得於規定繳納期間內，向稅捐稽徵機關申請延期繳納，延期繳納期間最長不得逾多久？", "options": ["3 個月", "6 個月", "1年", "3年"], "answer": 1}, {"id": 402, "year": "110", "num": 8, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "平均地權條例第35條之1規定，私人捐贈予財團法人供興辦社會福利事業使用之土地，免徵土地增值稅；但有三種情形之一者，除追補應納之土地增值稅外，並處應納土地增值稅額二倍之罰鍰。下列何者不是規範中的情形？", "options": ["未辦理用地變更者", "未按捐贈目的使用土地者", "違反各該事業設立宗旨者", "土地收益未全部用於各該事業者"], "answer": 0}, {"id": 403, "year": "110", "num": 9, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "有關平均地權條例對違反申報登錄之規定中，直轄市、縣（市）主管機關應先令其限期改正，屆期未改正者，處新臺幣六千元以上三萬元以下罰鍰，並令其限期改正；屆期未改正者，按次處罰的情形係指下列何種狀況？", "options": ["申報登錄價格資訊不實", "申報登錄價格以外資訊不實", "未依限申報登錄資訊、申報登錄價格或交易面積資訊不實", "金融機構、權利人、義務人、地政士或不動產經紀業規避、妨礙或拒絕查核"], "answer": 1}, {"id": 404, "year": "110", "num": 10, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例規定，預售屋買受人將已付定金，確立買賣標的物及價金等事項之書面契據，轉售予第三人時，由直轄市、縣（市）主管機關按戶（棟）處罰新臺幣多少元？", "options": ["三萬元以上十五萬元以下罰鍰", "六萬元以上三十萬元以下罰鍰", "十五萬元以上一百萬元以下罰鍰", "三十萬元以上一百萬元以下罰鍰"], "answer": 2}, {"id": 405, "year": "110", "num": 11, "chapter": "A1", "chapterName": "A1 總則", "text": "下列有關平均地權條例對以經營土地買賣，違背土地法律，從事土地壟斷、投機者處罰規定之敘述，何者正確？", "options": ["處一年以下有期徒刑，並得併科五千元以下罰金", "處三年以下有期徒刑，並得併科七千元以下罰金", "處一年以下有期徒刑，並得併科八千元以下罰金", "處三年以下有期徒刑，並得併科一萬元以下罰金"], "answer": 1}, {"id": 406, "year": "110", "num": 12, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "拒絕受領之徵收補償費，依土地徵收條例規定存入專戶保管，並通知應受補償人。自通知送達發生效力之日起，最長逾幾年未領取之補償費，歸屬國庫？", "options": ["5年", "10 年", "15 年", "20 年"], "answer": 2}, {"id": 407, "year": "110", "num": 13, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "依土地徵收條例規定，建築改良物之補償費，按徵收當時該建築改良物之下列何種價格估定之？", "options": ["市價", "重置價格", "重建價格", "房屋評定現值"], "answer": 2}, {"id": 408, "year": "110", "num": 14, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法規定，未辦理繼承登記之土地經列冊管理達多久後，逾期仍未聲請登記者，該土地應如何處理？", "options": ["列冊管理期間為 15 年，由財務部國有財產署公開標售", "列冊管理期間為 15 年，由地政機關公開標售", "列冊管理期間為 20 年，由法院公開拍賣", "列冊管理期間為 20 年，逕登記為國有土地"], "answer": 0}, {"id": 409, "year": "110", "num": 15, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "土地權利關係人依都市計畫法第24條規定自行擬定或變更細部計畫時，主管機關得要求土地權利關係人提供或捐贈都市計畫變更範圍內之那些回饋項目予當地直轄市、縣（市）政府或鄉、鎮、縣轄市公所？①公共設施用地②可建築土地③樓地板面積④一定金額", "options": ["僅①④", "僅①②③", "僅②③④", "①②③④"], "answer": 3}, {"id": 410, "year": "110", "num": 16, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "私有公共設施保留地得申請與公有非公用土地辦理交換，依都市計畫法之規定，不受下列那些法規相關規定之限制？①土地法②所得稅法③國有財產法④各級政府財產管理法令", "options": ["②④", "②③④", "①③④", "①②③④"], "answer": 2}, {"id": 411, "year": "110", "num": 17, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "非都市土地經劃定使用分區並編定使用地類別，應依其容許使用之項目及許可使用細目使用。但中央目的事業主管機關認定為重大建設計畫所需之臨時性設施，經徵得使用地之中央主管機關及有關機關同意後，得核准為臨時使用。中央目的事業主管機關於核准時，應函請直轄市或縣（市）政府將臨時使用用途及期限等資料，依相關規定程序登錄於何處？", "options": ["土地登記謄本", "土地參考資訊檔", "土地使用分區證明", "非都市土地許可使用書"], "answer": 1}, {"id": 412, "year": "110", "num": 18, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "依非都市土地使用管制規則規定，土地使用編定後，其原有使用或原有建築物不合土地使用分區規定者，其使用限制，下列敘述何者錯誤？", "options": ["在政府令其變更使用或拆除建築物前，得為從來之使用", "原有建築物除准修繕和增建外，不得改建", "若該土地或建築物，對公眾安全、衛生及福利有重大妨礙者，該管直轄市或縣（市）政府應限 期令其變更或停止使用、遷移、拆除或改建", "政府令其變更或停止使用，所受損害應予適當補償"], "answer": 1}, {"id": 413, "year": "110", "num": 19, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "依土地稅法規定，土地所有權人第一次出售其自用住宅用地，其適用自用住宅用地特別稅率之要件，下列敘述何者正確？①都市土地面積未超過三公畝部分和非都市土地面積未超過七公畝部分②其土地增值稅統就該部分之土地漲價總數額按百分之十徵收之③需土地於出售前5年內，不曾供營業使用或出租者④土地所有權人與其配偶及未成年直系親屬需於該地辦竣戶籍登記", "options": ["②", "①②", "①②④", "③④"], "answer": 0}, {"id": 414, "year": "110", "num": 20, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "依土地稅法免徵土地增值稅之土地，主管稽徵機關依相關規定核定其移轉現值並發給免稅證明，以憑辦理土地所有權移轉登記，下列有關移轉現值核定之敘述何者正確？", "options": ["各級政府出售之公有土地，以實際出售價額為準", "各級政府贈與或受贈之土地，以土地點交日之公告土地現值為準", "區段徵收抵價地，以區段徵收時實際測量及登記完竣之地價為準", "私人捐贈供興辦社會福利事業之土地，以社會福利事業核准日之公告土地現值為準"], "answer": 0}, {"id": 415, "year": "110", "num": 21, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "平均地權條例第74條規定，依第26條規定限期建築之土地，有下列三種情形之一者，土地所有權人應於接到限期使用通知後，與承租人、借用人或地上權人協議建築、增建或改建；協議不成時，得終止租約、借貸或撤銷地上權。下列何者是規範中的情形？", "options": ["土地所有權人將其土地出租、貸與或設有地上權者", "土地所有權人將其土地設定典權或設定不動產役權者", "土地所有權人將其所有之農作改良物出租或貸與他人使用者", "土地承典人或地役權人將其所有建築改良物出租或貸與他人使用者"], "answer": 0}, {"id": 416, "year": "110", "num": 22, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例規定，以不動產為信託財產，受託人乙依信託本旨移轉信託財產與委託人甲以外之歸屬權利人丙時，應由何人估價立契，在規定之期限申報契稅？又其契稅稅率為何？", "options": ["由乙申報契稅，稅率為 6%", "由乙申報契稅，稅率為 2%", "由丙申報契稅，稅率為 6%", "由甲申報契稅，稅率為 2%"], "answer": 2}, {"id": 417, "year": "110", "num": 23, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "有關中華民國境內居住之個人，依所得稅法規定計算之房屋、土地交易所得，減除當次交易依土地稅法第30條第1項規定公告土地現值計算之土地漲價總數額後之餘額，不併計綜合所得總額，其稅率計算下列何者正確？", "options": ["持有房屋、土地之期間在三年以內者，稅率為百分之四十五", "持有房屋、土地之期間超過三年，未逾五年者，稅率為百分之三十五", "持有房屋、土地之期間超過五年，未逾十年者，稅率為百分之三十", "持有房屋、土地之期間超過十年者，稅率為百分之十五"], "answer": 3}, {"id": 418, "year": "110", "num": 24, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "依所得稅法規定，個人出售自住房屋、土地，依規定繳納之稅額，申請房地合一所得稅重購退稅之敘述，下列何者錯誤？", "options": ["需自完成移轉登記之日起算二年內，重購自住房屋、土地者", "得於重購自住房屋、土地完成移轉登記次日起算二年內，申請退稅", "申請按重購價額占出售價額之比率，自所繳納稅額計算退還", "重購之自住房屋、土地，於重購後五年內改作其他用途或再行移轉時，應追繳原退還稅額"], "answer": 1}, {"id": 419, "year": "110", "num": 25, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "依所得稅法規定，陳先生在110年10月以900萬元出售其於107年以700萬元購入之房地產，110年當期土地之公告現值為800萬元，陳先生個人未提示因取得、改良及移轉而支付之費用時，稽徵機關得以多少元計算其費用？", "options": ["24 萬元", "27 萬元", "30 萬元", "45 萬元"], "answer": 1}, {"id": 420, "year": "111", "num": 1, "chapter": "A2", "chapterName": "A2 土地登記", "text": "下列有關未辦繼承登記不動產處理方式之敘述，何者正確？", "options": ["未辦繼承登記不動產，於繼承開始之日起逾六個月未辦理繼承登記者，該管直轄市或縣市地政 機關於查明後，應即公告繼承人於一個月內聲請登記", "未辦繼承登記不動產，由該管直轄市或縣市地政機關列冊管理期間為十年", "未辦繼承登記不動產，逾期仍未辦繼承而由該管直轄市或縣市地政機關公開標售時，土地或建 築改良物租賃期間未超過五年者，於標售後以五年為限", "逾期未辦繼承登記不動產於經公開標售之價款儲存設立在國庫專戶時，繼承人得依其法定應繼 分申請領取"], "answer": 3}, {"id": 421, "year": "111", "num": 2, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "下列有關共有不動產處分等之敘述，何者錯誤？", "options": ["共有土地或建築改良物的處分、變更及設定地上權、農育權、不動產役權或典權，應有共有人 過半數及其應有部分合計過半數之同意", "共有土地或建築改良物的處分、變更或設定負擔，共有人應事先以書面通知他共有人；如不能 以書面通知時，應依法公示催告之", "共有人對共有土地或建築改良物的處分、變更及設定地上權、農育權、不動產役權或典權，對 於他共有人應得之對價或補償，負連帶清償責任", "甲乙丙公同共有一筆土地，甲依法得出賣該共有土地時，乙丙得以同一價格單獨優先承購"], "answer": 1}, {"id": 422, "year": "111", "num": 3, "chapter": "C1", "chapterName": "C1 規定地價", "text": "依土地稅法規定，土地所有權人辦理土地移轉繳納土地增值稅時，在其持有土地期間內，因重新規定地價增繳之地價稅，准予抵繳其應納之土地增值稅之總額，以不超過土地移轉時應繳增值稅總額多少為限？", "options": ["百分之一", "百分之二", "百分之三", "百分之五"], "answer": 3}, {"id": 423, "year": "111", "num": 4, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例之規定，下列有關房屋稅納稅義務人之敘述，何者錯誤？", "options": ["原則上向房屋所有人徵收之", "未辦建物所有權第一次登記且所有人不明之房屋，向使用執照所載起造人徵收之", "未辦建物所有權第一次登記且所有人不明之房屋，無使用執照者，向建造執照所載起造人徵收之", "未辦建物所有權第一次登記且所有人不明之房屋，無使用執照、亦無建造執照者，暫不徵收之"], "answer": 3}, {"id": 424, "year": "111", "num": 5, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例之規定，下列敘述何者錯誤？", "options": ["買賣契稅，應由出賣人申報納稅", "典權契稅，應由典權人申報納稅", "買賣契稅之稅率為其契價百分之六", "分割契稅之稅率為其契價百分之二"], "answer": 0}, {"id": 425, "year": "111", "num": 6, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例之規定，以不動產為信託財產時，在信託關係人間移轉所有權時，何種情形須課徵契稅？", "options": ["因信託行為成立，委託人與受託人間", "信託契約明定信託財產之歸屬人為第三人者，信託關係消滅時，委託人與歸屬人間", "因信託行為不成立，委託人與受託人間", "信託關係存續中受託人變更時，原受託人與新受託人間"], "answer": 1}, {"id": 426, "year": "111", "num": 7, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例之規定，下列何種契約的契稅稅率最低？", "options": ["買賣契約", "典權契約", "分割契約", "贈與契約"], "answer": 2}, {"id": 427, "year": "111", "num": 8, "chapter": "B1", "chapterName": "B1 區域計畫法", "text": "依規定，非都市土地甲種建築用地之建蔽率為百分之六十，容積率為百分之二百四十。倘甲有1筆100坪的甲種建築用地想規劃蓋1棟豪宅自住，請問甲的房屋每層樓最大建坪有幾坪？可蓋幾層樓高？", "options": ["最大建坪 60 坪，4 層樓高", "最大建坪 60 坪，5 層樓高", "最大建坪 100 坪，2 層樓高", "最大建坪 100 坪，3 層樓高"], "answer": 0}, {"id": 428, "year": "111", "num": 9, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "依都市計畫法指定供公用事業設施使用之公共設施保留地，應由各該事業機構依法徵收或購買；其餘由公用事業設施所屬政府或鄉、鎮、縣轄市公所依何種方式取得？", "options": ["徵收、區段徵收、市地重劃", "協議價購、公私土地交換、都市更新", "都市更新、市地重劃、區段徵收", "徵收、協議價購、公私土地交換"], "answer": 0}, {"id": 429, "year": "111", "num": 10, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "下列何類徵收事業之需用土地人在補償費未發給完竣前，或未核定發給抵價地前，因公共安全急需，得先進入被徵收土地內工作？", "options": ["國防事業、平價住宅事業、水利事業", "交通事業、水利事業、社會福利事業", "高齡化事業、少子化事業、防疫事業", "國防事業、交通事業、水利事業"], "answer": 3}, {"id": 430, "year": "111", "num": 11, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "依土地徵收條例之規定，下列敘述何者正確？", "options": ["撤銷或廢止徵收者，徵收前原設定之他項權利及耕地租約得予回復", "撤銷或廢止徵收者，如原土地所有權人及他項權利人申請於發給之抵價地上設定抵押權或典權 時，其原抵押權或典權不予回復", "撤銷或廢止徵收，由需用土地人向中央主管機關申請之", "撤銷或廢止徵收，由該管直轄市或縣（市）主管機關單獨向中央主管機關申請之"], "answer": 2}, {"id": 431, "year": "111", "num": 12, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "都市計畫地區於訂定分區發展優先次序後，第一期發展地區應於主要計畫發布實施後，多久期限完成細部計畫？並於細部計畫發布後，多久期限完成公共設施建設？", "options": ["五年內完成細部計畫，細部計畫發布後二年內完成公共設施建設", "四年內完成細部計畫，細部計畫發布後三年內完成公共設施建設", "三年內完成細部計畫，細部計畫發布後四年內完成公共設施建設", "二年內完成細部計畫，細部計畫發布後五年內完成公共設施建設"], "answer": 3}, {"id": 432, "year": "111", "num": 13, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依土地法第34條之1規定，共有土地之處分、變更，下列何比例之同意，方得行之？", "options": ["共有人三分之一及其應有部分合計過二分之一之同意", "共有人二分之一及其應有部分合計過三分之一之同意", "共有人合計逾三分之二之同意", "應有部分合計逾三分之二之同意"], "answer": 3}, {"id": 433, "year": "111", "num": 14, "chapter": "A1", "chapterName": "A1 總則", "text": "依土地法第17條規定，下列何項土地得租賃於外國人？", "options": ["林地", "牧地", "漁地", "鹽地"], "answer": 1}, {"id": 434, "year": "111", "num": 15, "chapter": "A1", "chapterName": "A1 總則", "text": "依土地法規定，私有土地所有權之移轉或租賃，妨害基本國策者，下列何者得報請行政院制止之？", "options": ["監察院", "國有財產署", "中央地政機關", "不動產經紀人員獎懲委員會"], "answer": 2}, {"id": 435, "year": "111", "num": 16, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法規定，租用建築房屋之基地，發生下列何種情形時，出租人不得收回？", "options": ["承租人以基地供違反法令之使用時", "承租人轉租基地於他人時", "承租人積欠租金額，除以擔保現金抵償外，達二個月以上時", "承租人違反租賃契約時"], "answer": 2}, {"id": 436, "year": "111", "num": 17, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "依土地徵收條例規定，區段徵收範圍內土地，經規劃整理後，有關其處理方式，下列敘述何者錯誤？", "options": ["抵價地發交被徵收土地所有權人領回", "國民住宅用地得以讓售", "安置原住戶所需土地得以讓售", "可供建築土地依規定標租時，其期限不得逾二十五年"], "answer": 3}, {"id": 437, "year": "111", "num": 19, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "依土地徵收條例規定，已公告徵收之土地，因作業錯誤，致原徵收之土地不在工程用地範圍內者，應如何處理？", "options": ["應辦理廢止徵收", "應辦理撤銷徵收", "應辦理徵收收回", "應辦理徵收失效"], "answer": 1}, {"id": 438, "year": "111", "num": 20, "chapter": "A2", "chapterName": "A2 土地登記", "text": "聲請為土地權利變更登記之案件，在登記尚未完畢前，登記機關接獲法院為何種囑託登記時，應即改辦之？", "options": ["查封登記、預告登記", "假處分登記、滅失登記", "假扣押登記、破產登記", "輔助宣告登記、監護宣告登記"], "answer": 2}, {"id": 439, "year": "111", "num": 21, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "徵收土地或土地改良物應發給之補償費，需用土地人應於公告期滿後十五日內將補償費繳交該管直轄市或縣（市）主管機關發給完竣，逾期者該部分土地或土地改良物之法律效力為何？", "options": ["仍具徵收效力", "徵收從此失其效力", "被徵收之所有權人得申請撤銷徵收", "需用土地人得申請保留徵收"], "answer": 1}, {"id": 440, "year": "111", "num": 22, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "依平均地權條例規定，土地所有權移轉或設定典權時，有關申報移轉現值之審核標準，下列敘述何者正確？", "options": ["遺贈之土地，以遺贈人簽立遺囑當期之公告土地現值為準", "申報人逾訂定契約之日起三十日始申報者，以訂約日當期之公告土地現值為準", "依法院判決移轉登記者，以法院終局判決日當期之公告土地現值為準", "經法院拍賣之土地，以拍定日當期之公告土地現值為準"], "answer": 3}, {"id": 441, "year": "111", "num": 23, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "依平均地權條例規定，實施市地重劃時，重劃區內供公共使用之道路等十項用地，應優先以下列何種土地抵充？", "options": ["原廣場、綠地、停車場、零售市場地", "原公有道路、溝渠、河川及未登記地", "原兒童遊樂場、鄰里公園、國民小學、國民中學地", "原國有地、學產地、直轄市縣（市）有地、鄉鎮（市）有地"], "answer": 1}, {"id": 442, "year": "111", "num": 24, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "下列何者不屬於平均地權條例獎勵土地所有權人自行辦理市地重劃事業之獎勵事項？", "options": ["優先興建重劃區之公共設施", "免收或減收換發權利書狀費用", "免徵或減徵地價稅與田賦", "給予免息之重劃貸款"], "answer": 3}, {"id": 443, "year": "111", "num": 25, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例規定，下列銷售預售屋者相關規定之敘述，何者錯誤？", "options": ["應於銷售前將預售屋買賣定型化契約，報請預售屋坐落基地所在之直轄市、縣（市）主管機關 備查", "原則上應於簽訂買賣契約書之日起三十日內，向直轄市、縣（市）主管機關申報登錄資訊", "向買受人收受定金，應以書面契據確立買賣價金等事項，並不得約定不利於買受人之事項", "向買受人收受定金所訂立之書面契據，得轉售予第三人"], "answer": 3}, {"id": 444, "year": "112", "num": 1, "chapter": "E1", "chapterName": "E1 地價稅", "text": "都市計畫公共設施保留地，未作任何使用並與使用中之土地隔離者，其地價稅之計徵，下列何者正確？", "options": ["免徵", "按千分之六稅率計徵", "按千分之十稅率計徵", "按千分之二稅率計徵"], "answer": 0}, {"id": 445, "year": "112", "num": 2, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "關於土地所有權人出售自用住宅用地時，土地增值稅適用「一生一次」之優惠稅率，下列何者正確？", "options": ["土地增值稅之優惠稅率為千分之二", "僅限於都市土地面積未超過三公畝部分或非都市土地面積未超過七公畝部分", "土地於出售前一年內，曾供營業使用或出租", "出售前應持有該土地三年以上"], "answer": 1}, {"id": 446, "year": "112", "num": 3, "chapter": "C1", "chapterName": "C1 規定地價", "text": "依土地稅法規定，已規定地價之土地設定典權時之預繳土地增值稅，下列何者正確？", "options": ["典權人回贖時，原繳之土地增值稅，應加計利息退還", "典權人回贖時，原繳之土地增值稅，應無息退還", "出典人回贖時，原繳之土地增值稅，應加計利息退還", "出典人回贖時，原繳之土地增值稅，應無息退還"], "answer": 3}, {"id": 447, "year": "112", "num": 4, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "土地所有權經法院判決移轉登記者，土地增值稅申報移轉現值之審核標準，下列何者正確？", "options": ["以法院判決日當期之公告土地現值為準", "以申報人向法院起訴日當期之公告土地現值為準", "以法院判決送達日當期之公告土地現值為準", "以申報人向主管稽徵機關申報日當期之公告土地現值為準"], "answer": 1}, {"id": 448, "year": "112", "num": 5, "chapter": "E1", "chapterName": "E1 地價稅", "text": "依土地稅法規定，地價稅之稅率，下列何者錯誤？", "options": ["地價稅之基本稅率為千分之十", "土地所有權人之地價總額未超過土地所在地直轄市或縣（市）累進起點地價者，其地價稅按千 分之十稅率徵收", "土地所有權人之地價總額超過土地所在地直轄市或縣（市）累進起點地價五倍者，就其超過部 分課徵千分之十五", "土地所有權人之地價總額超過土地所在地直轄市或縣（市）累進起點地價十五倍至二十倍者， 就其超過部分課徵千分之四十五"], "answer": 2}, {"id": 449, "year": "112", "num": 6, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依土地法規定，關於共有土地之處分，下列何者正確？", "options": ["應以共有人半數及其應有部分半數之同意行之", "應有部分合計三分之二者，其人數不予計算", "共有人不能以書面通知他共有人者，應公告之", "共有人不得單獨處分其應有部分"], "answer": 2}, {"id": 450, "year": "112", "num": 7, "chapter": "A2", "chapterName": "A2 土地登記", "text": "有關土地總登記，經聲請而逾限未補繳證明文件者之情形，下列何者錯誤？", "options": ["其土地視為無主土地", "由該管直轄市或縣（市）地政機關公告之", "公告期間不得少於十五日", "公告期滿，無人提出異議，即為國有土地之登記"], "answer": 2}, {"id": 451, "year": "112", "num": 8, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法規定，有關繼承登記，下列何者正確？", "options": ["繼承登記應於繼承開始之日起一個月內為之，否則視為逾期登記", "繼承開始之日起逾三個月未辦理繼承登記者，經該管直轄市或縣市地政機關查明後，應即公告 繼承人於一年內聲請登記", "逾期未聲請繼承登記之土地，經地政機關列冊管理十五年，逾期仍未聲請繼承登記者，由地政 機關將該土地清冊移請財政部國有財產署公開標售", "標售逾期未辦繼承登記土地所得之價款，逾十五年無繼承人申請提領該價款者始得歸屬國庫"], "answer": 2}, {"id": 452, "year": "112", "num": 9, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例之規定，預售屋或新建成屋買賣契約之買受人，於簽訂買賣契約後，不得讓與或轉售買賣契約與第三人，並不得自行或委託刊登讓與或轉售廣告，但於下列何種情形不在此限？", "options": ["配偶、直系血親或二親等內旁系血親間之讓與或轉售", "配偶、直系姻親或二親等內旁系姻親間之讓與或轉售", "配偶、直系姻親或二親等內旁系血親間之讓與或轉售", "配偶、直系血親或二親等內旁系姻親間之讓與或轉售"], "answer": 0}, {"id": 453, "year": "112", "num": 10, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例之規定，委託不動產經紀業代銷預售屋者，應於何時向直轄市、縣（市）主管機關申報登錄資訊？", "options": ["應於簽訂買賣契約之日起至少十日內申報", "應於簽訂買賣契約之日起至少十五日內申報", "應於簽訂買賣契約之日起三十日內申報", "應於簽訂買賣契約之日起四十五日內申報"], "answer": 2}, {"id": 454, "year": "112", "num": 11, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "依市地重劃實施辦法之規定，土地所有權人重劃後應分配土地面積已達重劃區最小分配面積標準二分之一，經主管機關按最小分配面積標準分配後，如申請放棄分配土地而改領現金補償，下列何者正確？", "options": ["以其重劃前原有面積按原位置評定重劃後地價發給現金補償", "以其重劃前原有面積按原位置評定重劃前地價發給現金補償", "以其應分配權利面積，按重劃後分配位置之評定重劃後地價予以計算補償", "以其應分配權利面積，按重劃後分配位置之評定重劃前地價予以計算補償"], "answer": 2}, {"id": 455, "year": "112", "num": 12, "chapter": "G1", "chapterName": "G1 契稅", "text": "以下關於契稅之敘述，何者正確？", "options": ["買賣契稅應由出賣人申報納稅", "贈與契稅應由贈與人估價立契，申報納稅", "典權契稅，應由典權人申報納稅", "占有契稅稅率為其契價百分之二"], "answer": 2}, {"id": 456, "year": "112", "num": 13, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "依土地徵收條例規定，因受領遲延、拒絕受領或不能受領之補償費，下列何者正確？", "options": ["依提存法提存於直轄市或縣（市）主管機關於國庫設立之土地徵收補償費保管專戶", "直轄市或縣（市）主管機關應於補償費發給期限屆滿之日起三個月內存入專戶保管", "保管專戶儲存之補償費應給付利息", "已依規定繳存專戶保管之徵收補償費，自徵收公告期滿之日起，逾十五年未領取者，歸屬國庫"], "answer": 2}, {"id": 457, "year": "112", "num": 14, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "已公告徵收之土地，依徵收計畫開始使用前，興辦之事業改變時，依土地徵收條例之規定，下列何者正確？", "options": ["應撤銷徵收", "應廢止徵收", "土地所有權人得行使收回權", "應舉行聽證"], "answer": 1}, {"id": 458, "year": "112", "num": 15, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地登記規則之規定，於何種情形下登記機關應以書面敘明理由或法令依據，通知申請人於接到通知書之日起十五日內補正，下列何者錯誤？", "options": ["申請人之資格不符或其代理人之代理權有欠缺", "登記申請書不合程式，或應提出之文件不符或欠缺", "未依規定繳納登記規費", "登記之權利人、義務人或其與申請登記之法律關係有關之權利關係人間有爭執"], "answer": 3}, {"id": 459, "year": "112", "num": 16, "chapter": "A1", "chapterName": "A1 總則", "text": "我國物權係採法定主義，於土地所有權以外之其他不動產物權，謂之他項權利，依民法及土地法之規定，下列何者非屬物權？", "options": ["抵押權", "農育權", "耕作權", "租賃權"], "answer": 3}, {"id": 460, "year": "112", "num": 17, "chapter": "A1", "chapterName": "A1 總則", "text": "依土地法之規定，外國人為供自用、投資或公益之目的使用，得取得所需之土地，其面積及所在地點，應受該管直轄市或縣（市）政府依法所定之限制，下列何種用途不屬之？", "options": ["長照機構", "住宅", "醫院", "營業處所、辦公場所、商店及工廠"], "answer": 0}, {"id": 461, "year": "112", "num": 18, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依土地法第三十四條之一執行要點規定，有關共有人權利之行使，下列何者錯誤？", "options": ["部分共有人就共有土地或建築改良物為處分、變更及設定地上權、農育權、不動產役權或典權， 應就共有物之全部為之", "部分共有人依本法條規定為處分、變更或設定負擔前，應先行通知他共有人", "出賣共有土地或建築改良物時，他共有人得以出賣之同一條件共同或單獨優先購買", "他共有人於接到出賣通知後二十日內不表示者，其優先購買權視為放棄"], "answer": 3}, {"id": 462, "year": "112", "num": 19, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法規定，有關地籍測量之相關規定，下列何者錯誤？", "options": ["地籍測量時，土地所有權人應設立界標，並永久保存之", "地籍測量，如由該管直轄市或縣（市）政府辦理，其實施計畫應經該地方之地政機關核定", "重新實施地籍測量時，土地所有權人應於地政機關通知之限期內，自行設立界標，並到場指界", "重新實施地籍測量之結果，應予公告，其期間為三十日"], "answer": 1}, {"id": 463, "year": "112", "num": 20, "chapter": "A2", "chapterName": "A2 土地登記", "text": "依土地法之規定，有關土地登記之損害賠償，下列何者錯誤？", "options": ["因登記錯誤遺漏或虛偽致受損害者，由該地政機關負損害賠償責任", "登記人員或利害關係人，於登記完畢後，發見登記錯誤或遺漏時，非以書面聲請該管上級機關 查明核准後，不得更正", "地政機關所負之損害賠償，如因登記人員之重大過失所致者，由該人員及地政機關負連帶損害 賠償責任，撥歸登記儲金", "損害賠償之請求，如經該地政機關拒絕，受損害人得向司法機關起訴"], "answer": 2}, {"id": 464, "year": "112", "num": 21, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "依平均地權條例規定，對私有空地之處置，下列何者錯誤？", "options": ["規定照價收買者，以收買當期之平均市價為準", "逾期未建築、增建、改建或重建者，按該宗土地應納地價稅基本稅額加徵二倍至五倍之空地稅 或照價收買", "依規定限期建築、增建、改建或重建之土地，其新建之改良物價值不及所占基地申報地價百分 之五十者，直轄市或縣（市）政府不予核發建築執照", "直轄市或縣（市）政府對於私有空地，得視建設發展情形，分別劃定區域，限期建築、增建、 改建或重建"], "answer": 0}, {"id": 465, "year": "112", "num": 22, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法之規定，市鎮計畫之主要計畫書，除用文字、圖表說明外，應附主要計畫圖，其比例尺不得小於多少？", "options": ["五百分之一", "一千分之一", "一萬分之一", "一萬五千分之一"], "answer": 2}, {"id": 466, "year": "112", "num": 23, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "依所得稅法之規定，個人依第14條之4前2項規定計算之房屋、土地交易所得，減除當次交易依土地稅法第30條第1項規定公告土地現值計算之土地漲價總數額後之餘額，不併計綜合所得總額，按相關規定稅率計算應納稅額，其在中華民國境內居住之個人應納稅額，下列何者正確？", "options": ["持有房屋、土地之期間在二年以內者，稅率為百分之三十五", "持有房屋、土地之期間超過二年，未逾五年者，稅率為百分之二十五", "因財政部公告之調職、非自願離職或其他非自願性因素，交易持有期間在五年以下之房屋、土 地者，稅率為百分之二十", "個人以自有土地與營利事業合作興建房屋，自土地取得之日起算五年內完成並銷售該房屋、土 地者，稅率為百分之二十五"], "answer": 2}, {"id": 467, "year": "112", "num": 24, "chapter": "E1", "chapterName": "E1 地價稅", "text": "依土地稅法之規定，主管稽徵機關得指定土地使用人負責代繳其使用部分之地價稅或田賦，下列何項非屬所規範者？", "options": ["土地進行訴訟者", "權屬不明者", "納稅義務人行蹤不明者", "土地所有權人申請由占有人代繳者"], "answer": 0}, {"id": 468, "year": "112", "num": 25, "chapter": "B3", "chapterName": "B3 國土計畫法", "text": "有關土地利用計畫之通盤檢討相關規定，下列何者正確？", "options": ["全國國土計畫每五年通盤檢討一次", "直轄市、縣（市）國土計畫每十年通盤檢討一次", "都市計畫每三年內或五年內至少應通盤檢討一次", "區域計畫每十年通盤檢討一次"], "answer": 2}, {"id": 469, "year": "113", "num": 1, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例規定，預售屋或新建成屋買賣契約之買受人，於簽訂買賣契約後，不得讓與或轉售買賣契約與第三人，但經其他中央主管機關公告得讓與或轉售之情形並經直轄市、縣（市）主管機關核准者，不在此限。買受人據此得讓與或轉售之戶（棟）數為何？", "options": ["全國每一年以一戶（棟）為限", "全國每一年以二戶（棟）為限", "全國每二年以一戶（棟）為限", "全國每二年以三戶（棟）為限"], "answer": 2}, {"id": 470, "year": "113", "num": 2, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例規定，權利人及義務人應於買賣案件申請所有權移轉登記時，申報登錄資訊，未共同申報登錄資訊者，直轄市、縣（市）主管機關應令其限期申報登錄資訊；屆期未申報登錄資訊，買賣案件已辦竣所有權移轉登記者，處多少罰鍰，並令其限期改正？", "options": ["新臺幣三萬元以上十五萬元以下罰鍰", "新臺幣六萬元以上三十萬元以下罰鍰", "新臺幣十五萬元以上五十萬元以下罰鍰", "新臺幣三十萬元以上一百萬元以下罰鍰"], "answer": 0}, {"id": 471, "year": "113", "num": 3, "chapter": "C4", "chapterName": "C4 申報登錄預售屋", "text": "依平均地權條例規定，有關私法人買受供住宅使用之房屋，下列何者正確？", "options": ["應檢具切結書，經中央主管機關許可", "中央主管機關審核其使用計畫，以合議制方式辦理", "私法人取得之房屋，於登記完畢後十年內不得辦理預告登記", "許可之文件有效期限為二年"], "answer": 1}, {"id": 472, "year": "113", "num": 4, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法規定，有關主要計畫之核定，下列何者正確？", "options": ["鎮及鄉街之主要計畫由內政部核定", "直轄市之主要計畫由行政院核定", "特定區計畫由縣（市）政府擬定者，由內政部核定，轉報行政院備案", "特定區計畫由內政部訂定者，由行政院核定"], "answer": 0}, {"id": 473, "year": "113", "num": 5, "chapter": "D4", "chapterName": "D4 撤銷廢止徵收", "text": "依土地徵收條例規定，有關徵收之撤銷或廢止之敘述，下列何者錯誤？", "options": ["撤銷或廢止徵收，由需用土地人向中央主管機關申請之", "在未依徵收計畫完成使用前，需用土地人應每年檢討其興辦事業計畫，並由該管直轄市或縣 （市）政府列管", "依徵收計畫開始使用前，開發方式改變，應廢止徵收", "因作業錯誤，致原徵收之土地不在工程用地範圍內，應撤銷徵收"], "answer": 1}, {"id": 474, "year": "113", "num": 6, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "依土地徵收條例規定，有關徵收補償費，下列何者正確？", "options": ["在都市計畫區內之公共設施保留地，應按照徵收當期之市價補償其地價", "徵收補償之地價，由不動產估價師評定之", "建築改良物之補償費，按徵收當時該建築改良物之重置價格估定之", "農作改良物之補償費，於農作改良物被徵收時與其孳息成熟時期相距在一年以內者，按成熟時 之孳息估定之"], "answer": 3}, {"id": 475, "year": "113", "num": 7, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "依土地徵收條例規定，有關直轄市或縣（市）主管機關應於國庫設立土地徵收補償費保管專戶部分，下列何者錯誤？", "options": ["自通知送達發生效力之日起，逾十年未領取之補償費，歸屬國庫", "應於規定應發給補償費之期限屆滿次日起三個月內存入專戶保管", "保管未受領之徵收補償費，不適用提存法之規定", "未受領之徵收補償費，依規定繳存專戶保管時，視同補償完竣"], "answer": 0}, {"id": 476, "year": "113", "num": 8, "chapter": "D1", "chapterName": "D1 徵收程序要件", "text": "依土地徵收條例規定，有關徵收之程序，下列何者正確？", "options": ["特定農業區經行政院核定為重大建設須辦理徵收者，應依行政程序法舉行聽證", "需用土地人於事業計畫報請目的事業主管機關許可後，應舉行公聽會", "協議價購時，依其他法律規定有優先購買權者，無優先購買權之適用", "需用土地人於所有權人拒絕參與協議或經開會未能達成協議時，則改申請徵收"], "answer": 2}, {"id": 477, "year": "113", "num": 9, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法規定，主要計畫擬定後經該管政府都市計畫委員會審議修正，或經內政部指示修正者，後續如何辦理？", "options": ["免再公開展覽及舉行說明會", "再公開展覽", "再舉行說明會", "再公開展覽及舉行說明會"], "answer": 0}, {"id": 478, "year": "113", "num": 10, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法規定，逾期未辦繼承之土地於標售時，有關優先購買權人之順序依序為何？", "options": ["繼承人、合法使用人、其他共有人", "其他共有人、合法使用人、繼承人", "合法使用人、繼承人、其他共有人", "繼承人、其他共有人、合法使用人"], "answer": 0}, {"id": 479, "year": "113", "num": 11, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依土地法規定，依法得分割之共有土地，共有人不能自行協議分割者，任何共有人得申請該管直轄市、縣（市）地政機關調處，不服調處者，應於接到調處通知後幾日內向司法機關訴請處理，屆期不起訴者，依原調處結果辦理之？", "options": ["七日", "十日", "十五日", "三十日"], "answer": 2}, {"id": 480, "year": "113", "num": 12, "chapter": "A5", "chapterName": "A5 公有土地", "text": "依土地法規定，關於地權及地權限制，下列何者正確？", "options": ["台灣糖業股份有限公司所有土地為公有土地", "私有土地，因天然變遷成為湖澤或可通運之水道時，其所有權絕對消滅", "湖澤及可通運之水道及岸地，如因水流變遷而自然增加時，其接連地之使用權人，有優先依法 取得其所有權或使用受益之權", "私有土地所有權之移轉、設定負擔或租賃，妨害基本國策者，中央地政機關得報請行政院制止之"], "answer": 3}, {"id": 481, "year": "113", "num": 13, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "都市計畫地區範圍內，應視實際情況，分別設置公共設施用地，其設置標準之規定，下列何者正確？", "options": ["應就人口分布、所得及納稅能力、地價高低、產業進駐情形等現狀，決定其項目、位置與面積， 以增進市民活動之便利，及確保良好之都市生活環境", "中小學校、社教場所、社會福利設施、市場、郵政、電信、變電所、衛生、警所、消防、防空 等公共設施，應按閭鄰單位或居民分布情形適當配置之", "公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置， 除具有特殊情形外，其占用土地總面積不得少於全部計畫面積百分之二十", "道路系統、停車場所及加油站，應按土地使用分區及交通情形與預期之發展配置之。鐵路、公 路通過實施都市計畫之區域者，應以市區中心為規劃重點，以增進市民活動之便利"], "answer": 1}, {"id": 482, "year": "113", "num": 14, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法規定，下列有關公共設施保留地之使用管制規定，何者錯誤？", "options": ["公共設施保留地在未取得前，得申請為臨時建築使用", "不得為妨礙其指定目的之使用，但得繼續為原來之使用或改為妨礙目的較輕之使用", "私有公共設施保留地得申請與公有非公用土地辦理交換，不受土地法、國有財產法及各級政府 財產管理法令相關規定之限制", "地上物除准修繕外，不得增建或改建。當地政府認有必要時，得令其清除地上物或遷移，且不 得請求補償"], "answer": 3}, {"id": 483, "year": "113", "num": 15, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法規定，下列有關建築基地出賣時行使優先購買權之敘述，何者錯誤？", "options": ["地上權人、典權人或承租人有依同樣條件優先購買之權", "優先購買權人，於接到出賣通知後十日內不表示者，其優先權視為放棄", "出賣人未通知優先購買權人而與第三人訂立買賣契約者，其契約不得對抗優先購買權人", "基地承租人與基地共有人行使優先購買權發生競合時，其順序以登記之先後定之"], "answer": 3}, {"id": 484, "year": "113", "num": 16, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依土地法規定，下列有關逾期未辦繼承登記案件應由地政機關書面通知繼承人之情形，何者正確？", "options": ["自繼承開始之日起逾一年未辦理繼承登記者，經該管直轄市或縣市地政機關查明後，應即公告 繼承人於六個月內聲請登記，並以書面通知繼承人", "列冊管理期間為十五年，列冊管理期間該管直轄市或縣市地政機關應每年清查並書面通知繼承 人辦理繼承登記", "列冊管理期間屆滿，逾期仍未聲請登記者，由地政機關書面通知繼承人及將該土地或建築改良 物清冊移請財政部國有財產署公開標售", "標售土地或建築改良物前應公告三個月，並書面通知繼承人、共有人或合法使用人依序行使優 先購買權"], "answer": 2}, {"id": 485, "year": "113", "num": 17, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "甲乙丙丁戊共有A地，持分各五分之一。甲乙丙三人擬依土地法第34條之1規定，將A地出售予戊，下列敘述何者正確？", "options": ["不適法，出售為有償讓與行為，應依民法規定，經共有人全體同意始得為之", "不適法，共有人不得為受讓人", "適法，甲乙丙三人已符合共有人過半數及其應有部分合計過半數之同意的行使要件", "適法，買賣契約業經甲乙丙戊同意，縱使戊未經計算在同意人數及應有部分內，仍得依土地法 第 34 條之 1 辦理"], "answer": 1}, {"id": 486, "year": "113", "num": 18, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "依土地徵收條例規定，有關區段徵收範圍內土地，經規劃整理後之處理方式，下列何者正確？", "options": ["抵費地發交被徵收土地所有權人領回", "零售市場無償登記為當地直轄市有、縣（市）有或鄉（鎮、市）有", "標租時，其期限不得逾九十九年", "安置原住戶土地得以標售"], "answer": 2}, {"id": 487, "year": "113", "num": 19, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例規定，起造人持有使用執照所載用途為住家用之待銷售房屋，於起課房屋稅二年內，其房屋稅之稅率為何？", "options": ["最低不得少於其房屋現值百分之一點二，最高不得超過百分之二點四", "最低不得少於其房屋現值百分之二，最高不得超過百分之三點六", "最低不得少於其房屋現值百分之二，最高不得超過百分之四點八", "最低不得少於其房屋現值百分之三，最高不得超過百分之五"], "answer": 1}, {"id": 488, "year": "113", "num": 20, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例規定，有關申報契稅之起算日期，下列何者正確？", "options": ["向政府機關標購公產，以政府機關核准產權移轉之日為申報起算日", "不動產移轉發生糾紛時，以法院判決確定之日為申報起算日", "向法院標購拍賣之不動產，以承買人拍定之日為申報起算日", "建築物於建造完成前，因交換以承受人為建造執照原始起造人者，以主管建築機關核發使用執 照之日為申報起算日"], "answer": 1}, {"id": 489, "year": "113", "num": 21, "chapter": "C1", "chapterName": "C1 規定地價", "text": "依土地稅法規定，有關累進起點地價，下列何者正確？", "options": ["累進起點地價，以各該直轄市或縣（市）土地七公畝之平均地價為準。只有工業用地、礦業用 地及農業用地不包括在內", "土地所有權人之地價總額未超過戶籍所在地直轄市或縣（市）累進起點地價者，其地價稅按基 本稅率徵收", "累進起點地價以百元為單位，以下四捨五入", "累進起點地價，應於舉辦規定地價或重新規定地價後當年地價稅開徵前計算完竣，並報請財政 部及內政部備查"], "answer": 3}, {"id": 490, "year": "113", "num": 22, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "依土地稅法規定，非都市土地供公共設施使用者，在滿足規定要件下，其尚未被徵收前之移轉，免徵土地增值稅。下列有關免稅要件之敘述，何者錯誤？", "options": ["經需用土地人開闢完成或依計畫核定供公共設施使用", "依法完成使用地編定", "依法完成徵收公告", "經需用土地人證明"], "answer": 2}, {"id": 491, "year": "113", "num": 23, "chapter": "G1", "chapterName": "G1 契稅", "text": "下列有關契稅納稅義務人之敘述，何者正確？", "options": ["受託人依信託本旨移轉信託財產與委託人以外之歸屬權利人時，由歸屬權利人申報納稅", "買賣契稅，應由出賣人申報納稅", "典權契稅，應由出典人申報納稅", "交換有給付差額價款者，其差額價款，應由出賣人申報納稅"], "answer": 0}, {"id": 492, "year": "113", "num": 24, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例規定，下列有關自住使用之住家用房屋適用1.2%計徵房屋稅之要件，何者錯誤？", "options": ["無出租或供營業情形", "房屋所有人本人、配偶或直系親屬於該屋辦竣戶籍登記", "房屋所有人本人、配偶及未成年子女於全國僅持有一戶房屋且房屋現值在一定金額以下", "房屋所有人本人、配偶或直系親屬實際居住使用"], "answer": 2}, {"id": 493, "year": "113", "num": 25, "chapter": "H1", "chapterName": "H1 房地合一稅", "text": "依所得稅法規定，個人以自有土地與營利事業合作興建房屋，自土地取得之日起算五年內完成並銷售該房屋、土地者，其所得稅稅率為何？", "options": ["百分之十", "百分之十五", "百分之二十", "百分之二十五"], "answer": 2}, {"id": 494, "year": "114", "num": 1, "chapter": "A2", "chapterName": "A2 土地登記", "text": "因土地登記有錯誤致人民受有損害，地政機關負損害賠償後，於登記人員未盡下列那一種注意義務時，得對登記人員行使求償權？", "options": ["抽象輕過失責任", "重大過失責任", "具體輕過失責任", "通常事變責任"], "answer": 1}, {"id": 495, "year": "114", "num": 2, "chapter": "A2", "chapterName": "A2 土地登記", "text": "甲為A地之登記名義人，與乙成立附條件的A地贈與契約，則甲與乙可以對A地申請做下列那一種土地登記？", "options": ["假處分登記", "第一次登記", "註記登記", "預告登記"], "answer": 3}, {"id": 496, "year": "114", "num": 3, "chapter": "D1", "chapterName": "D1 徵收程序要件", "text": "辦理土地徵收時，徵收事業經行政院核定為重大建設，徵收範圍內之特定農業區農牧用地，如土地所有權人對於土地列入徵收範圍有爭議，經說明後仍有異議，則中央目的事業主管機關應辦理那一項民眾參與方式？", "options": ["聽證", "說明會", "公聽會", "陳述意見"], "answer": 0}, {"id": 497, "year": "114", "num": 4, "chapter": "E1", "chapterName": "E1 地價稅", "text": "依土地稅法之規定，一般地價稅的基本稅率為多少？", "options": ["百分之十", "百分之五", "千分之十", "千分之十五"], "answer": 2}, {"id": 498, "year": "114", "num": 5, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "下列關於房屋稅納稅義務人的認定，何者錯誤？", "options": ["以土地設定地上權之使用權房屋，為該使用權人", "共有房屋向共有人徵收，並由共有人推定一人繳納", "未辦建物所有權第一次登記且所有人不明者，優先向建造執照所載起造人徵收", "房屋為信託財產，在信託關係存續中，為受託人"], "answer": 2}, {"id": 499, "year": "114", "num": 6, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "土地所有權移轉時，原則上權利人及義務人雙方應於訂定契約幾日內檢附契約影本及相關文件共同向主管稽徵機關申報土地移轉現值？", "options": ["15 日", "30 日", "45 日", "60 日"], "answer": 1}, {"id": 500, "year": "114", "num": 7, "chapter": "A3", "chapterName": "A3 共有優先購買權", "text": "依土地法規定，所有權人欲以共有土地設定地上權，在不計共有人人數比例的情況下，至少應得到該共有土地應有部分多少比例之同意？", "options": ["超過四分之三", "超過二分之一", "超過三分之二", "全體"], "answer": 2}, {"id": 501, "year": "114", "num": 8, "chapter": "A5", "chapterName": "A5 公有土地", "text": "下列有關公有土地撥用之敘述，何者錯誤？", "options": ["無論國有或地方有之土地均有撥用的可能", "公有土地撥用需經財政部國有財產署核准", "各級政府機關有使用公有土地之需求均得申請撥用公有土地", "公有土地之撥用以無償為原則"], "answer": 1}, {"id": 502, "year": "114", "num": 9, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "區段徵收地區如為經實施農地重劃者，此一地區抵價地總面積比例不得少於徵收總面積多少？", "options": ["百分之四十", "百分之四十五", "百分之五十", "百分之五十五"], "answer": 1}, {"id": 503, "year": "114", "num": 10, "chapter": "A2", "chapterName": "A2 土地登記", "text": "土地法第78條第8款所稱限制登記，謂限制登記名義人處分其土地權利所為之登記，下列何者非屬之？", "options": ["更正登記", "假處分", "破產登記", "預告登記"], "answer": 0}, {"id": 504, "year": "114", "num": 11, "chapter": "C3", "chapterName": "C3 照價收買空地稅", "text": "依土地法規定，有關私有土地所有權取得之限制，土地若已成為私有者，政府得依法以何種方式處置？", "options": ["公開標售", "照價收買", "徵收", "沒收"], "answer": 2}, {"id": 505, "year": "114", "num": 12, "chapter": "A1", "chapterName": "A1 總則", "text": "對於土地權利之規定，我國係採「物權法定主義」，土地所有權以外之其他不動產物權，謂之他項權利，下列何者屬之？", "options": ["耕作權", "通行權", "日照權", "畜牧權"], "answer": 0}, {"id": 506, "year": "114", "num": 13, "chapter": "A4", "chapterName": "A4 基地耕地優先購買權", "text": "依土地法規定，有關優先購買權之敘述，下列何者正確？", "options": ["基地出賣或房屋出賣時，優先購買權人，於接到出賣通知後 15 日內不表示者，其優先購買權視 為放棄", "耕地租用出租人出賣或出典耕地時，優先購買權人，於接到出賣通知後 15 日內不表示者，其優 先購買權視為放棄", "共有土地共有人出賣其應有部分時，優先購買權人，於接到出賣通知後 15 日內不表示者，其優 先購買權視為放棄", "區分所有建物之專有部分連同其基地應有部分之所有權一併移轉與同一人者，他共有人有優先 購買權之適用"], "answer": 2}, {"id": 507, "year": "114", "num": 14, "chapter": "G1", "chapterName": "G1 契稅", "text": "在不動產贈與的情形下，有關契稅稅率，下列何者為是？", "options": ["百分之四", "百分之六", "百分之二", "百分之五"], "answer": 1}, {"id": 508, "year": "114", "num": 15, "chapter": "F1", "chapterName": "F1 房屋稅", "text": "依房屋稅條例規定，對於私有房屋免徵房屋稅，下列何者正確？", "options": ["無償供政府機關公用或供軍用之房屋", "政府平價配售之平民住宅", "合法登記之工廠供直接生產使用之自有房屋", "受重大災害，毀損面積占整棟面積三成以上不及五成之房屋"], "answer": 0}, {"id": 509, "year": "114", "num": 16, "chapter": "G1", "chapterName": "G1 契稅", "text": "依契稅條例規定，有關納稅義務人繳納契稅期限及罰則之規定，下列敘述何者正確？", "options": ["納稅義務人應於稽徵機關核定繳款書送達後 30 日內繳納", "納稅義務人不依規定期限申報者，每逾 2 日，加徵應納稅額百分之二之怠報金", "納稅義務人不依規定期限繳納稅款者，每逾 3 日，加徵應納稅額百分之二之滯納金", "納稅義務人應納契稅，匿報或短報，經主管稽徵機關查得，或經人舉發查明屬實者，除應補繳 稅額外，並加處以應納稅額一倍以上二倍以下之罰鍰"], "answer": 0}, {"id": 510, "year": "114", "num": 17, "chapter": "E2", "chapterName": "E2 土地增值稅", "text": "依土地稅法規定，納稅義務人藉變更、隱匿地目等則或於適用特別稅率、減免地價稅或田賦之原因、事實消滅時，未向主管稽徵機關申報者，應依規定辦理，下列敘述何者正確？", "options": ["規避繳納實物者，除追補應納部分外，處應繳田賦實物額二倍之罰鍰", "土地買賣未辦竣權利移轉登記，再行出售者，處再行出售移轉現值百分之三以下之罰鍰", "逃稅或減輕稅賦者，除追補應納部分外，處短匿稅額或賦額三倍以下之罰鍰", "應追補之稅額或賦額、隨賦徵購實物及罰鍰，納稅義務人應於通知繳納之日起 2 個月內繳納之"], "answer": 2}, {"id": 511, "year": "114", "num": 18, "chapter": "B2", "chapterName": "B2 都市計畫法", "text": "依都市計畫法規定，有關都市計畫之內容與實施，下列敘述何者正確？", "options": ["主要計畫其實施進度以 5 年為一期，最長不得超過 25 年", "細部計畫圖，其比例尺不得小於一千五百分之一", "主要計畫圖，其比例尺不得小於一萬五千分之一", "主要計畫經核定或備案後，當地直轄市、縣（市）政府應於接到核定或備案公文之日起 20 日 內，將主要計畫書及主要計畫圖發布實施"], "answer": 0}, {"id": 512, "year": "114", "num": 19, "chapter": "B3", "chapterName": "B3 國土計畫法", "text": "依國土計畫法規定，關於中央主管機關應辦理之事項，下列敘述何者正確？", "options": ["國土功能分區之劃設", "國土保育地區或海洋資源地區之使用許可、許可變更及廢止之核定", "農業發展地區及城鄉發展地區之使用許可、許可變更及廢止之核定", "直轄市、縣（市）國土計畫之擬訂、公告、變更及執行"], "answer": 1}, {"id": 513, "year": "114", "num": 20, "chapter": "C2", "chapterName": "C2 市地重劃", "text": "有關自辦土地重劃，依相關法規之規定，下列敘述何者正確？", "options": ["重劃會組織、職權、重劃業務、獎勵措施等事項之辦法，由地方主管機關定之", "重劃會辦理市地重劃時，應由重劃區內私有土地所有權人半數以上，而其所有土地面積超過重 劃區私有土地總面積半數以上者之同意，並經主管機關核准後實施之", "自辦農地重劃，應經重劃區內私有土地所有權人半數以上，而其所有面積亦達私有土地面積半 數以上者之同意，就重劃區全部土地辦理重劃，並經該管直轄市或縣（市）主管機關核准", "重劃會辦理農村社區土地重劃時，應經重劃區內私有土地所有權人合計超過三分之二，且其所 有面積合計超過私有土地面積三分之二者之同意，就重劃區全部土地辦理重劃，並經該管直轄 市或縣（市）主管機關核准後實施"], "answer": 1}, {"id": 514, "year": "114", "num": 21, "chapter": "A1", "chapterName": "A1 總則", "text": "依土地法規定，下列何種土地非屬於不得移轉、設定負擔或租賃於外國人之土地？", "options": ["林地", "鹽地", "農地", "水源地"], "answer": 2}, {"id": 515, "year": "114", "num": 22, "chapter": "D2", "chapterName": "D2 徵收補償標準", "text": "下列何者並非土地法中的農作改良物？", "options": ["置於農地上的盆栽", "附著於農地上的芒果樹", "農田的灌溉設施", "農地上所施加的肥料"], "answer": 0}, {"id": 516, "year": "114", "num": 23, "chapter": "D3", "chapterName": "D3 區段徵收", "text": "依土地徵收條例規定，有關得為區段徵收之情形，下列何項非屬之？", "options": ["舊都市地區為公共安全、衛生、交通之需要或促進土地之合理使用實施更新者", "非都市土地實施開發建設者", "興辦國營事業或公安事業者", "農村社區為加強公共設施、改善公共衛生之需要或配合農業發展之規劃實施更新者"], "answer": 2}, {"id": 517, "year": "114", "num": 24, "chapter": "E2", "chap  "D4": "【土地徵收條例 §49】撤銷徵收；【土地徵收條例 §50】廢止徵收；【土地徵收條例 §9】一般徵收，發給完竣屆滿2年未使用，原所有權人得申請收回；20年收回期限",
 "E1": "【土地稅法 §3】一般納稅義務人：土地所有權人；典權→典權人；承領→承領人；承墾→耕作權人；【土地稅法 §3-1】信託→受託人；【土地稅法 §4】代繳義務人；【土地稅法 §16】基本稅率千分之十；累進稅率：超5倍千分之15、超10倍千分之20、超15倍千分之25、超20倍千分之30；【土地稅法 §9】自用住宅用地優惠千分之二；【平均地權條例 §20】累進起點地價=各縣市土地平均地價×7公畝",
 "E2": "【土地稅法 §28】有償移轉課徵土增稅；【土地稅法 §28-3】配偶贈與不課徵；【土地稅法 §30】申報移轉現值審核標準：訂約日→收件日（逾期）→法院判決確定日→拍定日→登記完畢日（繼承）；【土地稅法 §34】自用住宅優惠10%，一生一次；【土地稅法 §35】重購退稅，2年內重購，逾5年再移轉追繳；【土地稅法 §39】不課徵情形：配偶贈與/農業用地移轉自然人/繼承；免徵情形：公共設施保留地尚未被徵收前移轉；【土地稅法 §40-1】重劃後減半徵收",
 "F1": "【房屋稅條例 §4】納稅義務人：房屋所有人；典權→典權人；信託→受託人；【房屋稅條例 §5】稅率：住家自住1.2-3.6%（各地自訂）；非住家非自用2%；【房屋稅條例 §10】房屋標準價格每3年重行評定一次；【房屋稅條例 §11】現值異議，15日內申請重行核計",
 "G1": "【契稅條例 §2】課徵契稅範圍；【契稅條例 §3】稅率：買賣6%、承典10%、交換6%、贈與6%、分割6%、占有2%；【契稅條例 §11】買受人（買賣）/受典人（典）/承受人（交換/贈與/分割）為納稅義務人",
 "H1": "【所得稅法 §4-4、4-5】課徵房地合一所得稅；稅率：持有1年內45%、1-2年35%、2-5年20%、5-10年15%、10年以上15%；非自願性因素2年內交易20%；自住優惠：持有且設籍6年以上，課稅所得免稅額400萬",
 "I1": "【耕地三七五減租條例 §15】出租人出賣耕地，承租人有優先承買之權，物權效力；【耕地三七五減租條例 §17】荒歉減免租金，需民意機關同意；【耕地三七五減租條例 §19】不定期租約終止情形"
};

const CHAPTER_ORDER = ['A1','A2','A3','A4','A5','B1','B2','B3','C1','C2','C3','C4','D1','D2','D3','D4','E1','E2','F1','G1','H1','I1'];
const CHAPTER_LABELS = {
  A1:'A1 總則', A2:'A2 土地登記', A3:'A3 共有優先購買權', A4:'A4 基地耕地優先購買權',
  A5:'A5 公有土地', B1:'B1 區域計畫法', B2:'B2 都市計畫法', B3:'B3 國土計畫法',
  C1:'C1 規定地價', C2:'C2 市地重劃', C3:'C3 照價收買空地稅', C4:'C4 申報登錄預售屋',
  D1:'D1 徵收程序要件', D2:'D2 徵收補償標準', D3:'D3 區段徵收', D4:'D4 撤銷廢止徵收',
  E1:'E1 地價稅', E2:'E2 土地增值稅', F1:'F1 房屋稅', G1:'G1 契稅',
  H1:'H1 房地合一稅', I1:'I1 耕地三七五減租'
};

let selectedChapters = new Set(CHAPTER_ORDER);
let quizQueue = [];
let quizIndex = 0;
let quizResults = [];
let currentAnswered = false;

const setupScreen = document.getElementById('setupScreen');
const quizScreen = document.getElementById('quizScreen');
const resultScreen = document.getElementById('resultScreen');

function chapterCounts() {
  const counts = {};
  CHAPTER_ORDER.forEach(c => counts[c] = 0);
  QUIZ_DATA.forEach(q => counts[q.chapter]++);
  return counts;
}

function renderChapterGrid() {
  const counts = chapterCounts();
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  CHAPTER_ORDER.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (selectedChapters.has(ch) ? ' active' : '');
    btn.innerHTML = `${CHAPTER_LABELS[ch]}<br><span class="chapter-count">${counts[ch]} 題</span>`;
    btn.onclick = () => {
      if (selectedChapters.has(ch)) selectedChapters.delete(ch);
      else selectedChapters.add(ch);
      renderChapterGrid();
    };
    grid.appendChild(btn);
  });
}

document.getElementById('selectAllBtn').onclick = () => { selectedChapters = new Set(CHAPTER_ORDER); renderChapterGrid(); };
document.getElementById('selectNoneBtn').onclick = () => { selectedChapters = new Set(); renderChapterGrid(); };

document.getElementById('startBtn').onclick = () => {
  const pool = QUIZ_DATA.filter(q => selectedChapters.has(q.chapter));
  if (!pool.length) { alert('請至少選擇一個章節'); return; }
  quizQueue = shuffle(pool).slice(0, Math.min(30, pool.length));
  quizIndex = 0;
  quizResults = [];
  setupScreen.classList.add('hidden');
  resultScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  showQuestion();
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showQuestion() {
  currentAnswered = false;
  const q = quizQueue[quizIndex];
  document.getElementById('progressText').textContent = `${quizIndex+1} / ${quizQueue.length}`;
  document.getElementById('chapterTag').textContent = q.chapterName;
  document.getElementById('progressFill').style.width = `${(quizIndex/quizQueue.length)*100}%`;
  document.getElementById('qtext').textContent = `【${q.year}年第${q.num}題】${q.text}`;

  const opts = document.getElementById('optionsContainer');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('lawBlock').classList.remove('show');
  document.getElementById('lawText').textContent = '';
  document.getElementById('nextBtn').classList.add('hidden');
}

function selectAnswer(idx) {
  if (currentAnswered) return;
  currentAnswered = true;
  const q = quizQueue[quizIndex];
  const optBtns = document.querySelectorAll('.opt');
  optBtns.forEach((el, i) => {
    el.disabled = true;
    if (i === q.answer) el.classList.add('correct');
    else if (i === idx && idx !== q.answer) el.classList.add('wrong');
  });
  const isCorrect = idx === q.answer;
  quizResults.push({ chapter: q.chapter, correct: isCorrect });

  // 顯示法條解析
  const hint = LAW_HINTS[q.chapter] || '請參照重點筆記中對應章節的法條說明';
  const lawBlock = document.getElementById('lawBlock');
  const lawText = document.getElementById('lawText');

  const resultNote = document.createElement('div');
  resultNote.style.marginBottom = '10px';
  if (isCorrect) {
    resultNote.innerHTML = '<span class="correct-note">答對了</span> <span class="answer-correct-label">正確答案已標示 ✓</span>';
  } else {
    const letters = ['A','B','C','D'];
    resultNote.innerHTML = `<span class="wrong-note">答錯了</span> <span style="font-size:0.85rem;">正確答案：<strong>${letters[q.answer]}. ${q.options[q.answer]}</strong></span>`;
  }
  lawBlock.insertBefore(resultNote, lawBlock.firstChild.nextSibling);
  if (lawBlock.childNodes.length > 3) {
    lawBlock.removeChild(lawBlock.childNodes[1]);
  }

  lawText.textContent = hint;
  lawBlock.classList.add('show');
  document.getElementById('nextBtn').classList.remove('hidden');
}

document.getElementById('nextBtn').onclick = () => {
  quizIndex++;
  if (quizIndex >= quizQueue.length) showResults();
  else showQuestion();
};

function showResults() {
  quizScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  const correct = quizResults.filter(r => r.correct).length;
  const total = quizResults.length;
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resTotal').textContent = total;
  document.getElementById('resRate').textContent = total ? Math.round(correct/total*100)+'%' : '0%';

  const byChapter = {};
  quizResults.forEach(r => {
    if (!byChapter[r.chapter]) byChapter[r.chapter] = {correct:0, total:0};
    byChapter[r.chapter].total++;
    if (r.correct) byChapter[r.chapter].correct++;
  });
  const breakdown = document.getElementById('chapterBreakdown');
  breakdown.innerHTML = '<div style="font-weight:700; margin:10px 0 6px; font-size:0.85rem;">本輪章節表現</div>';
  Object.keys(byChapter).forEach(ch => {
    const d = byChapter[ch];
    const pct = Math.round(d.correct/d.total*100);
    const row = document.createElement('div');
    row.className = 'chapter-stat-row';
    row.innerHTML = `<span>${CHAPTER_LABELS[ch]}</span><span style="display:flex;align-items:center;gap:8px;"><span class="mini-bar"><span class="mini-bar-fill" style="width:${pct}%"></span></span><span>${d.correct}/${d.total}</span></span>`;
    breakdown.appendChild(row);
  });
}

document.getElementById('backToSetupBtn').onclick = () => { resultScreen.classList.add('hidden'); setupScreen.classList.remove('hidden'); renderChapterGrid(); };
document.getElementById('restartBtn').onclick = () => document.getElementById('startBtn').click();

renderChapterGrid();
</script>
</body>
</html>
