<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandLaw FGHI quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.74rem;padding:5px 12px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.64rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);}
.opt:disabled{cursor:default;}
.ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}.el.no{background:#b0b8c4;color:#fff;}.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}</style>
</head>
<body>
<div class="app">
<h1>土地法 F+G+H+I篇 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">F1房屋稅 ／ G1契稅 ／ H1房地合一所得稅 ／ I1耕地三七五減租｜共 75 題</div>
<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>
<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text"><span id="pd">0</span>/<span id="pt">0</span> 已答・正確率 <span id="pr">-</span></div>
</div>
<div id="list"></div>
</div>
<script>const CARDS=[{"ch": "F1 房屋稅", "year": "99", "num": 31, "q": "依房屋稅條例之規定，住家用房屋稅率最低不得少於其房屋現值百分之一點二，最高不得超過百分之二。但自住房屋為其房屋現值多少？", "opts": ["百分之一", "百分之一點二", "百分之一點五", "百分之三"], "ans": 1, "exps": ["❌ 1%過低，不是自住住家用房屋的法定稅率。", "✓ 房屋稅條例第5條：住家用房屋供自住或公益出租人出租使用者，稅率為1.2%（固定稅率，不是區間）。「自住」是住家用稅率區間（1.2%~3.6%）中最低、也是固定不變的優惠稅率。", "❌ 1.5%不是自住房屋的稅率，1.5%~2.5%是非住家非營業用（私人醫院診所自由職業）的稅率區間。", "❌ 3%不是自住房屋的稅率，3%~5%是非住家營業用的稅率區間。"]}, {"ch": "F1 房屋稅", "year": "99", "num": 33, "q": "依房屋稅條例之規定，房屋標準價格，由不動產評價委員會依規定評定之，並由直轄市、縣（市）政府公告，且須多久重行評定一次？", "opts": ["每一年", "每二年", "每三年", "每四年"], "ans": 2, "exps": ["❌ 1年週期過短，不是法定重行評定頻率。", "❌ 2年不是法定重行評定頻率。", "✓ 房屋稅條例第11條：房屋標準價格由不動產評價委員會評定，直轄市縣市政府公告，每「3年」重行評定一次。3年是F1最基本的固定數字考點。", "❌ 4年不是法定重行評定頻率。"]}, {"ch": "F1 房屋稅", "year": "100", "num": 10, "q": "依房屋稅條例規定，私有房屋有下列何種情形，免徵房屋稅？", "opts": ["政府平價配售之平民住宅", "司法保護事業所有之房屋", "合法登記之工廠供直接生產使用之自有房屋", "受重大災害，毀損面積佔整棟面積三成以上不及五成之房屋"], "ans": 1, "exps": ["❌ 平民住宅是「減半徵收」（非免徵），本選項與正確法律效果不符。", "✓ 本題官方答案：司法保護事業所有之房屋為法定「免徵」房屋稅之情形之一。注意這個與101-34、101-32題不同年度的考法常互相對照，務必記住司法保護事業房屋屬於免徵清單。", "❌ 工廠供直接生產使用之自有房屋是「減半徵收」（非免徵），依104-40題確認答案，與本選項描述的法律效果不符。", "❌ 毀損30%以上未達50%是「減半徵收」（非免徵），免徵的門檻是毀損達50%以上且須修復始能使用。"]}, {"ch": "F1 房屋稅", "year": "100", "num": 31, "q": "依房屋稅條例規定，主管稽徵機關應依據不動產評價委員會評定之標準，核計房屋現值。依前項規定核計之房屋現值，主管稽徵機關應通知納稅義務人。納稅義務人如有異議，得於接到通知書之日起幾日內，檢附證件，申請重行核計？", "opts": ["五日", "十日", "十五日", "三十日"], "ans": 3, "exps": ["❌ 5日過短，不是法定異議申請期限。", "❌ 10日不是法定期限。", "❌ 15日不是法定期限。", "✓ 房屋稅條例第10條：納稅義務人對主管稽徵機關核計之房屋現值如有異議，得於接到通知書之日起「30日」內，檢附證件申請重行核計。30日是F1標準的異議申請期限。"]}, {"ch": "F1 房屋稅", "year": "101", "num": 22, "q": "依房屋稅條例之規定，房屋稅之徵收率由何者規定？", "opts": ["財政部", "立法院", "直轄市及縣（市）政府", "當地民意機關"], "ans": 2, "exps": ["❌ 財政部是中央主管機關，但不是房屋稅徵收率的擬定機關。", "❌ 立法院是中央立法機關，不是房屋稅徵收率的擬定機關。", "✓ 房屋稅條例第5條：房屋稅徵收率由直轄市及縣市政府於法定範圍內擬定，提經當地民意機關通過後實施。是「地方政府擬定＋地方議會通過」的二階段程序，本題只問「由何者規定」，答案是直轄市縣市政府（擬定主體）。", "❌ 民意機關是「通過」徵收率的審議機關，不是「擬定」徵收率的提案機關，兩者角色不同，本題問的是擬定主體。"]}, {"ch": "F1 房屋稅", "year": "101", "num": 32, "q": "依照規定，下列房屋，何者免徵房屋稅？", "opts": ["政府平價配售之平民住宅", "合法登記之工廠供直接生產使用之自有房屋", "受重大災害，毀損面積佔整棟面積五成以上，必須修復始能使用之房屋", "受重大災害，毀損面積佔整棟面積三成以上不及五成之房屋"], "ans": 2, "exps": ["❌ 平民住宅是「減半徵收」，不是免徵，本選項法律效果不符。", "❌ 此為「減半徵收」（非免徵），不符題目所問的免徵情形。", "✓ 房屋稅條例第15條：受重大災害，毀損面積占整棟面積「50%以上」，必須修復始能使用之房屋，「免徵」房屋稅。50%是免徵的門檻（區別於30%~未達50%的減半徵收門檻）。", "❌ 毀損30%以上未達50%是「減半徵收」，不是免徵，未達免徵的50%門檻。"]}, {"ch": "F1 房屋稅", "year": "101", "num": 33, "q": "李先生擁有面積300平方公尺的房屋1幢，同時供住家及非住家使用。依現行房屋稅條例之規定，其適用非住家用稅率課徵房屋稅之面積，最低不得少於多少平方公尺？", "opts": ["30", "50", "60", "150"], "ans": 1, "exps": ["❌ 30平方公尺不是法定最低面積。", "✓ 房屋稅條例規定，住家用房屋同時供非住家用，課稅面積最低不得少於全部面積的一定比例，依規定最低限額為「50平方公尺」。本題300平方公尺的房屋，最低50平方公尺須課非住家用稅率（即使非住家使用面積實際小於50平方公尺，也要按50平方公尺計課，避免規避稅負）。", "❌ 60平方公尺不是法定最低面積。", "❌ 150平方公尺過高，不是法定最低面積。"]}, {"ch": "F1 房屋稅", "year": "101", "num": 34, "q": "依房屋稅條例規定，私有房屋有下列情形之一者，其房屋稅減半徵收？", "opts": ["完成財團法人登記且經立案之私立學校辦公使用之自有房屋", "無償供政府機關公用或供軍用之房屋", "受重大災害，毀損面積佔整棟面積三成以上不及五成之房屋", "農會所有之倉庫，專供糧政機關儲存公糧，經主管機關證明者"], "ans": 2, "exps": ["✓ 房屋稅條例第15條：完成財團法人登記且經立案之私立學校，其辦公使用之自有房屋，房屋稅「減半徵收」。注意是「辦公使用」（非教學使用，教學使用部分可能適用其他規定）。", "❌ 此為「免徵」（非減半），描述法律效果錯誤。", "❌ 此選項描述的是另一個減半徵收情形（同101-32題的對照），但本題答案是A（私立學校辦公使用），以官方答案為準。", "❌ 此為農會倉庫的法定優惠情形之一，但本題答案為A，以官方答案為準。"]}, {"ch": "F1 房屋稅", "year": "101", "num": 35, "q": "非住家用房屋稅，下列規定何者最正確？", "opts": ["其為營業用者，最低不得少於其房屋現值百分之一，最高不得超過百分之三。其為私人醫院、診所、自由職業事務所及人民團體等非營業用者，最低不得少於其房屋現值百分之一點五，最高不得超過百分之二點五", "其為營業用者，最低不得少於其房屋現值百分之一，最高不得超過百分之三。其為私人醫院、診所、自由職業事務所及人民團體等非營業用者，最低不得少於其房屋現值百分之二點五，最高不得超過百分之三點五", "其為營業用者，最低不得少於其房屋現值百分之三，最高不得超過百分之五。其為私人醫院、診所、自由職業事務所及人民團體等非營業用者，最低不得少於其房屋現值百分之二點五，最高不得超過百分之三點五", "其為營業用者，最低不得少於其房屋現值百分之三，最高不得超過百分之五。其為私人醫院、診所、自由職業事務所及人民團體等非營業用者，最低不得少於其房屋現值百分之一點五，最高不得超過百分之二點五"], "ans": 3, "exps": ["❌ 營業用稅率區間錯誤（應為3%~5%，不是1%~3%）。", "❌ 兩個區間都錯誤，營業用應為3%~5%，非營業用應為1.5%~2.5%。", "❌ 營業用區間正確（3%~5%），但非營業用區間錯誤（應為1.5%~2.5%，不是2.5%~3.5%）。", "✓ 房屋稅條例第5條：營業用稅率區間3%~5%；私人醫院診所自由職業事務所人民團體等非營業用稅率區間1.5%~2.5%。兩個區間都正確對應，本選項完全正確。"]}, {"ch": "F1 房屋稅", "year": "101", "num": 36, "q": "房屋稅納稅義務人應於房屋移轉完成之日起多少日內檢附有關文件，向當地主管稽徵機關申報房屋稅籍有關事項及使用情形？", "opts": ["七日", "十日", "二十日", "三十日"], "ans": 3, "exps": ["❌ 7日不是法定申報期限。", "❌ 10日不是法定申報期限。", "❌ 20日不是法定申報期限。", "✓ 房屋稅條例規定，房屋稅籍變更（含房屋移轉完成）應於變更之日起「30日」內向主管稽徵機關申報。30日是房屋稅各項申報期限的統一標準，與房屋現值異議申請期限（同樣30日）一致。"]}, {"ch": "F1 房屋稅", "year": "102", "num": 20, "q": "依房屋稅條例規定，私有房屋有下列何種情形，其房屋稅減半徵收？", "opts": ["政府平價配售之平民住宅", "司法保護事業所有之房屋", "無償供政府機構公用之房屋", "政府配供貧民居住之房屋"], "ans": 0, "exps": ["✓ 依本題官方答案，政府平價配售之平民住宅，房屋稅「減半徵收」。注意這跟100-10題的「免徵」對照題形成有趣對比——同一個標的（平民住宅）在不同題目語境下答案不同，可能涉及不同版本的法條修正前後差異，本題（102年）官方答案是減半，需以各題公告答案為準。", "❌ 司法保護事業房屋是「免徵」（同100-10題答案），不是減半徵收。", "❌ 無償供政府機構公用房屋是「免徵」，不是減半徵收。", "❌ 此非法定的標準減半徵收情形描述，不是答案。"]}, {"ch": "F1 房屋稅", "year": "102", "num": 21, "q": "依房屋稅條例規定，房屋稅每年徵收一次。對新建、增建或改建之房屋，於當期建造完成者，應如何計課？", "opts": ["免予計課", "一律按年減半徵收之", "按月比例計課，未滿一個月者不計", "按週比例計課，未滿一週者不計"], "ans": 2, "exps": ["❌ 新建增建改建房屋當期建造完成，不是免予計課，而是按比例計課。", "❌ 不是「一律減半」，而是按實際使用月數比例計課。", "✓ 房屋稅條例第7條：新建、增建或改建之房屋，於當期建造完成者，「按月比例計課」，未滿1個月者不計。這是按實際使用時間合理課稅的設計，避免年度中途完工的房屋被全年課稅或完全免課。", "❌ 法定單位是「月」，不是「週」，計算單位錯誤。"]}, {"ch": "F1 房屋稅", "year": "103", "num": 4, "q": "下列有關房屋稅補稅、罰鍰與滯納金之敘述何者正確？", "opts": ["納稅義務人未依規定期限申報，因而發生漏稅者，除責令補繳應納稅額外，並按所漏稅額處以三倍罰鍰", "納稅義務人未依規定期限申報，因而發生漏稅者，除責令補繳應納稅額外，並按所漏稅額處以五倍罰鍰", "納稅義務人未於稅單所載限繳日期內繳清應納稅款者，每逾二日按滯納數額加徵百分之一滯納金", "納稅義務人未於稅單所載限繳日期內繳清應納稅款者，每逾二日按滯納數額加徵百分之三滯納金"], "ans": 2, "exps": ["❌ 罰鍰倍數應為「2倍以下」（非3倍），本選項數字過高且未加「以下」的限定詞。", "❌ 5倍遠超法定罰鍰倍數，數字錯誤。", "✓ 房屋稅條例：逾期繳納稅款，每逾2日加徵滯納數額1%滯納金。這個「2日、1%」的組合是房屋稅滯納金計算的固定考點，與契稅的滯納金計算方式相同。", "❌ 滯納金比率是1%（非3%），數字錯誤。"]}, {"ch": "F1 房屋稅", "year": "103", "num": 5, "q": "下列有關房屋稅稅率課徵之敘述何者正確？", "opts": ["供自住或公益出租人出租使用者，為其房屋現值百分之一", "其他供住家用者，最低不得少於其房屋現值百分之一，最高不得超過百分之三", "供人民團體等非營業使用者，最低不得少於其房屋現值百分之一，最高不得超過百分之三", "供營業、私人醫院、診所或自由職業事務所使用者，最低不得少於其房屋現值百分之三，最高不得超過百分之五"], "ans": 3, "exps": ["❌ 自住稅率是1.2%（非1%），數字錯誤。", "❌ 其他住家用（非自住）的稅率區間應為2%~4.8%（非1%~3%），數字錯誤。", "❌ 人民團體等非營業使用的稅率區間是1.5%~2.5%（非1%~3%），數字錯誤。", "✓ 此選項把「營業用」（3%~5%）和「私人醫院診所自由職業事務所」（依法亦適用此區間，注意：此選項把私人醫院診所自由職業事務所與營業用合併歸入3%~5%區間，與101-35題單獨列出非營業用1.5%~2.5%的描述不同，以官方答案D為本題唯一正確的合併歸類方式）。"]}, {"ch": "F1 房屋稅", "year": "103", "num": 11, "q": "某甲於民國102年3月1日購買房地產A，並於同年4月1日完成登記，購買房地產後因小孩在外縣市就學，某甲夫妻及未成年子女戶籍皆未設籍於該房地產，但某甲將父親戶籍設於該房地產，若某甲僅有房地產A，妻及未成年子女名下亦無房地產，民國103年3月5日將該房地產以1,000萬元簽約出售，持有期間並未供營業或出租，依特種貨物及勞務稅、地價稅、房屋稅之相關課徵規定，下列何者正確？", "opts": ["某甲出售房地產A無須課徵特種貨物及勞務稅", "某甲持有房地產A期間，符合申請地價稅自用住宅稅率之條件", "某甲出售房地產A須課徵特種貨物及勞務稅，其稅率為百分之十", "某甲持有房地產A期間，不符合房屋稅住家用自用稅率"], "ans": 1, "exps": ["❌ 本選項描述本身可能正確（持有期間若已超過特銷稅課徵的持有年限門檻，可能免課），但本題答案聚焦在地價稅自用住宅資格的判斷，以官方答案B為準。", "✓ 自用住宅優惠的法定要件是「土地所有權人或其配偶、直系親屬」於該地辦竣戶籍登記。本題中，某甲將「父親」戶籍設於該房地產，父親屬於某甲的「直系親屬」（直系尊親屬），即使甲本人夫妻及未成年子女戶籍未設於此，仍符合「配偶或直系親屬辦竣戶籍登記」的要件，故符合申請自用住宅稅率的條件。", "❌ 持有期間及稅率細節需核對特種貨物及勞務稅條例規定，本選項非本題官方答案，以B為準。", "❌ 同地價稅的判斷邏輯，父親作為直系親屬辦竣戶籍登記，應符合房屋稅自住要件，本選項與B矛盾，以官方答案B為準（即符合，非不符合）。"]}, {"ch": "F1 房屋稅", "year": "104", "num": 38, "q": "依現行房屋稅條例規定，房屋標準價格依法定事項分別評定，下列何者不屬之？", "opts": ["房屋建造材料", "房屋耐用年數及折舊標準", "房屋所在不同地段之地價水準", "房屋所處街道村里之地段調整率"], "ans": 2, "exps": ["❌ 此為法定評定房屋標準價格的因素之一，屬之。", "❌ 此為法定評定因素之一，屬之。", "✓ 房屋標準價格的法定評定因素為：房屋建造材料、房屋耐用年數及折舊標準、房屋所處街道村里之地段調整率三項。本選項說的是「地段之地價水準」，這是地價的概念（屬於地價稅、土地增值稅的範疇），房屋稅課的是房屋本身的價值（建材、年限、地段調整率），不直接以土地地價水準作為評定因素，這是F1的重要陷阱。", "❌ 此為法定評定因素之一（注意與C選項的「地價水準」不同，「地段調整率」是法定因素，「地價水準」不是），屬之。"]}, {"ch": "F1 房屋稅", "year": "104", "num": 39, "q": "有關房屋稅之課徵，下列敘述，何者錯誤？", "opts": ["房屋設有典權者，房屋稅向典權人徵收之", "無建造執照之房屋，免徵收房屋稅", "房屋稅每年之開徵日期，由省（市）政府定之", "政府平價配售之平民住宅，房屋稅減半徵收"], "ans": 1, "exps": ["❌ 本選項描述正確，典權房屋的房屋稅納稅義務人是典權人，非錯誤。", "✓ 本選項為錯誤敘述：無建造執照的房屋（違章建築）並非「免徵房屋稅」，房屋稅的課徵與建物是否合法（有無建照）無關，違章建築一樣要課房屋稅（這是稅法上「實質課稅」的精神，不因建物違法就免除稅捐義務）。", "❌ 本選項描述正確（依當時法制設計，省市政府訂定開徵日期），非錯誤。", "❌ 本選項描述正確，符合減半徵收規定（同102-20題），非錯誤。"]}, {"ch": "F1 房屋稅", "year": "104", "num": 40, "q": "關於合法登記之工廠，提供直接生產使用之自有房屋，其房屋稅之徵收，下列何者正確？", "opts": ["減半", "免徵", "按房屋現值百分之三", "按房屋現值百分之一點二"], "ans": 0, "exps": ["✓ 房屋稅條例第15條：合法登記之工廠供直接生產使用之自有房屋，房屋稅「減半徵收」。注意這跟「免徵」的清單要區分清楚——免徵清單包括平民住宅（依部分年度題答案）、司法保護事業房屋、無償供政府公用或軍用房屋、毀損50%以上必須修復房屋；減半清單包括工廠自有房屋、私立學校辦公使用、毀損30%~未達50%房屋。", "❌ 工廠供直接生產使用之自有房屋是減半，不是免徵，這是F1的常見混淆陷阱。", "❌ 3%不是工廠房屋的優惠課徵方式，工廠的優惠是「減半」（即按原稅率的一半課徵），不是固定的3%。", "❌ 1.2%是住家自住的稅率，與工廠房屋的優惠規定（減半）無關。"]}, {"ch": "F1 房屋稅", "year": "105", "num": 5, "q": "依房屋稅條例規定，房屋標準價格由下列何委員會負責？", "opts": ["地價評議委員會", "不動產仲裁委員會", "不動產評議委員會", "不動產評價委員會"], "ans": 3, "exps": ["❌ 地價評議委員會負責的是地價稅的累進起點地價及地價評定，不是房屋標準價格。", "❌ 此委員會為虛構名稱，房屋稅條例無此機構。", "❌ 名稱接近但不正確，正確名稱是「不動產評價委員會」（評議vs評價，一字之差是常見陷阱）。", "✓ 房屋稅條例第9條：房屋標準價格由「不動產評價委員會」評定，並由直轄市縣市政府公告。「評價」（非評議、非仲裁）委員會是F1的固定機關名稱考點。"]}, {"ch": "F1 房屋稅", "year": "105", "num": 6, "q": "依據房屋稅條例規定，房屋稅之納稅義務人不包括下列何者？", "opts": ["所有權人", "債權人", "典權人", "信託受託人"], "ans": 1, "exps": ["❌ 所有權人是房屋稅最基本的納稅義務人，屬之。", "✓ 房屋稅的納稅義務人清單包括：所有權人、典權人、共有人推定一人、信託受託人、使用執照所載起造人（未辦保存登記情形）等，但「債權人」不在此清單內。一般債權人（例如借款給屋主的人）對房屋沒有使用收益的物權關係，不負擔房屋稅義務。", "❌ 典權人是法定納稅義務人之一，屬之。", "❌ 信託房屋於信託關係存續中，受託人是法定納稅義務人，屬之。"]}, {"ch": "F1 房屋稅", "year": "106", "num": 17, "q": "下列何者非申請自住房屋稅稅率之要件？", "opts": ["土地所有權人或其配偶、直系親屬於房屋所在地辦竣戶籍登記", "房屋無出租使用", "供本人、配偶或直系親屬實際居住使用", "本人、配偶及未成年子女全國合計3戶以內"], "ans": 0, "exps": ["✓ 本選項為本題「非屬」自住房屋稅要件的答案：本選項用詞是「土地所有權人」，但本題自住房屋稅率的要件對象應是「房屋所有人」（本人）或其配偶、直系親屬辦竣戶籍登記，「土地所有權人」的措辭混淆了房屋稅（針對房屋）與地價稅（針對土地）的權利主體，故本選項的描述不精確，非自住房屋稅要件的正確表述。", "❌ 房屋無出租是自住房屋稅率的要件之一，屬之。", "❌ 實際居住使用是自住房屋稅率的要件之一，屬之。", "❌ 全國合計3戶以內是自住房屋稅率的要件之一，屬之。"]}, {"ch": "F1 房屋稅", "year": "107", "num": 24, "q": "依房屋稅條例規定，私有房屋受重大災害時，有關房屋稅之減免，下列敘述何者正確？", "opts": ["毀損面積佔整棟面積三成以上，不及五成之房屋，免徵房屋稅", "毀損面積佔整棟面積五成以上，必須修復始能使用之房屋，免徵房屋稅", "毀損面積佔整棟面積五成以上，其房屋稅減半徵收", "毀損面積佔整棟面積五成以上，必須修復始能使用之房屋，其房屋稅減半徵收"], "ans": 1, "exps": ["❌ 30%以上未達50%是「減半徵收」，不是「免徵」，本選項法律效果錯誤。", "✓ 同101-32，毀損50%以上且必須修復始能使用，房屋稅「免徵」。50%是免徵與減半的分界門檻。", "❌ 50%以上應是「免徵」（非減半），且本選項漏掉「必須修復始能使用」這個重要前提要件。", "❌ 描述了正確的要件（50%以上且須修復），但法律效果應是「免徵」，不是「減半徵收」，本選項把效果說錯了。"]}, {"ch": "F1 房屋稅", "year": "109", "num": 1, "q": "依房屋稅條例規定，下列敘述何者錯誤？", "opts": ["合法登記之工廠供直接生產使用之自有房屋，免徵房屋稅", "受重大災害，毀損面積佔整棟面積五成以上，必須修復始能使用之私有房屋，免徵房屋稅", "房屋標準價格，每三年重行評定一次，並應依其耐用年數予以折舊，按年遞減其價格", "各級政府機關及地方自治機關之公有辦公房屋及其員工宿舍，免徵房屋稅"], "ans": 0, "exps": ["✓ 本選項為錯誤敘述：合法登記工廠供直接生產使用之自有房屋是「減半徵收」（同104-40），不是「免徵」，本選項法律效果錯誤，為本題答案。", "❌ 本選項描述正確，符合法定免徵情形（同101-32），非錯誤。", "❌ 本選項描述正確，3年重行評定週期及按年折舊符合法條規定，非錯誤。", "❌ 本選項描述正確，公有機關辦公房屋免徵房屋稅，非錯誤。"]}, {"ch": "F1 房屋稅", "year": "109", "num": 19, "q": "依房屋稅條例規定，房屋為信託財產者，於信託關係存續中，下列何者為房屋稅之納稅義務人？", "opts": ["委託人", "受託人", "受益人", "監察人"], "ans": 1, "exps": ["❌ 一般情形委託人不是房屋稅的法定納稅義務人。", "✓ 房屋稅條例：房屋為信託財產者，於信託關係存續中，以「受託人」為房屋稅之納稅義務人。與地價稅的信託土地規定一致（受託人是名義持有人，負責管理使用，故由其負擔稅捐）。", "❌ 受益人享有信託利益，但不是法定納稅義務人。", "❌ 信託監察人是監督角色，不是納稅義務人。"]}, {"ch": "F1 房屋稅", "year": "111", "num": 4, "q": "依房屋稅條例之規定，下列有關房屋稅納稅義務人之敘述，何者錯誤？", "opts": ["原則上向房屋所有人徵收之", "未辦建物所有權第一次登記且所有人不明之房屋，向使用執照所載起造人徵收之", "未辦建物所有權第一次登記且所有人不明之房屋，無使用執照者，向建造執照所載起造人徵收之", "未辦建物所有權第一次登記且所有人不明之房屋，無使用執照、亦無建造執照者，暫不徵收之"], "ans": 3, "exps": ["❌ 本選項描述正確，房屋所有人是房屋稅基本的納稅義務人，非錯誤。", "❌ 本選項描述正確，符合法定順位規定（有使用執照者向起造人徵收），非錯誤。", "❌ 本選項描述正確，無使用執照但有建造執照者，向建造執照起造人徵收，符合法定順位，非錯誤。", "✓ 本選項為錯誤敘述：無使用執照、亦無建造執照的房屋（完全無證照的違建），房屋稅應「向現住人或管理人徵收」，不是「暫不徵收」。「暫不徵收」違反房屋稅的實質課稅原則，本選項描述錯誤。"]}, {"ch": "F1 房屋稅", "year": "113", "num": 19, "q": "依房屋稅條例規定，起造人持有使用執照所載用途為住家用之待銷售房屋，於起課房屋稅二年內，其房屋稅之稅率為何？", "opts": ["最低不得少於其房屋現值百分之一點二，最高不得超過百分之二點四", "最低不得少於其房屋現值百分之二，最高不得超過百分之三點六", "最低不得少於其房屋現值百分之二，最高不得超過百分之四點八", "最低不得少於其房屋現值百分之三，最高不得超過百分之五"], "ans": 1, "exps": ["❌ 此區間不符合待銷售住家用房屋的特殊稅率規定。", "✓ 房屋稅條例：起造人持有使用執照所載用途為住家用之「待銷售」房屋，於起課房屋稅「2年內」，按「2%~3.6%」之特殊稅率課徵（比一般自住的1.2%高，但比非自住住家用的最高4.8%低，反映建商待售房屋的特殊性質）。2年內、2%~3.6%是固定組合考點。", "❌ 上限應為3.6%，不是4.8%（4.8%是非自住住家用一般房屋的最高稅率）。", "❌ 此區間是營業用房屋的稅率，不是待銷售住家用房屋的稅率。"]}, {"ch": "F1 房屋稅", "year": "113", "num": 24, "q": "依房屋稅條例規定，下列有關自住使用之住家用房屋適用1.2%計徵房屋稅之要件，何者錯誤？", "opts": ["無出租或供營業情形", "房屋所有人本人、配偶或直系親屬於該屋辦竣戶籍登記", "房屋所有人本人、配偶及未成年子女於全國僅持有一戶房屋且房屋現值在一定金額以下", "房屋所有人本人、配偶或直系親屬實際居住使用"], "ans": 2, "exps": ["❌ 本選項描述正確，無出租無營業是自住稅率的要件之一，非錯誤。", "❌ 本選項描述正確，戶籍登記是要件之一，非錯誤。", "✓ 本選項為錯誤敘述：1.2%自住稅率的要件是「本人配偶未成年子女全國合計3戶以內」（不是「僅持有一戶」），且法條也沒有「房屋現值在一定金額以下」這個額外限制。本選項把「3戶以內」誤植為「僅一戶」，並增加了不存在的金額限制，為本題答案。", "❌ 本選項描述正確，實際居住使用是要件之一，非錯誤。"]}, {"ch": "F1 房屋稅", "year": "114", "num": 5, "q": "下列關於房屋稅納稅義務人的認定，何者錯誤？", "opts": ["以土地設定地上權之使用權房屋，為該使用權人", "共有房屋向共有人徵收，並由共有人推定一人繳納", "未辦建物所有權第一次登記且所有人不明者，優先向建造執照所載起造人徵收", "房屋為信託財產，在信託關係存續中，為受託人"], "ans": 2, "exps": ["❌ 本選項描述正確，使用權房屋的納稅義務人是使用權人，非錯誤。", "❌ 本選項描述正確，共有房屋的納稅安排符合法條規定，非錯誤。", "✓ 本選項為錯誤敘述：法定優先順位是「先向使用執照所載起造人徵收，無使用執照者才向建造執照所載起造人徵收」，本選項說「優先向建造執照所載起造人徵收」，跳過了使用執照優先的順位，順序錯誤，為本題答案。", "❌ 本選項描述正確，受託人是法定納稅義務人，非錯誤。"]}, {"ch": "F1 房屋稅", "year": "114", "num": 15, "q": "依房屋稅條例規定，對於私有房屋免徵房屋稅，下列何者正確？", "opts": ["無償供政府機關公用或供軍用之房屋", "政府平價配售之平民住宅", "合法登記之工廠供直接生產使用之自有房屋", "受重大災害，毀損面積占整棟面積三成以上不及五成之房屋"], "ans": 0, "exps": ["✓ 房屋稅條例：無償供政府機關公用或供軍用之房屋，「免徵」房屋稅。本選項正確描述了免徵的法定情形之一。", "❌ 依本題（114年）官方答案，平民住宅不是本題的免徵正確答案；參照之前題目（102年答案是減半），不同年度題目對平民住宅的法律效果認定可能有差異，需以各題官方答案為準，本題A選項才是正確答案。", "❌ 工廠自有房屋是減半徵收（同104-40），不是免徵。", "❌ 30%以上未達50%是減半徵收，不是免徵（免徵門檻是50%以上且須修復）。"]}, {"ch": "G1 契稅", "year": "100", "num": 9, "q": "依契稅條例規定，占有契稅為其契價多少百分比？", "opts": ["百分之二", "百分之四", "百分之六", "百分之八"], "ans": 2, "exps": ["❌ 2%是交換或分割契稅的稅率，不是占有契稅的稅率。", "❌ 4%是典權契稅的稅率，不是占有契稅的稅率。", "✓ 契稅條例第3條：占有契稅稅率為契價的「6%」，與買賣、贈與契稅相同。占有是指以時效取得等方式取得不動產所有權，因取得方式特殊，稅率與買賣等同視之，採較高稅率6%。", "❌ 8%不是任何契稅類型的法定稅率。"]}, {"ch": "G1 契稅", "year": "101", "num": 30, "q": "依契稅條例規定，甲將不動產信託與乙，嗣後受託人乙依信託本旨將該不動產移轉與歸屬權利人丙，歸屬權利人丙應申報繳納何種契稅？", "opts": ["買賣契稅", "交換契稅", "贈與契稅", "占有契稅"], "ans": 2, "exps": ["❌ 受託人依信託本旨移轉財產給歸屬權利人，不是買賣行為，不適用買賣契稅。", "❌ 此非交換行為，不適用交換契稅。", "✓ 契稅條例規定，受託人依信託本旨將信託財產移轉與「委託人以外之歸屬權利人」時，性質上視同贈與（無償移轉），應申報繳納「贈與契稅」（稅率6%）。歸屬權利人丙是無償取得財產，故依贈與契稅課徵。", "❌ 此非占有行為（非時效取得），不適用占有契稅。"]}, {"ch": "G1 契稅", "year": "101", "num": 31, "q": "下列關於契稅稅率的規定，何者最正確？", "opts": ["買賣契稅為其契價百分之六", "典權契稅為其契價百分之六", "交換契稅為其契價百分之六", "分割契稅為其契價百分之六"], "ans": 0, "exps": ["✓ 契稅條例第3條：買賣契稅稅率為契價的6%。本選項正確對應買賣的稅率。", "❌ 典權契稅的稅率是「4%」，不是6%，這是契稅條例六種類型中唯一稅率不是6%（除交換、分割2%外）的特殊類型。", "❌ 交換契稅稅率是「2%」，不是6%。", "❌ 分割契稅稅率是「2%」，不是6%。"]}, {"ch": "G1 契稅", "year": "101", "num": 37, "q": "依契稅條例規定，關於契稅之課徵，下列敘述何者錯誤？", "opts": ["稽徵機關收到申報案件後，應於十五日內查定應納稅額", "不依規定期限申報契稅者，每逾二日加徵百分之一滯納金", "應納契稅，匿報或短報，經主管稽徵機關查得，除應補繳稅額外，並加處以應納稅額一倍以上三倍以下之罰鍰", "檢舉逃漏契稅之獎金為罰鍰之百分之二十"], "ans": 1, "exps": ["❌ 本選項描述正確，符合契稅條例第15日查定期限，非錯誤。", "✓ 本選項為錯誤敘述：逾期「申報」契稅，加徵的是「怠報金」（不是滯納金），怠報金與滯納金是不同概念——怠報金是針對逾期申報（未依限申報），滯納金是針對逾期繳納（已申報但未繳款）。本選項把申報逾期的處罰名稱說成「滯納金」，用語錯誤，為本題答案。", "❌ 本選項描述正確，符合契稅條例罰則規定（1倍以上3倍以下），非錯誤。", "❌ 本選項描述正確，檢舉獎金為罰鍰的20%，非錯誤。"]}, {"ch": "G1 契稅", "year": "102", "num": 22, "q": "依契稅條例規定，凡以抵押、借貸等變相方式代替設典，取得不動產使用權者，應以何項契稅申報繳納？", "opts": ["買賣", "典權", "交換", "設定"], "ans": 1, "exps": ["❌ 抵押借貸代替設典不是買賣行為。", "✓ 契稅條例：凡以「抵押、借貸等變相方式」代替設典，取得不動產使用權者，應以「典權」契稅申報納稅。法律不允許以變相方式規避典權契稅的稅捐義務，採取實質課稅原則認定此類安排視同設典。", "❌ 此非交換行為。", "❌ 「設定」契稅非法定類型（契稅條例的六種類型為買賣、贈與、交換、分割、典權、占有）。"]}, {"ch": "G1 契稅", "year": "103", "num": 3, "q": "依契稅條例之規定，告發或檢舉納稅義務人逃漏、匿報、短報或以其他不正當之行為逃稅者，稽徵機關得獎勵舉發人，並為舉發人絕對保守秘密，下列何者係該條例之獎勵內容？", "opts": ["得頒發國光獎章給舉發人", "得頒發地政貢獻獎給舉發人", "得以罰鍰百分之二十獎給舉發人", "得以罰鍰百分之三十獎給舉發人"], "ans": 2, "exps": ["❌ 國光獎章是國家對特殊貢獻者的榮譽勳獎，與契稅檢舉獎勵無關。", "❌ 地政貢獻獎為虛構獎項，非契稅條例的獎勵內容。", "✓ 契稅條例第43條：檢舉獎金為罰鍰的「20%」，同105-37、106-16等題的固定考點。20%是契稅檢舉制度的固定獎勵比例。", "❌ 30%不是法定獎勵比例，正確是20%。"]}, {"ch": "G1 契稅", "year": "104", "num": 36, "q": "有關契稅之課徵，下列敘述，何者錯誤？", "opts": ["在開徵土地增值稅區域之土地，免徵契稅", "占有契稅之稅率，為其契價之百分之六", "典權契稅，應由出典人申報納稅", "契稅由直轄市及縣（市）稅捐稽徵處（地方稅務局）徵收或鄉、鎮、市、區公所代徵之"], "ans": 2, "exps": ["❌ 本選項描述正確，符合契稅條例規定（已開徵土增稅的土地免徵契稅），非錯誤。", "❌ 本選項描述正確，占有契稅稅率6%，非錯誤。", "✓ 本選項為錯誤敘述：典權契稅的納稅義務人是「典權人」（不是出典人），與101年第31題稅率一樣，這是契稅條例「納稅義務人」表中最容易與直覺相反的考點——出典人是把不動產出典出去的人，典權人是付出典價取得使用收益權的人，課稅對象是「取得權利的人」（典權人）。", "❌ 本選項描述正確，符合契稅徵收機關規定，非錯誤。"]}, {"ch": "G1 契稅", "year": "104", "num": 37, "q": "依契稅條例之規定，不動產移轉發生糾紛時，其申報契稅之起算日期，以下列何者為準？", "opts": ["應由雙方當事人會同申報日", "以政府核發使用執照之日", "以法院判決確定日", "以法院發給權利移轉證明書之日"], "ans": 2, "exps": ["❌ 不動產移轉發生糾紛時，並非以「雙方會同申報日」為起算日（糾紛情形下雙方通常無法會同申報）。", "❌ 此為「建造完成前因買賣交換贈與分割變更起造人名義」情形的起算日，不是糾紛情形。", "✓ 契稅條例：不動產移轉發生糾紛時，其申報契稅之起算日期，以「法院判決確定日」為準。糾紛經司法程序解決後，以判決確定的時點作為申報起算日，這個考點與土地增值稅「依法院判決移轉登記者的審核標準」要區分清楚（土增稅是起訴日或判決確定日依年度而異；契稅固定是判決確定日）。", "❌ 此為「向法院標購拍賣不動產」情形的起算日，不是糾紛情形。"]}, {"ch": "G1 契稅", "year": "105", "num": 2, "q": "依契稅條例規定，下列何種情形得免徵契稅？", "opts": ["向法院標購所得之拍賣不動產者", "政府因公務需要，以公有不動產交換取得不動產所有權者", "依法標購公產者", "先典後賣取得不動產者"], "ans": 1, "exps": ["❌ 本選項描述的情形（向法院標購拍賣不動產）依法是免徵契稅的情形（注意官方答案是B不是A，但向法院標購拍賣本身在法條中也屬免稅情形之一，依其表述方式判斷以官方公告B為唯一最佳答案）。", "✓ 契稅條例：政府機關因公務需要，以公有不動產「交換」取得不動產所有權者，免徵契稅。此為G1免徵契稅清單的核心情形之一，因屬政府內部資產調配，無移轉稅捐課徵必要。", "❌ 此情形依官方答案非本題正確選項（雖然法條中標購公產也常列為免稅情形之一，但本題官方答案明確指向B選項）。", "❌ 先典後賣是兩個獨立的契稅行為（先課典權契稅，賣出時若構成移轉再課買賣契稅），不是免徵契稅的法定情形。"]}, {"ch": "G1 契稅", "year": "105", "num": 37, "q": "甲未依法繳納契稅，請問目前應移送何處強制執行？", "opts": ["普通法院", "行政法院", "法務部行政執行署所屬行政執行分署", "財政部國有財產署"], "ans": 2, "exps": ["❌ 普通法院負責民刑事訴訟，不是稅捐強制執行的機關。", "❌ 行政法院負責行政訴訟，不是強制執行機關。", "✓ 未依法繳納契稅（欠稅）的強制執行，依法移送「法務部行政執行署所屬行政執行分署」辦理。這是所有稅捐（含契稅、地價稅、房屋稅等）欠稅強制執行的共通機關，是稅法體系常見的固定考點。", "❌ 國有財產署管理國有財產，不是稅捐強制執行的機關。"]}, {"ch": "G1 契稅", "year": "106", "num": 5, "q": "建築物於建造完成前，因何種原因而變更起造人名義，並取得使用執照者，應申報繳納契稅？", "opts": ["繼承", "贈與", "設典", "分割"], "ans": 1, "exps": ["❌ 建物建造完成前因繼承而變更起造人名義，依契稅條例規定是「免徵」契稅的情形，故不會「應申報繳納契稅」，本題問的是須申報的情形，繼承不適用。", "✓ 契稅條例：建築物於建造完成前，因「贈與」而變更起造人名義，並取得使用執照者，應申報繳納契稅（依贈與契稅稅率6%）。這跟「繼承」變更起造人名義免徵契稅形成對比，繼承免徵、贈與須課稅，是G1的重要區分考點。", "❌ 設典變更起造人名義不是本題情境的典型描述，建造完成前的起造人變更主要考慮繼承（免徵）和買賣交換贈與分割（應課稅）等情形。", "❌ 分割變更起造人名義應課分割契稅（2%），但本題選項中只有贈與是官方答案，分割雖也應課稅但本題答案聚焦贈與。"]}, {"ch": "G1 契稅", "year": "106", "num": 11, "q": "下列何種情形免徵契稅？", "opts": ["以遷移、補償等變相方式支付產價，取得不動產所有權者", "依法領買或標購公產及向法院標購拍賣之不動產者", "開徵土地增值稅區域之土地", "以不動產為信託財產，受託人依信託本旨移轉信託財產與委託人以外之歸屬權利人時"], "ans": 2, "exps": ["❌ 此類變相支付產價的方式，依實質課稅原則，仍應正常課徵契稅，不在免徵清單內。", "❌ 本選項本身雖也可能涉及優惠規定，但官方答案是C，本選項非本題正確答案。", "✓ 契稅條例：在「開徵土地增值稅區域之土地」，免徵契稅（因土地已課徵土地增值稅，避免重複課稅；但房屋部分仍須課徵契稅）。這是G1最核心的免徵規則，「土地免、房屋課」的搭配記憶。", "❌ 此情形依規定「應」課徵契稅（視同贈與，同101-30題），不是免徵情形。"]}, {"ch": "G1 契稅", "year": "106", "num": 16, "q": "下列有關契稅之申報起算日規定，何者錯誤？", "opts": ["不動產移轉發生糾紛時，其申報契稅之起算日期，應以法院判決確定日為準", "向政府機關標購或領買公產，以政府機關核發產權移轉證明書之日為申報起算日", "向法院標購拍賣之不動產，以法院發給權利移轉證明書之日為申報起算日", "不動產分割時，以其完成移轉登記之日為申報起算日"], "ans": 3, "exps": ["❌ 本選項描述正確，符合契稅條例規定（同104-37），非錯誤。", "❌ 本選項描述正確，符合規定，非錯誤。", "❌ 本選項描述正確，符合規定，非錯誤。", "✓ 本選項為錯誤敘述：不動產分割的契稅申報起算日，應以「訂立分割契約之日」（與一般買賣相同，採訂約日原則）為準，不是「完成移轉登記之日」。本選項把分割申報起算日的時點說錯了。"]}, {"ch": "G1 契稅", "year": "106", "num": 19, "q": "甲之土地、房屋於106年7月1日設定典權並完成移轉登記予乙。下列有關納稅義務人之規定，何者錯誤？", "opts": ["當年度地價稅之納稅義務人為甲", "107年期房屋稅之納稅義務人為乙", "典權契稅之納稅義務人為乙", "土地增值稅之納稅義務人為甲"], "ans": 0, "exps": ["✓ 本選項為本題「錯誤」的答案：106年7月1日設定典權並完成移轉登記予乙後，地價稅的納稅義務人應改為「典權人乙」（典權人是地價稅法定納稅義務人，不是出典人甲），故說「當年度地價稅之納稅義務人為甲」是錯誤的，本題答案以「典權設定後是典權人負擔地價稅」的原則為核心考點。", "❌ 本選項描述正確：典權人乙是房屋稅的法定納稅義務人（同地價稅原則，典權人取得使用收益權），107年期（次年度）房屋稅自應由乙負擔，非錯誤。", "❌ 本選項描述正確：典權契稅的納稅義務人是典權人（乙），符合契稅條例規定（同104-36題），非錯誤。", "❌ 本選項描述正確：設定典權時的土地增值稅納稅義務人是「出典人」（甲，預繳），非錯誤。"]}, {"ch": "G1 契稅", "year": "106", "num": 32, "q": "依契稅條例之規定，契稅之課稅基礎是？", "opts": ["實價", "市價", "房價", "契價"], "ans": 3, "exps": ["❌ 契稅的課稅基礎不是實際買賣價格，而是評定的契價。", "❌ 契稅課稅基礎不是市場價格，避免市價波動造成課稅爭議。", "❌ 「房價」非法定用語。", "✓ 契稅條例：契稅之課稅基礎是「契價」，即以當地不動產評價委員會評定之標準價格為準（非市價、非實際買賣價格）。契價是G1最核心的基本概念，須與土地增值稅的「漲價總數額」、地價稅的「申報地價」區分清楚。"]}, {"ch": "G1 契稅", "year": "107", "num": 23, "q": "買賣契稅之稅率，為其契價百分之六。所稱契價，以何者為準？", "opts": ["以實際買賣價格為準", "以當地不動產評價委員會評定之標準價格為準", "以當地地價及標準地價評議委員會評定之標準價格為準", "以當地建築主管機關公告之房屋造價為準"], "ans": 1, "exps": ["❌ 契價不是以實際買賣價格為準，避免市場交易價格波動造成課稅困難，且容易誤導以為與不動產買賣中實際成交價有關。", "✓ 同106-32，契稅課稅基礎「契價」是以「當地不動產評價委員會評定之標準價格」為準。不動產評價委員會（與房屋稅的房屋標準價格評定機關相同）是契稅契價評定的法定機關。", "❌ 地價及標準地價評議委員會是負責「地價稅」累進起點地價及公告地價評定的機關，不是契稅契價的評定機關，兩者機關不同，這是常見的混淆陷阱。", "❌ 建築主管機關公告的房屋造價不是契稅契價的評定依據，契價評定機關是不動產評價委員會。"]}, {"ch": "G1 契稅", "year": "109", "num": 2, "q": "關於契稅稅率依契稅條例之規定，下列敘述何者錯誤？", "opts": ["買賣契稅為其契價百分之六", "贈與契稅為其契價百分之六", "占有契稅為其契價百分之六", "典權契稅為其契價百分之六"], "ans": 3, "exps": ["❌ 本選項描述正確，6%是買賣契稅稅率，非錯誤。", "❌ 本選項描述正確，6%是贈與契稅稅率，非錯誤。", "❌ 本選項描述正確，6%是占有契稅稅率，非錯誤。", "✓ 本選項為錯誤敘述：典權契稅稅率是「4%」，不是6%，這是契稅六種類型中與買賣贈與占有（同為6%）不同的特殊稅率（交換分割是2%，典權是4%，買賣贈與占有是6%）。"]}, {"ch": "G1 契稅", "year": "109", "num": 18, "q": "依契稅條例規定，買賣契稅，應由下列何者申報納稅？", "opts": ["銀行", "出賣人", "買受人", "不動產仲介公司"], "ans": 2, "exps": ["❌ 銀行不是契稅的法定納稅義務人，除非銀行本身為不動產買受人。", "❌ 買賣契稅的納稅義務人是「買受人」（取得所有權人），不是出賣人，這是契稅最重要的反直覺考點。", "✓ 契稅條例第4條：買賣契稅應由「買受人」（取得不動產所有權之人）申報納稅，與一般人直覺「賣方收錢，賣方繳稅」的想法相反，是G1最核心的固定考點。", "❌ 不動產仲介公司是居間或代理服務的提供者，不是契稅的法定納稅義務人。"]}, {"ch": "G1 契稅", "year": "110", "num": 22, "q": "依契稅條例規定，以不動產為信託財產，受託人乙依信託本旨移轉信託財產與委託人甲以外之歸屬權利人丙時，應由何人估價立契，在規定之期限申報契稅？又其契稅稅率為何？", "opts": ["由乙申報契稅，稅率為6%", "由乙申報契稅，稅率為2%", "由丙申報契稅，稅率為6%", "由甲申報契稅，稅率為2%"], "ans": 2, "exps": ["❌ 申報主體應是丙（歸屬權利人），不是乙（受託人），主體錯誤。", "❌ 申報主體錯誤（應為丙），稅率也錯誤（信託歸屬視同贈與，稅率應為6%，不是2%）。", "✓ 同101-30的考點：受託人乙依信託本旨將信託財產移轉與「委託人以外的歸屬權利人丙」時，視同贈與，由「歸屬權利人丙」申報契稅，稅率為「贈與契稅6%」。本選項正確描述了申報主體（丙）和稅率（6%）。", "❌ 申報主體和稅率都錯誤，甲是委託人，不是本次移轉的申報義務人。"]}, {"ch": "G1 契稅", "year": "111", "num": 5, "q": "依契稅條例之規定，下列敘述何者錯誤？", "opts": ["買賣契稅，應由出賣人申報納稅", "典權契稅，應由典權人申報納稅", "買賣契稅之稅率為其契價百分之六", "分割契稅之稅率為其契價百分之二"], "ans": 0, "exps": ["✓ 本選項為錯誤敘述：買賣契稅應由「買受人」申報納稅，不是出賣人，本題以此核心考點作為「何者錯誤」的答案。", "❌ 本選項描述正確，典權人是典權契稅的法定納稅義務人（同104-36題），非錯誤。", "❌ 本選項描述正確，6%是買賣契稅稅率，非錯誤。", "❌ 本選項描述正確，2%是分割契稅稅率，非錯誤。"]}, {"ch": "G1 契稅", "year": "111", "num": 6, "q": "依契稅條例之規定，以不動產為信託財產時，在信託關係人間移轉所有權時，何種情形須課徵契稅？", "opts": ["因信託行為成立，委託人與受託人間", "信託契約明定信託財產之歸屬人為第三人者，信託關係消滅時，委託人與歸屬人間", "因信託行為不成立，委託人與受託人間", "信託關係存續中受託人變更時，原受託人與新受託人間"], "ans": 1, "exps": ["❌ 信託成立時的移轉，依契稅條例規定免徵契稅（同信託土地增值稅免課的精神），不是須課徵的情形。", "✓ 本選項依官方答案，是須課徵契稅的情形——當信託契約明定信託財產的歸屬人是「第三人」（非委託人本人），信託關係消滅時，財產從受託人移轉給該第三人歸屬人，這個移轉涉及「委託人」對「第三人」的實質贈與性質移轉，依規定須課徵契稅（贈與性質）。本題情境略不同於101-30、110-22（受託人移轉給歸屬人），本題是描述信託架構下「委託人與歸屬人」之間關係消滅時的課稅情形，依官方答案此情形應課契稅。", "❌ 信託行為「不成立」，財產根本沒有發生信託移轉，自然不涉及課稅問題，此選項描述邏輯矛盾。", "❌ 受託人變更（原受託人到新受託人）是信託財產的形式性轉移，不課徵契稅（性質與不課徵土地增值稅的情形相同）。"]}, {"ch": "G1 契稅", "year": "111", "num": 7, "q": "依契稅條例之規定，下列何種契約的契稅稅率最低？", "opts": ["買賣契約", "典權契約", "分割契約", "贈與契約"], "ans": 2, "exps": ["❌ 買賣契稅稅率6%，不是最低。", "❌ 典權契稅稅率4%，不是最低。", "✓ 契稅條例六種契稅類型中，稅率最低的是「交換」和「分割」，均為2%，本選項列出分割（2%），是六種類型中最低稅率，符合本題「何者稅率最低」的提問。", "❌ 贈與契稅稅率6%，不是最低。"]}, {"ch": "G1 契稅", "year": "112", "num": 12, "q": "以下關於契稅之敘述，何者正確？", "opts": ["買賣契稅應由出賣人申報納稅", "贈與契稅應由贈與人估價立契，申報納稅", "典權契稅，應由典權人申報納稅", "占有契稅稅率為其契價百分之二"], "ans": 2, "exps": ["❌ 買賣契稅應由「買受人」申報納稅，不是出賣人，描述錯誤。", "❌ 贈與契稅應由「受贈人」申報納稅，不是贈與人，描述錯誤。", "✓ 同104-36、111-5，典權契稅的納稅義務人是典權人，本選項正確描述。", "❌ 占有契稅稅率是6%（同100-9題），不是2%，數字錯誤。"]}, {"ch": "G1 契稅", "year": "113", "num": 20, "q": "依契稅條例規定，有關申報契稅之起算日期，下列何者正確？", "opts": ["向政府機關標購公產，以政府機關核准產權移轉之日為申報起算日", "不動產移轉發生糾紛時，以法院判決確定之日為申報起算日", "向法院標購拍賣之不動產，以承買人拍定之日為申報起算日", "建築物於建造完成前，因交換以承受人為建造執照原始起造人者，以主管建築機關核發使用執照之日為申報起算日"], "ans": 1, "exps": ["❌ 應以「政府機關核發產權移轉證明書之日」為準，不是「核准產權移轉之日」，用語不夠精確。", "✓ 同104-37、106-16，糾紛情形下以法院判決確定日為申報起算日，本選項正確。", "❌ 應以「法院發給權利移轉證明書之日」為準，不是「承買人拍定之日」，拍定日是程序中的一個時點，但法定起算日是發給證明書日。", "❌ 本選項描述方向接近正確（建造完成前因交換變更起造人，以核發使用執照之日為起算日），但本題官方答案唯一是B，以官方公告為準。"]}, {"ch": "G1 契稅", "year": "113", "num": 23, "q": "下列有關契稅納稅義務人之敘述，何者正確？", "opts": ["受託人依信託本旨移轉信託財產與委託人以外之歸屬權利人時，由歸屬權利人申報納稅", "買賣契稅，應由出賣人申報納稅", "典權契稅，應由出典人申報納稅", "交換有給付差額價款者，其差額價款，應由出賣人申報納稅"], "ans": 0, "exps": ["✓ 同101-30、110-22，受託人移轉給委託人以外的歸屬權利人，由歸屬權利人申報納稅（贈與契稅），本選項正確描述了申報義務人。", "❌ 應由買受人申報納稅，不是出賣人，描述錯誤。", "❌ 應由典權人申報納稅，不是出典人，描述錯誤（同104-36題）。", "❌ 交換契稅的申報義務人通常是雙方互負義務，差額價款部分的申報義務人並非「出賣人」這個表述（交換沒有買賣雙方的「出賣人」概念，僅有交換雙方），本選項用語錯誤。"]}, {"ch": "G1 契稅", "year": "114", "num": 14, "q": "在不動產贈與的情形下，有關契稅稅率，下列何者為是？", "opts": ["百分之四", "百分之六", "百分之二", "百分之五"], "ans": 1, "exps": ["❌ 4%是典權契稅稅率，不是贈與契稅稅率。", "✓ 同契稅基本稅率規定，贈與契稅稅率為契價的「6%」，與買賣、占有相同。", "❌ 2%是交換或分割契稅稅率，不是贈與。", "❌ 5%不是任何契稅類型的法定稅率。"]}, {"ch": "G1 契稅", "year": "114", "num": 16, "q": "依契稅條例規定，有關納稅義務人繳納契稅期限及罰則之規定，下列敘述何者正確？", "opts": ["納稅義務人應於稽徵機關核定繳款書送達後30日內繳納", "納稅義務人不依規定期限申報者，每逾2日，加徵應納稅額百分之二之怠報金", "納稅義務人不依規定期限繳納稅款者，每逾3日，加徵應納稅額百分之二之滯納金", "納稅義務人應納契稅，匿報或短報，經主管稽徵機關查得，或經人舉發查明屬實者，除應補繳稅額外，並加處以應納稅額一倍以上二倍以下之罰鍰"], "ans": 0, "exps": ["✓ 契稅條例：納稅義務人應於稽徵機關核定繳款書送達後「30日」內繳納契稅，這是契稅標準的繳納期限（與許多稅目的30日繳納期限一致）。", "❌ 怠報金比率應為「1%」（不是2%），每逾2日加徵1%怠報金，是契稅常見陷阱。", "❌ 滯納金應是「每逾2日加徵1%」（不是每逾3日加徵2%），日數和比率都錯誤。", "❌ 罰鍰倍數應是「1倍以上3倍以下」（不是1倍以上2倍以下），數字範圍錯誤。"]}, {"ch": "H1 房地合一所得稅", "year": "105", "num": 26, "q": "依所得稅法之規定，下列關於土地房屋交易所得稅之敘述，何者正確？", "opts": ["交易之房屋、土地係於103年1月1日之次日以後取得，並持有期間少於2年者，應予課徵所得稅", "於103年1月1日之次日後取得依農業發展條例申請興建之農舍，應予課徵所得稅", "交易前無出租、供營業或執行業務使用者，應免納所得稅", "被徵收前先行協議價購之土地及其改良物，應予課徵所得稅"], "ans": 0, "exps": ["✓ 房地合一稅的課稅範圍適用於「105年1月1日以後取得」的房屋土地，但本選項是另一個過渡判斷規則：「103年1月1日之次日（即103年1月2日）以後取得」且「持有期間少於2年」，仍屬於舊制下「視為短期投機交易」而納入課稅的特殊規定（過渡條款），用以防杜在新制上路前提前轉手規避房地合一稅。", "❌ 依農業發展條例申請興建之農舍，原則上適用舊制（僅就房屋部分課徵財產交易所得，課綜合所得稅），不適用房地合一新制，本選項描述錯誤。", "❌ 無出租供營業或執行業務使用，是自住房屋優惠的要件之一，但不代表「應免納所得稅」（仍須符合持有滿6年、戶籍登記等其他要件才能適用自住優惠，且優惠也非全免，是400萬以下免稅、超過按10%課徵），本選項描述過於簡化且不正確。", "❌ 因徵收（含先行協議價購）取得對價而移轉之房地，依規定排除適用房地合一所得稅（比照土地稅法被徵收免徵土增稅的精神），不應課徵所得稅，本選項描述錯誤。"]}, {"ch": "H1 房地合一所得稅", "year": "106", "num": 7, "q": "依105年1月1日起實施的房地合一所得稅制規定，因財政部公告之調職、非自願離職或其他非自願性因素，交易持有期間在2年以下之房屋、土地者，其稅率為何？", "opts": ["45%", "35%", "20%", "15%"], "ans": 2, "exps": ["❌ 45%是持有1年以內的一般稅率，不是調職等非自願因素的優惠稅率。", "❌ 35%是持有超過1年未逾2年的一般稅率，不是優惠稅率。", "✓ 所得稅法：因財政部公告之調職、非自願離職或其他非自願性因素，交易持有期間在2年以下（依當年版本）之房屋土地，適用優惠稅率「20%」（取代原本可能適用的45%或35%高稅率），這是對非自願性短期交易的政策性減輕。", "❌ 15%是持有超過5年的一般長期稅率，不是調職等非自願因素的優惠稅率。"]}, {"ch": "H1 房地合一所得稅", "year": "106", "num": 15, "q": "個人及營利事業出售依農業發展條例申請興建的農舍，應如何計徵所得稅？", "opts": ["依104年12月31日前實施之舊制，僅就土地部分計算財產交易所得，課徵綜合所得稅", "依104年12月31日前實施之舊制，僅就房屋部分計算財產交易所得，課徵綜合所得稅", "依105年1月1日起實施之新制，房屋、土地均應按實價計算交易所得課稅", "不論新、舊制，均免徵所得稅"], "ans": 1, "exps": ["❌ 舊制下農舍的計算方式不是僅就「土地部分」，而是僅就「房屋部分」計算（土地部分依土地稅法課土地增值稅，不再併入財產交易所得計算所得稅），本選項弄反了。", "✓ 依農業發展條例申請興建的農舍（屬於舊制下的特殊房屋類型），出售時依104年12月31日前的舊制規定，「僅就房屋部分」計算財產交易所得，課徵綜合所得稅（土地部分依土地稅法課徵土地增值稅，不再計入此處的財產交易所得）。這是農舍課稅的特殊延續規定，不適用105年後的房地合一新制。", "❌ 農舍依規定不適用105年新制（房地合一稅），而是延續舊制（僅房屋部分課稅），本選項描述錯誤。", "❌ 農舍出售並非完全免稅，房屋部分仍應課徵財產交易所得稅（舊制），本選項描述錯誤。"]}, {"ch": "H1 房地合一所得稅", "year": "106", "num": 31, "q": "關於房地交易課徵所得稅之稅率規定，下列敘述何者錯誤？", "opts": ["個人持有房屋、土地之期間在1年以內者，稅率為45%", "個人持有房屋、土地之期間超過1年，未逾2年者，稅率為35%", "個人持有房屋、土地之期間超過2年，未逾10年者，稅率為25%", "個人持有房屋、土地之期間超過10年者，稅率為15%"], "ans": 2, "exps": ["❌ 本選項描述正確，1年以內稅率45%，非錯誤。", "❌ 本選項描述正確，超過1年未逾2年稅率35%，非錯誤。", "✓ 本選項為錯誤敘述：105年實施的房地合一稅原始版本，持有超過2年未逾10年的稅率分級較細（後續修法後也有變化，但「未逾10年25%」這個單一級距描述過於籠統不精確），正確的細分應為「超過2年未逾5年：20%」「超過5年：15%」這樣的分級（依現行法），本選項把2-10年合併為單一25%級距，與正確的稅率結構不符。", "❌ 本選項描述的「超過10年15%」與現行法「超過5年即為15%」的門檻不同，但官方答案聚焦在C選項的錯誤，本選項依該年度法律版本可能另有不同解讀，以官方答案C為準。"]}, {"ch": "H1 房地合一所得稅", "year": "106", "num": 40, "q": "甲105年6月買入A房地，購入成本1,300萬元，於106年2月以2,000萬元出售A房地時，繳納土地增值稅10萬元（土地漲價總數額為100萬元），因取得、改良及移轉而支付的費用50萬元，其應納交易所得稅若干？", "opts": ["1,925,000元", "2,240,000元", "2,475,000元", "2,880,000元"], "ans": 2, "exps": ["❌ 計算方式或數字代入有誤，未正確套用公式。", "❌ 計算方式或數字代入有誤。", "✓ 計算過程：交易所得額＝成交價額－原始取得成本－取得改良移轉費用－土地漲價總數額＝2,000萬－1,300萬－50萬－100萬（漲價總數額，非繳納的土增稅10萬）＝550萬元。持有期間：105年6月買入、106年2月出售，持有期間約8個月（未滿1年），適用稅率45%。應納稅額＝550萬×45%＝247.5萬元＝2,475,000元。本題重要陷阱：扣除的是「土地漲價總數額」（100萬），不是「已繳納的土地增值稅」（10萬）。", "❌ 此數字可能誤用了錯誤的扣除項（如扣除土增稅10萬而非漲價總數額100萬），導致計算結果偏高。"]}, {"ch": "H1 房地合一所得稅", "year": "107", "num": 25, "q": "依所得稅法規定，有關出售自住房屋，其房地交易所得稅之優惠，下列敘述，何者錯誤？", "opts": ["免稅所得額，以按該法第14條之4第3項規定計算之餘額不超過四百萬元為限", "個人或其配偶、直系親屬辦竣戶籍登記、持有並居住於該房屋連續滿六年", "交易前六年內，無出租、供營業或執行業務使用", "個人與其配偶及未成年子女於交易前六年內未曾適用該法第4條之5第1項第1款規定"], "ans": 1, "exps": ["❌ 本選項描述正確，400萬元免稅額度符合規定，非錯誤。", "✓ 本選項為錯誤敘述：自住房屋優惠的法定要件，要求「個人」（本人）或其配偶、直系親屬辦竣戶籍登記，「並由本人」持有並居住於該房屋連續滿6年（強調是申請人本人的持有與居住要件，不是配偶或直系親屬代為持有居住即可滿足）。本選項把「個人或其配偶直系親屬」這個並列關係套用到「持有並居住連續滿6年」的要件上，過度擴張了適用範圍，描述不夠精確，故為本題錯誤敘述。", "❌ 本選項描述正確，6年內無出租等使用是法定要件，非錯誤。", "❌ 本選項描述正確，6年內未曾適用過自住優惠是法定要件之一（避免重複適用），非錯誤。"]}, {"ch": "H1 房地合一所得稅", "year": "108", "num": 10, "q": "下列敘述何者正確？", "opts": ["個人房屋、土地交易損失，得自交易日以後五年內之房屋、土地交易所得減除之", "個人房屋、土地交易損失，得自交易日以後七年內之房屋、土地交易所得減除之", "重購之自住房屋、土地，於重購後五年內改作其他用途或再行移轉時，應追繳原扣抵或退還稅額", "重購之自住房屋、土地，於重購後七年內改作其他用途或再行移轉時，應追繳原扣抵或退還稅額"], "ans": 2, "exps": ["❌ 法定扣除期限是「3年內」（不是5年），數字錯誤。", "❌ 7年遠超法定的3年期限，數字錯誤。", "✓ 所得稅法：重購自住房屋土地享有重購退稅優惠後，於重購後「5年內」改作其他用途或再行移轉者，應追繳原扣抵或退還稅額。5年是房地合一稅重購退稅後的監管期間，與土地增值稅重購退稅後的5年監管期間（土地稅法第35條）邏輯一致。", "❌ 法定期限是5年（不是7年），數字錯誤。"]}, {"ch": "H1 房地合一所得稅", "year": "109", "num": 3, "q": "土地所有權人於出售土地後，依土地稅法規定，下列何種情形得申請就其已納土地增值稅額內，退還其不足支付新購土地地價之數額？", "opts": ["土地所有權人於先購買土地後，自完成移轉登記之日起二年後，始行出售土地者", "其新購土地地價超過原出售土地地價，扣除繳納房地交易所得稅後之餘額者", "自耕之農業用地出售後，於二年內另行購買仍供自耕之農業用地者", "土地出售前一年內，曾供營業使用或出租者"], "ans": 2, "exps": ["❌ 重購退稅的法定流程應是「先出售後重購」，且重購應在出售後「2年內」完成（不是「先購買後2年後再出售」這種顛倒時序），本選項時序錯誤。", "❌ 此選項涉及的扣除項目是「房地交易所得稅」，但土地增值稅重購退稅的比較基準應是「原出售土地地價」（扣除土地增值稅後的餘額），與房地交易所得稅無關，混淆了兩種不同稅目的退稅規則。", "✓ 土地稅法規定，自耕之農業用地出售後，於「2年內」另行購買仍供自耕之農業用地者，得申請就其已納土地增值稅額內，退還其不足支付新購土地地價之數額。這是農地重購退稅的特殊規定，2年是法定的重購期限。", "❌ 重購退稅的要件之一是出售前「無」供營業使用或出租（符合自用住宅或自耕農地的要件），本選項說「曾供營業使用或出租」恰好與要件相反，不符合退稅條件。"]}, {"ch": "H1 房地合一所得稅", "year": "110", "num": 23, "q": "有關中華民國境內居住之個人，依所得稅法規定計算之房屋、土地交易所得，減除當次交易依土地稅法第30條第1項規定公告土地現值計算之土地漲價總數額後之餘額，不併計綜合所得總額，其稅率計算下列何者正確？", "opts": ["持有房屋、土地之期間在三年以內者，稅率為百分之四十五", "持有房屋、土地之期間超過三年，未逾五年者，稅率為百分之三十五", "持有房屋、土地之期間超過五年，未逾十年者，稅率為百分之三十", "持有房屋、土地之期間超過十年者，稅率為百分之十五"], "ans": 3, "exps": ["❌ 45%的門檻應是「持有1年以內」（不是3年以內），數字錯誤。", "❌ 35%的門檻應是「超過1年未逾2年」（不是超過3年未逾5年），數字錯誤。", "❌ 30%不是現行法定稅率，現行架構沒有此級距。", "✓ 依本題（110年）官方答案，持有期間超過10年者，稅率為15%。注意此題的級距描述與標準四級制（1年內45%、1-2年35%、2-5年20%、超過5年15%）略有不同，可能反映該年度題目對長期持有級距的特殊表述方式，以官方答案D為準（持有期間越長稅率越低的方向是一致的）。"]}, {"ch": "H1 房地合一所得稅", "year": "110", "num": 24, "q": "依所得稅法規定，個人出售自住房屋、土地，依規定繳納之稅額，申請房地合一所得稅重購退稅之敘述，下列何者錯誤？", "opts": ["需自完成移轉登記之日起算二年內，重購自住房屋、土地者", "得於重購自住房屋、土地完成移轉登記次日起算二年內，申請退稅", "申請按重購價額占出售價額之比率，自所繳納稅額計算退還", "重購之自住房屋、土地，於重購後五年內改作其他用途或再行移轉時，應追繳原退還稅額"], "ans": 1, "exps": ["❌ 本選項描述正確，2年內重購是基本要件，非錯誤。", "✓ 本選項為錯誤敘述：申請退稅的期限應自「原出售房屋出售完成後」起算（或重購完成之日起算，依規定申請），但不是「重購完成移轉登記次日起算2年內」這個時間框架——實際上重購退稅應在「重購完成」後即可申請，不應另外給予「次日起算2年」這麼長的緩衝期申請退稅，此選項的時間描述與正確規定的「及時申請」精神不符，為本題錯誤答案。", "❌ 本選項描述正確，按重購價額占出售價額比率計算退稅金額，符合規定，非錯誤。", "❌ 本選項描述正確，5年監管期限符合規定（同108-10），非錯誤。"]}, {"ch": "H1 房地合一所得稅", "year": "110", "num": 25, "q": "依所得稅法規定，陳先生在110年10月以900萬元出售其於107年以700萬元購入之房地產，110年當期土地之公告現值為800萬元，陳先生個人未提示因取得、改良及移轉而支付之費用時，稽徵機關得以多少元計算其費用？", "opts": ["24萬元", "27萬元", "30萬元", "45萬元"], "ans": 1, "exps": ["❌ 此數字計算基礎或比率有誤。", "✓ 房地合一稅規定：個人未提示因取得改良及移轉而支付之費用證明者，稽徵機關得按「成交價額的3%」計算其費用。本題成交價額900萬元，900萬×3%＝27萬元。注意計算基礎是「成交價額」（900萬），不是「公告現值」（800萬）或「原購入成本」（700萬），這是本題的核心陷阱。", "❌ 此數字若以800萬（公告現值）×3.75%或其他比率計算，不符合法定3%×成交價額的公式。", "❌ 此數字過高，若以900萬×5%計算則不符合法定3%比率。"]}, {"ch": "H1 房地合一所得稅", "year": "112", "num": 23, "q": "依所得稅法之規定，個人依第14條之4前2項規定計算之房屋、土地交易所得，減除當次交易依土地稅法第30條第1項規定公告土地現值計算之土地漲價總數額後之餘額，不併計綜合所得總額，按相關規定稅率計算應納稅額，其在中華民國境內居住之個人應納稅額，下列何者正確？", "opts": ["持有房屋、土地之期間在二年以內者，稅率為百分之三十五", "持有房屋、土地之期間超過二年，未逾五年者，稅率為百分之二十五", "因財政部公告之調職、非自願離職或其他非自願性因素，交易持有期間在五年以下之房屋、土地者，稅率為百分之二十", "個人以自有土地與營利事業合作興建房屋，自土地取得之日起算五年內完成並銷售該房屋、土地者，稅率為百分之二十五"], "ans": 2, "exps": ["❌ 2年以內的稅率應分兩段（1年內45%、1-2年35%），不能籠統說「2年以內35%」，1年以內的稅率（45%）比本選項描述的更高，本選項簡化錯誤。", "❌ 超過2年未逾5年的法定稅率是「20%」（不是25%），數字錯誤。", "✓ 同106-7考點的進階版：因調職非自願離職等非自願性因素，交易持有期間在「5年以下」（注意此題的門檻是5年，比106-7題的2年以下更寬，顯示優惠範圍隨修法擴大），適用優惠稅率「20%」。", "❌ 合作興建房屋的優惠稅率應是「20%」（不是25%），數字錯誤，這是另一個常與調職非自願離職並列的5年期優惠情形，稅率同樣是20%。"]}, {"ch": "H1 房地合一所得稅", "year": "113", "num": 25, "q": "依所得稅法規定，個人以自有土地與營利事業合作興建房屋，自土地取得之日起算五年內完成並銷售該房屋、土地者，其所得稅稅率為何？", "opts": ["百分之十", "百分之十五", "百分之二十", "百分之二十五"], "ans": 2, "exps": ["❌ 10%不是合作興建房屋的優惠稅率。", "❌ 15%是持有超過5年的一般長期稅率，不是合作興建房屋的特殊優惠稅率。", "✓ 同112-23題D選項的考點，個人以自有土地與營利事業合作興建房屋，自土地取得之日起算「5年內」完成並銷售該房屋土地者，所得稅稅率為「20%」。20%是這類合作興建特殊情形的固定優惠稅率，與調職非自願離職的優惠稅率相同。", "❌ 25%不是合作興建房屋的法定優惠稅率，正確答案是20%。"]}, {"ch": "I1 耕地三七五減租", "year": "101", "num": 3, "q": "依土地法規定，下列何者情形無優先購買權之適用？", "opts": ["共有人出賣其應有部分時，其他共有人得以同一價格優先承購", "出租人出賣耕地時，耕地承租人有依同樣條件優先承買之權", "基地出賣時，承租人有依同樣條件優先購買之權", "房屋出賣時，承租人有依同樣條件優先購買之權"], "ans": 3, "exps": ["❌ 此為土地法第34條之1規定的優先購買權，確實有適用，不是「無優先購買權」的情形。", "❌ 此為耕地三七五減租條例第15條規定（或土地法第107條）的優先承買權，確實有適用，不是「無優先購買權」的情形。", "❌ 此為土地法第104條規定的優先購買權，確實有適用，不是「無優先購買權」的情形。", "✓ 土地法第104條規定的是「基地」出賣時承租人有優先購買權，而非「房屋」出賣時承租人有優先購買權。房屋承租人對於其承租的房屋本身被出賣，並無土地法明文的優先購買權規定，這是A3/A4/I1常見的混淆陷阱——優先購買權是針對「基地」（土地），不是房屋本身。"]}, {"ch": "I1 耕地三七五減租", "year": "101", "num": 5, "q": "依土地法規定，不定期耕地租約得以終止之情形，並不包含下列何者？", "opts": ["耕地依法變更其使用時", "承租人將一部分耕地轉租於他人", "承租人非因不可抗力繼續一年不為耕作者", "地租積欠達一年之總額時"], "ans": 3, "exps": ["❌ 此為土地法（或耕地三七五減租條例）規定不定期限耕地租約得終止之事由之一，屬之。", "❌ 承租人擅自轉租耕地，是法定終止租約的事由之一，屬之。", "❌ 此為法定終止事由之一，屬之。", "✓ 本題問「不包含」的情形。耕地三七五減租條例第17條：地租積欠達「兩年」之總額時，出租人才得終止租約（不是一年）。本選項說「達一年之總額」，與正確的「兩年」門檻不符，故「不包含」在法定終止事由內（門檻未達）。注意：此處的「兩年」與一般土地法第103條基地租約收回（積欠租金達2年總額）的標準一致，但與房屋租賃（積欠2個月以上）不同，務必區分清楚。"]}, {"ch": "I1 耕地三七五減租", "year": "104", "num": 5, "q": "不動產優先購買權，有債權效力與物權效力之分，下列何者屬債權效力之優先購買權？", "opts": ["土地法第34條之1規定共有人之優先購買權", "土地法第104條規定承租人等之優先購買權", "土地法第107條規定耕地承租人之優先購買權", "耕地三七五減租條例第15條規定耕地承租人之優先購買權"], "ans": 0, "exps": ["✓ 通說與實務見解，土地法第34條之1第4項的他共有人優先購買權，性質上屬於「債權效力」（非物權效力）。違反通知義務時，他共有人只能請求損害賠償，不能直接塗銷已完成的移轉登記，這是與物權效力優先購買權最大的不同。", "❌ 多數實務見解認為，土地法第104條基地優先購買權具有較強的效力（部分見解認為兼具物權色彩或得對抗惡意第三人），與單純債權效力的34-1有別，本題答案不選此項。", "❌ 多數實務及通說見解認為，第107條耕地優先購買權具物權效力，本題答案不選此項。", "❌ 此為公認具有「物權效力」的優先購買權，出租人違反通知義務移轉登記者，承租人得請求法院塗銷登記，效力最強，與本題（債權效力）相反。"]}, {"ch": "I1 耕地三七五減租", "year": "104", "num": 29, "q": "公有出租耕地，經依法辦理無償撥用時，其應補償耕地承租人之費用，依平均地權條例規定，應由下列何者負擔？", "opts": ["出租機關", "耕地原管理機關", "需地機關", "耕地原主管機關"], "ans": 2, "exps": ["❌ 出租機關只是出租行為的執行單位，不是補償耕地承租人費用的負擔主體。", "❌ 原管理機關在撥用後已不再管理該土地，不是補償費用的負擔主體。", "✓ 平均地權條例規定，公有出租耕地經依法辦理無償撥用時，其應補償耕地承租人之費用，應由「需地機關」（取得並使用該土地的機關）負擔。誰使用土地、誰受益，誰就負擔補償承租人權益受損的費用，符合「使用者付費」的精神。", "❌ 原主管機關（地政機關等）不是補償費用的負擔主體，負擔主體是實際取得使用權的需地機關。"]}, {"ch": "I1 耕地三七五減租", "year": "104", "num": 30, "q": "依耕地三七五減租條例規定，有關租佃爭議處理之敘述，下列何者錯誤？", "opts": ["耕地租佃爭議，先後由鄉（鎮、市、區）公所耕地租佃委員會調處及直轄市或縣（市）政府耕地租佃委員會調解", "非經調解、調處，不得起訴", "租佃爭議之訴訟，免收裁判費", "調解、調處成立者，當事人一方不履行其義務時，他造當事人得逕向該管司法機關聲請強制執行"], "ans": 0, "exps": ["✓ 本選項為錯誤敘述：正確的程序順序應是「先由鄉鎮市區公所耕地租佃委員會『調解』，調解不成才由直轄市或縣市政府耕地租佃委員會『調處』」（即基層先「調解」、上級才「調處」），本選項把「調解」和「調處」的順序及機關層級互換了，描述錯誤。", "❌ 本選項描述正確，租佃爭議須先經調解調處程序才能起訴（訴訟先行程序），非錯誤。", "❌ 本選項描述正確，租佃訴訟免收裁判費以減輕承租人訴訟負擔，非錯誤。", "❌ 本選項描述正確，調解調處成立有強制執行力，非錯誤。"]}, {"ch": "I1 耕地三七五減租", "year": "105", "num": 22, "q": "甲向乙承租A地耕作，租約未經公證，租期自99年1月28日起至106年1月27日止，而乙於租期內將系爭A地以60萬元出售予丙，並於101年移轉予丙。乙雖未以書面通知甲行使先買權，然其確曾以口頭通知甲，而為甲所明確知悉，甲卻故意壓低價格，明示不願以60萬元購買，僅欲以50萬元買受，未行使先買權，並經證人證實上開情事。甲已知悉系爭買賣條件，待系爭A地價格上漲3倍餘後，以數年前之價格主張優先承購，有無理由？", "opts": ["有理由，因乙違背土地法書面通知先買權的義務在先，故甲仍得主張先買權", "有理由，因乙違背民法書面通知先買權的義務在先，故甲仍得主張先買權", "有理由，因乙違背耕地三七五減租條例書面通知先買權的義務在先，故甲仍得主張先買權", "無理由，因有其他證據證明通知，且縱認通知不生效力，甲如已主張讓與不破租賃，並持續付租金給丙，則甲先買權的主張已屬權利失效"], "ans": 3, "exps": ["❌ 本選項主張甲有理由，但官方答案是D（甲無理由），本題的核心爭點在於甲是否已喪失先買權主張資格，而非單純通知義務是否違反，以官方答案為準。", "❌ 同上，官方答案是甲無理由，本選項錯誤。", "❌ 同上，官方答案否定甲有理由。", "✓ 本題情境複雜：雖然乙未以「書面」通知甲（形式上違反法定通知方式），但有其他證據（口頭通知＋證人證實）證明甲已實際知悉買賣條件；且甲事後選擇主張「買賣不破租賃」並持續向受讓人丙繳納租金（等於默示承認丙的所有權及租賃關係），多年後才以「未受書面通知」為由主張先買權，依誠信原則及「權利失效」理論（長期不行使權利且有特別情事使對方正當信賴其不再主張），甲的主張已屬權利失效，無理由。"]}];
const CHS=[...new Set(CARDS.map(c=>c.ch))];
let sel=Object.fromEntries(CHS.map(c=>[c,1]));
let ans={};
const g=id=>document.getElementById(id);
function renderPills(){
  const p=g('pills');p.innerHTML='';
  CHS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='pill'+(sel[ch]?' on':'');
    b.textContent=ch;
    b.onclick=()=>{sel[ch]=sel[ch]?0:1;renderPills();renderList();};
    p.appendChild(b);
  });
}
function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}
function selNone(){Object.keys(sel).forEach(k=>sel[k]=0);renderPills();renderList();}
function resetAll(){if(!confirm('確定要清除所有作答記錄？'))return;ans={};renderList();updateProg();}
function renderList(){
  const list=g('list');list.innerHTML='';
  const vis=CARDS.filter(c=>sel[c.ch]);
  let lastCh='';
  vis.forEach(card=>{
    const idx=CARDS.indexOf(card);
    if(card.ch!==lastCh){
      const h=document.createElement('div');h.className='ch-header';h.textContent=card.ch;list.appendChild(h);lastCh=card.ch;
    }
    list.appendChild(makeCard(card,idx));
  });
  updateProg();
}
function makeCard(card,idx){
  const a=ans[idx];
  const div=document.createElement('div');
  div.className='qcard'+(a?(a.ok?' answered-ok':' answered-ng'):'');
  div.id='c'+idx;
  div.innerHTML='<div class="qmeta"><span>【'+card.year+'年第'+card.num+'題】</span><span class="qtag">'+card.ch+'</span></div><div class="qtext">'+card.q+'</div>';
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="ltr">'+l+'</span><span>'+card.opts[i]+'</span>';
    if(a){b.disabled=true;if(i===card.ans)b.classList.add('show-correct');if(i===a.chosen&&!a.ok)b.classList.add('ng');}
    else b.onclick=(i=>()=>pick(idx,i))(i);
    opts.appendChild(b);
  });
  div.appendChild(opts);
  const eb=document.createElement('div');eb.className='expbox'+(a?' show':'');eb.id='e'+idx;
  eb.innerHTML='<div class="exph">&#128218; 逐選項解析</div><div class="expb" id="eb'+idx+'">'+(a?buildExp(card,a.chosen,a.ok):'')+'</div>';
  div.appendChild(eb);
  return div;
}
function buildExp(card,chosen,ok){
  let h='<div style="margin-bottom:7px;"><span class="verdict '+(ok?'ok':'ng')+'">'+(ok?'答對了':'答錯了')+'</span></div>';
  ['A','B','C','D'].forEach((l,i)=>{
    const ec=i===card.ans?'ok':(i===chosen&&!ok?'ng':'no');
    h+='<div class="ei"><span class="el '+ec+'">'+l+'</span><span>'+(card.exps[i]||'')+'</span></div>';
  });
  return h;
}
function pick(idx,chosen){
  const card=CARDS[idx];const ok=(chosen===card.ans);
  ans[idx]={chosen,ok};
  const div=g('c'+idx);
  div.className='qcard'+(ok?' answered-ok':' answered-ng');
  div.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;b.onclick=null;
    if(i===card.ans)b.classList.add('show-correct');
    if(i===chosen&&!ok)b.classList.add('ng');
  });
  g('eb'+idx).innerHTML=buildExp(card,chosen,ok);
  g('e'+idx).classList.add('show');
  updateProg();
}
function updateProg(){
  const vis=CARDS.filter(c=>sel[c.ch]);
  const tot=vis.length,done=vis.filter(c=>ans[CARDS.indexOf(c)]!==undefined).length;
  const cor=vis.filter(c=>{const a=ans[CARDS.indexOf(c)];return a&&a.ok;}).length;
  g('pd').textContent=done;g('pt').textContent=tot;
  g('pr').textContent=done?Math.round(cor/done*100)+'%':'-';
  g('pf').style.width=tot?done/tot*100+'%':'0%';
}
renderPills();renderList();</script>
