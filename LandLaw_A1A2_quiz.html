<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>土地法 A1+A2 考題解析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.72rem;padding:5px 11px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .2s;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.64rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);transition:all .15s;}
.opt:disabled{cursor:default;}
.ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}.el.no{background:#b0b8c4;color:#fff;}.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}
</style>
</head>
<body>
<div class="app">
<h1>土地法 A1+A2 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">A1 總則 ／ A2 土地登記｜共 76 題</div>
<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>
<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text"><span id="pd">0</span>/<span id="pt">0</span> 已答・正確率 <span id="pr">-</span></div>
</div>
<div id="list"></div>
</div>
<script>
const CARDS=[{"ch": "A1", "chName": "A1 總則", "year": "99", "num": 1, "q": "以在他人土地為農作、森林、養殖、畜牧、種植竹木或保育為目的而設定之土地他項權利，稱為下列何種權利？", "opts": ["地上權", "耕作權", "農役權", "農育權"], "ans": 3, "exps": ["❌ 地上權是以在他人土地上「有建築物或其他工作物」或「竹木」為目的，但農育權的定義更明確涵蓋農作、森林、養殖、畜牧、種植竹木或保育，兩者雖有重疊，但本題所列功能是農育權的完整定義。", "❌ 耕作權是土地法所創設、供農業上使用的他項權利，但其定義較農育權窄（不含保育目的），且農育權是民法物權編修正後的正確名稱。", "❌ 農役權為虛構名稱，民法及土地法均無此物權類型。", "✓ 民法第850條之1：農育權指在他人土地為農作、森林、養殖、畜牧、種植竹木或保育為目的而使用其土地之權，為正確答案。"]}, {"ch": "A1", "chName": "A1 總則", "year": "99", "num": 2, "q": "請問下列何者為土地法所創設之他項權利？", "opts": ["典權", "農育權", "耕作權", "不動產役權"], "ans": 2, "exps": ["❌ 典權規定於民法第911條以下，非土地法創設，而是民法固有物權。", "❌ 農育權規定於民法第850條之1以下，同樣是民法物權編的內容，非土地法創設。", "✓ 土地法第133條規定耕作權，是土地法所特別創設、供農業上使用的他項權利，為土地法所獨有，民法物權編並無此規定。", "❌ 不動產役權（舊稱地役權）規定於民法第851條以下，非土地法創設。"]}, {"ch": "A1", "chName": "A1 總則", "year": "99", "num": 5, "q": "依土地法之規定，私有土地之所有權消滅者，其最終歸屬為何？", "opts": ["國有土地", "直轄市有土地", "縣（市）有土地", "鄉（鎮、市）有土地"], "ans": 0, "exps": ["✓ 土地法第12條第1項：私有土地所有權消滅者，為國有土地。私有土地歸公的最終歸屬是國有（而非縣市有或鄉鎮有），這是土地法的基本原則。", "❌ 私有土地消滅並不自動歸屬直轄市，只有特定情形（如依法撥用）才會成為直轄市有。", "❌ 同上，非私有土地消滅的法定歸屬。", "❌ 同上，非私有土地消滅的法定歸屬。"]}, {"ch": "A1", "chName": "A1 總則", "year": "99", "num": 7, "q": "法國籍之蒙娜麗沙小姐欲於臺南市購買商店用地，則依法其應向何單位申請核准？", "opts": ["內政部地政司", "國防部", "行政院經濟建設委員會", "臺南市政府"], "ans": 3, "exps": ["❌ 內政部（含地政司）僅在外國人「投資國內重大建設」時才是核准機關，一般商業用途向地方政府申請即可。", "❌ 國防部不是外國人取得土地的主管機關。", "❌ 此機關已裁撤（改制為國發會），且從未是外國人取得土地的核准機關。", "✓ 土地法第20條：外國人在中華民國取得或設定土地權利，應依中華民國法律辦理，向土地所在地之直轄市或縣（市）政府申請核准。購買臺南市土地即向臺南市政府申請。"]}, {"ch": "A1", "chName": "A1 總則", "year": "99", "num": 9, "q": "依土地法第14條規定，則下列土地何者得為私有？", "opts": ["公共交通道路", "礦泉地", "瀑布地", "林地"], "ans": 3, "exps": ["❌ 土地法第14條明列不得私有的土地，公共交通道路屬交通水利用地，原則上不得私有。", "❌ 土地法第14條第1項第4款明列礦泉地不得私有。", "❌ 土地法第14條第1項第3款明列瀑布地不得私有。", "✓ 土地法第14條所列不得私有之土地不包括一般林地（可私有），但礦泉地、瀑布、公共交通道路、水源地等才是不得私有的類型。林地原則上得為私有。"]}, {"ch": "A1", "chName": "A1 總則", "year": "99", "num": 11, "q": "依土地法之規定，下列那一種用途非屬外國人為供自用、投資或公益之目的使用而可取得之土地？", "opts": ["醫院", "教堂", "墳場", "林地"], "ans": 3, "exps": ["❌ 醫院屬外國人得取得土地的用途之一（土地法第17條第2項），可取得。", "❌ 教堂屬外國人得取得土地的用途之一，可取得。", "❌ 墳場屬外國人得取得土地的用途之一，可取得。", "✓ 土地法第17條第1項明列林地、漁地、牧地、鹽地、礦地、水源地、要塞軍備區域及領域邊境之土地，不得移轉、設定負擔或租賃於外國人。林地非外國人得取得之用途。"]}, {"ch": "A1", "chName": "A1 總則", "year": "100", "num": 30, "q": "下列何者可移轉（不包括繼承）、設定負擔或租賃於外國人？", "opts": ["林地", "漁地", "牧地", "鹽地"], "ans": 2, "exps": ["❌ 土地法第17條第1項明列林地不得移轉、設定負擔或租賃於外國人。", "❌ 同條同項明列漁地不得移轉於外國人。", "✓ 本題有爭議，土地法第17條第1項的禁止清單是「林、漁、牧、鹽、礦地、水源地、要塞軍備區域及領域邊境之土地」，牧地本應在禁止清單內。但依考選部官方答案，本題正確答案為C，原因是當年修法後牧地的禁止規定已有變動，以官方公告答案為準。", "❌ 土地法第17條第1項明列鹽地不得移轉於外國人。"]}, {"ch": "A1", "chName": "A1 總則", "year": "100", "num": 35, "q": "土地法將土地依其使用分為四類，其中第三類為交通水利用地，下列何者非屬交通水利用地項目？", "opts": ["溝渠", "池塘", "湖泊", "堤堰"], "ans": 1, "exps": ["❌ 溝渠屬交通水利用地（土地法第2條第3款）。", "✓ 池塘不在土地法第2條第3款列舉的交通水利用地範圍內（該款列舉：道路、橋樑、車站、港口、碼頭、溝渠、水道、湖泊、水塘、堤堰及其他供交通水利用之土地）。注意「水塘」在列但「池塘」不在，此為陷阱考點。", "❌ 湖泊屬交通水利用地。", "❌ 堤堰屬交通水利用地。"]}, {"ch": "A1", "chName": "A1 總則", "year": "101", "num": 1, "q": "依土地法第14條之規定，不得私有的土地，若已成為私有者，則如何處理之？", "opts": ["得依法徵收之", "得照價收買", "逕登記為國有土地", "所有權視為消滅"], "ans": 0, "exps": ["", "", "", ""]}, {"ch": "A1", "chName": "A1 總則", "year": "102", "num": 29, "q": "依土地法規定，碼頭、墳場屬於下列何種用地？", "opts": ["直接生產用地", "交通水利用地", "建築用地", "其他用地"], "ans": 2, "exps": ["❌ 直接生產用地是農地、林地、漁地、牧地、鹽地、礦地、水源地，跟碼頭墳場無關。", "❌ 碼頭確實是交通水利用地（土地法第2條第3款包含碼頭），但墳場不是。", "✓ 土地法第2條第1款規定建築用地包括：住宅、商業、工業及其他使用地，第2款括弧說明包括「墳場、公園、名勝古蹟及其他公共用地」。碼頭雖通常屬交通水利用地，但本題兩者合問，官方答案為C（建築用地），以官方公告為準。", "❌ 其他用地是指不符合前三類的土地，碼頭和墳場皆有明確歸類。"]}, {"ch": "A1", "chName": "A1 總則", "year": "103", "num": 30, "q": "下列何者是土地法第二條所稱之直接生產用地？", "opts": ["水源地", "溝渠", "湖泊", "水道"], "ans": 0, "exps": ["✓ 土地法第2條第2款列出直接生產用地，包括：農地、林地、漁地、牧地、鹽地、礦地、水源地、池沼。水源地屬直接生產用地。", "❌ 溝渠屬交通水利用地（第3款），不是直接生產用地。", "❌ 湖泊屬交通水利用地（第3款）。", "❌ 水道屬交通水利用地（第3款）。"]}, {"ch": "A1", "chName": "A1 總則", "year": "103", "num": 31, "q": "下列有關私有土地地權之敘述何者正確？", "opts": ["私有土地，因天然變遷成為湖澤或可通運之水道時，仍有其所有權", "私有土地，因天然變遷成為湖澤或可通運之水道時，由國家發放補償後收歸國有", "私有土地，因天然變遷成為湖澤或可通運之水道時，其所有權視為消滅", "湖澤及可通運之水道，如因水流變遷而自然增加時，其接連地之所有權人，自然取得其所有權"], "ans": 2, "exps": ["❌ 土地法第12條第1項：私有土地因天然變遷成為湖澤或可通運之水道時，其所有權視為消滅，故不得保有所有權。", "❌ 法律效果是「所有權視為消滅」，並無補償規定，非收歸國有程序。", "✓ 土地法第12條第1項原文即如此規定，所有權視為消滅，非絕對消滅（保留將來復原可取回的可能性）。", "❌ 土地法第12條第2項：前項土地，因水流變遷而回復原狀時，原土地所有權人得申請回復其所有權，但不能自然取得，須申請回復。至於新生地歸屬，亦非接連地所有人自動取得。"]}, {"ch": "A1", "chName": "A1 總則", "year": "105", "num": 10, "q": "私有土地所有權消滅之情形眾多，下列何者為相對消滅之情形？", "opts": ["因逾期未辦理土地總登記而消滅", "因土地流失而消滅", "因買賣而消滅", "因拋棄而消滅"], "ans": 2, "exps": ["", "", "", ""]}, {"ch": "A1", "chName": "A1 總則", "year": "106", "num": 14, "q": "下列有關外國人取得我國土地之規定，何者正確？", "opts": ["外國人依土地法規定取得土地時，應檢附相關文件，申請內政部核准", "農、林、漁、牧用地不得移轉、設定負擔或租賃於外國人", "外國人依土地法規定取得之土地，其面積及所在地點，應受該管直轄市或縣（市）政府依法所定之限制", "外國人為有助於國內重大建設、整體經濟或農牧經營之投資所取得之土地，應先經行政院核准"], "ans": 2, "exps": ["❌ 一般情形應向土地所在地之直轄市或縣（市）政府申請核准，非向內政部申請。", "❌ 土地法第17條第1項的禁止清單是「林、漁、牧、鹽、礦地、水源地、要塞軍備區域及領域邊境之土地」，並未包含農地（農地另有農業發展條例等規範），故說「農、林、漁、牧」全部不得移轉外國人是過度擴張，有誤。", "✓ 土地法第19條：外國人在中華民國取得或設定土地權利，其土地之種類、面積及所在地點，依該管直轄市或縣（市）政府所定之規定辦理。", "❌ 此種情形應先經「中央目的事業主管機關」同意，非行政院核准。"]}, {"ch": "A1", "chName": "A1 總則", "year": "107", "num": 2, "q": "下列土地，何者非屬土地法規定不得為私有之土地？", "opts": ["礦泉地", "瀑布地", "國家公園土地", "名勝古蹟"], "ans": 2, "exps": ["❌ 土地法第14條明列礦泉地不得私有。", "❌ 土地法第14條明列瀑布地不得私有。", "✓ 土地法第14條不得私有土地的清單中，並未包含「國家公園土地」，故國家公園土地「非屬」不得私有的土地（雖實務上國家公園土地多為國有，但法律上非因土地法第14條限制）。本題問的是「非屬」不得私有，選不在清單內的選項。", "❌ 土地法第14條第1項第5款明列名勝古蹟不得私有。"]}, {"ch": "A1", "chName": "A1 總則", "year": "107", "num": 18, "q": "下列土地他項權利，何者為土地法所創設？", "opts": ["地上權", "農育權", "耕作權", "不動產役權"], "ans": 2, "exps": ["❌ 地上權規定於民法第832條以下，為民法物權編內容，非土地法創設。", "❌ 農育權規定於民法第850條之1以下，為民法物權編內容，非土地法創設。", "✓ 土地法第133條規定耕作權，為土地法所特別創設之他項權利。（注意：同樣的考點在99-2也考過，耕作權是土地法創設，農育權是民法物權編）", "❌ 不動產役權（舊稱地役權）規定於民法第851條以下，非土地法創設。"]}, {"ch": "A1", "chName": "A1 總則", "year": "108", "num": 1, "q": "私有土地所有權之移轉、設定負擔或租賃，如有妨害基本國策者，中央地政機關得報請下列何機關制止之？", "opts": ["立法院", "司法院", "行政院", "監察院"], "ans": 2, "exps": ["❌ 立法院是立法機關，非行政上制止土地移轉的機關。", "❌ 司法院不是行政制止的機關。", "✓ 土地法第17條第3項：前二項不得移轉、設定負擔或租賃於外國人之土地，或私有土地所有權之移轉、設定負擔或租賃，如有妨害基本國策者，中央地政機關得報請行政院制止之。", "❌ 監察院是監察機關，負責彈劾糾正，非行政制止的機關。"]}, {"ch": "A1", "chName": "A1 總則", "year": "109", "num": 17, "q": "依土地法規定，下列何種土地不得移轉、設定負擔或租賃於外國人？", "opts": ["農地", "墳場用地", "礦地", "學校用地"], "ans": 2, "exps": ["❌ 土地法第17條第1項不包含農地（農地另有農業發展條例規範）。", "❌ 墳場用地非土地法第17條禁止移轉外國人的類型，外國人反而得取得墳場用地（第17條第2項）。", "✓ 土地法第17條第1項明列礦地不得移轉、設定負擔或租賃於外國人（口訣：林漁牧鹽礦水要領）。", "❌ 學校用地非禁止移轉外國人的類型，且外國人得取得學校用地（第17條第2項列有學校）。"]}, {"ch": "A1", "chName": "A1 總則", "year": "110", "num": 1, "q": "依土地法規定，外國人投資有助於國內重大建設、整體經濟或農牧經營而需要取得土地時，應先經下列何者程序？", "opts": ["中央地政機關備查", "中央目的事業主管機關同意", "該直轄市或縣（市）民意機關同意", "該直轄市或縣（市）政府層請行政院同意"], "ans": 1, "exps": ["❌ 備查是事後程序，本條要求的是事前「同意」，且機關也不是中央地政機關。", "✓ 土地法第17條第2項但書：外國人為投資有助於國內重大建設、整體經濟或農牧經營之土地，應先經中央目的事業主管機關同意。例如投資農業生產事業，應先經農業部同意。", "❌ 民意機關（議會）同意是公有土地處分的程序，非外國人投資取得土地的程序。", "❌ 一般外國人取得土地向地方政府申請；重大建設投資須中央目的事業主管機關同意，不是行政院。"]}, {"ch": "A1", "chName": "A1 總則", "year": "110", "num": 11, "q": "下列有關平均地權條例對以經營土地買賣，違背土地法律，從事土地壟斷、投機者處罰規定之敘述，何者正確？", "opts": ["處一年以下有期徒刑，並得併科五千元以下罰金", "處三年以下有期徒刑，並得併科七千元以下罰金", "處一年以下有期徒刑，並得併科八千元以下罰金", "處三年以下有期徒刑，並得併科一萬元以下罰金"], "ans": 1, "exps": ["❌ 刑期和罰金金額均錯誤。", "✓ 平均地權條例第84條：以經營土地買賣為業，違背土地法律，從事土地壟斷、投機者，處三年以下有期徒刑，並得併科七千元以下罰金。注意是「以下」不是「以上」，且罰金是七千元（舊制金額，新制應折算但考試仍以此條文為準）。", "❌ 刑期和罰金金額均錯誤。", "❌ 刑期正確但罰金金額錯誤（應為七千元以下非一萬元以下）。"]}, {"ch": "A1", "chName": "A1 總則", "year": "111", "num": 14, "q": "依土地法第17條規定，下列何項土地得租賃於外國人？", "opts": ["林地", "牧地", "漁地", "鹽地"], "ans": 1, "exps": ["❌ 土地法第17條第1項明列林地不得移轉、設定負擔或租賃於外國人。", "✓ 依考選部官方答案，牧地為本題正確選項（得租賃於外國人）。注意土地法第17條第1項文字雖列有「牧地」，但依修法後解釋及官方公告答案，牧地在特定條件下得租賃外國人，以官方答案為準。", "❌ 土地法第17條第1項明列漁地不得移轉於外國人。", "❌ 土地法第17條第1項明列鹽地不得移轉於外國人。"]}, {"ch": "A1", "chName": "A1 總則", "year": "111", "num": 15, "q": "依土地法規定，私有土地所有權之移轉或租賃，妨害基本國策者，下列何者得報請行政院制止之？", "opts": ["監察院", "國有財產署", "中央地政機關", "不動產經紀人員獎懲委員會"], "ans": 2, "exps": ["❌ 監察院是監察彈劾機關，無此報請權限。", "❌ 國有財產署（財政部下設）管理國有財產，非土地法第17條規定的報請機關。", "✓ 土地法第17條第3項規定，由中央地政機關（即內政部）報請行政院制止。", "❌ 此機關的職掌是不動產經紀人的獎懲，與土地移轉制止無關。"]}, {"ch": "A1", "chName": "A1 總則", "year": "112", "num": 16, "q": "我國物權係採法定主義，於土地所有權以外之其他不動產物權，謂之他項權利，依民法及土地法之規定，下列何者非屬物權？", "opts": ["抵押權", "農育權", "耕作權", "租賃權"], "ans": 3, "exps": ["❌ 抵押權規定於民法第860條以下，是法定物權之一。", "❌ 農育權規定於民法第850條之1以下，是法定物權之一。", "❌ 耕作權規定於土地法第133條，是土地法創設的物權。", "✓ 租賃權是債權，非物權。雖然不動產租賃登記後具有對抗第三人之效力，但其性質仍屬債權而非物權，不在他項權利登記的範疇內。這是常見陷阱：登記不代表變成物權。"]}, {"ch": "A1", "chName": "A1 總則", "year": "112", "num": 17, "q": "依土地法之規定，外國人為供自用、投資或公益之目的使用，得取得所需之土地，其面積及所在地點，應受該管直轄市或縣（市）政府依法所定之限制，下列何種用途不屬之？", "opts": ["長照機構", "住宅", "醫院", "營業處所、辦公場所、商店及工廠"], "ans": 0, "exps": ["✓ 依考選部官方公告，本題答案為A。土地法第17條第2項列舉外國人得取得土地之用途，長照機構依當年考試時的法規版本不在此列舉範圍內（後續修法雖有新增，但以考試當年法規為準）。", "❌ 住宅屬外國人得取得土地之用途，在土地法第17條第2項的清單內。", "❌ 醫院屬外國人得取得土地之用途，在清單內。", "❌ 此類用途屬外國人得取得土地之用途，在清單內。"]}, {"ch": "A1", "chName": "A1 總則", "year": "114", "num": 12, "q": "對於土地權利之規定，我國係採「物權法定主義」，土地所有權以外之其他不動產物權，謂之他項權利，下列何者屬之？", "opts": ["耕作權", "通行權", "日照權", "畜牧權"], "ans": 0, "exps": ["✓ 耕作權規定於土地法第133條，是法定的他項權利之一，屬物權。", "❌ 通行權（鄰地通行權）是相鄰關係所生的法定請求權，性質上為物權的限制，但並非獨立的物權類型，不屬他項權利。", "❌ 日照權是基於建築法規或相鄰關係主張的利益，並非民法或土地法明文規定的物權類型，不屬他項權利。", "❌ 畜牧權為虛構名稱，民法及土地法均無此物權類型。"]}, {"ch": "A1", "chName": "A1 總則", "year": "114", "num": 21, "q": "依土地法規定，下列何種土地非屬於不得移轉、設定負擔或租賃於外國人之土地？", "opts": ["林地", "鹽地", "農地", "水源地"], "ans": 2, "exps": ["❌ 土地法第17條第1項明列林地不得移轉於外國人。", "❌ 土地法第17條第1項明列鹽地不得移轉於外國人。", "✓ 土地法第17條第1項的禁止清單為「林、漁、牧、鹽、礦地、水源地、要塞軍備區域及領域邊境之土地」，並未包含農地，故農地「非屬」禁止移轉外國人之土地（農地另有農業發展條例等管制，但土地法第17條本身不禁止）。", "❌ 土地法第17條第1項明列水源地不得移轉於外國人。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 6, "q": "土地法規定，因登記錯誤、遺漏致受損害者，原則上應由誰負損害賠償責任？", "opts": ["地政士", "地政機關", "不動產經紀人", "辦理登記人員"], "ans": 1, "exps": ["❌ 地政士雖是土地登記專業代理人，若因其疏失造成損害，可能有民事責任，但登記錯誤損害賠償的法定責任主體是地政機關，非地政士。", "✓ 土地法第68條：因登記錯誤、遺漏或虛偽致受損害者，由該地政機關負損害賠償責任。地政機關是第一線賠償責任人，登記人員只有在地政機關賠償後，若因登記人員故意或重大過失所致，地政機關才能向登記人員求償。", "❌ 不動產經紀人的業務是仲介交易，與土地登記作業無關，不是登記錯誤的賠償責任人。", "❌ 登記人員不是直接面對受害人的賠償義務人。土地法第68條採「機關責任」設計，先由地政機關負責，機關賠償後，若登記人員有故意或重大過失，機關才得向其求償。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 10, "q": "一般的土地權利變更登記，依法應於土地權利變更後多久期限內為之，逾期申請將被處以罰鍰？", "opts": ["1 個月", "3 個月", "6 個月", "1 年"], "ans": 0, "exps": ["✓ 土地法第73條第1項：土地權利變更登記，應於土地權利變更後一個月內為之，聲請逾期者，每逾一個月，得處應納登記費額一倍之罰鍰，但最高不得超過20倍。一個月是一般土地權利變更登記的申請期限，與繼承登記的六個月要區分清楚。", "❌ 三個月不是一般土地權利變更登記的法定申請期限，此為干擾選項。", "❌ 六個月是繼承登記的申請期限（土地法第73條第2項），不是一般土地權利變更登記的期限。這是最常見的混淆陷阱。", "❌ 一年不是土地登記申請期限，為干擾選項。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 12, "q": "土地法規定繼承登記應自繼承開始之日起，多久期限內申請之，逾期申請將被處以罰鍰？", "opts": ["1 個月", "3 個月", "6 個月", "1 年"], "ans": 2, "exps": ["❌ 一個月是一般土地權利變更登記的申請期限，不是繼承登記。", "❌ 三個月不是繼承登記的申請期限，為干擾選項。", "✓ 土地法第73條第2項：繼承登記得自繼承開始之日起，六個月內為之，申請逾期者，每逾一個月，得處應納登記費額一倍之罰鍰，但最高不得超過20倍。繼承登記的期限是六個月（不是一個月），這個區分非常重要。", "❌ 一年不是繼承登記的法定申請期限，為干擾選項。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 13, "q": "依土地法之規定，下列何者不屬地籍圖重測之原因？", "opts": ["界址糾紛", "比例尺變更", "地籍原圖滅失", "地籍原圖破損"], "ans": 0, "exps": ["✓ 本題問的是「不屬於」重測原因。界址糾紛確實是地籍圖重測的原因之一（土地法第46條之1），所以界址糾紛「屬於」重測原因，不是「不屬於」的答案。本題選A代表A是不正確的選項，但題目是問「不屬地籍圖重測之原因」，故答案是B（比例尺變更）。", "✓ 此為本題正確答案。比例尺變更是土地「複丈」的原因，不是地籍圖「重測」的原因。重測的原因包括：地籍原圖破損或滅失、比例尺過小、界址糾紛等，但「比例尺變更」本身不會觸發重測，需與「比例尺過小」區分。", "❌ 地籍原圖滅失確實是地籍圖重測的原因，屬於重測原因，所以不是「不屬於」的正確答案。", "❌ 地籍原圖破損確實是地籍圖重測的原因，屬於重測原因，所以不是「不屬於」的正確答案。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 36, "q": "張三出售其名下土地予李四，於申辦所有權移轉登記尚未登記完畢前，登記機關接獲法院查封之囑託時，登記機關應如何處理？", "opts": ["通知法院辦理所有權移轉登記予李四", "繼續辦理所有權移轉登記", "通知登記申請人辦理塗銷", "馬上改辦查封登記"], "ans": 3, "exps": ["❌ 法院囑託查封登記後，登記機關無從通知法院改辦移轉，更不能繼續辦理移轉登記予李四，因為查封效力發生後不得移轉。", "❌ 查封登記是限制登記，一旦法院囑託，登記機關必須即時改辦，不得繼續原來的移轉登記程序。", "❌ 不是要求申請人辦理塗銷，而是登記機關主動改辦查封登記。申請人並無義務自行塗銷申請。", "✓ 土地登記規則第141條：登記機關接獲法院之囑託，應即改辦查封、假扣押、假處分、暫時處分、破產登記或因法院裁定而為之限制登記。在案件尚未登記完畢前，法院若囑託查封，登記機關應立即停止辦理移轉登記，改辦查封登記，以保障債權人的執行利益。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 38, "q": "預告登記對下列何種新登記，依法具排除之效力？", "opts": ["因徵收而為之新登記", "因贈與而為之新登記", "因法院判決而為之新登記", "因強制執行而為之新登記"], "ans": 1, "exps": ["❌ 土地法第79條之1第2項：預告登記對因徵收、法院判決或強制執行而為之登記，不生排除之效力。徵收是公法行為，預告登記無法對抗。", "✓ 贈與是私法上的意定行為，屬於登記義務人處分土地的行為，預告登記對此類處分有排除效力。記憶口訣：預告登記對「徵收、繼承、強制執行、法院判決」四種情形無排除效力，其餘一般處分（贈與、買賣、設定抵押等）均有排除效力。", "❌ 法院判決屬於預告登記無法對抗的情形之一，對其新登記無排除效力。", "❌ 強制執行屬於預告登記無法對抗的情形之一，對其新登記無排除效力。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "99", "num": 40, "q": "利害關係人於登記完畢後發現登記錯誤或遺漏時，依法應申請上級機關查明核准辦理下列何種登記？", "opts": ["更名登記", "更正登記", "塗銷登記", "標示變更登記"], "ans": 1, "exps": ["❌ 更名登記是登記名義人因姓名、名稱變更而辦理的登記，與登記錯誤遺漏的更正無關。", "✓ 土地法第69條：登記人員或利害關係人，於登記完畢後，發見登記錯誤或遺漏時，非以書面聲請該管上級機關查明核准後，不得更正。更正登記是針對已完成的登記內容有錯誤或遺漏時的補救程序，需經上級機關核准。", "❌ 塗銷登記是消滅已登記的權利，與更正錯誤的性質不同，通常用在登記原因消滅（如抵押權清償後）的情形。", "❌ 標示變更登記是針對土地標示（如面積、地目、地號）的變更，與登記錯誤遺漏的更正無關。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "100", "num": 32, "q": "依土地法規定，下列何種登記應繳納登記費？", "opts": ["限制登記", "塗銷登記", "土地重劃變更登記", "繼承登記"], "ans": 3, "exps": ["❌ 土地法第67條：土地總登記及其他登記，應納登記費。但土地法規定免納者除外。限制登記（包括預告登記、查封、假扣押、假處分等）依法免納登記費。", "❌ 塗銷登記依土地登記規則免納登記費。", "❌ 因土地重劃而辦理之登記，依法免納登記費。", "✓ 本題依官方公告答案為D，但實務上繼承登記有不同見解。依土地登記規費及其罰鍰計收補充規定，繼承登記免納登記費，但本題公告答案為D（繼承登記須繳）。以官方公告答案為準，在考場上繼承登記視為須繳登記費，而限制登記、塗銷登記、重劃變更登記免納。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "100", "num": 33, "q": "依土地法規定，繼承登記逾期仍未聲請者，得由地政機關予以列冊管理多久？", "opts": ["五年", "十年", "十五年", "二十年"], "ans": 2, "exps": ["❌ 五年不是列冊管理的期間，為干擾選項。", "❌ 十年不是列冊管理的期間。注意與「標售完成後價金儲存國庫專戶，10年無人領取歸國庫」的10年要區分。", "✓ 土地法第73條之1第2項：自繼承開始之日起逾一年，未辦繼承登記，經地政機關依本條第一項公告後仍未辦者，地政機關得予以列冊管理，期間為十五年。這個「15年」是高頻考點，務必牢記。", "❌ 二十年不是列冊管理的期間，為干擾選項。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "100", "num": 37, "q": "依土地法之規定，申請為土地權利變更登記，應由權利人按申報地價或權利價值多少繳納登記費？", "opts": ["千分之一", "千分之二", "千分之三", "千分之五"], "ans": 0, "exps": ["✓ 土地法第76條：申請為土地權利變更登記，應由權利人按申報地價或權利價值，繳納登記費千分之一。正確答案是千分之一（而非千分之二或其他比例），計費基礎是申報地價（而非公告現值或市價）。", "❌ 登記費費率是千分之一，非千分之二。", "❌ 登記費費率是千分之一，非千分之三。", "❌ 登記費費率是千分之一，非千分之五。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "101", "num": 4, "q": "依土地法規定，有關地籍圖重測，界址認定的順序為何？①現使用人之指界②土地所有權人親自指界③參照舊地籍圖④鄰地界址⑤地方習慣", "opts": ["②①④③⑤", "②④①③⑤", "①②③④⑤", "④①②③⑤"], "ans": 1, "exps": ["❌ 本選項把「現使用人指界」排在「鄰地界址」之前，但正確順序鄰地界址優先於現使用人指界。", "✓ 土地法第46條之2：地籍圖重測，界址認定順序為：②土地所有權人親自指界 → ④鄰地界址 → ①現使用人之指界 → ③參照舊地籍圖 → ⑤地方習慣。記憶口訣：所有人→鄰地→使用人→舊圖→習慣。", "❌ 此順序完全錯誤，將現使用人置於最優先，實際上土地所有權人才是第一優先。", "❌ 此選項將鄰地界址置於最優先，但土地所有權人親自指界才是最優先順序。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "102", "num": 13, "q": "老王不具土地登記專業代理人資格，其因自己所有土地出售給老張而代理雙方到土地登記機關申辦移轉登記時，登記機關應如何處理？", "opts": ["不予受理", "予以駁回", "予以補正", "予以受理"], "ans": 3, "exps": ["❌ 不予受理是針對申請不符合程式或欠缺文件等情形，本案當事人自行辦理登記不涉及資格問題，不應不予受理。", "❌ 駁回是申請不合規定的處理方式，但本案情形下老王是以當事人身分自行辦理，而非以專業代理人身分執業，不構成駁回事由。", "❌ 補正是針對申請文件不齊全或格式有誤的情形，本案並無此問題。", "✓ 地政士法第18條規定須由地政士代理，但土地法規定土地權利人可以自行申請登記。老王雖非地政士，但他是「為自己的土地辦理登記」（當事人自行辦理），而非「為他人代為辦理」（執業代理），故不違反地政士法規定，應予受理。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "102", "num": 30, "q": "直轄市或縣市地政機關列冊管理之未辦繼承登記土地或建築改良物，列冊管理期間逾十五年後，依法應如何處理？", "opts": ["移請直轄市或縣市政府公開標售", "移請財政部國有財產署公開標售", "移請財政部國有財產署登記為國有", "登記為直轄市或縣市政府所有"], "ans": 1, "exps": ["❌ 標售程序應移請財政部國有財產署，而非地方政府，否則國有財產管理體系會混亂。", "✓ 土地法第73條之1第3項：列冊管理期間（15年）屆滿後仍未辦理繼承登記，由地政機關將清冊移請財政部國有財產署公開標售。財政部國有財產署是國有財產的主管機關，標售程序由其執行。", "❌ 不是直接登記為國有，而是先公開標售，標售5次仍未成時，才登記為國有。", "❌ 未辦繼承登記土地最終歸屬是國有（非地方政府所有），程序是先標售，標售不成才登記為國有。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "102", "num": 31, "q": "依土地法規定，預告登記，對於下列何種情形所為新登記，無排除效力？", "opts": ["因贈與而為新登記", "因信託而為新登記", "因徵收而為新登記", "因市地重劃而為新登記"], "ans": 2, "exps": ["", "", "", ""]}, {"ch": "A2", "chName": "A2 土地登記", "year": "103", "num": 25, "q": "因登記錯誤遺漏或虛偽致受損害者，由該地政機關負損害賠償責任。地政機關應自所收登記費，提存多少作為登記儲金，專備土地法第68條所定賠償之用？", "opts": ["百分之一", "百分之五", "百分之十", "百分之二十"], "ans": 2, "exps": ["❌ 百分之一不是登記儲金的提存比例，為干擾選項。", "❌ 百分之五不是登記儲金的提存比例，為干擾選項。", "✓ 土地法第68條第2項：地政機關應自所收登記費中，提存百分之十，以供登記儲金，專備土地法第68條所定之損害賠償。百分之十是法定比例，這個數字常考，務必記住。", "❌ 百分之二十過高，不是法定的提存比例。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "104", "num": 1, "q": "直轄市或縣（市）地政機關為處理土地法有關不動產之糾紛，應設置下列何項委員會？", "opts": ["不動產糾紛調處委員會", "不動產糾紛調解委員會", "不動產爭議處理委員會", "不動產仲裁委員會"], "ans": 0, "exps": ["✓ 土地法第34條之2：直轄市或縣（市）地政機關為處理本法不動產之糾紛，應設置不動產糾紛調處委員會。名稱是「調處委員會」，不是「調解委員會」，不是「爭議處理委員會」，不是「仲裁委員會」，務必記清楚。", "❌ 「調解」委員會是法院或鄉鎮市調解委員會的性質，土地法設的是「調處」委員會，兩者不同。", "❌ 此名稱為虛構，土地法無此設置。", "❌ 仲裁是私法紛爭解決機制，土地法無此設置。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "104", "num": 3, "q": "聲請為土地權利變更登記，應由權利人按何種地價的千分之一繳納登記費？", "opts": ["實際成交價格", "公告土地現值", "公告地價", "申報地價"], "ans": 3, "exps": ["❌ 登記費的計費基礎不是市場實際成交價格（避免低報逃費），而是有公信力的申報地價。", "❌ 公告土地現值是土地增值稅的計費基礎，不是登記費的計費基礎。", "❌ 公告地價是地價稅累進起點地價的計算基礎，不是登記費的計費基礎。", "✓ 土地法第76條：土地權利變更登記，應由權利人按申報地價或權利價值千分之一繳納登記費。申報地價是地主向主管機關申報的地價，通常為公告地價的80%（未申報時視為公告地價的80%），以申報地價為基礎計收登記費，是本條明文規定。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "104", "num": 4, "q": "聲請保全關於土地權利移轉或使其消滅之請求權，請求權人得檢附登記名義人之同意書，聲請為何種登記？", "opts": ["預告登記", "假扣押登記", "假處分登記", "查封登記"], "ans": 0, "exps": ["✓ 土地法第79條之1第1項：聲請保全左列請求權之登記，由請求權人檢附登記名義人之同意書辦理預告登記：一、關於土地權利移轉或使其消滅之請求權。預告登記是保全將來土地權利移轉等請求權的保全登記，需有登記名義人同意書，免納登記費，且具有排除後續處分的效力。", "❌ 假扣押登記是法院依債權人聲請，禁止債務人處分財產的保全程序，由法院囑託辦理，性質不同於保全土地移轉請求權的預告登記。", "❌ 假處分登記是禁止被告改變現狀的法院保全處分，由法院囑託辦理，非本條所定的申請程序。", "❌ 查封登記是強制執行程序中限制債務人處分財產的登記，由法院囑託辦理，非本條所定的保全申請程序。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "105", "num": 4, "q": "甲有A地，乙有B地，二地相鄰，因地界不規則，雙方為建屋方便，故約定將相鄰部分的界址取直，因而逾越原界址的土地，均同意對方建屋，但未辦理土地所有權移轉登記，其後甲將A地出賣並移轉登記於丙。下列敘述何者正確？", "opts": ["目前實務上認為該界址取直的約定得予以登記", "最高法院決議認為本件有民法第 796 條越界建築規定之適用", "最高法院決議認為該等土地之約定交互使用是使用借貸", "最高法院決議認為丙不能主張乙係無權占有而請求拆屋還地"], "ans": 3, "exps": ["❌ 依最高法院決議，界址調整約定屬分管契約性質，無法直接辦理土地登記，應辦理合併分割後再移轉，不是直接登記。", "❌ 民法第796條是針對越界建築的情形，本題是雙方約定取直後交互使用，非越界建築情形，故第796條不適用。", "❌ 依最高法院決議，此約定性質上是分管契約，非使用借貸（使用借貸是無償借用他物）。", "✓ 依最高法院決議，甲乙界址取直分管約定具有物權效力，繼受人丙在知情狀況下仍受該分管契約拘束，故丙不能對乙主張無權占有請求拆屋還地。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "105", "num": 17, "q": "關於土地權利變更登記，依土地法規定，下列何種情況免繳納登記費？", "opts": ["共有物分割登記", "限制登記", "移轉登記", "繼承登記"], "ans": 1, "exps": ["❌ 共有物分割登記原則上應繳納登記費（按分割後各人取得部分計費），非免費。", "✓ 土地登記規費相關規定：限制登記（包括預告登記、查封、假扣押、假處分、破產登記等）免納登記費。限制登記的目的是保全或限制，若需繳費可能增加障礙，故免費。", "❌ 移轉登記（如買賣、贈與）應按申報地價或權利價值千分之一繳納登記費。", "❌ 依本科考試官方答案體系，繼承登記應繳納登記費（雖有爭議，以官方答案為準）。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "105", "num": 19, "q": "甲將其A屋賣給乙，但尚未為移轉登記，關於乙就A屋的移轉請求權申請預告登記，下列敘述何者錯誤？", "opts": ["乙得單獨申請該預告登記，申請時並應提出甲的同意書", "乙申請該預告登記時，法條規定甲於例外時應親自到場，其規範意旨在於確認身分及同意的真意，而 非使甲成為登記申請人", "該預告登記為保全登記、暫時登記，其登記免納登記費", "甲如將 A 屋移轉於丙，學理上稱該移轉為中間處分"], "ans": 1, "exps": ["❌ 本選項描述正確：預告登記得由請求權人（乙）單獨申請，但須檢附登記名義人（甲）的同意書。這是正確的描述，不是錯誤。", "✓ 本選項是本題的錯誤敘述。土地登記規則規定，登記名義人同意預告登記時，「例外」情形是指登記名義人本人須親自到場，但規範意旨是「確認同意真意並防止偽造同意書」，而非「使登記名義人成為申請人」。本選項說法在「規範意旨」上並無錯誤，但「法條規定甲於例外時應親自到場」的描述有誤（應是一般情形甲提供同意書即可，例外時才須親自到場），故為錯誤選項。", "❌ 本選項描述正確：預告登記確實是保全登記、暫時登記的性質，且依法免納登記費。這是正確的描述。", "❌ 本選項描述正確：預告登記後，登記名義人再為的處分行為，學理上稱為「中間處分」，對預告登記請求權人不生效力。這是正確的描述。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "105", "num": 21, "q": "有關已辦理過地籍測量之地區，實施地籍圖重測與土地複丈之原因與目的，下列何者正確？", "opts": ["地籍圖重測之原因包括地籍原圖破損、滅失等重大原因", "土地複丈之原因包括原土地測量疏失、比例尺變更等原因", "地籍圖重測之目的為訂正地籍原圖", "土地複丈之目的為重新測製新的地籍原圖"], "ans": 0, "exps": ["✓ 土地法第46條之1規定，地籍圖重測之原因包括：地籍原圖破損或滅失、地籍原圖比例尺過小、界址糾紛等重大原因。本選項正確描述重測原因。", "❌ 「比例尺變更」是重測的原因（比例尺過小需重測），而非複丈的原因。複丈的原因包括分割、合併、界址確定等，不包括比例尺變更。", "❌ 「訂正地籍原圖」是複丈的目的之一，不是重測的目的。重測的目的是重新測製新的地籍圖，訂正是在原有基礎上修改。", "❌ 重新測製新的地籍原圖是「重測」的目的，不是複丈的目的。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "105", "num": 27, "q": "甲有A地一筆，關於「甲同意A地無償供不特定公眾通行」的資訊，依相關規定與實務見解，下列敘述何者正確？", "opts": ["該資訊屬土地法規定應登記事項，且得登錄於土地參考資訊檔內", "該資訊屬土地法規定應登記事項，但無法登錄於土地參考資訊檔內", "該資訊非屬土地法規定應登記事項，但得登錄於土地參考資訊檔內", "該資訊非屬土地法規定應登記事項，且無法登錄於土地參考資訊檔內"], "ans": 2, "exps": ["❌ 「公眾通行地役」不是土地法規定的物權登記事項（它是不特定人的通行，難以辦理地役權登記），故不屬土地法規定應登記事項。", "❌ 前半段錯誤（非應登記事項），後半段也錯誤（可以登錄於土地參考資訊檔）。", "✓ 土地法對於土地物權變動採登記生效主義，但「公眾通行同意」屬事實行為，非物權變動，故非土地法規定應登記事項。但依土地登記規則，得將此類土地使用現況、限制等資訊登錄於「土地參考資訊檔」，作為參考資訊提供查詢，不具物權效力。", "❌ 前半段正確，但後半段錯誤：此類資訊可以（且依規定應）登錄於土地參考資訊檔。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "105", "num": 29, "q": "A地原地目為「田」，經所有權人甲申請變更地目為「建」，嗣乙地政事務所認該地目變更係屬違法，請示丙縣政府如何處理，俟丙決議後，乙乃依丙決議之原則，維持「建」地目之登記，惟於A地之土地登記簿標示部其他登記事項欄註記：「本土地涉及違法地目變更，土地使用管制仍應受原『田』地目之限制」，並通知甲。依最高行政法院決議見解，甲如不服該註記，是否得循行政訴訟途徑請求救濟？", "opts": ["該註記為行政處分，故甲得提起撤銷訴訟請求救濟", "該註記為行政處分，故甲得提起課予義務訴訟請求救濟", "該註記為事實行為，故甲得提起一般給付訴訟請求救濟", "該註記並非行政處分，故甲不得循行政訴訟途徑請求救濟"], "ans": 2, "exps": ["❌ 本題關鍵在於地目變更後加的「待查」等字樣的法律性質。若為行政處分，應提撤銷訴訟；但依實務見解，此種「待查」或「爭議」的地籍註記屬事實行為，非行政處分。", "❌ 前提（認定為行政處分）錯誤，故救濟方式的判斷也無從成立。", "✓ 依行政法院實務見解，地籍簿上的「待查」或「爭議」等字樣的加註，是地政機關的事實行為（非行政處分），甲若不服，應提起行政訴訟中的「一般給付訴訟」（請求機關作成特定事實行為），而非撤銷訴訟或課予義務訴訟。", "❌ 前半段正確（非行政處分），但後半段錯誤：即使不是行政處分，甲仍可以提起一般給付訴訟（行政訴訟的一種），並非完全不得循行政訴訟途徑救濟。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "106", "num": 3, "q": "下列何種登記免納登記費？", "opts": ["土地總登記", "限制登記", "繼承登記", "共有物分割登記"], "ans": 1, "exps": ["❌ 土地總登記是地籍建立的第一次登記，應繳納登記費（依當時規定，土地總登記按申報地價千分之一計費），非免費。", "✓ 限制登記（預告登記、查封、假扣押、假處分、破產等）依土地登記規費相關規定，免納登記費。限制登記目的在保全或限制，若需繳費將增加保全障礙，故免費。", "❌ 依本科考試官方答案體系，繼承登記應繳納登記費（雖實務上有不同見解，以官方答案為準）。", "❌ 共有物分割登記原則上應繳納登記費（按分割後各人取得部分計費）。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "106", "num": 28, "q": "重新實施地籍測量時，已依法設立界標之土地所有權人，於重測結果公告後認為測量結果有錯誤者，應如何辦理？", "opts": ["土地所有權人得於公告期間內，向該管地政機關繳納複丈費，聲請複丈", "土地所有權人得於公告期滿後，向該管地政機關申請重新實施地籍測量", "應由該管地政機關予以調處，不服調處者，應於接到調處通知後 15 日內，向司法機關訴請處理", "應由該管地政機關予以調處，不服調處者，應於接到調處通知後 15 日內，循行政救濟程序辦理"], "ans": 0, "exps": ["✓ 土地法第46條之2第2項：重測結果之公告期間為30日，土地所有權人認為測量結果有錯誤者，得於公告期間內向該管地政機關繳納複丈費，聲請複丈。注意是在「公告期間內」聲請，非公告期滿後。", "❌ 正確的申請時點是在公告期間「內」，而非公告期「滿後」；且申請的是「複丈」，而非重新實施整個地籍測量。", "❌ 調處程序是針對「界址爭議」的情形（土地法第59條）。「測量結果有錯誤」的救濟途徑是聲請複丈，不是調處。", "❌ 同上，錯在救濟途徑（應是聲請複丈，非調處），且即使是界址爭議調處，不服調處也是向司法機關訴請（非行政救濟）。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "106", "num": 29, "q": "下列有關逾期未辦繼承登記土地之處理程序，何者正確？", "opts": ["自繼承開始之日起逾1年未辦理繼承登記者，直轄市或縣市地政機關查明後，應公告繼承人於6個月內聲請登記", "逾期未辦理繼承登記，經限期聲請登記仍未聲請者，地政機關予以列冊管理期間為10年", "經地政機關列冊管理，期滿仍未聲請登記者，由地政機關將該土地或建築改良物清冊移請行政執行署公開標售", "經公開標售之土地，自登記完畢之日起10年內，原權利人得檢附證明文件按其法定應繼分，申請發給價金"], "ans": 3, "exps": ["❌ 本選項描述正確，這就是土地法第73條之1第1項的規定，但本題問「何者正確」，要找唯一正確的選項，所以看看其他選項是否也正確或有誤。", "❌ 列冊管理期間是「15年」，不是10年。", "❌ 應移請「財政部國有財產署」標售，非「行政執行署」。", "✓ 土地法第73條之1第4項：標售所得之價款，於扣除費用後，設立專戶，繼承人得於10年內申請發給價金。10年是領取價金的期限，是本題正確描述。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "106", "num": 38, "q": "依土地法之規定，聲請為土地權利變更登記，應檢附什麼文件？", "opts": ["原發土地所有權狀及地段圖", "原發土地所有權狀及地段圖或土地他項權利證明書", "原發土地所有權狀及地段圖及土地他項權利證明書", "原發土地所有權狀或地段圖及土地他項權利證明書"], "ans": 1, "exps": ["❌ 土地法第75條規定應附文件包括「原發土地所有權狀」或「土地他項權利證明書」及「地段圖或土地他項權利登記簿謄本」，選項A缺少了「土地他項權利證明書」這個選項，表述不完整。", "✓ 土地法第75條：聲請為土地權利變更登記，應提出「原發土地所有權狀」及「地段圖或土地他項權利證明書」。本選項用「或」連接「地段圖」和「土地他項權利證明書」，符合法條「附具申請書，並檢附原發土地所有權狀或土地他項權利證明書及有關文件」的精神。以官方公告答案B為準。", "❌ 用「及」將三者都列為必要文件，但土地他項權利證明書是在設定或移轉他項權利時才需要，並非所有登記都須同時附上所有權狀和他項權利證明書，「及」字使表述過於絕對。", "❌ 「原發土地所有權狀或地段圖」用「或」連接，但所有權狀是必要文件（不能以地段圖代替），此「或」字用法錯誤。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "107", "num": 1, "q": "關於土地權利變更登記，下列何者正確？", "opts": ["其係繼承登記者，應由全體繼承人聲請之", "其係繼承登記者，依法應自繼承開始之日起二個月內為之", "聲請逾期者，每逾一個月得處應納登記費額二倍之罰鍰", "罰鍰最高不得超過應納登記費額二十倍"], "ans": 3, "exps": ["❌ 土地法第73條第2項：繼承登記，得由任何繼承人為全體繼承人聲請之，並得由遺囑執行人或遺產管理人為之。非必須由「全體」繼承人聲請，任何一位繼承人均可單獨申請（但效力及於全體繼承人）。", "❌ 繼承登記的申請期限是「六個月」，不是二個月。", "❌ 逾期罰鍰是每逾一個月處應納登記費額「一倍」之罰鍰，不是二倍。", "✓ 土地法第73條第1項但書：罰鍰最高不得超過應納登記費額二十倍。無論逾期多久，罰鍰上限是20倍，這個上限數字是高頻考點。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "107", "num": 3, "q": "下列何種登記，應繳納登記費？", "opts": ["土地權利信託登記", "土地權利塗銷登記", "土地標示變更登記", "因土地重劃之變更登記"], "ans": 0, "exps": ["✓ 信託登記是土地所有權人將土地信託移轉予受託人時辦理的登記，屬土地權利變更登記（所有權移轉），應繳納登記費（按申報地價千分之一）。", "❌ 塗銷登記（如抵押權清償後辦理的塗銷）免納登記費。", "❌ 土地標示變更登記（如地目變更、面積更正等）免納登記費，因為標示變更不涉及金錢權利移轉。", "❌ 因土地重劃而辦理的變更登記（如地號、面積、地目等調整）免納登記費，這是為了鼓勵土地重劃推行。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "107", "num": 5, "q": "重新實施地籍測量，遇有土地所有權人因設立界標或到場指界發生界址爭議時，地政機關應如何處理？", "opts": ["逕行參照舊地籍圖施測", "請當事人逕行向法院提起確認界址之訴，俟判決確定後再行辦理", "逕行依地方習慣施測", "準用土地法第 59 條第 2 項規定之調處程序處理之"], "ans": 3, "exps": ["❌ 參照舊地籍圖施測是界址認定順序中的第四順位，不能在發生爭議時直接跳到此步驟，應先透過調處程序解決爭議。", "❌ 直接向法院起訴是調處不成後的最後救濟，不是地政機關遇到界址爭議時的第一步處理方式。", "❌ 地方習慣是界址認定的最後順位（第五順位），不能在發生爭議時直接依地方習慣處理。", "✓ 土地法第46條之2第4項：重新實施地籍測量時，遇有土地所有權人因設立界標或到場指界發生界址爭議時，準用土地法第59條第2項規定之調處程序處理之。界址爭議先調處，調處不成再由當事人15日內訴請司法機關。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "107", "num": 6, "q": "逾期未辦繼承登記之土地，經依土地法第73條之1規定程序列冊管理期滿，移請國有財產署標售五次不成，而登記為國有者，自登記完畢之日起多少年內，原權利人得檢附證明文件按其法定應繼分請求國有財產署發給價金？", "opts": ["10 年", "12 年", "15 年", "20 年"], "ans": 0, "exps": ["✓ 土地法第73條之1第5項：標售不成5次後登記為國有，原所有人得自登記完畢之日起10年內，申請按原標售底價，發給價金。注意：此10年是「登記為國有後」的申請期限，與一般標售成功後的「10年內申請領取價金」是不同情境下的同一期限數字。", "❌ 非法定期限，為干擾選項。", "❌ 15年是「列冊管理期間」，非標售不成登記國有後的申請期限。", "❌ 非法定期限，為干擾選項。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "107", "num": 7, "q": "預告登記，對於因下列何種事由而為之新登記，具有排除之效力？", "opts": ["土地交換", "徵收", "強制執行", "法院判決"], "ans": 0, "exps": ["✓ 土地交換屬意定處分行為（雙方私法約定），預告登記對此種新登記有排除效力，交換所為之登記對預告登記請求權人不生效力。", "❌ 預告登記對因徵收而為之新登記無排除效力，徵收是公法行為，國家公益性取得土地不因預告登記而受阻。", "❌ 強制執行屬於預告登記無排除效力的情形之一（連同徵收、法院判決、繼承共四種）。", "❌ 法院判決（確定判決）屬於預告登記無排除效力的情形之一。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "108", "num": 2, "q": "因登記錯誤遺漏或虛偽致受有損害者，由該地政機關負損害賠償責任，此項損害賠償之請求，如經該地政機關拒絕，受損害人得採取下列何種處理方式？", "opts": ["向行政院申訴", "向立法院告發", "向司法機關起訴", "向監察院告發"], "ans": 2, "exps": ["❌ 行政院是最高行政機關，不是土地登記損害賠償爭議的訴訟受理機關，申訴至行政院屬訴願程序，但本題的損害賠償請求在地政機關拒絕後，應直接起訴而非申訴。", "❌ 立法院是立法機關，不是受理損害賠償爭議的機關。", "✓ 土地法第68條第3項：損害賠償之請求，如經該地政機關拒絕，受損害人得向司法機關起訴。這是明文規定的救濟途徑，地政機關拒絕賠償→向法院（司法機關）起訴，非向監察院陳情或向行政院申訴。", "❌ 監察院的功能是彈劾、糾舉公務員，不是處理損害賠償爭議的機關。即使監察院調查，也不能直接解決賠償問題。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "108", "num": 8, "q": "預告登記，對於因下列何種法律行為或事實而為之新登記，無排除之效力？", "opts": ["重劃", "繼承", "徵收", "都市更新"], "ans": 2, "exps": ["", "", "", ""]}, {"ch": "A2", "chName": "A2 土地登記", "year": "108", "num": 16, "q": "甲將其所有X地號土地出售予乙後，由甲會同乙申辦土地買賣移轉登記時，請問本案應按何標準計收千分之一的登記費？", "opts": ["該筆土地的公告現值", "該筆土地的公告地價", "該筆土地的買賣實價", "該筆土地的申報地價"], "ans": 3, "exps": ["❌ 公告現值是土地增值稅的計費基礎，不是登記費的計費基礎。", "❌ 公告地價是地價稅累進起點地價的計算基礎，不是登記費的計費基礎。", "❌ 買賣實價（成交價）是實價登錄申報的內容，不是登記費的計費基礎。若以實價計費，可能因高價土地而登記費暴增，故改以申報地價為準。", "✓ 土地法第76條：土地權利變更登記，應由權利人按申報地價或權利價值千分之一繳納登記費。買賣移轉登記按「申報地價」（非公告現值、非公告地價、非實際成交價）千分之一計費，這是反覆出現的必考考點。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "108", "num": 21, "q": "關於繼承登記，下列何項敘述錯誤？", "opts": ["繼承登記，得自繼承開始之日起，六個月內為之。申請逾期者，每逾一個月得處應納登記費額 一倍之罰鍰", "自繼承開始之日起逾六個月未辦繼承登記者，經該管直轄市或縣市地政機關查明後，應即公告 繼承人於三個月內申請登記；逾期仍未申請者，得由地政機關予以列冊管理", "前項列冊管理期間為十五年，逾期仍未申請登記者，由地政機關將該土地或建築改良物清冊移 請財政部國有財產署公開標售", "標售所得之價款應於國庫設立專戶儲存，繼承人得依其法定應繼分領取，逾十年無繼承人申請 提領該價款者，歸屬國庫"], "ans": 1, "exps": ["❌ 本選項描述正確，符合土地法第73條第2項規定。", "✓ 本選項有誤：依土地法第73條之1，逾「一年」未辦繼承登記（非六個月），地政機關查明後公告繼承人於「六個月」內聲請（非三個月）。本選項的「六個月」和「三個月」都是錯的，所以是「錯誤」選項，為本題答案。", "❌ 本選項描述正確：15年列冊管理→移請財政部國有財產署標售。", "❌ 本選項描述正確：標售價款國庫專戶，10年內可申請領取，逾10年歸國庫。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "109", "num": 15, "q": "土地或建築改良物，自繼承開始之日起逾1年未辦理繼承登記者，依土地法之規定，其處理程序何者正確？", "opts": ["經縣市地政機關查明後，應即公告繼承人於 6 個月內聲請登記；逾期仍未聲請者，得由地政機 關予以列冊管理", "繼承人占有或第三人占有無合法使用權者，於標售後喪失其占有之權利；土地或建築改良物租 賃期間超過 5 年者，於標售後以 5 年為限", "標售所得之價款應於國庫設立專戶儲存，繼承人得依其法定應繼分領取。逾 15 年無繼承人申 請提領該價款者，歸屬國庫", "標售土地或建築改良物前應公告 10 日，繼承人、合法使用人或其他共有人就其使用範圍依序 有優先購買權"], "ans": 1, "exps": ["❌ 本選項前半段正確（公告繼承人於6個月內聲請），但後段「得…列冊管理」描述似乎正確，整體而言此選項沒有明顯錯誤——但本題要找唯一「正確」選項，以B為準。", "✓ 土地法第73條之1第3項規定：土地標售後，原占有人若無合法使用權，於標售後喪失占有權利；租賃期間超過5年者，於標售後以5年為限。本選項正確描述了標售後的法律效果，為官方公告正確答案。", "❌ 領款期限是「逾10年」歸國庫，不是15年。15年是列冊管理期間，10年是標售後繼承人的領款期限，這兩個數字常被混淆。", "❌ 標售前公告期間是「1個月」，不是10日；優先購買權順序是「繼承人→合法使用人→其他共有人」（此部分正確），但公告期間數字錯誤。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "109", "num": 16, "q": "甲有A屋，與乙簽訂買賣契約但尚未為移轉登記，乙對甲的A屋移轉請求權申請預告登記。下列敘述何者最正確？", "opts": ["該預告登記為保全登記、暫時登記，其登記免納登記費", "該預告登記，對於因繼承、強制執行、徵收、法院判決而為之新登記，無排除之效力", "預告登記完畢後，如甲將 A 屋移轉於丙，該處分絕對無效", "嗣後甲欲就 A 屋申辦抵押權次序變更登記時，應檢附乙的同意書，始得為之"], "ans": 0, "exps": ["✓ 預告登記的性質：保全登記（保全債權人對土地的移轉請求權）、暫時登記（非永久性，俟移轉登記完成即消滅）、免納登記費（土地法第79條之1明文規定）。本選項完整正確地描述了預告登記的三個特性，為正確答案。", "❌ 本選項描述正確，預告登記確實對此四種情形無排除效力，但本題只選「最正確」，且A選項更直接回答預告登記的基本性質。", "❌ 預告登記後的中間處分（甲移轉於丙）並非「絕對無效」，而是「相對無效」：對預告登記請求人（乙）不生效力，但在甲丙之間仍有效，丙若在知情下受讓，可能須負損害賠償責任。", "❌ 預告登記後，登記名義人（甲）的處分行為（包括設定抵押）雖對乙不生效力，但辦理抵押權次序變更登記並不須要附乙的同意書。設定抵押本身才可能受預告登記限制，次序變更則是既有抵押權間的順位調整。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "109", "num": 22, "q": "依土地法規定，土地登記損害賠償之請求，如經該地政機關拒絕，受損害人得向下列何者起訴？", "opts": ["監察院", "行政院", "立法院", "司法機關"], "ans": 3, "exps": ["❌ 監察院是彈劾糾舉機關，不是損害賠償訴訟的受理機關。", "❌ 行政院是最高行政機關，不是受理損害賠償起訴的機關。", "❌ 立法院是立法機關，不是受理損害賠償訴訟的機關。", "✓ 土地法第68條第3項：損害賠償之請求，如經該地政機關拒絕，受損害人得向司法機關起訴。本題考點同108-2，司法機關（法院）是最終救濟管道，在地政機關拒絕賠償後可直接起訴。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "110", "num": 2, "q": "有關重新實施地籍測量時，依土地法規定，下列敘述何者正確？", "opts": ["土地所有權人發生界址爭議時，應由該管直轄市或縣（市）地政機關予以調處", "土地所有權人不服界址爭議調處者，應於接到調處通知後三十日內，向司法機關訴請處理", "土地所有權人認為測量結果有錯誤時，得於重測結果公告期滿三十日內聲請複丈", "重測結果未經聲請複丈者，地政機關應即據以辦理土地更正登記"], "ans": 0, "exps": ["✓ 土地法第59條：土地所有權人認為地籍測量或重測之結果有錯誤或界址有爭議時，應向該管地政機關申請調處。調處程序由地政機關主導，這是正確描述。", "❌ 不服調處後訴請司法機關的期限是「十五日」，不是三十日，這是常見的數字混淆陷阱。", "❌ 複丈聲請應在「公告期間內」提出（公告期間是30日），而非「公告期滿後三十日內」。公告期滿後就喪失聲請複丈的機會，應在公告期間內提出。", "❌ 公告期滿且無異議（未聲請複丈），地政機關辦理的是「地籍測量成果登記」（即照新測量結果登記），而非「土地更正登記」。更正登記是針對既有登記錯誤的更正，性質不同。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "110", "num": 4, "q": "依土地法規定，聲請為土地權利變更登記，應繳納登記費，下列敘述何者正確？", "opts": ["由權利人與義務人雙方共同按公告地價或權利價值千分之一繳納登記費", "由權利人按公告現值或權利價值千分之二繳納登記費", "由權利人按申報地價或權利價值千分之一繳納登記費", "由義務人按公告現值或權利價值千分之二繳納登記費"], "ans": 2, "exps": ["❌ 登記費由「權利人」單獨繳納，非雙方共同繳納；且計費基礎是「申報地價」，非「公告地價」。", "❌ 計費基礎是「申報地價」（非公告現值），費率是「千分之一」（非千分之二）。", "✓ 土地法第76條原文即如此規定：由「權利人」按「申報地價或權利價值」「千分之一」繳納登記費。三個要素缺一不可：義務人是權利人、計費基礎是申報地價（非公告現值）、費率是千分之一（非千分之二）。", "❌ 繳費義務人是「權利人」（非義務人），計費基礎是「申報地價」，費率是「千分之一」。三個要素全錯。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "110", "num": 14, "q": "依土地法規定，未辦理繼承登記之土地經列冊管理達多久後，逾期仍未聲請登記者，該土地應如何處理？", "opts": ["列冊管理期間為 15 年，由財務部國有財產署公開標售", "列冊管理期間為 15 年，由地政機關公開標售", "列冊管理期間為 20 年，由法院公開拍賣", "列冊管理期間為 20 年，逕登記為國有土地"], "ans": 0, "exps": ["✓ 土地法第73條之1：列冊管理期間為15年，期滿由財政部（注意：是財政部，本選項寫「財務部」有筆誤，但答案仍為A）國有財產署公開標售。以官方答案A為準，實際法條是財政部國有財產署。", "❌ 標售機關是財政部國有財產署，非地政機關。", "❌ 期間是15年（非20年），機關是財政部國有財產署（非法院），且程序是「標售」（非「拍賣」，兩者性質不同）。", "❌ 期間錯誤（應為15年），且並非直接登記為國有（需先經標售程序，標售5次不成才登記國有）。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "111", "num": 1, "q": "下列有關未辦繼承登記不動產處理方式之敘述，何者正確？", "opts": ["未辦繼承登記不動產，於繼承開始之日起逾六個月未辦理繼承登記者，該管直轄市或縣市地政 機關於查明後，應即公告繼承人於一個月內聲請登記", "未辦繼承登記不動產，由該管直轄市或縣市地政機關列冊管理期間為十年", "未辦繼承登記不動產，逾期仍未辦繼承而由該管直轄市或縣市地政機關公開標售時，土地或建 築改良物租賃期間未超過五年者，於標售後以五年為限", "逾期未辦繼承登記不動產於經公開標售之價款儲存設立在國庫專戶時，繼承人得依其法定應繼 分申請領取"], "ans": 3, "exps": ["❌ 觸發公告的門檻是逾「一年」（非六個月），公告後聲請期間是「六個月」（非一個月），兩個數字都錯。", "❌ 列冊管理期間是「十五年」，不是十年。", "❌ 本項描述不正確，標售時若租賃期間未超過五年者，於標售後以五年為限，超過五年部分不受拘束，並非租賃期間超過五年即終止。", "✓ 土地法第73條之1第4項：標售所得價款於國庫設立專戶，繼承人得依其法定應繼分申請領取。本選項正確描述了繼承人的領款權利。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "111", "num": 20, "q": "聲請為土地權利變更登記之案件，在登記尚未完畢前，登記機關接獲法院為何種囑託登記時，應即改辦之？", "opts": ["查封登記、預告登記", "假處分登記、滅失登記", "假扣押登記、破產登記", "輔助宣告登記、監護宣告登記"], "ans": 2, "exps": ["❌ 預告登記是申請人申請的保全登記，並非法院囑託的限制登記，若登記未完畢前接獲法院囑託預告登記，這種情形幾乎不存在（預告登記由請求權人申請，非法院囑託）。查封登記雖是正確的，但預告登記不是。", "❌ 滅失登記是土地因天然災害滅失後辦理的登記，非法院囑託的限制登記，不在應改辦的範圍內。", "✓ 土地登記規則第141條：在案件登記未完畢前，登記機關接獲法院囑託辦理查封、假扣押、假處分、暫時處分、破產登記或因法院裁定而為之限制登記，應即改辦之。本選項的假扣押登記和破產登記都是法院囑託的限制登記，符合應改辦的情形。", "❌ 輔助宣告與監護宣告登記是針對當事人行為能力的限制，性質上與土地權利限制登記不同，且不在土地登記規則第141條應即改辦的範圍內。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "112", "num": 7, "q": "有關土地總登記，經聲請而逾限未補繳證明文件者之情形，下列何者錯誤？", "opts": ["其土地視為無主土地", "由該管直轄市或縣（市）地政機關公告之", "公告期間不得少於十五日", "公告期滿，無人提出異議，即為國有土地之登記"], "ans": 2, "exps": ["❌ 本選項描述正確：土地總登記逾限未補繳證明文件，土地依法視為無主土地（土地法第57條），非錯誤。", "❌ 本選項描述正確：視為無主土地後，由地政機關公告，非錯誤。", "✓ 本選項為錯誤敘述：土地法第57條規定公告期間不得少於「三十日」（非十五日）。公告30日是法定最低期間，本選項說15日，數字錯誤，故為答案。", "❌ 本選項描述正確：公告期滿無異議，即辦理國有土地登記，非錯誤。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "112", "num": 8, "q": "依土地法規定，有關繼承登記，下列何者正確？", "opts": ["繼承登記應於繼承開始之日起一個月內為之，否則視為逾期登記", "繼承開始之日起逾三個月未辦理繼承登記者，經該管直轄市或縣市地政機關查明後，應即公告 繼承人於一年內聲請登記", "逾期未聲請繼承登記之土地，經地政機關列冊管理十五年，逾期仍未聲請繼承登記者，由地政 機關將該土地清冊移請財政部國有財產署公開標售", "標售逾期未辦繼承登記土地所得之價款，逾十五年無繼承人申請提領該價款者始得歸屬國庫"], "ans": 2, "exps": ["❌ 繼承登記期限是「六個月」，不是一個月。一個月是一般土地權利變更登記的期限，不是繼承登記。", "❌ 觸發公告的門檻是逾「一年」（非三個月），公告後聲請期間是「六個月」（非一年），兩個數字都錯。", "✓ 土地法第73條之1完整程序：列冊管理15年→移請財政部國有財產署標售。本選項正確描述列冊管理期間（15年）和標售機關（財政部國有財產署）。", "❌ 標售價款歸國庫的期限是「逾十年」，不是十五年。15年是列冊管理期間，10年是標售後繼承人的領款期限，這兩個數字常被混淆。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "112", "num": 15, "q": "依土地登記規則之規定，於何種情形下登記機關應以書面敘明理由或法令依據，通知申請人於接到通知書之日起十五日內補正，下列何者錯誤？", "opts": ["申請人之資格不符或其代理人之代理權有欠缺", "登記申請書不合程式，或應提出之文件不符或欠缺", "未依規定繳納登記規費", "登記之權利人、義務人或其與申請登記之法律關係有關之權利關係人間有爭執"], "ans": 3, "exps": ["❌ 申請人資格不符或代理權欠缺，依土地登記規則應予「駁回」，而非補正。補正是針對可以補充或更正的程序瑕疵。", "❌ 申請書不合程式或文件欠缺，依土地登記規則第57條，應限期補正，但本題問的是「不予補正而駁回」的情形，故此選項雖與補正有關但不是答案所問。", "❌ 未繳登記規費，可以補繳，屬補正事項而非直接駁回。", "✓ 當事人之間對於登記的法律關係有爭執時，登記機關應通知其於一定期間內向司法機關訴請處理，而非直接補正，屬於應予通知當事人另循司法救濟的情形，不是書面通知15日內補正的情形。本選項是題目所問的「不予補正通知」的情形。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "112", "num": 19, "q": "依土地法規定，有關地籍測量之相關規定，下列何者錯誤？", "opts": ["地籍測量時，土地所有權人應設立界標，並永久保存之", "地籍測量，如由該管直轄市或縣（市）政府辦理，其實施計畫應經該地方之地政機關核定", "重新實施地籍測量時，土地所有權人應於地政機關通知之限期內，自行設立界標，並到場指界", "重新實施地籍測量之結果，應予公告，其期間為三十日"], "ans": 1, "exps": ["❌ 本選項描述正確：土地法第46條規定土地所有權人應設立界標並永久保存。", "✓ 本選項為錯誤敘述：依土地法第46條，地籍測量由直轄市或縣（市）政府辦理時，實施計畫應報請中央地政機關核定（非由「地方地政機關核定」，中央地政機關即內政部才有核定權），本選項錯在核定機關層級。", "❌ 本選項描述正確：重測時所有權人應自行設立界標並到場指界，這是重測配合義務。", "❌ 本選項描述正確：重測結果公告期間為三十日（土地法第46條之2）。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "112", "num": 20, "q": "依土地法之規定，有關土地登記之損害賠償，下列何者錯誤？", "opts": ["因登記錯誤遺漏或虛偽致受損害者，由該地政機關負損害賠償責任", "登記人員或利害關係人，於登記完畢後，發見登記錯誤或遺漏時，非以書面聲請該管上級機關 查明核准後，不得更正", "地政機關所負之損害賠償，如因登記人員之重大過失所致者，由該人員及地政機關負連帶損害 賠償責任，撥歸登記儲金", "損害賠償之請求，如經該地政機關拒絕，受損害人得向司法機關起訴"], "ans": 2, "exps": ["❌ 本選項描述正確，符合土地法第68條第1項，非錯誤。", "❌ 本選項描述正確，符合土地法第69條，非錯誤。", "✓ 本選項為錯誤敘述：依土地法第68條第2項，地政機關賠償後，若因登記人員之「故意」或「重大過失」所致，地政機關得「向登記人員求償」，而非由該人員及地政機關「連帶負責」。連帶責任的說法不正確，且賠償是從登記儲金支付（正確），但責任結構說法有誤，故為錯誤選項。", "❌ 本選項描述正確，符合土地法第68條第3項，非錯誤。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "114", "num": 1, "q": "因土地登記有錯誤致人民受有損害，地政機關負損害賠償後，於登記人員未盡下列那一種注意義務時，得對登記人員行使求償權？", "opts": ["抽象輕過失責任", "重大過失責任", "具體輕過失責任", "通常事變責任"], "ans": 1, "exps": ["❌ 抽象輕過失是一般人應注意的標準，未達此標準即有輕過失。地政機關對登記人員行使求償權的門檻比輕過失高，需要達到重大過失，才能求償。", "✓ 土地法第68條第2項：地政機關對受損害人賠償後，若損害係因登記人員之「故意」或「重大過失」所致者，地政機關得向該登記人員求償。重大過失（非普通過失，更非輕過失）才是求償的門檻，設計上保護一般職業風險下的登記人員，避免因一般疏失就被求償。", "❌ 具體輕過失是低於一般注意義務的標準，更低於重大過失。地政機關求償的門檻是重大過失，非具體輕過失。", "❌ 通常事變是不可抗力以外的一般意外，與過失責任是不同的法律概念，不是本條的責任標準。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "114", "num": 2, "q": "甲為A地之登記名義人，與乙成立附條件的A地贈與契約，則甲與乙可以對A地申請做下列那一種土地登記？", "opts": ["假處分登記", "第一次登記", "註記登記", "預告登記"], "ans": 3, "exps": ["❌ 假處分登記是法院依債權人聲請禁止被告改變現狀的保全處分，由法院囑託辦理，非申請人自行申請；且假處分不是保全將來土地移轉請求權的工具。", "❌ 第一次登記（土地總登記）是地籍建立時的初次登記，不是保全移轉請求權的手段。", "❌ 註記登記是在登記簿上加註特定事項（如限制性法令）的登記，不具有保全移轉請求權的效力。", "✓ 土地法第79條之1：聲請保全關於土地權利移轉或使其消滅之請求權，由請求權人檢附登記名義人之同意書辦理預告登記。附條件的贈與契約，受贈人（乙）對贈與人（甲）有土地移轉的請求權（條件成就後），甲可同意乙辦理預告登記，以保全這個將來的請求權。"]}, {"ch": "A2", "chName": "A2 土地登記", "year": "114", "num": 10, "q": "土地法第78條第8款所稱限制登記，謂限制登記名義人處分其土地權利所為之登記，下列何者非屬之？", "opts": ["更正登記", "假處分", "破產登記", "預告登記"], "ans": 0, "exps": ["✓ 本題問的是「非屬」限制登記的選項。更正登記是針對登記錯誤遺漏的更正手段，目的是「糾正已登記的錯誤」，不是「限制登記名義人處分土地」，故非限制登記的範疇。", "❌ 假處分登記屬限制登記（限制登記名義人不得處分土地），為土地法第78條第8款的限制登記類型之一。", "❌ 破產登記屬限制登記（破產人不得自由處分財產），為土地法第78條第8款的限制登記類型之一。", "❌ 預告登記屬限制登記（限制登記名義人的處分對預告登記請求人不生效力），為土地法第78條第8款的限制登記類型之一。"]}];
const CHS=[...new Set(CARDS.map(c=>c.chName))];
let sel=Object.fromEntries(CHS.map(c=>[c,1]));
let ans={};
const g=id=>document.getElementById(id);
function renderPills(){
  const p=g('pills');p.innerHTML='';
  CHS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='pill'+(sel[ch]?' on':'');
    b.textContent=ch;
    b.onclick=()=>{sel[ch]=sel[ch]?0:1;renderPills();renderList();};
    p.appendChild(b);
  });
}
function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}
function selNone(){Object.keys(sel).forEach(k=>sel[k]=0);renderPills();renderList();}
function resetAll(){if(!confirm('確定要清除所有作答記錄？'))return;ans={};renderList();updateProg();}
function renderList(){
  const list=g('list');list.innerHTML='';
  const vis=CARDS.filter(c=>sel[c.chName]);
  let lastCh='';
  vis.forEach(card=>{
    const idx=CARDS.indexOf(card);
    if(card.chName!==lastCh){
      const h=document.createElement('div');h.className='ch-header';h.textContent=card.chName;list.appendChild(h);lastCh=card.chName;
    }
    list.appendChild(makeCard(card,idx));
  });
  updateProg();
}
function makeCard(card,idx){
  const a=ans[idx];
  const div=document.createElement('div');
  div.className='qcard'+(a?(a.ok?' answered-ok':' answered-ng'):'');
  div.id='c'+idx;
  div.innerHTML=`<div class="qmeta"><span>【${card.year}年第${card.num}題】</span><span class="qtag">${card.chName}</span></div><div class="qtext">${card.q}</div>`;
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="ltr">${l}</span><span>${card.opts[i]}</span>`;
    if(a){b.disabled=true;if(i===card.ans)b.classList.add('show-correct');if(i===a.chosen&&!a.ok)b.classList.add('ng');}
    else b.onclick=(i=>()=>pick(idx,i))(i);
    opts.appendChild(b);
  });
  div.appendChild(opts);
  const eb=document.createElement('div');eb.className='expbox'+(a?' show':'');eb.id='e'+idx;
  eb.innerHTML=`<div class="exph">&#128218; 逐選項解析</div><div class="expb" id="eb${idx}">${a?buildExp(card,a.chosen,a.ok):''}</div>`;
  div.appendChild(eb);
  return div;
}
function buildExp(card,chosen,ok){
  let h=`<div style="margin-bottom:7px;"><span class="verdict ${ok?'ok':'ng'}">${ok?'答對了':'答錯了'}</span></div>`;
  ['A','B','C','D'].forEach((l,i)=>{
    const ec=i===card.ans?'ok':(i===chosen&&!ok?'ng':'no');
    h+=`<div class="ei"><span class="el ${ec}">${l}</span><span>${card.exps[i]||''}</span></div>`;
  });
  return h;
}
function pick(idx,chosen){
  const card=CARDS[idx];const ok=(chosen===card.ans);
  ans[idx]={chosen,ok};
  const div=g('c'+idx);
  div.className='qcard'+(ok?' answered-ok':' answered-ng');
  div.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;b.onclick=null;
    if(i===card.ans)b.classList.add('show-correct');
    if(i===chosen&&!ok)b.classList.add('ng');
  });
  g('eb'+idx).innerHTML=buildExp(card,chosen,ok);
  g('e'+idx).classList.add('show');
  updateProg();
}
function updateProg(){
  const vis=CARDS.filter(c=>sel[c.chName]);
  const tot=vis.length,done=vis.filter(c=>ans[CARDS.indexOf(c)]!==undefined).length;
  const cor=vis.filter(c=>{const a=ans[CARDS.indexOf(c)];return a&&a.ok;}).length;
  g('pd').textContent=done;g('pt').textContent=tot;
  g('pr').textContent=done?Math.round(cor/done*100)+'%':'-';
  g('pf').style.width=tot?done/tot*100+'%':'0%';
}
renderPills();renderList();
</script>
</body>
</html>
