<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民法概要｜歷屆考題小卡（B+C・債編完整版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F8F3E9;--paper-deep:#EFE6D5;--ink:#2A2722;--ink-soft:#7A7165;--rule:#DED1B9;--stamp:#A8402B;--gold:#BC8A2E;--green:#5C7A4A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:radial-gradient(circle at 12% 8%,rgba(188,138,46,.06),transparent 40%),radial-gradient(circle at 90% 95%,rgba(168,64,43,.05),transparent 45%),var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px;}
.wrap{width:100%;max-width:560px;}
header{text-align:center;margin-bottom:14px;}
.case-tag{display:inline-flex;align-items:center;gap:6px;font-family:'Noto Serif TC',serif;font-weight:700;font-size:12px;letter-spacing:.12em;color:var(--stamp);border:1px solid var(--stamp);border-radius:999px;padding:3px 12px;margin-bottom:10px;}
h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:21px;letter-spacing:.04em;line-height:1.5;}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;margin-top:4px;font-family:'Noto Sans TC',sans-serif;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 6px;}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);cursor:pointer;user-select:none;transition:all .15s ease;white-space:nowrap;}
.chip.active{color:#fff;border-color:transparent;}
.filter-row{display:flex;justify-content:center;margin-bottom:8px;}
.filter-row .chip{border-color:var(--ink);color:var(--ink);font-weight:700;font-size:12px;padding:5px 12px;}
.filter-row .chip.active{background:var(--ink);color:#fff;}
.progress{text-align:center;font-family:'Noto Serif TC',serif;font-weight:700;font-size:13px;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:10px;}
.progress b{color:var(--ink);font-size:15px;}
.progress-bar{height:3px;background:var(--rule);border-radius:2px;overflow:hidden;margin:0 auto 18px;max-width:200px;}
.progress-fill{height:100%;background:var(--stamp);transition:width .25s ease;}
.scene{perspective:1800px;width:100%;}
.card{position:relative;width:100%;min-height:540px;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.card.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:1.5px solid var(--rule);background:#fff;display:flex;flex-direction:column;padding:20px;box-shadow:0 4px 18px rgba(42,39,34,.07);overflow-y:auto;}
.face.back{transform:rotateY(180deg);background:var(--paper-deep);}
.face.back{border-left:6px solid var(--cat-color,var(--stamp));}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{font-size:11px;font-weight:700;color:#fff;padding:4px 12px;border-radius:999px;letter-spacing:.06em;font-family:'Noto Serif TC',serif;}
.year-badge{font-size:11px;font-weight:700;color:var(--ink-soft);border:1px solid var(--rule);border-radius:999px;padding:3px 10px;font-family:'Noto Serif TC',serif;}
.mastery-badge{font-size:18px;line-height:1;}
.q-text{font-size:14px;line-height:1.8;margin-bottom:14px;font-weight:500;}
.opt-list{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;gap:8px;padding:9px 10px;border-radius:8px;border:1.5px solid var(--rule);background:#fff;font-size:13px;line-height:1.6;cursor:pointer;transition:all .15s ease;}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--stamp);background:#FBEAE6;}
.opt .letter{font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:12px;}
.hint{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;letter-spacing:.1em;font-family:'Noto Serif TC',serif;}
.answer-banner{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px;padding:10px;border-radius:8px;margin-bottom:12px;}
.answer-banner.correct{background:#EFF4EC;color:var(--green);border:1.5px solid var(--green);}
.answer-banner.wrong{background:#FBEAE6;color:var(--stamp);border:1.5px solid var(--stamp);}
.exp-list{display:flex;flex-direction:column;gap:8px;}
.exp-item{padding:9px 10px;border-radius:8px;font-size:12.5px;line-height:1.75;border:1.5px solid var(--rule);background:#fff;}
.exp-item.right{border-color:var(--green);background:#EFF4EC;}
.exp-item .exp-head{font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.exp-item.right .exp-head{color:var(--green);}
.exp-item:not(.right) .exp-head{color:var(--stamp);}
.extra-box{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.75;}
.trap-box{background:#FBF1E6;border:1.5px solid var(--gold);}
.trap-box .extra-head{color:var(--gold);font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.related-box{background:#EEF1F7;border:1.5px solid #5B7A99;}
.related-box .extra-head{color:#5B7A99;font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;border:1.5px solid var(--ink);background:#fff;color:var(--ink);border-radius:10px;padding:10px 16px;cursor:pointer;transition:all .15s ease;}
.btn:hover{background:var(--ink);color:#fff;}
.btn.primary{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.btn.primary:hover{background:#8c3322;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green);color:#fff;}
.btn.icon{padding:10px 14px;}
.quiz-stats{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:14px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.quiz-stats b{font-family:'Noto Serif TC',serif;}
.quiz-stats .ok{color:var(--green);}
.quiz-stats .ng{color:var(--stamp);}
footer{margin-top:28px;text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.12em;line-height:2;}
footer .reset{text-decoration:underline;cursor:pointer;color:var(--ink-soft);background:none;border:none;font-size:11px;letter-spacing:.12em;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="case-tag">案號 B+C・債編完整版</div>
    <h1>民法概要 考題小卡
      <span class="sub">99-114年不動產經紀人考題・共 119 題（B1-B6債編總則＋C1-C5各種之債）</span>
    </h1>
  </header>
  <div class="filter-row"><div class="chip active" id="resetBtn">全部分類</div></div>
  <div class="chips" id="chips"></div>
  <div class="progress"><b id="curNum">1</b> / <span id="totalNum">119</span>　<span id="catName"></span></div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="top-row">
          <span class="cat-badge" id="badgeFront"></span>
          <span class="year-badge" id="yearFront"></span>
          <span class="mastery-badge" id="badgeMasteryFront"></span>
        </div>
        <div class="q-text" id="qText"></div>
        <div class="opt-list" id="optList"></div>
        <div class="hint">點選一個選項　看詳解 ▸</div>
      </div>
      <div class="face back">
        <div class="top-row">
          <span class="cat-badge" id="badgeBack"></span>
          <span class="year-badge" id="yearBack"></span>
          <span class="mastery-badge" id="badgeMasteryBack"></span>
        </div>
        <div class="answer-banner" id="answerBanner"></div>
        <div class="exp-list" id="expList"></div>
        <div class="extra-box trap-box"><div class="extra-head">⚠️ 考試陷阱</div><div id="trapText"></div></div>
        <div class="extra-box related-box"><div class="extra-head">🔗 關聯題目</div><div id="relatedText"></div></div>
        <div class="hint">◂ 點擊卡片　回題目</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn icon" id="markReview">🔄 待複習</button>
    <button class="btn green icon" id="markMastered">✅ 已掌握</button>
  </div>
  <div class="controls">
    <button class="btn icon" id="prevBtn">◂ 上一題</button>
    <button class="btn primary" id="shuffleBtn">🔀 隨機</button>
    <button class="btn icon" id="nextBtn">下一題 ▸</button>
  </div>
  <div class="quiz-stats">
    <span>本輪：<b class="ok" id="quizOk">0</b> 對　<b class="ng" id="quizNg">0</b> 錯</span>
    <span style="cursor:pointer;text-decoration:underline;" id="resetQuiz">重新測驗</span>
  </div>
  <div class="quiz-stats">
    <span>累積：已作答 <b id="totalAttempts">0</b> 題次・正確率 <b id="overallAcc">—</b>・已掌握 <b id="masteredCount">0</b>/<b id="totalCards">0</b></span>
  </div>
  <footer>不動產經紀人考試・民法概要｜每題附A-D逐選項詳解＋考試陷阱提醒＋關聯題目<br>
    v1.0　2026-06-22　B+C 債編完整版 119 題<br>
    <button class="reset" id="resetMastery">清除所有「已掌握」標記</button>
  </footer>
</div>
<script>
const CARDS=[
{id:"EBC001",cat:"B1債之發生與消滅",year:"100年第8題",q:"甲向乙承諾當民國100年12月31日那天，要將天上的某一顆星星送給乙，乙並允諾之。則甲乙間之約定效力如何？",
 opts:["無效","有效","效力未定","得撤銷"],correct:0,
 exps:["（本題答案）民法71條：法律行為，違反強制或禁止之規定者，無效；民法246條：以不能之給付為契約標的者，其契約為無效。本題「將天上的某一顆星星送給乙」屬於「自始客觀不能」的給付（依現行科技或法律完全不可能實現），以不能之給付為標的的契約，自始無效。","給付內容自始客觀不能，契約不可能「有效」。","效力未定通常適用於缺乏處分權或代理權的情形，與本題「自始不能」的情境不同，不適用。","得撤銷適用於意思表示有瑕疵的情形，本題的問題在於給付標的本身不能實現，不是意思表示瑕疵問題，不適用。"],
 trap:"這題考的是「自始客觀不能」這個概念——合約從締結之初就注定無法實現（不是事後因某種原因才變成不能），效果是整個契約「自始無效」，不是效力未定或得撤銷。考試常把「自始不能」（無效）跟「嗣後不能」（可能構成債務不履行，給付不能）混淆，要先判斷不能的時點是「訂約前就不能」還是「訂約後才不能」，這決定了適用的規則完全不同。",related:"與103年第9題（契約標的有效性判斷）、104年第9題（訂約前標的物已滅失的契約效力）同屬「給付不能與契約效力」主題群，三題合併可建立完整的「不能給付」判斷架構。"},
{id:"EBC002",cat:"B1債之發生與消滅",year:"100年第11題",q:"下列敘述，何者正確？",
 opts:["契約之要約人，因要約而受拘束，不可預先聲明不受拘束","貨物標定賣價陳列者，視為要約","對話為意思表示者，其意思表示於通知達到相對人時，發生效力","甲之友人乙患病，甲口頭對乙表示：我每月給你1萬元生活費，此種契約為贈與契約"],correct:3,
 exps:["民法154條第1項但書：要約人預先聲明不受拘束者，要約失其拘束力——要約人「得」預先聲明不受拘束，本選項說「不可」與法條但書規定相反，敘述錯誤。","民法154條第2項：貨物標定賣價陳列者，視為要約——注意這是「視為要約」（可以直接承諾成立契約），不是「視為要約之引誘」（只是邀請對方提出要約），本選項說法可能誤導，但若選項說的是「視為要約」就是正確的（確認選項B的確切文字後判斷）。","民法94條：對話為意思表示者，其意思表示以相對人「了解」時，發生效力——不是「達到」，而是「了解」，「達到」是非對話意思表示的發生要件（民法95條），本選項把兩種情形的要件混淆了。","（本題答案）甲口頭答應每月給乙1萬元生活費，這是以一定金錢給付為標的的無償行為（甲沒有要求乙給付任何對待給付），性質上屬於贈與契約（民法406條：稱贈與者，謂當事人約定，一方以自己之財產無償給與他方，他方允受之契約），敘述正確。"],
 trap:"這題的陷阱集中在意思表示的效力發生時點——「對話」意思表示是以相對人「了解」時生效（94條），「非對話」（書信電報等）是以通知「達到」相對人時生效（95條）。這兩條規定非常容易互相混淆，考試很愛把這兩組對話/非對話的「了解」vs「達到」要件互換來製造陷阱。另外贈與的識別重點是「無償性」——只要甲一方給乙財產利益而乙不需要任何對待給付，就是贈與，不要被「生活費」這個用語誤導認為是扶養義務或其他性質。",related:"與105年第11題（契約成立之要約承諾規則整體敘述）、109年第4題（契約成立規則）同屬債之發生/契約成立主題群。"},
{id:"EBC003",cat:"B1債之發生與消滅",year:"101年第37題",q:"甲向乙借一套百科全書，下列敘述何者最正確？",
 opts:["在乙承諾將百科全書借給甲後，甲與乙之借貸契約即成立","甲與乙之借貸契約為諾成契約，因此甲之要求即視為要約，乙不必將書交付甲，只要承諾即可","由於甲係向乙借用百科全書，該借貸係屬使用借貸，乙不得向甲請求報酬","由於甲係向乙借用百科全書，在乙交付前，甲沒有強制要求乙必須交付之請求權"],correct:3,
 exps:["使用借貸（借用物品，用完要還原物）是「要物契約」——必須「交付借用物」契約才告成立，不是單純雙方合意（諾成）就成立，所以「乙承諾後」契約尚未成立，本選項說契約「即成立」是錯的。","同上，使用借貸是要物契約，不是諾成契約，本選項說「諾成契約，承諾即可」與法律性質不符。","使用借貸確實是無償契約，乙不得向甲請求報酬，這個敘述本身正確，但本題問「最正確」的，需要與D選項比較。","（本題答案）使用借貸是要物契約（民法464條：稱使用借貸者，謂當事人一方以物交付他方，而約定他方於無償使用後返還其物之契約）——因為需要「交付」才成立契約，在乙尚未交付百科全書之前，契約還沒成立，甲自然沒有對乙的強制交付請求權，敘述最正確。"],
 trap:"使用借貸（借用物品）是「要物契約」，消費借貸（借錢）也是「要物契約」——兩者都需要「交付」才使契約成立，與一般諾成契約（如買賣、租賃）「合意即成立」不同。考試常用這種「借」的情境考要物/諾成的區別，以及「要物契約在交付前當事人沒有強制請求交付之請求權」這個邏輯推論（因為契約尚未成立，自然沒有基於契約的請求權）。",related:"與112年第8題（要物契約的識別，消費借貸契約是要物契約）同屬要物/諾成契約主題，兩題合併可建立完整的契約類型判斷能力。"},
{id:"EBC004",cat:"B1債之發生與消滅",year:"103年第21題",q:"甲、乙、丙共同竊取丁之財物，丁損失共計新臺幣30萬元，丁僅原諒其子甲之行為，而免除其債務。下列敘述，何者正確？",
 opts:["丁原諒甲的行為，視為同時免除乙、丙之債務，乙、丙無須負賠償責任","甲、乙、丙為連帶債務，丁免除甲之債務，僅免除甲應分擔之10萬元，乙、丙各應對丁負擔20萬元之連帶賠償責任","丁免除甲的債務後，乙、丙各須對丁負30萬元之連帶賠償責任","甲、乙、丙為不真正連帶債務，丁免除甲之債務，僅免除甲應分擔之10萬元，乙、丙各應對丁負擔20萬元之連帶賠償責任"],correct:1,
 exps:["民法276條並未規定免除一人之債務即視為同時免除其他連帶債務人之債務，本選項的推論與法條規定不符。","（本題答案）民法276條第1項：債權人向連帶債務人中之一人免除債務，而無消滅全部債務之意思表示者，除該債務人應分擔之部分外，他債務人仍不免其責任——甲、乙、丙三人共同侵權成立連帶債務，各應分擔1/3（即10萬元），丁僅免除甲之債務且無消滅全部債務之意思，依276條，乙、丙仍就自己應分擔之部分以外的金額（即30萬-10萬=20萬元）對丁負連帶責任，敘述正確。","若丁免除甲的債務後，乙丙仍各須負全部30萬的連帶賠償責任，這等同於免除甲的債務毫無效果，與276條「除應分擔部分外他債務人仍不免責」的規定不符。","不真正連帶債務的法律性質（各債務人基於不同法律原因對同一被害人負相同損害賠償義務）與本題情境（甲乙丙共同侵權成立真正連帶債務）不符，本選項把連帶債務誤認為不真正連帶債務。"],
 trap:"民法276條「免除連帶債務人之一的債務」的效力是「僅免除其應分擔的部分，其他人仍就剩餘金額連帶負責」，不是「免除一人等於免除全部」，也不是「免除一人後其他人仍須負擔全部金額」。計算方式：先算出被免除人的分擔份額（這部分徹底消滅），再把剩下的金額讓其他連帶債務人繼續連帶負責。本題三人各應分擔1/3（10萬），免除甲的10萬後，乙丙仍對剩下20萬連帶負責。",related:"與104年第13題（連帶債務時效中斷效力）、108年第17題（連帶債務承認之效力）同屬連帶債務主題群，三題合併可建立完整的連帶債務效力判斷架構。"},
{id:"EBC005",cat:"B1債之發生與消滅",year:"104年第17題",q:"下列關於抵銷之敘述，何者正確？",
 opts:["甲對乙有金錢債權、乙對甲有因侵權行為而生之損害賠償請求權時，乙不得對甲主張抵銷","甲對乙有金錢債權、乙對甲亦有金錢債權，兩者均屆清償期，甲得主張以己債與乙之債相互抵銷","甲對乙有金錢債務，甲將自己的金錢債務讓與第三人丙，由丙負擔清償，此屬抵銷","甲對乙有金錢債務，甲以提供其他物品替代清償，此屬抵銷"],correct:1,
 exps:["民法339條但書：因侵權行為而負擔之債，其債務人不得主張抵銷——注意本條的禁止主體是「因侵權行為而負債的那一方」（加害人），不是被侵權的一方。本題乙是侵權行為的債務人（加害人），乙不得以其對甲的金錢債權主張抵銷甲對乙的損害賠償請求；但本選項說「乙不得對甲主張抵銷」是正確的（乙是侵權債務人），但如果選項說的是「甲不得主張」就是錯的（甲是受害人，可以主張抵銷）。本選項的實際判斷視原文精確措辭而定，此處以官方答案B為準。","（本題答案）民法334條第1項：二人互負債務，而其給付種類相同，並均屆清償期者，各得以其債務，與他方之債務，互為抵銷——兩個金錢債權、同種類、均屆期，完全符合抵銷要件，甲得主張抵銷，敘述正確。","甲將自己的債務移轉給第三人丙由丙清償，這是「債務承擔」（民法300條），不是「抵銷」——抵銷是雙方互有對立債務互相消除，不涉及第三人，本選項把「債務承擔」誤認為「抵銷」。","甲以其他物品替代金錢清償，這是「代物清償」（民法319條），不是「抵銷」——代物清償是以原定給付以外的其他給付代替清償，本選項把「代物清償」誤認為「抵銷」。"],
 trap:"這題同時測試抵銷的適用要件（334條：二人互負債務、同種類、均屆期）與抵銷的禁止情形（339條：因侵權行為之債不得主張抵銷，但禁止的主體是加害人那方），以及把「抵銷」跟「債務承擔」「代物清償」這兩個容易混淆的概念辨明。記憶口訣：抵銷是「你欠我、我欠你，兩個互相消一消」；代物清償是「我欠你錢，但我給你別的東西代替」；債務承擔是「讓別人來替我還你的錢」。",related:"與111年第22題（抵銷之主張，對「抵銷」「抵充」等概念的識別）同屬債之消滅方法主題，兩題合併複習可完整掌握這個主題的常見陷阱。"},
{id:"EBC006",cat:"B1債之發生與消滅",year:"105年第11題",q:"有關契約之敘述，下列何者正確？",
 opts:["契約為事實行為的一種","契約得因要約交錯之方式成立","契約皆須以書面方式為之，方得以成立","契約成立後，一方當事人不得任意撤回其已為之要約"],correct:1,
 exps:["契約是典型的「法律行為」（雙方意思表示合致），需要當事人有效的意思表示才能成立，事實行為（如先占、無因管理）不需要意思表示即可發生法律效果，契約跟事實行為是截然不同的兩個概念，本選項錯誤。","（本題答案）民法153條第1項：當事人互相表示意思一致者，無論其為明示或默示，契約即為成立——契約除可由要約加承諾的方式成立外，也可以因「要約交錯」（雙方各自發出要約，兩個要約內容恰好相符合致）的方式成立，不限於單一的要約+承諾模式，敘述正確。","民法166條之1雖要求某些特定契約須以書面或公證方式為之，但這只是特定類型契約的例外要求，一般契約原則上採「不要式原則」，不需要書面就能成立，本選項把例外當作原則，敘述錯誤。","契約「成立後」，要約已發揮其功能（已促成承諾產生契約）或相對人已承諾，此時要約的效力問題已不重要，況且「一方當事人不得任意撤回已為之要約」的說法在要約「尚未發出」或「正在發出途中」的情境下才有意義，契約成立後已不再有「撤回要約」的問題，本選項表述不精確。"],
 trap:"「要約交錯」是一個比較冷門但確實存在的契約成立方式，當雙方各自送出要約（不是一方要約另一方承諾），而兩個要約的內容恰好一致時，契約也可以成立。考試常考「契約成立的方式」這個主題，要記得不只是「要約+承諾」這一種方式，「要約交錯」也是民法承認的成立方式之一。另外「不要式原則」（契約原則上不需要書面）與特定契約的要式例外也是常考的對比概念。",related:"與109年第4題（契約成立規則）、100年第11題（要約與承諾的各種規則）同屬契約成立主題群。"},
{id:"EBC007",cat:"B1債之發生與消滅",year:"109年第4題",q:"下列有關契約成立之敘述，何者錯誤？",
 opts:["契約得以要約與承諾之意思表示合致而成立","契約得以要約交錯之方式而成立","契約得以事實行為之方式成立","契約於當事人合意時成立，不以書面為必要"],correct:2,
 exps:["契約得由要約與承諾合致而成立，這是最典型的契約成立方式，完全正確。","契約得以要約交錯之方式成立（呼應105年第11題，兩題互相印證這個知識點），敘述正確。","（本題答案，敘述錯誤）契約是「法律行為」的一種，必須以意思表示為核心要素才能成立——事實行為（如無因管理、先占、發現埋藏物）是不需要意思表示就能發生法律效果的行為，契約「不得」以事實行為方式成立，本選項與法律性質根本矛盾。","一般契約採不要式原則，不以書面為必要（除非特別法規定），敘述正確。"],
 trap:"這題是105年第11題的「反面版」——105年問「何者正確」，109年問「何者錯誤」，但考點完全相同（契約的法律性質是法律行為而非事實行為、要約交錯可成立契約、不要式原則）。兩題放在一起比對，是確認你是否真正理解「法律行為vs事實行為」這個根本概念的有效練習。",related:"與105年第11題（契約成立規則，何者正確版）是同一考點正反版，兩題必須合併比對。"},
{id:"EBC008",cat:"B1債之發生與消滅",year:"111年第6題",q:"下列何種情形，債務人之原有債務不會發生消滅之效果？",
 opts:["債權人受領債務人以代物清償方式清償原有之債務","債務人對債權人已屆清償期之金錢債務，以符合抵銷條件之方式與債權人主張抵銷","債務人以第三人（丙）之名義向債權人為清償，並獲債權人受領","債務人將其對債權人所負之同一金錢債務，移轉於第三人（丙）擔負，並獲債權人同意"],correct:3,
 exps:["代物清償（民法319條）：當事人同意以他種給付代替原有給付，且受領人實際受領後，原債務即告消滅，本選項描述的情形確實使原債務消滅，不是本題答案。","抵銷（民法334條）：符合條件的互負債務相互抵銷後，雙方債務在抵銷範圍內消滅，本選項描述的情形確實使原債務（在抵銷額度內）消滅，不是本題答案。","由第三人代債務人為清償，債權人受領後（不論是否知悉由第三人代付），原債務因清償而消滅，本選項描述的情形確實使原債務消滅，不是本題答案。","（本題答案）債務承擔（民法300、301條）：第三人丙承擔甲的債務，甲的原有債務「移轉」給丙，但甲的原有債務並非因此「消滅」，而是由丙「繼承」承擔——原債務的同一性維持，只是債務人換人，原債務「不消滅」，本選項符合題目「不會發生消滅效果」的描述，是本題答案。"],
 trap:"這題測試「使債務消滅」vs「使債務移轉」這兩種不同效果的辨別——代物清償、抵銷、第三人清償都是讓原有債務「消滅」的方式；而「債務承擔」是讓債務從原債務人移轉到第三人，債務本身並未消滅（仍然存在，只是由不同主體承擔），這個「債務移轉但不消滅」的特質是本題的核心陷阱，也是債務承擔與清償、代物清償等使債務消滅的機制之間最關鍵的區別。",related:"與104年第17題（抵銷vs代物清償vs債務承擔的識別）高度相關，兩題合併可完整掌握「債之消滅方法」的各種概念辨別。"},
{id:"EBC009",cat:"B1債之發生與消滅",year:"111年第22題",q:"二人互負債務而其給付種類相同，並均屆清償期者，得以其債務與他方之債務互為下列何項主張，以消滅其債務？",
 opts:["抵銷","抵充","清算","更改"],correct:0,
 exps:["（本題答案）民法334條第1項的規定描述就是「抵銷」的定義——二人互負債務、給付種類相同、均屆清償期，得互為抵銷以消滅債務，完全符合。","抵充（民法321-322條）：債務人對同一債權人負有數個同種類之債務，清償金額不足以完全清償所有債務時，由雙方約定或依法定規則決定哪個債務先被清償，不是「互相消除」的概念，與題目描述不符。","清算：通常指公司或合夥解散後處理財產的程序，不是個人債務消滅的方式，與題目描述的情境不符。","更改（民法320條）：以新債務取代舊債務，需要成立新債務並使原債務消滅，過程比較複雜，且不是「互相消除」的概念，與題目描述的「二人互負債務、互相消滅」情境不同。"],
 trap:"這題是純粹的概念識別題，核心在於準確記住「抵銷」的定義——二人互負同種類已屆期的對立債務，互相消除。要特別注意「抵銷」vs「抵充」這組最容易混淆的概念：抵銷是「你欠我、我欠你，兩個互消」；抵充是「我欠你好幾筆債，這次還款先抵哪一筆」，兩者情境完全不同，但名稱相似，考試經常讓你在這兩個選項間做選擇。",related:"與104年第17題（抵銷之敘述，含抵銷vs代物清償vs債務承擔辨別）同屬債之消滅方法主題，建議合併複習。"},
{id:"EBC010",cat:"B1債之發生與消滅",year:"114年第11題",q:"甲賣給乙一隻狗狗，名喚S，乙光看甲提供的S犬照片就喜歡的不得了，馬上承諾以10萬元的價金訂立契約。下列何者錯誤？",
 opts:["本契約屬買賣契約","本契約為雙務契約","本契約為要物契約","本契約為有償契約"],correct:2,
 exps:["甲出售S犬予乙，以10萬元為價金，這完全符合買賣契約的定義（民法345條：稱買賣者，謂當事人約定一方移轉財產權於他方，他方支付價金之契約），敘述正確。","買賣契約下，甲負有交付S犬及移轉所有權的義務，乙負有支付10萬元價金的義務，雙方互負對待給付義務，是雙務契約，敘述正確。","（本題答案，敘述錯誤）買賣契約是「諾成契約」（雙方意思表示合致即成立），不是要物契約（要物契約需要「交付」才成立，如消費借貸、使用借貸、質權設定）。本題乙光看照片就承諾，甲乙意思表示已經合致，買賣契約當場成立，不需要實際交付S犬，這正是諾成契約的特徵，本選項把買賣誤認為要物契約，敘述錯誤。","買賣契約有對價（10萬元），是有償契約，敘述正確。"],
 trap:"這題重點在於買賣契約的基本性質識別——買賣是「諾成契約」（合意即成立，不需交付），要物契約（需要交付才成立）的代表是消費借貸、使用借貸、質權設定等。考試很愛用「甲乙還沒交付/尚未收到東西」的情境，讓你誤判契約是否已成立，進而誤選「要物契約」——要記住「買賣」從不是要物契約，即使買的東西還沒交付，買賣契約本身已告成立，只是出賣人負有交付的債務而已。",related:"與101年第37題（使用借貸是要物契約）、112年第8題（要物契約的識別）同屬諾成/要物契約辨別主題，三題合併可完整建立這個概念的判斷架構。"},
{id:"EBC011",cat:"B2債務不履行",year:"101年第4題",q:"下列有關加害人應負損害賠償責任之敘述，何者最正確？",
 opts:["受僱人甲因執行職務不法侵害第三人乙之權利時，原則上僅由甲對乙負損害賠償責任","受僱人甲因執行職務不法侵害第三人乙之權利時，原則上由甲與僱用人丙對乙負連帶賠償責任","受僱人甲因執行職務不法侵害第三人乙之財產時，僅乙得請求甲賠償","受僱人甲因執行職務不法侵害第三人乙之權利時，如係可歸責於甲或丙之事由，應由丙對乙負賠償責任"],correct:1,
 exps:["受僱人執行職務侵害第三人，不是只有受僱人甲單獨負責，民法188條明定僱用人與受僱人連帶負責（除非僱用人能舉證免責），本選項說「僅由甲負責」不正確。","（本題答案）民法188條第1項：受僱人因執行職務，不法侵害他人之權利者，由僱用人與受僱人連帶負損害賠償責任——甲與其僱用人丙對乙連帶負責，敘述正確。","侵權行為損害賠償請求不限於財產損害，人格權受侵害也可請求賠償，且188條下連帶賠償義務人是甲與丙，不只有甲，本選項表述過於侷限。","民法188條的連帶責任不以「可歸責於丙」為前提（這不同於一般的債務不履行要求可歸責性），只要受僱人甲執行職務侵害第三人，僱用人丙原則上就需連帶負責（除非丙能舉證監督無疏懈），本選項的前提條件設定有誤。"],
 trap:"民法188條的僱用人連帶責任有個重要特徵：僱用人的責任不需要「可歸責於僱用人」才成立——只要受僱人執行職務侵害他人，僱用人「原則上」就要連帶負責，除非僱用人能舉證「選任受僱人及監督其職務之執行，已盡相當之注意」或「縱加以相當之注意而仍不免發生損害」才可免責（188條第1項但書）。這種「先推定僱用人連帶負責、再由僱用人舉證免責」的設計，跟一般「要先有可歸責事由才負責」的邏輯是反過來的，是B6侵權行為主題最重要的考點之一。",related:"與99年第14題（僱用人連帶責任規則）、107年第16題（人格權受侵害之賠償）同屬侵權行為責任主題，三題建議合併複習。"},
{id:"EBC012",cat:"B2債務不履行",year:"101年第32題",q:"甲向乙提出給付，但給付遲延，下列敘述何者最正確？",
 opts:["乙得向甲主張遲延之損害賠償以代替原定給付","甲在遲延中，對於因不可抗力而生之損害，亦不負責","甲在遲延後，縱使因不可抗力而發生損害，原則上仍應負責","乙向甲主張遲延之損害賠償，則乙不得再依原定給付請求甲履行"],correct:2,
 exps:["遲延之損害賠償不能「代替」原定給付——乙應先請求甲履行原定給付，遲延賠償是附加的損害賠償（因遲延本身造成的額外損害），不能直接以遲延賠償代替原定給付（除非履行不能才可能發生替代損害賠償），本選項表述錯誤。","民法231條第1項但書：因不可抗力而生之損害，債務人不負遲延責任（指成立遲延之前提），但民法231條第1項後段規定：債務人在遲延中，因不可抗力而生之損害，亦應負責。也就是說，一旦進入「遲延」狀態，不可抗力的免責抗辯就消失了，本選項說「亦不負責」與法條規定相反。","（本題答案）民法231條第1項：債務人遲延者，債權人得請求其賠償因遲延而生之損害。債務人在遲延中，對於因不可抗力而生之損害，亦應負責——本選項正確表述了遲延中加重責任的規則（不可抗力免責在遲延後不再適用），敘述正確。","乙主張遲延損害賠償，並不影響乙仍可請求甲履行原定給付的權利（除非依234條乙為受領遲延，或依其他規定），本選項把「請求遲延賠償」和「請求原定給付」描述為互相排斥，與法條規定不符。"],
 trap:"給付遲延後「不可抗力責任加重」是民法231條的重要規則：正常情況下不可抗力可以免除債務人責任，但一旦債務人進入給付遲延狀態，這個免責抗辯就被剝奪了——即便損害真的是因不可抗力造成的，只要是在遲延期間發生的，債務人仍然要負責。這個規則設計的邏輯是：如果你及時履行，就不會有遲延期間，也就不會碰上這個不可抗力，所以應把遲延視為間接原因之一。",related:"與104年第8題（因債務不履行而解除契約之規則）、106年第31題、106年第38題（契約解除效力）同屬債務不履行主題群，建議合併複習建立完整架構。"},
{id:"EBC013",cat:"B2債務不履行",year:"102年第20題",q:"18歲的甲騎機車上學途中撞傷騎腳踏車的乙。下列敘述何者正確？",
 opts:["甲未成年，所以不須負損害賠償之責","由甲的法定代理人負損害賠償責任","乙只能請求甲賠償財產上之損害","乙得向甲請求財產上及非財產上之損害賠償"],correct:3,
 exps:["民法187條：未成年人有識別能力時，與其法定代理人連帶負侵權責任，不是完全不負責，況且甲18歲（已成年）根本不適用未成年人的特別規定，本選項前提有誤（18歲在修法後已是成年），且即使是未成年人，有識別能力者仍需負責。","若甲是18歲成年人（現行法成年為18歲），不存在「由法定代理人負責」這個規則（未成年且有識別能力才是連帶，已成年則自行負責），本選項不正確。","侵權行為的損害賠償不限於財產上損害，民法195條：不法侵害他人之身體、健康、名譽、自由、信用、隱私、貞操，或不法侵害其他人格法益而情節重大者，被害人雖非財產上之損害，亦得請求賠償相當之金額——乙受傷，可以請求包含慰撫金的非財產上損害賠償，本選項「只能請求財產上損害」的限制不正確。","（本題答案）乙可以依民法184條請求甲賠償因侵權行為造成的財產上損害（如醫療費、誤工損失），同時依195條請求非財產上損害賠償（慰撫金），兩者可以並行主張，敘述正確。"],
 trap:"侵權行為損害賠償的範圍包含「財產上損害」和「非財產上損害（慰撫金）」兩部分，不是只有財產損害。195條明文列舉了可以請求非財產上賠償的人格法益類型（身體、健康、名譽等），只要情節重大，被害人就可以同時請求兩種賠償。考試常用「只能請求財產損害」這種限縮說法作為陷阱選項，務必記住財產上和非財產上賠償可以並行主張。",related:"與101年第23題（非財產上損害賠償計算方式不以實際損害為限）同屬侵權行為損害賠償範圍主題，兩題互相呼應確認對195條的理解是否正確。"},
{id:"EBC014",cat:"B2債務不履行",year:"102年第24題",q:"A公司的董事甲前往與客戶簽約時，不慎撞傷路人乙。下列敘述何者正確？",
 opts:["屬車禍事故，由董事甲自行負損害賠償責任","由A公司對乙負損害賠償責任，並向甲求償","由A公司與甲對乙負連帶損害賠償責任","此為執行職務所造成之侵權行為，應由甲獨立對乙負損害賠償責任，A公司並無責任"],correct:2,
 exps:["民法28條：法人對於其董事或其他有代表權之人因執行職務所加於他人之損害，與該行為人連帶負賠償之責——這是法人對外的連帶賠償責任，不是甲單獨負責，本選項不正確。","依28條，A公司與甲是連帶負責，不是A公司先賠再向甲求償的順序關係，本選項把連帶責任誤解為A公司獨自負責再追償，不正確。","（本題答案）民法28條：法人（A公司）對於其董事甲因執行職務所加於他人（乙）之損害，與該行為人（甲）連帶負賠償之責——甲與A公司對乙連帶負損害賠償責任，敘述正確。","依28條，A公司也需要連帶負責（不是甲獨立負責，A公司置身事外），本選項不正確。"],
 trap:"民法28條是法人侵權責任的特別規定：法人因其董事或有代表權之人「執行職務」侵害他人，法人與該行為人「連帶」負賠償責任——這與民法188條受僱人侵權（僱用人也是連帶負責）的規則結構類似，都是「直接行為人+組織主體」連帶對被害人負責。要注意28條（法人/董事）與188條（僱用人/受僱人）的適用情境不同，但效果相同（都是連帶）。",related:"與101年第4題（受僱人侵權的連帶責任，188條）可對照比較28條（法人/董事連帶責任）與188條（僱用人/受僱人連帶責任）的異同。"},
{id:"EBC015",cat:"B2債務不履行",year:"102年第29題",q:"甲向乙承租房屋居住，因火災致房屋毀損滅失，乙請求甲損害賠償。下列敘述何者正確？",
 opts:["甲因火災致乙之房屋毀損滅失，構成侵權行為損害賠償責任","甲因火災致乙之房屋毀損滅失，構成債務不履行損害賠償責任，但僅限於故意行為","甲失火造成房屋損毀，如為重大過失所致，甲應負損害賠償責任","甲失火無論何種程度之過失，均應負損害賠償責任"],correct:2,
 exps:["火災損毀租賃物主要的法律依據是承租人對租賃物的保管義務（契約責任），不是侵權行為責任（民法234條「租賃物的保管」）——雖然在特定情況下侵權責任也可能並存（侵權責任與契約責任競合），但本題的核心規定是租賃的特別規定，本選項不夠精準。","承租人的損害賠償責任不限於故意，過失也可能構成，本選項「僅限於故意」表述過於狹窄，與法條不符。","（本題答案）民法434條：租賃物因承租人之重大過失，致失火而毀損、滅失者，承租人對出租人負損害賠償責任——租賃物失火的特別規定只在「重大過失」以上才讓承租人負責，輕過失失火不負責，本選項正確反映了434條的要件（重大過失以上），敘述正確。","依民法434條，輕過失失火不負損害賠償責任，本選項「無論何種程度之過失均應負責」與法條的「重大過失」門檻規定不符。"],
 trap:"這題考的是民法434條的特別規定：承租人因失火造成租賃物損毀，須具備「重大過失以上」才負賠償責任，一般輕過失失火不負責——這是對一般侵權責任規則（有過失即負責）的特別排除，反映了立法者對日常生活中失火事故的現實考量（輕過失失火過於常見，若一律負責會讓承租人過度負擔）。記憶口訣：「失火僅重過失以上始負責，輕過失失火免責」，是334條的特別規定，必須記住。",related:"與105年第20題（承租人因失火賠償之過失門檻）是同一法條的重複出題，兩題必須合併確認自己記住「重大過失」這個關鍵門檻。"},
{id:"EBC016",cat:"B2債務不履行",year:"104年第8題",q:"下列關於因債務不履行而解除契約之敘述，何者正確？",
 opts:["債權人解除契約者，即不得再向債務人請求損害賠償","因債務人給付不能而解除契約者，債務人不得請求對待給付","若標的物為不動產，於解除契約後，可以口頭表達解除之意思表示","催告後解除契約，催告不限定履行期間，亦可以任何方式為之"],correct:2,
 exps:["民法260條：解除權之行使，不妨礙損害賠償之請求——解除契約與損害賠償可以並行（解除並不排除賠償），本選項說「即不得再向債務人請求損害賠償」與260條明文規定相反，錯誤。","民法267條：當事人之一方因他方之給付不能而解除契約時，如就其原有之對待給付有損害者，得請求賠償——但「對待給付本身」是否要求給付，依266條：因不可歸責於雙方之事由，致一方之給付不能者，他方得免為對待給付。若因可歸責於債務人之事由致給付不能，由於債權人已解除契約，契約失其效力，債務人不得依原契約請求對待給付，本選項說法需要依情境判斷，但在「因債務人給付不能而解除」的情境下此說法基本正確，不是本題答案的原因在於有更明確正確的選項。","（本題答案）民法262條：解除權之行使，應向他方當事人以意思表示為之——解除契約是以意思表示為之即可，民法並未要求解除的意思表示必須採書面形式，口頭方式亦可（除非特別法另有規定），本選項敘述正確。","民法254條：當事人之一方依民法解除契約時，如催告後不履行而解除，催告應訂定相當期限——催告必須附定相當期限（給對方履行的合理時間），不定期限的催告不生催告效力，本選項說「不限定履行期間亦可」與法條規定相反。"],
 trap:"這題集中測試契約解除的幾個重要規則：①解除不妨礙損害賠償（260條）；②解除的意思表示不要式，口頭可以（262條）；③催告解除必須附定相當期限（254條）。其中「解除不妨礙損害賠償」是實務上重要但常被忽略的規則——很多人誤以為「既然解除了，關係就了結了，不能再請求賠償」，但260條明文排除這種誤解，解除與損害賠償可以並行，這是最重要的考點之一。",related:"與106年第31題（契約解除時給付不能的損害賠償）、106年第38題（契約解除之效果，回復原狀vs損害賠償）同屬契約解除主題群，三題合併可完整掌握解除契約的各個面向。"},
{id:"EBC017",cat:"B2債務不履行",year:"105年第15題",q:"依侵權行為請求損害賠償之說明，下列敘述何者正確？",
 opts:["純粹經濟上之損失亦屬於一種損害，與權利受損一樣，得依民法第184條第1項前段請求損害賠償","不法侵害他人之身體或健康，不得請求非財產上之損害賠償","侵害他人身體或健康，得依民法第195條請求非財產上損害賠償之規定，係屬強行規定，當事人不得依契約加以排除","依民法第184條第1項前段規定，請求損害賠償，須以行為人有故意為必要"],correct:3,
 exps:["民法184條第1項前段的保護範圍僅限於「權利」（如所有權、人格權）的侵害，純粹財產上的損失（未伴隨權利侵害）依通說不在此範圍內，本選項把184條第1項前段的保護範圍擴大到純粹財產損失，不正確（純粹財產損失可能適用184條第1項後段「故意以背於善良風俗之方法加損害於他人」）。","民法195條明文規定身體、健康受到不法侵害者可請求非財產上損害賠償，本選項說「不得」請求，與法條明文相反，完全錯誤。","民法195條雖是法律的明文保護，但依通說，195條的非財產上損害賠償規定是「任意規定」（不是強行規定），當事人可以在契約中事先約定排除或限制慰撫金的請求，本選項說是強行規定不得排除，與通說見解不符。","（本題答案）民法184條第1項前段：因故意或過失，不法侵害他人之權利者，負損害賠償責任——184條的構成要件包含「故意或過失」，不限於故意，本選項說「須以行為人有故意為必要」，忽略了「過失」也可構成侵權，敘述錯誤——等等，這是D選項的敘述。依照題目答案D，讓我重新解讀：D選項「須以行為人有故意為必要」是錯的（184條同時包含故意和過失），所以題目若問「何者正確」，D選項必須是「正確敘述」，但這個內容明顯錯誤，需要重新查核這題的題幹問法。"],
 trap:"⚠️ 請注意：本題官方答案為D，但D選項「請求損害賠償須以行為人有故意為必要」在法律上是錯誤的（184條第1項前段明文包含「故意或過失」）。若題目問「何者正確」，D不應為正確答案。若題目問「何者錯誤」，則D才是正確答案。建議在補習班教材中核對原始題幹問的是「何者正確」還是「何者錯誤」，再確認答案方向。以官方答案D為準，本題應問的是「何者錯誤」。核心考點：民法184條第1項前段是「故意或過失」（二者皆可），不是「僅故意」。",related:"與102年第20題（侵權行為損害賠償範圍含非財產損害）同屬侵權行為責任主題，建議合併複習184條與195條的適用範圍。"},
{id:"EBC018",cat:"B2債務不履行",year:"105年第16題",q:"有關民法第250條規定之違約金類型有「損害賠償總額預定違約金」與「懲罰性違約金」兩種，下列敘述何者正確？",
 opts:["損害賠償總額預定違約金之性質，係懲罰債務人而設，違約時除支付違約金外，債權人尚得請求損害賠償","損害賠償總額預定違約金係預先約定損害賠償之總額，違約時，債權人不得另行請求損害賠償","違約金過高時，只有債務人得聲請法院酌減之","因為違約金係雙方事先約定，所以法院不得介入酌減違約金"],correct:1,
 exps:["本選項描述的是「懲罰性違約金」的效果（懲罰＋可以另外請求損害賠償），但冠上「損害賠償總額預定違約金」的名稱，把兩種違約金的效果說反了，本選項錯誤。","（本題答案）損害賠償總額預定違約金（民法250條第1項）：當事人預先約定債務不履行時，損害賠償的金額，違約時債務人只需支付違約金，債權人「不得」再另行請求損害賠償（因為違約金本身就是損害賠償的總額預定，已包含在內），敘述正確。","民法252條：約定之違約金過高者，法院得「因當事人之請求」，酌減至相當之數額——聲請酌減的是「當事人」（通常是債務人），不限於「只有債務人」，其他有利害關係的當事人也可能有聲請的機會，但實務上主要是債務人聲請，本選項的「只有債務人」表述過於絕對。","民法252條明文授權法院在「當事人請求」下可以酌減過高的違約金，法院並非毫無介入空間，本選項說「法院不得介入」與252條規定相反。"],
 trap:"兩種違約金的核心區別：①「損害賠償總額預定違約金」（預定型）——違約時只付違約金，不另請求賠償，因為違約金本身就是賠償的預定金額；②「懲罰性違約金」（懲罰型）——違約時先付違約金，還可以再另外請求損害賠償，違約金是「加在損害賠償之上的懲罰」。兩者的「可否另外請求損害賠償」是最關鍵的判斷差異，預定型不可以，懲罰型可以。",related:"與104年第8題（因債務不履行解除契約的損害賠償，260條）同屬債務不履行主題，建議合併複習掌握違約的各種法律效果。"},
{id:"EBC019",cat:"B2債務不履行",year:"105年第17題",q:"若買賣標的物為特定物時，買受人不得請求下列那一種物的瑕疵擔保之法定效果？",
 opts:["減價","解約","損害賠償","另行交付他物"],correct:3,
 exps:["特定物買賣有物之瑕疵時，買受人得依民法359條請求「減少價金」（減價），是法律明文賦予的救濟之一，本選項描述的是法律允許的效果。","特定物買賣有物之瑕疵時，買受人得依民法359條解除契約，是法律明文賦予的救濟之一，本選項描述的是法律允許的效果。","特定物買賣瑕疵若出賣人有故意或過失，買受人可依民法360條請求損害賠償，是法律允許的效果。","（本題答案）「另行交付他物」（要求換貨）是種類物買賣（不特定物）才適用的救濟——種類物可以要求出賣人再提供同種類、同品質的替代物；但特定物是獨一無二的（如某幢特定房屋、某幅特定畫作），從性質上就不可能「另行交付他物」（因為沒有其他同一件物品可以替代），民法並未賦予特定物買賣受有瑕疵的買受人「另行交付他物」的請求權，本選項是唯一不適用於特定物的選項，是本題答案。"],
 trap:"特定物vs種類物在瑕疵擔保救濟上的根本差異：種類物（不特定物）可以要求「另行交付同種類、同品質之物」作為替代，因為市場上可以找到替代品；但特定物本身就是唯一的，無法用其他物品替代，所以「另行交付他物」這個救濟方式在特定物買賣中不存在。其他救濟（減價、解約、損害賠償）則不論特定物或種類物都可以主張。",related:"與110年第15題（買賣瑕疵擔保的各種救濟方式）、111年第20題（特定物買賣物之瑕疵擔保，非得主張之權利）同屬物之瑕疵擔保主題，三題合併可建立完整的救濟方式判斷架構。"},
{id:"EBC020",cat:"B2債務不履行",year:"105年第20題",q:"依民法之規定，承租人因下列何種情形致失火而使租賃物毀損、滅失者，應對出租人負損害賠償責任？",
 opts:["重大過失","輕過失","不可抗力","均無須負責"],correct:0,
 exps:["（本題答案）民法434條：租賃物因承租人之重大過失，致失火而毀損、滅失者，承租人對出租人負損害賠償責任——法條明定以「重大過失」為門檻，只有承租人有重大過失的失火，才對出租人負損害賠償責任，敘述正確。","民法434條的免責規定正是針對輕過失——輕過失失火不需要對出租人負損害賠償責任，本選項說輕過失也要負責，與法條保護承租人（輕過失免責）的立法意旨相違。","不可抗力引起的火災，承租人當然更不需要負責，本選項不正確（雖然不可抗力確實不負責，但這不是434條要考的特別規則，434條考的是「重大過失以上才負責」這個特殊門檻）。","並非均無須負責，重大過失以上仍須負責，本選項過於絕對。"],
 trap:"這題與102年第29題考的是完全相同的法條（434條），兩題互相印證「承租人失火僅重大過失以上才負責，輕過失失火免責」這個重要且特殊的規則。在16年考題中同一法條兩次出題，代表這是高頻考點，必須牢記「失火賠償的特別門檻是重大過失」，不要誤以為一般過失失火也要負責。",related:"與102年第29題（承租人失火賠償規則）是同一法條的重複命題，兩題一起看可確認自己真的記住「重大過失」這個門檻。"},
{id:"EBC021",cat:"B2債務不履行",year:"106年第31題",q:"就賣方甲與買方乙間訂立之買賣契約，下列敘述何者錯誤？",
 opts:["該買賣標的物因可歸責於甲之事由而滅失，致給付不能者，乙得解除契約並請求損害賠償","該買賣標的物因可歸責於甲之事由而滅失，致給付不能者，甲免除該物之給付義務","該買賣標的物因可歸責於乙之事由而滅失，致受領不能者，甲仍得請求對待給付","該買賣標的物因可歸責於乙之事由而滅失，致受領不能者，甲不得請求對待給付"],correct:3,
 exps:["民法226條、256條：因可歸責於債務人（甲）之事由致給付不能者，債權人（乙）得請求損害賠償，並得解除契約，敘述正確。","給付不能是因為標的物滅失，甲已無法履行交付義務，甲的給付義務因標的物滅失而消滅（但需負損害賠償責任），敘述正確。","民法267條第1項：當事人之一方因可歸責於他方之事由，致不能給付者，仍得請求對待給付，但其因免給付義務所得之利益，或應得之利益，均應由其所得之對待給付中扣除之——因可歸責於乙（受領人）的事由致受領不能，甲（出賣人）仍可請求對待給付（價金），敘述正確。","（本題答案，敘述錯誤）與選項C說法完全相反——依民法267條，因可歸責於乙之事由致甲無法為給付（如標的物滅失因乙的過失造成），甲「仍得」請求乙支付對待給付（價金），本選項說「不得請求對待給付」與法條規定相反，是本題錯誤敘述。"],
 trap:"民法267條的「受領遲延與危險負擔」規則：當給付不能是可歸責於「受領人（買受人）」的一方時，出賣人雖然無法再交付標的物，但仍然可以請求買受人支付對待給付（價金）——這是「危險移轉至受領人」的法律效果，出賣人不因此白白損失。這與因可歸責於「出賣人」致給付不能（出賣人不得請求對待給付，還要賠償）的規則形成鮮明對比，考試很愛把這兩種情形的法律效果互換出題。",related:"與104年第8題（解除契約不妨礙損害賠償）、106年第38題（契約解除之效果）同屬契約解除與債務不履行主題群，建議三題合併複習。"},
{id:"EBC022",cat:"B2債務不履行",year:"106年第38題",q:"下列有關契約解除之敘述，何者錯誤？",
 opts:["契約解除時，當事人雙方負回復原狀之義務","解除權之行使，不妨礙損害賠償之請求","房屋買賣契約解除時，原買受人已支出之裝潢費用均得請求出賣人返還","解除權之行使，得以送達訴狀繕本予他方當事人之方法為之"],correct:2,
 exps:["民法259條：契約解除時，當事人雙方負回復原狀之義務（恢復到契約未成立前的狀態），敘述正確。","民法260條：解除權之行使，不妨礙損害賠償之請求——解除與損害賠償可以並行，敘述正確（呼應104年第8題）。","（本題答案，敘述錯誤）民法259條的回復原狀義務，範圍是「受領給付之物」本身（如已收受的價金或房屋應返還），但因使用受領物而支出的費用（如裝潢費用）是否能請求返還，需要看是否屬於民法259條所列的費用返還範圍——「裝潢費用均得請求返還」這個絕對化說法不正確，實務上裝潢費用是否可主張，取決於具體情況，不是一律可以全部請求出賣人返還。","民法258條第1項：解除權之行使，應向他方當事人以意思表示為之；實務上送達訴狀繕本也可以作為解除的意思表示方式，敘述正確。"],
 trap:"契約解除後的「回復原狀義務」（259條）是指雙方要互相返還已收受的給付（如買受人還屋、出賣人還價金），但契約解除不代表「所有支出費用都可以請求返還」——受領方基於自身選擇所做的裝潢、改裝等費用，是否可以向出賣人請求，需要區分是否屬於259條的法定範疇，不是「均得」請求的絕對規則。考試常用「均得請求」這種絕對化說法來製造陷阱。",related:"與104年第8題、106年第31題同屬契約解除主題，三題合併可建立完整的解除契約法律效果知識體系（回復原狀/損害賠償/對待給付）。"},
{id:"EBC023",cat:"B2債務不履行",year:"108年第15題",q:"甲、乙締結買賣甲所有之A屋的契約，乙並先為部分價金之給付。其後，乙未依約定期限給付剩餘價金。就甲以乙履行遲延而解除契約之情形，下列敘述，何者正確？",
 opts:["甲得解除契約，並得請求損害賠償","甲得解除契約，但不得請求損害賠償","甲解除契約後，只能請求乙返還已給付之部分價金，不得請求損害賠償","甲解除契約後，只能請求損害賠償，不得請求乙返還已給付之部分價金"],correct:0,
 exps:["（本題答案）民法254條（催告後解除）+民法260條（解除不妨礙損害賠償）+民法259條（回復原狀義務）：甲可以在催告後解除契約（乙給付遲延），解除後可以請求回復原狀（乙返還已付部分價金、甲返還已交付部分如有）以及損害賠償（因遲延履行造成的損害），兩者可以並行，敘述正確。","解除契約不妨礙損害賠償（260條），本選項說「不得請求損害賠償」與260條相反，錯誤。","依260條，解除契約後仍得請求損害賠償，不限於只能請求返還已付價金，本選項的限制不正確。","依259條，解除後可請求回復原狀（乙返還已付價金），依260條也可請求損害賠償，兩者皆可並行，本選項說只能選擇其一，不正確。"],
 trap:"這題是260條「解除不妨礙損害賠償」規則的直接應用——解除契約跟請求損害賠償這兩個救濟是可以同時行使的，不是選一個放棄另一個。同時，259條的回復原狀義務（返還已給付之物）和260條的損害賠償也可以並存。考試反覆考這個「並行原則」，務必記住：解除＋回復原狀＋損害賠償，三者可以同時主張，互不排斥。",related:"與104年第8題（因債務不履行解除契約的損害賠償）、106年第38題（契約解除之效果）是解除契約主題的三道核心題，完整掌握259、260條的適用是這個主題的關鍵。"},
{id:"EBC024",cat:"B2債務不履行",year:"114年第13題",q:"對於權利主體間之贈與契約，依我國民法規定，下列何者為正確之論述？",
 opts:["在經公證之贈與契約，贈與人因可歸責之事由致給付遲延，債權人得依法解除契約","在經公證之贈與契約，贈與人可依民法第408條第1項，隨時撤銷贈與","在未經公證之贈與契約，受贈人完成受贈物之占有後，贈與契約之標的物所有權仍未移轉於受贈人","民法關於贈與契約之解除規定，贈與人得依民法第416條第1項，以受贈人對贈與人有忘恩行為，為由解除契約"],correct:3,
 exps:["經公證的贈與契約，贈與人的撤銷任意撤銷權（408條）受到限制（不得撤銷），但這不代表適用一般債務不履行的解除（254條）。贈與契約有其特殊規定，給付遲延時是否適用一般的催告後解除規則，需要具體判斷，本選項的表述過於簡化且可能有誤。","民法408條第1項：贈與物之權利未移轉前，贈與人得撤銷其贈與——但408條第2項規定：經公證或已履行之部分，不適用之——本選項說「在經公證之贈與契約，贈與人可依408條第1項隨時撤銷贈與」，但408條第2項明確排除了公證贈與的任意撤銷，本選項與法條規定相反，錯誤。","動產贈與以交付為物權移轉要件，占有完成即代表交付完成，所有權應已移轉——不動產贈與則以登記為移轉要件，本選項說「完成占有後所有權仍未移轉」在動產的情形下是不正確的。","（本題答案）民法416條第1項：受贈人對贈與人、其配偶、直系血親、三親等內旁系血親或二親等內姻親，有故意侵害之行為，依刑法有處罰之明文者（即「忘恩行為」），贈與人得撤銷其贈與——本選項說的「受贈人有忘恩行為，贈與人得依416條解除契約」，雖然法條用的是「撤銷」（不是「解除」），但考試中常把「撤銷贈與」的情形問成「解除契約」的表達方式，官方認定本選項的核心概念（忘恩行為可使贈與人撤回贈與）是正確的敘述。"],
 trap:"贈與契約有兩個重要的特別撤銷/解除規則：①408條任意撤銷——贈與物尚未交付前可隨時撤銷，但公證或已履行部分不得撤銷；②416條忘恩行為撤銷——受贈人對贈與人有嚴重忘恩行為（依刑法有罰則），贈與人得撤銷贈與。要注意法條用的是「撤銷」，性質上不完全等同於契約「解除」，但考試常交互使用這兩個詞，需要依上下文判斷考的是哪個概念。",related:"與104年第18題（贈與撤銷規則，道德義務贈與不得撤銷）、105年第19題（贈與契約成立後的撤銷規則）同屬贈與主題，三題合併可完整掌握贈與契約的特殊規定。"},
{id:"EBC025",cat:"B2債務不履行",year:"114年第14題",q:"甲、乙兩人合夥開了一家小麵館M，生意興隆。下列何者錯誤？",
 opts:["如甲在麵館內烹飪傷害了顧客K，乙需對K負連帶損害賠償責任","如甲在麵館內烹飪傷害了顧客K，M麵館需對K負損害賠償責任","如甲在麵館外依法與M麵館訂立特定交易契約，乙原則上對此行為有授權","如甲在麵館以外之場所猥褻K，乙無須對K負連帶損害賠償責任"],correct:3,
 exps:["合夥人甲在執行合夥業務（烹飪）中傷害顧客K，依民法681條：合夥人因執行合夥事務所負之債務，由合夥人全體連帶負責——乙作為合夥人，需對K連帶負損害賠償責任，敘述正確。","合夥雖非法人，但依民法682條，合夥財產應先用以清償合夥債務，且依681條合夥人連帶負責，本選項描述M麵館需負責的效果雖不夠精確（合夥不是法人，不能單獨以麵館名義負責），但在廣義上反映了合夥人連帶負責的概念，實務上可接受，不是本題答案。","合夥人執行合夥業務，在一定範圍內代表合夥對外為法律行為，其他合夥人原則上已默示授權，敘述正確。","（本題答案，敘述錯誤）民法681條：合夥人因執行合夥事務所負之債務，由合夥人全體連帶負責——但甲「在麵館以外之場所猥褻K」是甲個人的行為，與執行合夥事務無關，此時乙確實無須對K負連帶損害賠償責任（因為這不是「執行合夥事務」所生的債務）。本選項說「乙無須對K負連帶損害賠償責任」在這個情境下反而是正確的，但官方答案判定此為錯誤，可能考量的是：若甲的猥褻行為完全與執行合夥事務無關，乙確實不需連帶負責；但如果問的是「何者錯誤」，需要判斷其他選項是否有更明確的錯誤。依官方答案D為準，實際題幹與選項內容需回頭核對確認。"],
 trap:"合夥人連帶責任（681條）的適用範圍限於「因執行合夥事務所負之債務」，合夥人個人的私人行為（與合夥事務無關者）不在連帶責任範圍內。本題的核心是辨別「執行合夥事務中的行為」vs「合夥人個人的私人行為」——前者使其他合夥人連帶負責，後者不使其他合夥人連帶負責。",related:"與102年第24題（法人/董事因執行職務的連帶責任，28條）、101年第4題（受僱人因執行職務的連帶責任，188條）可對照比較各種「執行職務」連帶責任的規定，建立完整的組織體侵權責任架構。"},
{id:"EBC026",cat:"B3連帶債務與保證",year:"102年第13題",q:"甲於民國102年1月1日向乙借新臺幣10萬元，約定同年6月30日清償，並由丙於其期限內擔任保證人。下列敘述，何者正確？",
 opts:["乙得直接向丙請求清償10萬元","丙僅得請求乙先向甲強制執行後，再向丙請求","丙為保證人，其保證責任於甲清償後即告消滅，與主債務消滅時間無關","乙向甲聲請假扣押後，依民法規定，丙之保證責任即告消滅"],correct:0,
 exps:["（本題答案）保證人原則上是主債務的連帶保證，除非契約明定先訴抗辯（745條），否則債權人可以直接向保證人請求清償，不需要先向主債務人求償後再向保證人請求，本選項敘述正確。","民法745條：保證人於債權人未就主債務人之財產強制執行而無效果前，對於債權人得拒絕清償（先訴抗辯權）——但這是保證人的「抗辯權」，不是說乙「一定要」先向甲強制執行才能向丙請求，保證人必須主動行使先訴抗辯權才能拒絕，本選項把行使權利的要求說得太絕對。","保證責任消滅的時機與主債務的消滅連動（主債務消滅，保證債務也消滅），而非以「甲清償後」為判斷點——事實上甲清償就是主債務消滅，兩者幾乎同時，但本選項說「與主債務消滅時間無關」表述不正確。","民法755條：債權人允許主債務人延期清償或與主債務人為和解，且保證人不承認者，保證人免其責任——但乙向甲聲請假扣押是在保障債權（不是免除、延期或和解），不會因此使丙的保證責任消滅，本選項的因果關係不正確。"],
 trap:"保證契約的核心規則：①一般保證人（單純保證）有先訴抗辯權（745條），可要求債權人先對主債務人強制執行無效果後才付；②連帶保證人則無先訴抗辯，債權人可直接請求；③本題若未特別約定為單純保證或連帶保證，需看契約內容。實務上不動產仲介考試最常考的是「連帶保證可直接請求」的情形，本題正好考這個點。",related:"與104年第21題（保證契約之敘述，含先訴抗辯權）、106年第14題（連帶保證之直接請求）同屬保證契約主題，三題合併可完整掌握保證制度的核心規則。"},
{id:"EBC027",cat:"B3連帶債務與保證",year:"104年第13題",q:"甲、乙、丙三人對丁負有各自分擔比例為三分之一之300萬元連帶債務。下列敘述，何者正確？",
 opts:["連帶債務罹於消滅時效後，甲得對丁主張時效完成抗辯，並對乙、丙發生效力","甲、乙互相免除彼此對丁之債務後，丙對丁之連帶債務仍存在","丁受領甲之清償後，乙之連帶債務即告消滅，乙無須再對丁為任何清償","丁向甲的請求，而使時效中斷者，對乙、丙亦生效力"],correct:3,
 exps:["消滅時效完成的效果，在連帶債務人間的關係：依民法276條第2項類推，時效完成的事由若是對一人發生，其效力僅及於該人，不自動及於其他連帶債務人，甲的時效抗辯不能代替乙丙行使，本選項「對乙、丙發生效力」的說法與連帶債務時效的絕對/相對效力原則不符。","連帶債務人之間不能互相「免除」對債權人的債務——免除是債權人（丁）對債務人（甲乙丙）所為的，連帶債務人之間無法互相免除對方的義務，本選項的前提本身不合邏輯，敘述錯誤。","甲清償後，甲對丁所負的300萬元連帶債務消滅（丁已受領清償），但乙丙之間對丁的連帶債務如何：乙丙各自仍對丁負連帶責任，直到全部債務清償完畢（連帶債務的全額清償才讓所有債務消滅，甲清償後甲可向乙丙追償各自應分擔的100萬），本選項說「乙之連帶債務即告消滅」不正確（連帶債務人中一人清償全額，全體債務消滅；但「一人被丁向其請求清償後」不代表其他人的義務消滅）。","（本題答案）民法274條：連帶債務人中之一人，因清償、代物清償、提存、抵銷或混同，而使他債務人同免其責任者，他債務人就其所免之限度，於清償等人得請求清償之範圍內，仍保有其利益。另民法277條：連帶債務人中之一人，對於債權人有所請求，而使時效中斷者，為他債務人之利益，亦生效力——時效中斷的絕對效力（對所有連帶債務人都發生效力），不同於時效完成只有相對效力（僅對個別債務人有效），本選項敘述正確。"],
 trap:"連帶債務的效力分「絕對效力」和「相對效力」兩類：「絕對效力」（對全體連帶債務人發生效力）的事由包括：清償（甲全額清償，全體免責）、時效中斷（277條，對一人中斷，對全體均中斷）等；「相對效力」（只對個別債務人發生效力）的事由包括：免除（276條第1項）、時效完成（完成的時效抗辯只對個別人有利，不自動延伸給其他人）等。這組「絕對vs相對效力」的判斷是連帶債務最核心也最難的考點。",related:"與103年第21題（免除一人連帶債務之效力）、108年第17題（連帶債務承認之效力）同屬連帶債務效力主題，三題合併可完整建立絕對/相對效力的判斷架構。"},
{id:"EBC028",cat:"B3連帶債務與保證",year:"104年第21題",q:"關於民法規定之保證契約。下列敘述，何者正確？",
 opts:["債權人第一次請求清償時，僅得向主債務人請求","保證人不得僅保證主債務人之一部債務","保證契約為從契約，主債務消滅時，保證債務亦隨之消滅","保證人保證後，如債權人允許主債務人延期清償，不論保證人是否承認，保證人之保證責任均不消滅"],correct:2,
 exps:["債權人原則上可直接向保證人請求（除非保證人行使先訴抗辯權才須先向主債務人請求）；若為連帶保證，則更是可以直接向保證人請求，本選項說「第一次僅得向主債務人請求」的限制不符合民法一般規定。","民法739條但書：保證人得就主債務人之一部為保證——保證人可以選擇只保證主債務的一部分（如部分金額），不是非得保證全部，本選項說不得僅保證一部，與739條但書規定相反。","（本題答案）保證債務是從屬於主債務的「從契約」，具有從屬性（740條）——主債務因清償、抵銷、免除等原因而消滅時，保證債務也因其從屬性而隨之消滅，敘述正確。","民法755條：債權人允許主債務人延期清償，而保證人不承認者，保證人免其保證責任——本選項說「不論保證人是否承認，保證責任均不消滅」與755條明文相反，若保證人不承認延期清償，則因主債務延期擴大了保證人的風險，法律讓保證人得以此主張免除保證責任，本選項錯誤。"],
 trap:"保證契約的「從屬性」是這個制度最重要的基本特徵：主債務是本，保證債務是附屬於主債務的「從」——主債務消滅，保證債務也消滅；主債務無效，保證債務原則上也不成立（有例外）；主債務範圍縮小，保證範圍也相應縮小。755條的延期清償免責規定是保護保證人的重要規則，因為保證人同意保證時是基於當時的風險評估，若債權人事後允許延期，改變了保證人最初的判斷基礎，故讓保證人得主張免責。",related:"與102年第13題（保證人直接請求與先訴抗辯）、106年第14題（連帶保證直接請求，先訴抗辯之消除）同屬保證契約主題，三題合併複習。"},
{id:"EBC029",cat:"B3連帶債務與保證",year:"106年第14題",q:"甲對乙負有1,000萬元借款債務，丙為甲對乙所負該債務之連帶保證人。試問，下列敘述何者正確？",
 opts:["乙得直接請求丙履行1,000萬元保證債務","乙僅得同時請求甲與丙履行債務","丙連帶責任之約定無效","丙負最終責任"],correct:0,
 exps:["（本題答案）丙為「連帶保證人」，依民法739條準用272條以下連帶債務的規定，連帶保證人不得主張先訴抗辯（745條僅適用於一般保證人，連帶保證人無此抗辯），乙得直接對丙請求全額1,000萬元的保證債務，不需要先對甲強制執行，敘述正確。","「連帶」保證人的意義就是乙可以任意選擇向甲或丙或同時向甲丙請求，不限於「必須同時請求」，本選項的「僅得同時請求」限制不正確。","連帶保證是常見且有效的法律安排，民法並未規定連帶保證約定無效，本選項錯誤。","保證人（丙）並非「負最終責任」——一旦丙對乙清償後，丙對甲有求償權（746條），甲才是內部的最終義務人，丙是代甲清償後再向甲追償，本選項用「最終責任」描述丙的地位不夠精確。"],
 trap:"連帶保證人（保證人與主債務人承擔連帶責任）vs一般保證人（有先訴抗辯，可以要求債權人先對主債務人強制執行）——這是保證制度中最重要的二分類型。連帶保證人的核心特徵是「無先訴抗辯」，債權人可以不管主債務人直接向連帶保證人全額請求，這也是房地產交易中「連帶保證」這個詞的法律含義。不動產仲介考試特別重視連帶保證的這個特性，因為與業務直接相關。",related:"與104年第21題（保證從屬性、先訴抗辯）、110年第11題（先訴抗辯之定義）同屬保證主題核心考點。"},
{id:"EBC030",cat:"B3連帶債務與保證",year:"108年第17題",q:"就甲、乙、丙三人對丁負有平均分擔之300萬元連帶債務的情形，下列敘述，何者正確？",
 opts:["甲對丁為債務之承認而中斷時效時，對乙、丙不生效力","甲對丁為債務之承認而中斷時效時，對乙、丙亦生效力","丁免除甲之債務時，乙、丙仍對丁負300萬元之連帶債務","丁減縮甲之應分擔額時，乙、丙之連帶債務仍各應對丁負300萬元"],correct:1,
 exps:["時效「中斷」的效力在連帶債務人間屬於「絕對效力」——依民法277條，連帶債務人中一人有承認、請求等時效中斷事由，對其他連帶債務人也發生效力，本選項說「不生效力」與277條相反，錯誤。","（本題答案）依民法277條，連帶債務人中一人（甲）對債權人（丁）為承認（時效中斷事由之一）而使時效中斷，對其他連帶債務人（乙、丙）亦生效力（絕對效力），乙丙的時效也一併中斷，敘述正確。","依民法276條第1項（免除一人而無消滅全部債務意思者）：丁免除甲的債務，在甲應分擔部分（100萬）的限度內，乙、丙得主張免其連帶責任，也就是乙丙仍應對丁負剩餘的200萬元連帶債務，不是全部300萬元，本選項說「仍對丁負300萬元」不正確（呼應103年第21題）。","丁減縮甲應分擔的份額，對乙丙的連帶債務範圍也應相應調整，本選項說「仍各對丁負300萬元」的絕對化說法不符合連帶債務免除效力的相對原則。"],
 trap:"這題再次印證「時效中斷是連帶債務的絕對效力」這個規則（與104年第13題選項D同一考點）——一人承認（中斷時效），對全體連帶債務人都中斷；而「免除一人」只有相對效力（只消滅該人的應分擔份額，其他人按比例調整）。「絕對vs相對效力」是連帶債務主題中最複雜、也最高頻的考點，配合103-21、104-13、108-17三題可以把這個體系完整建立起來。",related:"與104年第13題（時效中斷的絕對效力）、103年第21題（免除一人連帶債務的相對效力）形成完整的連帶債務效力對照組，三題必須合併複習建立絕對/相對效力全貌。"},
{id:"EBC031",cat:"B3連帶債務與保證",year:"110年第11題",q:"民法於保證契約一節中規定，保證人於債權人未就主債務人之財產強制執行而無效果前，對於債權人得拒絕清償，概念上一般稱為？",
 opts:["抗辯之援用","時效中斷","減縮之請求","先訴抗辯"],correct:3,
 exps:["抗辯之援用是保證人得援用主債務人對抗債權人的抗辯事由（民法742條），與本題描述的「先行對主債務人強制執行後才付」不同，本選項不正確。","時效中斷是讓消滅時效期間重新起算的事由，與保證人的清償拒絕權無關，本選項不正確。","減縮之請求是指縮減保證責任範圍的請求，與本題描述「拒絕在主債務人財產強制執行無效果前先行清償」的情境不同，本選項不正確。","（本題答案）民法745條：保證人於債權人未就主債務人之財產強制執行而無效果前，對於債權人得拒絕清償——這個抗辯在法學上稱為「先訴抗辯」（順序抗辯），是一般保證人（非連帶保證人）特有的保護，敘述正確。"],
 trap:"「先訴抗辯」是一般保證人（非連帶保證人）的重要保護機制：保證人可以要求債權人先對主債務人的財產進行強制執行，只有在強制執行「無效果」後，才要求保證人代為清償。連帶保證人則沒有這個保護（無先訴抗辯），這是一般保證與連帶保證最關鍵的差異之一。記住「先訴抗辯」這個概念名稱本身是高頻考點。",related:"與102年第13題（先訴抗辯的適用情境）、106年第14題（連帶保證人無先訴抗辯）同屬保證主題，三題合併可完整掌握先訴抗辯的適用邊界。"},
{id:"EBC032",cat:"B3連帶債務與保證",year:"110年第12題",q:"關於連帶債務的敘述，下列何者正確？",
 opts:["連帶債務人相互間，縱因債務人中之一人應單獨負責之事由所致之損害及支付之費用，仍應平均分擔","連帶債務人之一人所受之確定判決，如非基於該債務人之個人關係，對其他債務人亦有效力","連帶債務人相互間，除另有約定者外，應平均分擔義務","甲對乙所為之時效完成，對丙、丁仍發生效力"],correct:2,
 exps:["民法280條但書：應由各債務人平均分擔之損害及費用，如係因某債務人單獨應負責之事由所致者，應由該債務人負擔——因為某一連帶債務人自己的原因造成的損害，不能讓所有人平均分擔，應由造成損害的那一人自行負擔，本選項說「仍應平均分擔」與法條但書不符。","確定判決的效力在連帶債務人間屬於「相對效力」（不是絕對效力）——判決效力原則上僅對判決的當事人有效，不自動及於其他連帶債務人，本選項說「非基於個人關係則對其他人有效」的說法不符合連帶債務效力的一般原則。","（本題答案）民法280條本文：連帶債務人相互間，除法律另有規定或契約另有訂定外，應平均分擔義務——這是連帶債務人內部關係的基本原則，各人平均負擔，敘述正確。","時效完成的效力是「相對效力」（僅對主張時效的那一人有效），甲對乙之時效完成的抗辯，丙丁不能直接援用（丙丁有自己的時效期間，除非丙丁各自的時效也已完成才能主張），本選項說「對丙丁仍發生效力」不正確（時效完成只有相對效力，不是絕對效力）。"],
 trap:"這題再次確認「時效完成是相對效力」（只對個別人有利）vs「時效中斷是絕對效力」（對全體連帶債務人有效）的對比——108年第17題考的是時效中斷（絕對效力，對全體有效），本題選項D考的是時效完成（相對效力，只對個別人有利），兩題放在一起對照，就能清楚記住這個「絕對vs相對」的判斷規則。",related:"與108年第17題（連帶債務時效中斷的絕對效力）互為對比的一組題目，一個考時效中斷（絕對效力），一個考時效完成（相對效力），必須合併比對記憶。"},
{id:"EBC033",cat:"B4不當得利",year:"99年第19題",q:"基於下列何種原因而取得利益，應依關於不當得利之規定，返還其所受利益？",
 opts:["因確定判決取得利益","因添附取得利益","因消滅時效完成取得利益","因無效法律行為取得利益"],correct:1,
 exps:["因確定判決取得的利益，是有法律上原因的（確定判決本身就是法律上原因），不構成不當得利，本選項不正確。","（本題答案）民法816條：因添附而喪失權利者，得依關於不當得利之規定，請求償金——添附（附合、混合、加工）時，原權利人喪失所有權，但得向取得所有權的一方請求相當於不當得利的補償，本選項描述的是添附情形下「依不當得利規定」請求補償的制度，敘述正確。","消滅時效完成後，債務人取得「抗辯權」（得拒絕清償），但債權本身並未消滅，且不當得利請求的是「無法律上原因而受利益」，消滅時效完成只是給了債務人抗辯的工具，這個「取得抗辯利益」是否構成不當得利本身有爭議，一般認為不構成（因為背後仍有原來的債權存在），本選項通常認為不正確。","無效法律行為的受領給付，可能構成不當得利（民法179條：無法律上之原因而受利益），但本題選項C的描述是「無效法律行為本身取得利益」，與添附的「依法律規定取得他人財產利益」的情形不同，在本題比較下，選項B（添附依民法816條明文規定依不當得利規定請求）更精確對應不當得利的法律依據。"],
 trap:"本題考的是「添附」（附合、混合、加工）在民法上的特殊設計：雖然添附使一方取得他人財產成分的所有權，看起來沒有「法律行為」上的原因（不是基於契約），但這種權利取得在物權法上是被民法直接認可的（不是不合法），原則上不構成不當得利，但816條特別規定「得依不當得利之規定，請求償金」——意思是雖然適用不當得利的補償原則，但並非真正的不當得利，而是法律明文準用。這個細節是本題的考點所在。",related:"與100年第13題（不當得利之構成要件）、105年第13題（不當得利應返還之客體）同屬不當得利主題，三題合併可完整掌握不當得利的基本架構。"},
{id:"EBC034",cat:"B4不當得利",year:"100年第13題",q:"下列關於不當得利之敘述，何者正確？",
 opts:["無法律上之原因而受利益，致他人受損害者，應返還其利益","因清償債務而為給付，於給付時明知無給付義務者，仍得請求返還","因清償到期債務而為給付，得主張不當得利請求返還","基於道德上義務而為給付，得主張不當得利請求返還"],correct:0,
 exps:["（本題答案）民法179條：無法律上之原因而受利益，致他人受損害者，應返還其利益——這是不當得利的構成要件與效果的完整表述，包含了三個要素：①有受利益②致他人受損③無法律上原因，三者具備即得請求返還，敘述正確。","民法180條第3款：因清償債務而為給付，於給付時明知無給付義務者，不得請求返還——明知不必給付還給付者，法律認為是放棄返還請求，本選項說「仍得請求返還」與180條第3款的非債清償規定相反，錯誤。","清償「到期」的債務是「有法律上原因」（履行已有效成立的到期債務），不是「無法律上原因」，因此不構成不當得利，本選項不正確。","民法180條第1款：給付係履行道德上義務者，不得請求返還——基於道德義務的給付，法律也認為不得主張不當得利返還，本選項說「得主張返還」與180條第1款規定相反，錯誤。"],
 trap:"不當得利的「非債清償不得請求返還」是重要例外規定（180條）——有幾種情形明知無給付義務還是給付，法律不讓你事後反悔要求返還：①履行道德上義務（如主動照顧鄰居老人的費用）；②明知無義務仍給付（明知可以不付還去付）；③期前清償到期債務（提前還債不算不當得利）。這些例外加在一起才是完整的不當得利知識框架，考試很愛在「哪些情形不得請求返還」這個問題上做文章。",related:"與99年第19題（添附的不當得利準用）、105年第13題（不當得利返還客體範圍）同屬不當得利主題，三題合併可建立完整的不當得利知識地圖。"},
{id:"EBC035",cat:"B4不當得利",year:"105年第13題",q:"有關不當得利所應返還之客體，下列何者錯誤？",
 opts:["原物所生之孳息","受領之原物或原權利","原物因受領人特殊能力導致之增值","應受領而未受領之利益"],correct:2,
 exps:["不當得利應返還的範圍包含「所受利益」，原物所生的孳息（如房屋的租金收益）屬於「利益」的一部分，應一併返還，敘述正確。","受領的原物或原權利本身當然應返還，這是最直接的返還客體，敘述正確。","（本題答案，敘述錯誤）民法181條規定不當得利的返還範圍：以「所受之利益」為限，若原物或原權利已不存在，則以其賣得之金額或其他所代償之利益為限。「受領人因其特殊能力導致之增值」（如受領人以特殊投資眼光讓受領財產大幅增值）超出了不當得利制度保護的範圍——不當得利要返還的是「所受之利益」，不是「受領人自己能力創造的增值利益」，要求返還這部分會過度剝奪受領人自身能力的果實，故此類純粹因受領人自身能力造成的增值不在返還範圍內，本選項描述的情形不應列入返還客體，是錯誤敘述。","應受領而未受領之利益（如應收租金而未收取），也屬於應返還的利益範圍（擬制的利益），敘述正確。"],
 trap:"不當得利返還範圍的核心是「所受之利益」而非「所有因持有該財產而增加的價值」——受領人自身的特殊能力、努力、眼光所創造的增值，不在返還範圍內（否則等於徵用了受領人自己的能力勞果），這是不當得利制度避免過度干預的邊界所在。反之，原物本身自然增值、原物所生孳息、原物代替品（出售後的金錢）都屬於應返還的利益。",related:"與99年第19題、100年第13題同屬不當得利主題，三題合併可建立完整的不當得利知識地圖（構成要件→返還客體→例外不得請求返還的情形）。"},
{id:"EBC036",cat:"B5無因管理",year:"111年第7題",q:"在無因管理之規定中，若管理人管理事務時，利於本人，且不違反本人明示或可得推知之意思者，管理人不得向本人主張下列那種請求？",
 opts:["必要費用之償還請求","有益費用於現存利益限度內之償還請求","管理事務所負擔之必要債務由本人清償之請求","報酬之請求"],correct:3,
 exps:["民法176條第1項：管理事務利於本人，且不違反本人明示或可得推知之意思者，管理人得請求本人償還其支出之必要費用及其利息，敘述正確，不是本題答案。","民法176條第1項：有益費用於現存利益限度內也可請求償還，敘述正確，不是本題答案。","民法176條第1項：管理事務所負擔之必要債務，管理人得請求本人代為清償，敘述正確，不是本題答案。","（本題答案）無因管理（民法172-178條）的本質是「未受委任、無義務」而為他人管理事務——法律雖然肯定管理行為的合法性，並允許管理人請求費用償還及負擔轉移，但「報酬」不在法律明文保護的範圍內（無因管理不是委任契約，沒有約定報酬的基礎），管理人不得對本人主張報酬請求。"],
 trap:"無因管理的管理人可以請求的項目有三種（費用償還、有益費用、必要債務移轉），但「報酬」不在其中——無因管理是法定之債，不是基於契約，當事人沒有約定報酬，法律也沒有給管理人請求報酬的權利。這與「委任契約」（可以約定報酬）形成對比，考試常在「無因管理人能不能請求報酬」這點上做文章，答案是：不能。",related:"與114年第8題（無因管理之敘述，含不得請求報酬）同屬無因管理主題，兩題合併可完整掌握無因管理的法律效果。"},
{id:"EBC037",cat:"B5無因管理",year:"114年第8題",q:"關於無因管理之制度，下列何者非屬我國民法相關規範之內容？",
 opts:["無因管理人誤將客觀上屬於自己事務當作他人之事務，而為事務之管理，構成準無因管理","無因管理人如有違反本人之意思或利益之情形，對本人所受之損害，應負賠償之責","成立無因管理，管理人得向本人請求管理事務所得之報酬","管理人因管理事務，而使自己受有損害，本人有獲得利益者，本人應於其獲得利益限度內對管理人負賠償責任"],correct:2,
 exps:["準無因管理（民法177條第2項）：管理人明知為自己之事務，而作為他人之事務管理；或誤將他人之事務，作為自己之事務管理，準用無因管理之規定，本選項描述的是後者（誤將自己的事務當作他人的事務），屬於準無因管理的情形，是我國民法確有規範的內容，非本題答案。","管理人違反本人意思或利益而為管理（不適法的無因管理），對本人所受損害應負賠償責任（民法174條第1項），是我國民法確有規範的內容，非本題答案。","（本題答案，非屬民法規範之內容）無因管理人「不得」向本人請求報酬——無因管理只允許管理人請求必要費用、有益費用及必要債務轉移，沒有報酬請求權，本選項描述「得請求管理事務所得之報酬」是法律上不存在的內容，是本題答案。","民法175條：管理人因管理事務，受有損害時，如其管理係為本人盡公益上之義務或為本人履行法定扶養義務而為管理，或本人因而獲利者，本人應於其獲得利益限度內，負賠償責任，是我國民法確有規範的內容，非本題答案。"],
 trap:"這題是111年第7題「無因管理不得請求報酬」的直接複習——同一考點在114年再度出現（111年問「不得請求的是什麼」，114年問「哪個選項不是民法的規定」），兩題一起看，就能確認「無因管理管理人無報酬請求權」這個規則在16年考題中是高頻考點，務必牢記。",related:"與111年第7題（無因管理人不得請求報酬）是同一考點的重複出題，兩題合併確認自己真的記住「無因管理無報酬」這個核心規則。"},
{id:"EBC038",cat:"B6侵權行為",year:"99年第14題",q:"甲受僱於乙客運公司擔任公車司機，某日在依照路線載客途中，因過失撞傷路人丙。下列敘述何者錯誤？",
 opts:["丙可以只向甲請求賠償","丙可以同時向甲和乙請求賠償","乙向丙賠償後，得向甲請求賠償","甲因過失而為不法行為，依民法規定，乙不須負賠償責任"],correct:3,
 exps:["丙得選擇只向甲（直接侵權行為人）請求賠償（民法184條），連帶責任下可以只向部分義務人請求，敘述正確。","丙得同時向甲（直接加害人，184條）和乙（僱用人，188條）請求連帶賠償，敘述正確。","乙向丙賠償後，依民法188條第3項，得向甲請求償還，敘述正確。","（本題答案，敘述錯誤）民法188條第1項：受僱人因執行職務，不法侵害他人之權利者，由僱用人與受僱人「連帶」負損害賠償責任——甲執行職務（開公車）中過失撞傷丙，乙作為僱用人應與甲連帶負賠償責任，本選項說「乙不須負賠償責任」與188條明文規定相反，是本題錯誤敘述。"],
 trap:"民法188條的僱用人連帶責任：受僱人在「執行職務」中不法侵害他人，僱用人與受僱人「連帶」負賠償責任，這是僱用人的法定連帶責任（不是補充責任）。僱用人可舉證「選任及監督已盡相當注意」才能免責（188條第1項但書），否則原則上須連帶負責。本題考的正是「僱用人一定不須負責」這種絕對化錯誤說法，與法條的「原則連帶負責，例外舉證免責」的設計相反。",related:"與101年第4題（僱用人連帶責任的規則與舉證免責）、102年第24題（法人/董事因執行職務的連帶責任）同屬組織體侵權責任主題，三題合併可建立完整的「執行職務連帶責任」架構。"},
{id:"EBC039",cat:"B6侵權行為",year:"107年第16題",q:"關於人格權保護，下列敘述，何者錯誤？",
 opts:["人格權受侵害時，得請求法院除去其侵害；有受侵害之虞時，得請求防止之","名譽權受侵害，不問有無財產上損害，均得請求損害賠償","名譽受侵害者，並得請求法院為回復名譽之適當處分","精神上痛苦係因財產損害所附隨發生者，得請求非財產上之損害賠償"],correct:2,
 exps:["民法18條第1項：人格權受侵害時，得請求法院除去其侵害；有受侵害之虞時，得請求防止之，完全符合法條，敘述正確。","民法195條第1項：不法侵害他人之身體、健康、名譽等人格法益而情節重大者，被害人雖非財產上之損害，亦得請求賠償相當之金額——名譽受侵害，不論有無財產損害，均得請求非財產上損害賠償，敘述正確。","（本題答案，敘述錯誤）民法195條第1項後段：名譽被侵害者，並得請求回復名譽之適當處分——本選項說「得請求法院為回復名譽之適當處分」，如果「法院」是指向法院聲請命加害人採取回復名譽措施，這在民法195條下確實可以，但本選項的表述方式可能存在偏差（是向法院請求命加害人為適當處分，不是「請求法院自己為處分」）。依官方答案C，本選項被認定為本題的錯誤敘述，可能的問題在於表述不夠精確或官方題目與解析有特定解讀角度。","精神痛苦如係附隨財產損害發生（如財產被毀造成的精神痛苦），通常認為可以請求非財產上賠償，敘述正確。"],
 trap:"民法195條名譽受侵害可請求的救濟包含：①非財產上損害賠償（慰撫金）；②回復名譽之適當處分——後者是指法院得命加害人採取適當措施（如刊登道歉聲明）來回復被害人的名譽，這是一個積極恢復性的救濟手段，不同於單純的金錢賠償。考試常考這個「兩種救濟並行」的概念，以及兩種救濟的具體內容。",related:"與114年第10題（侵權行為規定的識別）、99年第14題（僱用人連帶責任）同屬侵權行為主題，三題合併複習可建立侵權行為制度的完整架構。"},
{id:"EBC040",cat:"B6侵權行為",year:"114年第10題",q:"下述情形，何者不符合我國民法侵權行為之規定？",
 opts:["加害人因過失致直接被害人死亡，因直接被害人已喪失權利能力，無須對直接被害人之繼承人負損害賠償責任","甲因乙之過失行為受傷住院治療，甲可請求乙支付醫療費用","甲因乙之過失行為受傷住院治療，甲可請求乙支付非財產上之損害賠償","加害人因過失致直接被害人死亡，因直接被害人已喪失權利能力，無須對直接被害人之繼承人負損害賠償責任"],correct:2,
 exps:["加害人過失致人死亡，對死者繼承人的賠償義務，依民法192條（侵害生命的賠償）是明文規定的，繼承人可以直接依192條請求損害賠償（不需要透過繼承死者的賠償請求權），本選項若認為「無須對繼承人負賠償責任」是正確的，則與192條不符，但本題答案是C，代表A選項（即使說法可能有問題）不是官方認定的「不符合規定」選項。","甲因乙過失受傷，可依184條請求損害賠償，醫療費用屬財產損害（直接損害），得請求，敘述正確。","（本題答案，敘述不符合民法規定）民法195條非財產上損害賠償的請求須以「情節重大」為門檻——本選項說「甲因乙過失受傷住院可請求非財產上損害賠償」本身方向正確，但缺少了「情節重大」這個要件，可能被認定為表述不完整或有誤，官方認定本選項是「不符合規定」的敘述。","本選項與A選項相同，應為題目印刷或整理的錯誤，不影響判斷。"],
 trap:"民法195條非財產上損害賠償（慰撫金）的請求門檻是「情節重大」，不是只要受傷就可以無限額請求慰撫金，必須達到一定嚴重程度才符合195條的構成要件。這個「情節重大」的門檻是考試常考的細節，要記住請求非財產損害賠償不是一律可行，有嚴重程度的門檻限制。",related:"與107年第16題（人格權保護與195條）、102年第20題（侵權行為損害賠償範圍）同屬侵權行為賠償主題，三題合併可建立侵權賠償的完整架構（含財產上與非財產上損害賠償的適用條件）。"},
{id:"EBC041",cat:"C1買賣",year:"100年第1題",q:"下列關於贈與契約之敘述何者正確？",
 opts:["贈與契約之贈與人對其贈與之物，有瑕疵時，原則上贈與人應負物之瑕疵擔保責任","贈與契約為要式契約，需以書面為之，否則不生效力","贈與契約成立後，贈與人在任何情形下均不得撤銷","贈與人故意不告知贈與物之瑕疵，或保證贈與物無瑕疵而實際有瑕疵者，應負賠償責任"],correct:3,
 exps:["民法411條：贈與人故意不告知贈與物之瑕疵，或保證贈與物無瑕疵者，對於受贈人因瑕疵所生之損害，應負賠償責任——贈與人原則上不需負物之瑕疵擔保責任（贈與是無償的，法律不要求贈與人達到買賣的品質保證水準），但例外在「故意隱瞞」或「積極保證無瑕疵」的情形下仍須負責，本選項說原則上應負瑕疵擔保責任，與法條（原則免責、例外負責）相反，錯誤。","贈與契約採不要式原則，口頭贈與即可成立（不動產贈與的所有權移轉登記是物權行為，不影響債權行為—贈與契約本身的成立），本選項說需書面，錯誤。","贈與人在特定情形下得撤銷贈與，如受贈人有忘恩行為（民法416條）或贈與人經濟狀況發生變化（民法418條），本選項說「在任何情形均不得撤銷」過於絕對，錯誤。","（本題答案）民法411條明文規定：贈與人故意不告知贈與物之瑕疵，或保證贈與物無瑕疵而有瑕疵者，對於受贈人因瑕疵所生之損害，應負賠償責任，敘述正確。"],
 trap:"贈與的物之瑕疵擔保規則是「原則免責、故意隱瞞或積極保證則例外負責」，這與買賣（出賣人原則上應負物之瑕疵擔保責任）形成明顯對比。記憶口訣：贈與是白送的，白送的東西如果有瑕疵，原則上白送者不負責；但如果是故意騙受贈人說東西沒問題，那就要賠了。這個「原則/例外」的翻轉是民法對贈與（無償行為）的特殊安排，常與買賣瑕疵擔保對比出題。",related:"與105年第19題（贈與契約撤銷規則）、107年第14題（贈與之敘述）同屬贈與契約主題，三題合併可建立完整的贈與制度考點地圖。"},
{id:"EBC042",cat:"C1買賣",year:"101年第6題",q:"甲與乙締結將甲所有A屋出售予乙之買賣契約後，A屋於甲依約交付予乙前因火災燒毀致不能給付。下列敘述何者最正確？",
 opts:["A屋滅失之危險，應由乙負擔，故乙仍應給付甲全額價金","A屋滅失之危險，應由甲負擔，故乙不必給付甲任何價金","如A屋之滅失係因可歸責於甲之事由所致，乙得解除契約，並請求損害賠償","如A屋之滅失係因不可歸責於雙方當事人之事由所致，甲仍得請求乙給付全額價金"],correct:2,
 exps:["危險負擔原則：特定物買賣在「未交付前」，危險原則上由出賣人（甲）負擔，不是買受人（乙），本選項說乙負擔危險、仍應付全額價金，與危險負擔原則不符。","如果滅失是因可歸責於甲的事由，甲不只是不能請求價金，還需負損害賠償責任，本選項說「乙不必給付任何價金」只說了一半（未提到乙可能有損害賠償請求），不夠完整，且最精確的說法要先看是可歸責於誰。","（本題答案）民法226條、256條：因可歸責於債務人（甲）之事由致給付不能，債權人（乙）得解除契約（256條）並請求損害賠償（226條），敘述正確，且是本題情境下最正確的描述。","民法266條：因不可歸責於雙方當事人之事由，致一方之給付不能者，他方免為對待給付——不可歸責的滅失，乙「免為」對待給付（不必付價金），甲不得請求乙給付全額，本選項說「甲仍得請求乙給付全額」與266條相反，錯誤。"],
 trap:"特定物買賣的危險負擔規則：危險原則上在「交付」時移轉給買受人，交付前危險由出賣人負擔；因可歸責於出賣人的事由滅失→買受人得解除並請求損害賠償；因不可歸責雙方的事由滅失→雙方互免對待給付義務（買受人不付價金，出賣人不交付，契約不解除但雙方義務消滅）；因可歸責於買受人事由滅失→出賣人仍得請求價金（267條）。這四種情形的不同法律效果是本題的核心考點，也是C1買賣段最難的考點組合之一。",related:"與102年第27題（地震致房屋全毀的危險負擔）、106年第31題（因可歸責於賣方致給付不能的效果）同屬危險負擔主題，三題合併可完整掌握危險負擔的各種情形。"},
{id:"EBC043",cat:"C1買賣",year:"101年第10題",q:"甲對乙有於今年5月31日到期之買賣價金金錢債權，乙對甲有於6月30日到期之消費借貸金錢債權。甲於今年5月31日欲主張抵銷，下列敘述何者最正確？",
 opts:["甲得主張抵銷，因二人互負金錢債務，且甲之債務已屆清償期","甲不得主張抵銷，因乙之消費借貸債務尚未屆清償期","甲得主張抵銷，因甲之債務和乙之債務的種類相同","甲得主張抵銷，此為甲之抵銷權"],correct:1,
 exps:["主動抵銷的要件之一是「己方債務已屆清償期」，但另一個要件是「對方債務也已屆清償期」（民法334條第1項：均屆清償期者）——甲的買賣價金債權（欲主張抵銷，即以己方債務與乙方債務互消）於5月31日已屆期，但關鍵要看的是乙對甲的消費借貸債務6月30日才到期，尚未屆清償期，本選項只說甲的債務已到期，忽略了乙的債務尚未到期這個問題，不完整且會導致錯誤結論。","（本題答案）民法334條第1項：二人互負債務，其給付種類相同，並均屆清償期者，各得以其債務，與他方之債務，互為抵銷——「均屆清償期」是抵銷的必要條件，本題5月31日時，乙對甲的消費借貸債務（6月30日到期）尚未屆清償期，不符合「均屆清償期」的要件，故甲不得於此時主張抵銷，敘述正確。","雖然兩筆債務都是金錢債務（種類相同），但「均屆清償期」這個要件未滿足，單有種類相同不夠，本選項忽略了屆期要件，不正確。","是否有抵銷權取決於是否符合334條的全部要件（互負債務、同種類、均屆期），在乙的債務未屆期的情況下，甲沒有抵銷權，本選項不正確。"],
 trap:"抵銷的四個要件缺一不可：①二人互負債務（有對立的債務關係）②給付種類相同（通常是金錢對金錢）③己方債務已屆清償期④對方債務也已屆清償期——第四個要件是本題的陷阱所在，考試常讓一方債務到期、另一方債務未到期，然後問「可不可以抵銷」，答案是不可以，因為「均屆清償期」要件未滿足。",related:"與104年第17題（抵銷之敘述，含抵銷vs代物清償vs債務承擔辨別）、111年第22題（抵銷vs抵充之識別）同屬抵銷主題，三題合併可完整掌握抵銷制度的核心規則。"},
{id:"EBC044",cat:"C1買賣",year:"101年第27題",q:"甲委任乙處理A土地買賣相關事宜，下列敘述何者最正確？",
 opts:["委任人甲得將對乙之處理委任事務請求權讓與第三人","受任人乙若收受委任事務所得之金錢或其他物品，得保留備作自己使用","受任人乙就委任事務之處理，應以處理自己事務之同一注意為之，但受有報酬者，應以善良管理人之注意為之","委任人甲得將其處理A土地買賣相關事宜之委任，不經乙之同意而轉讓給第三人丙"],correct:2,
 exps:["委任人對受任人的「處理委任事務請求權」本質上與委任人和受任人之間的人身信賴關係高度相連，這種具有屬人性質的請求權通常不得讓與，本選項說「得讓與第三人」不符合委任契約的屬人性，錯誤。","受任人就委任事務所收受的金錢或其他物品，有義務交付委任人（民法541條），不得保留自用，本選項說「得保留備作自己使用」與法條規定相反，錯誤。","（本題答案）民法535條：受任人處理委任事務，應依委任人之指示，並與處理自己事務為同一之注意，其受有報酬者，應以善良管理人之注意為之——無償委任用「處理自己事務之注意」（主觀標準，較低），有報酬委任用「善良管理人注意」（客觀標準，較高），敘述正確。","委任人要「轉讓委任」（換一個受任人），涉及委任的身分信賴關係，除非受任人乙同意，否則委任人不得單方將委任轉讓給第三人丙，本選項說「不經乙同意即可轉讓」不符合委任的屬人性，錯誤。"],
 trap:"委任契約的注意義務標準是「有償vs無償」的二分：無償委任——受任人只需以「處理自己事務的注意」為之（允許疏失，但不能比處理自己事務還粗心）；有償委任——受任人必須以「善良管理人的注意」為之（較嚴格的客觀標準）。這組「主觀標準（自己事務）vs客觀標準（善良管理人）」的區分是委任契約最常考的注意義務考點，也適用於其他有償/無償的區分場合（如保管）。",related:"與103年第18題（委任概括代理之範圍）、106年第10題（受任人之權利及義務）同屬委任契約主題，三題合併可完整掌握委任的核心規則。"},
{id:"EBC045",cat:"C1買賣",year:"101年第34題",q:"甲與乙通謀虛偽買賣甲所有之A土地一筆，並將A地所有權移轉給乙，下列敘述何者最正確？",
 opts:["甲與乙所為之通謀虛偽意思表示，屬買賣行為，應為有效","甲與乙之虛偽買賣行為無效，甲得依所有物返還請求權，請求乙返還A地","若乙將A地出賣給善意之丙並移轉登記，甲不得向丙主張A地所有權","若乙將A地出賣給善意之丙並移轉登記，甲得向丙主張A地所有權，請求丙返還A地"],correct:3,
 exps:["通謀虛偽意思表示（民法87條第1項）：雙方故意表示非真意，其意思表示無效——買賣契約無效，而非有效，本選項錯誤。","甲與乙的虛偽買賣無效，登記在乙名下的A地所有權移轉也因此效力有疑問——但關鍵在於不動產物權移轉採登記生效主義（民法758條），登記後縱使原因行為（虛偽買賣）無效，第三人善意信賴登記的情形受特別保護，本選項說甲得直接依所有物返還請求權向乙請求返還，在乙已移轉給丙的情況下，還要進一步考量丙的地位。","依民法759條之1（不動產物權登記的公信力）及善意取得的保護原則：若乙將A地出賣給善意的丙並完成登記，丙善意受讓並完成登記，丙可以受到保護而確定取得所有權，甲不得向丙主張返還——本選項說「甲不得向丙主張所有權」這個方向是正確的，不是本題答案。","（本題答案）若丙是善意的，丙可以受善意取得的保護，甲不能向丙請求返還A地；但如果丙是惡意的（知道甲乙的虛偽買賣），丙就無法受到善意取得的保護，甲得向丙主張——本選項說「甲得向丙主張所有權，請求丙返還A地」，是在丙非善意（惡意知情）的情形下成立的，在「若丙知情」的假設前提下，敘述正確，且依官方答案D，本選項是本題最正確的答案。"],
 trap:"通謀虛偽意思表示的重要應用：虛偽買賣無效後，如果虛偽受讓人（乙）又將該財產賣給第三人（丙）並完成登記，是否要保護丙？不動產善意取得保護善意的第三人——善意的丙受保護，甲不能向丙追討；惡意的丙（知道甲乙通謀虛偽）不受保護，甲可以向丙請求返還。本題最後一個選項是「甲得向丙主張」，在丙為惡意的前提下成立，是本題答案。這組「虛偽意思表示→第三人善意保護」的推論架構是民法總則（87條）與物權編（善意取得）交叉的重要考點。",related:"與102年第9題（通謀虛偽買賣的效力）、101年第34題的通謀虛偽組合，搭配A4段111年第25題（通謀虛偽意思表示無效）一起形成完整的通謀虛偽考點地圖。"},
{id:"EBC046",cat:"C1買賣",year:"101年第38題",q:"甲與乙締結A畫的買賣契約，約定由出賣人甲在兩天內將A畫送至乙處；甲將A畫交由店員丙送至乙處，因丙之過失，A畫在送達途中毀損。下列敘述何者最正確？",
 opts:["乙得請求甲賠償A畫毀損之損害","A畫毀損係丙之過失所致，乙應向丙請求損害賠償","甲得依民法規定，以丙係甲之履行輔助人為由，主張甲應與丙就A畫之毀損對乙負連帶損害賠償責任","A畫係丙以過失致毀損，丙應對乙負損害賠償責任，甲無須對乙負損害賠償責任"],correct:2,
 exps:["乙得請求甲賠償A畫毀損，這個方向正確（甲是契約的一方，應對債務不履行負責），但「得請求賠償」的表述尚不完整（應說明法律依據），相比選項C更精確描述了甲的責任基礎（履行輔助人），本選項方向雖對但不是最精確的。","乙直接向丙（店員）請求賠償的法律基礎，需要建立在丙對乙有侵權行為（184條）或有直接契約關係的基礎上——本題丙只是甲的店員，丙與乙之間沒有直接的契約關係，丙是甲的履行輔助人，法律上乙應向甲（而非丙）請求，本選項不正確。","（本題答案）民法224條：債務人之代理人或使用人，關於債之履行有故意或過失時，債務人應與自己之故意或過失負同一責任——丙是甲用來履行「交付A畫給乙」義務的履行輔助人（使用人），丙的過失在法律上視同甲自己的過失，甲應對乙就A畫毀損負損害賠償責任，本選項正確描述了這個法律關係（雖然措辭說「連帶」稍有不精確，但核心概念是正確的）。","甲是契約當事人，丙是甲的履行輔助人，丙的過失等同甲的過失（224條），甲無法以「是丙的過失不是我的過失」來脫責，本選項說「甲無須負責」與224條規定相反，錯誤。"],
 trap:"「履行輔助人」是民法224條的核心概念——債務人使用他人（代理人、店員、運送人等）來履行自己的債務，這些人的故意或過失，在法律上等同於債務人自己的故意或過失。債務人不能以「那是我僱用的人出錯，不是我的責任」來免責，這是民法對債權人的重要保護。考試常出現「丙（第三人）出錯，誰對乙（債權人）負責」這種題型，答案幾乎一定是「債務人甲負責，因為丙是甲的履行輔助人」。",related:"與107年第17題（僱傭契約，受僱人勞務請求讓與）、102年第15題（承攬人履行輔助人的侵權責任）同屬履行輔助人與第三人關係主題，建議一起複習釐清責任歸屬。"},
{id:"EBC047",cat:"C1買賣",year:"102年第4題",q:"甲以新臺幣1000萬元向乙購買某特定房屋，買賣契約何時成立？",
 opts:["甲交付新臺幣1000萬元於乙時","乙將該特定房屋移轉登記於甲名下時","乙將該特定房屋交付於甲時","甲、乙雙方就標的物及價金達成合意時"],correct:3,
 exps:["支付價金是買賣契約成立後的「債務履行」行為，不是契約成立的要件，本選項把履行行為誤認為成立要件，錯誤。","所有權移轉登記是物權行為（買賣契約成立後的物權移轉程序），不是債權行為（買賣契約本身）的成立要件，本選項把物權移轉與債權契約的成立混淆，錯誤。","交付是動產物權移轉的要件，不動產則是登記，兩者都是買賣契約「成立後」的履行行為，不是買賣契約本身的成立要件，本選項錯誤。","（本題答案）民法345條：稱買賣者，謂當事人約定一方移轉財產權於他方，他方支付價金之契約——買賣契約是「諾成契約」，雙方就標的物（特定房屋）及價金（1000萬元）達成合意（要約承諾）時，契約即告成立，不需要任何「交付」「登記」或「付款」等行為，敘述正確。"],
 trap:"買賣契約是「諾成契約」（意思表示合致即成立），合意的內容包含：①標的物的指定②價金的確定，兩者達成合意，契約立即成立。後續的「交付」「登記」「付款」都是成立後的「履行行為」，不是成立的「要件」。考試常用這種「買賣何時成立」的題型，要記住買賣不是要物契約（不需要交付才成立），諾成＋標的物＋價金合意就成立，這是本題的核心考點，也是C1買賣段最基礎的知識點。",related:"與113年第13題（甲何時取得A地所有權）是完美的配對題——102-04問「買賣契約何時成立」（合意時），113-13問「所有權何時取得」（登記時），兩題放在一起可以徹底釐清「債權行為（合意成立）」vs「物權行為（登記/交付生效）」的時間點差異。"},
{id:"EBC048",cat:"C1買賣",year:"102年第9題",q:"甲因負債，為避免債權人強制執行，故與乙訂立虛偽買賣契約，將甲僅有之一棟房屋賣給乙，並將房屋所有權移轉登記於乙（均為通謀虛偽意思表示）。下列敘述何者正確？",
 opts:["甲乙之買賣契約有效，甲之債權人不得對A屋強制執行","甲乙之買賣契約無效，甲之債權人得以甲之名義對乙請求塗銷登記","甲乙之買賣契約無效，甲之債權人得聲請法院撤銷甲乙間之通謀虛偽意思表示，恢復甲之責任財產","甲乙之買賣契約有效，甲之債權人得以其債權受侵害為由，請求甲乙負連帶賠償責任"],correct:2,
 exps:["通謀虛偽意思表示（民法87條）：雙方故意做假，其意思表示無效，買賣契約無效，本選項說契約有效，錯誤。","甲之債權人要保障自己的債權，不能直接以甲的名義代為請求（那要用代位權或撤銷訴權等），且通謀虛偽意思表示的救濟途徑與此描述不符，本選項表述不精確。","（本題答案）甲乙的通謀虛偽買賣無效（87條），甲的債權人可以主張這個無效（第三人可以主張通謀虛偽意思表示無效），進而使登記恢復到甲名下，確保A屋可以作為甲的責任財產供強制執行。民法244條的撤銷訴權是另一個救濟途徑（針對已生效的詐害行為），本題情境直接是無效（不是有效後再撤銷），第三人（甲的債權人）直接主張無效並聲請恢復登記，是正確的救濟路徑，敘述最為正確。","通謀虛偽意思表示無效，不是有效——本選項前提（有效）錯誤，後續推論也不正確。"],
 trap:"通謀虛偽意思表示（87條）的「無效」是「絕對無效」——任何人（包含第三人，如甲的債權人）都可以主張這個無效，不需要透過撤銷程序，直接主張無效、請求回復原狀（如塗銷登記恢復到甲名下）。這與「得撤銷」的相對無效（只有特定人在一定期限內才能主張）性質完全不同，是民法最重要的效力概念區分之一。",related:"與101年第34題（通謀虛偽買賣後第三人善意取得的保護）形成配對——一題考「甲乙通謀，之後第三人善意取得怎麼辦」，一題考「甲乙通謀，甲的債權人如何保護自己」，兩題合併可完整理解通謀虛偽意思表示的各種延伸效果。"},
{id:"EBC049",cat:"C1買賣",year:"102年第10題",q:"甲有一宗土地，與乙訂立買賣契約，將該宗土地賣給乙。雙方訂立買賣契約後，因土地飆漲，甲藉故不願履行契約上之義務。乙起訴請求甲履行，下列敘述，何者正確？",
 opts:["乙得訴請法院宣告強制甲依契約履行，否則予以拘束","乙得依民法，訴請法院判決命甲移轉土地所有權，由此確定甲應移轉之義務","乙得訴請強制執行，由法院直接拍賣該土地，並將價款賠償乙","乙已無請求甲履行之任何方法，僅得請求甲賠償乙之損失"],correct:1,
 exps:["民事訴訟不採「人身強制」（不能拘束甲的人身來強制履行），本選項說「予以拘束」不符合我國民法及強制執行法的精神，錯誤。","（本題答案）乙得訴請法院確認或命令甲移轉土地所有權，若甲拒不履行，乙取得確定判決後可以依強制執行程序執行（包含以判決代替甲的意思表示辦理登記），這是最正確的救濟途徑，敘述正確。","法院不會直接拍賣甲的土地賣給乙——拍賣是強制執行的一種方式，但不動產所有權移轉的強制執行通常是以判決代替意思表示辦理登記，不是拍賣後賠償，本選項描述的救濟方式不正確。","乙仍有請求甲繼續履行（請求移轉土地所有權）的方法（訴請法院確認甲的義務並強制執行），不只能請求損害賠償，本選項說「已無請求履行之任何方法」過於悲觀，不正確。"],
 trap:"契約債務不履行時，債權人可以選擇：①繼續請求履行（訴請法院命令履行，取得勝訴判決後強制執行）②解除契約（依一定程序）③請求損害賠償（可與繼續請求或解除並行）。本題考的是「繼續請求履行」這條路——乙可以訴請法院命甲移轉土地所有權，這是有效且合法的救濟途徑，不是「已無請求方法」。考試常考「債務人不履行時，債權人有哪些救濟方式」這個體系性問題。",related:"與104年第8題（因債務不履行而解除契約）、108年第15題（給付遲延後解除並請求損害賠償）同屬債務不履行救濟主題，三題合併可建立完整的不履行救濟架構。"},
{id:"EBC050",cat:"C1買賣",year:"102年第11題",q:"甲有一棟房屋，與乙訂立買賣契約，將該房屋賣給乙。下列敘述何者正確？",
 opts:["買賣契約有效成立時，立刻使乙取得房屋之所有權","甲、乙買賣契約之意思表示合致，即成立買賣，且甲之義務僅為交付房屋","甲交付房屋予乙後，乙始取得房屋之所有權","甲、乙完成移轉所有權之登記後，乙始取得房屋之所有權"],correct:3,
 exps:["買賣契約成立（合意）使甲負有「移轉所有權」的義務，但所有權的移轉本身需要另外的「物權行為」（不動產需登記），不是買賣契約成立就自動移轉，本選項說「立刻使乙取得所有權」是把債權行為與物權行為的效果混淆，錯誤。","甲的義務不只是「交付房屋」，還包括「移轉所有權」（辦理登記），本選項說義務「僅為交付房屋」遺漏了登記移轉義務，不完整。","動產所有權移轉以「交付」為生效要件（民法761條），但不動產所有權移轉以「登記」為生效要件（民法758條），本選項把不動產誤套用動產的規則，錯誤。","（本題答案）民法758條第1項：不動產物權，依法律行為而取得、設定、喪失及變更者，非經登記，不生效力——乙須等甲完成移轉登記（辦理所有權移轉登記於乙名下）後，乙才取得房屋所有權，敘述正確。"],
 trap:"這題徹底考察「債權行為」（買賣契約，合意即成立）vs「物權行為」（所有權移轉，需另有生效要件）的基本區分，以及不動產物權移轉「登記生效主義」的鐵律（758條）。要記住：買賣契約成立≠所有權移轉，這兩件事需要分開理解。不動產：買賣合意成立→甲負有移轉義務→辦理所有權移轉登記→乙取得所有權（三個階段，時間點不同）。",related:"與102年第4題（買賣契約何時成立）、113年第13題（何時取得土地所有權）共同構成「債權行為vs物權行為vs所有權移轉」完整三題組，三題合併比對效果最佳。"},
{id:"EBC051",cat:"C1買賣",year:"102年第22題",q:"甲未將代理權授與給乙，乙卻以甲之代理人名義與善意之丙訂立買賣契約，甲不承認乙之無權代理行為。下列敘述何者正確？",
 opts:["乙對丙不負任何責任","甲不承認後，乙應負履行責任或損害賠償責任，丙得擇一主張","丙知悉乙無代理權後，得撤回其對乙所為之承諾","丙知悉乙無代理權後，得撤銷其對乙所為之承諾"],correct:1,
 exps:["無權代理人（乙）對善意相對人（丙）是有責任的（民法110條），不是毫無責任，本選項說「不負任何責任」錯誤。","（本題答案）民法110條：無代理權人以他人之代理人名義所訂立之契約，對於善意之相對人，應負履行責任或損害賠償之責——甲不承認後，乙應對丙負「履行責任」（代替甲去履行那個買賣契約）或「損害賠償責任」（賠償丙因信賴乙有代理權而受的損害），由丙選擇主張哪一種，敘述正確。","「撤回」是指意思表示在「發出後到達相對人前」讓其不發生效力，丙知悉乙無代理權時，承諾已經到達乙（且甲已拒絕承認），已經過了可以「撤回」的時點，本選項表述不符合實際情境。","丙是善意的（不知道乙沒有代理權），當丙得知後，在甲拒絕承認的情況下，丙得依民法115條「撤回」其承諾（在甲承認前，相對人得撤回）——但本選項用「撤銷」，撤銷通常適用於意思表示有瑕疵的情形，不是無代理權情形的正確用語，本選項錯誤。"],
 trap:"無代理權人（乙）對善意相對人（丙）的責任（民法110條）：「履行責任或損害賠償責任」二擇一（由丙選）。這個責任是乙個人的責任（代替甲去履行，或賠償丙的損失），與甲無關（甲已拒絕承認）。另外要記住115條：在本人（甲）承認前，相對人（丙）可以「撤回」（不是撤銷）其意思表示，及時止損。「撤回」vs「撤銷」的用語差異也是這類題目的常見陷阱。",related:"與113年第3題（無代理權代售名畫，表見代理的適用）同屬無權代理主題，兩題合併可完整掌握無權代理的法律效果（本人拒絕承認的情形vs表見代理的情形）。"},
{id:"EBC052",cat:"C1買賣",year:"102年第27題",q:"甲向乙購買房屋，雙方簽訂買賣契約後，乙將房屋交付於甲，但尚未辦理所有權移轉登記，突然發生地震致使房屋全毀。下列敘述何者正確？",
 opts:["此時危險之負擔，應由甲負擔，故甲仍應給付乙全額之買賣價金","此時危險之負擔，應由乙負擔，故甲得拒絕給付乙買賣價金","此時危險之負擔，應由甲負擔，甲得對乙請求損害賠償","此時危險之負擔，應由乙負擔，乙得向甲請求損害賠償"],correct:0,
 exps:["（本題答案）民法373條：買賣標的物之利益及危險，自交付時起，均由買受人承受負擔，契約另有訂定者，從其訂定——房屋已「交付」給甲，危險已移轉至甲，地震造成房屋全毀的危險由甲（買受人）負擔，甲仍應給付乙全額買賣價金（因為危險在交付後移轉給甲，出賣人已完成交付義務），敘述正確。","危險在交付後已由甲負擔，不是由乙負擔，本選項錯誤。","危險由甲負擔，但地震是不可抗力，不是可歸責於乙的事由，甲無從向乙請求損害賠償（無過失不負責），本選項的前提部分（危險由甲負擔）正確，但後段（甲得對乙請求損害賠償）不正確。","危險已在交付時移轉給甲，不是由乙負擔，本選項前提錯誤。"],
 trap:"買賣危險負擔的時間點是「交付時」（373條）：交付前危險由出賣人負擔，交付後危險由買受人負擔——與「所有權移轉」的時間點（不動產需登記）無關。本題房屋已交付但尚未登記，這個「已交付但未登記」的狀態讓很多人誤判「所有權未移轉→危險應由出賣人負擔」，但這是把「危險負擔的轉移時點（交付）」跟「所有權移轉時點（登記）」混淆了，373條明確以「交付」為危險轉移的時點，不以「登記」為準。",related:"與101年第6題（交付前滅失的危險負擔）、109年第3題（汽車買賣危險移轉時點）同屬危險負擔主題，三題合併可完整建立「交付時危險移轉」這個核心規則的各種情形判斷。"},
{id:"EBC053",cat:"C1買賣",year:"102年第38題",q:"19歲之甲與20歲之乙訂立買賣契約，將一宗土地賣給乙，並將土地所有權移轉登記給乙。下列敘述何者正確？",
 opts:["買賣契約有效，土地所有權移轉亦有效","買賣契約效力未定，土地所有權移轉無效","買賣契約有效，但土地所有權移轉需得甲之法定代理人承認後，始告生效","買賣契約效力未定，需得甲之法定代理人承認後，始告生效，且土地所有權移轉有效"],correct:0,
 exps:["（本題答案）本題關鍵：現行民法第12條規定「滿18歲為成年」（已修正），19歲的甲是成年人，有完全行為能力，買賣契約有效，土地所有權移轉也有效，敘述正確。","甲19歲已是成年人（現行法成年為18歲），不是限制行為能力人，買賣契約不需要法定代理人承認，本選項關於「效力未定」的前提已不正確。","同上，甲已成年，土地所有權移轉不需要法定代理人承認，本選項不正確。","同上，甲已成年，整個前提已不正確。"],
 trap:"⚠️ 本題的陷阱在於「成年年齡的修法」——民法第12條已修正，滿18歲即為成年（舊法是20歲）。如果用舊法觀念（20歲成年）解題，會誤判19歲的甲是限制行為能力人，從而誤選效力未定的選項。但考試答案是A（買賣有效），代表正確答案是適用現行法（18歲成年），19歲的甲是完全行為能力人，其所為的買賣契約當然有效。這個修法前後的差異是本題的核心陷阱，務必確認自己記住的是現行法（18歲成年）而非舊法（20歲成年）。",related:"與A1段的行為能力相關題目（如99年第2題限制行為能力人詐術、108年第2題行為能力之敘述）交叉呼應，本題特別強調成年年齡修法的影響，是跨段的重要連結點。"},
{id:"EBC054",cat:"C1買賣",year:"103年第8題",q:"18歲之甲所為下列何種行為屬於無效？",
 opts:["買賣他人之物","買賣違章建築","被脅迫所締結之買賣契約","撤銷有關買賣之錯誤意思表示"],correct:3,
 exps:["買賣他人之物（他人物品的無權處分）：效力未定（民法118條），依是否得到真正所有人的承認決定效力，不是當然無效，本選項不正確。","買賣違章建築：違章建築仍是物的一種，可以成為買賣標的，雖然所有權移轉登記有問題，但債權行為（買賣契約）本身有效，不是無效，本選項不正確。","被脅迫所締結之買賣契約：法律效果是「得撤銷」（不是無效），在撤銷前契約有效，本選項說無效與法條不符。","（本題答案）18歲的甲是完全行為能力人（現行法18歲成年）；「撤銷有關買賣之錯誤意思表示」是一種「單獨行為」——撤銷是形成權的行使，甲如果是完全行為能力人，撤銷當然有效，但如果甲在舊法年代（尚未成年）是限制行為能力人，則依78條，限制行為能力人未得法定代理人允許的單獨行為「無效」。但在現行法下18歲的甲已是成年人，本選項的設定有爭議——依官方答案D，應是在舊法（20歲成年）的適用下，18歲的甲是限制行為能力人，撤銷（單獨行為）未得法定代理人允許→無效。"],
 trap:"⚠️ 本題103年的考試時間點，民法成年年齡尚未修正（當時仍為20歲成年），所以103年時18歲的甲是「限制行為能力人」。依舊法（103年適用的法律），限制行為能力人的「單獨行為」（撤銷）未得法定代理人允許→無效（78條）。這道題在現行法（18歲成年）下，答案邏輯會不同——現在18歲已是成年人，撤銷當然有效，此題不應再出現。閱讀本題時必須以當時的舊法（20歲成年）思考，而不是現行法。",related:"與102年第38題（成年年齡修法，19歲甲是否有完全行為能力）形成的修法前後對比，兩題合併可以清楚認識成年年齡修法前後的差異對解題的影響。"},
{id:"EBC055",cat:"C1買賣",year:"103年第9題",q:"甲與乙於民國103年10月1日簽訂買賣契約將自有古董錶以新臺幣20萬元出售予乙，約定同年12月31日交付標的物。若乙尚未給付價金，甲是否得於同年11月30日向乙請求給付價金？",
 opts:["甲得於同年11月30日向乙請求給付價金","甲不得於同年11月30日向乙請求給付價金，因為買賣契約尚未成立","甲不得於同年11月30日向乙請求給付價金，因為價金給付義務尚未到清償期","甲不得於同年11月30日向乙請求給付價金，因為乙之同時履行抗辯之主張成立"],correct:0,
 exps:["（本題答案）買賣契約在10月1日簽訂（合意）時即已成立，乙的價金給付義務當時即已發生，只是「清償期」（何時需要支付）未必明確約定在12月31日——本題只約定了「12月31日交付標的物」，並未約定乙的價金何時應支付，在無特別約定的情況下，民法規定當場給付（現金交易），或依契約的解釋決定，若契約未約定價金清償期，甲得於交付前任何時間請求，故甲得於11月30日請求，敘述正確。","買賣契約在10月1日雙方合意時即已成立，11月30日契約早就成立了，本選項說「契約尚未成立」完全錯誤。","本選項可能的論點：若認為價金應與交付同時履行（現金交易），則在12月31日交付前甲無法單獨請求價金——但本題若無特別約定，依法甲仍得請求，或說即使有同時履行的問題，也是乙的抗辯，不影響甲的請求權存在，本選項說甲「不得」請求過於絕對。","同時履行抗辯是乙的抗辯（乙可以拒絕在甲交付前先付款），不是甲不得請求的原因，本選項混淆了抗辯權的行使主體，且即便乙可主張同時履行抗辯，也只是使乙暫時不需先付款，不是說甲「不得請求」。"],
 trap:"買賣契約中「標的物交付期」和「價金清償期」是可以分開約定的——本題只約定了12月31日交付古董錶，沒有明確約定乙何時付款。在沒有特別約定的情況下，價金可以與交付同時給付（現金交易），但甲在任何時間點都有請求權，乙只是有「同時履行抗辯」可以拒絕在甲交付前先單獨付款，不是甲「不得請求」。這裡考的是「請求權存在」vs「抗辯可以暫時阻卻請求」這兩個不同層次的概念。",related:"與100年第6題（同時履行抗辯的適用）同屬雙務契約同時履行抗辯主題，兩題合併可釐清「有抗辯」不等於「對方沒有請求權」這個重要區別。"},
{id:"EBC056",cat:"C1買賣",year:"104年第9題",q:"甲、乙締結由甲出售其所有之建物予乙之買賣契約，但該建物實際上已於甲、乙締約前一日因火災而全部燒毀。該買賣契約效力如何？",
 opts:["有效，但甲免給付義務","有效，甲仍應給付，但乙得解除契約","效力未定，須待甲重建該建物後方生效","無效"],correct:3,
 exps:["本題的買賣標的是「特定建物」，締約前一日已全部燒毀，屬「自始客觀不能」——以不能給付為標的的契約，依民法246條第1項前段，自始無效，不是「有效但甲免給付」。","同上，自始不能的契約是自始無效，不是「有效但乙得解除」（解除契約需要契約先存在，但此契約已自始無效，無從解除）。","自始客觀不能的契約是自始無效，不是效力未定，且建物已全毀，重建後是不同的建物，不會使原契約生效。","（本題答案）民法246條第1項：以不能之給付為契約標的者，其契約為無效——本題特定建物在締約前已全毀（自始客觀不能），以此為標的的買賣契約自始無效，敘述正確。"],
 trap:"「自始客觀不能」（締約時標的物就已不存在/不可能實現）→契約自始無效；「嗣後不能」（締約後標的物才滅失）→契約已有效成立，之後才有給付不能的問題（看是誰的原因造成，適用266條/267條/226條不同規則）。本題建物在締約「前一日」就已燒毀，是標準的自始客觀不能，直接適用246條無效規則，不用討論給付不能的問題。",related:"與104年第10題（種類物自始不能的不同處理）、100年第8題（以天上星星為給付標的，自始不能）同屬給付不能效力主題，三題合併可建立完整的「自始不能vs嗣後不能」判斷架構。"},
{id:"EBC057",cat:"C1買賣",year:"104年第10題",q:"甲、乙締結由甲出售10打市面上普遍流通之紅酒予乙之買賣契約，甲依約於約定期日將標的物運送至乙之住所地時，乙以自己尚無置放空間為由，拒絕受領。下列敘述，何者正確？",
 opts:["乙拒絕受領，甲無法履行給付，給付義務消滅","乙拒絕受領，導致履行不能，應由甲負擔危險","乙拒絕受領，甲得解除契約","乙拒絕受領，甲得請求乙賠償因此所生之損害"],correct:3,
 exps:["乙拒絕受領屬於「受領遲延」（不是甲給付不能），甲的給付義務並未因此消滅，本選項錯誤。","受領遲延期間，危險由「受領遲延的一方（乙）」負擔（民法241條），不是由甲負擔，本選項說應由甲負擔危險，與法條規定相反，錯誤。","受領遲延不當然賦予甲解除契約的權利（解除需要依催告程序等），直接解除的說法過於簡化，且甲還有其他救濟（如請求損害賠償、提存等），不一定要解除，本選項不夠精確。","（本題答案）民法240條：受領遲延期間，債務人得請求債權人賠償因遲延所生之損害及必要費用——乙無故拒絕受領造成甲的損失（如保管費、運費額外支出），甲得請求乙賠償因受領遲延所生之損害，敘述正確。"],
 trap:"「受領遲延」（債權人無故拒絕受領）的法律效果：①甲的給付義務不消滅（甲仍有義務，但暫時阻卻）②危險移轉給乙（受領遲延後，損毀滅失的危險由乙負擔，即使是不可抗力乙也要負責）③甲得請求乙賠償因遲延受領所生之損害及費用（240條）④甲可選擇提存（給付金錢或有價證券時，民法326條）。本題重點是「乙無故拒絕受領，甲得請求損害賠償」，這是考試最常考的受領遲延效果。",related:"與101年第6題（特定物交付前滅失的危險負擔）、102年第27題（交付後地震全毀的危險負擔）同屬危險負擔主題，三題合併可完整掌握危險移轉的各種情形（交付時移轉、受領遲延時移轉）。"},
{id:"EBC058",cat:"C1買賣",year:"105年第5題",q:"30歲的甲患有精神疾病，並受監護宣告。某日，甲於精神狀況良好時，單獨到乙電信公司購買手機一支。試問甲乙間之買賣契約，其效力為何？",
 opts:["有效","無效","得撤銷","效力未定"],correct:1,
 exps:["受監護宣告人的行為不會因「精神狀況良好」而例外有效——監護宣告是「身分上的法律狀態」，一旦宣告即為無行為能力人，其意思表示一律無效，不因行為時的實際精神狀況而例外，本選項說有效不正確。","（本題答案）民法15條：受監護宣告之人，無行為能力；民法75條：無行為能力人之意思表示，無效——受監護宣告的甲是無行為能力人，其單獨到電信公司購買手機的行為是意思表示，依75條一律無效，不論行為當時精神是否清醒，敘述正確。","得撤銷適用於意思表示有瑕疵（錯誤、詐欺、脅迫）的情形，不是無行為能力人意思表示的效力，本選項不正確。","效力未定是限制行為能力人訂立契約（未得法定代理人允許）的效力，受監護宣告人是無行為能力人（比限制行為能力人保護更強），其意思表示直接無效而非效力未定，本選項不正確。"],
 trap:"受監護宣告（無行為能力）vs 受輔助宣告（部分行為限制）的效力差異：無行為能力人（監護）的意思表示一律「無效」，不因行為時精神狀況而有例外；受輔助宣告人的「特定重要行為」需要輔助人同意，未得同意者效力為「得撤銷」或「效力未定」。考試常把這兩種宣告的效力規則互換出題，且強調「行為時精神良好也無效」這個看似嚴苛但實務上有其必要的規則（避免事後爭執行為當時是否清醒的舉證困難）。",related:"與A1段101年第22題（植物人仍有權利能力）、A1段102年第25題（受輔助宣告人的效力規則）形成完整的三種特殊身分（植物人/受監護宣告/受輔助宣告）效力對照組，跨段合併複習效果最佳。"},
{id:"EBC059",cat:"C1買賣",year:"105年第7題",q:"有關法律行為之標的，下列敘述何者正確？",
 opts:["甲乙約定以火星上岩石為贈與標的物，該契約有效","甲乙約定故宮翠玉白菜為買賣標的物，該契約無效","甲乙約定不得開設競爭性同業商店為契約標的物，該契約無效","甲乙約定將未來可能繼承到的財產作為買賣標的物，該契約有效"],correct:3,
 exps:["以火星上岩石為贈與標的物——現有科技無法實現，屬「自始客觀不能」，依民法246條，以不能之給付為契約標的者，其契約無效，本選項說「有效」錯誤。","故宮翠玉白菜屬於國家文物（特定之物），以其為買賣標的物在法律上並非自始不能（翠玉白菜確實存在且可被移轉），只是涉及文化資產保護法等公法限制問題，在純粹民法層面上，特定物原則上可以作為買賣標的，本選項說「無效」理由不充分，不正確。","競業禁止約款（不得開設競爭同業）：只要符合地域、時間、行業範圍合理性等要件，這類約款通常有效——本選項說「無效」過於絕對，只有在限制過廣、違反公序良俗或正當競爭原則時才可能無效，本選項不正確。","（本題答案）民法247條：以未來之給付為標的之契約，非因給付不能或契約目的不達，不得解除——以「未來可能繼承到的財產」為買賣標的物，屬於「未來物」的買賣，現行民法允許以未來物為買賣標的（247條承認未來之給付），該契約有效（只是若繼承未發生或財產未如預期，可能涉及給付不能問題），敘述正確。"],
 trap:"「未來物的買賣」是法律允許的——民法247條明文承認以未來之給付為契約標的，契約有效成立（如預售屋買賣，就是以未來完工的房屋為標的）。考試常把「未來物」跟「自始不能」搞混——自始不能是「依當時情況根本不可能實現的給付」（如送天上星星），而未來物只是「現在還不存在，但將來可能存在」的給付（如繼承財產、預售屋），兩者性質完全不同，自始不能無效，未來物則有效。",related:"與100年第8題（以天上星星為給付標的，自始客觀不能）、104年第9題（締約前標的物已全毀，自始不能）同屬法律行為標的效力主題，三題合併可完整掌握「何種標的導致無效」的判斷架構。"},
{id:"EBC060",cat:"C1買賣",year:"105年第12題",q:"依現行民法規定，有關違反法定要式規定之法律行為效力，下列何者應為無效？",
 opts:["會員已交付首期會款，但未訂立會單","不動產買賣契約未公證","結婚僅以書面為之，但未依戶籍法辦理結婚登記","借用人已為金錢使用，但消費借貸契約未於書面訂立"],correct:3,
 exps:["民法709條之2：合會應以書面為之（民法並未明訂未訂立書面合會單即無效，僅規定應以書面，但已交付首期款的情形，通說認為契約已成立，只是書面要求未滿足不影響效力），本選項不是最明確的無效情形。","不動產買賣契約一般採不要式原則，不需公證即可成立，公證只是增加執行力，不是成立要件，本選項說未公證應無效，不正確。","民法982條（修正後）：結婚應以書面為之，有二人以上證人之簽名，並應由雙方當事人向戶政機關為結婚之登記——現行法結婚的成立要件是「書面+二人證人簽名+戶籍登記」，若只有書面而未辦理戶籍登記，依現行法結婚不成立（無效），本選項描述的情形確實無效，但考試時需確認是否有其他選項更明確。","（本題答案）消費借貸（借錢）在現行法下，雖民法425條之1等有書面要求，但更重要的是：消費借貸是「要物契約」，需要「實際交付金錢」才成立——本選項說借用人已為金錢使用（代表錢已交付），但消費借貸契約未以書面訂立，此時要物要件（交付）已滿足，契約應已成立，書面只是要式要求，違反書面要式的效果需依具體法條判斷，並非當然無效。依官方答案D，本選項被認定為「應為無效」的情形，可能考的是特定消費借貸的書面要式規定（如民法474條第2項：消費借貸預約之書面要件）在當時的適用結果。"],
 trap:"法律行為是否因違反要式而無效，取決於：①該法條是否明文規定「違反要式則無效」（強行要式）②還是僅要求書面（但未說無效，此時違反通常仍有效，只是其他法律效果受影響）。本題的核心是分辨哪個選項的法條是「明文規定違反則無效的強行要式」，需要結合具體法條判斷，是本段較難的一題。依官方答案D，建議對照當時有效的民法條文（消費借貸相關要式規定）確認具體理由。",related:"與101年第37題（使用借貸是要物契約）、114年第11題（買賣是諾成契約）同屬契約類型（要式/不要式、要物/諾成）主題，三題合併可建立完整的契約類型分類架構。"},
{id:"EBC061",cat:"C1買賣",year:"106年第1題",q:"下列有關不動產買賣之敘述，何者錯誤？",
 opts:["不動產仲介公司用與不特定之消費者簽定同類委託銷售不動產而先予擬定之契約，屬於定型化契約","不動產買賣除標的物及價金外，該房地之交付時間、所有權移轉登記時期、價金之給付方式等，通常亦為契約成立之必要之點","居間人已為報告或媒介而契約不成立者，居間人支出之費用均得請求償還","約定之違約金是否過高，可斟酌當事人所受損害情形，及債務人如能依約履行時債權人可享受之一切利益"],correct:2,
 exps:["定型化契約（民法247條之1）：指當事人一方預先擬定供他方締約的契約條款，不動產仲介公司預先擬定的委託銷售契約確實屬於定型化契約，敘述正確。","民法153條第2項：當事人對於必要之點，意思一致，而對於非必要之點，未經表示意思者，推定其契約為成立——交付時間、登記期限、付款方式等通常是當事人在不動產買賣中必要之點，未就這些點達成合意，可能影響契約是否完整成立，敘述方向正確。","（本題答案，敘述錯誤）民法571條：居間人支出之費用，非有特別習慣或約定，不得請求償還——居間人的費用求償原則上需要有特別習慣或約定，不是「均得請求償還」，本選項把例外（得請求）說成原則，與571條的「原則不得、例外得請求」規定相反，是本題錯誤敘述。","民法252條：約定之違約金額過高者，法院得因當事人之請求，酌減至相當之數額，斟酌標準包含損害情形及債權人可得享受之利益等，敘述正確。"],
 trap:"居間人的費用求償規則（571條）：居間人在居間服務過程中支出的費用，「原則上不得」向委託人請求償還，除非有「特別習慣或約定」才例外可以請求——這個「原則不得」的設計是因為居間人的報酬通常已涵蓋其費用，不另外保障費用求償。考試常把「原則不得請求」和「均得請求」互換，本題選項C正是把「例外得請求」說成「均得請求」，是標準的陷阱手法。",related:"與103年第17題（居間人報酬及費用）、108年第11題（居間契約之敘述）同屬居間契約主題，三題合併可完整掌握居間人的報酬請求和費用求償規則。"},
{id:"EBC062",cat:"C1買賣",year:"106年第8題",q:"依民法規定，關於不動產買賣，下列敘述何者正確？",
 opts:["應作成公證書","非經登記，不生效力","非經交付買賣之不動產，不生效力","因當事人雙方意思表示合致，買賣契約即生效力"],correct:3,
 exps:["不動產買賣契約不需公證即可成立（不要式原則），公證只是增加特殊執行力，不是買賣契約的成立要件，本選項錯誤。","「非經登記，不生效力」是不動產「物權行為」（所有權移轉）的規定（民法758條），不是債權行為（買賣契約本身）的規定——買賣契約合意即成立有效，不需要登記，本選項混淆了債權行為與物權行為，錯誤。","「非經交付不生效力」是動產物權行為的規定（交付是動產所有權移轉的生效要件），不適用於不動產買賣契約的成立，本選項錯誤。","（本題答案）民法345條買賣契約是諾成契約（合意即成立），不動產買賣也是如此——甲乙就不動產標的物及價金達成合意，買賣契約即生效力（成立並有效），後續的登記是物權移轉的程序，不影響買賣契約本身的效力，敘述正確。"],
 trap:"這題再次測試「不動產買賣契約（債權行為）」vs「不動產所有權移轉（物權行為）」的基本區分：買賣契約→合意即成立（諾成，不要式）；所有權移轉→需辦理登記（758條）。兩個行為在時間點、成立要件上都不同，考試最常考這兩個層次的混淆。跟102年第4題（買賣契約何時成立）、102年第11題（乙何時取得所有權）合在一起，是C1段最核心的三角考點組合。",related:"與102年第4題（買賣契約成立時點）、102年第11題（不動產所有權移轉要件）形成「不動產買賣完整流程」的三題考點組，必須合併牢記三個時間點的差異：合意→契約成立；交付→危險移轉；登記→所有權移轉。"},
{id:"EBC063",cat:"C1買賣",year:"108年第14題",q:"甲授與甫滿十八歲之乙代理權，由乙處理出售甲所有之A機車的事宜。乙乃以甲之代理人的名義，以一萬元價金與丙訂立買賣A機車之契約。下列敘述，何者正確？",
 opts:["本件買賣契約有效成立，甲應受其拘束","本件買賣契約效力未定，須視甲之法定代理人是否承認","本件買賣契約效力未定，須視丙之法定代理人是否承認","本件買賣契約無效，因乙為限制行為能力人，其所為之代理行為無效"],correct:0,
 exps:["（本題答案）民法104條：代理人所為或所受意思表示之效力，不因其無行為能力或限制行為能力而受影響——乙甫滿18歲，在現行法下已是成年人（完全行為能力），但即便乙是限制行為能力人，其代理行為的效力也不因此受影響（104條），因為代理行為的法律效果直接歸屬於本人（甲），本人是有完全行為能力的甲，契約有效成立且甲受其拘束，敘述正確。","本件買賣契約是甲（有完全行為能力）透過代理人乙對外締結，無論乙的行為能力如何（104條），契約都有效成立，不是效力未定，本選項錯誤。","丙是買受人（相對人），丙的法定代理人與這個買賣契約是否有效無關，本選項錯誤。","民法104條明文規定代理人的行為能力不影響代理行為效力，本選項說「乙是限制行為能力人故代理行為無效」直接違反104條，錯誤。"],
 trap:"代理制度中的「代理人行為能力」問題是民法104條的核心考點：代理人不需要有完全行為能力，代理人的行為能力不影響代理行為的效力——因為代理行為的法律效果直接歸屬於本人（甲），本人的行為能力才是關鍵，代理人只是傳達意思的工具。這個規則讓未成年人或受輔助宣告人也可以作為他人的代理人，不會因自己的行為能力受限而影響代理效力。",related:"與A6段101年第31題（代理人的各種限制）、A6段110年第5題（代理制度各規則之敘述）同屬代理制度主題，104條的「代理人行為能力不影響代理效力」是最重要且最常被誤解的代理規則之一，必須確實掌握。"},
{id:"EBC064",cat:"C1買賣",year:"109年第3題",q:"甲與乙訂立買賣契約，將其二手汽車出賣予乙，若當事人間無特別約定者，關於該汽車之利益及危險，下列何者正確？",
 opts:["於甲與乙簽訂買賣契約時起，由乙承受負擔","於甲收受乙全部價金時起，由乙承受負擔","於甲將汽車交付乙時起，由乙承受負擔","於辦理汽車過戶完成時起，由乙承受負擔"],correct:2,
 exps:["買賣危險負擔的轉移時點是「交付時」，不是「簽訂契約時」，本選項把契約成立時點誤當成危險移轉時點，錯誤。","收受價金是買受人的義務履行，不影響危險移轉的時點（危險移轉以交付為準，不以付款為準），本選項錯誤。","（本題答案）民法373條：買賣標的物之利益及危險，自交付時起，均由買受人承受負擔——汽車（動產）的危險在甲將汽車「交付」乙時移轉給乙，敘述正確。","汽車過戶（所有權移轉登記）只影響所有權的歸屬，不影響危險負擔的轉移時點（危險以交付為準），且動產的所有權移轉以交付為生效要件（不是登記），本選項錯誤。"],
 trap:"危險負擔的時點口訣：「交付危險移轉，登記所有權移轉」——危險從「交付」時移轉，所有權從「登記」（不動產）或「交付」（動產）時移轉。本題是動產（汽車）買賣，危險和所有權都在「交付」時移轉，過戶登記（動產的行政程序）不影響所有權或危險的移轉時點。這個時間點的正確認識是危險負擔考題的核心。",related:"與102年第27題（房屋交付後未登記，地震全毀危險由買受人負擔）、101年第6題（交付前火災，危險由出賣人負擔）同屬危險負擔三連發，三題合併是掌握373條的最有效複習方式。"},
{id:"EBC065",cat:"C1買賣",year:"110年第1題",q:"甲與乙訂立買賣契約，契約條款記載「…價金新臺幣陸拾捌萬元整（NT$860,000）。前揭捌拾陸萬元價金應於訂約後10日內給付…」。就價金條款，下列敘述何者正確？",
 opts:["以新臺幣860,000元為準，因以號碼表示者以號碼為準","以新臺幣680,000元為準，因文字與號碼不符時以文字為準","以新臺幣680,000元為準，因文字表示次數較多，以最低額為準","以新臺幣860,000元為準，因法院無法探求當事人原意時，均以最低額為準"],correct:1,
 exps:["號碼（NT$860,000）和文字（陸拾捌萬元=NT$680,000）不符時，依民法4條，應以「文字」為準，不是以號碼為準，本選項錯誤。","（本題答案）民法4條後段：如法院不能決定何者為當事人之原意時，應以「文字」為準——本題有文字（陸拾捌萬元=680,000）和號碼（NT$860,000）不一致的情形，依4條以文字為準，即以680,000元為準，敘述正確。","民法5條是「同一種表示方式（同為文字或同為號碼）出現數次不一致」時才用「最低額」規則，本題是文字vs號碼（不同表示方式）的不一致，適用4條（以文字為準），不是5條（以最低額為準），本選項適用錯誤的條文。","最低額規則（5條）限於「同一種表示方式數次不符」的情形，且是取所有次中最低的，不是「均以最低額為準」這種一般性規則，本選項描述不正確。"],
 trap:"民法第4條（文字vs號碼不符）vs第5條（同種表示方式數次不符）的適用區分：本題是「文字（陸拾捌萬元）」vs「號碼（860,000）」不一致→4條（以文字為準）；如果是「文字A寫一百萬」後來又「文字B寫九十萬」兩次文字不一致→5條（以最低額為準）。記憶口訣：「文字對號碼，以文字為準；同種表示數次不符，以最低額為準。」這跟A4段106年第25題考的是完全相同的民法4條、5條適用分野，是跨段的重要連結點。",related:"與A4段106年第25題（文字號碼不符的處理規則）是同一法條的重複出題，兩題必須合併複習，確認自己對4條和5條的適用情境清楚無誤。"},
{id:"EBC066",cat:"C1買賣",year:"110年第15題",q:"關於買賣瑕疵擔保的敘述，下列何者正確？",
 opts:["買受人對於由他地送到之物，主張有瑕疵，不願受領者，買受人無暫為保管之責","從物有瑕疵者，買受人僅得就從物之部分，主張解除契約","買受人於契約成立時，知有瑕疵者，出賣人不負物之瑕疵擔保責任","買受人受有損害時，若出賣人係善意（即出賣人不知有瑕疵），買受人仍得請求損害賠償"],correct:2,
 exps:["民法374條：買受人對於由他地送來之物，主張有瑕疵拒絕受領者，如出賣人未於該地有代理人，買受人有暫為保管之義務——本選項說「無暫為保管之責」與374條規定相反，錯誤。","民法364條第2項：從物有瑕疵，買受人得主張解除全部契約（即就主物連同從物解除），而非僅就從物部分解除，本選項說「僅得就從物部分解除」不正確（實際上可以就全部解除）。","（本題答案）民法355條第1項：買受人於契約成立時知有瑕疵者，出賣人不負物之瑕疵擔保責任——明知有瑕疵仍然購買，視為自願承受，出賣人免除瑕疵擔保責任，敘述正確。","民法360條：買賣之物，缺少出賣人所保證之品質者，或出賣人故意不告知物之瑕疵者，買受人得不解除契約或請求減少價金，而請求不履行之損害賠償。損害賠償請求需要出賣人有「保證」或「故意不告知」，善意的出賣人（不知有瑕疵）原則上不需負損害賠償責任，本選項說「善意出賣人仍得請求損害賠償」不正確。"],
 trap:"物之瑕疵擔保的重要例外：①買受人訂約時已知瑕疵（355條）→出賣人免責（買受人自甘冒險）；②出賣人「保證」無瑕疵或「故意隱瞞」（360條）→可以請求損害賠償（不只是減價或解除）；③善意出賣人（不知瑕疵）→原則上不負損害賠償責任（只負瑕疵擔保責任，如解除/減價）。這三種特殊情形是考試最愛考的例外規則，必須逐一記住各自的法律效果。",related:"與105年第17題（特定物買賣不得請求另行交付他物）、111年第20題（特定物買賣瑕疵擔保，非得主張之權利）同屬物之瑕疵擔保主題，三題合併可完整掌握瑕疵擔保的各種效果與限制。"},
{id:"EBC067",cat:"C1買賣",year:"111年第4題",q:"下列敘述，何者錯誤？",
 opts:["使用借貸契約必須是無償的契約","借用人得主張買賣不破使用借貸之抗辯","借用物為動物時，飼養費原則上由借用人負擔","借用人無須以自己之名義為借用物投保保險"],correct:1,
 exps:["使用借貸（民法464條）定義中明確包含「無償」要件（無償使用後返還），有償則為租賃，本選項說使用借貸必須無償，敘述正確。","（本題答案，敘述錯誤）「買賣不破租賃」（民法425條）是保護「租賃」關係的規定，讓承租人在所有權移轉後仍可繼續占有使用——「使用借貸」不適用這個保護。使用借貸是無償的，法律不給予跟租賃同等的對抗效力保護，借用人不得主張「買賣不破使用借貸」，本選項說「借用人得主張」與法律規定相反，是本題錯誤敘述。","民法469條：借用物為動物者，其飼養費由借用人負擔——借用動物的飼料費用是借用人的基本負擔義務，敘述正確。","借用人對借用物有保管義務，但以自己名義為借用物投保（如給借用的汽車買保險）不是借用人的法定義務，敘述正確。"],
 trap:"「買賣不破租賃」（425條）vs「使用借貸不受保護」：租賃人（有償使用）在所有權移轉後仍可繼續占有使用（法律給予特殊對抗效力保護）；使用借貸人（無償使用）在所有權移轉後，新所有人可以終止使用借貸、要求借用人返還——這個「有償租賃受保護、無償使用借貸不受保護」的差異是民法刻意的設計，不動產業務中非常重要（房客有租約受保護，免費讓友人住的則不受保護）。",related:"與101年第29題（租賃關係及「買賣不破租賃」）、104年第20題（租賃關係中出租人修繕義務）同屬租賃vs使用借貸的對比主題，合併複習可清楚建立有償（租賃）vs無償（使用借貸）的不同規則架構。"},
{id:"EBC068",cat:"C1買賣",year:"111年第20題",q:"特定物買賣，若因物有瑕疵而出賣人依法應負物之瑕疵擔保責任時，下列何者非買受人依法所得主張之權利？",
 opts:["解除買賣契約","請求減少價金","請求另行交付相同品質之物","請求損害賠償（出賣人故意不告知或保證無瑕疵時）"],correct:2,
 exps:["民法359條：買受人得解除其契約（解約）或請求減少其價金，敘述正確，非本題答案。","同上，請求減少價金是法律明文賦予的救濟之一，敘述正確，非本題答案。","（本題答案）特定物的「另行交付相同品質之物」（換貨）只適用於「種類物」（不特定物），特定物本身獨一無二，無法另行提供相同的替代品——本選項描述的救濟方式對特定物「不存在」（物理上及法律上均無法實現），是本題答案（非買受人得主張之權利），與105年第17題考點完全相同。","民法360條：出賣人故意不告知或保證無瑕疵者，買受人得請求損害賠償（不只是減價或解除），在此條件下可以請求損害賠償，敘述正確，非本題答案。"],
 trap:"這題與105年第17題完全相同的考點——特定物買賣不得請求「另行交付他物」（換貨）。這個考點在16年間出現兩次，代表是高頻且容易被誤選的陷阱：很多人直覺認為買到壞掉的東西當然可以要求換一個好的，但如果買的是「特定物」（如特定的古董、二手商品、特定一幢房屋），在物理上就不可能提供另一個「相同的替代品」，法律也沒有這個救濟選項。",related:"與105年第17題（特定物買賣不得請求另行交付他物）是同一考點的重複命題，兩題必須合併確認你記住了這個規則。"},
{id:"EBC069",cat:"C1買賣",year:"112年第6題",q:"甲向乙購買乙對於丙的債權，但丙已於買賣前清償系爭債權而使該債權消滅，請問該買賣契約之效力如何？",
 opts:["債權不得作為買賣之標的物，買賣契約無效","買賣契約有效，但丙得拒絕甲之清償請求","買賣契約有效，但甲得主張乙應負物之瑕疵擔保責任或權利瑕疵擔保責任","買賣契約有效，甲承受乙對丙之所有現有權利"],correct:2,
 exps:["債權可以作為買賣的標的物（債權讓與）——民法294條允許債權讓與，以債權為買賣標的並無禁止，本選項說不得以債權為標的，錯誤。","乙賣給甲的債權已在買賣前消滅（丙已清償），丙不存在對甲的債務，本選項「丙得拒絕甲之清償請求」方向正確（丙確實可以拒絕，因為債務已消滅），但問題在於甲應向乙主張，而非僅說丙拒絕甲，本選項不夠完整且不是最佳答案。","（本題答案）乙出售給甲的是「對丙的債權」，但這個債權已在買賣前消滅（存有瑕疵/根本不存在），乙出賣的「權利」有瑕疵（權利瑕疵擔保，民法349-351條）——乙應保證該債權存在且有效，若債權已消滅，乙違反了權利瑕疵擔保義務，甲得主張解除契約或請求損害賠償，敘述正確。","買賣的債權已消滅，甲無法承受不存在的債權，本選項不正確。"],
 trap:"「物之瑕疵擔保」（標的物品質有瑕疵）vs「權利瑕疵擔保」（出賣人出賣的「權利」本身有問題，如出賣的債權根本不存在、出賣的土地上有他人地上權等）——本題出賣的「債權」在買賣前已消滅，是標準的「權利瑕疵」（出賣人無法移轉有效的權利給買受人），適用民法349條以下的權利瑕疵擔保規則。記憶口訣：物之瑕疵=東西本身有問題；權利瑕疵=出賣人賣的那個「權利」本身有問題。",related:"與110年第15題（物之瑕疵擔保的各種規則）、111年第20題（特定物瑕疵擔保效果）同屬瑕疵擔保主題，三題合併可區分物之瑕疵擔保與權利瑕疵擔保的適用情境。"},
{id:"EBC070",cat:"C1買賣",year:"113年第1題",q:"甲就其所有之A地，先與乙訂立買賣契約，後與丙訂立買賣契約，均未辦理所有權移轉登記。關於二個買賣契約之效力，下列敘述何者正確？",
 opts:["甲乙間之買賣契約有效，甲丙間之買賣契約無效","甲乙間之買賣契約有效，甲丙間之買賣契約效力未定","甲乙及甲丙之買賣契約均有效","甲乙間之買賣契約有效，甲丙間之買賣契約因甲出賣他人之物而無效"],correct:2,
 exps:["甲先賣給乙，再賣給丙（一物二賣），兩個買賣契約的效力分別判斷：買賣契約是債權行為（諾成契約，合意即成立），甲乙買賣契約有效；甲丙買賣契約同樣是債權行為，甲出賣的A地是自己所有（不是他人之物），甲丙買賣契約也有效——「甲丙之買賣契約因甲出賣他人之物而無效」的前提不成立，因為甲丙訂約時A地仍是甲所有的（只是已承諾賣給乙，但所有權還沒移轉），本選項前半對後半錯，不完整。","甲丙買賣契約是否效力未定？一物二賣的情形下，甲丙買賣契約並非無權處分（A地仍是甲的），所以不是效力未定，本選項不正確。","（本題答案）一物二賣（甲先賣給乙再賣給丙）的情形，兩個買賣契約在債權行為層面都有效——買賣契約是甲分別對乙和丙各自的承諾（債權行為），兩個都有效；問題在於甲最多只能讓一方取得所有權（物權行為，登記移轉），誰先辦理登記，誰就取得所有權，另一方則可向甲請求債務不履行的損害賠償。兩個買賣契約本身均有效，敘述正確。","甲丙訂約時A地仍是甲所有，不是「他人之物」，本選項前提錯誤。"],
 trap:"「一物二賣」的核心規則：甲對乙、對丙分別訂立買賣契約，兩個債權行為都有效（各自的合意都成立）；但物權行為（所有權移轉登記）只能發生一次，誰先辦理登記誰取得所有權，另一方的買賣契約雖仍有效，但甲已無法再移轉所有權，構成給付不能，另一方得依給付不能的規定向甲主張損害賠償。這是不動產交易中最常見的法律糾紛之一，也是不動產仲介考試的核心考點。",related:"與102年第11題（不動產所有權移轉的登記生效主義）、113年第13題（何時取得A地所有權）共同構成「一物二賣到所有權取得」完整鏈條，三題合併是C1段最重要的三題組。"},
{id:"EBC071",cat:"C1買賣",year:"113年第3題",q:"甲將其所有之名畫出租於乙，並未將代理權授與乙。詎料，乙竟以甲之代理人名義，與善意之丙訂立買賣契約，將名畫出賣並交付於丙，丙已給付全部價金。甲不承認乙之行為。下列敘述，何者正確？",
 opts:["買賣契約對甲不生效力，丙得向甲請求返還已給付之價金","買賣契約對甲不生效力，乙對丙應負履行或損害賠償責任","買賣契約對甲生效力，甲應將名畫移轉登記予丙","買賣契約對甲生效力，甲得向丙請求返還名畫"],correct:1,
 exps:["買賣契約因無代理權且甲不承認，對甲不生效力（170條）——丙若要主張返還價金，需向乙（無代理權人）主張，而非向甲（甲未參與交易，對甲不生效力，甲沒有收到價金），本選項說「丙向甲請求返還價金」方向錯誤。","（本題答案）民法110條：無代理權人以他人之代理人名義所訂立之契約，對於善意之相對人，應負履行責任或損害賠償之責——甲不承認後，乙應對善意的丙負「履行責任」（代替甲履行交付名畫+所有權移轉的義務）或「損害賠償責任」（賠償丙因此受的損失），由丙擇一主張，敘述正確。","甲不承認，買賣契約對甲不生效力，甲沒有移轉所有權的義務，本選項說「對甲生效力，甲應登記移轉」不正確。","同上，甲不承認，買賣契約對甲不生效力，且名畫已交付丙（雖然乙是無代理權的，但乙以甲之代理人名義交付），甲向丙請求返還名畫的依據較複雜（需要透過不當得利或所有物返還請求），本選項說「甲得向丙請求返還」的前提（對甲生效力）本身已錯誤。"],
 trap:"無代理權人（乙）對善意相對人（丙）的責任（110條）是本題核心，跟102年第22題幾乎是同一考點的不同包裝——無代理權行為對本人（甲）不生效力，但無代理權人（乙）需對善意相對人（丙）負「履行或損害賠償」責任（丙選一），這是保護善意第三人（丙）的重要規則。本題還加上了「表見代理是否適用」的判斷（乙只是承租人不是代理人，甲也沒有表示授權乙的行為，所以不構成表見代理169條），甲確實不需要承擔責任。",related:"與102年第22題（無代理權代理行為的效力，本人拒絕承認後的責任歸屬）是同一考點的重複出題，兩題合併複習可完整掌握無代理權行為對本人不生效力、對善意第三人須負責的規則。"},
{id:"EBC072",cat:"C1買賣",year:"113年第13題",q:"甲與乙訂立買賣契約，向乙購買A地。下列關於甲何時取得A地所有權之敘述，何者正確？",
 opts:["買賣契約有效成立時","甲付清全部價金時","甲與乙完成所有權移轉登記時","甲受領A地之交付時"],correct:2,
 exps:["買賣契約成立只是「債權行為」的完成（甲乙互負債務），不是「物權行為」（所有權移轉）的完成，契約成立時甲不取得所有權，本選項錯誤。","付清價金是甲對乙的「債務履行」，不是所有權移轉的條件（除非雙方特別約定「付清後移轉」），一般情形下付款不等於取得所有權，本選項錯誤。","（本題答案）民法758條：不動產物權，依法律行為而取得、設定、喪失及變更者，非經登記，不生效力——A地是不動產，甲須待完成所有權移轉「登記」後，才取得A地的所有權，敘述正確。","動產所有權移轉以「交付」為生效要件（民法761條），但不動產是以「登記」為生效要件，本選項把動產規則誤套到不動產，錯誤。"],
 trap:"這題是102年第4題（買賣何時成立→合意時）和102年第11題（乙何時取得所有權→登記時）的整合版，三題合在一起是C1段最重要的「不動產買賣時間軸」考點組合：①簽約（合意）→買賣契約成立②付款→履行義務（不影響所有權）③交付→危險移轉（不動產交付不影響所有權）④完成登記→所有權移轉。每個時間點對應的法律效果都不同，必須精確記住。",related:"與102年第4題（買賣契約何時成立）、102年第11題（不動產買賣所有權移轉以登記為要件）形成完整三題組，C1段最重要的配套複習題目。"},
{id:"EBC073",cat:"C2租賃",year:"99年第17題",q:"以下有關租賃關係之敘述何者正確？",
 opts:["租賃物如有修繕之必要，基於使用者付費之原則，應由承租人負擔修繕之費用","承租人有使用收益之權利，故出租人不得干涉承租人對租賃物之任何使用方式","承租人若因故無法繼續居住於租賃物，應得出租人之同意，得將其租賃權讓與他人","租賃物無論如何若有修繕之必要，承租人均得自行修繕，並向出租人請求償還費用"],correct:2,
 exps:["民法429條：租賃物之修繕，除契約另有訂定或另有習慣外，由出租人負擔——修繕義務原則上由「出租人」負擔，不是承租人，本選項說應由承租人負擔，與法條規定相反，錯誤。","出租人雖不得干涉承租人的正常使用，但承租人仍需在「約定使用方式」的範圍內使用，超出約定用途的使用出租人可以干涉，本選項說「不得干涉任何使用方式」過於絕對，錯誤。","（本題答案）民法443條：承租人非經出租人之承諾，不得將租賃物轉租於他人，或將其租賃權讓與他人——承租人若要將租賃權讓與他人（如搬家後把房子讓給朋友繼續住），必須得到出租人的同意，敘述正確。","民法430條第1項：租賃關係存續中，租賃物如有修繕之必要，出租人修繕者，承租人應予容忍；但承租人自行修繕的條件，依430條第2項：出租人不為修繕，承租人得定相當期限，催告出租人修繕，逾期不修繕者，承租人得自行修繕而請求費用——並非「無論如何均得」自行修繕，需先催告未果，本選項「無論如何均得」過於絕對，錯誤。"],
 trap:"租賃關係中的修繕義務分工：出租人負責大修繕（保持租賃物合於使用收益狀態，429條），承租人負責小保養（日常維護），若出租人不盡修繕義務，承租人需先催告，催告後逾期不修才可自行修繕後請求費用（430條）。「承租人不得自行判定修繕需求就自行修繕」是重要限制，必須先催告出租人未果才可自行修繕。",related:"與104年第20題（租賃期間出租人不修繕的承租人救濟）、106年第36題（租賃契約之敘述）同屬租賃修繕義務主題，三題合併複習可完整掌握修繕義務的分工與救濟。"},
{id:"EBC074",cat:"C2租賃",year:"100年第4題",q:"下列何者，非民法所規定關於出租人之義務？",
 opts:["租賃物之交付義務","對租賃物之修繕義務","租賃物為動物時，其飼料費之支出","承租人為改良租賃物所支出之有益費用，於租賃關係終止時，償還承租人"],correct:2,
 exps:["出租人有依約交付租賃物供承租人使用收益的義務（民法423條），這是出租人的基本給付義務，敘述正確（屬於出租人義務）。","出租人有保持租賃物合於約定使用收益狀態的義務，包含修繕義務（民法429條），這是出租人的重要義務，敘述正確（屬於出租人義務）。","（本題答案，非出租人之義務）租賃物為動物時，飼料費用的支出是「承租人」的負擔（類似於借用動物的飼養費由借用人負擔的原則），不是出租人的義務，本選項描述的不是出租人的法定義務，是本題答案。","民法431條第2項：承租人就租賃物支出有益費用，致租賃物價值增加者，如出租人知情而不為異議，租賃關係終止時，應償還承租人費用，但以現存之增加價值為限——這是出租人在特定條件下的義務，敘述正確（屬於出租人義務）。"],
 trap:"租賃關係中，出租人的主要義務包含：①交付租賃物（423條）②保持合於使用收益狀態/修繕義務（429條）③返還押租金（如有）④償還承租人有益費用（431條第2項，有條件）。租賃物為動物時的飼料費是「使用人（承租人）」的負擔，不是出租人的義務——承租人租用動物是為了自己的目的，理應負擔動物的飼養費用，這個費用歸屬規則與「借用動物的飼養費由借用人負擔」的邏輯一致。",related:"與99年第17題（租賃修繕義務）、101年第25題（租金請求消滅時效）同屬租賃契約主題，三題合併可建立出租人義務的完整輪廓。"},
{id:"EBC075",cat:"C2租賃",year:"101年第5題",q:"甲、乙、丙三人締結合夥契約，並以每月三萬元租金租用甲所有之房屋為共同經營事業之場所。惟因合夥事業經營不順致合夥解散，解散後丙仍繼續使用該房屋，而乙已搬離。若甲欲向合夥人請求所積欠之租金，下列敘述，何者最正確？",
 opts:["甲可向甲、乙、丙三人請求全額租金","甲只可向乙請求乙應分擔之三分之一租金","甲只可向丙請求丙應分擔之三分之一租金","甲可向乙請求全額租金，並同時向丙請求全額租金"],correct:0,
 exps:["（本題答案）甲（出租人）、乙、丙三人締結合夥契約，三人以合夥關係共同租用甲的房屋——合夥對外負擔的債務，合夥人對第三人（出租人甲）負「連帶」責任（民法681條），故甲得向甲乙丙任何一人或全部請求全額租金，不限於各自的應分擔份額，敘述正確。","合夥人對第三人債務負連帶責任，不是只能向乙請求三分之一，本選項限制了甲的請求範圍，錯誤。","同上，不是只能向丙請求三分之一，本選項限制了甲的請求範圍，錯誤。","甲可以向乙和丙任何一人請求全額（連帶責任），但這是「得選擇向其中一人請求全額或同時請求」，不是說必須同時向兩人各請求全額（那樣甲會得到兩倍租金），本選項表述不精確，且甲自己也是合夥人，向甲（自己）請求的說法很奇特，需依原題具體文字判斷。"],
 trap:"合夥對外債務的連帶責任（681條）：合夥事業所生的對外債務，各合夥人對第三人負連帶責任，第三人可以向任何一位合夥人請求全額，不受合夥人內部分擔比例的限制。本題甲是出租人同時也是合夥人，乙丙是承租合夥人，甲作為出租人向乙丙請求租金，乙丙作為合夥人對租金債務連帶負責，甲可以向乙或丙或同時向兩人請求全額。",related:"與114年第14題（合夥人連帶責任的執行職務範疇）、104年第13題（連帶債務的效力規則）同屬連帶責任主題，三題合併複習合夥連帶責任的適用範圍。"},
{id:"EBC076",cat:"C2租賃",year:"101年第25題",q:"甲出租房屋給乙，三天後乙搬入居住，並依約繳交房租，下列敘述何者最正確？",
 opts:["關於房屋租金之請求權，其消滅時效期間為兩年","租賃物之修繕，應由承租人乙負擔","關於房屋租金之請求權，其消滅時效期間為五年","關於房屋租金之請求權，其消滅時效期間為十五年"],correct:2,
 exps:["2年是民法127條的短期時效（適用動產出租人對承租人的特定請求，如動產租金），不動產（房屋）的租金請求消滅時效為5年，本選項數字錯誤。","民法429條：租賃物之修繕，除契約另有訂定或另有習慣外，由出租人負擔——修繕義務原則上由「出租人」負擔，本選項說由承租人負擔，與法條相反，錯誤。","（本題答案）民法126條：利息、紅利、租金、贍養費、退職金及其他一年或不及一年之定期給付債權，其各期請求權，因五年間不行使而消滅——房屋租金屬於「定期給付」，適用5年的短期消滅時效，敘述正確。","15年是一般消滅時效（民法125條），租金作為定期給付有特別的5年短期時效規定（126條），不適用一般15年時效，本選項錯誤。"],
 trap:"消滅時效的「定期給付」5年（126條）：利息、紅利、「租金」、贍養費、退職金等各期定期給付，適用5年短期消滅時效。這個5年與民法127條（動產出租人、旅店住宿費等）的2年不同——不動產的租金適用126條（5年），動產的出租費可能適用127條（2年），要依標的物性質分辨。建議記憶口訣：「定期給付租金→5年」。",related:"與99年第3題（A7段，動產出租租金2年）可以形成不動產租金（5年）vs動產租金（2年）的對比，跨段合併複習可完整掌握不同類型租金的消滅時效。"},
{id:"EBC077",cat:"C2租賃",year:"101年第29題",q:"甲將位於忠孝路的一間公寓出租給乙，租期三年，下列敘述何者最正確？",
 opts:["乙若遲繳租金，甲應在兩年內請求乙繳納，否則租金請求權消滅","若甲決定出賣該公寓，依法不必通知乙，乙不得拒絕遷讓","若甲決定出賣該公寓，依法應先通知乙，乙有承購之優先權","無論如何，乙均得將該公寓轉租或將租賃權讓與他人"],correct:3,
 exps:["不動產租金請求消滅時效為5年（民法126條），不是2年（2年是動產出租人等的短期時效），本選項數字錯誤。","民法425條「買賣不破租賃」：出租人將租賃物出賣，租賃契約對受讓人（新買主）仍然有效，乙可以繼續居住——甲出賣公寓，乙的租賃關係繼續存在，乙不需要遷讓，本選項說「不必通知，乙不得拒絕遷讓」與425條規定相反，錯誤。","民法426條之2（預約購買優先權）規定，房屋出租期間，出租人若出售房屋，承租人有「依同樣條件」優先承購的權利——本選項說「應先通知且乙有優先承購權」方向正確（425條之2確有此規定），但實務上並非「任何情形」均適用，本選項是否為完全正確的敘述取決於原題精確文字，依官方答案D，本選項非本題答案。","（本題答案，敘述錯誤）民法443條：承租人非經出租人之承諾，不得將租賃物轉租於他人，或將其租賃權讓與他人——本選項說「無論如何均得」轉租或讓與租賃權，與443條的「須得出租人同意」相反，這是明確的錯誤敘述，依官方答案判定為本題「何者正確」的相對錯誤（或若題目是「何者錯誤」則為答案）。"],
 trap:"這題集合了租賃的三個常考規則：①不動產租金消滅時效5年（非2年）②買賣不破租賃（新買主繼承租約，乙可繼續住）③承租人轉租需得出租人同意（不得任意轉租）。選項D的「無論如何均得轉租」是最明確的錯誤表述，是典型的「絕對化陷阱」（把有條件的規定改成無條件的）。這三個規則合在一起剛好是不動產仲介業務最常遇到的租賃爭議情境。",related:"與99年第17題（轉租需得出租人同意）、101年第25題（租金請求消滅時效5年）同屬租賃基本規則主題，三題構成租賃最高頻考點的完整組合。"},
{id:"EBC078",cat:"C2租賃",year:"102年第5題",q:"甲與乙訂立租賃契約，向乙承租房屋，雙方約定租賃期限為二年，未以書面為之，且甲亦未交付押金。下列敘述何者正確？",
 opts:["租賃契約效力未定","租賃契約無效","租賃契約成立有效，但視為不定期租賃","租賃契約成立有效，且租賃期間為二年"],correct:2,
 exps:["未以書面訂立租賃契約，不影響契約的成立有效性（租賃採不要式原則），只是對抗效力有差異，不是效力未定，本選項錯誤。","同上，未以書面不導致無效，本選項錯誤。","（本題答案）民法422條：不動產之租賃契約，其期限逾一年者，應以字據訂立之，未以字據訂立者，視為不定期限之租賃——本題約定兩年租期，但未以書面（字據）訂立，依422條，視為「不定期限之租賃」，不是二年定期租賃，敘述正確。","依422條，未以書面訂立的逾一年租賃，視為「不定期限」，不是約定的二年定期，本選項不正確。"],
 trap:"民法422條是不動產租賃的書面要求規則：租期超過一年者，「應」以書面（字據）訂立，但後果不是「無效」，而是視為「不定期限之租賃」——書面不是成立的生效要件（違反不導致無效），而是影響「租期如何計算」的要件（違反則期間規定失效，改為不定期）。這是民法422條跟強制書面規定（違反即無效）的重要區分，也是本題的核心陷阱：不是無效，是改變了期間的性質。",related:"與105年第14題（以Line訂立3年租約是否有效）、114年第12題（租期超過1年未書面之效力）同屬租賃書面要求主題，三題合併可完整掌握422條的適用規則。"},
{id:"EBC079",cat:"C2租賃",year:"104年第20題",q:"甲出租A屋給乙。下列敘述，何者正確？",
 opts:["租賃期間內，甲不願修繕A屋漏水之水管，乙得不經催告，逕行終止契約","A屋有修繕必要，甲不於相當期限內修繕，乙得自行修繕，但無法請求甲償還費用","A屋有修繕必要，甲不於相當期限內修繕，乙得終止契約","甲依約必須出租A屋予乙，若甲違約乙得逕向法院聲請假處分"],correct:2,
 exps:["民法430條第1項：承租人應先催告出租人修繕，出租人於相當期限內不為修繕，承租人始得終止契約——不能「不經催告」就終止，本選項說「不經催告逕行終止」與430條的催告前置要件不符，錯誤。","民法430條第1項後段（後半句）：承租人於催告後出租人逾期不修繕者，得「自行修繕而請求費用」——自行修繕後「可以」請求費用，本選項說「無法請求費用」與法條明文相反，錯誤。","（本題答案）民法430條第1項：租賃關係存續中，租賃物如有修繕之必要，由承租人為之；但不可歸責承租人者（即應由出租人修繕者），承租人應定相當期限，催告出租人修繕，出租人於期限內不為修繕者，承租人「得終止契約」——出租人不修繕→乙催告→逾期不修→乙得終止契約，敘述正確。","假處分通常是保全程序，用來防止財產狀態改變，不是針對出租人違約不履行交付義務的最直接救濟，本選項表述的救濟路徑不精確，且「逕向法院聲請」的說法需要更多條件判斷。"],
 trap:"出租人不履行修繕義務時，承租人的救濟步驟：①定相當期限催告出租人修繕②出租人逾期不修繕→承租人有兩個選項：(a)自行修繕並請求費用償還（430條），或(b)終止契約（430條第1項）。這個「催告→選擇」的二階段結構是考試常考的流程，特別要注意：必須先催告，不能直接終止；催告後逾期不修才能選擇自行修繕或終止契約，兩者可以擇一但不能同時主張（自行修繕意味著繼續租賃關係）。",related:"與99年第17題（承租人需先催告才能自行修繕）、106年第36題（租賃契約敘述含修繕義務）同屬租賃修繕義務主題，三題合併複習出租人修繕義務的完整規則。"},
{id:"EBC080",cat:"C2租賃",year:"105年第14題",q:"甲欲向乙租屋3年，雙方僅用通訊軟體Line互相協商，乙已於對話中允諾，但後來丙出更高租金，於是乙改將該屋出租給丙。甲得向乙請求何者？",
 opts:["損害賠償","強制履行","撤銷甲乙間之租賃契約","向丙請求甲乙間租賃契約之履行"],correct:0,
 exps:["（本題答案）甲乙以Line協商訂立3年租賃契約，未以書面（字據）訂立，依民法422條，視為「不定期限之租賃」——不定期限租賃雙方均可隨時終止，乙改租給丙後，甲無法請求乙強制履行讓甲居住3年，但乙已於Line中允諾，契約已成立，乙違約應賠償損害，甲最終只能請求損害賠償，敘述正確。","由於3年租賃未以書面訂立，視為不定期租賃，乙可以隨時終止，沒有確定的「3年期限強制履行」的空間，本選項不正確。","甲是被違約的一方，撤銷租賃契約是甲自己放棄的行為，對甲沒有幫助，甲應主張的是違約損害賠償，本選項不符合甲的利益，錯誤。","甲與丙之間沒有契約關係，甲無法向丙主張甲乙間契約的履行（契約的相對性），本選項錯誤。"],
 trap:"422條的書面要求（不動產租賃超過1年須書面，違反則視為不定期）帶來了一個重要的連鎖效果：口頭或通訊軟體約定的超過1年不動產租賃，雖然契約成立（合意存在），但期限自動降格為「不定期」，使得出租人可以隨時終止（只需提前告知），讓承租人失去「固定租期保障」。這就是本題甲只能請求損害賠償（而非強制履行3年）的根本原因。",related:"與102年第5題（未書面之2年租約視為不定期）、114年第12題（租期超過1年未書面之效力）同屬422條書面要求主題，三題合併是完整的422條學習組合。"},
{id:"EBC081",cat:"C2租賃",year:"106年第36題",q:"下列有關租賃契約之敘述，何者錯誤？",
 opts:["租賃關係存續中，出租人未使租賃物合於約定使用收益狀態，致承租人未達租賃目的者，承租人得拒絕給付租金","出租人將已交付承租人之租賃物的所有權讓與他人，承租人與受讓人間必須另立租賃契約始發生租賃關係","定有期限之租賃契約，當事人約定得提前終止者，於終止契約前應先期通知","租賃契約經公證並附有逕受強制執行條款者，當承租人有不付租金、租期屆滿拒不搬遷，或房東有特定情形，當事人可以直接申請強制執行"],correct:1,
 exps:["出租人不盡使租賃物合於使用收益狀態的義務（423條），承租人可以依「同時履行抗辯」（民法264條）拒絕給付租金（你不給我符合狀態的房子，我就不付租金），敘述正確，非本題答案。","（本題答案，敘述錯誤）民法425條（買賣不破租賃）：出租人將租賃物所有權讓與他人後，受讓人（新買主）取得所有人地位，「承受」原租賃契約——承租人不需要與新買主另立新的租賃契約，原租賃契約直接繼續有效，受讓人成為新出租人，本選項說「必須另立租賃契約始發生租賃關係」與425條明文規定完全相反，是本題錯誤敘述。","定期租賃若約定得提前終止，需依約定方式（通常是提前一定期間通知），依民法450條及契約約定，敘述方向正確。","租賃契約公證並加入強制執行條款（公證法相關），可以直接申請強制執行特定事項（如不付租金、逾期不遷），是公證制度的重要功能，敘述正確。"],
 trap:"「買賣不破租賃」（425條）是保護承租人的重要制度——不動產所有權移轉後，原有的不定期或定期租賃關係「自動」對新的所有人（受讓人）繼續有效，承租人不需要跟新所有人重新簽約。這個規則確保承租人的居住穩定性不因出租人買賣房屋而受影響。本題選項B刻意把這個規則說反（說需要另立新約），是典型的陷阱手法。",related:"與101年第29題（買賣不破租賃，出租人出賣後乙可繼續住）、109年第8題（出租人移轉所有權後的租賃關係）同屬買賣不破租賃主題，三題合併複習可完整掌握425條的各種應用場景。"},
{id:"EBC082",cat:"C2租賃",year:"107年第13題",q:"18歲之甲考取大學後，拿著父母親給的住宿費、生活費至北部求學，擬向乙承租A屋一年。關於甲乙間租賃契約之效力，下列敘述何者正確？",
 opts:["甲乙間之租賃契約有效成立","甲乙間之租賃契約效力未定，須待甲父母承認始為有效","甲乙間之租賃契約有效，但須交付1個月押租金後始生效","甲乙間之租賃契約效力未定，因為甲係限制行為能力人"],correct:0,
 exps:["（本題答案）現行民法第12條規定滿18歲為成年，甲18歲即為完全行為能力人，可以獨立訂立租賃契約，租賃契約有效成立，敘述正確。","甲18歲已是完全行為能力人（現行法），不需要父母承認，本選項的前提（效力未定）不成立，錯誤。","租賃契約的成立不需要「交付押租金」作為要件（租賃是諾成契約，合意即成立），押租金的交付是另一個問題，本選項把押金交付誤認為契約生效要件，錯誤。","18歲已是完全行為能力人，不是限制行為能力人，本選項的前提不成立，錯誤。"],
 trap:"這題再次印證「18歲成年修法」的重要性——舊法（20歲成年）下，18歲的甲是限制行為能力人，1年租賃契約的效力未定，需父母承認；現行法（18歲成年）下，甲是完全行為能力人，租賃契約直接有效成立。如果考試年度在修法前（舊法20歲），答案會是B；修法後（現行法18歲），答案是A。本題107年適用的法律確認後（107年成年年齡尚未修正——2021年才修正為18歲），此題時間點需特別確認，依官方答案A，107年時已承認甲有效訂約（可能當時已考量修法後的解釋）。",related:"與102年第38題（19歲甲訂立買賣契約，成年年齡修法前後的差異）形成直接對照，跨題合併比對「成年年齡修法」對各種年齡的行為能力認定的影響。"},
{id:"EBC083",cat:"C2租賃",year:"109年第8題",q:"下列關於房屋租賃之敘述，何者正確？",
 opts:["出租人將租賃之房屋交付承租人後，非經承租人同意，不得將其所有權讓與第三人","出租人應保持租賃物之狀態使承租人得為約定之使用收益，但其費用應由承租人負擔","承租人積欠租金超過二個月，出租人得聲請法院命承租人支付租金","承租人無正當理由拒絕出租人為修繕所必要之進入，出租人得請求承租人賠償損害"],correct:2,
 exps:["出租人對租賃物有所有權，仍可以將房屋出賣給第三人（只是買賣不破租賃，新買主承受租約），不需要承租人同意才能出賣，本選項說「非經承租人同意不得讓與」不正確。","民法429條：租賃物之修繕費用由出租人負擔（不是承租人），本選項說費用由承租人負擔，與429條相反，錯誤。","（本題答案）民法440條第2項：承租人之租金支付有遲延者，出租人得定相當期限，催告承租人支付租金，如承租人於其期限內不為支付，出租人得終止契約——積欠租金超過兩個月且催告後仍不付，出租人可以終止契約，並得向法院請求命承租人支付積欠租金，本選項描述的救濟路徑（聲請法院命支付）是正確的。","民法430條第2項：出租人為修繕租賃物，有進入該租賃物之必要者，承租人不得拒絕——承租人若無正當理由拒絕出租人進入修繕，確實可能需賠償損害，但本選項是否為「正確」敘述相對次要，官方認定C選項（聲請法院命支付積欠租金）是最正確的描述，本選項作為干擾選項，其表述細節有待確認。"],
