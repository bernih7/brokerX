 trap:"這題的核心考點是積欠租金的救濟路徑——承租人積欠租金達一定程度（超過兩個月，440條），出租人可以：①定期催告→逾期不付→終止契約；②向法院請求命承租人支付積欠租金。兩者可以並行，不是只能終止不能請求金錢，或只能請求金錢不能終止。選項C描述的「聲請法院命支付租金」是合法且正確的救濟方式。",related:"與104年第20題（出租人不修繕的承租人救濟）、99年第17題（修繕義務分工）同屬修繕義務主題，三題的方向互補：一題考出租人不修繕的承租人救濟，一題考承租人阻礙修繕的出租人救濟，合併可建立完整的修繕義務雙向規則。"},
{id:"EBC084",cat:"C2租賃",year:"112年第8題",q:"下列何種契約性質上屬於要物契約？",
 opts:["消費借貸契約","房屋租賃契約","贈與契約","合會契約"],correct:0,
 exps:["（本題答案）消費借貸（借錢）是「要物契約」——依民法474條第1項，消費借貸以貸與人「交付」借貸物（金錢）給借用人為契約成立要件，未交付則契約尚未成立，借用人不能請求強制交付，敘述正確（是要物契約）。","房屋租賃契約是「諾成契約」——出租人與承租人就標的物及租金達成合意，契約即告成立，不需要實際交付房屋，本選項說房屋租賃是要物契約，錯誤。","贈與契約是「諾成契約」——依通說，贈與人與受贈人就贈與意思達成合意即成立（物的交付是履行行為，不是成立要件），本選項說贈與是要物契約，錯誤。","合會契約是「諾成契約」——依民法709條之2，合會以書面訂立即成立，本選項說合會是要物契約，錯誤。"],
 trap:"「要物契約」（需要交付才成立）與「諾成契約」（合意即成立）的識別是民法的基礎概念，常考的要物契約有：消費借貸（474條）、使用借貸（464條）、質權設定（需交付質物，民法885條）。租賃、買賣、贈與、委任等大多數契約都是諾成契約。記憶口訣：「借的要物，租賣贈委諾成」——借（消費借貸、使用借貸）需要交付才成立；租、賣、贈與、委任是諾成的（合意即成立）。",related:"與101年第37題（使用借貸是要物契約）、114年第11題（買賣是諾成契約不需交付）同屬要物/諾成契約辨別主題，三題合併完整建立這個概念的判斷架構。"},
{id:"EBC085",cat:"C2租賃",year:"112年第9題",q:"依民法之規定，有關租賃契約之效力，下列何者錯誤？",
 opts:["租賃物有修繕之必要時，原則上承租人可直接自行修繕後再請求出租人給付修繕費用","承租人應依約定方法，為租賃物之使用收益","承租人如以強暴脅迫他人妨礙其占有，被妨礙之人得請求法院除去其妨礙","租賃物因不可歸責於承租人之事由，致一部滅失者，承租人得按滅失之部分，請求減少租金"],correct:0,
 exps:["（本題答案，敘述錯誤）民法430條第1項：租賃物如有修繕之必要，承租人應定相當期限，催告出租人修繕；出租人於期限內不為修繕者，承租人「得自行修繕，並請求費用」——原則上須先催告出租人修繕，逾期不修才得自行修繕請求費用，本選項說「原則上可直接自行修繕」，省略了「先催告出租人」這個必要前置步驟，與430條規定不符，是本題錯誤敘述。","民法438條：承租人應依約定方法，為租賃物之使用收益，敘述正確，非本題答案。","占有被侵奪或妨礙，依民法962條可以請求除去妨礙，敘述正確，非本題答案。","民法435條：租賃物因不可歸責承租人之事由致一部滅失，承租人得按滅失部分請求減少租金，敘述正確，非本題答案。"],
 trap:"這題是104年第20題、99年第17題同一考點（承租人不能直接自行修繕，須先催告）的再次出現。三題考同一個核心規則：「催告→逾期不修→才能自行修繕/終止」的兩步驟，其中「省略催告步驟、直接自行修繕」是最常被誤認的錯誤說法。16年間反覆出現這個考點，是租賃段的最高頻陷阱，務必牢記「催告前置」原則。",related:"與104年第20題（出租人不修繕的承租人救濟步驟）、99年第17題（承租人何時可自行修繕）是同一考點的三度重複命題，務必三題合併複習，確認自己真正記住「先催告才能自行修繕」。"},
{id:"EBC086",cat:"C2租賃",year:"112年第15題",q:"甲於民國107年9月間向乙租車公司租用自小客車環島，然卻積欠乙租金新臺幣3萬元，乙於108年9月提起訴訟向甲請求租金，甲抗辯租金請求權已罹於消滅時效。試問乙之請求是否有理由？",
 opts:["有理由，因為租金請求消滅時效為15年","有理由，因為甲積欠租金且構成侵權行為，消滅時效為2年，但本件尚未罹於時效","有理由，因為乙之租金請求於民國108年9月尚未罹於消滅時效","無理由，因為動產租金請求消滅時效為2年，本件已罹於時效"],correct:3,
 exps:["動產（汽車）租金請求消滅時效依民法127條第7款為2年（不是15年），本選項數字錯誤。","侵權行為的消滅時效為2年（民法197條），但積欠租金是契約債務，應適用租金的特別時效（127條2年），不需要透過侵權行為計算，本選項說法不精確。","依民法127條第7款，動產出租人之租金請求消滅時效為2年——107年9月積欠租金，2年後（109年9月）才罹於時效，乙於108年9月提訴，尚未罹於時效，本選項結論（有理由）方向正確，但說法需對照時間計算確認，依官方答案D，本選項非最終答案。","（本題答案）動產（汽車）租金請求消滅時效為2年（民法127條第7款：動產出租人，就租賃物之損害賠償及因租賃關係所生之債務，因2年間不行使而消滅）——107年9月積欠租金，消滅時效2年，到109年9月才完成，乙108年9月提訴，尚在2年時效內，「應有理由」才對；但若本題考的是乙是否已超過時效，需確認起算時點，依官方答案D（無理由，已罹於時效），可能考的是不同的時間點計算或不同的時效規定。"],
 trap:"動產租金與不動產租金的消滅時效不同：動產出租人的租金請求，適用民法127條的2年短期時效；不動產租金適用民法126條的5年。本題汽車（動產）租金→2年時效，起算點從107年9月積欠時，到109年9月才罹於時效，乙於108年9月提訴在時效內，理論上應有理由。但依官方答案D（無理由，已罹於時效），可能是題目設定的起算時點不同，需以官方答案為準並確認原題具體情境。",related:"與101年第25題（不動產租金5年消滅時效）、99年第3題（動產2年時效）同屬租金消滅時效主題，三題合併可完整掌握不同類型租金時效的區分（動產2年vs不動產5年）。"},
{id:"EBC087",cat:"C2租賃",year:"113年第7題",q:"甲與乙訂立租賃契約，將丙所有之A屋出租於乙，並交付於乙。嗣後，丙對乙起訴，請求乙返還A屋，致乙不能為約定之使用，乙得向甲主張何種權利？",
 opts:["乙得向甲請求損害賠償，但乙仍須繼續給付租金","乙得向甲請求損害賠償，且乙得停止給付租金，但須於租賃關係終止後恢復給付","乙得向甲請求減少或免除租金，並得向甲請求損害賠償","乙得向甲請求終止租賃關係"],correct:2,
 exps:["乙因甲的權利瑕疵（甲無權出租丙的房屋）而無法使用A屋，可以請求甲賠償，且因不能使用租賃物，乙不應再繼續支付租金（無對待給付），本選項說乙仍須繼續給付租金，不符合公平原則及法條，錯誤。","乙不能使用租賃物，可以請求減免租金，且本題的問題根本原因是甲無權利出租他人之物，乙可能需要採取更根本的救濟（如解除契約），單純「停止給付租金後恢復給付」不夠精確，本選項描述不完整。","（本題答案）甲將丙所有的房屋出租給乙，甲是無權出租（欠缺出租所需的所有權或授權），丙依法可以向乙請求返還，致乙不能使用——依民法349-351條（權利瑕疵擔保）及民法441條：租賃物一部滅失或不能使用時，承租人得按不能使用之部分，請求減少租金，且可向甲主張損害賠償（因甲的權利瑕疵造成乙的損害），敘述正確。","終止租賃關係是乙的一個選項，但本題問「得向甲主張何種權利」，減少/免除租金並請求損害賠償是更直接回應題目的答案，且終止只是保護乙的方式之一，不是唯一可主張的權利，本選項不夠完整。"],
 trap:"「權利瑕疵擔保」（出租人出租無權出租的物，如出租他人之物）：出租人應保證租賃物可以讓承租人合法使用，若因出租人的權利瑕疵導致承租人無法使用，承租人可以：①請求減少或免除租金（441條）②請求損害賠償（351條準用349條）③在情況嚴重時終止契約。這個情境（出租他人之物、第三人起訴要求承租人返還）在不動產業務中是很現實的風險情境，也是考試喜歡的題型。",related:"與113年第8題（承租人私自轉租的效力）同屬租賃關係的特殊問題，兩題合併可了解租賃關係中各種違約/瑕疵情形的法律效果。"},
{id:"EBC088",cat:"C2租賃",year:"113年第8題",q:"甲將其所有之A屋出租於乙，乙未經甲之同意，將A屋全部轉租於丙。下列敘述，何者正確？",
 opts:["乙與丙訂立之租賃契約無效","乙與甲訂立之租賃契約效力未定","甲得依法逕行向丙請求返還A屋","甲得依法終止甲乙間之租賃契約"],correct:3,
 exps:["乙與丙之間的轉租契約（債權行為），乙作為契約當事人（承租人），可以對外承諾出租，這個承諾不因乙無權轉租而當然無效，只是乙對丙的轉租是未經甲同意的轉租（違約）——乙丙之間的轉租契約本身有效（乙能對丙為承諾），但乙違約（未得甲同意轉租），本選項說「乙丙租賃契約無效」不正確。","甲乙間的原始租賃契約不受乙未得同意轉租影響（乙違約不影響甲乙間原契約的效力），本選項說甲乙租賃效力未定，不正確。","甲有A屋所有權，若丙無合法占有權源（乙的轉租未得甲同意），甲可能得依所有物返還請求向丙請求（807條），但這需要先終止甲乙間租賃（使乙的占有權源消失）後才有意義，本選項說「逕行」向丙請求的表述不夠精確，且程序上需先終止甲乙間契約。","（本題答案）民法444條：承租人違反443條（未得同意擅自轉租），出租人「得終止契約」——乙未得甲同意擅自將A屋轉租給丙，構成違約，甲得依444條終止甲乙間之租賃契約，敘述正確。"],
 trap:"未得同意轉租的後果（443-444條）：①乙丙之間的轉租契約本身是否有效（債權行為層面）→有效（乙可以對外承諾，只是違反對甲的義務）；②甲的救濟→甲得「終止」甲乙間的租賃契約（不是無效、不是撤銷，是「終止」）；③甲終止後，乙對丙的轉租也因此失去了基礎（乙的占有權源消失），丙可能被甲要求返還。這個「違約轉租→出租人得終止」的規則是443、444條配套的重要考點。",related:"與99年第17題（轉租需得出租人同意）、101年第29題（轉租讓與的規則）同屬轉租主題，三題合併複習可完整掌握轉租規則及違反轉租禁止的法律效果。"},
{id:"EBC089",cat:"C2租賃",year:"114年第12題",q:"甲將房屋租給乙。下列何者正確？",
 opts:["租期若超過1年，且未寫書面契約，則租賃契約無效","若未特別約定，則乙有權將其中的房間分租給丙","若甲將房屋出賣給丁，甲乙間的租賃契約自動終止","依民法規定，甲不得要求乙就出租的房屋繳交押租金"],correct:1,
 exps:["民法422條：超過1年的不動產租賃未以書面訂立，視為「不定期租賃」，不是無效——書面要求的違反效果是「期間降格為不定期」，不是整個契約無效，本選項說「無效」錯誤。","（本題答案）民法443條：承租人非經出租人之承諾，不得將租賃物轉租於他人——本條的核心是「全部轉租」或「將租賃權讓與他人」需得同意；但就「部分使用」（如分租其中一個房間），通說與實務見解認為分租部分房間不等於「轉租」（因為乙仍繼續居住在同一住所，只是讓他人使用部分空間），在未特別禁止的情況下，承租人得將部分空間分租，敘述正確。","民法425條（買賣不破租賃）：出租人將租賃物出賣後，租賃契約對受讓人（丁）繼續有效，不是「自動終止」，本選項與425條規定相反，錯誤。","民法446條：出租人得向承租人收取擔保租賃契約履行之押租金，並無禁止押租金的規定，本選項說「不得要求繳交押租金」不正確。"],
 trap:"「分租部分房間」與「轉租全部」的區分：民法443條禁止的是未得出租人同意的「轉租」（將整個租賃關係移轉給他人），但承租人在繼續居住的前提下分租部分空間（一房多人使用的情形），通說認為不屬於443條的「轉租」，不需要特別約定即可，除非租約中有明文禁止。這個細節區分是考試的進階考點，也是實際業務中常遇到的爭議。",related:"與102年第5題（租期超過1年未書面視為不定期，非無效）、113年第8題（違反轉租禁止的效果）同屬租賃特別規定主題，三題合併複習可完整掌握422條和443條的精確適用範圍。"},
{id:"EBC090",cat:"C3居間承攬委任",year:"99年第12題",q:"甲為房屋仲介公司之員工，經甲之斡旋乙同意將其所有房屋出售於丙，乙丙雙方皆委任甲處理登記及付款事宜並授與代理權，事成之後，甲得向何人請求報酬？",
 opts:["甲得向乙請求報酬","甲得向乙丙雙方請求報酬","甲只得向丙請求報酬","甲無法請求報酬，因為甲是仲介公司員工"],correct:1,
 exps:["甲受乙方委任處理出售事宜，可向乙請求報酬；甲同時受丙方委任處理買入事宜，也可向丙請求報酬，不是只能向乙請求，本選項不完整。","（本題答案）民法567條第2項：居間人為雙方當事人媒介而受有報酬時，其報酬由雙方平均負擔——本題甲受乙丙雙方委任並授與代理權，既為乙方服務也為丙方服務，甲得向乙丙雙方分別請求報酬（或依約定方式），不限於只向一方請求，敘述正確。","同上，甲也受乙的委任，不是只能向丙請求，本選項錯誤。","甲是仲介公司員工，其服務產生的報酬應歸屬仲介公司，但就個人委任關係而言（本題乙丙直接委任甲並授與代理權），甲本身具有請求報酬的基礎，本選項說「無法請求」過於簡化，不正確。"],
 trap:"居間人（仲介）的報酬請求對象：若是「單方委任居間」（只有買方或只有賣方委託），只能向委任方請求；若是「雙方委任居間」（買賣雙方都委任同一仲介），則可向雙方請求（567條第2項報酬由雙方分擔）。不動產仲介業務中，「雙方委任同一仲介」是常見但有利益衝突風險的情形，也是本題考的核心情境。",related:"與103年第17題（居間人報酬請求條件）、108年第11題（居間契約之敘述）同屬居間契約主題，三題合併可完整掌握居間人的報酬制度。"},
{id:"EBC091",cat:"C3居間承攬委任",year:"100年第3題",q:"下列何種契約之屬性為無償契約？",
 opts:["使用借貸","僱傭契約","承攬契約","居間契約"],correct:0,
 exps:["（本題答案）使用借貸（民法464條）：借用人無償使用借用物後返還——「無償」是使用借貸的本質特徵，若有償則為租賃，使用借貸是典型的無償契約，敘述正確。","僱傭契約（民法482條）：雇主給付報酬，受僱人提供勞務——有對價（報酬），是有償契約，本選項錯誤。","承攬契約（民法490條）：承攬人完成工作，定作人給付報酬——有對價（報酬），是有償契約，本選項錯誤。","居間契約（民法565條）：居間人報告訂約機會或媒介，委託人給付報酬——有對價（報酬），是有償契約，本選項錯誤。"],
 trap:"「無償契約」的識別：使用借貸（無償，若有償則變性為租賃）、贈與（無償）是最典型的無償契約；一般商業性契約（僱傭、承攬、居間、委任有償版本）都是有償契約。容易混淆的是「委任契約」——委任可以是有償也可以是無償（民法535條，依約定），但一般商業性委任通常有償。考試常把使用借貸的無償特徵與租賃（有償）並列出題，要記住「使用借貸=無償，有償就變成租賃」的轉換規則。",related:"與111年第4題（使用借貸的無償性，買賣不破使用借貸不適用）同屬使用借貸主題，兩題合併可完整掌握使用借貸的基本特徵（無償、要物、返還原物）。"},
{id:"EBC092",cat:"C3居間承攬委任",year:"101年第11題",q:"甲、乙間約定由甲幫乙為訂約之媒介，並由乙給付報酬予甲。甲、乙所定契約之名稱為下列何者？",
 opts:["承攬契約","代辦契約","僱傭契約","居間契約"],correct:3,
 exps:["承攬契約（490條）：承攬人「完成一定工作」，定作人給付報酬——重點是「完成工作」（完成特定成果），不是「媒介訂約」，本選項不符。","代辦商（民法553條）是「以自己名義」為他人的商業行為，與本題「媒介訂約」（居間不以自己名義訂約）的情形不同，本選項不符。","僱傭契約（482條）：受僱人「服從指揮監督提供勞務」，不是特定的媒介活動，本選項不符。","（本題答案）民法565條：稱居間者，謂當事人約定，一方為他方「報告訂約之機會或為訂約之媒介」，他方給付報酬之契約——本題甲幫乙媒介訂約（如不動產仲介），乙給付報酬，完全符合居間契約的定義，敘述正確。"],
 trap:"四種服務型契約的核心區分：①居間（媒介訂約，不以自己名義訂約）②代辦（以自己名義為他人商業行為）③僱傭（服從監督提供勞務）④委任（處理事務）。不動產仲介業務中，仲介公司的媒介行為是「居間」，而受委任辦理過戶登記則可能是「委任」，兩種不同業務適用不同的法律規則，是考試常考的概念辨別題型。",related:"與99年第12題（居間人雙方委任的報酬）、103年第17題（居間人報酬條件）同屬居間契約主題，建議三題合併複習居間契約的完整規則。"},
{id:"EBC093",cat:"C3居間承攬委任",year:"102年第15題",q:"甲承攬乙建設公司之營造工程，在執行承攬事項時，因過失致路人丙受到傷害。下列敘述何者正確？",
 opts:["乙建設公司如非於定作或指示有過失，不需負損害賠償責任","乙建設公司依民法規定，必然需負損害賠償責任","乙建設公司不需負損害賠償責任，因甲係獨立承攬，非乙之受僱人","丙僅得向甲請求損害賠償，因為甲才是侵權行為人"],correct:0,
 exps:["（本題答案）民法189條：承攬人因執行承攬事項，不法侵害他人之權利者，定作人不負損害賠償責任。但定作人於定作或指示有過失者，不在此限——定作人（乙建設公司）原則上不為承攬人（甲）的侵權行為負責（因為承攬人獨立執行工作，不是定作人的使用人），除非定作人在「定作」（規格設計）或「指示」（施工指示）方面有過失，本選項正確描述了189條的原則與例外。","定作人不是必然需要負責，依189條，定作或指示無過失時可以免責，本選項說「必然需負賠償責任」過於絕對，錯誤。","承攬人不是定作人的受僱人（這是承攬與僱傭的重要區別），所以民法188條（僱用人連帶責任）不適用於承攬，本選項說法方向正確（乙不需負責的理由），但並非完整說明，且依官方答案A，選項C並非最精確的答案。","丙也可以向乙請求（若乙在定作或指示方面有過失），不是「僅得向甲請求」，本選項過於限縮丙的救濟選項，錯誤。"],
 trap:"承攬（189條）vs僱傭（188條）的定作人/僱用人責任規則是本題的核心對比：承攬——定作人「原則免責」（因為承攬人獨立執行工作，定作人沒有指揮監督的角色），除非定作或指示有過失才需負責；僱傭——僱用人「原則連帶負責」（因為受僱人在指揮監督下工作），除非舉證監督充分才能免責。這個「承攬定作人原則免責，僱傭僱用人原則連帶負責」的對比是考試最重要的服務型契約責任比較。",related:"與99年第14題（受僱人執行職務侵害他人，僱用人連帶責任，188條）形成「承攬189條vs僱傭188條」的直接對比，兩題必須合併比對，建立「不同服務型契約的第三人責任」完整架構。"},
{id:"EBC094",cat:"C3居間承攬委任",year:"103年第17題",q:"關於居間人之報酬及支出費用，下列敘述何者正確？",
 opts:["契約附有解除條件者，於該條件成就前，居間人不得請求報酬","居間人因媒介而受報酬者，居間人不得再請求償還費用","居間人雖已完成媒介任務，但若當事人間並未因此訂立契約，居間人不得請求報酬","居間人因媒介所生費用，不問契約是否成立，均得請求償還"],correct:1,
 exps:["契約附有解除條件（成就後契約消滅）的情形，居間人已完成媒介使契約成立，條件尚未成就前契約有效，居間人在契約成立時就可以請求報酬（不需要等條件確定不成就），本選項說「條件成就前不得請求」不正確。","（本題答案）民法571條但書：居間人受有報酬者，其費用以無特別習慣或約定為限，不得請求償還——受有報酬的居間人，原則上不能再另外請求費用，報酬已含括費用的概念，本選項敘述正確。","民法575條第1項：稱居間者，謂當事人約定，一方為他方報告訂約機會或為訂約媒介，他方給付報酬之契約——居間人的報酬請求以「契約成立」為前提（完成媒介使他方訂立契約），若媒介後當事人間未訂立契約，居間人原則上不得請求報酬，本選項說法方向正確（媒介後未訂約不得請求），但需注意571條的「費用」與報酬的區分，且本選項是正確敘述，非本題答案。","民法571條本文：居間人就其媒介所生之費用，如非有特別習慣或約定，不得請求償還——費用原則上「不得請求」，不是「不問是否成立均得請求」，本選項說「均得請求」與571條規定相反，錯誤。"],
 trap:"居間人報酬與費用的請求規則（571條）：①報酬：契約成立時得請求②費用：原則上不得請求（除非有特別習慣或約定），且若已受有報酬，則更不得再另外請求費用——費用視為已含在報酬中。這個「受有報酬者不得再請求費用」的規則是本題的核心考點，與106年第1題（居間人費用求償需特別習慣或約定）的考點相互呼應，兩題合在一起是居間費用規則的完整學習組合。",related:"與106年第1題（居間人費用不得請求，除非有特別習慣或約定）、108年第11題（居間契約之敘述）同屬居間契約主題，三題合併複習居間人的報酬與費用規則。"},
{id:"EBC095",cat:"C3居間承攬委任",year:"103年第18題",q:"甲乙係多年好友，甲長年於國外經商，遂概括委任乙代為管理A屋，約定乙就A屋得為甲為一切行為。但民法規定，不動產之出租、出賣或設定負擔，應明示授與代理權，否則代理權之授與不及於此。試問：乙以甲之代理人名義，將A屋出租予丙，其效力如何？",
 opts:["無代理權之行為，效力未定，甲得承認之","有效，因甲已以概括委任授與乙就A屋為一切行為","無效，因乙以甲之名義將A屋出租，屬不法行為","得撤銷，因甲未明示授權乙出租A屋"],correct:0,
 exps:["（本題答案）民法108條第2項：代理人就不動產之出租、出賣或設定負擔，應有「明示」的特別授權，否則超出代理權限的範圍（即使有概括代理，也不含特別代理權）——本題甲的概括委任未明示授權乙出租不動產，乙出租A屋屬「超越代理權限」，即無代理權行為，效力未定（民法170條），須甲承認後始對甲生效，敘述正確。","概括代理（民法108條第1項）授與乙就A屋為「一切行為」，但不動產出租需「明示」授權（108條第2項例外要求），概括代理不能取代明示授權，本選項說「因概括委任已涵蓋」，忽略了108條第2項的特別規定，錯誤。","乙以甲之名義出租並非「不法」，只是超越代理權限（屬無權代理），效力未定，不是無效，本選項錯誤。","超越代理權限的行為效果是「效力未定」（170條），不是「得撤銷」，本選項用詞不正確。"],
 trap:"民法108條第2項的特別代理授權要求：不動產的出租、出賣或設定負擔，即使有概括代理，也需要「明示」授與代理權才可以進行——這個規定保護本人（甲）不因代理人不當處分不動產而受損。「概括代理≠包含不動產特別代理」是這題的核心陷阱，不能因為「概括代理授與乙一切行為」就認定乙有權出租甲的不動產，還需要額外的明示授權。",related:"與A6段的代理授權相關題目（99年第7題代理權授與性質、110年第5題表見代理）交叉呼應，本題特別強調不動產特別代理的明示要求，是代理制度在不動產業務中最重要的應用考點。"},
{id:"EBC096",cat:"C3居間承攬委任",year:"106年第10題",q:"依民法規定，關於受任人之權利及義務，下列敘述何者正確？",
 opts:["受任人受有報酬者，應以善良管理人之注意，處理委任事務","受任人未處理完委任事務前，不得向委任人請求報酬","受任人在處理委任事務時，凡有費用，委任人均應償還","委任人得隨時終止委任，但受任人不得隨時終止"],correct:0,
 exps:["（本題答案）民法535條：受任人處理委任事務，應與處理自己事務為同一之注意，其受有報酬者，應以善良管理人之注意為之——有償委任適用較高的「善良管理人注意標準」（客觀標準），無償委任適用較低的「自己事務注意標準」（主觀標準），敘述正確。","委任報酬的請求，民法547條：受任人應俟委任事務完畢，始得請求報酬，但依情形，委任事務分段完成者，可以就完成部分請求報酬——並不是「未完成前完全不得請求」，有例外情形，本選項表述過於絕對，錯誤。","民法545條：受任人因處理委任事務，支出之必要費用，委任人應償還之，並付自支出時起之利息——只有「必要費用」才可請求，不是「凡有費用均可請求」，本選項說「凡有費用」過於寬泛，錯誤。","民法549條：委任關係，當事人之任何一方，得隨時終止之——委任人和受任人「雙方」均得隨時終止委任（委任具有高度信任關係，法律允許任一方隨時終止），本選項說「受任人不得隨時終止」與549條規定相反，錯誤。"],
 trap:"委任的注意義務標準（535條）是本段最常考的委任考點：有償→善良管理人注意（較高、客觀）；無償→處理自己事務同一注意（較低、主觀）。另外委任的「雙方均可隨時終止」（549條）是很多人誤以為只有委任人才能終止的陷阱——受任人同樣可以隨時終止（但若因時機不當而致委任人損害，需賠償）。",related:"與101年第27題（受任人義務，善良管理人標準）、109年第11題（受任人報酬請求規則）同屬委任契約主題，三題合併複習可完整掌握委任的注意義務、報酬請求、費用求償的整體規則。"},
{id:"EBC097",cat:"C3居間承攬委任",year:"106年第12題",q:"甲有A地，登記為A地所有人。甲與乙成立承攬契約，由乙承攬A地之整地工作。乙不僅整地有瑕疵，而且還趁整地之餘，在A地種植樹木。下列敘述何者正確？",
 opts:["乙種植之樹木，乙得向甲請求給付種植費用","甲對乙有瑕疵修補請求權，但甲不得請求乙另行整地","甲對乙有瑕疵修補請求權，同時甲得請求減少報酬，但甲不能同時行使此二者","甲對乙有瑕疵修補請求權，但甲如不能修補，得請求損害賠償"],correct:3,
 exps:["乙在甲的A地上種植樹木（無授權），種植費用不能向甲請求（乙是在進行甲委任的整地工作時私自做了額外的事，沒有授權），且依民法816條（添附），甲取得樹木所有權但應依不當得利補償，但「乙請求種植費用」缺乏明確法律依據，本選項錯誤。","民法493條第1項：工作有瑕疵者，定作人得定相當期限，請求承攬人修補之——甲得請求乙瑕疵修補；民法494條：乙不修補或無法修補時，甲得解除契約或請求減少報酬——甲可以請求修補，也可以請求另行整地（修補包含重做），本選項說「不得請求另行整地」不正確。","民法493條（修補）與民法494條（解除或減少報酬）在適用上有先後關係（須先請求修補，修補不成才解除或減少報酬），但通說認為「修補請求」與「損害賠償」可以並存（如因瑕疵造成的額外損害），本選項說「不能同時行使」可能過於絕對，且修補與減少報酬確實不能同時行使（兩者是替代選項），本選項表述部分正確但不完整，不是最精確答案。","（本題答案）民法493-495條：工作有瑕疵→定作人得請求修補；若承攬人不修補或無法修補→得請求損害賠償。本選項「甲有瑕疵修補請求權，但若不能修補，得請求損害賠償」正確反映了這個遞進結構，敘述正確。"],
 trap:"承攬瑕疵的法定救濟順序（493-495條）：①首先請求瑕疵修補（493條）②若承攬人不修補或無法修補→解除契約或請求減少報酬（494條）③若承攬人有故意或過失→可同時請求損害賠償（495條）。這個「先修補→若不成再解除/減少報酬→可能加上損害賠償」的三階結構是承攬瑕疵擔保的完整框架，考試常考其中某個步驟或各步驟間的關係。",related:"與102年第15題（承攬人侵害第三人，定作人責任）、114年第9題（代理與委任的關係）同屬承攬/委任主題，三題合併可建立完整的服務型契約（承攬/委任）的核心規則圖。"},
{id:"EBC098",cat:"C3居間承攬委任",year:"108年第11題",q:"依我國民法之規定，下列關於居間契約之敘述何者錯誤？",
 opts:["稱居間者，謂當事人約定，一方為他方報告訂約之機會或為訂約之媒介，他方給付報酬之契約","居間人如就契約之履行有保證者，就保證部分得向委任人請求報酬","居間人不得同時受雙方之委託","居間人就媒介所生費用，原則上不得請求償還"],correct:1,
 exps:["民法565條的居間定義完全正確，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法568條第2項：居間人就契約之履行有保證者，就保證部分，得請求「特別報酬」——保證契約履行是居間人額外的特別服務（超出普通居間服務範圍），可以請求額外的特別報酬，但本選項說「就保證部分得向委任人請求報酬」表述混淆，且更重要的是居間人若保證契約履行，通常這屬於超出標準居間業務的特別約定，此種保證本身的法律效果與「居間」的定義有所衝突，568條第2項是針對這種特別情形的規定，本選項表述不夠精確或有誤，是本題錯誤敘述。","民法567條第1項：居間人不得同時受委託人雙方之委託為居間，但若雙方均同意或有習慣，則可以——原則不得同時受雙方委託（避免利益衝突），有例外，敘述方向正確，非本題答案。","民法571條：居間媒介所生費用，原則上不得請求償還，敘述正確，非本題答案。"],
 trap:"居間人的特別報酬（568條第2項）是指居間人「對契約履行提出保證」時（如保證賣方一定會交屋、買方一定會付款），居間人因為多承擔了一個「擔保履行」的風險，得請求額外的特別報酬。這個「特別報酬」不同於一般的居間報酬，是超出普通居間業務的額外收費基礎。考試常以「居間人可否請求保證報酬」為題，答案是可以，但需要有「就契約履行有保證」的特別約定。",related:"與99年第12題（居間雙方委任報酬）、103年第17題（居間費用不得請求）同屬居間契約主題，三題合併複習居間契約的完整報酬體系。"},
{id:"EBC099",cat:"C3居間承攬委任",year:"109年第11題",q:"關於委任契約受任人之報酬，下列敘述，何者錯誤？",
 opts:["委任關係因可歸責於受任人之事由，而於委任事務處理完畢前經終止者，受任人喪失其已完成部分報酬之請求權","受任人如就委任事務之一部已處理完畢，就該部分，受任人得請求報酬","委任關係因可歸責於委任人之事由，委任人依照法律提前終止委任，此時受任人得請求損害賠償","委任關係，雖因受任人死亡而消滅，但若委任事務是緊急且繼續不處理將發生不利益時，受任人之繼承人應為必要處置"],correct:0,
 exps:["（本題答案，敘述錯誤）民法548條第2項：委任關係，因非可歸責於受任人之事由而終止者，受任人就其已處理完畢之部分，得請求報酬——反之，若因「可歸責於受任人」之事由而提前終止，受任人仍可以就「已完成部分」請求相當的報酬（不是完全喪失，因為受任人已完成的部分付出仍應獲得補償），本選項說「喪失其已完成部分報酬之請求權」過於嚴苛，與通說及法條精神不符，是本題錯誤敘述。","民法547條：受任人就委任事務一部完成者，就已完成部分，在可分割的情況下，得請求報酬，敘述正確，非本題答案。","委任人若在不當時機（可歸責於委任人）終止委任造成受任人損失，受任人得請求損害賠償（民法549條第2項），敘述正確，非本題答案。","民法550條但書：委任關係雖因受任人死亡而消滅，但若繼續委任事務是緊急且不繼續將有不利益者，受任人之繼承人應為必要之處置，直到委任人能親自處理，敘述正確，非本題答案。"],
 trap:"委任提前終止時的報酬計算：①可歸責於委任人（如委任人無理由終止）→受任人可請求全部報酬或損害賠償；②可歸責於受任人（如受任人不當提前放棄）→受任人就已完成部分仍得請求相當報酬（比例計算），但不能請求未完成部分的報酬；③不可歸責雙方→受任人就已完成部分請求報酬。「可歸責受任人就喪失全部報酬」是一種過度嚴苛的說法，也是本題設計的陷阱。",related:"與106年第10題（受任人注意義務與報酬標準）、101年第27題（受任人義務注意標準）同屬委任契約主題，三題合併複習委任的注意義務、報酬請求完整規則。"},
{id:"EBC100",cat:"C3居間承攬委任",year:"114年第9題",q:"甲授與乙代理權，並委任乙與丙商談甲買受丙所有房屋及辦理移轉所有權之事宜。下列敘述何者錯誤？",
 opts:["本件代理權的授與和委任係分別獨立之法律行為","甲委任乙處理委任事務，乙應以善良管理人之注意義務處理","委任關係消滅時，代理權亦隨之消滅","代理權消滅時，委任關係亦隨之消滅"],correct:3,
 exps:["代理權授與（單獨行為）與委任契約（雙方行為）是各自獨立的法律行為，可以分別存在（有委任但無代理、有代理但無委任、兩者皆有），本選項正確，非本題答案。","甲委任乙有報酬（有償委任——辦理房屋交易），應以善良管理人注意義務處理事務（民法535條），本選項正確，非本題答案。","委任關係消滅時，依民法108條第1項（代理權因本人與代理人間之法律關係終止而消滅），委任終止通常導致代理權消滅（從契約消滅→代理權消滅），本選項方向正確，非本題答案。","（本題答案，敘述錯誤）代理權消滅「不必然」導致委任關係也消滅——代理權和委任是獨立的法律行為，代理權可以被撤銷（民法108條），但委任關係仍可繼續存在（只是受任人失去了代理本人的授權，但委任事務本身的義務仍在）；相反地，委任終止通常會導致代理消滅，但代理消滅不一定讓委任也消滅，本選項說「代理消滅→委任消滅」是錯誤的因果推論。"],
 trap:"「委任」與「代理權授與」雖然常常同時存在（委任某人代替自己做事，同時授與其代理本人的權限），但在法律性質上是獨立的：委任消滅通常使代理消滅（無委任關係，代理的基礎消失）；但代理消滅不必然使委任消滅（可以撤回代理權但維持委任關係，要求受任人以自己名義處理事務）。這個「委任→代理」的單向性（委任終止→代理消滅，但反過來不成立）是本題的核心陷阱。",related:"與103年第18題（概括委任與不動產特別代理的關係）、A6段99年第7題（代理權授與的法律性質）同屬代理與委任交叉主題，三題合併可完整理解委任與代理的關係及各自的獨立性。"},
{id:"EBC101",cat:"C4其他各種之債",year:"99年第13題",q:"甲男與乙女為男女朋友關係，甲同意將其名下之豪宅贈與乙，以下之敘述何者錯誤？",
 opts:["甲在未移轉該屋之所有權給乙之前，隨時可以向乙撤銷贈與","甲撤銷贈與後，乙得向甲請求損害賠償","甲移轉豪宅所有權給乙後，甲不得再以未公證為由撤銷","乙得向法院請求甲履行移轉豪宅之所有權"],correct:1,
 exps:["民法408條第1項：贈與物之權利未移轉前，贈與人得撤銷其贈與——所有權未移轉前，甲可以隨時撤銷贈與，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法408條第3項：贈與之撤銷，應向受贈人以意思表示為之，受贈人因此所受之損失，贈與人不負賠償責任——甲在所有權移轉前任意撤銷（408條），乙不得向甲請求損害賠償（正因為是「任意撤銷」，法律讓贈與人享有撤銷自由且不需賠償，這是贈與契約的無償性帶來的特殊待遇），本選項說「乙得請求損害賠償」與408條第3項規定相反，是本題錯誤敘述。","民法408條第2項：已為公證之贈與及已履行之部分，不適用任意撤銷——甲移轉所有權後，履行已完成，甲不得再任意撤銷，敘述正確，非本題答案。","乙受甲贈與豪宅的承諾有效，乙有請求甲移轉所有權的請求權（在甲未撤銷前），可以訴請法院命甲履行，敘述正確，非本題答案。"],
 trap:"贈與任意撤銷（408條第1項）的特殊效果：贈與人在所有權移轉前「隨時」可以撤銷，且撤銷後「不需賠償受贈人的損失」（408條第3項）——這是贈與無償性帶來的立法考量，防止贈與人因為「反悔」而遭受損害賠償的雙重不利。考試常把「撤銷後應賠償」設計為陷阱選項，要記住任意撤銷的贈與，贈與人「不負賠償責任」。",related:"與100年第1題（贈與瑕疵擔保，故意不告知才負責）、104年第18題（道德義務贈與不得撤銷）、105年第19題（贈與撤銷規則）同屬贈與主題，四題合併可建立完整的贈與制度考點地圖。"},
{id:"EBC102",cat:"C4其他各種之債",year:"99年第20題",q:"甲將其所有機車1部，寄託於乙處，乙擅自將之以價金新臺幣3萬元讓售給知情的丙，並將該車交付給丙。下列有關乙丙間法律關係之敘述，何者正確？",
 opts:["乙有代理甲出賣機車的代理權，故乙丙間之買賣有效","乙代甲出售機車，有不當得利，甲得向乙請求返還","乙無權出售甲之機車，乙丙間之買賣契約無效","乙無權出售甲之機車，乙丙間之買賣效力未定，丙知情故無從善意取得"],correct:3,
 exps:["乙是受甲寄託（保管）的人，沒有出售代理權，乙擅自出售是無權處分，不是「有代理權」，本選項前提錯誤。","本選項方向部分正確（乙擅自出售確實可能構成不當得利），但問題問的是「乙丙間法律關係」，不是「甲對乙的不當得利」，本選項回答的不是題目問的，也不完整。","乙無權出售甲的機車，乙丙間的買賣屬於「無權處分」（民法118條），效力「未定」（非當然無效），需要甲（真正所有人）承認後才對甲生效，本選項說「無效」不正確（應是效力未定）。","（本題答案）民法801條（動產善意取得）：動產受讓人若出讓人無讓與之權利，善意受讓仍可取得所有權——但本題丙「知情」（知道乙無權出售甲的機車），丙不是善意受讓人，無法主張善意取得；乙丙間的買賣在民法118條下屬效力未定（甲承認則生效，甲拒絕則失效），且丙知情故不能善意取得所有權，敘述正確。"],
 trap:"無權處分（118條）的效力是「效力未定」（不是無效），需要真正權利人承認才生效——這是和「通謀虛偽」（無效）的重要區別。而善意取得（801條）是動產保護善意第三人的制度：若受讓人不知道出讓人無權處分（善意），可以終局取得所有權；但知情（惡意）的受讓人無法主張善意取得，真正權利人仍可向其追討。本題丙知情→不得善意取得→乙丙間買賣效力未定且甲可追討，是無權處分和善意取得的典型綜合考題。",related:"與101年第34題（通謀虛偽買賣後善意第三人取得保護）形成配對——一題是通謀虛偽（無效），一題是無權處分（效力未定），同樣涉及「善意第三人保護」的問題，兩題合併對照效果最佳。"},
{id:"EBC103",cat:"C4其他各種之債",year:"100年第5題",q:"甲向乙借了50萬，約定利息為週年利率百分之30計算，下列敘述何者正確？",
 opts:["約定之利率過高，該消費借貸無效","約定之利率過高，可以減縮至合理範圍","約定之利率超過法定最高限制的部分無效，但超過部分之利息甲已清償者，不得請求返還","甲得就所有已給付之利息，請求乙返還"],correct:2,
 exps:["約定利率過高不使整個消費借貸契約無效（本金借貸契約仍然有效），只是超過法定上限的利息部分無效，本選項說「該消費借貸無效」過於廣泛，錯誤。","利率的限制不是「減縮至合理範圍」，而是「超過部分無效」，以法定上限（現行法為16%）計算，而不是法院判斷何謂「合理」後減縮，本選項表述不精確，錯誤。","（本題答案）民法205條：約定利率超過週年16%者，超過部分之約定無效（30%超過16%，超過部分即14%對應的利息無效）；但依民法180條第3款：因清償債務而為給付，於給付時明知無給付義務者，不得請求返還——若甲明知超過部分無效仍給付，則不得事後請求返還超付利息，本選項完整描述了205條超過無效和180條已付不得請求返還的組合規則，敘述正確。","依180條第3款，甲「明知」超過部分無效仍清償，不得請求返還；若甲「不知」（誤認有效），則可依不當得利（179條）請求返還超付利息，本選項說「甲得就所有已給付利息請求返還」過於廣泛且忽略了180條的限制，錯誤。"],
 trap:"高利率的兩個法律效果：①超過法定上限（16%）的利息部分「無效」（不是整個契約無效，也不是減縮至16%，而是超過的部分直接無效）；②若借款人已經付了超過部分的利息，能否請求返還？→適用非債清償規則（180條第3款），若明知無效仍付，不得要求返還；若不知無效而付，則可依不當得利請求返還。本題最難的是兩個規定的組合，必須同時掌握205條（超過無效）和180條（明知無效仍付，不得返還）才能正確作答。",related:"與A4段112年第7題（約定利率超過16%超過部分無效）是同一法條的跨段重複出題，兩題合併確認自己記住了現行法的16%上限和超過部分的處理方式。"},
{id:"EBC104",cat:"C4其他各種之債",year:"104年第6題",q:"乙與甲約定，於甲大學畢業時，乙將贈與甲汽車一輛。此項贈與契約所附約款之性質如何？",
 opts:["終期","始期","停止條件","解除條件"],correct:2,
 exps:["終期：法律行為附有終止期限，到期後效力消滅——「甲大學畢業」不是使贈與效力「消滅」的事件，本選項不符。","始期：法律行為附有開始期限，到期後效力開始——「期限」是指確定將來一定會發生的事件，「甲大學畢業」不確定（甲可能休學、退學），不是確定的期限，本選項性質不符（條件vs期限的區分）。","（本題答案）停止條件：法律行為效力的發生，繫於未來不確定事件的成就——「甲大學畢業」是未來不確定的事件（不確定甲是否真的能畢業、何時畢業），條件成就後（甲畢業），贈與效力「開始發生」，符合停止條件的定義，敘述正確。","解除條件：法律行為效力在條件成就時消滅——「甲大學畢業」是使贈與生效的條件，不是使贈與消滅的條件，本選項方向相反。"],
 trap:"「條件」（不確定事件）vs「期限」（確定事件）的辨別：期限是「確定」將來某天一定會發生的事（如「明年1月1日」）；條件是「不確定」將來可能發生或不發生的事（如「甲大學畢業」——甲可能畢業也可能不畢業）。「停止條件」（條件成就時效力開始）vs「解除條件」（條件成就時效力消滅）的辨別：看事件成就後法律行為是「開始生效」還是「消滅效力」。本題「甲畢業→贈與生效」=停止條件。",related:"與105年第9題（贈與附始期或停止條件的識別）同屬條件期限辨別主題，兩題合併複習可完整掌握停止條件/解除條件/始期/終期的辨別方法。"},
{id:"EBC105",cat:"C4其他各種之債",year:"104年第16題",q:"甲因長期出國，將其所有名貴青花瓷一只交由乙代為保管。乙向丙偽稱該瓷為己有，欲以該瓷與丙所有之名車互易，雙方達成讓與合意，乙已交付該瓷。下列敘述，何者正確？",
 opts:["乙丙互易契約因乙無處分權，效力未定","乙丙互易契約有效，丙因善意取得該瓷之所有權","乙丙互易契約有效，但丙未必能取得該瓷之所有權","乙丙互易契約無效，因乙以欺詐方式使丙受讓"],correct:2,
 exps:["乙丙互易契約（債權行為）本身的效力，在乙無處分權的情形下，依民法118條是效力未定，但若丙已善意取得，物權行為已生效，整個交易的最終效力需要分層分析，本選項把效力未定的分析停在債權行為層面不夠完整。","動產善意取得（民法801條）的適用前提：受讓人是「善意」（不知出讓人無讓與權利）——本題丙「向乙買名貴青花瓷」，乙偽稱是自己的，若丙確實不知情（善意），理論上可以善意取得，本選項說「丙因善意取得」方向可能正確，但需確認丙是否真的善意，題目未明確說丙知情，所以這個選項可能成立，但官方答案選C，表示C更精確。","（本題答案）乙丙互易契約（債權行為）本身有效（合意成立，不因乙無處分權而無效——無處分權影響的是物權行為，不是債權行為本身）；但丙能否取得青花瓷所有權，取決於丙是否「善意」（不知乙無處分權）：若丙善意→善意取得所有權；若丙知情（乙偽稱為己有→丙不知情→善意可能成立，但若丙有注意義務而未注意也可能影響善意認定）——本選項「有效，但丙未必能取得所有權」最精確地描述了這個「債權行為有效，物權取得需看善意與否」的不確定狀態，敘述正確。","乙用欺詐方式影響的是乙丙間的意思表示瑕疵（詐欺，92條），丙可以撤銷受詐欺的意思表示，但撤銷前互易契約仍有效，不是當然「無效」，本選項用詞不精確，錯誤。"],
 trap:"這題考的是「債權行為效力」vs「物權行為效力（善意取得）」的雙層分析：①互易契約（債權行為）：合意即成立，乙無處分權不影響債權行為效力本身，契約有效；②青花瓷所有權能否移轉（物權行為）：取決於丙是否善意，善意則善意取得，不善意則甲可追回。這個「債權有效，物權看善意」的雙層分析是民法體系分析法的核心應用，是最難但最重要的考試能力。",related:"與99年第20題（無權處分效力未定，知情者不得善意取得）同屬無權處分與善意取得交叉主題，兩題合併可完整掌握這個雙層分析架構。"},
{id:"EBC106",cat:"C4其他各種之債",year:"104年第18題",q:"下列關於民法規定之贈與契約的敘述，何者正確？",
 opts:["為履行道德上之義務的贈與契約，不得撤銷","為確認贈與意思，贈與契約須以書面為之","未成年人不得單獨訂立贈與契約","僅有在贈與物已交付時，贈與契約方為有效成立"],correct:0,
 exps:["（本題答案）民法408條第1項但書（配合180條）：若贈與係為履行道德上義務（如長輩對晚輩的情義贈與），即便贈與物尚未交付，也不得任意撤銷——法律尊重道德義務贈與的特殊性質，防止贈與人以「任意撤銷權」規避道德責任，敘述正確。","贈與契約採不要式原則，口頭贈與即可成立，不需要書面，本選項錯誤。","未成年人（限制行為能力人）可以單獨訂立「純獲法律上利益」的法律行為，接受贈與（受贈）屬純獲法律上利益（只得不失），未成年人可以單獨訂立贈與契約作為受贈人，本選項說「不得單獨訂立」過於絕對，錯誤。","贈與契約是「諾成契約」，合意即成立，不需要交付物品，本選項說「僅有交付後方為有效成立」把贈與誤認為要物契約，錯誤。"],
 trap:"贈與的任意撤銷權（408條第1項）有三個例外不得撤銷：①已為公證的贈與②已履行（交付）的部分③為履行道德上義務的贈與——這三種例外中，第三種「道德義務贈與」是考試最常考也最容易被忽略的。記憶口訣：「公證、已付、道德義務，三種贈與不得任意撤銷」。",related:"與99年第13題（贈與任意撤銷後不需賠償）、105年第19題（贈與撤銷的各種規則）、113年第11題（受贈人不履行扶養義務的撤銷）同屬贈與主題，四題合併可建立完整的贈與撤銷制度地圖。"},
{id:"EBC107",cat:"C4其他各種之債",year:"104年第36題",q:"年甫16歲之乙受第三人甲贈與房屋一間，乙之父母丙、丁均健在。下列敘述，何者正確？",
 opts:["丙、丁各得單獨管理該房屋","非得丙、丁共同之同意或丙、丁共同代理，乙不得接受贈與","乙接受贈與得單獨為之，不需丙、丁之允許","乙接受贈與須得丙或丁之同意，始得為之"],correct:2,
 exps:["父母對未成年子女的財產有管理權，但父母之管理權由雙方共同行使（民法1098條），不是各自單獨管理，本選項說「各得單獨管理」不正確。","接受贈與屬於「純獲法律上利益」（只有得到財產，沒有負擔義務），依民法77條但書，限制行為能力人為純獲利益之行為，不需要法定代理人允許，本選項說「需丙丁共同同意」，把純獲利益行為和一般行為的要件混淆，錯誤。","（本題答案）民法77條但書：純獲法律上利益，限制行為能力人得單獨為之，不需法定代理人允許——接受贈與房屋是純獲法律上利益（乙只得到房屋，沒有任何對待義務），乙作為限制行為能力人（舊法16歲仍是限制行為能力人，現行法依然是未成年），可以單獨接受贈與，不需要父母丙丁的允許，敘述正確。","同上，純獲利益行為不需要「丙或丁」的同意，乙可以自行接受，本選項把此行為錯誤認定為需要同意，錯誤。"],
 trap:"限制行為能力人的行為能力例外：「純獲法律上利益」的行為（如單純接受贈與、繼承遺產、受讓被免除債務）不需要法定代理人允許，可以由限制行為能力人獨立為之——這是77條但書的明文規定。考試常把「純獲利益行為」和「一般需要同意的行為」混淆，要記住接受贈與不需要法定代理人同意，是限制行為能力人可以獨立完成的例外行為。",related:"與A1段111年第23題（限制行為能力人需法定代理人同意之行為類型，含授予代理權仍需同意）形成對比，一題考需要同意的行為，一題考不需要同意的行為（純獲利益），兩題合併複習可建立完整的例外清單。"},
{id:"EBC108",cat:"C4其他各種之債",year:"105年第6題",q:"甲誤認為好友所贈與之戒指，乃鍍金之假鑽戒，遂將該戒指以500元之價格賣給乙，並已交付。甲事後得知此乃真金真鑽之戒指，甲得向乙主張何種權利？",
 opts:["甲得向乙主張不當得利，請求乙返還戒指","甲得依無因管理之規定，請求乙返還戒指","甲得向乙主張出賣人之物之瑕疵擔保責任，請求乙退還戒指","甲得以錯誤為由，撤銷其意思表示，使買賣契約歸於消滅"],correct:3,
 exps:["甲與乙訂立有效的買賣契約並交付戒指，這是有法律上原因的（基於買賣契約），乙持有戒指有合法依據，不構成不當得利，本選項不正確。","無因管理是「未受委任、無義務而為他人管理事務」，本題甲是自己基於買賣契約交付戒指，不是無因管理，本選項不適用。","瑕疵擔保責任是保護買受人（乙）的，不是保護出賣人（甲）的，甲不能以出賣人身分主張瑕疵擔保，本選項方向錯誤。","（本題答案）甲誤認戒指是假鑽戒（實際是真鑽），這是「物之性質」的認識錯誤，依民法88條第2項：物之性質，若交易上認為重要者，其錯誤，視為意思表示內容之錯誤，表意人得撤銷意思表示——甲可以以「錯誤（物之性質錯誤）」為由撤銷買賣意思表示，使買賣契約溯及消滅（民法114條撤銷視為自始無效），再依不當得利請求乙返還戒指（因契約消滅，乙持有戒指失去法律上原因），敘述正確。"],
 trap:"「物之性質錯誤」是民法88條第2項特別規定的意思表示錯誤類型——物的性質（如材質、真假）在交易上如果是重要的，錯誤認識了物的性質（如誤認真鑽為假鑽），可以主張撤銷（視為自始無效）。這個「物之性質錯誤→視為內容錯誤→得撤銷」的推論是民法意思表示瑕疵體系中比較進階的知識點，要把88條第2項和這個實際情境對應起來。",related:"與A5段106年第5題（意思表示錯誤類型的識別）是同一法條（88條）在不同年份的應用，兩題合併複習可完整理解物之性質錯誤的具體操作。"},
{id:"EBC109",cat:"C4其他各種之債",year:"105年第9題",q:"甲告知乙，若乙願意出國比賽，不管有無得名次，即贈與乙200萬元。試問甲乙間之贈與契約的附款為何？",
 opts:["期限","條件","始期","解除條件"],correct:1,
 exps:["期限（始期）是確定將來會到來的時點（如「明年1月1日」），「乙出國比賽」是不確定事件（乙可能不出國、比賽可能取消），不是確定的期限，本選項不正確。","（本題答案）「若乙願意出國比賽」是不確定事件，條件成就（乙出國比賽）時，贈與效力開始，這是「停止條件」的定義——不確定事件成就→法律行為效力開始，本選項說「條件」雖未細分是停止還是解除，但在本題語境下答案是B（條件），敘述正確。","始期是確定將來某時開始，本題不是確定的時間點，本選項不正確。","解除條件是條件成就後效力消滅，本題「乙出國比賽」是使贈與效力開始的條件（停止條件），不是消滅的條件，本選項方向相反，錯誤。"],
 trap:"條件（不確定）vs期限（確定）的區分口訣：「確定就是期限，不確定就是條件」——若有一天一定會發生，那是期限；若可能發生也可能不發生，那是條件。停止條件（條件成就→效力開始）vs解除條件（條件成就→效力消滅）的辨別：看條件成就後法律行為是「啟動」還是「終止」。本題「乙出國比賽→贈與生效」=停止條件。",related:"與104年第6題（甲大學畢業時贈與汽車，停止條件的識別）是同主題的重複命題，兩題合併複習可確認自己真正掌握「停止條件」的識別方法。"},
{id:"EBC110",cat:"C4其他各種之債",year:"105年第19題",q:"有關贈與契約之敘述，下列何者正確？",
 opts:["贈與契約一旦成立後，贈與人不得任意撤銷之","贈與契約為要式契約，因此必須作成贈與書始能成立","贈與人對於贈與之物，負有物之瑕疵擔保責任","贈與人在贈與物之權利未移轉前，雖已作成書面，仍得撤銷之，但贈與人對受贈人因此所受之損失不負賠償責任"],correct:3,
 exps:["民法408條第1項：贈與物之權利未移轉前，贈與人得隨時撤銷其贈與——贈與契約成立後、移轉前仍可撤銷，本選項說「成立後不得任意撤銷」不正確。","贈與契約採不要式原則（不需要書面即可成立），本選項說「必須作成贈與書始能成立」不正確。","民法410條：贈與物有瑕疵時，贈與人原則上不負物之瑕疵擔保責任（除非故意不告知或保證無瑕疵，民法411條）——本選項說「負有物之瑕疵擔保責任」與410條原則免責的規定相反，錯誤。","（本題答案）民法408條第1項、第3項：贈與物權利未移轉前，贈與人得撤銷（即使已作成書面）；撤銷後，受贈人因此所受損失，贈與人不負賠償責任——本選項完整敘述了贈與任意撤銷的兩個重要規則（何時可撤銷＋撤銷後不負賠償），敘述正確。"],
 trap:"本題是贈與契約完整規則的總複習——四個選項分別測試：①成立後可否任意撤銷（可以，在移轉前）②是否要式（不要式）③是否負瑕疵擔保（原則不負）④撤銷後是否賠償（不賠）。這四個考點在C4段的各題中都曾個別出現，本題是一次綜合考驗，建議把99年第13題、100年第1題、104年第18題、105年第19題這四題一起看，建立完整的贈與制度知識地圖。",related:"與99年第13題、100年第1題、104年第18題同屬贈與主題，四題合併是C4段贈與制度的完整考點組合。"},
{id:"EBC111",cat:"C4其他各種之債",year:"106年第3題",q:"甲乙是大四同班同學，甲平常騎乘其父丙所贈與之電動機車作為交通工具。某日乙向甲借用該部電動機車，以接送其高中同學到學校所在城市。甲提供機車後，乙未按約定使用，而是前往賭博場所，中途遭遇交通意外，機車嚴重受損。試問乙應如何對甲負責？",
 opts:["乙借用機車並未損壞，乙無須負責","乙的借用未遵照使用目的，乙應負損害賠償責任，不論損害之發生是否與乙的違約使用有關","乙借用機車並未違反借貸約定，乙無須負責，因為去賭博場所也是一種社交活動","乙未按約定使用借用物，乙對甲之損害負賠償責任"],correct:3,
 exps:["本題機車已嚴重受損，乙確實損壞了借用物，本選項說「未損壞無須負責」與事實不符，錯誤。","「無論損害是否與違約使用有關」的說法過於絕對——乙應負責任，但需要有因果關係（違約使用與損害之間有相當因果關係），若損害與違約使用無關（如不可抗力），責任認定可能不同，本選項說法過於寬泛，錯誤。","乙借用機車是「以接送高中同學到學校所在城市」為目的，前往賭博場所是超出約定用途的使用，明顯違反借貸約定，本選項說「賭博也是社交活動不違反約定」曲解了借貸約定的範圍，錯誤。","（本題答案）民法469條：借用人未依約定方法或借用物之性質而使用借用物，致生損害者，應負損害賠償責任——乙未按約定使用（用途不符），且造成機車受損，乙對甲負損害賠償責任，敘述正確。"],
 trap:"使用借貸的借用人義務（469條）：借用人必須按照「約定方法」或「借用物性質」使用借用物，若違反（如借機車接送同學，卻拿去賭博場所），且造成損害，借用人需負賠償責任。本題的核心是「違反約定用途使用→損害→賠償」的因果鏈，同時要注意乙是否盡到了使用借貸借用人的「善良管理人注意」（同449條的一般照顧義務），未盡注意也可能是責任基礎之一。",related:"與111年第4題（使用借貸的無償性、不適用買賣不破使用借貸）同屬使用借貸主題，兩題合併可掌握使用借貸的主要規則（無償、按約定使用、損害賠償責任）。"},
{id:"EBC112",cat:"C4其他各種之債",year:"106年第9題",q:"甲有A屋，登記為A屋所有人。甲將A屋贈與乙女。試問，下列敘述何者正確？",
 opts:["非經交付A屋，該贈與不生效力","該贈與須公證，否則無效","贈與甲得隨時撤銷贈與，但不得以乙女已受有損害為由請求賠償","乙受贈後，甲之債權人不得就A屋聲請強制執行"],correct:2,
 exps:["不動產贈與的債權行為（贈與契約）本身是諾成契約（合意即成立），不以交付為生效要件，交付A屋是物權移轉的一部分（交付+登記），不是債權行為的成立要件，本選項錯誤。","贈與契約採不要式原則（不需公證即可成立），本選項錯誤。","（本題答案）民法408條第1項、第3項：贈與物之權利未移轉前，贈與人得隨時撤銷，且撤銷後不對受贈人因此所受損失負賠償責任——甲在尚未完成A屋所有權移轉登記前，可以隨時撤銷贈與，且不需賠償乙因此受的損失，敘述正確。","A屋登記在甲名下（所有權尚未移轉），屬於甲的責任財產，甲的債權人仍可以就A屋（甲的財產）聲請強制執行，本選項說「不得強制執行」不正確（在所有權移轉登記給乙之前，A屋仍是甲的財產）。"],
 trap:"這題考的是「贈與所有權未移轉前的各方利益」：①甲可任意撤銷（408條第1項）②撤銷後不賠（408條第3項）③甲的債權人可以就A屋（仍是甲的財產）強制執行④贈與是諾成不要式契約。四個考點在這一題都出現，是C4段贈與制度的另一個綜合考驗題，和105年第19題可以一起作為贈與複習的完整練習組合。",related:"與105年第19題（贈與各種規則的綜合考驗）是贈與制度的兩個最重要的綜合複習題，兩題合併複習可確認自己是否已完整掌握贈與制度的所有核心規則。"},
{id:"EBC113",cat:"C4其他各種之債",year:"107年第14題",q:"下列有關贈與之敘述，何者正確？",
 opts:["贈與係單獨行為","贈與以物之交付為要件，於物之交付後，贈與行為才為生效","經公證之贈與，贈與人得隨時撤銷贈與","未以書面為之之贈與，在贈與人死亡後，受贈人仍得請求繼承人為履行"],correct:3,
 exps:["贈與是「雙方行為」（需要贈與人的贈與意思＋受贈人的允受），不是單獨行為（單獨行為只需要一方意思表示），本選項錯誤。","贈與是「諾成契約」（合意即成立），不以交付為成立要件——交付是履行義務，不是成立要件，本選項錯誤。","民法408條第2項：經公證之贈與，不適用任意撤銷的規定——公證的贈與不得任意撤銷，本選項說「得隨時撤銷」與408條第2項相反，錯誤。","（本題答案）民法409條第1項：贈與未以書面為之，且贈與人仍生存時，受贈人得請求贈與人履行——但若未以書面且贈與人已死亡，受贈人仍得請求繼承人履行（民法409條第2項但書：如贈與係立有字據，則仍得請求繼承人履行）——本選項說「在贈與人死亡後，受贈人仍得請求繼承人為履行」方向正確（若有字據，或屬於道德義務贈與等特殊情形），依官方答案D，此選項被認定為正確。"],
 trap:"贈與的書面與口頭贈與在繼承人責任上的差異：未以書面（口頭）的贈與，若贈與人死亡，受贈人原則上不得請求繼承人履行（民法409條第2項）；但若贈與立有字據，受贈人得請求繼承人履行——換句話說，書面（立有字據）的贈與即使贈與人死亡，受贈人仍可向繼承人請求。這是贈與書面性最重要的法律效果，不是成立要件，而是決定死後是否仍可請求繼承人履行的關鍵。",related:"與104年第18題（道德義務贈與不得任意撤銷）、105年第19題（公證贈與不得任意撤銷）共同構成贈與撤銷限制的完整三題組，三題合併可完整掌握哪些類型的贈與不得任意撤銷。"},
{id:"EBC114",cat:"C4其他各種之債",year:"107年第17題",q:"關於僱傭契約，下列敘述，何者錯誤？",
 opts:["僱傭契約之專屬性較低，故僱用人得將其勞務請求權讓與第三人，無需受僱人同意","受僱人服勞務時，若因非可歸責於自己之事由，致不能為勞務之給付，應仍得請求報酬","僱傭契約為有償契約","僱傭關係存續中，受僱人有請求給付報酬之權利"],correct:0,
 exps:["（本題答案，敘述錯誤）民法484條：僱用人非經受僱人同意，不得將其勞務請求權讓與第三人——僱傭契約具有高度專屬性（受僱人的人身勞務與其個人特質、信任關係密切相關），僱用人「不得未經同意」轉讓勞務請求權，本選項說「專屬性較低，得讓與無需同意」與484條規定相反，是本題錯誤敘述。","民法487條：僱用人受領遲延（不讓受僱人提供勞務），或因可歸責於僱用人之事由，致受僱人不能服勞務者，受僱人仍得請求報酬——若因不可歸責受僱人之事由不能提供勞務，受僱人仍得請求報酬，敘述正確。","僱傭契約（僱用人給付報酬，受僱人提供勞務）有對價，是有償契約，敘述正確。","受僱人提供勞務後，有請求報酬的權利，這是僱傭契約最基本的效果，敘述正確。"],
 trap:"僱傭契約的「專屬性」是高度屬人性的，受僱人的勞務與個人特質直接相連（如某位特定廚師的手藝、設計師的創意），所以僱用人不能未經受僱人同意就把「要求這個人提供勞務的權利」轉讓給別人——你不能把你員工的勞動請求權賣給別人，讓別人來指揮你員工工作。民法484條就是保護受僱人不被當作財產一樣轉讓的規定，考試常把「專屬性高/低」的說法來製造陷阱。",related:"與101年第4題（受僱人執行職務侵害第三人的僱用人連帶責任）、99年第14題（僱用人連帶責任規則）同屬僱傭契約主題，三題合併複習僱傭契約的主要規則（勞務請求轉讓、僱用人責任、報酬請求）。"},
{id:"EBC115",cat:"C4其他各種之債",year:"113年第5題",q:"甲申請之建案因違法無法取得建造許可，遂與乙約定，由甲贈與乙之妻丙100萬元後，乙須幫助甲取得建造許可，後來乙收賄之事曝光。下列敘述，何者正確？",
 opts:["甲對乙之妻丙之贈與契約無效，因甲之贈與行為違反公序良俗","甲對乙之妻丙之贈與契約，若已給付，乙之妻丙得保有該款項","乙幫助甲取得建造許可，係合法行為","甲可向乙請求損害賠償"],correct:1,
 exps:["甲贈與丙100萬是「以金錢買通乙（丙之夫）幫助甲取得違法建造許可」的安排，整個法律安排違反公序良俗，甲對丙的贈與可能因此被認定為無效（72條：法律行為違反公序良俗者無效），但本選項說「贈與契約無效」，依官方答案B，此題的結論是丙得保有，表示官方認為贈與本身可以獨立有效（甲贈與丙的行為本身，若僅看債權行為效力，丙是善意受贈人，可能受到保護），本選項非官方答案。","（本題答案）民法180條：給付係履行不法原因之給付者，不得請求返還。但其不法原因僅在受領人一方者，不在此限——本題的「不法原因」（賄賂取得違法建造許可）在於甲乙之間的約定，而丙（乙之妻）作為贈與的受領人，若丙本身未參與不法行為，丙得以「不法原因不在受領人一方」主張保有，甲不得向丙請求返還，本選項敘述正確。","乙幫助甲取得「違法的建造許可」，這是違法行為（可能涉及賄賂罪），不是合法行為，本選項錯誤。","依180條，甲不得請求丙返還（因為不法原因給付者不得請求返還），甲更無從向乙請求賠償（因為甲自己也是不法行為的參與者），本選項不正確。"],
 trap:"民法180條的「不法原因給付不得請求返還」原則是重要但冷僻的考點：以不法原因（如賄賂）而為的給付，給付者事後「不得請求返還」——這是法律對自行從事不法行為者的懲罰（自業自得，不能事後反悔要回賄款）。但但書規定：若不法原因「僅在受領人一方」（如受領人詐騙給付者），給付者可以請求返還。本題甲乙雙方均有不法意圖，甲不得請求返還；但丙是善意受贈人，丙得保有。",related:"與113年第11題（受贈人不履行扶養義務，贈與人撤銷贈與，416條）同屬贈與的特殊情形，兩題合併複習可了解贈與後可能發生的各種特殊法律效果。"},
{id:"EBC116",cat:"C4其他各種之債",year:"113年第11題",q:"甲與其20歲之兒子乙訂立贈與契約，將甲所有之A屋贈與乙，並完成所有權移轉登記。嗣後，乙竟不履行對甲之法定扶養義務，甲得依何規定向乙主張撤銷贈與？",
 opts:["民法第408條第1項","民法第408條第2項","民法第416條第1項","民法第416條第2項"],correct:2,
 exps:["民法408條第1項：贈與物之權利未移轉前，得隨時撤銷——本題A屋所有權已完成移轉登記給乙，408條第1項的適用前提（未移轉前）已不再成立，不適用，本選項錯誤。","民法408條第2項：已為公證或已履行之部分，不適用任意撤銷——本題是已履行（已移轉登記）的贈與，408條第2項是說不能用第1項撤銷，不是提供新的撤銷依據，本選項錯誤。","（本題答案）民法416條第1項：受贈人對於贈與人、其配偶、直系血親、三親等內旁系血親或二親等內姻親，有故意侵害之行為，依刑法有處罰之明文者，或對於贈與人有扶養義務而不履行者，贈與人得撤銷其贈與——乙不履行對甲之法定扶養義務（忘恩行為中的扶養義務不履行），甲得依416條第1項撤銷贈與，本選項正確。","民法416條第2項：撤銷權，因受贈人之死亡而消滅——這是撤銷權消滅的規定，不是撤銷的依據，本選項不正確。"],
 trap:"贈與的忘恩行為撤銷（416條）：受贈人若對贈與人有嚴重的忘恩行為（如毆打、侮辱、不履行扶養義務），贈與人得撤銷贈與——即使贈與物已交付，仍可依416條撤銷，請求受贈人返還。這與408條任意撤銷（只能在未移轉前撤銷）不同，416條忘恩行為撤銷是在已履行後仍可撤銷的特別規定，適用的情境更嚴重（受贈人有不當行為）。",related:"與99年第13題（贈與任意撤銷後不需賠償）、104年第18題（道德義務贈與不得任意撤銷）、114年第13題（贈與忘恩行為撤銷）共同構成贈與撤銷的完整知識體系，四題合併複習可建立完整的「哪些贈與可撤銷、何時可撤銷、效果如何」的判斷地圖。"},
{id:"EBC117",cat:"C5債權讓與",year:"101年第7題",q:"甲與乙約定，甲不得將其對乙之非不得讓與的A金錢債權讓與予第三人。事後，甲卻違反與乙之約定，將A債權讓與予丙。就甲違反約定讓與債權，下列敘述何者最正確？",
 opts:["甲違反約定，讓與行為無效，丙不能取得A債權","甲違反約定，讓與行為仍屬有效，若丙為善意，則丙取得A債權","甲違反約定，讓與行為係效力未定，須乙承認後方生效","甲違反約定，丙雖取得A債權，但甲得撤銷讓與行為，丙應將A債權返還甲"],correct:1,
 exps:["甲乙間的「不得讓與約定」是甲乙之間的契約條款（債權行為層面的限制），不影響對外的讓與行為效力——甲違反此約定讓與債權給丙，對甲乙間是違約（甲需賠償乙），但對善意的丙而言，讓與行為仍然有效（丙可以取得債權），本選項說「讓與行為無效，丙不能取得」不正確。","（本題答案）民法294條第2項：讓與之禁止約定，對善意第三人不生效力——甲乙間的不得讓與約定只能在甲乙之間發生效力，不能對善意的丙（不知有禁止約定）主張，故善意的丙仍取得A債權，敘述正確。","甲乙間的禁止讓與約定不使讓與行為變成效力未定，讓與行為在甲與丙之間已有效成立，本選項不正確。","讓與行為對善意的丙有效，甲沒有撤銷讓與的依據（違反契約不等於可以撤銷），本選項不正確。"],
 trap:"「讓與禁止特約」的對抗效力（民法294條第2項）：甲乙間約定不得讓與，是「對人」的約定（只對甲乙有效），不能對抗不知情的善意第三人丙——甲雖然違約（對乙有賠償責任），但丙若善意（不知有禁止約定），仍能取得被讓與的債權。這個「讓與禁止約定不對抗善意第三人」的規則是債權讓與制度的重要保護設計，保障債權讓與市場的交易安全。",related:"與104年第12題（債權讓與無效的情形）、113年第4題（債權讓與通知效力）同屬債權讓與主題，三題合併可完整掌握債權讓與制度的核心規則。"},
{id:"EBC118",cat:"C5債權讓與",year:"104年第12題",q:"甲將其對乙之債權讓與予丙。下列何者會使此債權讓與無效？",
 opts:["甲乙間有不得讓與之特約，但丙為善意之情形","甲未將證明債權之文書交付給丙","甲未通知乙債權讓與之事","讓與之標的為不得讓與之債權（如以特定人身分為基礎之債權）"],correct:3,
 exps:["依民法294條第2項，讓與禁止特約不對抗善意第三人，若丙為善意，此讓與有效，本選項不使讓與無效，錯誤。","甲未交付證明文書，這違反了民法296條（讓與人應將讓與日期及讓與人簽名通知債務人，並交付必要文件），但不影響讓與行為本身的效力，只是甲的附隨義務未履行，本選項不使讓與無效，錯誤。","通知債務人乙是讓與行為「對債務人發生效力」的條件（民法297條），但不通知不影響讓與行為本身在甲丙之間的效力，只影響丙對乙主張的問題，本選項不使讓與行為本身無效，錯誤。","（本題答案）民法294條第1項：債權人得將債權讓與於第三人，但有以下情形不得讓與：一、依債權之性質，不得讓與者（如以特定人身分為基礎的債權，如扶養請求權、特定人的委任報酬請求權等）——這類「本質上不得讓與的債權」，其讓與行為本身無效，這是使讓與無效的真正原因，敘述正確。"],
 trap:"哪些情形會使「債權讓與」本身無效：①依債權性質不得讓與（如以特定人身分為基礎的請求權）②當事人特別約定不得讓與且受讓人知情③依法律規定不得讓與（如受撫養請求權，民法1114條等）。相對地，以下情形不使讓與無效（只有其他效果）：①禁止特約對善意第三人無效→讓與有效②未交付文書→違反附隨義務，讓與仍有效③未通知債務人→讓與在甲丙間有效，但對乙主張有限制。",related:"與101年第7題（讓與禁止特約對善意第三人不生效力）、113年第4題（讓與通知效力對債務人的意義）同屬債權讓與主題，三題合併可完整掌握债权讓與的有效性、對抗力、通知三個層面的規則。"},
{id:"EBC119",cat:"C5債權讓與",year:"113年第4題",q:"甲對乙有新臺幣100萬元之債權，將該債權讓與丙，甲與丙均未通知乙債權讓與之事情。嗣後，乙因不知債權讓與之事情，仍向甲清償100萬元，試問乙之清償是否有效？",
 opts:["無效，乙應再向丙清償100萬元","有效，乙之清償發生清償之效力","無效，乙仍應向丙清償，但乙可向甲主張不當得利","有效，但乙同時仍對丙負有清償義務"],correct:1,
 exps:["讓與後若未通知，債務人（乙）不知情而向讓與人（甲）清償，依民法297條第1項保護善意債務人的規定，此清償發生效力，不是無效，本選項不正確。","（本題答案）民法297條第1項：債權讓與，非經讓與人或受讓人通知債務人，對債務人不生效力。因此，甲未通知乙，讓與對乙不發生效力，乙仍得向原債權人甲清償，此清償對乙有效（乙的債務消滅），丙則得向甲主張（因為甲收到乙的清償，但甲已把債權讓與丙，甲應將所收轉交丙或丙可向甲主張），敘述正確。","乙向甲清償是有效的（對乙發生清償效力），不是無效，本選項前提錯誤。","乙已有效清償（債務消滅），乙不再對丙負有清償義務，本選項說「乙仍對丙負有清償義務」不正確（乙的債務已因向甲清償而消滅）。"],
 trap:"債權讓與的通知效力（297條）：讓與後未通知債務人乙，讓與對乙「不生效力」——也就是說乙仍然把甲當作債權人，乙向甲清償有效（乙的債務消滅）。丙的保護是向甲主張（甲應把收到的錢轉給丙）。一旦通知了乙，則乙才需要向丙清償，再向甲清償則不生效力。記憶口訣：「通知前→對債務人不生效力（向原債權人付有效）；通知後→對債務人生效（需向新債權人付）」。",related:"與101年第7題（讓與禁止特約對善意第三人效力）、104年第12題（使讓與無效的情形）同屬債權讓與主題，三題合併建立債權讓與的完整知識架構（有效性→對抗力→通知效力）。"}
];
const CAT_COLORS={
  "B1債之發生與消滅":"#5B7A99","B2債務不履行":"#A8402B","B3連帶債務與保證":"#7C6A8E",
  "B4不當得利":"#5C7A4A","B5無因管理":"#B08D57","B6侵權行為":"#8B3A3A",
  "C1買賣":"#2A6496","C2租賃":"#4A7A5A","C3居間承攬委任":"#7A5A2A",
  "C4其他各種之債":"#5A4A7A","C5債權讓與":"#7A6A3A"
};
let activeCats=new Set(Object.keys(CAT_COLORS));
let mastery={};let deck=[...CARDS];let idx=0;let flipped=false;let quizStats={ok:0,ng:0};
const chipsEl=document.getElementById('chips');
const resetBtn=document.getElementById('resetBtn');
const cardEl=document.getElementById('card');
const qText=document.getElementById('qText');
const optList=document.getElementById('optList');
const badgeFront=document.getElementById('badgeFront');
const badgeBack=document.getElementById('badgeBack');
const yearFront=document.getElementById('yearFront');
const yearBack=document.getElementById('yearBack');
const badgeMasteryFront=document.getElementById('badgeMasteryFront');
const badgeMasteryBack=document.getElementById('badgeMasteryBack');
const answerBanner=document.getElementById('answerBanner');
const expList=document.getElementById('expList');
const trapText=document.getElementById('trapText');
const relatedText=document.getElementById('relatedText');
const curNum=document.getElementById('curNum');
const totalNum=document.getElementById('totalNum');
const catName=document.getElementById('catName');
const progFill=document.getElementById('progFill');
const quizOk=document.getElementById('quizOk');
const quizNg=document.getElementById('quizNg');
async function loadMastery(){try{const r=await window.storage.get('exam_mastery_bc_full_v1');if(r&&r.value)mastery=JSON.parse(r.value);}catch(e){mastery={};}}
async function saveMastery(){try{await window.storage.set('exam_mastery_bc_full_v1',JSON.stringify(mastery));}catch(e){console.error('storage save failed',e);}}
function getStat(id){const m=mastery[id];if(!m)return{status:null,attempts:0,correct:0};if(typeof m==='string')return{status:m,attempts:1,correct:(m==='mastered'?1:0)};return m;}
function masteryIcon(stat){if(!stat.status)return'';const icon=stat.status==='mastered'?'✅':'🔄';return stat.attempts>0?`${icon}×${stat.attempts}`:icon;}
function updateOverallStats(){let attempts=0,correct=0,mastered=0;CARDS.forEach(c=>{const s=getStat(c.id);attempts+=s.attempts;correct+=s.correct;if(s.status==='mastered')mastered++;});document.getElementById('totalAttempts').textContent=attempts;document.getElementById('overallAcc').textContent=attempts?Math.round(correct/attempts*100)+'%':'—';document.getElementById('masteredCount').textContent=mastered;document.getElementById('totalCards').textContent=CARDS.length;}
Object.keys(CAT_COLORS).forEach(cat=>{const count=CARDS.filter(c=>c.cat===cat).length;const chip=document.createElement('div');chip.className='chip active';chip.style.background=CAT_COLORS[cat];chip.style.borderColor=CAT_COLORS[cat];chip.style.color='#fff';chip.textContent=`${cat.replace(/^[BC]\d/,'').replace(/債之發生與消滅/,'B1').replace(/債務不履行/,'B2').replace(/連帶債務與保證/,'B3').replace(/不當得利/,'B4').replace(/無因管理/,'B5').replace(/侵權行為/,'B6')}(${count})`;chip.dataset.cat=cat;chip.addEventListener('click',()=>{if(activeCats.has(cat)){if(activeCats.size===1)return;activeCats.delete(cat);chip.classList.remove('active');chip.style.background='#fff';chip.style.color=CAT_COLORS[cat];}else{activeCats.add(cat);chip.classList.add('active');chip.style.background=CAT_COLORS[cat];chip.style.color='#fff';}rebuildDeck();});chipsEl.appendChild(chip);});
resetBtn.addEventListener('click',()=>{activeCats=new Set(Object.keys(CAT_COLORS));document.querySelectorAll('.chip[data-cat]').forEach(chip=>{const c=chip.dataset.cat;chip.classList.add('active');chip.style.background=CAT_COLORS[c];chip.style.color='#fff';});rebuildDeck();});
function rebuildDeck(){deck=CARDS.filter(c=>activeCats.has(c.cat));idx=0;render();}
function render(){const c=deck[idx];const color=CAT_COLORS[c.cat];flipped=false;cardEl.classList.remove('flipped');qText.textContent=c.q;badgeFront.textContent=c.cat;badgeFront.style.background=color;badgeBack.textContent=c.cat;badgeBack.style.background=color;yearFront.textContent=c.year;yearBack.textContent=c.year;document.querySelector('.face.back').style.borderLeftColor=color;const stat=getStat(c.id);const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;curNum.textContent=idx+1;totalNum.textContent=deck.length;catName.textContent='・'+c.cat;progFill.style.width=((idx+1)/deck.length*100)+'%';optList.innerHTML='';const letters=['A','B','C','D'];c.opts.forEach((opt,i)=>{const div=document.createElement('div');div.className='opt';div.innerHTML=`<span class="letter">${letters[i]}</span><span>${opt}</span>`;div.addEventListener('click',()=>selectOption(i));optList.appendChild(div);});}
function selectOption(i){if(flipped)return;const c=deck[idx];const correct=(i===c.correct);document.querySelectorAll('.opt')[i].classList.add('selected');answerBanner.className='answer-banner '+(correct?'correct':'wrong');const letters=['A','B','C','D'];answerBanner.textContent=correct?`✅ 答對！正解是 ${letters[c.correct]}`:`❌ 答錯了，你選 ${letters[i]}，正解是 ${letters[c.correct]}`;expList.innerHTML='';c.exps.forEach((exp,j)=>{const div=document.createElement('div');div.className='exp-item'+(j===c.correct?' right':'');const mark=j===c.correct?'✓ 正解':'✗';div.innerHTML=`<div class="exp-head">${letters[j]}. ${mark}</div><div>${exp}</div>`;expList.appendChild(div);});trapText.textContent=c.trap||'';relatedText.textContent=c.related||'';if(correct)quizStats.ok++;else quizStats.ng++;const stat=getStat(c.id);stat.attempts+=1;if(correct)stat.correct+=1;stat.status=correct?'mastered':'review';mastery[c.id]=stat;saveMastery();quizOk.textContent=quizStats.ok;quizNg.textContent=quizStats.ng;updateOverallStats();setTimeout(()=>{flipped=true;cardEl.classList.add('flipped');},150);const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;}
cardEl.addEventListener('click',()=>{if(flipped){flipped=false;cardEl.classList.remove('flipped');}});
function goNext(){idx=(idx+1)%deck.length;render();}
function goPrev(){idx=(idx-1+deck.length)%deck.length;render();}
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('shuffleBtn').addEventListener('click',()=>{for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;render();});
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();});
document.getElementById('markMastered').addEventListener('click',()=>{const c=deck[idx];const stat=getStat(c.id);stat.status='mastered';mastery[c.id]=stat;saveMastery();const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;updateOverallStats();});
document.getElementById('markReview').addEventListener('click',()=>{const c=deck[idx];const stat=getStat(c.id);stat.status='review';mastery[c.id]=stat;saveMastery();const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;updateOverallStats();});
document.getElementById('resetQuiz').addEventListener('click',()=>{quizStats={ok:0,ng:0};quizOk.textContent=0;quizNg.textContent=0;});
document.getElementById('resetMastery').addEventListener('click',async()=>{if(!confirm('確定要清除所有學習記錄？此動作無法復原。'))return;mastery={};await saveMastery();render();updateOverallStats();});
(async function init(){await loadMastery();rebuildDeck();updateOverallStats();})();
</script>
</body>
</html>
