 opts:["丙之地上權因乙之抵押權先設定，丙之地上權得對抗乙，但得到清償後，丙之地上權消滅","丙之地上權因乙之抵押權先設定，乙得拍賣A地時，丙之地上權不消滅，丙繼續使用A地","丙之地上權因乙之抵押權先設定，乙之抵押權因丙之地上權而消滅","丙之地上權有效，且效力優先於乙之抵押權"],correct:0,
 exps:["（本題答案）乙的抵押設定在先（A地），丙的地上權設定在後——後設定的地上權不能對抗先設定的抵押（先設定原則）。乙實行抵押拍賣A地後，丙的地上權（後設定，劣後於乙抵押）應隨拍賣消滅（使買受人取得無負擔的A地），丙可以就地上物（房屋）的損失請求補償，敘述正確。","丙的地上權後設定（劣後於乙的抵押），在乙實行抵押拍賣時，丙的地上權無法對抗乙的抵押，應隨拍賣消滅（不能繼續使用），本選項說丙繼續使用，不正確。","丙的地上權後設定劣後，不能使乙的抵押消滅，本選項不正確。","丙的地上權效力不優先於先設定的乙抵押（先設原則），本選項不正確。"],
 trap:"先設抵押後設地上權的衝突結果：①先設抵押（乙）→效力優先②後設地上權（丙）→在抵押執行時消滅（因為抵押設定在先）。這與「先設地上權後設抵押（111-18）」剛好相反——先設地上權可以對抗後設抵押執行，先設抵押則使後設地上權在執行時消滅。先/後設定的順序決定了衝突時誰被犧牲，這是本題和111-18合在一起最重要的對照學習點。",related:"與111年第18題（先設地上權後設抵押，地上權對戊有效）是正反對照的完美配對，兩題必須合併記憶：先設地上權→可對抗後設抵押執行；先設抵押→後設地上權在執行時消滅。"},
{id:"EDF096",cat:"D6抵押質權占有",year:"104年第31題",q:"乙所有A地及建造於A地上之B屋。甲因其對乙之債權屆期未獲清償，乃向法院聲請拍賣A地，並由丙拍得A地。試問下列何者正確？",
 opts:["丙拍得A地後，A地與B屋各屬不同所有人，法律上丙（A地所有人）與乙（B屋所有人）間推定有地上權存在","丙拍得A地後，A地與B屋各屬不同所有人，法律上丙（A地所有人）與乙（B屋所有人）間推定有租賃關係存在","丙拍得A地後，乙亦失去B屋之所有權","丙拍得A地後，B屋因地基滅失而當然失效"],correct:0,
 exps:["（本題答案）民法838條之1（及民法876條：土地及其上建築物同屬一人，而僅以土地或僅以建築物為抵押，如抵押物拍賣，就土地或建築物而言，視為已有地上權設定）——丙拍得A地後，A地（丙）與B屋（乙）分屬不同所有人，法律推定丙（地）與乙（屋）之間「有地上權存在」，使乙的B屋可以繼續在A地上，敘述正確。","本題情境應適用民法876條（拍賣後「視為有地上權設定」），不是推定有租賃關係（838條之1適用的是當事人約定轉讓而非拍賣情形），本選項說推定有租賃，不符合876條規定，錯誤。","B屋的所有權屬於乙，拍賣A地不影響B屋的所有權（拍賣標的是A地，不是B屋），乙仍然是B屋的所有人，本選項錯誤。","B屋不因A地被拍賣而失效或消滅，B屋可以繼續存在（只是土地所有人從乙變成丙），本選項錯誤。"],
 trap:"民法876條的「法定地上權」：土地和其上建築物同屬一人，而以「土地」（或建築物）單獨設定抵押，抵押物被拍賣後，土地和建築物分屬不同所有人，法律「視為」已有地上權設定（使建築物所有人對土地有合法的使用依據）——這是「法定地上權」的核心，保護建築物所有人不因土地被拍賣而失去建築基地的使用依據。注意是「視為有地上權」不是「推定有租賃」（和838條之1的推定租賃不同）。",related:"與113年第12題（土地和房屋分別被拍賣，土地由丙拍得、房屋由丁拍得）同屬法定地上權主題，兩題合併複習可完整掌握法定地上權的各種產生情形。"},
{id:"EDF097",cat:"D6抵押質權占有",year:"104年第32題",q:"下列關於最高限額抵押權之敘述，何者正確？",
 opts:["為避免法律關係複雜，最高限額抵押權不得共有","原債權確定前，抵押權人得讓與最高限額抵押權所擔保之個別債權，而不影響最高限額抵押權","最高限額抵押權原債權確定後，所擔保之最高限額不得再減縮","最高限額抵押權人，得以之設定抵押權"],correct:1,
 exps:["最高限額抵押權可以是共有型態（多人共同持有），沒有法律禁止共有，本選項說不得共有，不正確。","（本題答案）民法881條之7：最高限額抵押權原債權確定前，抵押權人得就各個債權讓與他人，此讓與不影響最高限額抵押權本身——個別債權可以讓與但抵押擔保仍繼續（最高限額抵押的整體並不隨個別債權讓與而消滅），敘述正確。","民法881條之6：最高限額抵押設定後，原債權確定前，可以合意變更最高限額（包含減縮），本選項說確定後不得減縮，表述有誤且時機設定可能不正確，錯誤。","最高限額抵押權本身是抵押權，不能再以抵押權設定另一個抵押（抵押的是不動產所有權或特定物權，不是另一個抵押權），本選項說得設定抵押，不正確。"],
 trap:"最高限額抵押原債權確定前，個別債權可以讓與（881條之7），但抵押擔保整體不受影響——這是最高限額抵押「不特定債權擔保」性質的體現：即使某一個具體債權被讓與，最高限額抵押繼續擔保整體的債權往來，不會因個別債權的移動而動搖整體抵押結構。",related:"與99年第30題（最高限額抵押的基本定義）、103年第30題（確定後仍可讓與）、106年第23題（最高限額抵押各種規定）同屬最高限額抵押主題，四題合併複習。"},
{id:"EDF098",cat:"D6抵押質權占有",year:"105年第26題",q:"有關抵押權之特性，下列敘述何者錯誤？",
 opts:["當不動產所有人設定抵押權後，其抵押權不因該不動產之物權讓與而受影響","抵押權之不可分性，係指抵押權擔保全部債務，債務僅部分清償時，抵押物仍承擔全部抵押責任，必須全部清償後，抵押權始消滅","在得有效設定抵押權之前提下，取得地上權之人，得以地上權設定抵押權","抵押權係隨同被擔保之債務消滅而消滅，係從契約，不得事前拋棄此種特性"],correct:3,
 exps:["民法867條（追及效）：抵押權不因不動產的讓與而受影響（抵押跟著不動產走），敘述正確，非本題答案。","抵押權的「不可分性」：全部清償前，抵押物整體繼續擔保全部債務（即便清償了一部分，也不能解除對應比例的抵押），必須全額清償才消滅，敘述正確，非本題答案。","地上權可以設定抵押（民法882條），敘述正確，非本題答案。","（本題答案，敘述錯誤）抵押權的從屬性雖然是其基本特性，但當事人「得」事前合意拋棄這個從屬性（讓抵押權在特定條件下獨立存在）——與100年第23題相同考點，本選項說「不得事前拋棄此種特性」，與允許當事人合意排除從屬性的原則不符，是本題錯誤敘述。"],
 trap:"抵押權從屬性「得事前拋棄」這個考點在100年第23題和105年第26題各出現一次，16年間兩次考同一個「看起來像對的但其實是錯的」陷阱。法律上當事人可以合意使抵押權突破從屬性的限制（最高限額抵押就是種程度上突破從屬性的典型例子），「從屬性不得拋棄」是一個常見但不正確的觀念。",related:"與100年第23題（抵押權從屬性得事前拋棄，第一次出現）是同一考點的重複命題，兩題必須合併確認你記住了「從屬性可以被拋棄」這個反直覺的規則。"},
{id:"EDF099",cat:"D6抵押質權占有",year:"105年第27題",q:"有關抵押權之實行，下列敘述何者正確？",
 opts:["土地所有人於設定抵押權後，在抵押之土地上營造建築物者，抵押權人於必要時，得將其建築物與土地併付拍賣，但對於建築物之價款，無優先受償之權","設定抵押權後，於土地上新營建築物者，抵押人可以就建築物之價款，優先受償","設定抵押權後，土地上另有建築物，抵押人就建築物拍賣之所得，有優先受償之權","設定抵押權後，土地上另有建築物，建築物之拍賣所得，由各債權人按比例均分受償"],correct:0,
 exps:["（本題答案）民法877條第1項：土地設定抵押後，於土地上營造建築物，抵押權人實行抵押時，得「併付拍賣」建築物，但對建築物價款「無優先受償之權」——建築物可以一起拍賣（為了保持土地+建物的整體性），但建築物的拍賣所得不歸抵押權人優先受償（因為建築物不是抵押物），敘述正確。","抵押人不能就建築物的拍賣所得優先受償（建築物不是抵押物，抵押人只是建築物所有人），本選項不正確。","同上，抵押人對建築物拍賣所得沒有優先受償權，本選項不正確。","建築物拍賣所得歸建築物所有人（或其他有優先受償權的人），不是由各債權人按比例均分，本選項不正確。"],
 trap:"民法877條的「抵押後建物可以併付拍賣但抵押權不及於建物」：土地設定抵押後蓋的建築物，雖然可以跟著土地一起拍賣（拍賣整體），但抵押權人的優先受償範圍只到土地賣得的部分，建築物的賣得金額不在抵押優先受償範圍內——兩者「一起賣但分開算」的設計，是877條的精髓。",related:"與107年第5題（抵押效力所及標的物的範圍）同屬抵押權效力範圍主題，兩題合併複習。"},
{id:"EDF100",cat:"D6抵押質權占有",year:"105年第28題",q:"乙將其所有汽車為甲設定動產質權，以為其對甲借款債務之擔保。該車並已交付甲之占有。下列那種情形，甲之動產質權並不消滅？",
 opts:["甲返還汽車予乙","甲以汽車向丙設定質權","甲將汽車借乙使用","甲讓丁代為保管汽車"],correct:3,
 exps:["甲（質權人）返還汽車給乙（設質人/債務人），視為甲拋棄質權——質權須以「占有質物」為存續要件，質權人自願返還質物，質權消滅，本選項質權消滅。","甲以汽車向丙設定質權（轉質），此時甲的質權受到一定影響，且依法律規定轉質的條件，可能影響甲的原質權，本選項情形複雜，依題目「質權消滅」的判斷方向，轉質通常使甲的原質權發生變動，本選項可能使甲原質權消滅。","甲將汽車借給乙使用，乙直接占有汽車——質權人甲讓債務人乙占有質物，視為拋棄質權（民法903條），質權消滅，本選項質權消滅。","（本題答案）甲讓丁（第三人）代為保管汽車——丁的保管是基於甲的指示（甲間接占有汽車），甲仍然透過丁的保管維持對汽車的「間接占有」，質權依然存在，不消滅，敘述正確（質權不消滅的情形）。"],
 trap:"動產質權的消滅條件中，「質物被質權人返還給設質人」或「讓設質人重新占有質物」，都會導致質權消滅（視為拋棄質權）。但「讓第三人代為保管」不使質權消滅，因為質權人仍然透過第三人維持間接占有（占有並未真正失去，只是改由他人代管）。質權存在的核心是「質權人對質物有占有」，間接占有（透過第三人）也算。",related:"與101年第19題（以債權設定權利質權的實行方式）同屬質權主題，兩題合併可建立完整的質權設定、維持、消滅的知識架構。"},
{id:"EDF101",cat:"D6抵押質權占有",year:"105年第29題",q:"有關惡意占有人與善意占有人，在損害賠償請求方面，下列敘述何者正確？",
 opts:["善意占有人就占有物之滅失或毀損，如係不可歸責於自己之事由所致者，善意占有人仍需負損害賠償責任","惡意占有人就占有物之滅失或毀損，如係不可歸責於自己之事由所致者，惡意占有人無須負損害賠償責任","善意占有人因保存占有物所生之必要費用，得向回復請求人請求償還","惡意占有人因改良占有物所增加之價值，得向回復請求人請求賠償"],correct:2,
 exps:["民法952條：善意占有人就占有物之滅失或毀損，如係不可歸責於自己之事由所致者，「不負賠償責任」——善意占有人在不可歸責的情形下，無需賠償，本選項說仍需負責，與法條相反，錯誤。","民法953條：惡意占有人就占有物之滅失或毀損，縱不可歸責於自己，仍「應賠償」——惡意占有人負更重的責任，即便是不可歸責的損失也要負責，本選項說無須負責，與法條相反，錯誤。","（本題答案）民法954條：善意占有人因保存占有物而支出的「必要費用」，得向回復請求人（所有人）請求償還——善意占有人為了維護占有物所花的必要費用（如修繕費）可以向所有人請求，敘述正確。","民法955條：惡意占有人因改良占有物所生有益費用，「得請求現存之增加價值」（按現存增加價值，不是全部費用），本選項說惡意占有人得請求賠償，方向部分正確但表述有誤（是請求現存增加價值，不是損害賠償），且此選項不是本題最精確的正確答案。"],
 trap:"善意vs惡意占有人的損害賠償責任對比：善意占有人→不可歸責的損失不賠；惡意占有人→即便不可歸責也要賠（加重責任）。費用請求的對比：善意→可請求必要費用（全部）；惡意→只能請求有益費用的「現存增加價值」（按現存增值，不是全部費用）。這兩個對比是占有章節最重要的考點，務必記住善意/惡意的不同待遇。",related:"與112年第20題（善意占有人在本權訴訟敗訴後的法律地位）、106年第28題（無權占有人返還占有物時的各種費用請求）同屬占有主題，三題合併複習可建立完整的占有人費用請求知識架構。"},
{id:"EDF102",cat:"D6抵押質權占有",year:"105年第30題",q:"有關動產善意受讓要件之說明，下列敘述何者正確？",
 opts:["讓與人與受讓人須完成讓與動產之交付行為，此之交付不包含觀念交付","受讓人須係善意取得，但此之善意包含過失在內","讓與人須係無所有權，但有讓與之外觀","受讓人應以平穩、公然之方式受讓動產"],correct:3,
 exps:["民法801條善意取得的交付要件，包含各種交付方式（現實交付、簡易交付、指示交付）以及「占有改定（觀念交付）」——本選項說「不包含觀念交付」，但實務見解認為觀念交付也算（只是學說上有爭議），本選項的說法過於絕對，且依官方答案D，本選項不是最正確的。","善意取得的「善意」要件，是指受讓人「不知讓與人無讓與權」，且「無過失」——有過失（本應查明卻不查）的受讓人，不能主張善意取得，本選項說善意包含過失，不正確。","善意取得的讓與人，必須「看起來有讓與外觀」（如占有動產），但不限於必須「無所有權」——即便讓與人「有所有權」，受讓人也可以善意取得（只是那樣本來就是有效讓與，不需要善意取得制度）；本選項說「讓與人須無所有權」，把善意取得的適用限縮在「讓與人確定無所有權」的情形，表述不夠精確，錯誤。","（本題答案）民法948條（善意取得的基礎占有推定）及民法801條：受讓人應以「平穩、公然」的方式受讓動產——受讓方式需要是正當、公開的（不是暗地裡或以強暴手段取得），以保護真正所有人的利益，敘述正確。"],
 trap:"動產善意取得（801條）的四個要件：①讓與人有讓與的外觀（占有動產）②受讓人善意且無過失③有效的交付（各種交付方式均可，但觀念交付是否包含有爭議）④以平穩、公然的方式受讓。本題考「平穩、公然」這個要件，是善意取得最容易被忽略的要件——不能以秘密或強制方式取得，必須是公開正當的交易。",related:"與102年第26題（盜贓物被善意買受，回復時需補償代價）同屬動產善意取得主題，兩題合併複習可完整掌握善意取得的要件及盜贓物的特殊回復規定。"},
{id:"EDF103",cat:"D6抵押質權占有",year:"106年第23題",q:"關於最高限額抵押權，下列敘述何者正確？",
 opts:["當事人得約定其所擔保原債權之應確定之期日","最高限額抵押權所擔保之債權，不包含基於票據所生之債權","最高限額抵押確定前，得讓與最高限額，但該讓與不得對抗第三人","最高限額抵押確定前，最高限額不得變更"],correct:0,
 exps:["（本題答案）民法881條之4：最高限額抵押，當事人得約定「原債權應確定之期日」（即抵押擔保的起始到結束的期日）——明確的確定期日讓雙方知道最高限額抵押的有效時間範圍，敘述正確。","最高限額抵押可以擔保基於票據所生之債權（民法881條之1規定明確），本選項說不包含票據債權，錯誤。","原債權確定前，最高限額抵押整體可以讓與（881條之7），讓與後對第三人有效（不是不得對抗），本選項關於讓與不得對抗第三人的說法不正確。","民法881條之6：最高限額抵押確定前，可以合意變更最高限額，本選項說不得變更，錯誤。"],
 trap:"最高限額抵押的「確定期日」（881條之4）是重要但容易被忽略的規定——當事人可以約定一個期日，到期後自動確定（不再納入新的債權），這使最高限額抵押有了時間上的邊界，是銀行授信業務中常見的實務安排。另外票據債權「可以」納入最高限額抵押的擔保範圍，是最高限額抵押的重要特色之一。",related:"與99年第30題（最高限額抵押基本定義包含票據債權）、103年第30題（確定後可讓與）、108年第4題（最高限額抵押各規定）同屬最高限額抵押主題，四題合併複習。"},
{id:"EDF104",cat:"D6抵押質權占有",year:"106年第24題",q:"關於占有之推定，下列敘述何者正確？",
 opts:["占有已登記之不動產而行使物權者，推定有該物權","行使所有權以外之權利者，對使用占有者，亦推定有行使該物權之權利","占有人推定有行使之物權，只有所有權","占有人就其所占有之動產，推定其為適法有此權利"],correct:3,
 exps:["民法943條：占有人推定有行使其占有「動產」之物權的權利——不是針對「已登記之不動產」，不動產的物權依登記決定（758條），不是靠占有推定，本選項說占有已登記不動產推定有物權，不符合943條的適用對象，錯誤。","943條的推定適用於「占有動產而行使物權的人」，不包含「使用占有」的情形（使用占有不一定有物權），本選項的表述不精確，錯誤。","943條的推定包含所有物權（不只是所有權），如占有動產者推定有所有權，但也可能推定有質權或其他物權，本選項說只有所有權，過於限縮，錯誤。","（本題答案）民法943條：占有人就其所占有之「動產」，推定其為適法有此權利——動產的占有具有「推定適法」的效力，敘述正確。"],
 trap:"占有推定規則（943條）：①只適用於「動產」（不適用於不動產，不動產靠登記公示）②推定「適法有物權」（不限於所有權，可以是任何適法的物權）③是「推定」（可以舉反證推翻）。本題四個選項從不同角度測試這三個細節，要同時掌握：動產適用、不限所有權、可推翻。",related:"與105年第29題（善惡意占有人的損害賠償對比）、103年第27題（直接占有vs間接占有vs占有輔助人）同屬占有主題，三題合併複習可建立完整的占有推定規則架構。"},
{id:"EDF105",cat:"D6抵押質權占有",year:"106年第28題",q:"依民法規定，無權占有人返還占有物於回復請求人時，其得向回復請求人主張之權利及應負擔之義務，下列敘述何者正確？",
 opts:["善意占有人因保存占有物所支出之必要費用，得向回復請求人請求償還，並就占有物行使留置權","惡意占有人就占有物因改良所增加之價值，得請求全部費用之償還","善意占有人因改良占有物所增加之現存價值，不得請求補償","善意占有人就不可歸責於自己之事由，致占有物滅失或毀損者，應負賠償責任"],correct:0,
 exps:["（本題答案）民法954條第1項：善意占有人因保存占有物所支出之必要費用，得向回復請求人請求償還，並「就占有物行使留置權」——善意占有人不只可以請求費用，還可以行使留置權（在費用被償還前不必交還占有物），敘述正確。","民法955條：惡意占有人因改良所增加之費用，「得請求現存之增加價值」（不是全部費用，只限於現存增加價值），本選項說得請求全部費用，超過了法定範圍，錯誤。","民法955條：善意占有人因改良所增加之現存價值，「得請求」補償（不是不得），本選項說不得請求，與法條規定相反，錯誤。","民法952條：善意占有人就不可歸責之事由致占有物滅失或毀損者，「不負賠償責任」（呼應105-29），本選項說應負賠償責任，與法條相反，錯誤。"],
 trap:"善意占有人返還占有物時的費用請求和留置權：①必要費用可請求全部+可行使留置權（954條）②有益費用（改良）可請求現存增加價值（不是全部費用）③不可歸責事由的損失，不負賠償責任（952條）。本題選項A是最完整且正確的表述——不只可以請求費用，還有留置權可以行使，是954條最重要的實務意義（讓善意占有人不怕空手把東西還回去）。",related:"與105年第29題（善惡意占有人損害賠償對比）、112年第20題（善意占有人在本權訴訟敗訴後的地位）同屬占有主題，三題合併複習。"},
{id:"EDF106",cat:"D6抵押質權占有",year:"106年第29題",q:"依民法之規定，稱典權者，謂支付典價在他人之不動產為使用、收益，於他人不回贖時，取得該不動產所有權之權。下列關於典權之敘述，何者錯誤？",
 opts:["典權人支付典價，取得在他人不動產為使用收益之權","出典人雖可以典物設定抵押，但若典物被拍賣，典權人仍得主張典物之占有使用","典人（即出典人）得於典期屆滿前，隨時回贖典物","典權人得將典權讓與他人，或以典權設定抵押"],correct:2,
 exps:["典權人（支付典價者）取得使用收益典物的物權，敘述正確，非本題答案。","典物設定抵押後被拍賣，典權是否繼續，取決於典權設定時間vs抵押設定時間——若典權先設定，則典權對抗後設定的抵押（典權人仍得占有使用），本選項描述方向正確，非本題答案。","（本題答案，敘述錯誤）典期屆滿前，出典人「不得」隨時回贖——依民法923條，出典人須等到「典期屆滿後」才能回贖（若未回贖，典權人得取得典物所有權）；在典期屆滿「前」，出典人不能任意回贖（那樣典權人的權益就受損了），本選項說可以隨時回贖，與法條規定相反，是本題錯誤敘述。","民法917條：典權人得讓與典權或以典權設定抵押，敘述正確，非本題答案。"],
 trap:"典期屆滿前的回贖限制：出典人「不能在典期屆滿前任意回贖」——必須等到典期屆滿（或典期超過30年後得請求找貼）才能回贖。這個限制保護了典權人（購買者）的使用收益權，使其在典期內不受出典人任意索回的干擾。反之，若逾期未回贖（典期屆滿後出典人在一定期限內不回贖），典權人得取得典物所有權。",related:"與103年第25題（典權人的留買權）同屬典權主題，兩題合併複習可建立典權的核心規則架構（留買權、回贖限制、典權讓與）。"},
{id:"EDF107",cat:"D6抵押質權占有",year:"106年第37題",q:"下列有關抵押權之敘述，何者正確？",
 opts:["以抵押權擔保之債權請求權，雖經時效消滅，債權人仍得於時效完成後5年內實行抵押權","抵押權設定後，如發現其估價值已不足清償抵押債權時，債權人得立即實行抵押權","抵押權所擔保之債權請求權，如已罹於時效，其抵押權亦因而消滅","土地設定抵押後，土地與建築物同時為一次拍賣，抵押權人就建築物賣得之價金有優先受償之權"],correct:0,
 exps:["（本題答案）民法880條：以抵押權擔保之債權請求權，雖已因時效消滅，債權人仍得就抵押物（不動產）實行抵押權，但須於「消滅時效完成後5年內」為之——時效消滅不使抵押權立即消滅，但給了5年的緩衝期，敘述正確。","抵押物估值不足不是立即可以實行抵押的條件（需等到債權屆期未清償才能實行），本選項說發現估值不足即可立即實行，不正確。","依民法880條，時效消滅後抵押權不立即消滅，還可以在5年內實行（時效消滅不使抵押權同步消滅），本選項說抵押權因時效消滅而消滅，不正確。","民法877條（抵押後於土地上新建的建築物可以併付拍賣，但抵押權人無優先受償於建築物之權），本選項說有優先受償，不正確。"],
 trap:"民法880條的「時效消滅後5年內仍可實行抵押」是本段最重要的特殊規定之一：債權請求權因時效消滅後，抵押擔保並不立即消滅，抵押權人還有5年的時間可以「實行」抵押（聲請拍賣抵押物），但5年過後才真正失去實行的機會。這個規定平衡了時效制度（債務人可以主張時效抗辯）和擔保物權（抵押權人可以對物主張）之間的關係。",related:"與110年第18題（時效完成後5年內實行抵押）、113年第16題（時效消滅後抵押權何時消滅）同屬時效與抵押權主題的三度重複命題，三題合併是這個高頻考點的完整學習組合。"},
{id:"EDF108",cat:"D6抵押質權占有",year:"107年第5題",q:"甲向乙貸款新臺幣500萬元，以其所有之A地及其上之B屋設定抵押權給乙作擔保。試問下列何者非屬抵押權效力所及？",
 opts:["B屋上裝設之冷氣機（可拆卸）","A地上種植之農作物（未分離）","抵押物因毀損滅失可得行使之賠償金","甲對乙之500萬借款債務"],correct:3,
 exps:["B屋上裝設的冷氣機（雖可拆卸，但已固著在建築物上），屬於建築物的從物或附屬物，抵押權效力及於主物（B屋）的從物，本選項在抵押權效力範圍內。","A地上種植的農作物（未分離，仍是A地的一部分），抵押權效力及於土地的天然孳息（未分離前是主物的成分），本選項在抵押權效力範圍內。","民法881條：抵押物滅失得行使之賠償金（保險金、損害賠償金），視為代替抵押物，抵押權效力及之（物上代位），本選項在抵押權效力範圍內。","（本題答案）甲對乙的500萬借款債務是「被擔保的債務」，而不是「抵押權效力所及的標的物」——抵押權的效力是指「抵押物（擔保標的）」的範圍，包含從物、天然孳息、代償物等，債務本身不是抵押物，當然不在「抵押權效力所及」的討論範圍，本選項正確識別了「非屬抵押權效力所及」的選項。"],
 trap:"「抵押權效力所及之標的物」是指抵押物的相關物（從物、孳息、代償金等），不是指「被擔保的債務金額」——這道題有一個概念層次的陷阱：抵押物（A地、B屋）上有各種附著的東西都在抵押權效力範圍內，但「被擔保的500萬元債務」是另一個層次的概念（債權債務關係），根本不是討論「抵押物效力範圍」時該提的東西。",related:"與100年第29題（抵押物扣押後的租金在抵押效力範圍內）、105年第27題（抵押後新建建築物可併拍但抵押不及於建物價款）同屬抵押權效力範圍主題，三題合併複習。"},
{id:"EDF109",cat:"D6抵押質權占有",year:"107年第6題",q:"債務人甲所有之抵押物上，設有擔保乙200萬元債權之第一次序抵押權、丙120萬元債權之第二次序抵押權及丁80萬元債權之第三次序抵押權。若拍賣所得為250萬元，則下列清償結果，何者正確？",
 opts:["乙150萬元，丙75萬元，丁25萬元","乙200萬元，丙50萬元，丁0元","乙200萬元，丙120萬元，丁0元","乙150萬元，丙80萬元，丁20萬元"],correct:1,
 exps:["抵押權的優先受償按「順位」依次清償（不是平均分配），乙第一順位先取得，本選項說平均分配（各取75%等比例），不是順位清償，錯誤。","（本題答案）第一順位乙（200萬）→從250萬中先取200萬，全額清償；剩下50萬→第二順位丙（120萬）→丙只能拿到剩下的50萬（不足120萬，只有50萬）；最後剩0元→第三順位丁→丁什麼都拿不到。計算：乙200萬、丙50萬、丁0元，敘述正確。","若乙200萬丙120萬都完全清償，合計320萬，但拍賣所得只有250萬，不可能全額清償，本選項超過實際所得，不可能，錯誤。","計算不正確，丁能拿到20萬代表剩餘金額足夠，但乙200+丙80=280，超過250，計算錯誤，不正確。"],
 trap:"多順位抵押權的清償計算：①按順位依序清償（不是按比例）②最高順位先取足額，有餘才給次順位③實際步驟：250萬→乙取200萬→剩50萬→丙取50萬（不足120萬）→剩0→丁0。記憶口訣：「先到先得，按順位，有多少拿多少，拿不到算了」。計算題按步驟走，不要混淆成「按比例分配」。",related:"與99年第29題（乙拋棄抵押權，丙丁依序遞升）同屬多順位抵押清償主題，兩題合併複習可完整掌握多順位抵押的清償計算和順位遞升規則。"},
{id:"EDF110",cat:"D6抵押質權占有",year:"107年第20題",q:"下列何種權利，得為抵押權之標的物？",
 opts:["地上權","不動產役權","著作權","租賃權"],correct:0,
 exps:["（本題答案）民法882條：地上權、農育權及典權，得為抵押權之標的物——地上權「可以」設定抵押，敘述正確。","不動產役權因其從屬性（跟著需役地走，不能單獨存在），「不得」單獨成為抵押標的（103年第28題相同考點），本選項錯誤。","著作權是知識產權，不是民法882條列舉的可以設定不動產抵押的物權，本選項錯誤（著作權可能依著作權法有其他安排，但不是民法抵押的標的）。","租賃權是債權，不是物權，民法882條的抵押標的是特定的「物權」（地上權、農育權、典權），債權（租賃權）不在列，本選項錯誤。"],
 trap:"得為抵押標的物的權利（882條）：地上權、農育權、典權——這三種物權可以設定抵押（以物權擔保）。不動產役權、租賃權、著作權都不是882條的適格抵押標的。這個考點在103年第28題（何者不得）和107年第20題（何者得）以正反兩種問法各考一次，兩題合併是完整的「地農典可抵，其他不行」學習組合。",related:"與103年第28題（何種權利不得單獨成為抵押標的，不動產役權不行）、108年第19題（何者不得為抵押標的，不動產役權）是同一考點的三度出現，三題合併確認自己記住了「地農典可，役權不行」。"},
{id:"EDF111",cat:"D6抵押質權占有",year:"108年第4題",q:"依我國民法的規定，下列關於最高限額抵押權之敘述，何者錯誤？",
 opts:["稱最高限額抵押權者，謂債務人或第三人提供其不動產為擔保，就債務人與債權人一定範圍內之不特定債權，預定一最高限額，由抵押人就該不動產擔保之抵押權","最高限額抵押權所擔保之不特定債權，以由一定法律關係所生之債權或基於票據所生之債權為限","最高限額抵押權，得於原債權確定前，讓與其抵押權擔保之個別債權","最高限額抵押權，不得讓與擔保具有一定關係所生之一切債權（即抵押權整體讓與）"],correct:3,
 exps:["民法881條之1的定義完全正確，敘述正確，非本題答案。","民法881條之1：最高限額抵押所擔保的不特定債權，以由一定法律關係所生之債權或基於票據所生之債權為限，敘述正確，非本題答案。","民法881條之7：原債權確定前，得讓與個別債權，而不影響最高限額抵押（104年第32題相同考點），敘述正確，非本題答案。","（本題答案，敘述錯誤）最高限額抵押權「得」讓與擔保整體（抵押權整體讓與）——民法881條之7規定，最高限額抵押可以整體讓與，本選項說「不得整體讓與」，與法條規定相反，是本題錯誤敘述。"],
 trap:"最高限額抵押的讓與：①個別債權可以讓與（不影響整體抵押）②整體抵押也可以讓與（讓與給其他債權人）。兩種都可以讓與，本題的陷阱是選項D把「得整體讓與」說成「不得整體讓與」，是把允許的說成禁止的典型陷阱。",related:"與99年第30題、103年第30題、106年第23題同屬最高限額抵押主題，四題形成完整的最高限額抵押考點地圖。"},
{id:"EDF112",cat:"D6抵押質權占有",year:"108年第7題",q:"依我國民法的規定，下列關於抵押權之敘述，何者錯誤？",
 opts:["稱普通抵押權者，謂債權人對於債務人或第三人不移轉占有而供其債權擔保之不動產，得就該不動產賣得價金優先受償之權","普通抵押權擔保之範圍，包含利息、遲延利息，以及其他一切從屬於主債務之債務","以土地設定普通抵押權後，由抵押人在其上建造建築物，抵押權人在必要時得將建築物與土地一併拍賣，但對建築物之價款，無優先受償之權","土地之抵押權，其效力及於該土地上建築物之天然孳息"],correct:2,
 exps:["普通抵押（860條）的定義完全正確，敘述正確，非本題答案。","民法861條：普通抵押擔保的範圍包含原債權、利息、遲延利息及其他從屬債務，敘述正確，非本題答案。","（本題答案，敘述錯誤）本選項說的是民法877條的規定，但877條的規定是：土地設定抵押後，抵押人在土地上新建建築物，抵押權人於必要時「得將建築物與土地一併拍賣」，但對建築物之價款「無優先受償之權」——本選項前半段正確，後半段「無優先受償之權」也正確（抵押不及於新建建築物），所以本選項敘述方向是正確的，此為C選項的混淆點。但依官方答案C，可能是因為本選項有某個細節不精確，需以官方答案為準。實際上C選項的內容與877條完全吻合，官方為何選C需保留疑問，建議依官方答案記憶。","土地的抵押權效力及於天然孳息（如農作物，在未分離前是土地的一部分），敘述正確（雖然870條特別提到扣押後才及於孳息，未分離孳息在扣押前後均在效力範圍），非本題答案。"],
 trap:"⚠️ 本題官方答案為C，但C選項的內容（877條抵押後新建物可併拍但抵押不及於建物價款）在法律上看起來是正確的描述。建議直接以官方答案C為準，不要過度深究邏輯，在考場上這種題型以官方答案為最高依據。",related:"與105年第27題（抵押後新建建築物可併付拍賣但抵押不及於建物價款，877條）是同一法條的重複命題，兩題合併複習。"},
{id:"EDF113",cat:"D6抵押質權占有",year:"108年第18題",q:"甲、乙分別共有A地，各有二分之一應有部分。在甲乙未有任何協議之情形下，下列敘述，何者正確？",
 opts:["甲得以其應有部分設定地上權于丙","甲乙得依多數決，就A地全部設定抵押權","甲乙得依多數決，就A地全部設定地上權","甲得以其應有部分設定抵押權于丙"],correct:3,
 exps:["地上權的設定是對應有部分的「處分」——各共有人的應有部分可以自由處分（819條第1項），但設定地上權需要就「特定範圍土地」取得使用收益，在共有物未分管的情況下，就應有部分設定地上權在實務上有一定困難（無法指定使用範圍），通常不可以，本選項不正確。","共有物全部設定抵押（整體處分）需要全體共有人同意（819條第2項），不是多數決，本選項說多數決，錯誤。","共有物全部設定地上權（整體處分）同樣需要全體同意，本選項說多數決，錯誤。","（本題答案）民法819條第1項：各共有人，得自由處分其應有部分——甲以自己的1/2應有部分設定抵押（對應有部分的擔保物權），是對自己份額的自由處分，不需要乙同意，敘述正確。"],
 trap:"再次確認「應有部分可以自由設定抵押，不需要其他共有人同意」（819條第1項）——這個考點在D段已出現多次（104-27、109-16等），配合D6的抵押設定主題再度出現，是D段最高頻的跨主題考點之一。記住：應有部分的自由處分（包含設定抵押）不需要其他共有人同意，整體共有物的處分才需要全體同意。",related:"與104年第27題（共有人就應有部分設定抵押不需他人同意）、109年第16題（應有部分設定抵押不需乙同意）是同一考點的多次重複出題，三題合併確認這個規則。"},
{id:"EDF114",cat:"D6抵押質權占有",year:"108年第19題",q:"下列何者不得為抵押權之標的物？",
 opts:["不動產役權","地上權","農育權","典權"],correct:0,
 exps:["（本題答案）不動產役權因其從屬性（不能脫離需役地單獨存在），「不得」單獨成為抵押標的——這與103年第28題和107年第20題是同一考點的第三次出現，敘述正確（確認不動產役權不能單獨抵押）。","民法882條：地上權得為抵押標的，本選項錯誤（可以設定抵押）。","民法882條：農育權得為抵押標的，本選項錯誤（可以設定抵押）。","民法882條：典權得為抵押標的，本選項錯誤（可以設定抵押）。"],
 trap:"「不動產役權不得單獨為抵押標的」這個考點在16年間出現了三次（103-28問「不得」的是哪個；107-20問「得」的是哪個；108-19再次問「不得」的是哪個），是D6段最高頻的單一考點。務必牢記：地農典可抵押，役權不行。",related:"與103年第28題、107年第20題是同一考點的三度出現，三題合併絕對確認自己記住了「地農典可，役權不行」。"},
{id:"EDF115",cat:"D6抵押質權占有",year:"109年第19題",q:"以建築物設定抵押權者，下列何者非抵押權效力所及之標的物範圍？",
 opts:["抵押物扣押後，抵押人就抵押物所得收取之租金","抵押物扣押前，抵押人就抵押物所得收取之租金","因抵押物受損，依保險契約得請求之保險金","抵押物上設置之通常使用所必要之定著物"],correct:1,
 exps:["民法870條：抵押物扣押後，抵押人就抵押物所得收取之租金，抵押權效力及之（法定孳息在扣押後納入抵押效力範圍），本選項在抵押效力範圍內，非本題答案。","（本題答案）扣押「前」的租金，是抵押人正常使用收益抵押物的結果（在未被扣押前，抵押人仍有使用收益的權利），「不在」抵押權效力範圍內——只有「扣押後」的租金才被納入，本選項正確識別了不在抵押效力範圍的情形。","民法881條：因抵押物受損可得請求之保險金，視為代替抵押物（物上代位），在抵押效力範圍內，非本題答案。","抵押物上設置的通常使用所必要的定著物（如廚房設備、固定裝潢），屬於抵押物的從物或附屬物，在抵押效力範圍內，非本題答案。"],
 trap:"「扣押前vs扣押後」的租金在抵押效力範圍的差異：扣押前→不在範圍（抵押人正常收益）；扣押後→在範圍（870條，抵押人不能再單獨取走租金）。這個「扣押時點」的切換是抵押效力範圍最重要的時間節點，考試反覆用這個切換點製造考題。",related:"與100年第29題（抵押物扣押後的租金在抵押效力範圍）是同一考點，兩題合併確認「扣押後才及於租金」這個規則。"},
{id:"EDF116",cat:"D6抵押質權占有",year:"110年第8題",q:"關於抵押權所擔保而得優先受償之利息，以於抵押權人實行抵押權聲請強制執行前幾年內發生及於強制執行程序中發生者為限？",
 opts:["一年","二年","三年","五年"],correct:1,
 exps:["一年不是法條規定的利息優先受償年限，本選項錯誤。","（本題答案）民法861條第2項：抵押權所擔保之利息，以於抵押權人「實行抵押權聲請強制執行前二年內」發生者，及於強制執行程序中發生者，優先受償——二年是法條明定的利息優先受償年限，敘述正確。","三年不是法條規定的年限，本選項錯誤。","五年是時效消滅後實行抵押的緩衝期（880條），不是利息優先受償的年限，本選項把兩個不同的5年數字混淆了，錯誤。"],
 trap:"抵押權擔保利息的優先受償年限是「二年」（861條第2項），不是一年、三年或五年——「五年」是880條的「時效消滅後5年內仍可實行抵押」，這兩個數字容易混淆。記憶區分：利息優先受償=二年；時效後實行抵押=五年。兩個不同的規定用不同的年限，不要記混。",related:"與106年第37題（時效消滅後5年內仍可實行抵押）、110年第18題（時效完成後抵押實行的5年限制）形成對比：二年（利息優先受償）vs五年（時效後實行抵押），兩個數字必須配合具體條文準確記憶。"},
{id:"EDF117",cat:"D6抵押質權占有",year:"110年第18題",q:"依民法第880條規定，實行抵押權期間以抵押權擔保之債權，其請求權已因時效而消滅，如抵押權人，於消滅時效完成後幾年間不實行其抵押權，其抵押權消滅？",
 opts:["一年","二年","三年","五年"],correct:3,
 exps:["一年不是民法880條規定的年限，本選項錯誤。","二年是利息優先受償的年限（861條第2項），不是880條的年限，本選項把兩個不同的數字混淆，錯誤。","三年不是民法880條規定的年限，本選項錯誤。","（本題答案）民法880條：以抵押權擔保之債權，其請求權已因時效而消滅，如於消滅時效完成後「五年內」不實行其抵押權，其抵押權消滅——時效消滅後給抵押權人5年的緩衝期，5年內不實行→抵押權消滅，敘述正確。"],
 trap:"民法880條的「五年緩衝期」：主債權時效完成後，抵押權不立即消滅，但如果抵押權人在5年內沒有積極實行抵押（聲請拍賣），抵押權就消滅。這個「5年失效」的規定敦促抵押權人在主債權時效完成後的合理時間內採取行動，不能無限期拖延。注意區分：利息優先受償=二年（861條），時效後實行抵押的緩衝=五年（880條）。",related:"與106年第37題（時效消滅後5年內仍可實行抵押）是同一法條的重複命題（一題考正面：5年內可實行；一題考反面：超過5年則消滅），兩題必須合併確認自己真正理解880條的含義。"},
{id:"EDF118",cat:"D6抵押質權占有",year:"112年第13題",q:"抵押權人僅就土地設定抵押權，因債權已屆清償期而未清償而實行抵押權，下列何者錯誤？",
 opts:["於設定抵押權時，該土地上已有建築物者，僅就土地部分拍賣，惟買受人就土地與建築物各自有不同所有人而可能發生糾紛","抵押權之設定，得以不動產所有人以外之債務人設定之（由第三人擔保）","土地設定抵押後，在抵押之土地上建有建築物者，若土地及建築物同屬一人，得就土地與建築物，一併拍賣","抵押物拍賣後，抵押人取得第一次序抵押權人受償後賸餘之金額"],correct:3,
 exps:["土地設定抵押前就有建築物的情形，拍賣土地時，建築物和土地可能分屬不同人（購買土地者得到土地，建築物仍屬原有人），確實可能產生土地和建築物所有人不一致的糾紛（需靠法定地上權解決），敘述正確，非本題答案。","抵押權可以由「第三人」（非債務人本人）提供不動產設定，即物上保證人（以自己的不動產擔保他人的債務），敘述正確，非本題答案。","民法877條：土地設定抵押後新建的建築物，若土地及建築物同屬一人，得一併拍賣（877條），敘述正確，非本題答案。","（本題答案，敘述錯誤）抵押物拍賣後，餘款（賸餘）應歸「抵押人（所有人）」，不是說「抵押人取得第一次序受償後的賸餘」（第一次序是抵押權人，不是抵押人）——本選項用語混淆了「抵押人」（提供擔保的所有人）和「第一次序抵押權人」（優先受償的債權人），導致邏輯不通，是本題錯誤敘述。"],
 trap:"「抵押人」（提供不動產擔保的所有人）vs「抵押權人」（持有抵押權的債權人）這兩個詞容易混淆——本題選項D把「抵押人取得賸餘」說成「取得第一次序抵押權人受償後的賸餘」，但抵押人不是第一次序抵押「權」人，賸餘款歸屬的順序是：各抵押權人按順位受償→最後賸餘歸抵押人（所有人）。這個「人」字的差異是本題的核心陷阱。",related:"與107年第6題（多順位抵押的清償計算）、99年第29題（抵押權人拋棄後順位遞升）同屬多順位抵押清償主題，三題合併複習。"},
{id:"EDF119",cat:"D6抵押質權占有",year:"112年第20題",q:"關於善意占有人之敘述，下列何者錯誤？",
 opts:["善意占有人於本權訴訟敗訴時，自判決確定之日起，視為惡意占有人","善意占有人推定其為適法有此權利","善意占有人依其所受利益，返還其占有物，惟其所受利益已不存在者，無須返還","善意占有人之孳息收取權，若其依所有人之請求返還時，已分離之孳息，不必返還"],correct:0,
 exps:["（本題答案，敘述錯誤）民法958條：善意占有人於本權訴訟敗訴時，自「敗訴判決確定」時起，視為「自始」惡意占有人——不是「自判決確定之日起視為惡意」，而是溯及既往地視為「自始」就是惡意，本選項說「自判決確定之日起」（往後視為惡意），漏掉了「視為自始惡意」（溯及既往）的重要部分，是本題錯誤敘述。","民法943條：善意占有人（動產）推定其為適法有此物權，敘述正確，非本題答案。","民法957條：善意占有人依其所受利益返還，若所受利益已不存在，毋庸返還（不當得利的善意受益人規則），敘述正確，非本題答案。","民法950條：善意占有人收取之孳息，若依所有人請求返還時已分離者，不必返還（善意占有人的孳息收取保護），敘述正確，非本題答案。"],
 trap:"民法958條的「視為自始惡意」（溯及既往）是善意占有人敗訴後最重要的法律效果：敗訴確定後，不是從確定日起算惡意，而是回溯到占有開始時就視為惡意——這個溯及效讓善意占有人需要就整個占有期間的損害負責（不只是判決後），是保護所有人的重要設計。考試常把「溯及既往視為自始惡意」改成「判決確定日起視為惡意」作為陷阱。",related:"與105年第29題（善惡意占有人的損害賠償對比）、106年第28題（無權占有人返還時的費用請求）同屬占有人法律地位主題，三題合併複習。"},
{id:"EDF120",cat:"D6抵押質權占有",year:"113年第12題",q:"甲於自有土地上建造房屋一棟，因積欠乙銀行巨款，土地及房屋遭乙向法院聲請查封拍賣，土地為丙所拍得，房屋為丁所拍得。下列敘述，何者正確？",
 opts:["丙丁間，適用民法第838條之1，推定有租賃關係","丙丁間，適用民法第838條之1，視為有地上權","丙丁間，應適用民法第876條，視為已有地上權之設定","丙丁間，土地及房屋各歸其所有人，彼此間無任何法律關係"],correct:2,
 exps:["民法838條之1的「推定有租賃關係」，適用於「當事人約定讓與」（如賣屋給他人），不適用於「法院拍賣後土地和房屋分屬不同買主」的情形，本選項不正確。","838條之1用的是「推定」不是「視為」，且適用時機不同（讓與，非拍賣），本選項不正確。","（本題答案）民法876條第1項：設定抵押時，土地及其上建築物同屬一人，僅以土地或建築物一方為抵押，抵押物拍賣後，視為已有地上權之設定——本題甲的土地和房屋都被拍賣（各由不同人拍得），依876條，丙（土地）與丁（房屋）之間，視為已有地上權設定（丁的房屋可以繼續在丙的土地上），敘述正確。","如果丙丁之間沒有任何法律關係，丁的房屋就會成為無法律依據的占有，顯然不合理，本選項不正確。"],
 trap:"民法876條的「法定地上權」vs民法838條之1的「推定租賃關係」：876條=拍賣後分屬不同人→視為有地上權（推定的強度更強，且是物權）；838條之1=讓與後分屬不同人→推定有租賃關係（債權）。兩個制度的適用時機不同（拍賣vs讓與）、法律效果不同（地上權vs租賃），考試常把兩者混淆，要記住：拍賣→876條地上權；讓與→838條之1租賃。",related:"與104年第31題（僅以A地設定抵押，拍賣後A地和B屋分屬不同人，視為有地上權設定）是同一法條（876條）的重複命題，兩題合併複習可完整掌握法定地上權的產生情形。"},
{id:"EDF121",cat:"D6抵押質權占有",year:"113年第16題",q:"甲以自有土地設定抵押權予乙，以擔保其債權，該債權之請求權於113年3月1日因時效而消滅。下列敘述，何者正確？",
 opts:["乙之抵押權於時效完成時即消滅","乙之抵押權並不隨債權請求權時效完成而消滅，於時效完成後5年內，乙仍得實行其抵押權","乙之抵押權於時效完成後5年，即自動消滅","乙之抵押權因主債權消滅而消滅（從屬性）"],correct:1,
 exps:["民法880條：時效完成不使抵押權立即消滅，本選項說時效完成時即消滅，與880條規定不符，錯誤。","（本題答案）民法880條：以抵押權擔保之債權，其請求權雖已時效消滅，在時效完成後5年內，乙仍得實行抵押權——113年3月1日時效完成，乙可以在118年3月1日前實行抵押，敘述正確。","超過5年不實行，抵押權才消滅（不是自動消滅，而是因乙超過5年不行使才消滅），本選項說「5年後即自動消滅」的表述過於被動，且時機的描述不夠精確，不是最正確的表述。","時效消滅讓主債權請求權消滅，但民法880條明確排除了「時效消滅就使抵押權隨同消滅」的從屬性效果（特別規定排除一般從屬性），本選項用一般從屬性解釋880條的例外，不正確。"],
 trap:"民法880條是從屬性的「例外」：一般情形下，主債務消滅，抵押（從屬性）應跟著消滅；但時效消滅讓主債務「請求權」消滅（債務仍存在，只是不能請求），這個特殊狀態使抵押權仍然保有一定的效力（5年緩衝），這是880條特別設計打破一般從屬性的場合，需要特別記住這個例外。",related:"與106年第37題、110年第18題是同一考點（880條，時效消滅後5年內仍可實行抵押）的三度出現，三題必須合併複習確認自己真正理解880條的規則及其與從屬性的關係。"},
{id:"EDF122",cat:"D6抵押質權占有",year:"113年第17題",q:"甲向乙銀行貸款新臺幣500萬元，並以甲所有之A地為乙設定普通抵押權，雙方約定債權已屆清償期而未為清償時，乙即取得A地所有權。試問：雙方之約定是否有效？",
 opts:["有效，法律允許雙方依約定以物清償","有效，抵押物所有權可以由當事人依約定移轉","有效，民法允許以物抵債","無效，此乃法律明文禁止之流質契約"],correct:3,
 exps:["雖然「以物清償」（代物清償）在法律上是被允許的，但代物清償需要在「屆期未清償時，雙方同意以特定物代替金錢清償」——「事先約定屆期自動移轉所有權」是「流質契約」（不是一般代物清償），法律明文禁止，本選項不正確。","抵押物所有權「在正常程序下」不能直接由抵押人移轉給抵押權人作為清償（需要經過拍賣程序），「事先約定移轉」是流質契約，禁止，本選項不正確。","「以物抵債」（代物清償）法律允許，但需要在屆期未清償「時」雙方協議（不是事先約定屆期自動移轉），本選項混淆了代物清償（允許）和流質契約（禁止），不正確。","（本題答案）民法873條之1：「約定於債權已屆清償期而未為清償時，抵押物之所有權移屬於抵押權人者，其約定無效」——這是「流質契約」的禁止規定，雙方事先約定未清償就移轉所有權的條款無效，敘述正確（呼應99年第28題的考點）。"],
 trap:"流質契約（873條之1）禁止的是「事先約定屆期未清償自動移轉所有權」，不是禁止「屆期後雙方協議以物抵債（代物清償）」——這兩個行為性質不同：流質契約是事前約定（強制性）；代物清償是事後協議（自願性）。法律允許代物清償，禁止流質契約。本題在考「流質契約無效」這個規則，是99年第28題的重複，在16年間兩次出現，確認這個考點的重要性。",related:"與99年第28題（流質契約約定無效）是同一法條（873條之1）的重複命題，兩題合併確認「流質契約絕對無效」這個考試必考規則。"},
{id:"EDF123",cat:"D6抵押質權占有",year:"113年第18題",q:"甲向乙銀行借貸新臺幣1000萬元，並以甲所有之A屋為乙設定普通抵押權。嗣後，因第三人丙之過失，致A屋全毀。下列敘述，何者正確？",
 opts:["乙得就A屋拍賣，優先受償","乙得就丙應賠償甲之損害賠償金，優先受償","乙得就A屋殘骸優先受償，但乙應先通知丙","甲得以A屋全毀為由，主張抵押權消滅，拒絕還款"],correct:1,
 exps:["A屋已全毀，無法再拍賣（沒有了），本選項說拍賣A屋，物理上已不可能，錯誤。","（本題答案）民法881條（物上代位）：抵押物因毀損滅失，得受之賠償金（如保險金、損害賠償金），視為代替抵押物——丙因過失毀損A屋，甲對丙有損害賠償請求權，乙的抵押權效力及於此損害賠償金（物上代位），乙得就丙應賠甲的損害賠償金優先受償，敘述正確。","物上代位不需要乙通知丙，乙可以直接就賠償金主張優先受償（向丙或甲主張），本選項說須通知丙，不正確。","甲的還款義務來自借款合約（債務不因抵押物滅失而消滅），A屋全毀只影響乙的擔保執行方式，不影響甲的還款義務，本選項說甲得以此拒絕還款，不正確。"],
 trap:"抵押物滅失的「物上代位」（881條）：抵押物滅失（如因第三人侵權），應得的賠償金（損害賠償、保險金）「代替」抵押物，成為抵押權的新標的——抵押權人（乙）可以就賠償金優先受償，不因抵押物已不存在就失去擔保。這個「代替物繼承抵押」的設計保護了抵押權人不因意外失去擔保，是抵押權制度非常重要的維護機制。",related:"與107年第5題（抵押物受損賠償金在抵押效力範圍，物上代位）同屬抵押物滅失物上代位主題，兩題合併複習可完整理解物上代位的適用情形和法律效果。"},
{id:"EDF124",cat:"D6抵押質權占有",year:"114年第18題",q:"關於占有，下列何者錯誤？",
 opts:["占有於我國為事實，而非占有權","無權占有人亦有占有物返還請求權","占有與取得時效有關","占有係依當事人之意思，並無推定效力"],correct:3,
 exps:["我國民法的占有（民法940條以下）是「事實」（事實上管領力），不是一種「權利」（不是所謂的占有權）——這是我國民法的基本定性，跟某些外國法制不同，敘述正確，非本題答案。","民法962條：占有人（包含無權占有人）受不法侵奪，有物上保護請求——無權占有人也有占有物保護請求（「占有保護之訴」），可以對侵奪占有的人主張返還占有物，敘述正確，非本題答案。","民法769-770條：以所有之意思，和平、公然、繼續占有不動產，達一定年限後，得聲請登記取得所有權（取得時效）——占有與時效取得密切相關，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法943條：占有人就其所占有之動產，「推定」其為適法有此權利——占有確實有推定效力（動產的占有推定適法），本選項說「並無推定效力」，與943條規定完全相反，是本題錯誤敘述。"],
 trap:"占有的推定效力（943條）：占有動產的人，推定其有適法的物權（如所有權）——占有「有」推定效力，不是無。本題選項D把有推定效力說成無推定效力，是最直接且最明確的反話陷阱，也是本題最容易識別的錯誤選項。占有的推定效力是占有制度最重要的實質意義之一，在動產交易中保護善意受讓人的核心就是依賴這個推定效力。",related:"與106年第24題（占有推定，動產占有推定適法）是同一法條的重複命題（106-24問何者正確，114-18問何者錯誤），兩題合併是確認自己掌握943條推定效力的完整學習組合。"}
];
const CAT_COLORS={"D1物概念孳息從物":"#8B6914","D2所有權共有登記":"#2A6496","D3拾得遺失添附":"#5C7A4A","D4相鄰通行":"#7A5A2A","D5地上權農育役權典權":"#7C6A8E","D6抵押質權占有":"#A8402B"};
let activeCats=new Set(Object.keys(CAT_COLORS));
let mastery={};let deck=[...CARDS];let idx=0;let flipped=false;let quizStats={ok:0,ng:0};
const chipsEl=document.getElementById('chips');
const resetBtn=document.getElementById('resetBtn');
const cardEl=document.getElementById('card');
const qText=document.getElementById('qText');
const optList=document.getElementById('optList');
const badgeFront=document.getElementById('badgeFront');
const badgeBack=document.getElementById('badgeBack');
const yearFront=document.getElementById('yearFront');
const yearBack=document.getElementById('yearBack');
const badgeMasteryFront=document.getElementById('badgeMasteryFront');
const badgeMasteryBack=document.getElementById('badgeMasteryBack');
const answerBanner=document.getElementById('answerBanner');
const expList=document.getElementById('expList');
const trapText=document.getElementById('trapText');
const relatedText=document.getElementById('relatedText');
const curNum=document.getElementById('curNum');
const totalNum=document.getElementById('totalNum');
const catName=document.getElementById('catName');
const progFill=document.getElementById('progFill');
const quizOk=document.getElementById('quizOk');
const quizNg=document.getElementById('quizNg');
async function loadMastery(){try{const r=await window.storage.get('exam_mastery_d_full_v1');if(r&&r.value)mastery=JSON.parse(r.value);}catch(e){mastery={};}}
async function saveMastery(){try{await window.storage.set('exam_mastery_d_full_v1',JSON.stringify(mastery));}catch(e){console.error('storage save failed',e);}}
function getStat(id){const m=mastery[id];if(!m)return{status:null,attempts:0,correct:0};if(typeof m==='string')return{status:m,attempts:1,correct:(m==='mastered'?1:0)};return m;}
function masteryIcon(stat){if(!stat.status)return'';const icon=stat.status==='mastered'?'✅':'🔄';return stat.attempts>0?`${icon}×${stat.attempts}`:icon;}
function updateOverallStats(){let attempts=0,correct=0,mastered=0;CARDS.forEach(c=>{const s=getStat(c.id);attempts+=s.attempts;correct+=s.correct;if(s.status==='mastered')mastered++;});document.getElementById('totalAttempts').textContent=attempts;document.getElementById('overallAcc').textContent=attempts?Math.round(correct/attempts*100)+'%':'—';document.getElementById('masteredCount').textContent=mastered;document.getElementById('totalCards').textContent=CARDS.length;}
Object.keys(CAT_COLORS).forEach(cat=>{const count=CARDS.filter(c=>c.cat===cat).length;const chip=document.createElement('div');chip.className='chip active';chip.style.background=CAT_COLORS[cat];chip.style.borderColor=CAT_COLORS[cat];chip.style.color='#fff';chip.textContent=`${cat}(${count})`;chip.dataset.cat=cat;chip.addEventListener('click',()=>{if(activeCats.has(cat)){if(activeCats.size===1)return;activeCats.delete(cat);chip.classList.remove('active');chip.style.background='#fff';chip.style.color=CAT_COLORS[cat];}else{activeCats.add(cat);chip.classList.add('active');chip.style.background=CAT_COLORS[cat];chip.style.color='#fff';}rebuildDeck();});chipsEl.appendChild(chip);});
resetBtn.addEventListener('click',()=>{activeCats=new Set(Object.keys(CAT_COLORS));document.querySelectorAll('.chip[data-cat]').forEach(chip=>{const c=chip.dataset.cat;chip.classList.add('active');chip.style.background=CAT_COLORS[c];chip.style.color='#fff';});rebuildDeck();});
function rebuildDeck(){deck=CARDS.filter(c=>activeCats.has(c.cat));idx=0;render();}
function render(){const c=deck[idx];const color=CAT_COLORS[c.cat];flipped=false;cardEl.classList.remove('flipped');qText.textContent=c.q;badgeFront.textContent=c.cat;badgeFront.style.background=color;badgeBack.textContent=c.cat;badgeBack.style.background=color;yearFront.textContent=c.year;yearBack.textContent=c.year;document.querySelector('.face.back').style.borderLeftColor=color;const stat=getStat(c.id);const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;curNum.textContent=idx+1;totalNum.textContent=deck.length;catName.textContent='・'+c.cat;progFill.style.width=((idx+1)/deck.length*100)+'%';optList.innerHTML='';const letters=['A','B','C','D'];c.opts.forEach((opt,i)=>{const div=document.createElement('div');div.className='opt';div.innerHTML=`<span class="letter">${letters[i]}</span><span>${opt}</span>`;div.addEventListener('click',()=>selectOption(i));optList.appendChild(div);});}
function selectOption(i){if(flipped)return;const c=deck[idx];const correct=(i===c.correct);document.querySelectorAll('.opt')[i].classList.add('selected');answerBanner.className='answer-banner '+(correct?'correct':'wrong');const letters=['A','B','C','D'];answerBanner.textContent=correct?`✅ 答對！正解是 ${letters[c.correct]}`:`❌ 答錯了，你選 ${letters[i]}，正解是 ${letters[c.correct]}`;expList.innerHTML='';c.exps.forEach((exp,j)=>{const div=document.createElement('div');div.className='exp-item'+(j===c.correct?' right':'');const mark=j===c.correct?'✓ 正解':'✗';div.innerHTML=`<div class="exp-head">${letters[j]}. ${mark}</div><div>${exp}</div>`;expList.appendChild(div);});trapText.textContent=c.trap||'';relatedText.textContent=c.related||'';if(correct)quizStats.ok++;else quizStats.ng++;const stat=getStat(c.id);stat.attempts+=1;if(correct)stat.correct+=1;stat.status=correct?'mastered':'review';mastery[c.id]=stat;saveMastery();quizOk.textContent=quizStats.ok;quizNg.textContent=quizStats.ng;updateOverallStats();setTimeout(()=>{flipped=true;cardEl.classList.add('flipped');},150);const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;}
cardEl.addEventListener('click',()=>{if(flipped){flipped=false;cardEl.classList.remove('flipped');}});
function goNext(){idx=(idx+1)%deck.length;render();}
function goPrev(){idx=(idx-1+deck.length)%deck.length;render();}
document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('shuffleBtn').addEventListener('click',()=>{for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;render();});
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();});
document.getElementById('markMastered').addEventListener('click',()=>{const c=deck[idx];const stat=getStat(c.id);stat.status='mastered';mastery[c.id]=stat;saveMastery();const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;updateOverallStats();});
document.getElementById('markReview').addEventListener('click',()=>{const c=deck[idx];const stat=getStat(c.id);stat.status='review';mastery[c.id]=stat;saveMastery();const icon=masteryIcon(stat);badgeMasteryFront.textContent=icon;badgeMasteryBack.textContent=icon;updateOverallStats();});
document.getElementById('resetQuiz').addEventListener('click',()=>{quizStats={ok:0,ng:0};quizOk.textContent=0;quizNg.textContent=0;});
document.getElementById('resetMastery').addEventListener('click',async()=>{if(!confirm('確定要清除所有學習記錄？此動作無法復原。'))return;mastery={};await saveMastery();render();updateOverallStats();});
(async function init(){await loadMastery();rebuildDeck();updateOverallStats();})();
</script>
</body>
</html>
