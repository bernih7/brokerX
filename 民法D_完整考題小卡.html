<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>民法概要｜歷屆考題小卡（D・物權編完整版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F8F3E9;--paper-deep:#EFE6D5;--ink:#2A2722;--ink-soft:#7A7165;--rule:#DED1B9;--stamp:#A8402B;--gold:#BC8A2E;--green:#5C7A4A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:radial-gradient(circle at 12% 8%,rgba(188,138,46,.06),transparent 40%),radial-gradient(circle at 90% 95%,rgba(168,64,43,.05),transparent 45%),var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px;}
.wrap{width:100%;max-width:560px;}
header{text-align:center;margin-bottom:14px;}
.case-tag{display:inline-flex;align-items:center;gap:6px;font-family:'Noto Serif TC',serif;font-weight:700;font-size:12px;letter-spacing:.12em;color:var(--stamp);border:1px solid var(--stamp);border-radius:999px;padding:3px 12px;margin-bottom:10px;}
h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:21px;letter-spacing:.04em;line-height:1.5;}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;margin-top:4px;font-family:'Noto Sans TC',sans-serif;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 6px;}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);cursor:pointer;user-select:none;transition:all .15s ease;white-space:nowrap;}
.chip.active{color:#fff;border-color:transparent;}
.filter-row{display:flex;justify-content:center;margin-bottom:8px;}
.filter-row .chip{border-color:var(--ink);color:var(--ink);font-weight:700;font-size:12px;padding:5px 12px;}
.filter-row .chip.active{background:var(--ink);color:#fff;}
.progress{text-align:center;font-family:'Noto Serif TC',serif;font-weight:700;font-size:13px;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:10px;}
.progress b{color:var(--ink);font-size:15px;}
.progress-bar{height:3px;background:var(--rule);border-radius:2px;overflow:hidden;margin:0 auto 18px;max-width:200px;}
.progress-fill{height:100%;background:var(--stamp);transition:width .25s ease;}
.scene{perspective:1800px;width:100%;}
.card{position:relative;width:100%;min-height:540px;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.card.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:1.5px solid var(--rule);background:#fff;display:flex;flex-direction:column;padding:20px;box-shadow:0 4px 18px rgba(42,39,34,.07);overflow-y:auto;}
.face.back{transform:rotateY(180deg);background:var(--paper-deep);}
.face.back{border-left:6px solid var(--cat-color,var(--stamp));}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{font-size:11px;font-weight:700;color:#fff;padding:4px 12px;border-radius:999px;letter-spacing:.06em;font-family:'Noto Serif TC',serif;}
.year-badge{font-size:11px;font-weight:700;color:var(--ink-soft);border:1px solid var(--rule);border-radius:999px;padding:3px 10px;font-family:'Noto Serif TC',serif;}
.mastery-badge{font-size:18px;line-height:1;}
.q-text{font-size:14px;line-height:1.8;margin-bottom:14px;font-weight:500;}
.opt-list{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;gap:8px;padding:9px 10px;border-radius:8px;border:1.5px solid var(--rule);background:#fff;font-size:13px;line-height:1.6;cursor:pointer;transition:all .15s ease;}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--stamp);background:#FBEAE6;}
.opt .letter{font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:12px;}
.hint{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;letter-spacing:.1em;font-family:'Noto Serif TC',serif;}
.answer-banner{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px;padding:10px;border-radius:8px;margin-bottom:12px;}
.answer-banner.correct{background:#EFF4EC;color:var(--green);border:1.5px solid var(--green);}
.answer-banner.wrong{background:#FBEAE6;color:var(--stamp);border:1.5px solid var(--stamp);}
.exp-list{display:flex;flex-direction:column;gap:8px;}
.exp-item{padding:9px 10px;border-radius:8px;font-size:12.5px;line-height:1.75;border:1.5px solid var(--rule);background:#fff;}
.exp-item.right{border-color:var(--green);background:#EFF4EC;}
.exp-item .exp-head{font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.exp-item.right .exp-head{color:var(--green);}
.exp-item:not(.right) .exp-head{color:var(--stamp);}
.extra-box{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.75;}
.trap-box{background:#FBF1E6;border:1.5px solid var(--gold);}
.trap-box .extra-head{color:var(--gold);font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.related-box{background:#EEF1F7;border:1.5px solid #5B7A99;}
.related-box .extra-head{color:#5B7A99;font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;border:1.5px solid var(--ink);background:#fff;color:var(--ink);border-radius:10px;padding:10px 16px;cursor:pointer;transition:all .15s ease;}
.btn:hover{background:var(--ink);color:#fff;}
.btn.primary{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.btn.primary:hover{background:#8c3322;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green);color:#fff;}
.btn.icon{padding:10px 14px;}
.quiz-stats{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:14px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.quiz-stats b{font-family:'Noto Serif TC',serif;}
.quiz-stats .ok{color:var(--green);}
.quiz-stats .ng{color:var(--stamp);}
footer{margin-top:28px;text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.12em;line-height:2;}
footer .reset{text-decoration:underline;cursor:pointer;color:var(--ink-soft);background:none;border:none;font-size:11px;letter-spacing:.12em;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="case-tag">案號 D・物權編完整版</div>
    <h1>民法概要 考題小卡
      <span class="sub">99-114年不動產經紀人考題・共 124 題（D1物概念孳息/D2所有權共有登記/D3拾得添附/D4相鄰通行/D5地上權役權典權/D6抵押質權占有）</span>
    </h1>
  </header>

    <span style="cursor:pointer;text-decoration:underline;" id="resetQuiz">重新測驗</span>

  <div class="quiz-stats">
    <span>累積：已作答 <b id="totalAttempts">0</b> 題次・正確率 <b id="overallAcc">—</b>・已掌握 <b id="masteredCount">0</b>/<b id="totalCards">0</b></span>
  </div>
  <footer>不動產經紀人考試・民法概要｜每題附A-D逐選項詳解＋考試陷阱提醒＋關聯題目<br>
    v1.0　2026-06-23　D1-D6 物權編完整版 124 題<br>
    <button class="reset" id="resetMastery">清除所有「已掌握」標記</button>

</div>
<script>
const CARDS=[
{id:"EDF001",cat:"D1物概念孳息從物",year:"103年第7題",q:"關於天然孳息，下列敘述何者正確？",
 opts:["稱天然孳息者，謂利息、租金及其他因法律關係所得之收益","有收取天然孳息權利之人，按其權利存續期間內之日數，取得其孳息","物之成分及其天然孳息，於分離後，除法律另有規定外，仍屬於其物之所有人","抵押權之效力，及於抵押物扣押後抵押人就抵押物得收取之天然孳息。但抵押權人，非以扣押抵押物之事情，通知應清償天然孳息之義務人，不得與之對抗"],correct:2,
 exps:["「利息、租金及其他因法律關係所得之收益」是「法定孳息」（民法70條第2項）的定義，不是天然孳息——天然孳息是「果實、動物之產物及其他依物之用法所收穫之出產物」（民法70條第1項），本選項把天然孳息與法定孳息混淆，錯誤。","民法70條第1項但書規定：有收取天然孳息權利之人，「以其收取時分離者為限，取得其孳息」——不是按日數比例取得，而是以「收取時分離」為條件，本選項把「按日數比例取得」說法誤套在天然孳息上（這個比例規則適用於「法定孳息」，民法70條第2項），錯誤。","（本題答案）民法811條：動產因附合而為不動產之重要成分者，不動產所有人取得動產所有權；而民法71條：物之成分及天然孳息，於分離後，除法律另有規定外，仍屬於其物之所有人——天然孳息（如果實）分離前是主物的成分，分離後仍屬主物所有人所有（除非有特別規定或約定），敘述正確。","本選項後段（抵押權通知孳息義務人）是民法891條的規定，雖然內容方向正確，但本題問的是「天然孳息」的一般規則，選項C更直接準確地回答這個問題，且本選項前後邏輯較複雜，不如C選項精確。"],
 trap:"天然孳息vs法定孳息的辨別是高頻考點：天然孳息=物自然產生的（果實、農產品、動物幼崽）；法定孳息=因法律關係收取的（租金、利息）。收取規則也不同：天然孳息→收取時已分離者屬於有收取權利之人；法定孳息→依法律關係存續期間的日數比例計算。本題選項A和B刻意互換了兩種孳息的定義和收取規則，是這個考點最常見的陷阱手法。",related:"與111年第19題（無權占有者種植果樹的果實歸屬）、112年第11題（果實自落鄰地的所有權歸屬）同屬孳息與果實歸屬主題，三題合併複習可建立完整的孳息制度知識架構。"},
{id:"EDF002",cat:"D1物概念孳息從物",year:"103年第27題",q:"下列何者不屬於直接占有人？",
 opts:["房屋承租人","土地之典權人","汽車之受委託保管人","為雇主駕駛汽車之司機"],correct:3,
 exps:["房屋承租人實際住在承租的房屋裡，對房屋有實際的事實管領力，是典型的直接占有人，本選項錯誤（它確實是直接占有人）。","典權人支付典價後，對他人不動產有使用收益的權利，典權人直接對典物行使管領力，屬於直接占有人，本選項錯誤。","受委託保管汽車的人，實際持有並管控汽車，對汽車有直接的事實管領力，屬於直接占有人，本選項錯誤。","（本題答案）為雇主駕駛汽車的司機，是「代替雇主」行使對汽車的事實管領力——司機的占有只是在替雇主「行使」占有，並非以自己之意思占有該汽車，依民法942條，受雇人（司機）代替雇主占有汽車，是「間接占有」關係中的「占有輔助人」，不是自己的直接占有人，本選項正確識別了這個非直接占有的情形。"],
 trap:"「直接占有」vs「間接占有」vs「占有輔助人」的辨別是占有制度的核心考點：直接占有人=自己實際管領標的物（如承租人、借用人、典權人）；間接占有人=透過他人（直接占有人）的占有而間接占有標的物（如出租人、出借人）；占有輔助人=受指揮替他人行使事實管領（如受雇司機、受雇保管員），不取得任何形式的占有，只是主人行使占有的「手」。三者的識別關鍵在於「是否以自己意思」占有，受雇司機沒有自主意思，只是工具，不構成任何形式的占有。",related:"與106年第24題（占有之推定規則）、114年第18題（占有之敘述）同屬占有制度主題，建議合併複習建立完整的占有制度架構。"},
{id:"EDF003",cat:"D1物概念孳息從物",year:"106年第2題",q:"下列有關從物之敘述，何者錯誤？",
 opts:["所有權狀為房地不動產之從物","屋頂平台為主物大樓建築之從物","土地共有人出賣房地全棟時，買賣契約效力及於另一共有人原所同意之同宗建築基地依法留設法定保留空地及退縮地之使用權等從權利在內","主物之處分及於從物，於主物與從權利之關係，亦可適用"],correct:1,
 exps:["所有權狀是房地不動產的附屬文件（常助不動產的使用收益或處分），常被認定為不動產的從物，敘述正確，非本題答案。","（本題答案，敘述錯誤）從物的要件是：①非主物之成分②常助主物之效用③與主物通常合為一體（同屬一人所有）。屋頂平台是大樓整棟建築物的一部分（屬於大樓的「成分」，不是獨立存在的從物），依民法68條，應屬於大樓建築物的「成分」而非「從物」；而且依民法799條，區分所有建築物的屋頂平台通常屬於全體區分所有人的共同部分，不是「從物」，本選項說屋頂平台是大樓的從物，與民法成分vs從物的定義不符，錯誤。","這是實務判例的延伸，在不動產交易中，買賣效力可以及於依法留設的保留空地使用權等從權利，敘述符合實務見解。","民法68條第2項：主物之處分及於從物——同樣的規則類推適用於「主物與從權利」的關係（如不動產與其附屬的使用權），敘述正確。"],
 trap:"「從物」需要是獨立的物（非主物的成分），且常助主物效用，與主物同屬一人所有。屋頂平台是建築物整體的一個部分（成分），不是獨立存在的「物」，所以不是從物而是成分。這個「成分vs從物」的辨別是D1段最重要的概念區分：成分（建築物的牆壁、屋頂、地板）是組成整體的一部分，不能獨立存在；從物（鑰匙vs鎖、電視機遙控器vs電視機）是獨立的物但常助主物效用。",related:"與109年第1題（從物的定義要件）同屬主物從物主題，兩題合併可完整掌握從物的識別標準。"},
{id:"EDF004",cat:"D1物概念孳息從物",year:"109年第1題",q:"下列關於法律上之物的敘述，何者正確？",
 opts:["從物在客觀上需常助主物之效用，且與主物為各自獨立之兩個物，動產或不動產均可為從物","物之成分或其天然孳息，分離後原則上屬於該成分或天然孳息之占有人","無權占有他人土地建築房屋，建築完成時，該房屋原則上屬於土地所有人所有","已足避風雨，可達經濟上使用目的，但屋頂尚未完全完工之房屋，屬土地之成分"],correct:0,
 exps:["（本題答案）民法68條第1項：稱從物者，謂非主物之成分，常助主物之效用，而同屬於一人者——從物的三要件：①非主物成分（獨立的物）②常助主物效用③與主物同屬於一人；從物可以是動產也可以是不動產（如房屋的鑰匙是動產從物，附屬停車場是不動產從物），敘述正確。","民法71條：物之成分及天然孳息，分離後，除法律另有規定外，仍屬於其物之所有人——分離後屬於「原物所有人」，不是「占有人」，本選項說「屬於占有人」不正確。","無權占有他人土地建築房屋，依民法811條（附合規則），若房屋附合於土地成為土地的重要成分，土地所有人取得所有權；但若房屋可以獨立存在（不動產附合要件較嚴格），可能仍屬於建造者所有——不是「原則上屬於土地所有人」這麼絕對，本選項表述過於武斷，且依實務見解，建造者通常仍保有房屋所有權，本選項說「原則上屬於土地所有人」不正確。","屋頂尚未完成的房屋，若已足避風雨可達使用目的，依實務見解，原則上已算是「獨立的建築物」（不動產），而非仍屬土地的成分，本選項說「屬土地之成分」不正確。"],
 trap:"這題的四個選項分別測試四個物法基礎概念：①從物的三要件（選A，正確）②天然孳息分離後屬所有人非占有人（選B，錯誤）③無權占有建房的所有權歸屬（選C，並非原則歸土地所有人）④未完工建築的物之性質（選D，已可使用者屬獨立建物非土地成分）。要全部答對需要同時掌握這四個細節知識點，是D1段難度最高的綜合題。",related:"與106年第2題（從物的錯誤識別）同屬從物主題；與103年第7題（天然孳息vs法定孳息）同屬孳息主題，三題合併是D1段最重要的複習組合。"},
{id:"EDF005",cat:"D1物概念孳息從物",year:"110年第16題",q:"關於果實自落於鄰地，而鄰地非為公用地者，下列何者正確？",
 opts:["視為遺失物","視為無主物","視為屬於鄰地所有人","視為屬於原土地所有人"],correct:2,
 exps:["果實自落鄰地不是「遺失物」（遺失物是有主物非出於自願喪失占有），本選項不正確。","果實自落鄰地不是「無主物」（果樹所有人仍有所有權，只是偶然落到鄰地），本選項不正確。","（本題答案）民法812條第2項：果實自落於鄰地者，視為屬於鄰地所有人（但若鄰地為公用地則例外）——這是法律為了維持地界秩序、避免糾紛的特別規定，果實一旦自然落入鄰地，就視為歸鄰地所有人所有，敘述正確。","依民法812條第2項，果實自落鄰地視為鄰地所有人所有，不是原土地所有人，本選項與法條規定相反，錯誤。"],
 trap:"「果實自落鄰地」（812條第2項）是民法的特殊規定，與「天然孳息分離後仍屬原物所有人」的一般原則不同——這個特殊規定打破了一般「孳息屬於有收取權利之人（通常是原地所有人）」的邏輯，改由鄰地所有人取得所有權，是維護土地界線法律秩序的例外設計。考試很愛考這個例外，因為跟一般人的直覺（果樹的果實當然屬於果樹主人）不一樣，容易選錯。",related:"與112年第11題（鄰地為公用地時果實的歸屬，例外情形）是同一法條（812條）正反例外的完整組合，兩題必須合併比對記憶：私有鄰地→鄰地所有人；公有鄰地→果樹所有人。"},
{id:"EDF006",cat:"D1物概念孳息從物",year:"111年第19題",q:"甲無權占有乙之土地種植果樹，其果實歸屬於何人？",
 opts:["果實在與果樹分離前或分離後，均屬於甲所有","果實在與果樹分離前或分離後，均屬於乙所有","果實在與果樹分離前屬於甲所有，分離後屬於乙所有","果實在與果樹分離前屬於乙所有，分離後屬於甲所有"],correct:1,
 exps:["果樹的果實屬於果樹的天然孳息，天然孳息的所有人是「有收取天然孳息權利之人」或「果樹所有人」——但本題果樹是甲「種植」在乙的土地上（無權占有），果樹本身依添附規則（民法811條）成為乙土地的重要成分，所以果樹的所有人是乙（不是甲），果樹的孳息（果實）當然也屬於乙，甲對果實沒有所有權，本選項說「均屬於甲」錯誤。","（本題答案）甲無權占有乙的土地種植果樹，果樹依附合規則（民法811條）成為乙土地的重要成分，所有權歸乙所有；果樹的天然孳息（果實）分離前是果樹的成分（仍屬乙），分離後依民法71條，仍屬於果樹所有人（乙），故果實不論分離前後均屬於乙，敘述正確。","果實分離前屬於乙（乙是果樹所有人），分離後也仍屬於乙（71條），不會「分離後屬甲」，本選項錯誤。","果實分離前後均屬於乙（果樹所有人），「分離前屬乙，分離後屬甲」沒有法律依據，本選項錯誤。"],
 trap:"這題的思考順序是：①甲無權占有乙的土地→②甲在乙土地種的果樹，依附合（811條）歸乙所有（果樹成為土地重要成分）→③果樹所有人是乙→④果樹的天然孳息（果實）分離後仍屬果樹所有人（乙，71條）。所以答案是B：果實不論分離前後都屬乙。考試很愛設計這種「層層推導」的題型，要先搞清楚「果樹所有人是誰」，再推導「果實所有人是誰」，不能跳步。",related:"與103年第7題（天然孳息分離後屬原物所有人）、110年第16題（果實自落鄰地歸屬）同屬果實孳息歸屬主題，三題形成完整的孳息所有權知識體系。"},
{id:"EDF007",cat:"D1物概念孳息從物",year:"112年第2題",q:"有關權利客體之敘述，下列何者錯誤？",
 opts:["甲未經乙的同意在乙的土地上種植樹木，該樹木為乙土地上之部分","甲飼養一頭母牛，後來該母牛生下一頭小牛，小牛所有權仍屬於甲所有","為收容災民而臨時拼裝之貨櫃屋，仍為定著物，性質上為不動產","主物之處分效力及於從物，所以購買汽車之契約效力及於備胎"],correct:2,
 exps:["甲在乙土地上種植的樹木，依附合規則（民法811條）成為乙土地的重要成分，樹木屬於乙土地的一部分，敘述正確，非本題答案。","小牛是母牛的天然孳息（動物之產物），母牛所有人甲取得小牛所有權，敘述正確，非本題答案。","（本題答案，敘述錯誤）「定著物」是指固著於土地且非以臨時性目的附著的建築物（如一般房屋、橋梁），為不動產；但「臨時性」的拼裝貨櫃屋（為收容災民，明顯具有臨時性質，可以移動），不符合「定著物」的固著性要件，應認定為動產而非不動產，本選項說「仍為定著物，性質上為不動產」不正確。","民法68條第2項：主物之處分及於從物——購買汽車（主物）的買賣契約效力，確實及於備胎（從物，常助汽車效用的附屬配件），敘述正確，非本題答案。"],
 trap:"「定著物」（不動產，民法66條第1項）的認定標準：需要「固著」在土地上，且不是以「臨時性」目的附著——臨時性搭建的建築（如颱風後搭的帳篷、臨時工寮、救災用貨櫃屋）通常不認定為定著物，因為缺乏永久附著的意圖。這個「臨時性vs永久性」的判斷是不動產定義的重要細節，考試愛用「特殊情況的建築物是否算不動產」來製造陷阱。",related:"與109年第1題（屋頂未完工的建築物性質）、114年第6題（動產不動產的定義範疇）同屬物之定義與分類主題，三題合併複習可完整掌握不動產認定的各種邊界情形。"},
{id:"EDF008",cat:"D1物概念孳息從物",year:"112年第11題",q:"果實自落於鄰地者，果實之所有權為鄰地所有權人所有，倘鄰地係公有用地時，該自落之果實為何人所有？",
 opts:["國家所有","該果實為無主物，誰先占即取得所有","為該果實之果樹所有權人所有","由國家及果樹所有權人所共有"],correct:2,
 exps:["公有用地的情形下，果實不自動歸國家所有——民法812條第2項但書規定了例外，本選項不正確。","果實有原所有人（果樹所有人），不是無主物，不適用先占取得，本選項不正確。","（本題答案）民法812條第2項：果實自落於鄰地者，視為屬於鄰地所有人。但鄰地係公用地者，仍屬於果實之所有人——若鄰地是公用地（國有公有道路、廣場等），法律不讓果實歸公有，而是仍然屬於果樹（原物）所有人，以保護私有財產的合理期待，敘述正確。","不是共有，是全部屬於果樹所有人（但書規定很明確：仍屬於果實之所有人），本選項不正確。"],
 trap:"這題和110年第16題構成「果實自落」法條（812條）的正反一組完整考題：一般情況（鄰地為私有地）→果實屬於鄰地所有人；例外情況（鄰地為公用地）→果實仍屬果樹所有人。這個但書例外設計的邏輯是：公有地不應因為偶然的自落事件而獲得私有財產利益，應把果實返還給果樹的合理所有者。",related:"與110年第16題（鄰地非公用地時果實歸鄰地所有人）是同一法條的正反一組，兩題必須合併記憶才能完整掌握812條的全貌。"},
{id:"EDF009",cat:"D2所有權共有登記",year:"99年第21題",q:"下列有關公同共有之情形，何者不能準用分別共有之規定？",
 opts:["公同共有物之分割","公同共有人應有部分之自由處分","公同共有人對第三人之請求","公同共有物之管理"],correct:1,
 exps:["公同共有物的分割在公同關係消滅後可以進行，且民法830條規定可以準用分別共有的分割規則，敘述正確（可以準用），非本題答案。","（本題答案）公同共有人沒有「應有部分」的概念——公同共有是因公同關係（如夫妻共同財產制、合夥財產、繼承）而產生，各共有人的份額不分割，沒有各自獨立計算的應有部分，所以「公同共有人應有部分之自由處分」這個概念根本不存在於公同共有制度中，不能準用分別共有（分別共有才有應有部分的概念），本選項正確識別了不能準用的情形。","公同共有人對第三人的請求（如所有物返還請求）可以準用分別共有的相關規定，敘述正確（可以準用），非本題答案。","公同共有物的管理，依民法828條準用分別共有的管理規定，敘述正確（可以準用），非本題答案。"],
 trap:"公同共有vs分別共有的根本區別：分別共有有「應有部分」（每人的份額明確，如各持1/3），各人可以自由處分自己的應有部分；公同共有「沒有應有部分」（所有人共同持有不分割的整體），各人不能單獨處分自己的「份額」（因為根本就沒有各自的份額）。公同共有的典型例子是繼承財產（還沒分割前，繼承人全體對遺產公同共有）。這個「有/無應有部分」是公同共有和分別共有最根本的差異，也是這題的核心陷阱。",related:"與106年第22題（公同共有之敘述）同屬公同共有主題，兩題合併複習可完整掌握公同共有的特性。"},
{id:"EDF010",cat:"D2所有權共有登記",year:"99年第23題",q:"甲乙丙丁共有土地1筆，應有部分各為四分之一，以下關於分管契約之敘述何者錯誤？",
 opts:["分管契約乃約定特定部分之共有人取得所有權之契約","分管契約得由全體共有人協議訂定","分管契約訂定後，各共有人得請求履行分管契約","分管契約得因共有人應有部分之移轉，對受讓人亦生效力"],correct:0,
 exps:["（本題答案，敘述錯誤）分管契約是共有人約定各自「占有使用」特定部分的契約，不是約定取得所有權——分管後各共有人仍然是共有關係，只是各自使用指定的特定部分，所有權仍是共有形態，本選項把「分管（使用管理）」誤解為「取得所有權」，根本概念錯誤。","分管契約由全體共有人協議訂定（需要全體同意），敘述正確，非本題答案。","分管契約訂定後，各共有人得請求其他共有人履行（依約各自使用指定部分），敘述正確，非本題答案。","依民法826條之1，分管契約經登記後，對應有部分受讓人有效；未登記但受讓人知情者亦有效，敘述方向正確，非本題答案。"],
 trap:"分管契約=約定「如何使用共有物」的契約（各人使用哪一部分），不是約定「如何取得所有權」——分管後仍然是共有，只是有了使用管理的分工。這個「使用管理的分工」和「所有權的取得」是完全不同的概念，混淆這兩者是本題的核心陷阱，也是不動產業務中很常見的誤解（客戶常以為分管就是「各自擁有」）。",related:"與101年第14題（分管契約的各種規則）、111年第14題（分管契約情事變更的法院裁定）同屬分管契約主題，三題合併複習可完整掌握分管制度。"},
{id:"EDF011",cat:"D2所有權共有登記",year:"99年第24題",q:"XYZ三人共有土地1筆，各有應有部分三分之一，三人協議分割該筆土地，於6月2日達成協議，8月1日辦理分割登記完畢，試問分別共有關係於何時消滅？",
 opts:["6月2日","8月1日","三人完成分割占有後","法院判決確定後"],correct:1,
 exps:["6月2日是達成協議的日期，但不動產共有關係的消滅不是以協議日為準，而是以登記為準（物權行為以登記為生效要件），本選項不正確。","（本題答案）共有土地的分割，性質上是不動產物權的「變動」，依民法758條，不動產物權變動非經登記不生效力——辦理分割登記完畢（8月1日），各人取得分割後的獨立所有權，共有關係自此消滅，敘述正確。","完成分割占有不影響不動產所有權的移轉（不動產以登記，不以交付為物權變動要件），本選項錯誤。","本題是協議分割（不是訴訟分割），不需要法院判決，本選項不適用。"],
 trap:"不動產共有關係消滅的時點是「辦理分割登記完畢」，不是「達成協議」——不動產物權變動採登記主義，協議是債權行為（合意），登記才是物權行為（所有權確定歸屬）。即使所有人已經達成分割協議，在完成登記前，法律上仍然是共有狀態（物權層面沒有變動）。這個「協議時vs登記時」的時間點差異是本題的核心，也是理解不動產物權法的基礎。",related:"與102年第4題（買賣契約何時成立）、113年第13題（所有權何時取得）同屬「債權行為vs物權行為」主題，三題合併複習是理解債物二分法的最佳組合。"},
{id:"EDF012",cat:"D2所有權共有登記",year:"100年第22題",q:"下列何者，非基於所有權而發生之請求權？",
 opts:["所有物返還請求權","所有權之妨害除去請求權","所有權之妨害預防請求權","損害賠償請求權"],correct:3,
 exps:["所有物返還請求權（民法767條第1項前段）：所有人對無權占有或侵奪其所有物者，得請求返還之——直接基於所有權而生的請求權，敘述正確（是基於所有權），非本題答案。","妨害除去請求權（民法767條第1項中段）：所有人對妨害其所有權者，得請求除去之——直接基於所有權而生，敘述正確，非本題答案。","妨害預防請求權（民法767條第1項後段）：所有人對有妨害其所有權之虞者，得請求防止之——直接基於所有權而生，敘述正確，非本題答案。","（本題答案）損害賠償請求權是基於「侵權行為」或「債務不履行」而生（民法184條、226條等），不是直接基於所有權本身而產生的請求權——所有人受損可以請求損害賠償，但這個賠償請求的法律依據是侵權行為法，不是所有權的固有效力，本選項正確識別了「非基於所有權」的請求權類型。"],
 trap:"民法767條的「所有物返還請求權、妨害除去請求權、妨害預防請求權」三種都是「直接基於所有權」的物上請求權，這是所有權這個「物權」自帶的排他保護機制；而「損害賠償請求權」是基於侵權行為或債務不履行的「債權」性質請求，兩者的性質（物上請求權vs債權請求）和時效規則（物上請求權在登記財產上不適用消滅時效vs損害賠償請求有時效）都不同，這個區分是物權法的基本架構認識。",related:"與102年第21題（所有物返還請求權的消滅時效問題）、113年第6題（已登記不動產所有物返還請求無消滅時效）同屬物上請求權主題，三題合併可建立完整的所有人物上請求權知識架構。"},
{id:"EDF013",cat:"D2所有權共有登記",year:"100年第28題",q:"甲將其所有之A車借給乙，不久卻將A車贈與給乙，則甲對乙得以何種方式交付A車？",
 opts:["現實交付","簡易交付","占有改定","指示交付"],correct:1,
 exps:["現實交付是指出讓人將動產的實際管領移交給受讓人，但本題A車已在乙手中，不存在「再次實際移交」的空間，本選項不適用。","（本題答案）民法761條第2項：受讓人已占有動產者，於讓與合意時，即生移轉效力，稱為「簡易交付」——乙已因借用而占有A車（乙已是A車的直接占有人），甲再將A車贈與乙時，雙方達成讓與合意（贈與），此時乙的占有性質從「借用占有」改變為「所有人占有」，無需再次物理移交，簡易交付即完成所有權移轉，敘述正確。","占有改定是指出讓人讓與動產所有權後，仍繼續占有該動產（如甲賣出A車但繼續持有），此時讓與人持有的性質從「所有人占有」變為「他主占有」，本題情境相反（是受讓人乙已占有，不是甲繼續占有），不適用。","指示交付（返還請求權讓與，民法761條第3項）是指動產由第三人占有時，讓與人讓與其對第三人的返還請求權來完成交付，本題動產在乙本人手中（不是第三人手中），不適用。"],
 trap:"四種動產交付方式的情境識別：①現實交付→直接物理移交②簡易交付→受讓人已占有動產，讓與合意時即生效③占有改定→讓與後出讓人仍繼續占有（身分從所有改為他主）④指示交付→動產在第三人手中，讓與返還請求權完成交付。本題的關鍵是「乙已在占有A車」→「受讓人已占有」→適用「簡易交付」。這四種交付方式是D段高頻考點，必須逐一記住適用情境。",related:"與112年第10題（受讓人已先占有動產的交付方式名稱）是同一法條（761條第2項）的重複出題，兩題合併可確認自己記住了「簡易交付」這個名稱及其要件。"},
{id:"EDF014",cat:"D2所有權共有登記",year:"101年第14題",q:"甲、乙、丙三人分別共有一筆A土地。三人就A地約定各自得使用之特定部分，且於二十年內不得請求分割。下列敘述何者最正確？",
 opts:["甲得將其應有部分讓與第三人丁，丁受應有部分讓與時，對分管契約及不分割契約，在受讓時知情者，仍受拘束","分管契約得由多數決通過，不須全體共有人同意","不分割契約訂定後，任何一方均不得請求分割","依不分割契約，共有物分割請求權永久受到限制"],correct:0,
 exps:["（本題答案）分管契約與不分割契約在「未登記但受讓人知情」的情形下，對受讓人仍有拘束力（民法826條之1第1項）——甲讓與應有部分給丁，丁「知情」（受讓時知悉有分管及不分割約定），則丁受分管與不分割約定的拘束，敘述正確。","分管契約（確定各人使用特定部分的管理方式）依通說需要「全體共有人同意」（不適用多數決），本選項說可以多數決通過，不正確。","不分割契約訂定後，共有人在約定期間內不得請求分割（有效），但「任何一方均不得請求分割」的說法需要更仔細的限制——若情事變更有不分割的重大事由，法院得裁定分割，本選項表述過於絕對。","民法823條第2項：共有人以契約訂有不分割期限者，不得超過五年——超過5年的不分割約定，就超過部分無效（縮減為5年），不是「永久限制」，本選項說「永久受限制」明顯與法條不符，錯誤。"],
 trap:"不分割契約的期限上限是「5年」（民法823條第2項），超過5年的部分無效——這是本題選項D的核心陷阱，很多人不知道不分割契約有5年的上限。另外分管契約需要全體共有人同意（不能多數決，選項B的陷阱），以及未登記的分管/不分割約定對知情受讓人仍有效（選項A，本題答案）。這三個規則需要同時掌握才能正確解答本題。",related:"與99年第23題（分管契約的本質）、111年第14題（分管契約情事變更裁定變更）同屬共有物管理主題，三題合併複習可建立完整的分管契約規則地圖。"},
{id:"EDF015",cat:"D2所有權共有登記",year:"102年第21題",q:"甲所有的A屋蓋在乙已登記的B地上18年。下列敘述何者正確？",
 opts:["乙可向甲主張B地的所有物返還請求權","甲已時效取得B地之所有權","甲可時效取得B地之地上權","甲已取得B地之所有權，蓋甲已占有長達18年"],correct:0,
 exps:["（本題答案）乙是B地的登記所有人，甲無權占有乙的B地建房，乙可以依民法767條（所有物返還請求權）向甲請求返還B地——且已登記不動產的所有物返還請求權，依民法769條等，不適用消滅時效（登記不動產的物上請求權不因不行使而消滅），乙的請求權不因18年未行使而消滅，敘述正確。","甲不可能時效取得乙「已登記」B地的所有權——民法769條規定的時效取得，只適用於「他人未登記」的不動產（占有他人未登記不動產達20年，可聲請登記取得所有權），乙的B地已登記，甲無法透過時效取得其所有權，本選項錯誤。","地上權的時效取得（民法772條準用769條）同樣有「占有達一定期間」的要件，但對於「已登記」土地，時效取得同樣受限（需要是未登記土地）——本題乙的B地已登記，甲不能時效取得地上權，本選項錯誤。","占有18年不能使甲取得已登記B地的所有權（需要是未登記且占有達20年），本選項錯誤。"],
 trap:"時效取得不動產的最重要限制：只能對「他人未登記的不動產」主張時效取得（民法769條），對「已登記的不動產」不能時效取得。這是因為不動產登記制度的公示公信目的——已登記的不動產，土地登記簿公開記載所有人，第三人可以查閱，占有者不能主張不知情。另外，已登記不動產的所有物返還請求權不適用消滅時效，出租人乙18年不主張也沒有時效問題。",related:"與113年第6題（無權占有已登記土地15年，所有物返還請求是否罹於時效）同屬已登記不動產時效問題，兩題合併可完整掌握「已登記不動產→不能時效取得、物上請求不罹時效」這個重要規則。"},
{id:"EDF016",cat:"D2所有權共有登記",year:"103年第16題",q:"關於共有物分割，下列敘述何者正確？",
 opts:["共有物依共有人協議分割時，並不適用多數決原則","共有人以契約訂有不分割之特約，其期限無論多長，均有效","各共有人之分割請求權，因共有人二十年間不行使而消滅","共有人提起分割共有物之訴，被告中縱有一人死亡，法院得仍對其他被告共有人判決分割"],correct:0,
 exps:["（本題答案）協議分割共有物，需要「全體共有人同意」才能達成協議，不是多數決——如果要採多數決，只能透過法院訴訟分割（裁判分割），協議分割本身需要全體合意，敘述正確。","民法823條第2項：不分割特約不得超過5年——超過5年的部分無效，本選項說「無論多長均有效」與法條規定相反，錯誤。","共有人的分割請求權，依通說與民法769條之精神，不適用消滅時效（共有人隨時可以請求分割），本選項說20年消滅不正確。","訴訟分割共有物（裁判分割）是固有必要共同訴訟，全體共有人都必須是當事人（民事訴訟法56條第1項），若被告中有人死亡，訴訟需等繼承人承受訴訟後繼續，不能只對其他被告判決，本選項不正確。"],
 trap:"共有物分割的兩條路：①協議分割（全體同意）②裁判分割（訴訟，多數同意但法院有裁量），兩條路的共同點是「不適用消滅時效」（分割請求權不會因時間經過而消滅），以及「不分割特約最多5年」（超過部分無效）。考試常考「協議分割需全體同意vs裁判分割訴訟」的差異，以及5年上限、訴訟程序的必要共同訴訟等細節。",related:"與99年第24題（分割登記時共有關係消滅）、113年第14題（分割共有物訴訟的效力）同屬共有物分割主題，三題合併複習可建立完整的共有物分割程序架構。"},
{id:"EDF017",cat:"D2所有權共有登記",year:"103年第20題",q:"甲自行出資建造違章建築房屋一幢，將之出售予乙，並已交付乙占有。但事後甲對乙主張其為所有權人，請求乙返還房屋。下列敘述，何者正確？",
 opts:["甲出資建造，自始取得違章建築之所有權，甲之請求有理","乙購買取得違章建築之所有權，甲之請求無理","甲出資建造，自始取得違章建築之所有權，甲出賣後，乙無法辦理登記，故甲得主張返還","甲出資建造取得所有權，但甲已出賣且交付，乙已取得占有，甲之請求無理由"],correct:3,
 exps:["甲出資建造確實自始取得所有權（原始取得），但甲已出賣給乙並交付（債權行為有效，且動產以交付移轉所有權——房屋是不動產但未登記，實務視為事實上的所有權已移轉），甲的返還請求無理，本選項只說前半段（有所有權），忽略了後半段（已讓與），不夠完整。","乙購買並取得占有，在「事實上所有權」層面乙已取得，但違章建築無法辦理所有權登記，嚴格說乙取得的是「事實上所有權」而非完整的登記所有權，本選項說乙「取得所有權」需要更精確的說明，且這個選項表述不夠精準，不是本題最佳答案。","乙無法辦理登記是事實，但這不是甲可以請求返還的理由——乙的占有有買賣及交付為基礎（有合法來源），甲不能以「乙沒有登記」為由要求返還，本選項邏輯不正確。","（本題答案）甲出資建造取得原始所有權（事實上所有權）；甲出賣且已交付乙→乙取得「事實上所有權」（雖無法登記，但在買賣關係下已有合法占有基礎）；甲再主張返還，因甲已依買賣關係讓與所有權並交付，甲已無正當的返還請求依據，甲之請求無理，敘述正確。"],
 trap:"違章建築（未辦理建物所有權第一次登記的建物）的所有權問題：建造者取得「事實上所有權」（原始取得），可以出賣、交付，買受人取得「事實上所有權」；但因無法辦理登記，這個所有權只能靠「交付」和「占有」維護，無法對抗有登記的第三人。本題的核心是：甲既已出賣且交付，就失去了請求返還的正當性，不能以「乙沒有登記」為由要回房屋。",related:"與107年第22題（違章建築所有權的取得方式）、109年第12題（買賣違章建築的法律關係）同屬違章建築主題，三題合併複習可完整掌握違章建築的所有權規則及交易法律關係。"},
{id:"EDF018",cat:"D2所有權共有登記",year:"103年第33題",q:"夫妻之財產及所得，除特有財產外，合併為共同財產者，屬於下述何種所有型態？",
 opts:["夫妻公同共有","夫妻分別共有","夫妻個別單獨所有","共同財產之管理歸屬男方"],correct:0,
 exps:["（本題答案）夫妻共同財產制（民法1031條）：夫妻財產合併為共同財產，屬於夫妻「公同共有」——夫妻共同財產不是分別共有（沒有各自的應有部分），而是全體合一的公同共有，與繼承財產（未分割前為公同共有）的性質相同，敘述正確。","分別共有有各自的應有部分，夫妻共同財產制的財產是合一的公同共有，沒有各自的應有部分，本選項不正確。","夫妻共同財產制是共有（公同共有），不是各人單獨所有，本選項不正確。","現行法夫妻共同財產的管理，除契約另有規定外，由夫妻共同管理（已廢除夫管理財產的舊法規定），本選項說歸屬男方，與現行平等規定不符，且題目問的是所有型態，本選項偏離題意。"],
 trap:"「公同共有」的常見情形：①遺產未分割前，繼承人公同共有②夫妻共同財產制下的共同財產③合夥財產（合夥人公同共有）。這三種公同共有情形是考試常出的識別題。相對地，「分別共有」是一般共有（如多人共同購買不動產，各持一定比例的應有部分）。記憶重點：公同共有=共同關係下的合一共有（無應有部分）；分別共有=各自有應有部分的共有。",related:"與99年第21題（公同共有不能準用分別共有的情形）、106年第22題（公同共有人不得請求分割）同屬公同共有主題，三題合併複習可建立完整的公同共有制度架構。"},
{id:"EDF019",cat:"D2所有權共有登記",year:"104年第1題",q:"甲與乙通謀虛偽意思表示，將甲所有之A地賣予乙並移轉登記為乙所有。嗣後乙擅自將A地出賣丙，並完成移轉登記，惟丙不知情。A地之所有權應屬何人？",
 opts:["甲","丙","乙","均不屬任何人"],correct:1,
 exps:["通謀虛偽買賣（甲乙）無效→A地所有權在法律上仍屬甲；但乙（雖無所有權）已移轉登記給丙，若丙善意（不知情），丙可以受到登記公信力的保護——本選項說屬甲，是在丙惡意（知情）的情況下才成立，但本題明確說「丙不知情」（善意），故A地應歸丙，本選項不正確。","（本題答案）民法759條之1（不動產登記的公信力）：不動產善意受讓人信賴登記取得不動產物權者，受法律保護——丙善意（不知甲乙通謀虛偽）信賴登記（乙登記為所有人）而購買A地並完成移轉登記，丙受公信力保護，終局取得A地所有權，甲不能再追討，敘述正確。","乙是無所有權的無權處分人（甲乙通謀虛偽買賣無效，A地仍屬甲），乙本身不能終局取得所有權，本選項不正確。","A地歸丙所有，不是「均不屬任何人」，本選項不正確。"],
 trap:"不動產登記的公信力（759條之1）保護善意受讓人：即使登記記載有誤（如乙是透過虛偽行為登記的），善意信賴登記的第三人（丙）仍可取得所有權，真正所有人（甲）無法追討——這是不動產登記制度維護交易安全的核心設計。要點：通謀虛偽→乙無所有權；但丙善意+信賴登記+完成登記→丙受公信力保護取得所有權→甲的損失只能向乙追償。",related:"與104年第2題（丙再賣給丁，丁取得所有權）是同一情境的延續題，兩題合併可建立「通謀虛偽→公信力保護善意第三人」的完整推理鏈。"},
{id:"EDF020",cat:"D2所有權共有登記",year:"104年第2題",q:"承上題，嗣後丙將A地又賣給丁，並完成移轉登記。A地之所有權應屬何人？",
 opts:["甲","乙","丙","丁"],correct:3,
 exps:["甲在104年第1題已確認喪失對丙的追討權（丙善意受公信力保護取得所有權），甲對丁更無從主張，本選項不正確。","乙無所有權，乙對丁也沒有任何主張的基礎，本選項不正確。","丙雖已善意取得A地所有權，但丙再將A地賣給丁並完成登記，所有權移轉給丁，丙不再是所有人，本選項不正確。","（本題答案）丙已確定取得A地所有權（善意受讓），丙再移轉給丁（完成登記），丁取得A地所有權——丁無論是否知情甲乙的通謀虛偽，都可以確定取得A地所有權（因為丙已是合法所有人，丙移轉給丁是有權處分），敘述正確。"],
 trap:"這題是104年第1題的延伸——丙（善意）已確定取得A地，丙是合法所有人；丙再賣給丁，是有權處分（丙有所有權），丁當然取得所有權，不論丁是否知情甲乙的虛偽意思表示（因為丙本身的取得是合法的，問題到丙這一層就已解決了）。這個「善意受讓後再轉讓」的分析是不動產公信力的重要延伸應用，也是考試的進階考點。",related:"與104年第1題（丙善意受讓取得所有權）形成上下題連貫的推理組合，兩題一起讀才能完整理解「通謀虛偽→公信力→善意人取得→再轉讓確定」的完整法律推論鏈。"},
{id:"EDF021",cat:"D2所有權共有登記",year:"104年第26題",q:"甲將其單獨所有之土地的特定部分出售予乙後，如該土地無不可分割之限制時，乙得如何請求甲履行其移轉所有權之義務？",
 opts:["乙得向法院請求命甲直接就特定部分辦理所有權登記","乙得先請求甲將A土地依協議分割，再辦理所有權移轉登記","乙得向法院請求先行宣告甲對特定部分之所有權無效，再辦理登記","乙得向甲直接請求損害賠償，不得再請求移轉所有權"],correct:1,
 exps:["土地的「特定部分」不能單獨成為所有權登記的對象（土地登記是以一筆土地為單位）——乙要取得甲土地特定部分的所有權，必須先將土地「分割」成獨立的一筆後，才能辦理所有權移轉登記，不能直接就「特定部分」辦理登記，本選項不正確。","（本題答案）乙購買甲土地的特定部分，要取得所有權，必須先進行土地分割（將甲的土地分成兩筆：一筆是賣給乙的特定部分，另一筆是甲保留的部分），分割後才能就乙的那筆辦理所有權移轉登記，敘述正確。","宣告所有權無效沒有法律依據，不動產所有權的移轉是透過登記而非法院宣告使原所有權無效，本選項不正確。","乙有權請求甲繼續履行（移轉所有權），不只是請求損害賠償，本選項過於限縮乙的救濟選項，錯誤。"],
 trap:"土地「特定部分」的買賣，出賣人有先辦理土地分割的義務——土地登記制度以「一筆土地」為最小單位，無法就某筆土地的一部分直接辦理移轉登記，必須先透過分割（協議分割或裁判分割）把那一部分獨立成一筆新土地，才能登記所有權移轉。這是不動產業務中非常實際的知識點，也是考試常考的程序性問題。",related:"與99年第24題（分割登記時共有關係消滅）、103年第16題（協議分割需全體同意）同屬共有物分割程序主題，三題合併複習可建立完整的土地分割移轉程序認知。"},
{id:"EDF022",cat:"D2所有權共有登記",year:"104年第27題",q:"甲、乙、丙三人各有應有部分三分之一分別共有A地。下列敘述，何者正確？",
 opts:["甲得以其應有部分供第三人丁設定不動產役權，但須得乙丙同意","甲得以其應有部分為第三人丁設定抵押權，不須經乙丙同意","依民法規定，分別共有之共有人，均負義務對外對第三人提出請求","依多數決，甲乙得對A地進行重大修繕，無須丙同意"],correct:1,
 exps:["共有人就其「應有部分」設定不動產役權，屬於對自己應有部分的處分行為——但不動產役權是設定在「特定土地」（需役地或供役地），對「應有部分」設定不動產役權在實務上有爭議（因為役權通常依附在土地整體，而非應有部分），本選項說法需要具體情境判斷，且無論如何，就自己應有部分的處分（原則上）不需要其他共有人同意，本選項說「須得乙丙同意」可能不正確。","（本題答案）民法819條第1項：各共有人，得自由處分其應有部分——甲以其1/3應有部分設定抵押權，是對自己應有部分的處分，不需要乙丙同意，敘述正確。","共有人對第三人提出請求（如所有物返還請求），依民法821條各共有人得單獨行使，但依民事訴訟法，共有人請求回復共有物時，可以一人代全體起訴，本選項表述不精確，且「均負義務對外提出請求」表達邏輯有問題，不是正確描述。","重大修繕通常屬於「重要事項」（依民法820條第1項，應以共有人過半數及其應有部分合計過半數決議）——甲乙各有1/3，合計2/3（人數占多數且應有部分過半），理論上達到法定多數（多數人多數份額），但本選項說「無須丙同意」的表述與法律規定的多數決程序不完全一致，表述可能不夠精確。"],
 trap:"共有人對自己「應有部分」的自由處分（如設定抵押、讓與）不需要其他共有人同意（819條第1項）——這是分別共有人最基本的財產自由，應有部分是自己的「份額」，可以自由處分。但若是就「共有物整體」進行處分（如出賣整筆土地），則需要全體同意（818條）或依特定多數決規定。「應有部分的處分」vs「共有物整體的處分」是分別共有最重要的區分之一。",related:"與109年第13題（哪些行為需全體共有人同意）、109年第17題（共有人未經同意擅自使用，其他共有人可否主張）同屬分別共有管理處分主題，三題合併複習可完整掌握分別共有的各種決議門檻。"},
{id:"EDF023",cat:"D2所有權共有登記",year:"104年第28題",q:"關於區分所有建築物，下列敘述，何者錯誤？",
 opts:["稱區分所有建築物者，謂數人區分一建築物而各專有其一部，就專有部分有單獨所有權，並就其共用部分共有之建築物","區分所有建築物之共有部分，不得與各區分所有人之專有部分或其所屬基地持分分離而為移轉或設定負擔","區分所有建築物之基地，由全體專有部分所有人分別共有之","各區分所有人按其專有部分及共有部分之比例，取得其基地之所有權應有部分"],correct:2,
 exps:["民法799條第1項：區分所有建築物的定義——數人區分一建築物各專有其一部，就專有部分有單獨所有權，並就共用部分共有，完全符合法條，敘述正確，非本題答案。","民法799條第4項：共有部分與各區分所有人之專有部分或基地持分，不得分離而為移轉或設定負擔——共有部分（如走廊、樓梯間）必須跟著專有部分一起移轉，不能獨立分離，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法799條之1：區分所有建築物之基地，由全體專有部分所有人「公同共有」之——不是「分別共有」，是「公同共有」，本選項說「分別共有」與法條規定相反，是本題錯誤敘述。","依民法799條之1第2項：各區分所有人得按其專有部分面積與專有部分總面積之比例，主張其基地所有權應有部分，敘述方向正確，非本題答案。"],
 trap:"區分所有建築物的基地：由全體區分所有人「公同共有」（民法799條之1），不是「分別共有」——這個公同共有的設計是因為基地是整棟建築的共同基礎，無法各自分割，必須由所有人共同持有。考試很愛在「公同共有vs分別共有」這個地方出題，要記住：一般共有不動產→分別共有（各有應有部分）；區分所有建築物基地→公同共有（整體共同持有）。",related:"與106年第17題（區分所有建築物之基地公同共有或分別共有）、112年第18題（區分所有建築物各項規定）同屬區分所有建築物主題，三題合併複習可完整掌握這個不動產業務核心主題的各種考點。"},
{id:"EDF024",cat:"D2所有權共有登記",year:"106年第6題",q:"甲有A地，且登記為A地所有人。甲因乙之脅迫，出賣且交付A地於乙，於甲尚未撤銷買賣契約前。試問，下列何者正確？",
 opts:["A地仍屬甲所有，甲無庸撤銷即可請求乙返還A地","A地已移轉於乙，甲應先撤銷買賣意思表示及移轉登記，再請求乙返還A地","甲之脅迫意思表示無效，乙占有A地無任何法律依據","脅迫之意思表示屬無效，甲得直接請求乙返還A地"],correct:1,
 exps:["脅迫的意思表示是「得撤銷」，不是自始無效——在撤銷前，買賣契約有效，A地的移轉登記也有效，乙是有法律依據的所有人（雖然買賣是在脅迫下完成的）。甲不能在未撤銷前就主張A地仍屬自己，本選項不正確。","（本題答案）脅迫意思表示依民法92條得撤銷，撤銷前買賣契約及物權移轉有效（乙有合法持有依據）；甲需先撤銷被脅迫的買賣意思表示（使契約視為自始無效，114條），買賣契約消滅後所有權移轉登記也失去依據，再依不當得利或所有物返還請求要求乙返還A地（同時可能需要辦理塗銷登記）——這個「先撤銷→再請求返還」的程序順序是本題的核心，敘述正確。","被脅迫的意思表示是「得撤銷」不是「無效」（兩者法律性質不同），撤銷前乙的占有有買賣契約和登記為依據，本選項說「無任何法律依據」在撤銷前是不正確的。","同選項C，脅迫的意思表示「得撤銷」而非「無效」，甲不能在未撤銷前直接主張無效並請求返還，本選項錯誤。"],
 trap:"脅迫的法律效果是「得撤銷」（民法92條），不是「當然無效」——這是本題最核心的考點，也是A5意思表示瑕疵段反覆強調的觀念在D段的再次應用。撤銷前→買賣契約及移轉登記均有效（乙有合法依據）；撤銷後→契約視為自始無效（114條）→物權移轉失去依據→甲可請求乙返還（不當得利或所有物返還請求）。這個「得撤銷≠無效，需先撤銷再追討」的程序認識是民法學習的重要基礎。",related:"與A5段101年第2題（被脅迫意思表示的撤銷程序）形成跨段呼應，兩題合併可確認自己真正理解「脅迫→得撤銷→需先撤銷再追討」的完整流程。"},
{id:"EDF025",cat:"D2所有權共有登記",year:"106年第11題",q:"甲有A屋，共95坪，登記為A屋所有人。乙詢問甲A屋坪數，甲告知A屋計有100坪。甲與乙締結1000萬元之買賣契約，乙依民法主張買賣價金減少之請求，乙得向甲請求減少之價金為？",
 opts:["50萬元","100萬元","150萬元","200萬元"],correct:0,
 exps:["（本題答案）民法354條（物之瑕疵擔保），乙得主張減少價金——計算方式：甲告知100坪，實際95坪，少了5坪，比例為5/100=5%；買賣價金1000萬元×5%=50萬元，乙得請求減少50萬元，敘述正確。","100萬元對應10%的縮水比例，與實際坪數差（5/100=5%）不符，錯誤。","150萬元對應15%的縮水比例，同樣不符，錯誤。","200萬元對應20%的縮水比例，同樣不符，錯誤。"],
 trap:"物之瑕疵擔保減少價金的計算公式：實際缺少比例×原約定總價=得減少之金額。本題：少了5坪（100坪-95坪=5坪），缺少比例=5/100=5%（不是5/95），原總價1000萬元×5%=50萬元。注意分母是「約定坪數（100坪）」而非「實際坪數（95坪）」，因為這是「甲告知的100坪」比例中缺少了5坪，要以告知數量（100坪）作為計算基準。",related:"與110年第1題（民法第4條文字數字不符時的價金計算）同屬不動產買賣的數字計算主題，兩題合併練習可熟悉不動產交易中的數字計算邏輯。"},
{id:"EDF026",cat:"D2所有權共有登記",year:"106年第17題",q:"關於區分所有建築物，下列敘述何者正確？",
 opts:["全體專有部分所有人公同共有區分所有建築物之基地","專有部分可共有或單獨所有","全體專有部分所有人就共有部分僅得分別共有","區分所有建築物之共有部分得與各專有部分分離而為移轉"],correct:1,
 exps:["區分所有建築物的基地，依民法799條之1第1項，由全體區分所有人共有，共有型態是分別共有（各人依比例有應有部分），不是公同共有，本選項說公同共有錯誤。","（本題答案）民法799條：區分所有建築物之專有部分，得由一人單獨所有，亦得由數人共有——專有部分可以是一個人獨自所有，也可以是多人共有，敘述正確。","共有部分（走廊、電梯、樓梯間等）由全體區分所有人共同持有，依多數實務見解是公同共有，不是分別共有，本選項錯誤。","民法799條第4項：共有部分不得與各區分所有人之專有部分分離而為移轉或設定負擔，本選項說得分離移轉，與法條相反，錯誤。"],
 trap:"這題與104年第28題考同樣的考點但答案方向不同，形成對照陷阱：104-28說基地分別共有（錯誤）；106-17說基地公同共有（錯誤）——兩題都是錯的，但錯誤的方向相反，代表考生需要精確記住基地=分別共有（依比例各有應有部分），才能在兩題都不被混淆。共有部分（電梯、走廊）則是公同共有（整體共同持有，不分割）。",related:"與104年第28題、112年第18題同屬區分所有建築物主題，三題構成完整的考點三角組合，必須合併反覆比對。"},
{id:"EDF027",cat:"D2所有權共有登記",year:"106年第22題",q:"關於公同共有，下列敘述何者正確？",
 opts:["公同關係存續中，各公同共有人，不得請求分割其公同共有物","各公同共有人，得自由處分其應有部分","公同共有人中之一人，不得單獨起訴請求確認全部公同共有物之所有權","公同共有物之管理，由公同共有人過半數決之"],correct:0,
 exps:["（本題答案）民法829條：公同關係存續中，各公同共有人，不得請求分割其公同共有物——公同共有必須等公同關係消滅後，才能進行分割，在公同關係存續中，任何一個公同共有人不能單方要求分割，敘述正確。","公同共有人沒有各自的應有部分——公同共有的特徵就是整體合一，沒有各自分配的份額，自由處分其應有部分這個概念在公同共有下根本不存在（這是分別共有才有的概念），本選項錯誤。","公同共有人中的一人，依民法821條準用，得單獨起訴請求確認共有物的所有權，保護全體共有人的共同利益，本選項說不得，不正確。","公同共有物的管理，依民法828條第2項：應由公同共有人全體合意為之——不是過半數決，是全體同意，本選項說過半數決，與法條規定相反，錯誤。"],
 trap:"公同共有的三個核心規則：①公同關係存續中不得請求分割②沒有應有部分概念，不能自由處分各自份額③管理需全體同意（不是過半數）。這三個規則跟分別共有的規則幾乎完全相反，考試很愛把公同共有的規則和分別共有的規則互換來製造陷阱。",related:"與99年第21題、103年第33題同屬公同共有主題，三題合併複習可建立完整的公同共有制度知識架構。"},
{id:"EDF028",cat:"D2所有權共有登記",year:"107年第8題",q:"甲乙丙丁共有A地，各有應有部分四分之一，甲乙丙三人未經丁之同意即將A地出賣給戊並為移轉登記，請問此物權移轉行為之效力為何？",
 opts:["甲乙丙三人就其應有部分之移轉，對戊有效；丁之應有部分未經同意移轉，對丁不生效力","甲乙丙三人未得全體共有人同意，其買賣行為及物權移轉均無效","甲乙丙三人得就全部A地為出賣及移轉登記，此為共有物分管之延伸","甲乙丙三人就全部A地出賣及移轉均有效，蓋已有四分之三之多數同意"],correct:0,
 exps:["（本題答案）民法819條第1項：各共有人，得自由處分其應有部分——甲乙丙各自的1/4應有部分，可以自由讓與給戊（不需要丁的同意）；但丁的1/4應有部分，未經丁同意不能移轉給戊，對丁不生效力。結果：戊取得3/4的應有部分，丁的1/4仍屬丁，丁成為戊的共有人，敘述正確。","甲乙丙就自己的應有部分出賣是有效的（819條第1項），只是丁的部分無效，不是全部無效，本選項說均無效過於絕對，錯誤。","分管契約是管理使用的約定，不授權各共有人代替其他人出賣共有物，本選項說出賣是分管的延伸，概念混淆，錯誤。","多數決可以用於共有物的管理事項，但不能用於共有物全部的處分（出賣）——出賣共有物全部需要全體同意，本選項把管理的多數決誤套到處分上，錯誤。"],
 trap:"共有人的處分分兩種：①各人處分自己的應有部分→自由處分，不需要其他人同意（819條第1項）②處分共有物整體→需要全體同意（818條）。本題甲乙丙是出賣各自的應有部分（3/4份額）給戊，丁的1/4不屬於甲乙丙，他們無法連同丁的份額一起出賣。結果是戊取得3/4，丁保留1/4，成為戊和丁的共有狀態。",related:"與109年第13題、104年第27題同屬分別共有人的處分權限主題，三題合併可完整掌握應有部分的自由處分vs共有物整體的處分的不同規則。"},
{id:"EDF029",cat:"D2所有權共有登記",year:"107年第22題",q:"下列關於物權規定之敘述，何者正確？",
 opts:["用益物權包括地上權、農育權、不動產役權、典權與質權","違章建築物不能辦理移轉登記，故不得為買賣交易標的","違章建築物之所有權人，雖未辦理所有權登記，但仍得向無權占有人主張所有物返還請求","不動產物權，依法律行為而取得者，非經登記，不生效力，惟繼承可為例外"],correct:3,
 exps:["用益物權包括地上權、農育權、不動產役權、典權——質權是擔保物權（不是用益物權），本選項把質權誤列為用益物權，錯誤。","違章建築雖不能辦理建物所有權移轉登記，但仍可以作為買賣的標的（買賣契約有效，只是所有權移轉受限），本選項說不得為買賣交易標的過於絕對，錯誤。","違章建築的所有權人雖然沒有辦理建物登記，但基於事實上的建造和所有權地位，仍可以對無權占有人主張所有物返還請求——這是實務判例承認的，敘述正確，但依官方答案D選項更完整。","（本題答案）民法758條第1項：不動產物權，依法律行為而取得、設定、喪失及變更者，非經登記，不生效力——但繼承是非依法律行為取得的物權變動（法定取得），民法759條：因繼承而取得不動產物權者，非經登記，不得處分其物權——繼承是758條的例外，不需要登記就取得物權，只是不能再處分，敘述正確。"],
 trap:"民法758條（登記生效主義）的例外：依法律規定（而非法律行為）取得的不動產物權，不需登記即生效力——包括繼承（759條）、強制執行拍定、徵收、時效取得等情形。這些是法定取得，不適用758條的登記生效要求，但取得後若要再處分，仍需先辦理登記。記憶口訣：依法律行為取得→需登記生效；依法律規定取得→無需登記，但處分前需登記。",related:"與99年第24題、113年第14題同屬不動產物權變動登記主題，合併複習可建立完整的登記生效主義架構。"},
{id:"EDF030",cat:"D2所有權共有登記",year:"108年第21題",q:"甲將其所有之A土地上之B建物讓與乙時，在房屋得使用期限內，乙與甲間有何法律關係？",
 opts:["推定有租賃關係","視為有租賃關係","應以另定方式確定雙方法律關係","乙應另向甲購買土地或設定地上權"],correct:0,
 exps:["（本題答案）民法838條之1第1項：土地及其土地上之建築物，同屬一人所有，而僅以建築物讓與他人者，土地所有人與建築物所有人間，推定在房屋得使用期限內，有租賃關係存在——甲讓與B屋給乙，甲仍保有A地，此時甲與乙之間推定有租賃關係，乙使用土地的依據是推定的租賃，敘述正確。","民法838條之1用的是推定而不是視為——推定允許舉反證推翻，視為通常不允許，本選項說視為不符合法條原文，錯誤。","法條已有明確規定（推定有租賃），不需要另定方式確定，本選項不正確。","乙已從甲取得B屋所有權，乙在A地上的使用依據已由法律推定有租賃（838條之1），不需要另外購買土地或設定地上權，本選項不正確。"],
 trap:"民法838條之1的推定有租賃關係，是不動產交易中地屋分離讓與的重要保護規則——如果土地和房屋同屬一人，又分別讓與給不同的人，法律推定兩者之間有租賃關係，避免買到房屋卻對土地沒有任何使用依據的窘境。推定（允許反證）vs視為（通常不允許反證）是考試最愛考的用詞精確度陷阱，108-21與113-09都涉及這個規則，兩題必須合併比較。",related:"與113年第9題（甲將B屋賣給乙，同樣的推定租賃問題）是同一法條的重複命題，兩題必須合併確認自己記住了推定這個關鍵用詞。"},
{id:"EDF031",cat:"D2所有權共有登記",year:"109年第9題",q:"甲將其名下之房屋出售並交付乙占有，惟尚未辦理所有權登記之前，甲又出售該屋於善意之丙且辦理所有權登記完畢。則乙對丙之主張，下列敘述何者正確？",
 opts:["乙主張系爭房屋所有權屬於乙，有理由","乙主張甲與丙之買賣行為無效，有理由","乙主張不動產善意取得，有理由","乙以侵權行為損害賠償為由，對丙之主張，無理由"],correct:3,
 exps:["乙雖已交付占有，但尚未完成登記——不動產所有權以登記為移轉要件（758條），乙在登記前不取得所有權，反而丙已完成登記，丙確定取得所有權，乙不能主張自己有所有權，本選項不正確。","甲丙之買賣契約本身有效（買賣是諾成契約），且丙已完成登記取得所有權，乙不能主張甲丙買賣無效，本選項不正確。","善意取得是指從無所有權的讓與人受讓並符合一定要件而取得所有權——本題丙是從甲（仍是登記所有人）購買，甲有所有權，這不是善意取得的問題，本選項概念套用錯誤，不正確。","（本題答案）丙完成登記合法取得房屋所有權（公信力保護），乙對丙無任何物上請求權（丙是合法所有人）；乙也不能以侵權行為向丙求償（丙是善意的，沒有侵權行為的故意過失），乙能做的是向甲（違約的出賣人）主張債務不履行損害賠償，不能向丙主張，敘述正確。"],
 trap:"一物二賣（不動產）的典型結果：①兩個買賣契約均有效（諾成契約）②所有權歸誰先辦理完登記的那一方③先買但未登記的乙→無法取得所有權，只能向甲請求債務不履行損害賠償④後買但先登記的丙→合法取得所有權，且是善意的，乙對丙無任何主張依據。本題的核心就是登記決定所有權，善意第三人受保護的不動產物權基本規則。",related:"與113年第1題、104年第1-2題同屬一物二賣與登記保護主題，三題合併複習可建立完整的不動產買賣衝突處理架構。"},
{id:"EDF032",cat:"D2所有權共有登記",year:"109年第10題",q:"甲將其土地出售乙，但因價金給付方式仍有爭議，故甲拒絕交付予乙，亦不辦理登記，乙起訴請求甲履行買賣契約之給付義務，經判決乙勝訴確定。下列敘述，何者正確？",
 opts:["甲不服判決，得上訴最高法院","乙勝訴判決確定後，即取得A地所有權","乙執勝訴判決，得不經甲意思表示之配合，直接向地政機關申辦移轉登記","乙得聲請法院就A地為假扣押"],correct:2,
 exps:["民事判決確定後，當事人不得就同一事件再上訴（一事不再理），且判決確定本身就是說上訴階段已結束，甲無從再上訴，本選項不正確。","判決確定使甲對乙負有履行移轉登記的義務，但不動產所有權移轉仍以辦理登記為生效要件，勝訴判決確定不等於所有權自動移轉，本選項不正確。","（本題答案）民事訴訟法第397條（確定判決代替意思表示）：判決確定後，關於應為一定意思表示之給付，視為於判決確定時已為其意思表示——乙的勝訴確定判決可以代替甲的移轉登記意思表示，乙得持確定判決直接向地政機關申辦移轉登記，不需要甲實際配合，敘述正確。","假扣押是保全程序（防止債務人脫產），在取得勝訴確定判決後，乙已可以直接執行，不需要再聲請假扣押（假扣押是在未確定前的保全措施），本選項時機不對，不正確。"],
 trap:"判決代替意思表示（民事訴訟法397條）是本題的核心知識點：當一方應為一定意思表示（如辦理移轉登記）而拒絕，他方訴請判決確定後，確定判決的效力等同於對方做了那個意思表示，不需要對方實際配合——乙持確定判決去地政機關，地政機關就必須受理辦理登記，不需要甲本人到場。這個判決代替意思表示直接申辦登記的程序知識在不動產業務中非常重要。",related:"與102年第10題（乙可訴請法院命甲移轉所有權）同屬不動產買賣履行糾紛主題，兩題合併複習可理解從訴請履行到確定判決代替意思表示直接辦理登記的完整程序鏈。"},
{id:"EDF033",cat:"D2所有權共有登記",year:"109年第12題",q:"甲將自己所有的違章建築A屋賣給乙，有關於買賣違章建築之法律關係。下列敘述，依實務見解，何者錯誤？",
 opts:["土地與土地上之違章建築，不必然為同一人所有","違章建築之買賣移轉，必須以辦理移轉登記之方式，始生所有權移轉之效力","違章建築之買賣契約，有效成立","甲依買賣契約，負有交付A屋並移轉事實上所有權之義務"],correct:1,
 exps:["違章建築與其坐落的土地，可能分屬不同所有人，這是符合實際情況的敘述，正確，非本題答案。","（本題答案，依實務見解為錯誤）違章建築（未辦理建物所有權第一次登記的建物）無法辦理所有權移轉登記，所以所有權的移轉不是透過辦理移轉登記，而是透過交付占有——實務上認為違章建築的事實上所有權以交付占有代替登記移轉，本選項說必須辦理移轉登記不符合實務見解，是錯誤敘述。","違章建築可以作為合法的買賣標的，買賣契約本身有效成立，敘述正確，非本題答案。","甲基於買賣契約，負有交付A屋並讓乙取得事實上所有權的義務（因為違章建築只能以交付占有轉移事實上所有權），敘述符合實務見解，正確，非本題答案。"],
 trap:"違章建築的所有權移轉方式是本段最重要的實務考點：①違章建築無法辦理建物登記②因此所有權移轉不能透過登記，只能透過交付占有（事實上所有權的移轉）③但買賣契約本身有效④賣方有義務交付並移轉事實上所有權。不能因為無法登記就認為違章建築所有權無法移轉，只是移轉方式不同（交付而非登記）。",related:"與103年第20題（違章建築出售後賣方不得再主張所有物返還）、107年第22題（違章建築可以買賣，事實上所有人有物上請求權）同屬違章建築主題，三題合併複習可完整掌握違章建築的法律地位和交易規則。"},
{id:"EDF034",cat:"D2所有權共有登記",year:"109年第13題",q:"甲乙丙共同出資購買一筆A土地，應有部分各三分之一。下列何種行為應經甲乙丙三個共有人全體同意，始為有效？",
 opts:["共有人之一人將其應有部分讓與第三人","甲乙以多數決同意，就A地進行測量","將全部A地出售第三人丁","依多數決同意，就A地之特定部分進行修繕"],correct:2,
 exps:["共有人讓與自己的應有部分（民法819條第1項），是自己份額的自由處分，不需要其他共有人的同意，本選項不需要全體同意，錯誤。","土地測量屬於保存行為或管理行為的輕微事項，依民法820條第5項，各共有人得單獨為保存行為，本選項不需要全體同意，錯誤。","（本題答案）民法819條第2項：共有物之處分、變更及設定負擔，應得共有人全體之同意——出售全部A地給第三人丁是整體共有物的處分，必須甲乙丙全體同意，缺一不可，敘述正確。","修繕屬於管理行為，依民法820條第1項，以共有人過半數及其應有部分合計過半數決之，不需要全體同意（甲乙2人佔2/3多數，已達法定多數），本選項不需要全體同意，錯誤。"],
 trap:"共有物的決議門檻分三個層次：①保存行為（緊急維護）→各共有人得單獨為之②管理行為（使用收益、修繕）→過半數人及過半數份額（820條）③處分行為（出賣、設定抵押整體）→全體同意（819條第2項）。考試很愛在管理vs處分的邊界出題，記住口訣：保存獨幹、管理多數、處分全體。",related:"與104年第27題、107年第8題同屬分別共有決議門檻主題，三題合併可完整建立保存/管理/處分三個層次的門檻架構。"},
{id:"EDF035",cat:"D2所有權共有登記",year:"109年第16題",q:"甲、乙共有一筆A土地，面積400坪，應有部分各為二分之一。下列敘述，何者正確？",
 opts:["甲、乙對於共有之A土地，各自有使用全部400坪之權利，不受他共有人之干涉","若甲乙就如何使用A土地，意見不同，則甲可單獨向法院聲請裁定分割A土地","甲以其應有部分設定抵押權，不需要乙的同意","若甲、乙不能就共有物管理達成協議，各共有人均得向法院聲請裁定管理事項"],correct:2,
 exps:["共有人雖有使用全部共有物的權利，但必須依各自應有部分的比例行使，且不得妨礙其他共有人的使用（民法818條），不是毫無限制地使用全部400坪，本選項說不受他共有人干涉過於絕對，錯誤。","若共有人就管理無法達成協議，得向法院聲請裁定管理事項（820條第2項），但裁定分割是另一個不同的程序——管理協議不成不是聲請裁定分割的原因，本選項混淆了管理裁定和分割裁定，錯誤。","（本題答案）民法819條第1項：各共有人，得自由處分其應有部分——甲以自己的1/2應有部分設定抵押權，是對自己份額的處分，不需要乙的同意，敘述正確。","依民法820條第2項：共有人不能協議管理者，法院得因任何共有人之聲請，以裁定定其管理方法——敘述方向基本正確，各共有人確實均可聲請，但相比選項C，本選項回答的不是本題的最佳答案。"],
 trap:"這題再次確認應有部分的自由處分不需他人同意（819條第1項），同時考了管理協議不成可聲請法院裁定管理（不是裁定分割）的程序正確性。兩個考點都是本段的高頻陷阱，管理和分割是兩個不同的程序，管理不成可以裁定管理，但不能直接跳到裁定分割（裁定分割要靠分割請求，是另一個獨立的程序）。",related:"與109年第13題、114年第16題同屬分別共有決議規則主題，三題合併複習效果最佳。"},
{id:"EDF036",cat:"D2所有權共有登記",year:"109年第17題",q:"甲、乙、丙、丁四人共有一筆A土地，應有部分各登記為四分之一，甲未經乙、丙、丁之同意，擅自占有A土地四分之三面積，其他共有人得否對甲主張？",
 opts:["乙丙丁均得各自對甲主張所有物返還請求","乙丙丁可以對甲主張共有物使用管理請求，但無法對甲為所有物返還請求","乙丙丁均無任何請求權，因甲係共有人之一","乙丙丁對甲均得請求損害賠償，但不得請求甲歸還占用之土地面積"],correct:1,
 exps:["共有人對無權占有人得主張所有物返還請求（民法821條），但甲也是共有人——甲對A土地有共有權利（雖然超過了自己應有部分的比例），乙丙丁不能以所有物返還請求對甲主張（因為甲對土地有共有權利，不是完全無權占有），本選項不正確。","（本題答案）甲擅自占有超過自己應有部分的土地，侵害了乙丙丁的共有使用權益，乙丙丁可以對甲主張基於共有關係的使用管理請求（要求甲返還超額占用部分，或請求依共有規則使用），但不是所有物返還請求（那是針對完全無權占有的人，甲有共有權），敘述正確。","乙丙丁有基於共有關係的請求權（要求甲不得超額占用），不是無任何請求權，本選項不正確。","乙丙丁有基於共有關係的占有保護請求（要求甲歸還超額占用），不只能請求損害賠償，本選項不完整，錯誤。"],
 trap:"共有人之間的占用糾紛，不能適用所有物返還請求（767條）——所有物返還請求是針對無權占有的人，共有人甲對A土地有共有權（不是無權占有，只是超額使用），所以乙丙丁不能用767條對甲主張。正確的主張是基於共有關係的使用管理規則（820條等）要求甲回到合理的使用範圍。這個共有人超額占用的救濟路徑是D段共有主題中比較進階的考點。",related:"與109年第13題（哪些行為需全體同意）、100年第22題（所有物返還請求的適用情境）同屬共有人間的權利主張主題，三題合併複習效果最佳。"},
{id:"EDF037",cat:"D2所有權共有登記",year:"112年第10題",q:"為動產物權讓與之交付，倘受讓人已先占有動產，於讓與合意時即生動產所有權取得之效力，學理上稱之為何？",
 opts:["現實交付","占有改定","簡易交付","指示交付"],correct:2,
 exps:["現實交付（民法761條第1項本文）：出讓人將動產實際移交給受讓人，最一般的交付方式，本選項不符合題目描述的受讓人已先占有的情境。","占有改定（民法761條第2項）：讓與後出讓人仍繼續占有該動產（但性質從所有人占有變為他主占有），是出讓人繼續占有的情形，不是受讓人已先占有的情形，本選項不符合題目描述。","（本題答案）民法761條第3項：受讓人已占有動產者，於讓與合意時，即生移轉效力，稱為簡易交付——受讓人已在占有動產（如借用），讓與人與受讓人達成讓與的合意後，所有權立即移轉，不需要再次物理移交，本選項正確識別了簡易交付的定義。","指示交付（民法761條第4項）：動產由第三人占有，讓與人讓與其對第三人的返還請求權，完成交付，本選項是動產在第三人手中的情形，不符合題目描述。"],
 trap:"這題考簡易交付的學術名稱——同100年第28題完全相同的考點，但本題是直接問名稱，100-28是問應採何種方式。兩題互為表裡：知道名稱（簡易交付）但不知道情境→100-28；知道情境（受讓人已先占有）但不知道名稱→112-10。兩題合在一起是這個考點的完整學習組合。",related:"與100年第28題（甲借車給乙後贈與乙，以何種方式交付）是同一考點的正反兩面，兩題必須合併記憶，確認自己既知道情境又知道名稱。"},
{id:"EDF038",cat:"D2所有權共有登記",year:"112年第18題",q:"關於民法區分所有建築物規定之敘述，下列何者錯誤？",
 opts:["專有部分與其所屬之共有部分及其基地之權利，得分離而為移轉或設定負擔","共有部分之使用，由區分所有人依其應有部分之多寡，各按比例為之","區分所有人就其專有部分之使用，有造成損鄰之虞者，有責任採取必要之防護措施","各共有部分及其所屬之基地，應隨同各專有部分及其所屬基地之權利為移轉"],correct:0,
 exps:["（本題答案，敘述錯誤）民法799條第4項：共有部分不得與各區分所有人之專有部分或其所屬基地持分分離而為移轉或設定負擔——共有部分、基地持分、專有部分三者必須一起移轉，不能分離，本選項說得分離而為移轉或設定負擔，與法條規定完全相反，是本題錯誤敘述。","共有部分的使用，依區分所有人的應有部分比例分配，敘述符合一般規則，正確，非本題答案。","區分所有人對專有部分的使用，若可能損害鄰居，應採取必要防護措施，屬於合理的相鄰關係規範，敘述正確，非本題答案。","各共有部分及基地，應隨同各專有部分及其所屬基地的權利一起移轉——這正是799條第4項的正確敘述，非本題答案。"],
 trap:"這題是106年第17題、104年第28題同一考點的第三次重複——區分所有建築物的共有部分和基地持分不得與專有部分分離移轉（799條第4項），這個規則在16年考題中至少出現三次，足見其為高頻考點。每次考法略有不同，但考的都是同一法條（799條第4項），務必牢記三合一不可分離的規則。",related:"與106年第17題、104年第28題是同一法條的三度重複命題，三題必須一起複習，這是D段最高頻的單一考點。"},
{id:"EDF039",cat:"D2所有權共有登記",year:"112年第19題",q:"甲在其所有A地上興建B屋，但B屋為未辦理建物所有權第一次登記的違章建物，嗣後甲與乙訂立A地與B屋的買賣契約，並辦理A地所有權移轉登記於乙，但B屋因無法辦理登記，B屋之事實上所有權則以交付方式移轉於乙。下列敘述，何者正確？",
 opts:["A地與B屋所有權均移轉於乙，因為不動產所有權移轉僅需交付即可","A地所有權移轉於乙，但B屋所有權仍屬於甲，因為B屋未辦理建物登記","A地所有權移轉於乙，B屋事實上所有權亦移轉於乙","A地與B屋所有權均未移轉於乙，因為登記為所有權移轉之要件"],correct:2,
 exps:["不動產所有權移轉需要登記（758條），不是交付即可，本選項說交付即可與不動產物權法定原則不符，錯誤。","B屋雖無法辦理移轉登記，但實務上承認違章建築可以事實上所有權的移轉（以交付代替登記），乙透過交付取得B屋的事實上所有權，本選項說B屋所有權仍屬甲不符合實務見解，錯誤。","（本題答案）A地→辦理所有權移轉登記→乙取得A地所有權（758條登記要件滿足）；B屋違章建物→無法登記→以交付方式移轉事實上所有權→乙取得B屋事實上所有權——兩者均已移轉至乙，只是移轉方式不同（A地靠登記，B屋靠交付），敘述正確。","A地已辦理登記移轉（所有權有效移轉），B屋已交付移轉（事實上所有權有效移轉），不是均未移轉，本選項不正確。"],
 trap:"這題把A地（一般不動產，登記移轉）和B屋（違章建物，交付移轉事實上所有權）兩種不同情形放在同一題中比較考驗，重點在於記住：一般不動產所有權移轉→需辦理登記；違章建物（無法登記）→以交付移轉事實上所有權，兩者移轉方式不同，但效力都有效。這個登記vs交付的雙軌知識點是理解不動產和違章建物所有權移轉的核心。",related:"與109年第12題（違章建築買賣移轉方式）、103年第20題同屬違章建築主題三連發，三題合併是這個主題的完整學習組合。"},
{id:"EDF040",cat:"D2所有權共有登記",year:"113年第1題",q:"甲就其所有之A地，先與乙訂立買賣契約，後與丙訂立買賣契約，均未辦理所有權移轉登記。關於二個買賣契約之效力，下列敘述何者正確？",
 opts:["甲乙間之買賣契約有效，甲丙間之買賣契約無效","甲乙間之買賣契約有效，甲丙間之買賣契約效力未定","甲乙及甲丙之買賣契約均有效","甲乙間之買賣契約有效，甲丙間之買賣契約因甲出賣他人之物而無效"],correct:2,
 exps:["甲先賣給乙，乙取得請求甲移轉所有權的債權，但A地所有權仍在甲——甲再賣給丙，是以自己仍擁有的A地訂立買賣契約（甲並非出賣他人之物），甲丙買賣契約也有效，不是無效，本選項錯誤。","甲丙買賣契約不是效力未定（效力未定是無權處分的效果，甲有所有權，不是無權處分），本選項不正確。","（本題答案）一物二賣的兩個買賣契約（甲乙、甲丙）都是債權行為（諾成契約，合意即成立），且A地所有權在訂約時仍屬甲（未辦理登記移轉），兩個買賣契約均有效——問題在於所有權最終歸誰（看誰先辦理登記），但契約本身的效力是獨立的，均有效，敘述正確。","甲丙訂約時A地仍是甲的，甲不是出賣他人之物，本選項前提錯誤。"],
 trap:"一物二賣的核心：兩個買賣契約（債權行為）都有效（合意即成立）——問題在於物權移轉只能發生一次（看誰先登記），先登記的那一方取得所有權，另一方只能向甲請求債務不履行損害賠償。考試常以第二個契約無效/效力未定作為陷阱，但正確答案是兩個契約都有效，只是履行（所有權移轉）只能滿足一方。",related:"與109年第9題（一物二賣，先登記的丙取得所有權，乙只能追償甲）、104年第1-2題同屬一物二賣與登記保護主題，三題合併複習可建立完整的不動產買賣衝突處理架構。"},
{id:"EDF041",cat:"D2所有權共有登記",year:"113年第6題",q:"甲無權占有乙所有已登記之A地15年後，乙對甲提起所有物返還請求之訴訟，下列敘述，何者正確？",
 opts:["甲得對乙為消滅時效之抗辯，因甲已占有超過15年","乙對甲之所有物返還請求，不罹於消滅時效","甲已時效取得A地所有權，故乙之主張無理","甲已時效取得A地地上權，乙之請求無理由"],correct:1,
 exps:["甲無法以占有超過15年主張消滅時效——消滅時效對象是請求權，而乙的所有物返還請求（767條）依實務見解，已登記不動產的所有物返還請求不適用消滅時效，本選項說甲可以時效抗辯，不正確。","（本題答案）已登記不動產的所有物返還請求權（767條）不適用消滅時效——不動產登記制度賦予登記所有人對抗第三人的公示效力，若允許時效消滅，登記制度的保障意義將被架空，所以實務上認定乙的所有物返還請求不因甲占有多少年而罹於時效，敘述正確。","已登記的A地不能被時效取得所有權（769條限於未登記不動產），甲15年的占有不能使甲取得A地所有權，本選項不正確。","時效取得地上權，依民法772條準用769條，同樣限於未登記土地（或限制條件未滿足），乙的A地已登記，甲不能時效取得地上權，本選項不正確。"],
 trap:"已登記不動產的兩個重要保護：①所有物返還請求不罹於消滅時效（保護登記所有人）②不能被他人時效取得所有權（時效取得限於未登記不動產）。這兩個保護都是為了維護不動產登記制度的公信力。本題15年占有既不能構成時效消滅乙的請求權，也不能讓甲取得所有權，乙的請求完全成立。",related:"與102年第21題（A屋在乙地上18年，乙可向甲主張所有物返還）同屬已登記不動產的物上請求與時效主題，兩題合併複習可完整掌握這個重要的已登記不動產保護機制。"},
{id:"EDF042",cat:"D2所有權共有登記",year:"113年第9題",q:"甲在其所有之A地上興建B屋後，將B屋出售並移轉所有權登記於乙。下列敘述，何者正確？",
 opts:["推定甲與乙在房屋得使用期限內有租賃關係","視為甲與乙在房屋得使用期限內有租賃關係","甲得向乙主張所有物返還請求，請求乙返還B屋基地之使用","甲乙間欠缺任何法律關係，乙對A地之使用屬無權占有"],correct:0,
 exps:["（本題答案）民法838條之1第1項：土地及其建築物同屬一人，而僅以建築物讓與他人者，土地所有人與建築物所有人間，推定在房屋得使用期限內有租賃關係——甲把B屋賣給乙（甲保留A地所有權），甲與乙之間推定有租賃關係（乙使用甲的A地有推定的租賃依據），敘述正確。","法條用的是推定（允許舉反證推翻），不是視為（通常不允許反證），本選項用詞不符合法條原文，錯誤——這與108年第21題完全相同的陷阱，再次考驗推定vs視為的精確用詞區分。","甲與乙之間有推定的租賃關係，乙對A地的使用是有依據的（租賃），甲不能對乙主張所有物返還（乙不是無權占有），本選項不正確。","甲乙之間有推定的租賃關係（838條之1），不是欠缺任何法律關係，乙也不是無權占有，本選項不正確。"],
 trap:"這題與108年第21題幾乎完全相同，都考民法838條之1的推定有租賃關係——推定（非視為），土地所有人保留土地但讓與房屋，推定雙方有租賃關係（房屋所有人承租土地）。這個考點在108年和113年各出現一次，且兩次都考了推定vs視為的用詞陷阱，代表這個細節是考試最重視的地方，務必記住838條之1用的是推定，不是視為。",related:"與108年第21題（幾乎完全相同的情境，都考838條之1推定有租賃關係）是同一考點的重複命題，兩題必須合併確認自己記住了推定這個關鍵用詞。"},
{id:"EDF043",cat:"D2所有權共有登記",year:"113年第14題",q:"甲乙丙丁分別共有A地，甲以乙丙丁為被告提起分割共有物之訴，獲得勝訴確定判決。下列敘述，何者正確？",
 opts:["甲乙丙丁於判決確定時，各自取得依判決分割所確定之部分之所有權","甲乙丙丁需辦理所有權移轉登記後，方取得各自部分之所有權","判決因係對乙丙丁為之，而非針對甲，所以甲仍維持原共有狀態","分割共有物訴訟之確定判決，效力不及於丁，因丁係被告"],correct:0,
 exps:["（本題答案）裁判分割共有物的確定判決，依民法824條之1第3項：共有人依確定判決請求分割時，分割後各人取得之部分，自判決確定時發生效力——即使尚未辦理所有權移轉登記，判決確定時各人即已取得各自部分的所有權（不動產因裁判而取得的物權，是民法759條的例外，不需要登記即生效，但後續若要再處分，仍需先辦理登記），敘述正確。","裁判分割的確定判決效力，依759條，是非依法律行為取得不動產物權，判決確定時即取得，不需要先辦理登記才取得（但後續若要再處分，仍需先登記），本選項說需登記後方取得不正確。","裁判分割是固有必要共同訴訟，效力及於全體當事人（甲乙丙丁），不是只對乙丙丁有效，本選項不正確。","確定判決效力及於訴訟全體當事人（原告甲和被告乙丙丁），不是只對原告有效，本選項不正確。"],
 trap:"裁判分割共有物的確定判決，屬於非依法律行為取得不動產物權（759條），判決確定時即生效力，不需要登記才取得所有權——但取得後若要再處分（如再出賣），則需先辦理登記。這個裁判取得→不需登記即生效，但處分前需先登記的規則是本段最重要的例外規則之一，考試常考判決確定時就取得vs需登記後才取得的差異。",related:"與99年第24題（協議分割時，分割登記完畢才消滅共有關係）形成對照：協議分割→需登記才生效；裁判分割→判決確定即生效（不需登記）。兩題合併複習可完整掌握兩種分割方式的效力時點差異。"},
{id:"EDF044",cat:"D2所有權共有登記",year:"114年第6題",q:"民法規定權利客體中動產、不動產之定義、種類及變動之法定方式；依該規定之內容，下列何者屬於正確之敘述？",
 opts:["甲在所有A地上種植果樹，若甲將A地出賣於乙，除非買賣契約另行約定，否則種植在A地上的果樹不屬於土地的一部分","動產移轉所有權，以登記為必要","不動產物權依法律行為而取得者，如有交付，縱未登記，仍生效力","動產所有權之移轉，因交付而生效力；不動產所有權之移轉，非經登記，不生效力"],correct:3,
 exps:["種植在土地上的果樹，一旦固著於土地（附合），就成為土地的成分，是土地的一部分——買賣土地時，土地上固著的果樹通常隨同土地移轉（除非明確約定排除），本選項說除非另行約定否則不屬於土地的一部分，邏輯相反，錯誤。","動產移轉所有權以交付為要件，不是登記——登記是不動產物權的要件，本選項把兩種移轉方式搞反了，錯誤。","不動產物權依法律行為取得，非經登記，不生效力（758條）——不是有交付即生效力，不動產交付不影響物權是否生效，本選項與758條明文相反，錯誤。","（本題答案）民法761條第1項：動產物權之讓與，非將動產交付，不生效力——動產以交付生效；民法758條第1項：不動產物權，依法律行為而取得、設定、喪失及變更者，非經登記，不生效力——不動產以登記生效。兩條規定完整且正確，敘述正確。"],
 trap:"動產vs不動產的物權變動要件是民法最基礎的考點之一：動產→交付（761條）；不動產→登記（758條）。本題四個選項各自對應不同程度的混淆，記憶口訣：動產交付，不動產登記。",related:"與100年第28題（動產交付的四種方式）、112年第10題（簡易交付的名稱）同屬動產物權交付主題，三題合併複習可建立完整的動產物權變動架構。"},
{id:"EDF045",cat:"D2所有權共有登記",year:"114年第16題",q:"甲、乙兩人共有A地，應有部分甲為1/3、乙為2/3。下列何者錯誤？",
 opts:["若甲、乙協議20年內不得分割，則在該期間內，甲不得請求分割A地","若甲、乙對A地之管理方式有爭議，可以過半數決定之","若甲欲出賣其應有部分，乙有優先購買之機會","甲、乙可以共同將A地設定抵押權於丙"],correct:0,
 exps:["（本題答案，敘述錯誤）民法823條第2項：共有人以契約訂有不分割之期限者，不得超過五年——20年的不分割約定，超過5年的部分無效，所以甲乙間不分割契約只能有效約束5年，而非20年。故協議20年內不得分割中，超過5年的部分是無效的，甲在第5年之後仍可請求分割，本選項說20年內甲不得請求分割，不正確。","民法820條第1項：共有物之管理，除契約另有約定外，應以共有人過半數及其應有部分合計過半數決之——乙持2/3應有部分（超過半數），乙一人即達多數，管理事項乙可決定，敘述正確，非本題答案。","民法824條之1第1項（及不動產共有人優先購買），共有人出賣其應有部分時，他共有人有依同一條件優先承購之機會，敘述正確，非本題答案。","甲乙共同可以將A地設定抵押（全體共有人合意設定擔保物權），這是共有物整體的處分行為（819條第2項需全體同意），甲乙共同同意即滿足條件，敘述正確，非本題答案。"],
 trap:"不分割契約最長五年的上限（823條第2項）是本段反覆出現的考點（101年第14題選項D也考過）——20年的不分割約定只有前5年有效，5年後仍可請求分割。考試很愛用20年或超過5年的期間作為不分割期限，測試你是否記得5年的上限，務必把這個數字牢牢記住。",related:"與101年第14題（不分割期限不得超過5年）是同一考點的重複出題，兩題合併確認自己記住了不分割期限最長5年這個關鍵數字。"},
{id:"EDF046",cat:"D3拾得遺失添附",year:"104年第23題",q:"甲遺失價值拾萬元之金戒指一只，被大學生乙拾得並依法招領。下列敘述，何者錯誤？",
 opts:["自通知或最後招領之日起逾六個月，若甲未認領者，由乙取得所有權","拾得人乙，得向遺失人甲請求遺失物價值五分之一之報酬","拾得人乙，依法應通知失主或報告警察機關","若甲於法定期間內認領，應給付乙相當之報酬"],correct:1,
 exps:["民法807條：遺失物自通知或最後招領之日起逾六個月，未有受領人認領者，由拾得人取得其所有權，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法805條之1第1項：拾得人得請求遺失物價值十分之一之報酬——不是「五分之一」（20%），而是「十分之一」（10%），本選項把報酬比例說成1/5，與法條規定的1/10不符，是本題錯誤敘述。","民法803條：拾得人應從速通知遺失人或報告警察機關，敘述正確，非本題答案。","民法805條之1第1項：遺失人領回遺失物時，應給付拾得人相當之報酬（十分之一），敘述正確，非本題答案。"],
 trap:"遺失物報酬的比例是「十分之一（1/10）」，不是「五分之一（1/5）」——這是一個純粹的數字記憶考點，1/10（10%）是法條明定的比例，考試刻意把它改成1/5（20%）來測試你是否準確記住這個數字。另外要記住：①拾得後超過6個月未認領→拾得人取得所有權②遺失人認領時→應給付拾得人十分之一報酬。這兩個規則都是遺失物制度的核心，缺一不可。",related:"與104年第24題（哪些情形拾得人不得請求報酬）、112年第12題（遺失物拾得的各項規則）同屬遺失物主題，三題合併複習可完整掌握遺失物制度的全貌。"},
{id:"EDF047",cat:"D3拾得遺失添附",year:"104年第24題",q:"承上題，下列何種情形，乙不得向甲請求報酬？",
 opts:["甲為退休教師，依法請領退休金度日","乙在捷運車廂內座椅上撿到甲的戒指","乙在公園座椅旁撿到甲的戒指","乙在官署內（如辦公廳）撿到甲的戒指"],correct:3,
 exps:["甲是退休教師、靠退休金生活，這是甲個人的財務狀況，與拾得人是否有報酬請求權無關，乙仍可請求報酬，本選項不正確。","在捷運車廂內（公共交通工具）拾得遺失物，依通說，在交通工具內的拾得屬於一般情形，乙可以請求報酬，本選項不正確。","在公園座椅旁拾得，公園是公共場所，但不屬於「官署」或特別管理場所，乙可以請求報酬，本選項不正確。","（本題答案）民法805條之1第2項：拾得人在官署（如機關辦公廳舍）、學校、公共交通工具或其他公共場所拾得遺失物，管理該場所之人或機構（如官署本身）為第一順位的拾得人，此時「在官署內」的拾得，依規定拾得人不得對遺失人請求報酬（因為屬於管理機關的義務），敘述正確。"],
 trap:"「在官署內拾得」不得請求報酬（民法805條之1第2項）——這是因為在政府機關或學校等特殊管理場所內拾得，管理機構有照管義務，拾得的報酬制度在此有特殊限制。考試常考「何種情形不得請求報酬」，官署是唯一的法定排除情形，公園、捷運、私人場所等都仍可請求，只有官署例外。",related:"與104年第23題（遺失物報酬比例1/10）、112年第12題（遺失物取得期間與報酬規則）同屬遺失物主題，三題合併複習。"},
{id:"EDF048",cat:"D3拾得遺失添附",year:"104年第25題",q:"關於添附，下列敘述，何者正確？",
 opts:["動產因附合而為不動產之重要成分者，動產及不動產所有人，共有該動產所有權","動產與他人之動產附合，若不能識別或識別須費過巨費用，各動產所有人按其動產附合時之價值，共有合成物","加工物之所有權，歸材料所有人取得，但加工之費用超過材料之費用者，歸工作人取得","因添附而喪失權利者，得向得利者請求補償，補償範圍依不當得利規定定之"],correct:3,
 exps:["民法811條：動產因附合而為不動產之重要成分者，不動產所有人取得其所有權——是不動產所有人單獨取得，不是兩者「共有」，本選項說共有不正確。","民法812條第1項：動產與他人動產附合，若不能識別或識別需過巨費用，各動產所有人按「附合時之價值比例」共有合成物——本選項說法方向正確（依附合時價值共有），但若附合後能識別，各取各的；若不能識別，才按比例共有，本選項的描述細節基本正確，但D選項是本題的唯一完全正確答案。","民法814條：以他人之動產為材料加工者，其加工物之所有權歸「材料所有人」取得——但若加工所增之價值超過材料之價值者，得改歸工作人取得（不是「費用超過」，而是「加工增加之價值超過材料價值」），本選項用「加工費用」替換了「加工增加的價值」，用詞不精確，且方向描述也有誤，錯誤。","（本題答案）民法816條：因添附（附合、混合、加工）而喪失權利者，得依關於不當得利之規定，請求補償——喪失所有權的一方可以向取得所有權的一方依不當得利規定請求補償，敘述正確。"],
 trap:"添附制度（附合、混合、加工）的三種情形各有特定的所有權歸屬規則，但有一個共通點：喪失所有權的一方，可以依不當得利規定向取得所有權的一方請求補償（816條）。這個「喪失→得請求補償」的補救機制是添附制度最重要的保護設計，也是本題的核心考點。考試常把「共有」vs「單獨取得」的結果搞混，要記住：動產附合於不動產→不動產所有人單獨取得（不是共有）。",related:"與99年第19題（添附的不當得利準用，B4不當得利主題的跨段呼應）、109年第15題（加工物的所有權歸屬）同屬添附主題，三題合併複習可建立完整的添附制度知識架構。"},
{id:"EDF049",cat:"D3拾得遺失添附",year:"107年第19題",q:"甲於颱風過後翌日在河邊拾得從國家森林區漂流而下之珍貴紅檜木，乙自甲處竊取之，並將之以低價出售予不知情之丙。下列敘述，何者正確？",
 opts:["紅檜木係漂流物，屬無主物，甲拾得後即取得所有權","紅檜木係國有財物，甲無法依遺失物拾得之規定取得其所有權","甲雖無法取得所有權，乙竊取紅檜木後，因加工成藝術品，乙取得所有權","丙雖不知情，但因乙係竊盜，無法以善意取得主張取得紅檜木所有權"],correct:1,
 exps:["漂流物不是「無主物」——漂流木來自國家森林區（屬於國有），有所有人（國家），不是無主物，甲不能以先占方式取得所有權，本選項錯誤。","（本題答案）國家森林區的紅檜木屬於國有財產（國有林木），漂流後仍屬國有，甲拾得的是國有財物，依法應歸還（拾得人不能對國有財物主張遺失物拾得取得所有權），敘述正確。","乙竊取後加工（雕刻成藝術品），民法814條：加工物所有權歸材料所有人（國家）取得，除非加工增加價值超過材料價值才歸工作人——但更根本的問題是乙是竊盜（取得占有無合法依據），竊盜後加工不能使乙取得所有權，本選項不正確。","丙是動產善意受讓人（不知情且低價購買），動產善意取得（民法801條）的要件包括受讓時善意且受讓人占有——丙善意且受交付，原則上可以善意取得，本選項說丙因乙係竊盜而無法善意取得，不符合民法801條善意取得保護善意第三人的精神，錯誤。"],
 trap:"國有財物（如國有林木、公有物）不適用遺失物拾得制度——遺失物拾得的適用前提是「私人」的遺失物，公有財產（國有）有特別的歸還規定，拾得者不能主張取得所有權。另外善意取得（801條）保護不知情的善意受讓人，即使讓與人是竊盜（如丙的情形），只要受讓人善意且符合其他要件，仍可善意取得，不能因為讓與人是竊盜就當然排除善意取得。",related:"與109年第15題（木材遭竊後加工的所有權歸屬）形成直接配對，兩題情境高度相似，合併比對可理解漂流物/拾得/加工等複合情境的解題邏輯。"},
{id:"EDF050",cat:"D3拾得遺失添附",year:"109年第15題",q:"甲現年十七歲，在山中拾獲名貴木材一塊，嗣後該木材遭乙竊取，乙請人雕刻成名貴的佛像，以高價出售於惡意的丙，並交付之。下列敘述，何者正確？",
 opts:["甲16歲以上，可自行行使占有物返還請求權","乙竊取木材後，因加工改造成佛像，乙取得佛像所有權","丙雖係惡意，但因乙交付，依善意取得之規定取得佛像所有權","甲對乙竊取木材之行為，有權損害賠償請求權，惟僅能在甲之法定代理人（父母）之協助下行使"],correct:3,
 exps:["甲17歲是限制行為能力人（舊法），對於受侵害的占有，民法962條賦予占有人（包含限制行為能力人）獨立行使占有保護請求（占有訴訟），但損害賠償請求屬較重要的財產處分行為，需要法定代理人協助或同意，本選項說甲可自行（完全獨立）行使占有物返還請求，需視具體情形判斷，不能一概而言，本選項不夠精確。","乙竊取木材後加工（雕刻成佛像），民法814條：加工物所有權歸材料所有人取得，除非加工所增價值超過材料價值（才歸工作人）——本題木材是「名貴」的（材料價值高），雕刻成佛像（加工物）的加工增加價值未必超過材料本身的名貴價值，所以不能確定乙取得所有權，且乙是竊盜（惡意），更不應使其取得所有權，本選項不正確。","丙是「惡意」的（明知乙無處分權），惡意受讓人不能主張善意取得（動產善意取得需要受讓人善意），丙知情→不符合善意取得要件→不能取得所有權，本選項說丙取得所有權不正確。","（本題答案）甲17歲（限制行為能力人）對乙的竊盜行為有損害賠償請求權（民法184條），但限制行為能力人行使較重要的財產請求權（如訴訟主張損害賠償），通常需要在法定代理人（父母）的協助下進行，不能完全獨立行使，本選項正確描述了限制行為能力人行使請求權需要法定代理人協助的一般規則，敘述正確。"],
 trap:"這題把加工所有權（814條）、善意取得（801條）、限制行為能力人的法律行為能力三個概念整合在一題考驗：①加工物歸材料所有人（除非加工增值超過材料價值）②惡意受讓人不能善意取得③限制行為能力人行使重要財產請求需法定代理人協助。三個知識點都是高頻考點，但集中在一題出現，是D段難度較高的綜合題型。",related:"與107年第19題（漂流木竊取後出售，善意取得vs惡意取得）形成高相似度的配對，兩題合併複習加強對「善意/惡意受讓人」這個關鍵判斷點的敏感度。"},
{id:"EDF051",cat:"D3拾得遺失添附",year:"112年第12題",q:"有關遺失物拾得之敘述，下列何者錯誤？",
 opts:["遺失物自通知或最後招領日起逾6個月，未有受領人認領者，由拾得人取得遺失物之所有權","受國家機關或公共場所管理人交付之拾得人（即非直接拾得），可向遺失人請求報酬","拾得人應從速通知遺失人或報告主管機關","遺失人認領遺失物時，應給付相當報酬給拾得人，其報酬不得少於遺失物價值之十分之一"],correct:1,
 exps:["民法807條：遺失物自通知或最後招領日起逾6個月，未有受領人認領，由拾得人取得所有權，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法805條之1第2項：在官署、學校、公共交通工具或其他公共場所拾得遺失物，管理該場所之人或機構（管理人）才是拾得人，「受管理人交付」的實際撿到的人不是法律上的拾得人——這種情形下「交付拾得人（非直接拾得者）」無法向遺失人請求報酬（因為在官署等場所的管理責任由管理機構承擔，不是由個別撿到東西的人享有報酬請求），本選項說可以請求報酬，與法條規定不符，是本題錯誤敘述。","民法803條：拾得人應從速通知遺失人或報告主管機關，敘述正確，非本題答案。","民法805條之1第1項：遺失人認領遺失物時，應給付拾得人報酬，不得少於遺失物價值十分之一，敘述正確，非本題答案。"],
 trap:"官署/公共場所內拾得遺失物的特殊規定（805條之1第2項）：在這些特殊場所內「撿到東西」的人，法律上不是拾得人（管理機構才是），所以他不能對遺失人主張報酬請求——這跟在一般場所（馬路上、公園廣場）撿到東西的情形不同。考試在104年第24題（官署內拾得不得請求報酬）和112年第12題（受管理人交付的非直接拾得者不得請求報酬）都考了這個特殊規定，兩次都考「官署等場所」的例外，是遺失物制度中最重要的特殊規定。",related:"與104年第23題（遺失物報酬1/10，不是1/5）、104年第24題（官署內拾得不得請求報酬）同屬遺失物主題，三題合併複習可完整掌握遺失物拾得制度的所有考點。"},
{id:"EDF052",cat:"D4相鄰通行",year:"100年第25題",q:"甲有A、B二地，因出賣A地給乙，致B地與公路無適宜之連絡，不能為通常之使用。下列敘述何者正確？",
 opts:["甲可以任擇A地以外之他人土地通行","乙得請求甲給予金錢補償","乙得向甲請求依法開設通路，但須支付補償金","乙僅得通行A地，且就A地所受損害，應給付償金"],correct:3,
 exps:["B地是因為甲「出賣A地給乙」而造成與公路無連絡的袋地——依民法789條第1項：因土地一部讓與或分割，而與公路無適宜聯絡者，僅得通行受讓人或讓與人之土地，且不必支付補償金。本題乙是受讓人（從甲買了A地），乙不能通行甲「A地以外的其他土地」，本選項說甲可任擇他人土地，邏輯有誤（是乙要通行，且只能通行A地），錯誤。","依民法789條，因土地讓與造成袋地時，通行受讓人（乙）的土地（A地），且「不必支付補償金」（789條第1項後段），乙不需要給甲補償金（這是對交易安排的法律效果），本選項說乙得請求甲給金錢補償，方向不對，錯誤。","同789條，乙通行A地不需支付補償金，本選項說須支付補償金不正確。","（本題答案）民法789條第1項：因土地一部讓與（甲出賣A地給乙），而與公路無適宜聯絡者，僅得通行「受讓人」（乙）之土地（A地），且就A地所受損害，「不」必支付償金——本選項說乙僅得通行A地（方向正確），且就A地所受損害應給付償金，但依789條是「不必」支付償金，此選項可能表述有誤，需依官方答案D確認。實際上官方答案D的核心是「乙僅得通行A地」這個限制是正確的，通行範圍的限制是789條的精髓。"],
 trap:"民法789條（因讓與造成的袋地通行）vs 787條（一般袋地通行）的重要差異：787條的一般袋地通行，通行人需付補償金給被通行的土地所有人；789條因讓與（出賣或分割）造成的袋地，只能通行讓與人或受讓人的土地，且「不需支付補償金」——這個免補償的設計，是因為造成袋地的原因本身就來自當事人的交易安排，交易中應已考量這個因素。",related:"與107年第24題（通行權人不必然是土地所有人）、114年第19題（A地四面環山只能通行B地的必要通行權）同屬相鄰通行主題，三題合併複習可建立完整的通行權制度架構。"},
{id:"EDF053",cat:"D4相鄰通行",year:"102年第8題",q:"甲所有的A地與乙所有的B地相鄰，甲在A地上建築房屋及圍牆，其中圍牆有一部分越界建築在B地上。下列敘述何者正確？",
 opts:["乙得隨時請求甲移去越界圍牆","甲建築圍牆越界係因故意，依民法規定，乙不得請求移去越界圍牆，但得請求損害賠償","甲建築圍牆越界係因故意，依民法規定，乙不得請求損害賠償，但得請求甲移去越界圍牆","甲建築圍牆越界係因故意，乙得請求甲移去越界圍牆，且乙不受是否即時提出異議之限制"],correct:3,
 exps:["民法796條：建築圍牆越界的處理，分為故意與非故意兩種——非故意（無重大過失）越界，且鄰地所有人知悉後未即時提出異議，則不得請求移去（需支付補償金）；本選項說「乙得隨時請求移去」，在非故意情形下若未即時異議就失去請求移去的權利，並非「隨時」可以請求，本選項不精確，錯誤。","「故意」越界建築圍牆——民法796條對「故意」越界沒有保護，故意越界者不能受益於「知情未即時異議則不得請求移去」的規定，乙可以請求甲移去越界圍牆，且同時可以請求損害賠償，本選項說「不得請求移去」與故意越界的規則不符，錯誤。","同上，故意越界的情形下，乙得同時請求移去並請求損害賠償，本選項說不得請求損害賠償也不正確，錯誤。","（本題答案）甲是「故意」越界建築圍牆——民法796條的保護（知悉且未即時異議→不得請求移去）僅適用於非故意（非重大過失）的越界，故意越界者不受此保護，乙得請求甲移去越界圍牆，且不受「是否即時提出異議」的限制，敘述正確。"],
 trap:"越界建築的核心規則：①非故意（且非重大過失）越界→鄰地所有人知悉後若未即時提出異議，則不得請求移去（只能請求補償）；②故意越界→鄰地所有人不受任何時間限制，隨時可以請求移去，且可同時請求損害賠償。「故意vs非故意」決定了鄰地所有人的救濟路徑是否受限，這個區分是越界建築主題最重要的考點。",related:"與103年第22題（越界建築故意vs非重大過失的處理差異）、105年第22題（非因故意重大過失越界，知情未即時異議）、112年第17題（非故意越界，鄰地所有人不為異議的效果）同屬越界建築主題，四題合併可完整掌握796條的所有情形。"},
{id:"EDF054",cat:"D4相鄰通行",year:"103年第22題",q:"關於越界建築之處理，下列敘述何者正確？",
 opts:["土地所有人建築圍牆時因重大過失逾越地界者，鄰地所有人如知其越界而不即提出異議，不得請求移去或變更其建築物","土地所有人建築房屋時無重大過失越界，鄰地所有人即時提出異議，土地所有人仍可繼續建築至完工","建築越界之土地所有人，除為房屋外，為其他建築物越界建築者，鄰地所有人均得請求移去或變更，不受限制","土地所有人建築房屋非因故意或重大過失逾越地界者，鄰地所有人如知其越界而不即提出異議，不得請求移去或變更其建築物"],correct:3,
 exps:["民法796條：「非因故意或重大過失」越界且鄰地所有人知悉未即時異議，才不得請求移去——重大過失越界不在保護範圍內（只保護輕過失或無過失的情形），本選項說重大過失越界也適用這個保護，不正確。","鄰地所有人「即時提出異議」，表示保護規定的前提條件（未即時異議）不成立，土地所有人在即時異議的情況下，不能繼續越界建築（鄰地所有人有請求移去的權利），本選項說可繼續建築，不正確。","民法796條的保護範圍，依法條本文，針對「建築房屋」（不及於其他一般建築物），本選項說「其他建築物鄰地所有人均得請求移去不受限制」雖有部分正確（796條確實只針對房屋），但「不受任何限制」的說法過於絕對，且本選項不是最精確的答案。","（本題答案）民法796條第1項：土地所有人建築房屋非因故意或重大過失逾越地界者，鄰地所有人如知其越界而不即提出異議者，不得請求移去或變更其建築物——本選項完整正確地表述了796條的核心規定（非故意非重大過失+知情未即時異議→不得請求移去），敘述正確。"],
 trap:"796條保護的三個條件缺一不可：①土地所有人「非因故意或重大過失」越界（輕過失或無過失才受保護）②鄰地所有人「知悉」越界③鄰地所有人「未即時提出異議」。三個條件全部成立，才能讓越界建築者不被要求移去房屋（但需支付補償金）。其中「重大過失」不受保護是最容易被忽略的細節，考試常把「重大過失」說成也受保護來製造陷阱。",related:"與102年第8題（故意越界，不受未即時異議的保護）、105年第22題（非因故意重大過失越界的處理）同屬越界建築主題，三題合併可完整掌握796條的各種情形和限制。"},
{id:"EDF055",cat:"D4相鄰通行",year:"105年第22題",q:"民法第796條規定，土地所有人建築房屋非因故意或重大過失逾越地界者，鄰地所有人如知其越界而不即提出異議，不得請求移去或變更其建築物。該條規定之目的何在？",
 opts:["維護建築之美觀","避免浪費社會資源，維護社會公益","保護土地所有人之財產權","保護已越界建築土地所有人，使其可隨意越界建築"],correct:3,
 exps:["796條的立法目的不是為了美觀，本選項不正確。","避免浪費社會資源（拆掉已完成的建築是一種浪費）確實是796條的立法考量之一，但不是本題選項中最直接正確的說明，且「維護社會公益」的表述較泛，不是最精確。","796條主要保護的是越界建築者（已建成的房屋），而不是鄰地土地所有人的財產權，本選項說法方向相反，錯誤。","（本題答案）796條的目的是：在非故意、非重大過失的前提下，已完成的越界建築（如房屋已建好）若被強制拆除，不僅對越界建築者造成極大損失（已花費鉅額建築費用），對社會資源也是浪費——法律採取「補償代替拆除」的折衷方式，使越界建築者可以保留已建成的房屋，但需給付鄰地所有人補償金，這個設計「保護已越界建築土地所有人使其可保留房屋（在一定條件下）」，是796條最直接的立法目的。"],
 trap:"這題問的是796條的「立法目的」，而不是條文規定本身——796條的目的是在特定條件下（非故意非重大過失、鄰地所有人知情但未即時異議）保護「越界建築者」免於被要求拆除已完成的建築物，以避免社會資源浪費和越界建築者的巨大損失，改以補償金代替拆除。這是「效率/公益考量」vs「財產保護」之間的平衡，理解立法目的有助於在考場上推導相關規定的解釋。",related:"與102年第8題、103年第22題、112年第17題同屬越界建築主題，這四題可以合併成「越界建築完整考點包」。"},
{id:"EDF056",cat:"D4相鄰通行",year:"106年第39題",q:"下列有關相鄰關係之敘述，何者錯誤？",
 opts:["聲響之侵入係偶發、輕微或依地方習慣認為相當者，彼此仍應於合理程度範圍內忍受，不得請求損害賠償","土地所有人利用土地之天然力，以資源回收為目的，通過他人土地，以管線運送廢棄物，他人不得拒絕","土地因與公路無適宜聯絡，致不能為通常使用時，土地所有人得通行周圍地以至公路","相鄰之不動產所有人應互相容忍彼此因使用土地自然流至之水，而不得設施阻止之，但設施得阻止洪水之侵害"],correct:3,
 exps:["民法793條：土地所有人得禁止他人之氣體、液體、聲音、震動等侵入，但侵入輕微者，不在此限——偶發輕微或依地方習慣認相當的聲響侵入，鄰地所有人應容忍，不得請求損害賠償，敘述正確，非本題答案。","民法786條第1項：土地所有人得通過他人土地以管線運送氣、水、電信等，對方不得拒絕——廢棄物回收的管線運送是類似功能的應用，敘述方向正確，非本題答案。","民法787條第1項：土地因與公路無適宜聯絡，致不能為通常使用時（袋地），土地所有人得通行周圍地以至公路，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法784條：相鄰不動產所有人，應互相容忍因使用土地自然流至之水，不得設施阻止之——但法條並未規定「設施得阻止洪水的侵害」這樣的例外，本選項把一個不存在的例外加進法條規定，是錯誤的敘述（實際上784條是要相互容忍自然水流，沒有明文允許可以阻止洪水的例外條款）。"],
 trap:"相鄰關係的「自然水流容忍義務」（民法784條）：土地所有人必須容忍鄰地自然流入的水（如雨水、自然溪流），不得設施阻止——本題選項D虛構了「設施得阻止洪水」的例外，但這個例外不存在於法條中，是典型的「捏造例外條款」陷阱。相鄰關係的各種容忍義務（聲響、氣體、水流等）都以「輕微/自然」為限，超過一定程度才可主張禁止或賠償。",related:"與107年第24題（通行權的主體不限所有人）、114年第19題（必要通行權的適用情形）同屬相鄰關係主題，三題合併複習可建立完整的相鄰關係法律架構。"},
{id:"EDF057",cat:"D4相鄰通行",year:"107年第24題",q:"關於相鄰地必要通行權，下列敘述何者錯誤？",
 opts:["通行權人必須為土地所有人","土地因與公路無適宜聯絡即可，無須毫無聯絡方法","通行權人有償金給付義務","通行地點應擇損害最少之處所及方法為之"],correct:0,
 exps:["（本題答案，敘述錯誤）民法787條第1項：土地因與公路無適宜聯絡，致不能為通常使用時，土地所有人「得通行」周圍地——但通行權的行使主體不限於「所有人」，承租人、地上權人、用益物權人等有合法使用權的人，依通說也可以主張必要通行（因為通行是為了使土地能被通常使用，使用土地的人都需要這個功能），本選項說「通行權人必須為土地所有人」過於限縮，錯誤。","民法787條第1項：不能為「通常使用」即可主張通行，不需要完全沒有任何聯絡才能主張（只要無適宜聯絡就可以），敘述正確，非本題答案。","民法787條第2項：通行人應給付通行地所有人以償金——通行是有代價的（不是無償），通行人需給付補償，敘述正確，非本題答案。","民法787條第1項後段：通行應就周圍地損害最少之處所及方法為之——選擇對被通行土地損害最小的路線和方式，敘述正確，非本題答案。"],
 trap:"必要通行權（787條）的通行主體：法條說「土地所有人得通行」，但不意味著只有所有人才有通行權——地上權人、承租人、其他合法使用土地的人，只要為了合法使用土地的目的而需要通行，都可以類推適用必要通行權。考試常把「所有人」這個詞誤解為唯一適格的通行主體，這是787條考題最常見的陷阱。",related:"與100年第25題（因土地出賣造成袋地，通行限制規則）、114年第19題（必要通行的具體情形）同屬通行主題，三題合併複習可建立完整的必要通行權制度架構。"},
{id:"EDF058",cat:"D4相鄰通行",year:"112年第17題",q:"土地所有人非因故意或重大過失逾越地界建築房屋，而鄰地所有人知其越界，卻不即時提出異議者，下列何者正確？",
 opts:["鄰地所有人不為異議，即喪失對越界建築之土地所有人之損害賠償請求","鄰地所有人不為異議，越界建築之土地所有人得取得越界部分之所有權","鄰地所有人不為異議，越界建築之土地所有人取得越界土地之永久使用權","鄰地所有人不得再請求移去或變更越界建築，但得請求越界建築之土地所有人支付償金"],correct:3,
 exps:["鄰地所有人未即時異議，喪失的是「請求移去越界建築物」的權利，但仍保有請求「損害賠償或償金」的權利——不是喪失所有賠償請求，本選項說喪失損害賠償請求，過於絕對，錯誤。","鄰地所有人未即時異議，不代表越界建築者取得越界土地的所有權——他只是被允許保留已建成的房屋（不被要求拆除），所有權仍屬鄰地所有人，本選項不正確。","同上，越界建築者不取得永久使用權，只是現有的越界建築不被要求拆除，未來新建設仍不得越界，本選項不正確。","（本題答案）民法796條第1項（配合796條之1）：非故意非重大過失越界建築，鄰地所有人知情但未即時異議→不得請求移去或變更越界建築，但「得請求支付償金」——鄰地所有人以金錢補償取代拆除，保有財產上的補償請求，敘述正確。"],
 trap:"796條的法律效果精確說明：①失去：鄰地所有人不得請求移去或變更越界房屋②保留：鄰地所有人得請求越界建築者支付「償金」（定期補償，類似地租的概念）③所有權：越界土地的所有權仍屬鄰地所有人，不因未異議而移轉。這三點合在一起才是796條完整的法律效果，本題考的是第①②兩點（不得請求拆除，但可請求償金），是16年考題中考越界建築法律效果最完整的一道題。",related:"與102年第8題、103年第22題、105年第22題同屬越界建築主題，四題合併形成最完整的越界建築考點地圖。"},
{id:"EDF059",cat:"D4相鄰通行",year:"114年第15題",q:"依現行民法物權編有關不動產所有權相鄰關係規定之內容，下列之選項，何者正確？",
 opts:["土地所有人建築房屋故意逾越地界者，鄰地所有人得請求移去或變更其建築物，且不受是否即時提出異議之限制","相鄰地所有人得為利用土地目的，通過他人土地敷設管線，但他人有事先知情同意之必要","土地所有人非因故意或重大過失逾越地界者，鄰地所有人不得請求損害賠償","土地因與公路無適宜聯絡而不能為通常使用，土地所有人請求通行他人土地時，不須給付通行地所有人任何代價"],correct:0,
 exps:["（本題答案）故意越界建築房屋，鄰地所有人可以請求移去或變更，且不受「是否即時提出異議」的限制（796條的保護前提是非故意非重大過失，故意越界不受保護）——與非故意越界（知情未即時異議→不得請求移去）形成對比，故意越界鄰地所有人隨時可主張，敘述正確。","民法786條：土地所有人為利用土地目的，得通過他人土地設置管線，「他人不得拒絕」——不需要「事先知情同意」，是鄰地所有人的容忍義務，本選項說需要事先同意，與法條規定相反，錯誤。","796條只保護非故意非重大過失越界建築者「免於被要求拆除」，但並不排除損害賠償請求——鄰地所有人知情未異議（失去拆除請求），但仍可請求損害賠償（796條之1），本選項說不得請求損害賠償，不正確。","民法787條第2項：通行人應給付通行地所有人以「償金」——通行是有代價的（需給付償金），不是免費，本選項說不須給付任何代價，與法條規定相反，錯誤。"],
 trap:"這題把相鄰關係的四個常考規則整合在一起：①故意越界→鄰地所有人隨時可請求移去（不受即時異議限制）②管線通過→鄰地所有人不得拒絕（不需同意）③非故意越界→鄰地知情未異議→不得請求拆除，但仍可請求損害賠償④袋地通行→需給付償金。四個選項各自錯誤的方向都很典型，是D4相鄰通行主題的完整總複習題型。",related:"與102年第8題（故意越界）、107年第24題（通行權人不限所有人）同屬相鄰關係主題，合併複習可完整掌握相鄰關係法律的完整體系。"},
{id:"EDF060",cat:"D4相鄰通行",year:"114年第19題",q:"甲所有的A地與乙所有的B地相鄰。下列何者正確？",
 opts:["A地兩面環山、第三面環河，僅能經過B地通行於道路，則甲須經乙的同意，始得通行B地","A地兩面環山、第三面環河，僅能經過B地通行於道路，不論乙同不同意，甲均得通行B地，但須付償金予乙","甲在A地上設水管引水，若需通過B地，須先獲得乙的同意，否則不得為之","甲積欠乙租金，乙可拒絕甲通行B地，以此逼甲繳清租金"],correct:1,
 exps:["民法787條（必要通行權）：土地因與公路無適宜聯絡，致不能為通常使用時，土地所有人得通行周圍地以至公路——這是法定通行權，不需要鄰地所有人（乙）的同意，本選項說須經乙同意，與法定通行權的本質（法律直接賦予，不需鄰地人同意）不符，錯誤。","（本題答案）A地三面環山環河，無適宜聯絡公路，甲有法定必要通行權（787條），可以通行B地不需乙同意；但依787條第2項，通行人應給付通行地所有人以償金，敘述正確。","民法786條：土地所有人利用土地之天然力，得通過他人土地設置管線，他人「不得拒絕」——設水管不需要事先獲乙同意，這是法定的容忍義務，本選項說須先獲同意，與786條規定相反，錯誤。","乙不能以甲積欠租金為由拒絕甲行使法定通行權——法定通行權（787條）與租金債務是兩個獨立的法律關係，乙不能把租金債務和通行權混為一談，以拒絕通行來迫使甲還錢，這是以拒絕行使法定通行權作為不當手段逼迫，不合法，本選項不正確。"],
 trap:"必要通行權（787條）是「法定通行權」——它的成立不需要鄰地所有人的同意，只要滿足「與公路無適宜聯絡，致不能通常使用」的要件，法律就直接授予通行權，鄰地所有人無法拒絕。但通行是「有償的」（需給付償金），這個「法定授予+有償」是787條的雙重特徵。本題選項A（需同意）和C（設管線需同意）都犯了「把法定通行/設施義務誤認為需要當事人同意」的錯誤。",related:"與107年第24題（通行權人的主體範圍）、100年第25題（因土地讓與造成袋地的通行限制和補償規則）同屬必要通行主題，三題合併複習可建立完整的通行權知識架構。"},
{id:"EDF061",cat:"D5地上權農育役權典權",year:"99年第25題",q:"以下關於地上權之敘述何者錯誤？",
 opts:["地上權可以訂有期限，或為未定期限之地上權","地上權可以為有償，亦可為無償","地上權不得讓與，但得與建築物一起讓與","地上權人得將地上權拋棄，不得將之讓與"],correct:3,
 exps:["地上權確實可以定有期限（定期地上權）或不定期限（不定期地上權），敘述正確，非本題答案。","地上權可以有償（約定地租）或無償（無地租約定），敘述正確，非本題答案。","地上權依民法838條可以讓與，通常須同時連同地上物一起讓與，但不是不得讓與，敘述方向正確，非本題答案。","（本題答案，敘述錯誤）民法838條第1項：地上權人得將地上權讓與他人或設定抵押權——地上權是可以讓與的，本選項說不得讓與與法條明文相反，是本題錯誤敘述。"],
 trap:"地上權的讓與性：地上權是物權（用益物權），依民法838條，地上權人可以將地上權讓與他人，或以地上權設定抵押權——不是不得讓與。",related:"與100年第24題（地上權是物權）、105年第23題（地上權是物權不是債權）同屬地上權基本性質主題。"},
{id:"EDF062",cat:"D5地上權農育役權典權",year:"100年第24題",q:"下列關於地上權之敘述，何者正確？",
 opts:["稱普通地上權者，謂以在他人土地之上下有建築物或種植竹木為目的而使用其土地之債權","稱區分地上權者，謂以在他人土地上下之一定空間範圍內有建築物或其他工作物為目的而使用其土地之物權","地上權人不得將地上權讓與他人","地上權人積欠地租未達二年之總額，土地所有人即得終止地上權"],correct:1,
 exps:["普通地上權是物權（不是債權），本選項說普通地上權是債權，是最基本的概念錯誤。","（本題答案）民法841條之1（區分地上權）：稱區分地上權者，謂以在他人土地上下之一定空間範圍內有建築物或其他工作物為目的而使用其土地之物權——區分地上權的特色是一定空間範圍（如地下停車場、高架捷運等），是物權，敘述正確。","民法838條：地上權人得讓與地上權，本選項說不得讓與，錯誤。","民法836條：地上權人積欠地租達二年之總額，土地所有人得定相當期限催告清償，仍不清償時得終止地上權——需達到二年總額且催告後不清償，本選項說未達二年即得終止，錯誤。"],
 trap:"區分地上權（841條之1）vs普通地上權（832條）的辨別：普通地上權=在他人土地之上下有建築物或竹木；區分地上權=在他人土地上下一定空間範圍內有建築物或工作物（強調特定的空間層次）。兩者都是物權，不是債權。",related:"與105年第23題（地上權是物權不是債權）、106年第21題（地上權終止條件）同屬地上權基本規則主題。"},
{id:"EDF063",cat:"D5地上權農育役權典權",year:"101年第13題",q:"甲將其所有土地出租予乙建築房屋。下列敘述何者錯誤？",
 opts:["契約成立後，乙得請求甲為地上權之登記","乙將房屋所有權移轉予丙時，原基地租賃契約對於丙仍繼續存在","乙出賣房屋時，甲無依同樣條件優先承買之權利","甲、乙得約定由乙負擔就土地應納之一切稅捐"],correct:2,
 exps:["民法422條之1：租用基地建築房屋者，承租人於訂立契約後得請求出租人為地上權登記，敘述正確，非本題答案。","乙將房屋移轉予丙，依買賣不破租賃原則或地上權的物權性，原基地租賃契約對丙繼續有效，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法426條之2：租用基地建築房屋，出租人出賣基地時，承租人有依同樣條件優先購買之權——甲出賣土地時，乙（基地承租人）有優先承買權，本選項說甲無此義務（乙無優先承買權），與法條明文規定相反，是本題錯誤敘述。","甲乙得約定由乙（承租人）代為繳納土地稅捐，這是契約自由原則允許的約定，敘述正確，非本題答案。"],
 trap:"民法426條之2賦予基地承租人的優先購買權：出租人出賣基地時，承租人有依同樣條件優先承購的機會——這是保護已建築房屋的承租人的重要機制，因為基地易主後承租人的處境會改變。本選項說甲無此義務（乙無優先承買），是把「有」說成「無」的典型反話陷阱。",related:"與101年第16題（定期地上權因建築物滅失不消滅）、101年第40題（積欠地租終止地上權）同屬地上權/基地租賃主題，三題合併複習。"},
{id:"EDF064",cat:"D5地上權農育役權典權",year:"101年第16題",q:"甲以其土地設定地上權於乙。下列敘述何者最正確？",
 opts:["定有期限之地上權原則上不因建築物於所定期限內滅失而消滅","甲、乙間不得設定未定有期限之地上權","甲、乙間不得設定未定有地租之地上權","因不可抗力致妨礙土地之使用時，乙得請求減免租金"],correct:0,
 exps:["（本題答案）民法840條：定有期限之地上權，其期限屆滿前，因建築物滅失，地上權「不」因此消滅——地上權的存續以期限為準，不因建築物提前滅失而提前終止，乙仍可在剩餘期限內繼續使用土地（並可重建），敘述正確。","地上權可以定有期限，也可以不定期限，法律並未禁止設定未定期限的地上權，本選項說不得設定不定期限地上權，錯誤。","地上權可以有償（約定地租）也可以無償（無地租），法律並未要求一定要約定地租，本選項說不得設定無地租的地上權，錯誤。","民法835條之1：因不可抗力妨礙土地使用，乙得請求「減少」地租或免除一定期間之地租——方向正確（可以請求減少），但法條的具體內容是請求減免，不是本題最精確的答案，且C選項說「不得設定無地租地上權」明顯錯誤，A選項才是最正確的表述。"],
 trap:"定有期限的地上權，期限內建築物滅失不影響地上權的存續（840條）——地上權依「期限」存在，不依「建築物存在」存在。這個規則保護了地上權人的投資利益（可以在剩餘期限內重建），也讓土地所有人無法藉由建築物滅失來提前終止地上權。另外地上權可以是不定期限、也可以是無償的，兩者都是法律允許的安排。",related:"與101年第40題（積欠地租終止地上權的要件）、101年第13題（基地承租人的優先承買權）同屬地上權/基地租賃主題，三題合併複習。"},
{id:"EDF065",cat:"D5地上權農育役權典權",year:"101年第40題",q:"甲有A地一筆，設定地上權於乙，下列敘述何者最正確？",
 opts:["若乙積欠地租達一年之總額時，甲得不經催告終止地上權","若乙積欠地租達二年之總額時，甲得不經催告終止地上權","若乙積欠地租達二年之總額時，甲得經催告後終止地上權","若乙積欠地租達一年之總額時，甲得經催告後終止地上權"],correct:2,
 exps:["積欠地租需達二年（不是一年）才構成終止條件，且需催告，本選項兩個條件都錯，錯誤。","積欠地租達二年是正確的，但不經催告錯誤——依民法836條，需定相當期限催告清償，仍不清償才能終止，本選項省略催告程序，錯誤。","（本題答案）民法836條第1項：地上權人積欠地租達二年之總額，土地所有人得定相當期限催告清償，逾期不清償者，得終止地上權——二年總額+催告程序+逾期不清償→才能終止，敘述正確。","積欠一年即可催告終止，與法條規定二年不符，錯誤。"],
 trap:"積欠地租終止地上權的兩個關鍵數字和程序：①需積欠達二年總額（不是一年）②需定相當期限催告清償（不是無需催告）③逾期不清償→才得終止。三個要素缺一不可，考試很愛在一年vs二年和需不需要催告這兩個點上製造混淆。",related:"與100年第24題、103年第24題、106年第21題、108年第8題、114年第17題同屬積欠地租終止地上權高頻考點，五題合併複習牢記二年+催告的組合。"},
{id:"EDF066",cat:"D5地上權農育役權典權",year:"102年第28題",q:"甲所有的A地因通行之需在乙的B地上設定不動產役權。下列敘述何者錯誤？",
 opts:["甲得將A地設定抵押權與丙銀行，抵押權效力及於不動產役權","甲將A地讓與丁，丁取得A地所有權，A地上的不動產役權隨之移轉給丁","甲乙協議廢止不動產役權後，不動產役權消滅，丁因A地取得之利益（即不動產役權）亦消滅","若甲有不動產役權，則乙所有之B地（供役地）因此以利於甲之方式受到限制"],correct:1,
 exps:["不動產役權具有從屬性，A地設定抵押，抵押權效力也及於依附在A地上的不動產役權，敘述正確，非本題答案。","（本題答案，依官方為錯誤敘述）甲將A地讓與丁——依官方答案，此敘述有誤。不動產役權設定在「乙的B地（供役地）」上，甲的A地是需役地。當需役地所有人（甲）讓與需役地給丁，依民法853條，不動產役權隨需役地移轉（從屬性）。但官方認定此選項表述有誤，可能是因為題目設定的情境特殊，或B選項的措辭有細微問題，以官方答案B為準。","甲乙協議廢止不動產役權後的效果：若A地已讓與丁，廢止役權應取得丁的同意，單純甲乙協議廢止不能影響丁的權利，此選項的邏輯推論有疑問，但官方未選此為答案。","不動產役權設定在乙的B地（供役地）上，B地因此負有容忍甲通行的義務，敘述正確，非本題答案。"],
 trap:"⚠️ 本題官方答案為B，與一般役權從屬性的理解有出入。建議直接記住官方答案B，不要深究邏輯，以避免在考場上浪費時間。",related:"與103年第23題（眺望役權的設定與後設地上權的效力）、104年第29題（先設役權後設地上權的效力衝突）同屬不動產役權主題。"},
{id:"EDF067",cat:"D5地上權農育役權典權",year:"103年第23題",q:"甲在其土地上為乙設定眺望不動產役權，其後甲未獲得乙之同意又為丙設定地上權，丙預備在該地上建築房屋，若該房屋建築完成後會妨礙乙之眺望，下列敘述何者正確？",
 opts:["乙得請求甲賠償損害，但乙不得對丙主張不動產役權","乙得請求甲賠償損害，但對丙的建築行為，乙無法主張任何權利","乙得對丙主張不動產役權，請求丙拆除房屋","丙取得地上權後，乙之眺望不動產役權消滅"],correct:2,
 exps:["不動產役權是物權，乙可以直接對侵害役權的丙主張，不只能向設定人甲請求賠償，本選項說乙不得對丙主張，與物權的絕對性不符，錯誤。","同上，乙對丙的建築行為有物權的直接請求權，本選項說乙無法對丙主張，錯誤。","（本題答案）不動產役權是物權（具對世效力）——乙的眺望役權設定在先，丙的地上權設定在後，乙的眺望役權仍然有效存在，且丙的建築妨礙了乙的眺望，乙得直接對丙主張役權，請求拆除妨礙眺望的房屋，敘述正確。","先設定的役權不因後設定地上權而消滅，本選項說役權消滅，錯誤。"],
 trap:"不動產役權的物權效力：役權設定在先→任何後設定的物權（地上權）都不能侵害役權→役權人（乙）可以直接對妨害役權的人（丙）主張，請求除去妨害。先設後的物權效力優先是物權法最重要的基本原則之一。",related:"與104年第29題（先設役權後設地上權，地上權的效力如何）、102年第28題（役權的從屬性）同屬不動產役權主題。"},
{id:"EDF068",cat:"D5地上權農育役權典權",year:"103年第24題",q:"關於地上權，下列敘述何者正確？",
 opts:["普通地上權乃以在他人土地上下之一定空間範圍內有建築物或其他工作物為目的而使用其土地之物權","地上權人積欠地租達二年之總額，土地所有人得定相當期限，催告清償，逾期不清償者，得終止地上權","地上權有期限者，期限屆滿後，若仍有建築物存在，土地所有人得不補償地上物而取得建築物","地上權人得將地上權讓與他人，但需土地所有人同意"],correct:1,
 exps:["在他人土地上下之一定空間範圍內是區分地上權的定義，普通地上權的定義是以在他人土地之上下有建築物或竹木為目的，本選項把區分地上權的定義套到普通地上權身上，錯誤。","（本題答案）民法836條第1項的正確描述——二年+催告+逾期不清償→得終止，敘述正確。","民法840條：地上權期限屆滿，有建築物存在時，地上權人得請求土地所有人以時價收買建築物——土地所有人需以時價收買（不是免費取得），本選項說不補償即可取得，錯誤。","民法838條：地上權人得讓與地上權，不需土地所有人同意（除非契約另有約定），本選項說需同意，不符合法條原則，錯誤。"],
 trap:"地上權期限屆滿有建築物時：地上權人得請求土地所有人以時價收買（840條），保護了地上權人的建築投資。地上權讓與不需要土地所有人同意（原則），除非有特別約定。",related:"與101年第40題（積欠地租終止規則）、110年第17題（不定期地上權的存續期間門檻）同屬地上權規則主題。"},
{id:"EDF069",cat:"D5地上權農育役權典權",year:"104年第29題",q:"甲以其土地設定不動產役權於乙後，復以同一土地之一部分設定普通地上權於丙。丙之普通地上權的效力如何？",
 opts:["當然無效，因為設定地上權需得役權人同意","效力未定，需得役權人同意始生效力","有效，但地上權效力不得妨礙役權","有效，且役權因地上權之設定而消滅"],correct:2,
 exps:["地上權的設定不需要役權人同意，地上權設定本身有效，本選項說需役權人同意才有效，不正確。","地上權設定有效（甲是土地所有人，有設定物權的權利），不是效力未定，本選項不正確。","（本題答案）先設定的役權（乙的不動產役權）效力優先，後設定的地上權（丙）有效，但地上權的行使不得妨礙先前設定的役權，敘述正確。","後設定的地上權不能消滅先設定的役權（登記公示原則，丙查閱登記可知役權存在），本選項說役權消滅，錯誤。"],
 trap:"物權設定的時間順序與效力衝突：先設定的物權（役權）→後設定的物權（地上權）有效，但後設定的物權不能妨礙先設定的物權的行使。這個後設有效但不得妨礙先設的原則，是物權法物權效力的時間優先規則的具體應用。",related:"與103年第23題（先設役權後設地上權，役權人可對地上權人主張）同屬先後設定物權衝突主題，兩題合併是理解這個規則的最佳組合。"},
{id:"EDF070",cat:"D5地上權農育役權典權",year:"105年第23題",q:"有關地上權之敘述，下列何者正確？",
 opts:["地上權乃為債權","地上權人必須支付地租","地上權之存續期間，有法定最長","地上權為物權之一種，地上權人得就土地進行使用收益"],correct:3,
 exps:["地上權是物權（用益物權）的一種，不是債權，本選項是最基本的概念錯誤。","地上權可以有償（約定地租）或無償（無地租），不是必然要支付地租，本選項說必須支付地租過於絕對，錯誤。","民法沒有規定地上權存續期間的法定最長限制，本選項說有法定最長，不正確。","（本題答案）地上權是用益物權（物權的一種），地上權人在設定目的範圍內，得使用收益土地，敘述正確。"],
 trap:"地上權的三個基本性質：①物權（不是債權）②可以有償也可以無償（不是必須支付地租）③沒有法定存續期間最長限制。",related:"與100年第24題（地上權是物權不是債權）是同一考點的重複出題，兩題合併確認地上權=物權這個基礎概念。"},
{id:"EDF071",cat:"D5地上權農育役權典權",year:"105年第24題",q:"民法規定，區分地上權人得與其設定之土地上下有使用、收益權利之人，約定相互間使用收益之限制。其約定未經土地所有人同意者，下列敘述何者正確？",
 opts:["該約定有效，且對土地所有人有效力","該約定有效，對土地所有人亦發生效力","該約定效力未定，需土地所有人同意方生效","該約定對土地所有人不生效力"],correct:3,
 exps:["區分地上權人與他人約定使用限制，未經土地所有人同意，不對土地所有人發生效力，本選項說對土地所有人有效力，不正確。","同上，本選項與選項A意思相同，都說對土地所有人生效，錯誤。","這個約定是在區分地上權人和有使用收益權人之間，不是對土地所有人的處分行為，不適用效力未定需同意生效的規則，本選項不正確。","（本題答案）民法841條之5：區分地上權人與有使用收益權利人相互間約定使用收益之限制，未經土地所有人同意者，對土地所有人不生效力，敘述正確。"],
 trap:"區分地上權的使用限制約定（841條之5）：未經土地所有人同意，只在約定當事人之間有效，對土地所有人不生效力——土地所有人不是這個約定的當事人，不受其拘束。",related:"與104年第29題（先後設定物權的效力衝突）、105年第25題（不動產役權的識別）同屬用益物權主題。"},
{id:"EDF072",cat:"D5地上權農育役權典權",year:"105年第25題",q:"以他人不動產供自己不動產通行、汲水、採光、眺望、電信或以其他特定便宜之用者，稱為：",
 opts:["農育權","抵押權","不動產役權","地上權"],correct:2,
 exps:["農育權是為了在他人土地上從事農林牧獵養殖之目的，不是以他人不動產供通行等便宜，本選項不正確。","抵押權是以不動產擔保債務的擔保物權，本選項不正確。","（本題答案）民法851條：稱不動產役權者，謂以他人不動產供自己不動產通行、汲水、採光、眺望、電信或其他以特定便宜之用為目的之物權，本題描述完全符合不動產役權的定義，敘述正確。","地上權是在他人土地上設置建築物或竹木為目的，本選項不正確。"],
 trap:"不動產役權（851條）的定義識別：以他人不動產（供役地）供自己不動產（需役地）通行、汲水、採光、眺望、電信或其他特定便宜為目的，這些典型的役權類型是考試識別題的標準材料，要記住這個列舉。",related:"與103年第23題（眺望役權的效力）、104年第29題（役權與地上權的衝突）同屬不動產役權主題。"},
{id:"EDF073",cat:"D5地上權農育役權典權",year:"106年第21題",q:"關於地上權，下列敘述何者正確？",
 opts:["以公共建設為目的而成立之地上權，不得定有期限","經設定地上權之土地，不得再設定抵押權","地上權設定後，不論是否約定地租，土地所有人均得請求增減地租","地上權人積欠地租達二年之總額，土地所有人定相當期限催告後，地上權人逾期未清償，得終止地上權"],correct:3,
 exps:["以公共建設為目的的地上權（如高速公路、捷運），依民法833條之2，得定有存續期間——並非不得定有期限，錯誤。","設定地上權後，土地所有人仍可以把土地設定抵押（抵押的是土地所有權，不是地上權，兩者不衝突），本選項說不得再設定抵押，不正確。","地租的增減需依法定要件，不是不論是否約定地租均可請求，本選項過於絕對，錯誤。","（本題答案）積欠地租達二年+催告+逾期不清償→得終止，再次印證這個核心規則，敘述正確。"],
 trap:"積欠地租終止地上權（836條）的核心規則在本段已多次出現（101-40、103-24、106-21），這個考點在16年考題中至少出現五次，是D5段最高頻的單一考點。另外土地所有人設定地上權後仍可設定抵押（只是抵押的標的是有地上權負擔的土地），這個可以並存的知識點也是常考的陷阱。",related:"與101年第40題、103年第24題同屬積欠地租達二年+催告→終止地上權的重複命題三連發。"},
{id:"EDF074",cat:"D5地上權農育役權典權",year:"107年第7題",q:"下列有關農育權之敘述，何者錯誤？",
 opts:["農育權係用益物權之一種","農育權有支付地租約定者，農育權人因不可抗力致收益減少時，得請求減少地租","農育權人不得就農育土地為建築或設置工作物","農育權人對農育土地所受損害，有請求賠償之權"],correct:2,
 exps:["農育權是用益物權，敘述正確，非本題答案。","民法850條之5：農育權有支付地租約定者，農育權人因不可抗力致收益減少時，得請求減少地租，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法850條之1第2項：農育權人得就設定農育權之土地為農育目的而設置建築物（如農舍、倉庫、畜舍等農業設施）——農育權人並非完全不得建築，只要是為農育目的的建築物即可，本選項說不得為建築或設置工作物過於絕對，與法條規定不符，是本題錯誤敘述。","農育土地受損時，農育權人有請求損害賠償的權利，敘述正確，非本題答案。"],
 trap:"農育權（850條之1）：在他人土地上從事農業目的，同時可以設置農業用建築物（農舍、農業設施）——不是完全不得建築。農育權人的建築權限以農育目的為範圍，在這個範圍內的建築是允許的。",related:"與105年第25題（用益物權各種類的識別）、108年第8題（農育權vs地上權的區分）同屬用益物權主題。"},
{id:"EDF075",cat:"D5地上權農育役權典權",year:"108年第8題",q:"依我國民法，下列關於地上權之敘述，何者錯誤？",
 opts:["地上權設定後，因土地價值之昇降，依原定地租給付顯失公平者，當事人得請求法院增減地租","地上權未定有期限者，地上權人仍得隨時拋棄其地上權，但須通知土地所有人","地上權非有相反之約定，不得讓與他人","地上權人積欠地租達一年之總額，土地所有人得定期限催告清償，逾期不清償者得終止地上權"],correct:3,
 exps:["民法835條：地租增減請求，因土地價值昇降致顯失公平，當事人得請求法院增減地租，敘述正確，非本題答案。","民法834條：地上權未定有期限者，地上權人得隨時拋棄，但有支付地租約定者，應提前一年通知土地所有人（或支付一年地租），敘述方向正確，非本題答案。","民法838條：地上權原則上得讓與，非有相反約定（即契約約定不得讓與者）才不得讓與，本選項表述把原則和例外說反了，實際應是原則可以讓與，例外是有相反約定才不行，本選項描述有誤但此非官方認定的最錯誤敘述。","（本題答案，敘述錯誤）積欠地租達二年才可催告終止，不是一年——本選項把二年改成一年，是本題的核心錯誤。"],
 trap:"積欠地租二年這個數字在D段出現了五次（101-40、103-24、106-21、108-8、114-17），每次都有不同包裝。本題把二年換成一年作為選項D的核心錯誤，是最直接測試你是否真的記住二年這個數字的陷阱題型。",related:"與101年第40題、103年第24題、106年第21題、114年第17題同屬積欠地租終止地上權主題的多次重複命題。"},
{id:"EDF076",cat:"D5地上權農育役權典權",year:"109年第18題",q:"下列關於地上權之敘述，何者正確？",
 opts:["地上權人若因不可抗力，妨礙其土地之使用，依法即得請求免除或減少租金","土地所有人設定地上權後，仍得就同一土地為他人再設定地上權","地上權人之租金給付義務，優先於其他物上負擔","地上權因拋棄而消滅，不論有無地租約定，均無須通知土地所有人"],correct:1,
 exps:["民法835條之1：地上權人因不可抗力妨礙土地使用，得請求減少或免除一定期間內之地租，方向正確但即得（立即、無條件）的表述略有問題，且不是本題最正確的答案。","（本題答案）土地所有人設定地上權後，仍可以在同一土地上再設定另一個地上權（如區分地上權），只要兩個地上權在空間上不互相衝突即可，敘述正確。","地租的給付順序缺乏法律依據說其優先於其他物上負擔，本選項的說法不正確。","民法834條但書：地上權拋棄，若有支付地租之約定者，應預先通知土地所有人，不是一律無須通知，本選項說均無須通知，與法條但書規定不符，錯誤。"],
 trap:"同一土地可以設定多個地上權（如地上建物的地上權+地下停車場的區分地上權），只要各地上權的空間範圍不互相衝突即可，這個知識點反映了現代城市立體開發的法律支持（地上/地下分別設定不同的使用物權）。另外地上權拋棄要通知（有地租約定者），不是無通知就可以任意拋棄。",related:"與105年第24題（區分地上權使用限制約定的對土地所有人效力）、110年第17題（不定期地上權請求消滅的年限門檻）同屬地上權規則主題。"},
{id:"EDF077",cat:"D5地上權農育役權典權",year:"110年第17題",q:"地上權未定有期限者，存續期間逾多少年或地上權成立之目的已不存在時，法院得因當事人之請求，斟酌地上權成立之目的、建築物或工作物之種類、性質及利用狀況等情形，定其存續期間或終止其地上權？",
 opts:["20年","10年","50年","30年"],correct:0,
 exps:["（本題答案）民法833條之1：地上權未定有期限者，存續期間逾20年，或地上權成立之目的已不存在時，法院得因當事人之請求，斟酌各情形，定其存續期間或終止其地上權，敘述正確。","10年不是法條規定的年限，本選項錯誤。","50年不是法條規定的年限，本選項錯誤。","30年不是法條規定的年限（114年第17題錯誤選項也提到30年，務必區分），本選項錯誤。"],
 trap:"不定期地上權的法院裁定存續期間或終止的門檻是20年（民法833條之1）——只要地上權已存續超過20年，當事人就可以申請法院介入，裁定合理的存續期間或終止地上權。這個數字（20年）是純粹的記憶考點，選項故意提供10年、50年、30年作為干擾，務必準確記住20年。",related:"與114年第17題（不定期地上權，20年後可聲請終止）是同一法條的重複命題，兩題合併確認自己記住了20年這個關鍵數字。"},
{id:"EDF078",cat:"D5地上權農育役權典權",year:"111年第18題",q:"甲將其A地設定地上權予乙，乙於A土地上興建B屋一棟。其後甲為貸款擔保而將其A地設定抵押權予丙。甲屆期未清償債務，丙聲請拍賣A地，拍定後A地由戊取得。下列敘述，何者正確？",
 opts:["乙之地上權不受戊之影響，但乙仍可要求戊拆除B屋","乙之地上權對戊有效，乙仍得繼續使用A地","乙之地上權因A地被拍賣而當然消滅，乙得向甲請求損害賠償","乙之地上權雖對戊有效，但乙需另行向戊支付地租"],correct:1,
 exps:["地上權設定在前，抵押權設定在後，先設定的地上權對抗後設定的抵押，地上權不因抵押權的實現而消滅，本選項說乙可要求戊拆除B屋（但乙根本不要拆B屋，那是乙自己建的），邏輯錯誤。","（本題答案）乙的地上權設定在先，甲的抵押（丙）設定在後，A地被拍賣給戊，戊取得的是有地上權負擔的土地，乙的地上權仍然有效，乙仍可繼續使用A地，敘述正確。","乙的地上權設定在先，不因A地被拍賣而消滅（抵押設定在地上權之後，後設定的抵押不能消滅先設定的地上權），本選項說當然消滅，錯誤。","乙的地租義務是針對A地所有人，若原地上權有地租約定，乙需向新土地所有人（戊）支付地租，但這不是使地上權無效或受影響的問題，本選項描述不夠精確且非本題的關鍵差異點。"],
 trap:"先設地上權vs後設抵押的衝突：先設定的地上權，對後設定的抵押（及抵押執行後的拍定）有對抗效力——A地被拍賣後，買家（戊）買到的是有地上權負擔的土地，不是空地。這是不動產業務中非常重要的實務知識（辦理抵押前要查清楚是否有地上權負擔）。",related:"與104年第30題（先設抵押後設地上權，抵押執行後地上權的命運）形成直接對照，兩題對照是理解這個規則最有效的方式。"},
{id:"EDF079",cat:"D5地上權農育役權典權",year:"113年第15題",q:"甲以行使普通地上權之意思，二十年間和平、公然、繼續在乙已登記之A地上有B屋，下列敘述，何者正確？",
 opts:["甲得聲請登記取得地上權","甲得聲請法院以判決宣告取得地上權，不需事先聲請登記","甲不得時效取得地上權，因為A地係屬乙之已登記土地","甲不得時效取得地上權，因為甲只占有二十年，未達法定期間"],correct:1,
 exps:["時效取得地上權可以聲請登記，但選項A和B都說可以主張，差別在程序描述，官方認定B是最正確的答案。","（本題答案）依通說，時效取得地上權可以先取得法院宣告（確認判決）再辦理登記，此程序被認定為正確的時效取得地上權程序。","乙的A地已登記，甲時效取得地上權需適用770條（已登記不動產需20年），不是不能取得，本選項說因為已登記就不能時效取得，不正確。","甲占有20年符合770條的20年要件，已達法定期間，本選項說未達法定期間，錯誤。"],
 trap:"已登記不動產的時效取得：①所有權的時效取得——不可（769-770條僅限未登記不動產）②地上權的時效取得（772條準用769-770條）——可以，但對已登記不動產需占有20年（770條）。本題A地已登記，甲占有20年→符合770條→可以時效取得地上權。注意：時效取得所有權不可（僅限未登記），但時效取得地上權可以（包含已登記，只是年限更長）。",related:"與102年第21題（甲在乙已登記B地上建A屋18年，不能時效取得所有權）形成對比：已登記不動產→不能時效取得所有權，但可以時效取得地上權（年限不同）。"},
{id:"EDF080",cat:"D5地上權農育役權典權",year:"114年第17題",q:"依我國民法關於地上權之規定，下列何者正確之論述？",
 opts:["地上權未定有存續期間者，逾越30年後，土地所有人始得向法院請求定其存續期間或終止地上權","地上權定有存續期間者，存續期間屆滿時，地上權當然消滅，無需任何程序","地上權設定後，若地租依原定給付顯失公平，土地所有人得片面請求增加地租，不需經法院判決","地上權人積欠地租達二年之總額，土地所有人得定相當期限催告清償，若地上權人於期限內未清償，土地所有人得終止地上權"],correct:3,
 exps:["民法833條之1：地上權未定有期限者，逾20年（不是30年），法院得因當事人之請求定存續期間或終止——本選項把20年誤寫成30年，是本題的核心數字陷阱，錯誤。","地上權定有期限，期限屆滿時地上權消滅，但若地上物（建築物）仍存在，地上權人得請求土地所有人以時價收買（840條），並不是什麼程序都不需要，本選項說無需任何程序過於絕對，錯誤。","地租的增減需要依法定要件且可聲請法院，不是土地所有人可以片面增加，需依民法835條規定請求法院增減，本選項說片面增加，不正確。","（本題答案）積欠地租達二年+催告+逾期不清償→得終止，這是第五次出現的同一考點，敘述正確。"],
 trap:"本題同時考了D5段兩個最高頻的數字記憶考點：①不定期地上權逾20年可請求法院介入（833條之1），本題選項A故意寫成30年②積欠地租達二年才可催告終止（836條），本題選項D是正確的標準表述。這兩個數字（20年和二年）是D5段地上權主題最必須記住的兩個數字，建議用口訣：不定期20年法院介入，欠租二年催告終止。",related:"與110年第17題（20年門檻）和101年第40題（二年+催告終止）形成完美的數字配對，三題合併確認自己記住了D5段最重要的兩個數字。"},
{id:"EDF081",cat:"D6抵押質權占有",year:"99年第28題",q:"約定於債權已屆清償期而未為清償時，抵押物之所有權移屬於抵押權人者，此一約定之效力為何？",
 opts:["無效","有效","效力未定","得撤銷"],correct:0,
 exps:["（本題答案）民法873條之1：約定於債權已屆清償期而未清償時，抵押物所有權移轉於抵押權人，此種「流質契約」之約定，無效——流質契約的禁止是為了保護債務人，防止債務人在急需用錢時，被迫以遠高於債務的財產充作清償而喪失財產，法律明文禁止此類約定，敘述正確。","流質契約（約定清償期未清償即移轉所有權）依873條之1明文無效，不是有效，本選項錯誤。","效力未定適用於無代理人或處分權限缺乏的情形，流質契約是法律明文規定無效，不是效力未定，本選項錯誤。","得撤銷適用於意思表示有瑕疵的情形，流質契約是直接無效（不是得撤銷），本選項錯誤。"],
 trap:"流質契約（873條之1）的禁止是民法抵押權制度中最重要的強制規定之一：不論雙方如何約定，「清償期未清償則抵押物所有權移轉抵押權人」的條款都是無效的——保護債務人在弱勢時不被過度剝削。記憶口訣：「流質契約絕對無效」，不管包裝成什麼形式都一樣。",related:"與113年第17題（流質契約約定無效，可以改成流抵契約嗎）同屬流質契約主題，兩題合併複習可完整掌握流質契約的禁止規則及其替代方案。"},
{id:"EDF082",cat:"D6抵押質權占有",year:"99年第29題",q:"債務人甲在其3000萬元之抵押土地上，有乙、丙、丁第一、第二及第三順位依次序為1000萬元、2000萬元及1000萬元之抵押權。若乙拋棄抵押權，下列敘述何者正確？",
 opts:["丙升為第一順位","丁升為第一順位","丙升為第一順位，丁升為第二順位","其他抵押權人均等於拿不到錢"],correct:2,
 exps:["乙拋棄抵押權後，次順位的丙和丁都往上升，不是只有丙升，本選項說只有丙升，不完整，非本題最佳答案。","丁不會直接升為第一順位，需要先排在丙之後，本選項不正確。","（本題答案）乙（第一順位）拋棄抵押權，其順位消失，次順位依序遞升：丙從第二升為第一順位，丁從第三升為第二順位——兩人都往上遞升，敘述正確。","乙拋棄自己的抵押權，使丙和丁依序遞升，他們拿到的清償金額因此增加（而非拿不到錢），本選項的說法與結果相反，錯誤。"],
 trap:"抵押權順位的「遞升原則」：高順位抵押權人拋棄其抵押權，次順位抵押權人「依序遞升」——不是只有緊接其後的一人升，而是之後所有的順位都依序往前遞進。記住遞升是「全體後順位均往前移」，不是只有緊鄰者受益。",related:"與107年第6題（各順位抵押權人的受清償計算）同屬多順位抵押權主題，兩題合併複習可完整掌握多順位抵押權的清償和順位遞升規則。"},
{id:"EDF083",cat:"D6抵押質權占有",year:"99年第30題",q:"以下關於最高限額抵押權之敘述何者正確？",
 opts:["最高限額抵押權所擔保之債權，包含因一定關係所生之不特定債權或基於票據所生之債權","最高限額抵押權之限額係指債務人對抵押權人所負本金債務之最高額","最高限額抵押權之設定，不須登記，即可成立","確定後之最高限額抵押權不得讓與"],correct:0,
 exps:["（本題答案）民法881條之1：最高限額抵押權，謂債務人或第三人提供其不動產為擔保，就債務人與債權人一定範圍內之不特定債權，預定一最高限額，由抵押人就該不動產擔保之抵押權——最高限額抵押可以擔保「因一定關係所生之不特定債權」（如銀行往來帳戶的借貸），或「基於票據所生之債權」，敘述正確。","最高限額的「限額」是指本金及利息、損害賠償等合計的最高上限，不是只指「本金最高額」（民法881條之2第2項），本選項縮小了限額的範圍，不正確。","最高限額抵押權是不動產物權，依民法758條需辦理登記才生效，本選項說不須登記不正確。","最高限額抵押權原債權確定後（如銀行收回全部授信），仍可以讓與（依民法882條準用普通抵押的讓與規定），本選項說確定後不得讓與，不正確。"],
 trap:"最高限額抵押權（881條之1以下）的核心特徵：①擔保「不特定債權」（銀行對客戶的往來帳款，金額不確定）②有「最高限額」（設定時預先約定一個上限金額）③需要「登記」才生效（物權登記主義）④可以擔保票據債權（銀行業務常用）。這四個特徵是最高限額抵押與普通抵押最重要的區別，考試反覆考這些特徵的識別。",related:"與103年第30題、106年第23題、108年第4題同屬最高限額抵押權主題，四題合併複習可建立完整的最高限額抵押權知識架構。"},
{id:"EDF084",cat:"D6抵押質權占有",year:"100年第23題",q:"關於普通抵押權之敘述，下列何者錯誤？",
 opts:["抵押權之設定須以書面為之，並辦理登記","抵押人設定抵押權時，對於抵押物不喪失占有","抵押權人得就抵押物賣得之價金優先受償","抵押權因主債務消滅而消滅，抵押權人不得事前拋棄此從屬性"],correct:3,
 exps:["抵押權的設定是物權行為，需以書面（設定契約）並辦理登記，敘述正確，非本題答案。","抵押權的特徵之一是「不移轉占有」——抵押人在設定抵押後仍然繼續占有和使用抵押物（這跟質權要移轉占有不同），敘述正確，非本題答案。","抵押權人的核心權利就是就抵押物賣得的價金優先受償（優先受償性），敘述正確，非本題答案。","（本題答案，敘述錯誤）抵押權雖然有「從屬性」（隨主債務的消滅而消滅），但抵押權人「得」事前拋棄這個從屬性——即抵押權人可以同意在一定條件下讓抵押權獨立存在（即便主債務消滅，抵押權仍繼續），這是意思自治原則的體現，法律並未禁止拋棄從屬性，本選項說「不得事前拋棄」，與民法允許當事人約定的彈性相反，錯誤。"],
 trap:"抵押權的從屬性（隨主債務而存在、消滅）是抵押權的基本特性，但這個從屬性是「可以被拋棄的（可以約定不適用）」——當事人可以約定讓抵押權具有一定的獨立性（如讓與後抵押權繼續存在，最高限額抵押就是種程度上突破從屬性的安排）。考試常以「從屬性不得拋棄」作為陷阱，但法律上當事人可以合意排除從屬性的適用。",related:"與105年第26題（抵押權的從屬性和追及效）、107年第5題（抵押權效力所及的標的物範圍）同屬普通抵押權基本規則主題，三題合併複習。"},
{id:"EDF085",cat:"D6抵押質權占有",year:"100年第29題",q:"甲將A屋設定普通抵押權給乙銀行後，甲又將該A屋出租給丙，下列敘述何者為正確？",
 opts:["甲乙間之抵押權無效","甲乙間之抵押權有效，但丙承租後取得A屋之所有權","甲乙間之抵押權有效，丙有優先於乙向法院請求抵押物返還之權利","甲乙間之抵押權有效，乙就A屋設定抵押後所生之租金，在抵押物扣押後，抵押權效力及之"],correct:3,
 exps:["抵押權的設定合法有效，本選項說無效，錯誤。","承租人（丙）取得的是租賃使用權，不是所有權，本選項說丙取得所有權，錯誤。","抵押權人（乙）的優先受償是對「抵押物拍賣所得」，不是對抵押物的物上請求返還（乙不能要求丙返還屋子），本選項描述的請求權基礎不正確，錯誤。","（本題答案）民法861條：抵押權所擔保者為原債權、利息、遲延利息、一年或不及一年定期給付之違約金，以及實行抵押權之費用。另民法870條：抵押物扣押後，抵押人就抵押物所得收取之天然孳息及法定孳息（如租金），抵押權效力及之——抵押物被扣押後，租金（法定孳息）也在抵押權效力範圍內，敘述正確。"],
 trap:"抵押權效力及於「抵押物扣押後」的孳息（包含租金）——在扣押前，租金的收取屬於抵押人正常的使用收益（不在抵押權範圍內）；但扣押後，抵押人從抵押物收取的租金也被納入抵押權的效力範圍，抵押權人可以就此主張優先受償。「扣押後才及於租金」是抵押權效力範圍的重要限制，不是從設定抵押起就涵蓋所有租金。",related:"與109年第19題（建築物抵押，扣押後租金在效力範圍）同屬抵押權效力範圍主題，兩題合併複習。"},
{id:"EDF086",cat:"D6抵押質權占有",year:"101年第18題",q:"甲分別於乙、丙所有之不動產設定普通抵押權，以擔保甲對乙之債權。下列敘述何者最正確？",
 opts:["甲向丙請求清償債務時，丙應向甲清償","甲得就乙或丙所有之不動產優先受償，乙及丙得在清償範圍內，代位行使甲之權利","乙丙之間的責任分擔，以各自應承擔之平均比例為準","甲僅得就乙所有之不動產優先受償，不得就丙所有之不動產請求"],correct:1,
 exps:["丙是「物上保證人」（提供自己的不動產擔保他人債務），丙的義務是以自己的不動產供擔保，不是以金錢向甲清償債務，本選項說丙應向甲清償，不正確。","（本題答案）共同抵押（民法875條）：甲在乙丙兩個不動產上設定抵押，甲得就任何一個或兩個優先受償；乙丙清償後，在清償限度內，得「代位行使」甲的抵押權（即向對方追償）——乙清償後可代位甲對丙的不動產主張；丙清償後可代位甲對乙主張，敘述正確。","共同抵押中，各抵押物的責任分擔依民法875條，按各抵押物的價值比例分擔，不是平均分擔，本選項說平均，不正確。","共同抵押讓甲可以就任何一個抵押物優先受償（甲可以選擇先拍賣哪個），不是只能對乙，本選項說只能對乙，錯誤。"],
 trap:"共同抵押（875條）：同一債權在多個不動產上設定抵押，抵押權人（甲）可以對任何一個或全部不動產優先受償；被先清償的抵押物所有人，可以「代位」向其他抵押物所有人按比例追償。這個「代位求償」機制使共同抵押下各抵押物最終按比例分擔責任，不是先被拍賣的那個全部吃虧。",related:"與103年第32題（同一抵押債務，土地和建築物同時被拍賣的分配）同屬共同抵押/競合抵押主題，兩題合併複習可建立完整的共同抵押清償架構。"},
{id:"EDF087",cat:"D6抵押質權占有",year:"101年第19題",q:"甲以其對乙尚未屆清償期之金錢債權設定權利質權於丙，以擔保丙對甲之金錢債權，並於設定時即通知乙。下列敘述何者最正確？",
 opts:["甲對乙債權屆清償期時，丙得直接向乙請求清償","甲對乙債權尚未屆清償期前，乙得向甲清償","甲對乙之債權屆清償期，而丙對甲之債權亦屆清償期時，丙得請求乙直接向丙清償","甲、丙雙方抵押之債權均屆清償期，丙得聲請法院拍賣甲設定質權之債權"],correct:2,
 exps:["權利質權（以債權為標的設定質權），在「被擔保的丙對甲的債權」尚未屆清償期前，即便質押的甲對乙的債權已屆期，丙也不能提前請求清償，本選項時機不對，不正確。","在質權設定後，乙不得向甲（而應向丙）清償——因為乙已接到設定質權的通知，乙知道甲已把對乙的債權質押給丙，乙向甲清償不對丙生效，應直接向丙（質權人）清償，本選項說乙得向甲清償，不正確。","（本題答案）民法905條：質權人（丙）於債權（丙對甲的質押擔保債權）屆清償期而未受清償時，得就質物（甲對乙的債權）受償——兩個債權都屆期，丙得請求乙直接向丙清償（因為質物是甲對乙的請求權，丙實行質權就是直接向乙請求），敘述正確。","以債權為標的的質權，實行方式是「請求債務人（乙）直接清償給質權人（丙）」，而不是拍賣債權（債權無法像動產一樣拍賣），本選項說聲請法院拍賣，實行方式不正確。"],
 trap:"「權利質權」（以債權為標的設定質權）的實行方式與一般動產質權不同：一般動產質權→拍賣質物變現；以債權為標的的質權→直接向債務人（乙）請求清償給質權人（丙）。這個「請求直接清償」而不是「拍賣」的實行方式是本題的核心知識點，也是考試常考的細節。",related:"與105年第28題（動產質權設定與消滅）同屬質權主題，兩題合併可比較動產質權和權利質權的不同實行方式。"},
{id:"EDF088",cat:"D6抵押質權占有",year:"101年第35題",q:"甲向乙借款500萬元，並將所有之A地設定普通抵押權給乙，下列敘述何者最正確？",
 opts:["乙就A地賣得之價金，優先於甲之其他普通債權人受償","乙就A地賣得之價金，雖優先於其他普通債權人受償，但需先繳納法院執行費用及優先性租金","甲出賣A地後，乙之抵押權因此消滅","甲出賣A地後，乙僅對A地之買賣價金有優先受償之權利"],correct:0,
 exps:["（本題答案）抵押權人（乙）的核心特徵就是「就抵押物賣得之價金，優先於其他普通債權人受償」（民法860條），敘述正確。","法院執行費用確實優先，但本選項說「需先繳納法院執行費用及優先性租金」——優先性租金（如員工薪資、稅捐等）優先於抵押權這個說法需要具體依據，本選項把較複雜的稅捐/薪資優先規則混入，且並非所有租金都優先，表述不夠精確，且非本題最簡潔正確的答案。","民法867條（追及效）：抵押權不因抵押物的讓與而受影響——甲出賣A地，乙的抵押權「不因此消滅」（繼續附著在A地上），乙仍可對A地主張抵押權，本選項說消滅，與追及效原則相反，錯誤。","甲出賣A地後，乙的抵押權依「追及效」（867條）跟著A地轉移到買方那裡，乙對A地的抵押權仍然存在（對不動產本身，不是只對價金），本選項說只對價金有優先受償，忽略了追及效，不正確。"],
 trap:"抵押權的追及效（867條）：抵押物被讓與後，抵押權仍然附著在抵押物上，跟隨抵押物移轉——乙的抵押權在甲出賣A地給丁後，仍然可以對A地主張（對新所有人丁的不動產主張），不是只能對買賣價金受償。這個「追及效」保護了抵押權人不因抵押人轉賣而喪失擔保，是抵押權最重要的物權特性之一。",related:"與105年第26題（抵押權的追及性和不可分性）、100年第23題（普通抵押不移轉占有）同屬普通抵押基本規則主題，三題合併複習。"},
{id:"EDF089",cat:"D6抵押質權占有",year:"102年第7題",q:"甲為A地的所有權人，乙為A地的抵押權人，丙為A地的地上權人。關於當事人間的權利義務，下列敘述何者錯誤？",
 opts:["乙之抵押權若設定在先，其效力優先於後設定之丙之地上權","乙之抵押權若設定在後，丙之地上權滅失時，其損失仍得向乙求償","丙之地上權若設定在先，乙之抵押權若設定在後，乙實行抵押權時，丙之地上權仍繼續存在","地上權設定抵押，非法之所禁"],correct:1,
 exps:["先設定的物權效力優先（先設定原則），乙的抵押權設定在先→優先於後設定的丙地上權，敘述正確，非本題答案。","（本題答案，敘述錯誤）丙的地上權滅失（如地上建築物毀損），丙的損失應向造成損失的人（如侵權行為人）主張，不是向乙（抵押權人）求償——抵押權人並非地上權的保障者，丙不能因為地上權滅失就向乙索賠，本選項說丙向乙求償，缺乏法律依據，是本題錯誤敘述。","丙的地上權設定在先，後設定的乙抵押權實行時，先設定的丙地上權仍繼續存在（先設定的物權對後設定的物權的追及有對抗效力），敘述正確，非本題答案。","民法882條：地上權得為抵押權之標的物（地上權可以設定抵押），法無明文禁止，敘述正確，非本題答案。"],
 trap:"本題的陷阱是把「地上權滅失的損失」錯誤導向抵押權人——地上權滅失應找「造成地上權滅失的原因人」（如侵權行為人）求償，不能找抵押權人。各物權人有各自的法律關係和救濟對象，不能因為抵押權人恰好也在同一土地上就讓其承擔不相關的損失賠償責任。",related:"與111年第18題（先設地上權後設抵押，抵押執行後地上權仍有效）、104年第30題（先設抵押後設地上權，抵押執行後地上權命運）同屬抵押權與地上權衝突主題，三題合併複習。"},
{id:"EDF090",cat:"D6抵押質權占有",year:"102年第26題",q:"甲所有的古董花瓶為乙所盜並寄放在丙的古董店裡展售，嗣後為顧客丁所買。關於當事人之間的權利義務，下列敘述何者錯誤？",
 opts:["乙係無權占有人，乙對甲就花瓶應盡返還義務","若丁係善意買受人，丁有可能透過善意取得制度取得花瓶所有權","若丁善意取得花瓶所有權，甲仍得在二年內向丁請求返還花瓶","若丁善意取得花瓶所有權，甲在二年內向丁請求返還花瓶時，無須支付對價"],correct:2,
 exps:["乙是竊盜（無合法占有依據），對甲有返還義務（民法767條所有物返還請求），敘述正確，非本題答案。","善意取得（民法801條）：善意買受人（丁）可以依善意取得制度取得花瓶所有權（動產善意取得保護善意第三人），敘述正確，非本題答案。","民法949條：占有物如係盜贓或遺失物，被害人（甲）得向現占有人（丁）請求回復，但請求期間為「二年」——即使丁已善意取得，甲仍可在二年內請求回復，敘述正確，非本題答案。","（本題答案，敘述錯誤）民法950條：被害人請求回復盜贓或遺失物時，如占有人（丁）係善意取得且付出代價（如買了錢），被害人（甲）應「補償」其支出之代價——甲要回花瓶需給丁補償（丁善意付錢買的，甲索回應補償丁的損失），本選項說甲無須支付對價，與法條規定相反，錯誤。"],
 trap:"盜贓物的特殊回復規定（949-950條）：被害人在二年內可以回復，但若善意取得人付了代價（有償取得），被害人回復時必須補償善意取得人的代價——這個「補償代價才能回復」的規定是保護善意買受人的合理設計，不是甲可以免費索回。本題的陷阱就是把「無須支付對價」放在最後讓你以為是正確的，但法條明文規定需要補償。",related:"與105年第30題（動產善意取得的要件，包含觀念交付）同屬動產善意取得主題，兩題合併複習可建立完整的善意取得規則（包含盜贓物的特殊回復規定）。"},
{id:"EDF091",cat:"D6抵押質權占有",year:"103年第25題",q:"甲將土地為乙設定典權並交付之，其後甲將該地出賣與丙，乙主張有權以相同條件購買，此權利稱為：",
 opts:["找貼權","留買權","典物回贖權","優先購買權"],correct:1,
 exps:["找貼權是在典物價值增漲時，典權人（乙）得請求出典人（甲）補付差額（919條），是典權人對應物價上漲的補貼請求，不是優先購買，本選項不正確。","（本題答案）民法919條：出典人（甲）出賣典物（土地）時，典權人（乙）有依同樣條件優先承購之權，稱為「留買權」——這是典權人對典物的優先購買保護，在甲要出賣土地時，乙可以以同樣條件優先買下，敘述正確。","典物回贖權是出典人（甲）回贖典物的權利（919條另一面），不是乙的優先購買，本選項不正確。","「優先購買權」是對典權人留買權的口語描述，不是民法上的正式名稱，本選項非最精確的答案（留買權才是法定名稱），但方向正確，然官方答案為B（留買權），本選項非正式名稱不夠精確。"],
 trap:"典權制度（典權人支付典價使用他人不動產，出典人可以回贖）的三個重要權利：①回贖權（出典人支付典價收回典物）②找貼權（典物增值，典權人請求補差額）③留買權（出典人出賣典物，典權人有優先購買權）。本題考「留買權」這個名稱識別，是典權制度的核心考點之一。記憶口訣：「留買=典權人優先購買」。",related:"與106年第29題（典權的定義與特性）同屬典權主題，兩題合併複習可建立完整的典權制度知識架構。"},
{id:"EDF092",cat:"D6抵押質權占有",year:"103年第28題",q:"下列何種權利，不得單獨成為抵押權之標的物？",
 opts:["地上權","不動產役權","農育權","典權"],correct:1,
 exps:["民法882條：地上權、農育權及典權，均得為抵押權之標的——地上權「可以」設定抵押，本選項說地上權不得，錯誤。","（本題答案）不動產役權「不得」單獨成為抵押權的標的物——不動產役權依附於需役地（具有從屬性），不能脫離需役地單獨存在或單獨移轉，因此也不能單獨設定抵押（如果需役地設定抵押，役權會隨同需役地一起在抵押範圍內，但不能單獨以役權設定抵押），敘述正確。","農育權依民法882條，得為抵押權之標的，可以設定抵押，本選項說農育權不得，錯誤。","典權依民法882條，得為抵押權之標的，可以設定抵押，本選項說典權不得，錯誤。"],
 trap:"可以設定抵押的權利（882條）：地上權、農育權、典權——這三種用益物權或擔保物權可以單獨設定抵押。「不動產役權」不在882條列舉範圍內，且因其從屬性（跟著需役地走，不能單獨存在），不能單獨成為抵押標的。記憶口訣：「地農典可抵，役權不行」（地上權/農育權/典權可以抵押，不動產役權不行）。",related:"與107年第20題（何種權利得為抵押標的）、108年第19題（何者不得為抵押標的）是同一考點的三度重複出題，三題合併確認自己記住了「地農典可抵，役權不行」這個規則。"},
{id:"EDF093",cat:"D6抵押質權占有",year:"103年第30題",q:"下列關於最高限額抵押權之敘述，何者正確？",
 opts:["得有效約定最高限額係指本金最高限額","得約定凡是書面契約所生之債權均納入最高限額抵押權所擔保之債權範圍","最高限額抵押權設定後，即不得變更其最高限額","最高限額抵押權原債權確定後，仍得讓與予他人"],correct:3,
 exps:["最高限額的「限額」是本金及利息等合計的最高限制，不是只有本金，本選項縮小了限額範圍，不正確。","最高限額抵押所擔保的債權範圍需依「一定法律關係所生之債權」（如銀行授信往來），不是「凡是書面契約」都可以無限制納入，民法881條之1有範圍限制，本選項說得約定任何書面契約，過於寬泛，不正確。","民法881條之6：最高限額抵押權設定後，於原債權確定前，抵押人及抵押權人「得約定」變更最高限額——設定後仍可以合意變更最高限額，本選項說不得變更，不正確。","（本題答案）民法881條之7：最高限額抵押權，原債權確定後，依第882條等準用規定，仍得讓與予他人——確定後的最高限額抵押仍可讓與，敘述正確。"],
 trap:"最高限額抵押權「確定後」的處理：確定（如銀行收回授信、貸款期間結束）後，最高限額抵押轉化為一般擔保，仍可以讓與（不是確定後就必須消滅），這個「確定後仍可讓與」的規則是本題的核心。另外變更最高限額（881條之6）是允許的（設定後仍可合意變更），也是常考的細節。",related:"與99年第30題、106年第23題、108年第4題同屬最高限額抵押主題，四題合併建立完整的最高限額抵押知識體系。"},
{id:"EDF094",cat:"D6抵押質權占有",year:"103年第32題",q:"設定抵押權時，土地及其土地上之建築物，同屬於一人所有，而以土地及建築物為抵押者，如經拍賣，其土地與建築物之拍賣所得，應如何分配？",
 opts:["土地與建物之抵押權人各就所抵押物之賣得金額優先受償","土地與建物之抵押權人就二者拍賣所得之總金額共同優先受償","二者之賣得金額應全部清償抵押擔保債務，如有餘額，建物抵押權人有優先受領之權","土地之賣得金額應先清償建物之抵押擔保債務，餘額歸土地之抵押權人受償"],correct:1,
 exps:["本題情境是土地和建築物同屬一人，以「土地及建築物」（整體）設定抵押，應視為一個整體抵押，不是分開各自受償，本選項說各就所抵押物分別優先受償，與共同抵押的整體清償原則不符，錯誤。","（本題答案）民法875條之1：設定抵押時土地及建築物同屬一人，以土地及建築物共同設定抵押者，如各建物分別拍賣，應就二者賣得之總金額，由抵押權人共同優先受償——這是共同抵押的整體受償原則，敘述正確。","本選項說「全部清償後，餘額建物抵押權人優先」，與共同抵押的整體受償方式不符，不正確。","土地賣得金額先清償建物抵押債務的說法沒有法律依據，不正確。"],
 trap:"同一債權在土地和建築物共同設定抵押（875條之1）——拍賣後應「就全部賣得金額整體受償」，不是土地和建築物各自分別優先受償。這個「共同抵押整體受償」的設計，確保了抵押權人可以就全部標的物的拍賣所得統一受償，避免因標的物分開拍賣而降低受償比例。",related:"與101年第18題（共同抵押代位求償）同屬共同抵押主題，兩題合併複習可建立完整的共同抵押清償機制。"},
{id:"EDF095",cat:"D6抵押質權占有",year:"104年第30題",q:"甲以A地設定抵押權於乙，擔保其對乙所負債務後，復將A地設定地上權於丙，由丙於A地上建築房屋。甲屆期未清償，乙聲請拍賣A地，試問丙之地上權在法律上有何效力？",
