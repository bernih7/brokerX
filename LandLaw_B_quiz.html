<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>土地法 B篇 考題解析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.72rem;padding:5px 11px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .2s;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.64rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);transition:all .15s;}
.opt:disabled{cursor:default;}
.ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}.el.no{background:#b0b8c4;color:#fff;}.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}
</style>
</head>
<body>
<div class="app">
<h1>土地法 B篇 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">B1 區域計畫法 ／ B2 都市計畫法 ／ B3 國土計畫法｜共 76 題</div>
<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>
<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text"><span id="pd">0</span>/<span id="pt">0</span> 已答・正確率 <span id="pr">-</span></div>
</div>
<div id="list"></div>
</div>
<script>
const CARDS=[{"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "99", "num": 17, "q": "山坡地範圍內風景區之土地，在未編定使用地之類別前，依法適用下列何種用地之管制？", "opts": ["觀光用地", "林業用地", "遊憩用地", "特定目的事業用地"], "ans": 1, "exps": ["❌ 農牧用地是農業區的編定類別，不是山坡地範圍內未編定類別土地的預設管制。", "✓ 非都市土地使用管制規則規定，山坡地範圍內之森林區、山坡地保育區及風景區土地，在未編定使用地類別前，適用「林業用地」之管制。這個規定反覆在99、102、106、107、108年考過，是B1最高頻的固定答案。", "❌ 國土保安用地是特定功能編定類別，不是山坡地未編定土地的預設管制類別。", "❌ 生態保護用地同樣是特定功能編定類別，不是預設管制類別。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "100", "num": 21, "q": "依區域計畫法之規定，違反非都市土地之使用管制而使用土地者，處多少元之罰鍰？", "opts": ["新臺幣三萬元以上十五萬元以下", "新臺幣五萬元以上二十五萬元以下", "新臺幣六萬元以上三十萬元以下", "新臺幣七萬元以上三十五萬元以下"], "ans": 2, "exps": ["❌ 金額過低，不符合區域計畫法第21條規定的罰鍰標準。", "❌ 此為不正確的金額區間，為干擾選項。", "❌ 同上，金額錯誤。", "✓ 區域計畫法第21條：違反非都市土地使用管制而使用土地者，由直轄市或縣（市）政府處六萬元以上三十萬元以下罰鍰，並得勒令恢復原狀或拆除建築物。注意是「六萬以上三十萬以下」，是這個金額區間的固定考點。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "100", "num": 22, "q": "依區域計畫法規定，區域計畫核定後，擬定計畫之機關應於接到核定公文之日起幾日內公告實施，並將計畫圖說發交各有關地方政府及鄉、鎮（市）公所分別公開展示？", "opts": ["四十日", "五十日", "六十日", "七十日"], "ans": 0, "exps": ["✓ 區域計畫法第9條：區域計畫核定後，擬定計畫之機關應於接到核定公文之日起六十日內公告實施。60日（兩個月）是法定公告期限，此為B1的固定數字考點。", "❌ 30日不是區域計畫公告的法定期限，為干擾選項。", "❌ 90日不是法定期限，為干擾選項。", "❌ 120日不是法定期限，為干擾選項。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "100", "num": 26, "q": "依非都市土地使用管制規則規定，申請變更編定為遊憩用地者，申請人應依其事業計畫設置必要之保育綠地及公共設施；其設置之保育綠地不得少於變更編定面積之比例為何？", "opts": ["百分之五", "百分之十", "百分之二十", "百分之三十"], "ans": 3, "exps": ["❌ 30%不是遊憩用地保育綠地的法定最低比例。", "❌ 40%不是法定比例。", "❌ 50%不是法定比例。", "✓ 依非都市土地使用管制規則，申請變更編定為遊憩用地者，應設置必要之保育綠地及公共設施，其保育綠地面積不得低於申請開發面積之30%以上。以官方公告答案D為準。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "100", "num": 27, "q": "依非都市土地使用管制規則，申請開發遊憩設施之土地面積達幾公頃以上，應變更為特定專用區？", "opts": ["一公頃", "二公頃", "三公頃", "五公頃"], "ans": 3, "exps": ["❌ 2公頃不是申請開發遊憩設施應變更為特定專用區的面積門檻。", "✓ 依非都市土地使用管制規則，申請開發遊憩設施之土地面積達五公頃以上者，應辦理土地使用分區變更為特定專用區。5公頃是這個門檻的固定數字。", "❌ 10公頃不是法定門檻，為干擾選項。", "❌ 20公頃不是法定門檻，為干擾選項。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "100", "num": 28, "q": "依據非都市土地之變更編定原則，使用分區為鄉村區之土地，可以變更編定為何種使用地？", "opts": ["甲種建築用地", "乙種建築用地", "丙種建築用地", "丁種建築用地"], "ans": 1, "exps": ["❌ 農牧用地與建築用地不是鄉村區內可變更編定的全部類型，此選項不完整。", "✓ 依非都市土地使用管制規則，使用分區為鄉村區之土地，可以變更編定為甲種建築用地或乙種建築用地，此為鄉村區土地的主要建築用地類型。", "❌ 丙種建築用地是農業區的建築用地類型，丁種建築用地是工業區的類型，均不是鄉村區的對應類別。", "❌ 農牧用地不是鄉村區可變更編定的建築類用地。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "100", "num": 29, "q": "有關非都市土地容積率最高上限規定，下列何者有誤？", "opts": ["甲種建築用地：容積率百分之二百四十", "乙種建築用地：容積率百分之二百四十", "丁種建築用地：容積率百分之三百", "特定目的事業用地：容積率百分之一百二十"], "ans": 3, "exps": ["❌ 此為正確規定，故非「有誤」的選項。", "✓ 本選項為錯誤敘述：依非都市土地使用管制規則，乙種建築用地的容積率最高上限是240%（與甲種相同），不是160%。本選項數字錯誤，故為本題「有誤」之答案。", "❌ 此為正確規定，丙種建築用地容積率上限120%，故非「有誤」的選項。", "❌ 此為正確規定，丁種建築用地（工業用地）容積率上限300%，故非「有誤」的選項。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "101", "num": 11, "q": "下列何者不是區域計畫法之立法目的？", "opts": ["促進土地及天然資源之保育利用", "人口及產業活動之合理分布", "促進市、鎮、鄉街有計畫之均衡發展", "以加速並健全經濟發展，改善生活環境，增進公共福利"], "ans": 2, "exps": ["❌ 此為區域計畫法第1條明文列舉的立法目的之一，屬於區域計畫法的立法目的。", "❌ 此為區域計畫法第1條明文列舉的立法目的之一。", "✓ 本選項是「都市計畫法」的立法目的，不是區域計畫法的目的。區域計畫法的立法目的聚焦在「區域」範圍的資源保育與合理分布，而「市鎮鄉街均衡發展」是都市計畫法的目標。", "❌ 此為區域計畫法第1條明文列舉的立法目的之一。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "101", "num": 16, "q": "依非都市土地使用管制規則規定，鹽業、礦業、水利用地之建蔽率與容積率，係由何中央主管機關會同建築管理、地政機關訂定？", "opts": ["經濟部", "內政部", "行政院農業委員會", "交通部"], "ans": 0, "exps": ["✓ 依非都市土地使用管制規則，鹽業、礦業、水利用地之建蔽率與容積率，由中央目的事業主管機關（鹽業→經濟部、礦業→經濟部、水利→經濟部）會同建築管理、地政機關訂定。本題問的是「中央主管機關」，對於鹽業礦業水利用地，主管機關是經濟部。", "❌ 農業部是農地、農舍、農業用地的主管機關，不是鹽業礦業水利用地的主管機關。", "❌ 內政部是區域計畫法的中央主管機關（地政主管），但本題問的是「鹽業礦業水利用地」的中央目的事業主管機關，不是內政部。", "❌ 環境部（原環保署）是環境保護的主管機關，不是鹽業礦業水利用地的目的事業主管機關。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "101", "num": 18, "q": "為九二一震災地區住宅重建，經縣（市）政府依實施區域計畫地區建築管理辦法第4條之1規定公告位於車籠埔斷層線二側各多少公尺建築管制範圍內之甲種、乙種或丙種建築用地，於震災前已有合法建築物，經全倒或已自動拆除者，除有特定情形者外，土地所有權人得申請其他自有土地變更編定，並將原有甲種、乙種或丙種建築用地，一併申請變更編定為國土保安用地。", "opts": ["十公尺", "十五公尺", "二十公尺", "二十五公尺"], "ans": 1, "exps": ["❌ 5公尺不是車籠埔斷層兩側建築管制的法定距離。", "✓ 依實施區域計畫地區建築管理辦法，九二一震災地區住宅重建，車籠埔斷層線兩側各十公尺範圍內禁止建築，這是B1的固定數字考點。", "❌ 20公尺不是法定管制距離。", "❌ 30公尺不是法定管制距離。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "101", "num": 19, "q": "依區域計畫法規定，有關開發影響費之敍述，下列何者正確？", "opts": ["開發影響費得以開發區內可建築土地抵充之", "開發影響費之收費範圍及標準，由直轄市、縣（市）主管機關定之", "開發影響費得成立基金；其收支保管及運用辦法，由中央主管機關定之", "開發影響費之徵收，不適用於都市土地"], "ans": 0, "exps": ["✓ 區域計畫法第6條之1：開發影響費應由申請開發許可之人負擔，用以補償因開發行為對周遭環境產生的衝擊成本。本選項正確描述了開發影響費的負擔主體。", "❌ 開發影響費的費率由中央主管機關訂定（非地方政府自訂），確保費率標準一致。", "❌ 開發影響費的徵收由各地方政府（直轄市或縣市政府）負責，非中央機關直接執行。", "❌ 開發影響費的用途並非限定用於開發地區本身，而是用於因開發而受影響範圍的改善，用途規定較為廣泛。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "101", "num": 38, "q": "關於非都市土地使用管制之使用強度，下列何者為最正確的規定？", "opts": ["甲種建築用地︰建蔽率百分之六十。容積率百分之二百四十", "乙種建築用地︰建蔽率百分之六十。容積率百分之一百二十", "丙種建築用地︰建蔽率百分之六十。容積率百分之一百二十", "丁種建築用地︰建蔽率百分之六十。容積率百分之三百"], "ans": 0, "exps": ["✓ 非都市土地的使用管制分為兩個層次：使用分區（決定土地的使用性質和範圍）和使用地（決定使用強度，即建蔽率、容積率等）。題目問「使用強度」由哪個層次管制，答案是「使用地」（如甲乙丙丁種建築用地各有不同的建蔽率、容積率），而非使用分區。", "❌ 使用分區（農業區、鄉村區、工業區等）是管制土地使用「性質」的，不是管制「使用強度（建蔽率容積率）」的。使用強度由使用地類別（甲乙丙丁種建築用地等）管制。", "❌ 都市計畫是管制「都市土地」的法制，非都市土地不適用都市計畫的使用強度管制。", "❌ 國土計畫法是上位計畫，其所稱的「國土功能分區」是管制土地使用方向的框架，不是直接管制建蔽率容積率等使用強度的工具。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "102", "num": 1, "q": "依非都市土地使用管制規則規定，下列何者為甲種建築用地之建蔽率及容積率？", "opts": ["建蔽率 60%，容積率 240%", "建蔽率 60%，容積率 120%", "建蔽率 40%，容積率 240%", "建蔽率 40%，容積率 120%"], "ans": 0, "exps": ["✓ 依非都市土地使用管制規則，甲種建築用地：建蔽率60%、容積率240%。這是B1最高頻的數字考點，111年還出過直接計算題（100坪基地最多可建多少坪）。記憶口訣：甲乙同為60%/240%，丙為40%/120%，丁為70%/300%。", "❌ 此數字不符合甲種建築用地的法定標準。", "❌ 40%/160%不是甲種建築用地的標準（丙種建築用地建蔽率是40%，但容積率是120%，不是160%）。", "❌ 30%/120%不是任何標準類型的非都市土地建築用地規定。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "102", "num": 3, "q": "依區域計畫法第21條規定，直轄市或縣（市）政府對於違反非都市土地管制使用者之處罰，下列何項罰則錯誤？", "opts": ["處新臺幣六萬元以上五十萬元以下罰鍰", "得限期令其變更使用、停止使用", "拆除其地上物恢復原狀", "經限期繳納而逾期間不繳納罰鍰者，移送法院強制執行"], "ans": 0, "exps": ["✓ 本選項為錯誤敘述：區域計畫法第21條的罰則是「處六萬元以上三十萬元以下罰鍰」，並「得勒令恢復原狀或拆除建築物」，但並無「按日連續處罰」的規定（按日連續處罰是其他法規如建築法的概念，非區域計畫法）。本選項描述超出法條授權，故為本題錯誤的罰則敘述。", "❌ 本選項描述正確，違規使用後政府得代為拆除並向違規人收費，符合法條精神，非錯誤。", "❌ 本選項描述正確，符合區域計畫法第21條的罰鍰金額，非錯誤。", "❌ 本選項描述正確，違規使用土地後主管機關得不予核發相關許可，符合法條授權。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "102", "num": 4, "q": "依非都市土地使用管制規則規定，各級政府為執行區域計畫，得就各區域計畫所列重要風景及名勝地區研擬下列何項計畫？", "opts": ["風景區計畫", "特定專用區計畫", "生態保育區計畫", "觀光遊憩區計畫"], "ans": 0, "exps": ["✓ 區域計畫法施行細則規定，各級政府為執行區域計畫，得就各區域計畫所列重要風景及名勝地區研擬「風景區計畫」。此選項名稱直接對應法條用語。", "❌ 特定區域計畫並非區域計畫法明文規定對於風景名勝地區研擬的計畫類型，為干擾選項。", "❌ 觀光遊憩計畫不是區域計畫法的法定計畫名稱。", "❌ 生態保育計畫不是區域計畫法的法定計畫名稱。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "102", "num": 15, "q": "依非都市土地使用管制規則規定，山坡地範圍內森林區、山坡地保育區及風景區之土地，在未編定使用地之類別前，適用下列何項用地之管制？", "opts": ["特定目的事業用地", "林業用地", "生態保護用地", "國土保安用地"], "ans": 1, "exps": ["❌ 農牧用地是農業相關編定，不是山坡地未編定土地的預設管制。", "✓ 同99-17，此題再次考同一考點：山坡地範圍內森林區、山坡地保育區及風景區之土地，在未編定使用地類別前，適用林業用地之管制。答案固定為B（林業用地）。", "❌ 非預設管制類別。", "❌ 非預設管制類別。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "102", "num": 36, "q": "依區域計畫法施行細則規定，供山坡地範圍外之農業區內建築使用之土地，依規定編定為何種土地？", "opts": ["甲種建築用地", "乙種建築用地", "丙種建築用地", "丁種建築用地"], "ans": 0, "exps": ["✓ 依區域計畫法施行細則，供山坡地範圍外之農業區內建築使用之土地，依規定編定為「乙種建築用地」。農業區內的建築用地是乙種（非甲種或丙種），這是B1的固定考點。", "❌ 甲種建築用地是鄉村區、特定農業區以外一般農業區的主要建築用地類型，不是農業區內的建築用地編定。", "❌ 丙種建築用地通常是山坡地範圍內的農業區建築用地，不是「山坡地範圍外」農業區的編定類別。", "❌ 丁種建築用地是工業區（工廠使用）的建築用地類別，不是農業區的建築用地類型。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "102", "num": 37, "q": "依區域計畫法施行細則規定，下列何者為非都市土地得劃定之使用區？", "opts": ["商業區", "住宅區", "住商混合區", "一般農業區"], "ans": 3, "exps": ["❌ 國家公園區不在區域計畫法施行細則規定的非都市土地使用分區之列（國家公園由國家公園法另行管理，不透過區域計畫法的使用分區管制）。", "❌ 一般農業區確實是非都市土地的使用分區之一，可以劃定，不是「不得劃定」的類型。", "❌ 鄉村區確實是非都市土地的使用分區之一。", "❌ 工業區確實是非都市土地的使用分區之一。本題問「哪一個不是得劃定的使用區」，官方答案為D（工業區）或A（國家公園區），依考選部公告以D為準——非都市土地依區域計畫法得劃定的使用區共11種（一般農業區、特定農業區、工業區、鄉村區、森林區、山坡地保育區、風景區、特定專用區、海域區、國家公園區……），需核對當年公告確認。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "103", "num": 1, "q": "非都市土地申請開發達一定規模者，應辦理土地使用分區變更，下列之相關敘述何者正確？", "opts": ["申請設立學校之土地面積達五公頃以上，應變更為特定專用區", "申請開發遊憩設施之土地面積達五公頃以上，應變更為特定專用區", "申請開發高爾夫球場之土地面積達五公頃以上，應變更為特定專用區", "申請開發社區之計畫達一百戶或土地面積在五公頃以上，應變更為鄉村區"], "ans": 1, "exps": ["❌ 本題問的是申請開發辦理使用分區變更的「相關敘述何者正確」，A選項的面積門檻需核對當年規定（依不同類型而有不同面積要求），以官方答案B為準。", "✓ 依非都市土地使用管制規則，申請開發達一定規模辦理分區變更時，位於山坡地者，最低開發面積為10公頃（平地不同）。本選項正確描述山坡地的最低開發面積門檻。", "❌ 申請開發辦理分區變更的前提是「尚未編定為建築用地」，要透過開發許可程序取得建築許可，若已是合法建築用地則不需辦理此程序，故本選項描述有誤。", "❌ 興辦事業計畫須由主管機關審查核定，不是申請人自行核定，此選項明顯錯誤。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "103", "num": 17, "q": "依據區域計畫法，政府依法編定之各種使用地，其土地能供使用之性質，下列何者為是？", "opts": ["甲種建築用地係供鄉村區內建築使用者", "乙種建築用地係供山坡地範圍外之農業區內建築使用者", "丙種建築用地係供森林區、山坡地保育區、風景區及山坡地範圍之農業區內建築使用者", "生態保護用地係供國土保安使用者"], "ans": 2, "exps": ["❌ 地目（如田、旱、建、林等）在民國76年停辦地目變更後，已不再是決定土地使用性質的法定依據；非都市土地的使用性質由「使用地類別」決定，而非地目。", "❌ 使用分區（農業區、鄉村區等）決定的是土地的「使用方向與範圍」，而非直接決定「能供使用之性質（建蔽率容積率等使用強度）」。", "✓ 區域計畫法及非都市土地使用管制規則的設計是：使用分區決定土地「方向」，使用地類別（甲乙丙丁種建築用地、農牧用地、林業用地等）決定土地「能供使用之具體性質」（包括容許使用項目、建蔽率、容積率等）。本選項最準確描述了非都市土地管制架構下使用地的功能。", "❌ 各縣市（地方政府）是執行非都市土地使用管制的機關，不是「決定使用性質」的機關；使用性質由法規（區域計畫法及使用管制規則）規定，地方政府依法執行。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "103", "num": 21, "q": "有關都市土地、非都市土地的敘述與土地登記謄本運用，下列何者正確？", "opts": ["藉由土地登記簿謄本標示部之登載資料，可知該筆土地是否為都市土地或非都市土地", "都市土地係指以土地分區使用計畫及編定各種使用地加以管制", "非都市土地係以土地分區使用計畫對其使用作不同程度之管制", "藉由土地登記簿謄本標示部之登載資料，可知該筆土地之都市土地使用分區"], "ans": 0, "exps": ["❌ 都市土地（使用分區管制）的使用分區（住宅區、商業區等）不是顯示在「地目」欄位，而是在都市計畫地籍套繪圖或都市計畫使用分區證明上查詢；地目欄位在民國76年後已停辦變更，不反映現行使用分區。", "❌ 非都市土地謄本的「使用地類別」欄位確實可看出編定為何種使用地（如甲種建築用地），但「建蔽率及容積率」等數字不直接印在謄本上，需另查非都市土地使用管制規則的附表。本選項說「可以了解建蔽率容積率資訊」有過度解讀之嫌。", "✓ 都市計畫區內的土地謄本有「使用分區」欄位，可直接查詢該土地屬於哪個都市計畫使用分區（住宅區、商業區、工業區、公共設施用地等），這是最直接且正確的查詢方式。", "❌ 非都市土地謄本確實有使用分區欄位（農業區、鄉村區等），這個描述部分正確，但選項D的措辭不如C選項準確（且選項與C混淆），以官方答案A（正確描述）為最正確答案——但根據本題答案是C，選C為正確描述都市土地謄本使用分區欄位功能。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "104", "num": 19, "q": "非都市土地申請開發社區之計畫，達到下列何種規模時，應辦理土地使用分區變更為鄉村區？", "opts": ["五十戶或土地面積在一公頃以上", "五十戶或土地面積在二公頃以上", "一百戶或土地面積在二公頃以上", "一百戶或土地面積在三公頃以上"], "ans": 0, "exps": ["✓ 依非都市土地使用管制規則，申請開發社區（住宅社區）之計畫，達到一百戶以上或面積在二公頃以上者，應辦理土地使用分區變更為鄉村區。「100戶或2公頃」是B1的固定數字組合考點。", "❌ 50戶/1公頃不是法定門檻，數字過低。", "❌ 200戶/5公頃不是法定門檻，數字過高。", "❌ 100戶正確，但面積應為2公頃（非5公頃），數字混淆。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "104", "num": 21, "q": "依區域計畫法之規定，區域計畫公告實施後，有關直轄市或縣（市）政府應製定非都市土地使用分區圖，並編定各種使用地，於報經上級主管機關核備後實施管制，請指出該使用分區圖及使用地之製定與編定的依據為何？", "opts": ["非都市土地之開發計畫", "非都市土地分區使用計畫", "非都市土地產業發展計畫", "非都市土地管制計畫"], "ans": 1, "exps": ["❌ 非都市土地使用分區圖的製定，由各直轄市或縣（市）政府負責，不是中央地政主管機關。", "✓ 區域計畫法第15條：區域計畫公告實施後，直轄市或縣（市）政府應製定非都市土地使用分區圖，並編定各種使用地，報請各該區域計畫擬定機關核備後，實施管制。地方政府是製定非都市土地使用分區圖的機關。", "❌ 鄉鎮市公所只是基層地方自治機關，無權製定非都市土地使用分區圖。", "❌ 區域計畫委員會是區域計畫的審議機關，不是製定使用分區圖的執行機關。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "104", "num": 22, "q": "依區域計畫法規定，區域計畫之中央主管機關，下列何者正確？", "opts": ["行政院", "內政部", "國家發展委員會", "營建署"], "ans": 1, "exps": ["❌ 行政院是最高行政機關，不是區域計畫法的中央主管機關。", "✓ 區域計畫法第4條：本法所稱主管機關，在中央為內政部，在直轄市為直轄市政府，在縣（市）為縣（市）政府。中央主管機關是內政部，這是B1的基本考點。", "❌ 國發會是綜合規劃機關，不是區域計畫法的中央主管機關。", "❌ 農業部是農業事務的主管機關，不是區域計畫法的主管機關。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "104", "num": 24, "q": "依區域計畫法之規定，直轄市或縣（市）政府基於法定理由，得報經上級主管機關核定，逕為辦理分區變更。請指出下列何者為所稱之法定理由？", "opts": ["為加強資源保育須檢討變更使用分區者", "為促進區域土地權利調整者", "為實施中央重大建設事業者", "為區域建設推行委員會之建議者"], "ans": 0, "exps": ["❌ 市地重劃或區段徵收是都市計畫整體開發的方式之一，但並非法定的「逕為分區變更」事由。", "✓ 依區域計畫法，直轄市或縣市政府得報經上級機關核定逕為辦理分區變更的法定理由中，「配合地方需要促進地方發展」是其中一項；其他尚包括配合中央政策、因災害等緊急需要等。本選項為正確的法定逕為變更事由之一。", "❌ 徵收土地是土地取得的程序，不是「逕為分區變更」的事由，兩者性質不同。", "❌ 土地所有權人自願申請是一般分區變更的程序，不是「逕為（主動）分區變更」的事由。逕為變更是地方政府依法主動辦理，不需要所有權人申請。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "104", "num": 25, "q": "非都市土地申請開發案件，申請人擬具之興辦事業計畫，土地位屬山坡地範圍內者，除有法規所定之特殊情形者外，其最低開發面積規模之限制，下列何者正確？", "opts": ["五公頃", "十公頃", "十五公頃", "二十公頃"], "ans": 1, "exps": ["❌ 5公頃是申請開發遊憩設施變更特定專用區的面積門檻，不是山坡地開發案的最低開發面積。", "✓ 依非都市土地使用管制規則，申請開發案件土地位屬山坡地範圍內者，最低開發面積為10公頃（平地為其他標準）。山坡地10公頃的最低開發面積是B1固定考點。", "❌ 20公頃不是法定最低開發面積，為干擾選項。", "❌ 30公頃不是法定最低開發面積，為干擾選項。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "106", "num": 24, "q": "下列有關違反區域計畫管制使用土地者之處罰規定，何者錯誤？", "opts": ["由該管直轄市、縣（市）政府處新臺幣 6 萬元以上 30 萬元以下罰鍰", "經限期變更使用、停止使用或拆除地上物恢復原狀而不遵從者，得按次處罰", "經限期變更使用而不遵從者，並得停止供水、供電、封閉、強制拆除或採取其他恢復原狀之措施", "不依限變更土地使用者，除依強制執行法辦理外，並得處 6 個月以下有期徒刑或拘役"], "ans": 3, "exps": ["❌ 本選項描述正確：違反區域計畫管制使用土地，主管機關得勒令停止使用並限期改善，屆期未改善者處六萬元以上三十萬元以下罰鍰，符合法條。", "❌ 本選項描述正確，此情形亦在法條罰則的適用範圍內。", "❌ 本選項描述正確，情節重大時得廢止許可並拆除，符合法條。", "✓ 本選項為錯誤敘述：區域計畫法的罰則以「罰鍰」為主，並無「三年以下有期徒刑」的刑事責任（刑事罰是平均地權條例壟斷土地的罰則）。本選項將行政罰與刑事罰混淆，為本題的錯誤選項。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "106", "num": 25, "q": "下列何者非區域計畫法規定區域計畫得隨時檢討變更之原因？", "opts": ["發生或避免重大災害", "興辦重大開發或建設事業", "為適應國防或經濟發展之需要", "區域建設推行委員會之建議"], "ans": 2, "exps": ["✓ 本選項為本題「非屬得隨時檢討變更之原因」的答案。區域計畫法規定得隨時檢討變更的情形包括：（1）發生重大災害（2）配合辦理區域性重大建設（3）中央或直轄市政府有重大政策需要等；「都會區域發展受到有效控制」是都市計畫成功執行的結果，而非區域計畫法規定的隨時檢討變更事由。", "❌ 此為區域計畫法明文允許隨時檢討變更的情形之一，屬得隨時變更的事由。", "❌ 此為區域計畫法明文允許隨時檢討變更的情形之一，屬得隨時變更的事由。", "❌ 此為區域計畫法明文允許隨時檢討變更的情形之一，屬得隨時變更的事由。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "106", "num": 35, "q": "山坡地範圍內森林區、山坡地保育區及風景區之土地，在未編定使用地類別之前，適用那項用地之管制？", "opts": ["林業用地", "遊憩用地", "生態保護用地", "國土保安用地"], "ans": 0, "exps": ["✓ 同99-17、102-15，此題第三次考同一考點（106年）。答案固定：山坡地範圍內森林區、山坡地保育區及風景區之土地，未編定使用地類別前，適用「林業用地」管制。", "❌ 非山坡地未編定土地的預設管制類別。", "❌ 非預設管制類別。", "❌ 非預設管制類別。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "107", "num": 17, "q": "依非都市土地使用管制規則規定，山坡地範圍內之土地，在未編定使用地類別前，適用林業用地之管制，下列何者不包含在內？", "opts": ["森林區", "風景區", "國家公園區", "山坡地保育區"], "ans": 2, "exps": ["❌ 山坡地保育區是「包含在」適用林業用地管制的範圍內，應適用林業用地管制，故山坡地保育區「包含其中」，不是「不包含」。", "❌ 森林區是「包含在」適用林業用地管制的範圍內，應適用林業用地管制。", "✓ 本題問的是「哪個不包含在適用林業用地管制的範圍內」。依規定，適用林業用地管制的是「森林區、山坡地保育區及風景區」三種；國家公園區內的土地依國家公園法管制，不在上述三種範圍內，故國家公園區的未編定土地不適用林業用地管制。", "❌ 風景區是「包含在」適用林業用地管制的範圍內。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "108", "num": 9, "q": "山坡地範圍內森林區、山坡地保育區及風景區之土地，在未編定使用地之類別前，適用何種管制？", "opts": ["林業用地", "農牧用地", "國土保安用地", "原住民保留地"], "ans": 0, "exps": ["✓ 同99-17系列題目（此為第四次出現），答案固定為林業用地管制。山坡地範圍內森林區、山坡地保育區及風景區未編定使用地類別前，一律適用林業用地管制。", "❌ 非預設管制類別。", "❌ 非預設管制類別。", "❌ 非預設管制類別。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "108", "num": 20, "q": "非都市土地申請開發達一定規模者，應辦理土地使用分區變更，下列何項敘述錯誤？", "opts": ["申請開發社區之計畫達五十戶或土地面積在一公頃以上，應變更為鄉村區", "申請開發為工業使用之土地面積達十公頃以上，應變更為工業區", "申請開發遊憩設施之土地面積達五公頃以上，應變更為特定專用區", "申請開發高爾夫球場之土地面積達五公頃以上，應變更為特定專用區"], "ans": 3, "exps": ["✓ 本選項為錯誤敘述：開發許可申請並不需要全體土地所有權人同意（可以由部分土地所有權人或開發業者申請），且如需整合土地，法律另有規定（如購買或整合機制），「全體同意」並非申請要件，故本選項描述錯誤，為本題答案。", "❌ 本選項描述正確，符合規定。", "❌ 本選項描述正確，取得核定後可申請核發相關許可。", "❌ 本選項描述正確，山坡地範圍內由內政部（中央主管機關）核定，一般土地由地方政府核定，符合法條規定。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "108", "num": 25, "q": "非都市土地依區域計畫法施行細則之規定，得劃定幾種使用區？編定幾種使用地？", "opts": ["十種使用區；十八種使用地", "十種使用區；十九種使用地", "十一種使用區；十八種使用地", "十一種使用區；十九種使用地"], "ans": 3, "exps": ["❌ 使用地種類不是16種。", "❌ 使用地種類不是17種。", "❌ 使用地種類不是18種。", "✓ 依非都市土地使用管制規則，非都市土地依法劃定的使用區共11種（一般農業區、特定農業區、工業區、鄉村區、森林區、山坡地保育區、風景區、特定專用區、國家公園區、海域區及其他特殊地區），使用地共19種（甲乙丙丁種建築用地、農牧用地、林業用地、養殖用地、鹽業用地、礦業用地、水利用地、生態保護用地、國土保安用地、特定目的事業用地等）。「11種使用區、19種使用地」是B1重要數字考點。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "109", "num": 7, "q": "依非都市土地使用管制規則規定，關於區域計畫擬定機關核發開發許可後，直轄市或縣（市）政府應報經區域計畫擬定機關廢止原開發許可之情形，下列敘述何者錯誤？", "opts": ["興辦事業計畫經目的事業主管機關廢止或依法失其效力、整地排水計畫之核准經直轄市或縣 （市）政府廢止或水土保持計畫之核准經水土保持主管機關廢止或依法失其效力", "申請人自行申請廢止", "與水源供應、鄰近之交通設施、排水系統、電力、電信及垃圾處理等公共設施及公用設備服務 未能相互配合者", "違反核定之土地使用計畫、目的事業或環境影響評估等相關法規，經該管主管機關提出要求處 分並經限期改善而未改善"], "ans": 2, "exps": ["❌ 本選項為廢止開發許可的事由之一，屬得廢止的情形，非「錯誤」的廢止事由。", "❌ 本選項描述正確，逾期未申請執照是廢止開發許可的法定事由，非錯誤。", "✓ 本選項為錯誤敘述：開發許可一旦依法廢止確定，不因申請人事後補繳回饋金而失效；廢止是一個已終結的行政行為，補繳不能恢復原已廢止的許可。本選項描述違反行政程序法及區域計畫法的基本原則。", "❌ 本選項描述需核對法條，部分廢止情形確由地方政府報請上級廢止，以官方答案C為最終正確答案（C是錯誤敘述）。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "110", "num": 17, "q": "非都市土地經劃定使用分區並編定使用地類別，應依其容許使用之項目及許可使用細目使用。但中央目的事業主管機關認定為重大建設計畫所需之臨時性設施，經徵得使用地之中央主管機關及有關機關同意後，得核准為臨時使用。中央目的事業主管機關於核准時，應函請直轄市或縣（市）政府將臨時使用用途及期限等資料，依相關規定程序登錄於何處？", "opts": ["土地登記謄本", "土地參考資訊檔", "土地使用分區證明", "非都市土地許可使用書"], "ans": 1, "exps": ["❌ 法條有例外規定（中央目的事業主管機關認定為臨時性設施者），故「不得有任何例外」的說法過於絕對，描述有誤。", "✓ 非都市土地使用管制規則規定，土地應依其容許使用項目及許可使用細目使用，但中央目的事業主管機關認定為臨時性設施者，得不受容許使用項目的限制。本選項正確描述了此例外條款。", "❌ 使用地類別的變更有其法定程序，不是單純由農業主管機關認定即可改變，須依非都市土地使用管制規則的變更程序辦理。", "❌ 容許使用項目是由中央訂定（非都市土地使用管制規則附表），不是地方政府自行訂定。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "110", "num": 18, "q": "依非都市土地使用管制規則規定，土地使用編定後，其原有使用或原有建築物不合土地使用分區規定者，其使用限制，下列敘述何者錯誤？", "opts": ["在政府令其變更使用或拆除建築物前，得為從來之使用", "原有建築物除准修繕和增建外，不得改建", "若該土地或建築物，對公眾安全、衛生及福利有重大妨礙者，該管直轄市或縣（市）政府應限 期令其變更或停止使用、遷移、拆除或改建", "政府令其變更或停止使用，所受損害應予適當補償"], "ans": 1, "exps": ["❌ 土地使用編定後，原有不合規定的使用並非立即停止，而是有保障既有使用的過渡性規定（非都市土地使用管制規則第6條），允許繼續維持原有使用或在一定條件下擴建。", "✓ 非都市土地使用管制規則第6條：土地使用編定後，其原有使用或原有建築物不合土地使用分區規定者，得繼續為原來之使用，或得在不擴大原有使用規模之條件下改建或修繕，但不得擅自改建為更不符合規定之使用。「得繼續為原來之使用」是既有使用保障的核心原則。", "❌ 原有使用得繼續，但「不得擴大」，在不擴大規模的條件下才可繼續，擴大使用不在保障範圍內。", "❌ 土地使用管制的變更程序是獨立的法律程序，不是在編定後自動辦理，且「應依原有使用性質辦理變更」並非法條規定的義務。"]}, {"ch": "B1", "chName": "B1 區域計畫法／非都市土地管制", "year": "111", "num": 8, "q": "依規定，非都市土地甲種建築用地之建蔽率為百分之六十，容積率為百分之二百四十。倘甲有1筆100坪的甲種建築用地想規劃蓋1棟豪宅自住，請問甲的房屋每層樓最大建坪有幾坪？可蓋幾層樓高？", "opts": ["最大建坪 60 坪，4 層樓高", "最大建坪 60 坪，5 層樓高", "最大建坪 100 坪，2 層樓高", "最大建坪 100 坪，3 層樓高"], "ans": 0, "exps": ["✓ 甲種建築用地建蔽率60%、容積率240%。100坪基地：最大建築面積=100×60%=60坪；最高總樓板面積=100×240%=240坪。本題直接考計算應用，需熟記甲種建築用地的建蔽率60%和容積率240%兩個數字。", "❌ 40%/120%是「丙種建築用地」的標準，不是甲種建築用地。", "❌ 70%/300%是「丁種建築用地（工業用地）」的標準，不是甲種建築用地。", "❌ 50%/200%不符合任何標準類型的建築用地規定，為干擾選項。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "99", "num": 14, "q": "依都市計畫法第83條之1規定，下列何者非屬得以容積移轉方式辦理者？", "opts": ["公共設施保留地之取得", "公共開放空間之提供", "歷史建築之保存", "農業用地之保護"], "ans": 3, "exps": ["❌ 公共設施保留地是都市計畫法第83條之1明文允許以容積移轉方式辦理的標的，可以容積移轉，故此選項「屬於」得以容積移轉辦理者，不是「非屬」的答案。", "❌ 古蹟（歷史建築）的保存依法可以容積移轉方式作為補償機制，屬於法定容積移轉的適用標的之一。", "❌ 具有歷史紀念性或藝術價值應予保存的建築，依法可以容積移轉方式取得補償，屬於得辦理容積移轉者。", "✓ 都市計畫法第83條之1的容積移轉，適用標的包括公共設施保留地、古蹟、歷史建築、聚落、文化景觀等具有公益保存目的之土地；「私人所有之農地」不在容積移轉的適用範圍內，農地本身沒有容積移轉的法律依據，故此選項「非屬」得以容積移轉辦理者。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "99", "num": 23, "q": "依都市計畫法之規定，公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置，除具有特殊情形外，其佔用土地總面積不得少於全部計畫面積之多少？", "opts": ["百分之五", "百分之十", "百分之二十", "百分之三十"], "ans": 1, "exps": ["❌ 5%過低，不是公園綠地廣場等公共設施的法定最低占比。", "✓ 都市計畫法第45條：公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置，除具有特殊情形外，其占用土地總面積不得少於全部計畫面積百分之十。10%是法定最低標準，是B2的高頻數字考點。", "❌ 15%過高，不是法定最低標準。", "❌ 20%過高，不是法定最低標準。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "99", "num": 34, "q": "依都市計畫法之規定，都市計畫經發布實施後，在某些情事發生時，當地直轄市、縣（市）（局）政府或鄉、鎮、縣轄市公所，應視實際情況迅行變更，下列何者不屬之？", "opts": ["因戰爭、地震、水災、風災、火災或其他重大事變遭受損壞時", "為避免重大災害之發生時", "為適應國防或經濟發展之需要時", "為保育生態環境及歷史遺跡之需要時"], "ans": 3, "exps": ["❌ 三年不是迅行辦理都市計畫變更的法定情事觸發條件。", "❌ 五年不是法定觸發條件。", "❌ 十年不是法定觸發條件。", "✓ 都市計畫法第27條規定，都市計畫發布實施後，得視實際情形迅行變更的四種情事：（1）因戰爭、地震、水災、風災、火災或其他重大事變遭受損壞（2）為避免重大災害之發生（3）為適應國防或經濟發展之需要（4）為配合中央、直轄市或縣市興辦之重大設施。本題答案為D（四種情事）。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "100", "num": 23, "q": "下列何者為都市計畫法規定細部計畫書及細部計畫圖應表明事項？", "opts": ["居住密度及容納人口", "主要道路及其他公眾運輸系統", "住宅、商業、工業及其他土地使用配置", "學校用地、大型公園、批發市場之公共設施用地"], "ans": 0, "exps": ["✓ 都市計畫法第22條：細部計畫書應表明事項包括：計畫地區範圍、各街廓之土地使用分區管制及建築基地最小面積、實施進度及經費等。本選項為細部計畫應表明事項之一，正確。", "❌ 此為主要計畫書的表明事項，非細部計畫書的表明事項。細部計畫書是在主要計畫的框架下，針對特定地區訂定更細部的管制內容。", "❌ 人口規模和計畫地區範圍是主要計畫書的表明事項，不是細部計畫書。", "❌ 訂定各類公共設施用地的設置標準是主要計畫的事項，細部計畫只是在主要計畫框架內落實公共設施的位置和配置，不重新訂定標準。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "100", "num": 25, "q": "依都市計畫法之規定，市鎮計畫應先擬定主要計畫書，其表明之事項不包括：", "opts": ["人口成長、分布、組成", "土地使用分區管制內容", "住宅及其他土地使用之配置", "主要道路及其他公眾運輸系統"], "ans": 1, "exps": ["❌ 計畫地區範圍是主要計畫書的表明事項之一，屬於應表明的事項。", "✓ 本題問「主要計畫書表明事項不包括」的選項。都市計畫法第15條規定主要計畫書應表明事項，包括：計畫地區範圍、自然及人文現況調查、人口、土地使用、公共設施、各種土地使用分區計畫、實施進度及方法等，但「財務計畫」並非主要計畫書的法定表明事項（財務計畫是細部計畫或事業計畫的內容）。", "❌ 整體景觀計畫是主要計畫書的表明事項之一。", "❌ 人口密度及人口總數是主要計畫書的表明事項之一（計畫人口規模）。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "101", "num": 10, "q": "都市計畫法中所稱之優先發展區，係指預計在多少年內，必須優先規劃、建設發展之都市計畫地區？", "opts": ["五年", "十年", "十五年", "二十五年"], "ans": 1, "exps": ["❌ 三年不是優先發展區的法定年限。", "✓ 都市計畫法第17條：優先發展地區係指預計在五年內，必須優先規劃、建設發展之都市計畫地區。第一期優先發展地區應於細部計畫發布後五年內完成公共設施，這個「五年」是B2的高頻數字考點。", "❌ 十年不是優先發展區的法定年限。", "❌ 二十年不是優先發展區的法定年限（主要計畫年期最長25年）。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "101", "num": 12, "q": "都市計畫法規範之都市計畫事業，不包括下列那一項？", "opts": ["公共設施實質建設之事業", "新市區建設實質建設之事業", "舊市區更新實質建設之事業", "開發許可實質建設之事業"], "ans": 3, "exps": ["❌ 公共設施建設是都市計畫事業的核心內容，屬於都市計畫事業。", "❌ 新市區建設是都市計畫事業的類型之一。", "❌ 舊市區更新（都市更新）是都市計畫事業的類型之一。", "✓ 都市計畫法第57條規定的都市計畫事業包括：新市區建設、舊市區更新、公共設施建設等；農地重劃是農業土地的整理工作，依平均地權條例辦理，不是「都市計畫」的事業，故農地重劃「不包括」在都市計畫事業內。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "101", "num": 15, "q": "都市更新處理方式，有重建、整建及維護三種。關於整建的定義，下列陳述何者最正確？", "opts": ["係為全地區之徵收、拆除原有建築、重新建築、住戶安置，並得變更其土地使用性質或使用密度", "加強區內土地使用及建築管理，改進區內公共設施，以保持其良好狀況", "強制區內建築物為改建、修建、維護或設備之充實，必要時，對部分指定之土地及建築物徵收、拆除 及重建，改進區內公共設施", "強制區內建築物為改建、修建、維護或設備之充實，必要時對部分指定之土地及建築物重劃、拆除及 重建，改進區內公共設施"], "ans": 2, "exps": ["❌ 重建的定義描述正確，非本題的整建定義。", "❌ 維護的定義描述正確，非本題的整建定義。", "✓ 都市計畫法（都市更新條例）對整建的定義：整建係指改建、修建建築物，或充實其設備，並改進區內土地使用及公共設施，以改善生活環境。整建是介於重建（全部拆除重建）和維護（僅維修）之間的中間型態。", "❌ 此描述是「重建」的定義（拆除重建），不是整建，整建不需要全部拆除。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "101", "num": 17, "q": "申請興建農舍須符合之規定，下列何者最正確？", "opts": ["興建農舍之申請人不須具備農民身分，並應在該農業區內有農業用地或農場", "農舍之高度不得超過四層或十六公尺，建築面積不得超過申請興建農舍之該宗農業用地面積百分之十， 建築總樓地板面積不得超過六百六十平方公尺，與都市計畫道路境界之距離，除合法農舍申請立體增 建外，不得小於八公尺", "都市計畫農業區內之農業用地，其已申請建築者（包括百分之十農舍面積及百分之九十之農業用地）， 主管建築機關應於都市計畫及地籍套繪圖上著色標示之，嗣後不論該百分之九十農業用地是否分割， 均不得再行申請興建農舍", "農舍得自行變更使用"], "ans": 2, "exps": ["", "", "", ""]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "101", "num": 20, "q": "依都市計畫法規定，主要計畫實施進度以五年為一期，最長不得超過多少年？", "opts": ["十年", "十五年", "二十五年", "三十年"], "ans": 2, "exps": ["❌ 15年不是主要計畫實施年期的法定上限。", "❌ 20年不是法定上限。", "✓ 都市計畫法第16條：主要計畫之實施，應以五年為一期，以十年為計畫目標年，最長不得超過二十五年。25年是法定最長年期的固定考點。", "❌ 30年超過法定上限，為干擾選項。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "101", "num": 21, "q": "依都市計畫法規定，都市計畫經發布實施後，下列何者非屬應視實際情況迅行辦理都市計畫變更之情事？", "opts": ["因水災或其他重大事變遭受損壞時", "因土地權利人權利遭受重大損失時", "為適應經濟發展之需要", "為配合中央、直轄市或縣（市）興建之重大設施時"], "ans": 1, "exps": ["❌ 此為都市計畫法第27條第1項規定的迅行變更事由之一。", "✓ 本選項為本題「非屬應迅行辦理都市計畫變更」的答案：民意機關陳請不是都市計畫法第27條規定的四種迅行變更法定事由之一。迅行變更的四種事由是：重大災害、避免重大災害、國防經濟需要、配合中央直轄市縣市重大設施，並無「民意機關陳請」這種情形。", "❌ 此為都市計畫法第27條第1項規定的迅行變更事由之一。", "❌ 此為都市計畫法第27條第1項規定的迅行變更事由之一。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "102", "num": 14, "q": "依都市計畫法規定，獲准投資辦理都市計畫事業之私人或團體，其所需用之公共設施用地，屬於私有而無法協議收購者，得依下列何種方式取得？", "opts": ["請求該管地方政府以交換方式取得", "請求該管地方政府實施徵收", "請求該管地方政府照價收買", "應備妥價款，申請該管直轄市或縣（市）政府代為收買之"], "ans": 3, "exps": ["", "", "", ""]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "102", "num": 38, "q": "依都市計畫法第17條規定，都市計畫內屬於第一期優先發展之地區，應於細部計畫發布後，最多幾年內應完成公共設施？", "opts": ["一年內", "三年內", "五年內", "七年內"], "ans": 2, "exps": ["❌ 三年不是優先發展地區完成公共設施的法定期限，為干擾選項。", "✓ 都市計畫法第17條第2項：第一期發展地區應於細部計畫發布後最多五年內，完成公共設施之建設。配合101-10題的「五年是優先發展期間」，這裡再次確認五年是完成公共設施的法定期限。", "❌ 七年不是法定期限。", "❌ 十年不是法定期限（十年是主要計畫的計畫目標年期，非公共設施完成期限）。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "103", "num": 2, "q": "區域計畫公告實施後，凡依區域計畫應擬定下列何種計畫或已有計畫而須變更者，當地都市計畫主管機關應按規定期限辦理擬定或變更手續？", "opts": ["主要計畫", "綱要計畫", "細部計畫", "特定區計畫"], "ans": 3, "exps": ["✓ 區域計畫法第15條：區域計畫公告實施後，凡依區域計畫應擬定「都市計畫」或已有計畫而須變更者，當地都市計畫主管機關應按規定期限辦理擬定或變更。區域計畫是上位計畫，都市計畫是其下位計畫，區域計畫公告後需配合辦理都市計畫。", "❌ 非都市土地使用管制規則是區域計畫法的執行規則，不是區域計畫公告後「應擬定或變更」的計畫類型。", "❌ 國土計畫是位階最高的計畫，不是區域計畫公告後需要配合擬定的下位計畫。", "❌ 土地使用分區圖是由直轄市縣市政府製定的行政圖籍，不是本條規定應擬定或變更的「計畫」類型。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "103", "num": 39, "q": "依都市計畫法之規定，下列何者非屬細部計畫書及細部計畫圖表明之事項？", "opts": ["主要道路及其他公眾運輸系統", "居住密度及容納人口", "事業及財務計畫", "土地使用分區管制"], "ans": 0, "exps": ["✓ 本題問「細部計畫書非表明之事項」。都市計畫法第22條規定細部計畫書應表明事項，包括：計畫地區範圍、土地使用分區管制、事業及財務計畫、實施進度等。但本選項「計畫地區範圍」本應是細部計畫的表明事項之一；以官方答案A為準，可能是因為細部計畫的範圍是在主要計畫框架下確定的，不需要在細部計畫書中重複表明（由主要計畫已確定），故A為「非」細部計畫書的表明事項。以官方公告答案A為準。", "❌ 土地使用分區管制是細部計畫書的核心表明事項，應表明各街廓的使用管制規定。", "❌ 事業及財務計畫是細部計畫書的表明事項之一。", "❌ 實施進度是細部計畫書的表明事項之一。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "104", "num": 23, "q": "依都市計畫法規定，人口集居達三千，而其中工商業人口占就業總人口百分之五十以上之地區，應擬定下列何種計畫？", "opts": ["市計畫", "鎮計畫", "鄉街計畫", "特定區計畫"], "ans": 2, "exps": ["❌ 鄉街計畫是針對鄉（鎮、市）規模的地區，其人口條件與本題不符（人口3,000、工商業人口占50%以上）。", "❌ 鎮計畫的人口要求不同（非都市計畫法第9條的市鎮計畫條件）。", "✓ 都市計畫法第9條：人口集居達三千人以上，而其中工商業人口占就業總人口百分之五十以上之地區，設市鎮計畫。「3,000人且工商業人口50%以上」是市鎮計畫的法定設置條件，這是B2的固定數字考點。", "❌ 特定區計畫是針對具特殊目的或功能的地區（如風景遊覽區、溫泉區等），不是以人口和工商業比例為設置條件。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "104", "num": 26, "q": "依都市計畫法規定，未發布細部計畫地區，應限制其建築使用及變更地形。但主要計畫發布至少已逾多少年以上，而能確定建築線者，得依有關建築法令之規定，由主管建築機關指定建築線，核發建築執照？", "opts": ["一年", "二年", "三年", "五年"], "ans": 1, "exps": ["❌ 一年不是未發布細部計畫地區得指定建築線核發建照的主要計畫年限門檻。", "✓ 都市計畫法第17條第1項但書：未發布細部計畫地區，應限制其建築使用及變更地形，但主要計畫發布已逾「二年」以上，而能確定建築線者，得依有關建築法令之規定，由主管建築機關指定建築線，核發建築執照。「二年」是例外允許建築的主要計畫年限門檻，是重要考點。", "❌ 三年不是法定年限門檻。", "❌ 五年是優先發展地區完成公共設施的期限，不是此處的年限門檻。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "104", "num": 27, "q": "私有公共設施保留地得申請與公有非公用土地辦理交換，其劃設逾多少年未經政府取得者，得優先辦理交換？", "opts": ["十年", "十五年", "二十年", "二十五年"], "ans": 3, "exps": ["❌ 五年不是公共設施保留地辦理交換的劃設門檻年限。", "❌ 十年不是法定門檻。", "❌ 15年不是法定門檻。", "✓ 都市計畫法第50條之1：私有公共設施保留地得申請與公有非公用土地辦理交換，其劃設逾「二十年」未經政府取得者，得優先辦理交換。20年是公設保留地辦理土地交換的等待年限門檻，是B2的數字考點。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "105", "num": 30, "q": "都市計畫法所定義的都市計畫事業，下列何者不包括在內？", "opts": ["公共設施建設", "新市鎮建設", "新市區建設", "舊市區更新建設"], "ans": 1, "exps": ["❌ 舊市區更新是都市計畫法第57條規定的都市計畫事業之一。", "✓ 開發許可是區域計畫法（非都市土地）的管制工具，不是都市計畫法規定的都市計畫事業類型。都市計畫法的計畫事業包括：新市區建設、舊市區更新、公共設施建設等，並不包含「開發許可」（開發許可是非都市土地的申請程序）。", "❌ 新市區建設是都市計畫法第57條規定的都市計畫事業之一。", "❌ 公共設施建設是都市計畫法規定的都市計畫事業之一。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "106", "num": 8, "q": "下列有關都市計畫主要計畫之擬定及核定程序規定，何者錯誤？", "opts": ["主要計畫擬定後，應先送由該管政府或鄉、鎮、縣轄市都市計畫委員會審議", "縣政府所在地及縣轄市之主要計畫由內政部核定", "地方政府於接到主要計畫核定公文之日起 30 日內，應將主要計畫書、圖發布實施", "主要計畫經該管政府都市計畫委員會審議後，應公開展覽 30 天及舉行說明會"], "ans": 3, "exps": ["❌ 本選項描述正確，鄉鎮計畫及鄉街計畫由縣政府核定，符合都市計畫法第14條規定。", "❌ 本選項描述正確，市計畫由直轄市或縣市政府核定，符合法條。", "❌ 本選項描述正確，首都計畫（臺北市主要計畫）由行政院核定，符合都市計畫法第14條。", "✓ 本選項為錯誤敘述：都市計畫法規定主要計畫在核定前應舉行公開展覽（不少於30日）並舉行說明會，並非「徵求村里意見及縣市議會議決」，議會議決不是核定前的程序要件。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "106", "num": 26, "q": "下列有關都市計畫法中公共設施用地之設置規定，何者錯誤？", "opts": ["公共設施用地，應就人口、土地使用、交通等現狀及未來發展趨勢，決定其項目、位置與面積", "公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置，除具有特殊情形外，其占用土地總面積不得少於全部計畫面積10%", "道路系統、停車場所及加油站，應按土地使用分區及交通情形與預期之發展配置之。鐵路、公路通過實施都市計畫之區域者，應避免穿越市區中心", "（本題實際僅3個有效選項列於原文，第4選項可能因排版省略，請以官方公告四個選項核對）"], "ans": 1, "exps": ["❌ 本選項描述正確，公共設施保留地在保留期間內得作多種使用，包括公有市場停車場等。", "❌ 本選項描述正確，10%的法定最低標準符合都市計畫法第45條規定。", "❌ 本選項描述正確。", "✓ 本選項為錯誤敘述：依都市計畫法第46條，應按閭鄰單位分布或配合行政區域設置的是「社會福利設施」（如國中小學、市場、消防設施等地方性設施），而「監獄」屬特殊用途設施，不在按閭鄰配置的範疇；本選項混入監獄一詞使描述不正確。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "106", "num": 27, "q": "依都市計畫法第22條規定，下列何者非細部計畫應以細部計畫書及細部計畫圖應表明之事項？", "opts": ["名勝、古蹟及具有紀念性或藝術價值應予保存之建築", "居住密度及容納人口", "土地使用分區管制", "道路系統"], "ans": 0, "exps": ["✓ 本題問「細部計畫非應表明的事項」。都市計畫法第22條規定細部計畫應表明事項，「計畫地區範圍」在細部計畫書應表明事項清單中（細部計畫需確定適用範圍）；但依官方答案A，「計畫地區範圍」可能被認定為主要計畫已確立、細部計畫無需重複表明。以官方公告答案A為準。", "❌ 土地使用分區管制是細部計畫書的核心表明事項。", "❌ 此為細部計畫書的表明事項之一（都市計畫法第22條第8款）。", "❌ 實施進度及經費是細部計畫書的表明事項之一（第22條第9款）。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "106", "num": 37, "q": "都市計畫發布實施後，應依何法之規定，實施建築管理？", "opts": ["建築法", "建築技術規則", "建築師法", "建築管理規則"], "ans": 0, "exps": ["✓ 都市計畫法第39條：都市計畫發布實施後，應依建築法之規定，實施建築管理。都市計畫本身規範的是土地使用管制（分區、公共設施等），具體的建築行為（申請建照、開工、使用執照）仍依建築法管理。", "❌ 都市計畫法是土地使用計畫的法規，本身不直接管理建築行為，建築管理另由建築法負責。", "❌ 土地法是土地權利登記管理的法規，不是建築管理的依據。", "❌ 區域計畫法是非都市土地的使用管制法規，不是都市計畫地區建築管理的依據。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "107", "num": 16, "q": "區域計畫法有關非都市土地許可開發之規定，下列敘述，何者錯誤？", "opts": ["開發許可前，應先將申請開發案提報各該區域計畫委員會審議之", "申請開發許可，申請人應先取得開發地區內全部土地及建築物之所有權", "開發許可後，辦理分區或用地變更前，應將開發區內公共設施用地完成分割移轉登記為各該直 轄市、縣（市）有或鄉、鎮（市）有，並繳交開發影響費", "直轄市、縣（市）政府受理開發申請案後，除情形特殊者外，應於六十日內報請各該區域計畫 擬定機關審議"], "ans": 1, "exps": ["✓ 本選項為錯誤敘述：區域計畫法並未要求申請開發許可時須「徵得土地所有人全體同意」，實際規定是申請人應擬具開發計畫書送審，並未有「全體同意」的要件（部分土地整合另有其他規定）。本選項描述誇大了同意要件，為本題錯誤的選項。", "❌ 本選項描述正確，審查意見提交區域計畫委員會審議符合法條規定。", "❌ 本選項描述正確，先取得開發許可再辦理後續許可，符合法條規定的程序。", "❌ 本選項描述正確，繳交開發影響費是核准條件之一。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "108", "num": 12, "q": "依都市計畫法規定，都市計畫區內之公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置，除具有特殊情形外，其占用土地總面積不得少於全部計畫面積百分之幾？", "opts": ["百分之十", "百分之十二", "百分之十五", "百分之十七"], "ans": 0, "exps": ["✓ 都市計畫法第45條的10%規定，同99-23、106-26題所考的相同考點，是B2最高頻的固定數字，此答案描述完整正確。", "❌ 學校及公共設施保留地的設置標準由法規（都市計畫法及相關標準）訂定，不是由都市計畫委員會個案審議決定。", "❌ 法定最低比例是10%，不是20%，數字錯誤。", "❌ 都市計畫法並未禁止環形道路，道路設計有多種型態，限制過嚴的描述不正確。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "108", "num": 15, "q": "都市計畫應依據現在及既往情況，並預計未來幾年內之發展情形訂定之？", "opts": ["十五年", "二十年", "二十五年", "三十年"], "ans": 2, "exps": ["❌ 十年雖是主要計畫的計畫目標年期（第15條），但都市計畫本身訂定的預計年限並非僅看目標年，應看「整體計畫年期」。", "❌ 二十年不是都市計畫法明文規定的計畫訂定依據年數。", "✓ 都市計畫法第15條：都市計畫應依據現在及既往情況，並預計二十五年內之發展情形訂定之。25年是都市計畫訂定的法定基準年期（主要計畫最長年期），與主要計畫實施期最長不超過25年相呼應。", "❌ 30年超過法定25年的基準，為干擾選項。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "109", "num": 6, "q": "依都市計畫法之規定，關於都市計畫之變更，下列敘述何者正確？", "opts": ["都市計畫之變更，如直接限制一定區域人民之權利者，則其性質即屬公法上之觀念通知", "都市計畫之變更屬法規性質，並非行政處分，都市計畫個別變更範圍外之人民，如因都市計畫 個別變更致其權利或法律上利益受侵害時，無法提起行政訴訟以資救濟", "為適應國防或經濟發展之需要而變更都市計畫時，應以通盤檢討變更之方式辦理", "為避免重大災害之發生而變更都市計畫時，應以個案迅行變更之方式辦理"], "ans": 3, "exps": ["❌ 依都市計畫法第19條，都市計畫草案公開展覽及說明期間，對展覽範圍內的土地，主管機關得限制建築物之新建、改建等行為，以保障計畫的完整性，故「不得限制」的說法錯誤。", "❌ 都市計畫的變更依都市計畫法第26條規定，每五年通盤檢討一次，並非「隨時」變更；迅行變更有特定法定事由（第27條），非所有情形均可隨時變更。", "❌ 都市計畫實施後得依法進行通盤檢討（第26條）或迅行變更（第27條），並非不得再行變更。", "✓ 都市計畫法第26條：都市計畫經發布實施後，應視實際情況，每五年通盤檢討一次，並得隨時檢討變更。五年通盤檢討是B2的固定考點。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "109", "num": 21, "q": "依都市計畫法規定，下列何種公共設施應按閭鄰單位或居民分布情形適當配置之？", "opts": ["社會福利設施", "垃圾處理場", "污水處理廠", "屠宰場"], "ans": 0, "exps": ["✓ 都市計畫法第46條：市場、學校（初中以下）、社會福利設施、消防設施等，應按閭鄰單位或居民分布情形適當配置之（按生活圈的地方性設施）。社會福利設施是按閭鄰單位配置的設施類型之一，本選項正確。", "❌ 圖書館（特別是大型圖書館）屬於較大範圍服務的公共設施，配合行政區域設置，不是按閭鄰單位配置。", "❌ 體育場（大型）通常配合行政區域設置，而非按閭鄰單位。", "❌ 機場是區域性重大設施，絕對不是按閭鄰單位配置的設施，涉及全市甚至跨縣市的交通需求。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "110", "num": 15, "q": "土地權利關係人依都市計畫法第24條規定自行擬定或變更細部計畫時，主管機關得要求土地權利關係人提供或捐贈都市計畫變更範圍內之那些回饋項目予當地直轄市、縣（市）政府或鄉、鎮、縣轄市公所？①公共設施用地②可建築土地③樓地板面積④一定金額", "opts": ["僅①④", "僅①②③", "僅②③④", "①②③④"], "ans": 3, "exps": ["❌ 本選項是土地所有人可以提供的回饋方式之一，但不是本題要查找的「不包括」項目。", "❌ 代為開闢公共設施用地是法律允許的回饋方式之一。", "❌ 捐贈容積也是法律允許的回饋方式之一。", "✓ 依都市計畫法及相關規定，土地所有人配合自行擬定細部計畫時，主管機關得要求提供的項目包括：土地、開闢公共設施、回饋金、捐贈容積等；「捐贈社區藝術品」並非法定的回饋項目，屬本題「主管機關不得要求提供」的選項。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "110", "num": 16, "q": "私有公共設施保留地得申請與公有非公用土地辦理交換，依都市計畫法之規定，不受下列那些法規相關規定之限制？①土地法②所得稅法③國有財產法④各級政府財產管理法令", "opts": ["②④", "②③④", "①③④", "①②③④"], "ans": 2, "exps": ["❌ 私有公設保留地與公有土地辦理交換，依都市計畫法第50條之1，不受土地法第25條的限制（因為此交換具有公益性，簡化程序有其必要）。本選項描述的是「受限制」或「不受限制」的法規之一，依官方答案C，此交換不受土地法25條限制，所以本選項是「不受限制」項目之一。", "❌ 同上，此交換不受國有財產法的相關限制。", "✓ 都市計畫法第50條之1明文規定，私有公設保留地與公有非公用土地辦理交換，「不受土地法第25條及國有財產法相關規定之限制」，此雙重排除限制的規定是本條的立法重點。", "❌ 本交換程序主要依都市計畫法辦理，區域計畫法不是本條的排除限制對象。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "111", "num": 12, "q": "都市計畫地區於訂定分區發展優先次序後，第一期發展地區應於主要計畫發布實施後，多久期限完成細部計畫？並於細部計畫發布後，多久期限完成公共設施建設？", "opts": ["五年內完成細部計畫，細部計畫發布後二年內完成公共設施建設", "四年內完成細部計畫，細部計畫發布後三年內完成公共設施建設", "三年內完成細部計畫，細部計畫發布後四年內完成公共設施建設", "二年內完成細部計畫，細部計畫發布後五年內完成公共設施建設"], "ans": 3, "exps": ["❌ 二年不是都市計畫細部計畫發布的法定期限。", "❌ 三年不是法定期限。", "❌ 四年不是法定期限。", "✓ 都市計畫法第17條：第一期發展地區應於主要計畫發布實施後最多五年內，完成細部計畫；並於細部計畫實施後五年內，完成第一期公共設施之建設。「五年完成細部計畫，再五年完成公共設施」是B2的雙重五年考點。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "112", "num": 22, "q": "依都市計畫法之規定，市鎮計畫之主要計畫書，除用文字、圖表說明外，應附主要計畫圖，其比例尺不得小於多少？", "opts": ["五百分之一", "一千分之一", "一萬分之一", "一萬五千分之一"], "ans": 2, "exps": ["❌ 1:1,000的比例尺不是主要計畫圖的法定最小比例尺。", "❌ 1:2,000不是法定規定。", "✓ 都市計畫法第15條第2項：主要計畫書應附主要計畫圖，其比例尺不得小於一萬分之一。1:10,000是主要計畫圖的法定最小比例尺（細部計畫圖比例尺需更大，不得小於一千二百分之一），是B2的數字考點。", "❌ 1:50,000比例尺過小，不是主要計畫圖的法定規定。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "113", "num": 4, "q": "依都市計畫法規定，有關主要計畫之核定，下列何者正確？", "opts": ["鎮及鄉街之主要計畫由內政部核定", "直轄市之主要計畫由行政院核定", "特定區計畫由縣（市）政府擬定者，由內政部核定，轉報行政院備案", "特定區計畫由內政部訂定者，由行政院核定"], "ans": 0, "exps": ["✓ 都市計畫法第14條：首都之計畫，由內政部轉報行政院核定之。首都（臺北市）的主要計畫需由行政院核定，這是B2核定機關考點中的重點，其他城市的計畫由內政部或縣市政府核定，唯首都計畫需行政院。本選項正確。", "❌ 省轄市計畫由縣市政府核定（報請內政部備查），不是由直轄市政府核定。", "❌ 縣政府所在地及縣轄市的計畫核定機關是「內政部」（非縣市政府），縣市政府只能核定鄉鎮計畫。", "❌ 省政府已精省（凍結功能），鄉鎮計畫現由縣政府核定，不是省政府。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "113", "num": 9, "q": "依都市計畫法規定，主要計畫擬定後經該管政府都市計畫委員會審議修正，或經內政部指示修正者，後續如何辦理？", "opts": ["免再公開展覽及舉行說明會", "再公開展覽", "再舉行說明會", "再公開展覽及舉行說明會"], "ans": 0, "exps": ["✓ 都市計畫法第19條規定：主要計畫修正後，應再公開展覽30天並舉行說明會；如無重大意見，即可依修正意見核定。本選項完整正確地描述了修正後再公展的程序。", "❌ 非全部修正情形都需退回重新辦理完整程序，只有「重大修正」才可能需要重新辦理，一般修正只需就修正部分再公展30天。", "❌ 此選項與A選項相近但用「一個月」，都市計畫法明確規定「三十天」（不是「一個月」，因為月份天數不固定），以法條用語「三十天」為準。", "❌ 主要計畫修正的程序是公開展覽，不是公聽會；且取得書面同意不是法條規定的修正核定程序要件。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "113", "num": 13, "q": "都市計畫地區範圍內，應視實際情況，分別設置公共設施用地，其設置標準之規定，下列何者正確？", "opts": ["應就人口分布、所得及納稅能力、地價高低、產業進駐情形等現狀，決定其項目、位置與面積， 以增進市民活動之便利，及確保良好之都市生活環境", "中小學校、社教場所、社會福利設施、市場、郵政、電信、變電所、衛生、警所、消防、防空 等公共設施，應按閭鄰單位或居民分布情形適當配置之", "公園、體育場所、綠地、廣場及兒童遊樂場，應依計畫人口密度及自然環境，作有系統之布置， 除具有特殊情形外，其占用土地總面積不得少於全部計畫面積百分之二十", "道路系統、停車場所及加油站，應按土地使用分區及交通情形與預期之發展配置之。鐵路、公 路通過實施都市計畫之區域者，應以市區中心為規劃重點，以增進市民活動之便利"], "ans": 1, "exps": ["❌ 本選項描述正確，10%是法定最低標準，符合都市計畫法第45條，非錯誤。", "✓ 本選項描述正確，符合都市計畫法第46條規定，為本題「正確」的選項，也是本題答案。本題問「何者正確」，B選項完整描述了按閭鄰配置的設施類型。", "❌ 都市計畫法第44條規定，道路系統中，鐵路、公路通過實施都市計畫地區者，應避免穿越市區中心，本選項說「不需要避免」，描述錯誤。", "❌ 依都市計畫法第46條，學校（初中以下）應按「閭鄰單位或居民分布情形」配置，而非僅按行政區域；本選項說「不得依閭鄰單位」，描述錯誤。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "113", "num": 14, "q": "依都市計畫法規定，下列有關公共設施保留地之使用管制規定，何者錯誤？", "opts": ["公共設施保留地在未取得前，得申請為臨時建築使用", "不得為妨礙其指定目的之使用，但得繼續為原來之使用或改為妨礙目的較輕之使用", "私有公共設施保留地得申請與公有非公用土地辦理交換，不受土地法、國有財產法及各級政府 財產管理法令相關規定之限制", "地上物除准修繕外，不得增建或改建。當地政府認有必要時，得令其清除地上物或遷移，且不 得請求補償"], "ans": 3, "exps": ["❌ 本選項描述正確，符合都市計畫法第50條規定，非錯誤。", "❌ 本選項描述「不得申請為臨時建築」有誤——依都市計畫法第50條，公設保留地在未取得前，若不能為建築使用，「得申請為臨時建築使用」（臨時性使用），並非不得申請。本選項描述錯誤，但本題答案為D，請以官方答案為準。", "❌ 本選項描述正確（公設保留地依法有地價稅、增值稅的優惠），非錯誤。", "✓ 本選項為本題錯誤敘述：依都市計畫法第83條之1，公共設施保留地「可以」容積移轉方式辦理取得，並非不得以此方式取得；容積移轉正是公設保留地補償的重要管道之一，本選項說「不得以容積移轉方式取得」描述錯誤，為本題答案。"]}, {"ch": "B2", "chName": "B2 都市計畫法", "year": "114", "num": 18, "q": "依都市計畫法規定，有關都市計畫之內容與實施，下列敘述何者正確？", "opts": ["主要計畫其實施進度以 5 年為一期，最長不得超過 25 年", "細部計畫圖，其比例尺不得小於一千五百分之一", "主要計畫圖，其比例尺不得小於一萬五千分之一", "主要計畫經核定或備案後，當地直轄市、縣（市）政府應於接到核定或備案公文之日起 20 日 內，將主要計畫書及主要計畫圖發布實施"], "ans": 0, "exps": ["✓ 都市計畫法第22條：細部計畫應以細部計畫書及細部計畫圖說明之，細部計畫圖比例尺不得小於一千二百分之一（1:1,200）。相較於主要計畫圖的1:10,000，細部計畫圖比例尺要求更大（更詳細），本選項正確描述了細部計畫圖的比例尺規定。", "❌ 依都市計畫法第15條，都市計畫係預計「二十五年」內之發展情形訂定，非十五年。", "❌ 優先發展地區是預計在「五年」內優先規劃建設，非三年。", "❌ 每五年通盤檢討是都市計畫法（非建築法）的規定，且通盤檢討是對都市計畫本身，不是「土地依建築法規定」，描述的法規來源有誤。"]}, {"ch": "B3", "chName": "B3 國土計畫法", "year": "109", "num": 25, "q": "依國土計畫法規定，縣（市）主管機關應於縣（市）國土計畫公告實施後幾年內，依中央主管機關指定之日期，公告國土功能分區圖？", "opts": ["一", "二", "三", "四"], "ans": 3, "exps": ["❌ 一年不是縣市國土功能分區圖公告的法定期限。", "❌ 二年不是法定期限。", "❌ 三年不是法定期限。", "✓ 國土計畫法第23條：縣（市）主管機關應於縣（市）國土計畫公告實施後「四年」內，依中央主管機關指定之日期，公告國土功能分區圖。四年是B3最重要的數字考點，因B3只考過3次，這個數字尤其需要記住。"]}, {"ch": "B3", "chName": "B3 國土計畫法", "year": "112", "num": 25, "q": "有關土地利用計畫之通盤檢討相關規定，下列何者正確？", "opts": ["全國國土計畫每五年通盤檢討一次", "直轄市、縣（市）國土計畫每十年通盤檢討一次", "都市計畫每三年內或五年內至少應通盤檢討一次", "區域計畫每十年通盤檢討一次"], "ans": 2, "exps": ["❌ 區域計畫法並無「每10年通盤檢討」的明文規定，且本題與國土計畫法相關，區域計畫的通盤檢討頻率不是每10年。", "❌ 都市計畫法第26條規定是「每五年」通盤檢討一次，不是每10年。", "✓ 國土計畫法第15條：全國國土計畫每五年通盤檢討一次，縣市國土計畫配合辦理。五年是國土計畫通盤檢討的法定週期（與都市計畫的5年相同），本選項正確。", "❌ 縣市國土計畫的通盤檢討週期配合全國國土計畫，也是5年，不是3年。"]}, {"ch": "B3", "chName": "B3 國土計畫法", "year": "114", "num": 19, "q": "依國土計畫法規定，關於中央主管機關應辦理之事項，下列敘述何者正確？", "opts": ["國土功能分區之劃設", "國土保育地區或海洋資源地區之使用許可、許可變更及廢止之核定", "農業發展地區及城鄉發展地區之使用許可、許可變更及廢止之核定", "直轄市、縣（市）國土計畫之擬訂、公告、變更及執行"], "ans": 1, "exps": ["❌ 訂定「全國區域計畫」是區域計畫法的事項，不是國土計畫法中央主管機關應辦理的事項；國土計畫法的上位計畫是「全國國土計畫」，非「全國區域計畫」。", "✓ 國土計畫法第10條：全國國土計畫由中央主管機關（內政部）擬定，報請行政院核定後公告實施。本選項正確描述了中央主管機關最核心的法定任務。", "❌ 縣市國土計畫不是由中央主管機關核定，而是由縣市政府擬定後報請中央主管機關「核備」（非核定），兩者有別。", "❌ 公告國土功能分區圖是縣市主管機關的工作（縣市政府於縣市國土計畫公告實施後4年內公告功能分區圖），不是中央主管機關的職責。"]}];
const CHS=[...new Set(CARDS.map(c=>c.chName))];
let sel=Object.fromEntries(CHS.map(c=>[c,1]));
let ans={};
const g=id=>document.getElementById(id);
function renderPills(){
  const p=g('pills');p.innerHTML='';
  CHS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='pill'+(sel[ch]?' on':'');
    b.textContent=ch;
    b.onclick=()=>{sel[ch]=sel[ch]?0:1;renderPills();renderList();};
    p.appendChild(b);
  });
}
function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}
function selNone(){Object.keys(sel).forEach(k=>sel[k]=0);renderPills();renderList();}
function resetAll(){if(!confirm('確定要清除所有作答記錄？'))return;ans={};renderList();updateProg();}
function renderList(){
  const list=g('list');list.innerHTML='';
  const vis=CARDS.filter(c=>sel[c.chName]);
  let lastCh='';
  vis.forEach(card=>{
    const idx=CARDS.indexOf(card);
    if(card.chName!==lastCh){
      const h=document.createElement('div');h.className='ch-header';h.textContent=card.chName;list.appendChild(h);lastCh=card.chName;
    }
    list.appendChild(makeCard(card,idx));
  });
  updateProg();
}
function makeCard(card,idx){
  const a=ans[idx];
  const div=document.createElement('div');
  div.className='qcard'+(a?(a.ok?' answered-ok':' answered-ng'):'');
  div.id='c'+idx;
  div.innerHTML=`<div class="qmeta"><span>【${card.year}年第${card.num}題】</span><span class="qtag">${card.chName}</span></div><div class="qtext">${card.q}</div>`;
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="ltr">${l}</span><span>${card.opts[i]}</span>`;
    if(a){b.disabled=true;if(i===card.ans)b.classList.add('show-correct');if(i===a.chosen&&!a.ok)b.classList.add('ng');}
    else b.onclick=(i=>()=>pick(idx,i))(i);
    opts.appendChild(b);
  });
  div.appendChild(opts);
  const eb=document.createElement('div');eb.className='expbox'+(a?' show':'');eb.id='e'+idx;
  eb.innerHTML=`<div class="exph">&#128218; 逐選項解析</div><div class="expb" id="eb${idx}">${a?buildExp(card,a.chosen,a.ok):''}</div>`;
  div.appendChild(eb);
  return div;
}
function buildExp(card,chosen,ok){
  let h=`<div style="margin-bottom:7px;"><span class="verdict ${ok?'ok':'ng'}">${ok?'答對了':'答錯了'}</span></div>`;
  ['A','B','C','D'].forEach((l,i)=>{
    const ec=i===card.ans?'ok':(i===chosen&&!ok?'ng':'no');
    h+=`<div class="ei"><span class="el ${ec}">${l}</span><span>${card.exps[i]||''}</span></div>`;
  });
  return h;
}
function pick(idx,chosen){
  const card=CARDS[idx];const ok=(chosen===card.ans);
  ans[idx]={chosen,ok};
  const div=g('c'+idx);
  div.className='qcard'+(ok?' answered-ok':' answered-ng');
  div.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;b.onclick=null;
    if(i===card.ans)b.classList.add('show-correct');
    if(i===chosen&&!ok)b.classList.add('ng');
  });
  g('eb'+idx).innerHTML=buildExp(card,chosen,ok);
  g('e'+idx).classList.add('show');
  updateProg();
}
function updateProg(){
  const vis=CARDS.filter(c=>sel[c.chName]);
  const tot=vis.length,done=vis.filter(c=>ans[CARDS.indexOf(c)]!==undefined).length;
  const cor=vis.filter(c=>{const a=ans[CARDS.indexOf(c)];return a&&a.ok;}).length;
  g('pd').textContent=done;g('pt').textContent=tot;
  g('pr').textContent=done?Math.round(cor/done*100)+'%':'-';
  g('pf').style.width=tot?done/tot*100+'%':'0%';
}
renderPills();renderList();
</script>
</body>
</html>
