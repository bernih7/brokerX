<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>土地法 A3+A4+A5 考題解析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.72rem;padding:5px 11px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .2s;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.64rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);transition:all .15s;}
.opt:disabled{cursor:default;}
.ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}.el.no{background:#b0b8c4;color:#fff;}.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}
</style>
</head>
<body>
<div class="app">
<h1>土地法 A3+A4+A5 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">A3 共有優先購買權 ／ A4 基地耕地優先購買權 ／ A5 公有土地｜共 59 題</div>
<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>
<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text"><span id="pd">0</span>/<span id="pt">0</span> 已答・正確率 <span id="pr">-</span></div>
</div>
<div id="list"></div>
</div>
<script>
const CARDS=[{"ch": "A3", "chName": "A3 共有優先購買權", "year": "99", "num": 4, "q": "共有土地設定下列何種他項權利，適用土地法第34條之1多數決之規定？", "opts": ["質權", "典權", "抵押權", "耕作權"], "ans": 1, "exps": ["❌ 質權是動產擔保物權（以動產或有價證券設定），不能在不動產上設定質權，且質權不在土地法第34條之1適用的他項權利類型內。", "✓ 土地法第34條之1第1項規定，共有土地之「處分、變更及設定地上權、農育權、不動產役權或典權」，可以以多數決（共有人過半數及應有部分過半數，或應有部分逾2/3）為之。典權是本條明文列舉的適用類型之一。", "❌ 土地法第34條之1明文排除「設定抵押權」適用多數決，抵押權涉及擔保，影響全體共有人利益較大，故須全體同意，不適用多數決。這是最常見的陷阱考點。", "❌ 耕作權是土地法創設的他項權利，但不在土地法第34條之1第1項明文列舉的適用類型內（該條文列舉的是地上權、農育權、不動產役權、典權），故不適用多數決。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "99", "num": 8, "q": "根據土地法之規定，依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，何者得申請該管直轄市、縣（市）地政機關調處？", "opts": ["善意第三人", "任何共有人", "地政士", "不動產經紀人"], "ans": 1, "exps": ["❌ 善意第三人是物權法上的概念，指不知情的交易相對人，並非土地法中共有土地分割調處的申請主體。", "✓ 土地法第34條之2第1項：依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，任何共有人得申請該管地政機關調處。強調「任何」共有人均有申請調處的資格，不限特定人或多數人。", "❌ 地政士是土地登記的專業代理人，不是土地分割調處的申請主體，除非其本身也是共有人。", "❌ 不動產經紀人的職能是仲介交易，無法以經紀人身分申請共有土地分割調處。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "100", "num": 40, "q": "依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，任何共有人得申請該管直轄市、縣（市）地政機關調處。不服調處者，應於接到調處通知後幾日內向司法機關訴請處理？", "opts": ["十五日", "二十日", "二十五日", "三十日"], "ans": 0, "exps": ["✓ 土地法第34條之2第2項：不服調處者，應於接到調處通知後十五日內，向司法機關訴請處理，這個「15日」是高頻考點，99年、108年、113年都考過，務必牢記是15日而非30日或20日。", "❌ 20日不是調處不服後的訴請期限，為干擾選項。", "❌ 25日不是調處不服後的訴請期限，為干擾選項。", "❌ 30日是一些行政救濟的期限，但調處不服後的訴請期限是15日，不是30日。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "101", "num": 2, "q": "依土地法第34條之1規定，共有土地設定下列何種他項權利時，不得援用共有人過半數及其應有部分合計過半數之同意而為之？", "opts": ["設定典權", "設定地上權", "設定抵押權", "設定不動產役權"], "ans": 2, "exps": ["❌ 設定典權是土地法第34條之1第1項明文列舉的適用類型，可以多數決為之，故此選項錯誤（不是不得援用多數決的情形）。", "❌ 設定地上權也是土地法第34條之1第1項明文列舉的適用類型，可以多數決為之，故此選項錯誤。", "✓ 土地法第34條之1明文規定，抵押權的設定不適用多數決。因為設定抵押權涉及所有共有人的財產擔保，風險較高，故須全體共有人同意，不能以多數決代替。", "❌ 設定不動產役權是土地法第34條之1第1項明文列舉的適用類型，可以多數決為之，故此選項錯誤。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "102", "num": 39, "q": "甲、乙、丙、丁四人共同繼承其先祖遺留之可建築土地一筆，各人持分依序為1/3、4/9、1/9、1/9，關於該筆共有土地之出售，下列敘述何者正確？", "opts": ["甲乙同意出售即可", "甲丙同意出售即可", "甲丁同意出售即可", "乙丙或乙丁同意出售即可"], "ans": 0, "exps": ["✓ 甲持分1/3、乙持分4/9，合計1/3+4/9=3/9+4/9=7/9，超過2/3（≈0.667）。土地法第34條之1規定，應有部分合計逾2/3時，其人數不予計算，即不論人數多寡，只要應有部分超過2/3即可以多數決處分。甲乙合計7/9>2/3，故甲乙同意即足夠，丙丁不同意也無妨。", "❌ 甲持分1/3、丙持分1/9，合計4/9，未超過2/3；共有人人數2/4=1/2，未超過半數；兩個條件都未達到，不能以多數決處分。", "❌ 甲持分1/3、丁持分1/9，合計4/9<2/3，且人數2人/4人=1/2，未超過半數，兩條件均未達。", "❌ 乙丙合計4/9+1/9=5/9<2/3；乙丁合計4/9+1/9=5/9<2/3。雖然乙的持分大，但乙丙或乙丁合計仍未超過2/3，且人數也只有2/4=1/2，未超過半數，均不成立。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "103", "num": 20, "q": "共有人出賣其應有部分時，他共有人得以同一價格共同或單獨優先承購，其立法意旨主要在於：", "opts": ["提升共有土地的處分效率", "簡化或消滅共有關係", "照顧他共有人之權益", "使優先購買權具有物權效力"], "ans": 1, "exps": ["❌ 提升效率是土地法第34條之1「多數決」規定的立法目的，但共有人優先購買權（第34條之1第4項）的立法目的不是提升效率，而是為了簡化共有關係。", "✓ 土地法第34條之1第4項規定他共有人優先購買權，其立法意旨在於：當部分共有人出賣其應有部分時，讓其他共有人有機會優先買入，以達到「合併共有關係、最終消滅共有狀態」的目的，而非僅為照顧個別共有人利益。", "❌ 照顧他共有人是方法，但更深層的立法目的是消滅共有關係，使土地所有權歸於單一或較少人，提升土地利用效率。", "❌ 土地法第34條之1的他共有人優先購買權，依通說和實務見解，性質上屬於「債權效力」的優先購買權，不是物權效力。使優先購買權具有物權效力不是本條的立法目的。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "104", "num": 2, "q": "於共有土地設定下列何種權利，不適用土地法第34條之1規定，以多數決方式行之？", "opts": ["不動產役權", "農育權", "抵押權", "典權"], "ans": 2, "exps": ["❌ 不動產役權（地役權）是土地法第34條之1第1項明文列舉的適用類型，可以多數決設定，此選項錯誤。", "❌ 農育權是土地法第34條之1第1項明文列舉的適用類型，可以多數決設定，此選項錯誤。", "✓ 抵押權不在土地法第34條之1第1項的列舉範圍內，故設定抵押權不適用多數決，需全體共有人同意。這是本科最常考的考點之一。", "❌ 典權是土地法第34條之1第1項明文列舉的適用類型，可以多數決設定，此選項錯誤。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "105", "num": 18, "q": "甲、乙、丙、丁、戊等五人分別共有A屋，應有部分均等。下列何者錯誤？", "opts": ["甲出賣其應有部分給庚，如乙主張先買權，依實務見解，則庚不得訴請甲移轉應有部分", "甲擅自將Ａ屋全部出賣給辛，則辛得請求甲移轉其應有部分，此時，丙得就該應有部分主張先買權", "依土地法第 34 條之 1 執行要點規定，如甲、乙與丙擅自將 A 屋全部出賣給壬，則丁的先買權客體為 A 屋全部", "丙、丁與戊如有故意或過失以低價出售 A 屋全部，以致甲受有損害，依實務見解，即難謂非不法侵害甲之權利， 甲得依據侵權行為之法則請求損害賠償"], "ans": 2, "exps": ["❌ 本選項描述正確：乙行使先買權，且先買權為債權效力，乙可請求甲履行，庚雖取得所有應有部分，但在乙行使先買權的情形下，庚不得請求甲再移轉。", "❌ 本選項描述正確。", "✓ 本選項為錯誤敘述：土地法第34條之1執行要點規定，部分共有人出賣共有物全部時，應事先通知他共有人，他共有人收到通知後15日內未表示者視為放棄；本選項說甲乙丙「擅自」出賣（未通知），在此情形下丁的先買權並不因此視為放棄，且丁是其他共有人，有優先購買權，未經通知不能視為放棄。", "❌ 本選項描述正確，共有人故意低價出售侵害他共有人權益，可構成侵權行為。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "105", "num": 34, "q": "甲、乙、丙、丁、戊、己等六人分別共有A地，其中的甲、乙、丙、丁將A地全部出賣給戊。依近年最高法院判決見解，下列敘述何者正確？", "opts": ["甲、乙、丙、丁得將 A 地有償處分給戊", "甲、乙、丙、丁不得將 A 地有償處分給戊，因為共有人不得為土地法第 34 條之 1 第 1 項的受讓人", "甲、乙、丙、丁不得將 A 地有償處分給戊，因為有利害衝突顯失公平情形，難認正當", "甲、乙、丙、丁將 A 地出賣給戊時，因為並非出賣應有部分，故己不得主張先買權"], "ans": 0, "exps": ["✓ 依近年最高法院判決，共有人不得為土地法第34條之1第1項受讓人的限制，並不排除「已是共有人的戊」買受全部共有土地的情形，特別是甲乙丙丁合計應有部分達4/6>2/3（甲乙丙各1/6，丁1/6，合計4/6），可依多數決有償處分。故甲乙丙丁得將A地出賣給戊（戊雖為共有人，但法律不禁止共有人取得他共有人的應有部分），答案為A。", "❌ 依近年最高法院判決，「共有人不得為受讓人」的限制是針對「以多數決強制出售他共有人之應有部分給共有人以外之第三人」的情形（防止多數共有人聯合強迫少數共有人接受），本案戊是共有人，購買的是共有人出售的「全部」共有土地（含己的應有部分），此情形較複雜，以官方答案A（得處分給戊）為準。", "❌ 依官方答案，本案不認為有顯失公平，故此選項錯誤。", "❌ 此選項說己不得主張先買權，但己作為非同意出售的他共有人，依土地法第34條之1第4項，仍有優先購買權可主張，故此選項有誤。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "107", "num": 4, "q": "土地法第34條之1第1項有關以多數決處分共有土地之規定，下列處分方式，何者不適用該規定？", "opts": ["設定農育權", "設定不動產役權", "設定典權", "辦理共有物分割"], "ans": 3, "exps": ["❌ 設定農育權是土地法第34條之1第1項明文列舉的適用類型，可以多數決為之，此選項錯誤。", "❌ 設定不動產役權是土地法第34條之1第1項明文列舉的適用類型，可以多數決為之，此選項錯誤。", "❌ 設定典權是土地法第34條之1第1項明文列舉的適用類型，可以多數決為之，此選項錯誤。", "✓ 土地法第34條之1第1項明文規定適用多數決的行為是「處分、變更及設定地上權、農育權、不動產役權或典權」，並不包含「共有物分割」。共有物分割有其專屬的法律規定（土地法第34條之2、民法第823條），不適用第34條之1的多數決。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "108", "num": 19, "q": "依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，任何共有人得申請該管直轄市、縣（市）地政機關調處，不服調處者，應於接到調處通知後幾日內向司法機關訴請處理？", "opts": ["十五日", "二十日", "二十五日", "三十日"], "ans": 0, "exps": ["✓ 同100-40，土地法第34條之2第2項明文規定不服調處者，應於接到調處通知後「十五日」內，向司法機關訴請處理。此題型在99年、100年、108年、113年皆考過，「15日」是固定答案。", "❌ 非法定期限，為干擾選項。", "❌ 非法定期限，為干擾選項。", "❌ 30日常出現在其他期限規定中，但共有土地調處不服後的訴請期限是15日，不是30日。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "109", "num": 24, "q": "關於不動產共有關係，依土地法第34條之1規定，下列敘述何者正確？", "opts": ["甲、乙、丙共有一筆土地，其應有部分各三分之一，該地之應有部分出賣時，地上權人、典權 人或房屋承租人有依同樣條件優先購買之權", "土地共有人欲出租共有土地於他人時，得以共有人過半數及其應有部分合計過半數之同意行之", "區分所有建物之專有部分連同其基地應有部分之所有權一併移轉與同一人所有者，應適用土地 法第 34 條之 1 第 4 項規定", "依法得分割之共有土地或建築改良物，共有人不能自行協議分割者，任何共有人得申請該管直 轄市、縣（市）地政機關調處。不服調處者，應於接到調處通知後十五日內，向司法機關訴請 處理，屆期不起訴者，依原調處結果辦理之"], "ans": 3, "exps": ["❌ 土地法第34條之1第4項規定的優先購買權是「他共有人」的優先購買權，不是地上權人、典權人或承租人的優先購買權（後者是土地法第104條的規範）。兩者混淆是常見錯誤。", "❌ 土地法第34條之1適用的行為類型是「處分、變更及設定地上權、農育權、不動產役權或典權」，不包含「出租」行為。出租不在多數決的適用範圍內，需全體共有人同意。", "❌ 土地法第34條之1第4項但書明文排除：區分所有建物及其基地應有部分之所有權「一併移轉與同一人」者，他共有人無優先購買權。", "✓ 土地法第34條之2第1、2項完整描述，調處申請資格（任何共有人）和不服後的訴請期限（15日），本選項完整正確。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "111", "num": 2, "q": "下列有關共有不動產處分等之敘述，何者錯誤？", "opts": ["共有土地或建築改良物的處分、變更及設定地上權、農育權、不動產役權或典權，應有共有人 過半數及其應有部分合計過半數之同意", "共有土地或建築改良物的處分、變更或設定負擔，共有人應事先以書面通知他共有人；如不能 以書面通知時，應依法公示催告之", "共有人對共有土地或建築改良物的處分、變更及設定地上權、農育權、不動產役權或典權，對 於他共有人應得之對價或補償，負連帶清償責任", "甲乙丙公同共有一筆土地，甲依法得出賣該共有土地時，乙丙得以同一價格單獨優先承購"], "ans": 1, "exps": ["❌ 本選項描述正確，符合土地法第34條之1第1項，非錯誤。", "✓ 本選項為錯誤敘述：土地法第34條之1執行要點規定，部分共有人依多數決處分時，應事先「通知」他共有人（不限書面，但通常以書面或公告為之）。本選項說「應設定負擔」不合法，且「設定負擔」應是全體同意，不是多數決，但本選項的錯誤在於將設定負擔（須全體同意）也納入應通知程序，與原條文用語「處分、變更及設定地上權、農育權、不動產役權或典權」的範圍有出入，以官方答案B為錯誤選項。", "❌ 本選項描述正確，多數決依法所為的處分，對全體共有人均有拘束力，非錯誤。", "❌ 本選項描述正確，他共有人得以同一價格共同或「單獨」優先承購，非錯誤。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "111", "num": 13, "q": "依土地法第34條之1規定，共有土地之處分、變更，下列何比例之同意，方得行之？", "opts": ["共有人三分之一及其應有部分合計過二分之一之同意", "共有人二分之一及其應有部分合計過三分之一之同意", "共有人合計逾三分之二之同意", "應有部分合計逾三分之二之同意"], "ans": 3, "exps": ["❌ 此描述的要件不符合土地法第34條之1的任何規定，為虛構選項。", "❌ 此描述的要件不符合土地法第34條之1的規定，為虛構組合。", "❌ 本選項只說「共有人人數」逾三分之二，未提及應有部分，不完整。土地法第34條之1的多數決要件有雙重門檻（人數+應有部分），或單一高門檻（應有部分逾2/3則不計人數）。", "✓ 土地法第34條之1第1項但書：其應有部分合計逾三分之二者，其人數不予計算。此即「應有部分逾2/3時，不論人數是否過半，均可多數決處分」。本選項正確描述了此高門檻規定。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "112", "num": 6, "q": "依土地法規定，關於共有土地之處分，下列何者正確？", "opts": ["應以共有人半數及其應有部分半數之同意行之", "應有部分合計三分之二者，其人數不予計算", "共有人不能以書面通知他共有人者，應公告之", "共有人不得單獨處分其應有部分"], "ans": 2, "exps": ["❌ 「半數」不是法條用語，土地法第34條之1的門檻是「過半數」（超過半數），不是「半數」（等於半數），且本選項缺少「應有部分逾三分之二者不計人數」的但書規定。", "❌ 本選項的門檻是「三分之二」，但法條規定是「逾三分之二」（超過三分之二），「等於三分之二」不符合條件，故有誤。", "✓ 土地法第34條之1第2項：前項共有人依第一項之規定為處分、變更或設定負擔時，應事先以書面通知他共有人；其不能以書面通知者，應公告之。本選項正確描述通知義務的替代方式（公告）。", "❌ 土地法第34條之1第1項並未禁止共有人單獨處分其應有部分（只是他共有人有優先購買權）。共有人本可自由出賣其應有部分，只是須依法通知他共有人以行使先買權。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "112", "num": 18, "q": "依土地法第三十四條之一執行要點規定，有關共有人權利之行使，下列何者錯誤？", "opts": ["部分共有人就共有土地或建築改良物為處分、變更及設定地上權、農育權、不動產役權或典權， 應就共有物之全部為之", "部分共有人依本法條規定為處分、變更或設定負擔前，應先行通知他共有人", "出賣共有土地或建築改良物時，他共有人得以出賣之同一條件共同或單獨優先購買", "他共有人於接到出賣通知後二十日內不表示者，其優先購買權視為放棄"], "ans": 3, "exps": ["❌ 本選項描述正確，符合土地法第34條之1第1項一般規定，非錯誤。", "❌ 本選項描述正確，符合土地法第34條之1第2項通知義務規定，非錯誤。", "❌ 本選項描述正確，符合土地法第34條之1第4項他共有人優先購買權規定，非錯誤。", "✓ 本選項為錯誤敘述：土地法第34條之1第4項規定，他共有人於接到出賣通知後「十五日」內不表示者，其優先購買權視為放棄。本選項說「二十日」，數字錯誤，為本題答案。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "113", "num": 11, "q": "依土地法規定，依法得分割之共有土地，共有人不能自行協議分割者，任何共有人得申請該管直轄市、縣（市）地政機關調處，不服調處者，應於接到調處通知後幾日內向司法機關訴請處理，屆期不起訴者，依原調處結果辦理之？", "opts": ["七日", "十日", "十五日", "三十日"], "ans": 2, "exps": ["❌ 七日不是共有土地調處不服後的訴請期限，為干擾選項。", "❌ 十日不是共有土地調處不服後的訴請期限，為干擾選項。", "✓ 土地法第34條之2第2項：不服調處者，應於接到調處通知後十五日內，向司法機關訴請處理。15日是本考點的固定答案，在99、100、108、113年皆考過，務必記住。", "❌ 30日是行政訴訟訴願等救濟的常見期限，但共有土地調處不服後的訴請司法機關期限是15日，不是30日。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "113", "num": 16, "q": "依土地法規定，下列有關逾期未辦繼承登記案件應由地政機關書面通知繼承人之情形，何者正確？", "opts": ["自繼承開始之日起逾一年未辦理繼承登記者，經該管直轄市或縣市地政機關查明後，應即公告 繼承人於六個月內聲請登記，並以書面通知繼承人", "列冊管理期間為十五年，列冊管理期間該管直轄市或縣市地政機關應每年清查並書面通知繼承 人辦理繼承登記", "列冊管理期間屆滿，逾期仍未聲請登記者，由地政機關書面通知繼承人及將該土地或建築改良 物清冊移請財政部國有財產署公開標售", "標售土地或建築改良物前應公告三個月，並書面通知繼承人、共有人或合法使用人依序行使優 先購買權"], "ans": 2, "exps": ["❌ 公告後聲請期間是「六個月」，不是一個月。", "❌ 列冊管理期間（15年）的描述正確，但法條未規定「每年清查並書面通知」的義務，此部分為虛構敘述。", "✓ 土地法第73條之1第3項：列冊管理期間屆滿，地政機關應書面通知繼承人，並將清冊移請財政部國有財產署公開標售。本選項正確描述了列冊管理期滿後的標售通知程序。", "❌ 標售前的公告期間是「一個月」，不是三個月；優先購買權人的順序是「繼承人→合法使用人→其他共有人」（本選項順序有誤：把「共有人」放在「合法使用人」之前）。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "113", "num": 17, "q": "甲乙丙丁戊共有A地，持分各五分之一。甲乙丙三人擬依土地法第34條之1規定，將A地出售予戊，下列敘述何者正確？", "opts": ["不適法，出售為有償讓與行為，應依民法規定，經共有人全體同意始得為之", "不適法，共有人不得為受讓人", "適法，甲乙丙三人已符合共有人過半數及其應有部分合計過半數之同意的行使要件", "適法，買賣契約業經甲乙丙戊同意，縱使戊未經計算在同意人數及應有部分內，仍得依土地法 第 34 條之 1 辦理"], "ans": 1, "exps": ["❌ 土地法第34條之1就是要突破民法上共有物處分須全體同意的規定，以多數決代替全體同意，故不能以「民法須全體同意」為由認定不適法。", "✓ 土地法第34條之1執行要點明確規定，依多數決處分共有土地時，受讓人「不得為共有人」。本案戊已是共有人，甲乙丙欲將A地出售給戊，受讓人（戊）為共有人，違反執行要點規定，故不適法。", "❌ 形式上人數過半（3/5）、應有部分過半（3/5），行使要件看似符合，但因受讓人戊是共有人，違反執行要點，故仍不適法。", "❌ 戊雖同意，但其身分為共有人，依執行要點規定，共有人不得為受讓人，故即使戊同意也不適法。"]}, {"ch": "A3", "chName": "A3 共有優先購買權", "year": "114", "num": 7, "q": "依土地法規定，所有權人欲以共有土地設定地上權，在不計共有人人數比例的情況下，至少應得到該共有土地應有部分多少比例之同意？", "opts": ["超過四分之三", "超過二分之一", "超過三分之二", "全體"], "ans": 2, "exps": ["❌ 超過3/4的要件不符合土地法第34條之1的任何規定，為過高門檻的干擾選項。", "❌ 超過1/2是「人數及應有部分同時過半」這個一般多數決的門檻，但本題特別說明「不計共有人人數比例」，此情形對應的是「應有部分逾2/3者，其人數不予計算」的特殊規定，故單純過1/2不是此情形的正確答案。", "✓ 土地法第34條之1第1項但書：其應有部分合計逾三分之二者，其人數不予計算。本題說「不計共有人人數比例的情況下」，對應的正是此但書規定，即當應有部分超過三分之二時，不需要考慮人數是否過半，直接可以多數決處分，包括設定地上權。", "❌ 全體同意是民法上共有物處分的原則，但土地法第34條之1就是要突破此限制，不是以「全體同意」為要件。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "99", "num": 15, "q": "因房屋租用發生爭議，不服調處者，依法得向何機關訴請處理？", "opts": ["調解委員會", "監察機關", "司法機關", "地政機關"], "ans": 2, "exps": ["❌ 調解委員會（如鄉鎮市調解委員會）是民事糾紛的前置調解機構，不是土地法規定不服調處後的訴請機關。", "❌ 監察機關（監察院）是監察彈劾機關，不是處理房屋租用糾紛的訴請機關。", "✓ 土地法第99條：房屋租用糾紛，由直轄市或縣（市）地政機關調處，不服調處者，向司法機關（法院）訴請處理。土地法上房屋租用爭議調處不服後的救濟，是向司法機關起訴，而非行政救濟。", "❌ 地政機關是進行調處的機關，不服調處後應向司法機關訴請，而非繼續找地政機關。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "99", "num": 26, "q": "依土地法之規定，以現金為租賃之擔保者，其現金利息視為租金之一部，而該擔保之金額，不得超過幾個月房屋租金之總額？", "opts": ["1 個月", "2 個月", "3 個月", "4 個月"], "ans": 1, "exps": ["❌ 1個月的擔保現金上限過低，非法定標準。", "✓ 土地法第99條第2項：以現金為租賃之擔保者，其現金利息視為租金之一部，而該擔保之金額，不得超過二個月房屋租金之總額。「2個月」是法定上限，超過部分無效，此為A4的高頻數字考點。", "❌ 3個月超過法定上限，非法律規定。", "❌ 4個月超過法定上限，非法律規定。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "99", "num": 37, "q": "依土地法規定，下列何種情況下，沒有優先購買權存在？", "opts": ["地上權人購買該設定之基地", "承租人購買該承租之基地", "承租人購買該承租之房屋", "承租人購買該承租之耕地"], "ans": 2, "exps": ["❌ 土地法第104條第1項：基地出賣時，地上權人、典權人或承租人有依同樣條件優先購買之權。地上權人購買其設定之基地，有優先購買權，故此選項有優先購買權，不是「沒有優先購買權」的情況。", "❌ 土地法第104條第1項明文，基地承租人有優先購買基地之權，故此選項有優先購買權。", "✓ 土地法第104條第1項規定的是「基地」出賣時承租人的優先購買權，不是「房屋」出賣時承租人的優先購買權。房屋承租人對其承租的房屋本身，並無土地法第104條的優先購買權（房屋買賣不在第104條規範範圍內）。", "❌ 土地法第107條規定耕地出租人出賣耕地時，承租人有優先購買之權，故此選項有優先購買權。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "100", "num": 34, "q": "城市地方，應由政府建築相當數量之準備房屋，供人民承租自住之用。依土地法規定，政府準備房屋之租金，以不超過土地及其建築物價額年息多少為限？", "opts": ["百分之八", "百分之十", "百分之十二", "百分之十五"], "ans": 0, "exps": ["✓ 土地法第97條：城市地方房屋之租金，以不超過土地及其建築物申報總價年息百分之十為限；政府準備房屋租金，以不超過百分之八為限（比一般標準低，因政府房屋帶有社會福利性質）。此為A4的常考數字，政府準備房屋租金的上限是8%，一般房屋是10%，兩者要區分清楚。", "❌ 10%是一般城市房屋租金的上限，不是政府準備房屋的租金上限。", "❌ 非法定標準，為干擾選項。", "❌ 非法定標準，為干擾選項。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "100", "num": 36, "q": "下列何者非屬土地法規定出租人得將出租建築房屋基地收回之情形？", "opts": ["契約年限屆滿時", "承租人轉租基地於他人時", "承租人以基地供違反法令之使用時", "承租人積欠租金額，除以擔保現金抵償外，達二個月以上時"], "ans": 3, "exps": ["❌ 契約年限屆滿確是出租人得收回基地的情形之一（土地法第103條第1款），此為得收回的情形，非「非屬得收回」的答案。", "❌ 承租人擅自轉租基地，出租人得收回（土地法第103條第4款），此為得收回的情形。", "❌ 承租人以基地供違反法令之使用，出租人得收回（土地法第103條第5款），此為得收回的情形。", "✓ 本題問的是「非屬出租人得收回之情形」。土地法第103條的收回要件中，積欠租金的標準是「達二年之總額」（不是二個月），本選項說的「達二個月」是房屋租賃的收回標準（土地法第100條第1款），並非基地租賃的收回標準，混用了兩條法律，故本選項描述錯誤，是「非屬基地收回情形」，為本題答案。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "100", "num": 39, "q": "下列之優先購買權，何者僅具有債權效力？", "opts": ["租地建屋者出賣房屋時，基地所有權人之優先購買權", "出租人出賣耕地時，承租人之優先購買權", "基地所有權人出賣基地時，地上權人、典權人之優先購買權", "共有人出賣其應有部分時，他共有人之優先購買權"], "ans": 3, "exps": ["❌ 土地法第104條第2項：承租人出賣房屋時，基地所有權人有依同樣條件優先購買之權。此優先購買權依實務見解具有物權效力（得請求法院塗銷違反通知義務而為之移轉登記），不僅是債權效力。", "❌ 依耕地三七五減租條例第15條，出租人出賣耕地時，承租人有優先承買之權，此優先購買權依實務見解具有物權效力（物權效力較強，得對抗善意第三人），不只是債權效力。", "❌ 土地法第104條第1項的優先購買權，依實務見解效力介於債權和物權之間，有觀點認為其效力較一般債權強，可以對抗惡意第三人，並非單純債權效力。", "✓ 土地法第34條之1第4項的他共有人優先購買權，依通說和實務見解，屬於「債權效力」的優先購買權（非物權效力），未履行通知義務時，他共有人只能請求損害賠償，不能直接塗銷已完成的登記。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "103", "num": 28, "q": "下列何者係土地法規定，依不定期限租用耕地之契約，得終止之狀況？", "opts": ["承租人收回自耕時", "出租人放棄其耕作權利時", "地租積欠達二年之總額時", "承租人死亡而僅有高齡之繼承人時"], "ans": 2, "exps": ["❌ 承租人收回自耕是「出租人」（地主）可以終止耕地租約的情形，不是承租人可以終止不定期限耕地租約的情形。本題問的是不定期限租約「得終止」的情形，主語應是出租人或法律允許終止的事由。", "❌ 「出租人放棄耕作權利」不是土地法規定不定期限耕地租約得終止之事由（土地法第114條有不定期限租約終止的規定，但此選項不在其中）。", "✓ 土地法第114條：不定期限之耕地租賃契約，出租人非有下列情形之一，不得終止：……三、積欠地租達二年之總額時。積欠地租達2年總額是終止不定期限耕地租約的法定事由之一。", "❌ 承租人死亡後，其繼承人得繼續承租，即使繼承人年邁，也不是法定的終止事由。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "103", "num": 38, "q": "土地法第104條有關基地出賣時，何者無優先購買權：", "opts": ["典權人", "地上權人", "抵押權人", "承租人"], "ans": 2, "exps": ["❌ 土地法第104條第1項：基地出賣時，地上權人、典權人或承租人有依同樣條件優先購買之權。典權人在條文明文列舉內，有優先購買權。", "❌ 地上權人在第104條明文列舉內，有優先購買權。", "✓ 土地法第104條明文列舉地上權人、典權人、承租人有優先購買權，並未包含抵押權人。抵押權的性質是擔保物權（不是使用收益權），與基地所有權的分離問題無關，故抵押權人對基地出賣無優先購買權。", "❌ 承租人在第104條明文列舉內，有優先購買權。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "104", "num": 28, "q": "甲於租用基地建築房屋後，依土地法規定，應由出租人與甲於下列何項期間內，聲請該管直轄市或縣（市）地政機關為地上權之登記？", "opts": ["租用契約訂立後二十年內", "設定地上權契約訂立後二個月內", "申請地上權登記之請求權消滅時效後二個月內", "租用契約訂立後二個月內"], "ans": 3, "exps": ["❌ 20年不是地上權登記申請的法定期限，為干擾選項。", "❌ 本選項說的是「設定地上權契約訂立後」，但地上權契約訂立後才聲請地上權登記，邏輯上地上權是登記生效（不是訂立契約就生效），此選項混淆地上權契約與地上權登記的時點。", "❌ 時效消滅後再申請登記已無意義，且此選項不符合土地法的規定邏輯。", "✓ 土地法第102條：租用基地建築房屋，應由出租人與承租人於契約訂立後二個月內，聲請該管直轄市或縣（市）地政機關為地上權之登記。從租用契約訂立起算2個月內，是申請地上權登記的法定期限。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 12, "q": "依最高法院民事庭會議決議的見解，下列敘述何者正確？", "opts": ["甲將位於城市地方的 A 基地出租於乙蓋房屋供營業用，則乙不得請求甲協同申請地上權之登記", "甲、乙、丙等三人共有 A 地，應有部分均等，甲與乙將 A 地全部設定有償地上權於丁時，丙依法得以 同樣條件優先取得地上權", "甲、乙、丙等三人公同共有 A 地，甲出賣其應有部分於丁時，乙與丙之先買權的競合，依其應有部分 比例定之", "甲將位於城市地方的 A 屋出租於乙供營業用，則其租金得超過 A 屋及其基地申報總價年息百分之十"], "ans": 3, "exps": ["❌ 依土地法第102條，租用基地建築房屋，應由出租人與承租人聲請地上權登記，乙可以請求甲協同申請，此選項描述錯誤。", "❌ 設定地上權（非出賣應有部分）時，土地法第34條之1第4項的他共有人優先購買權是針對「出賣應有部分」的情形，設定地上權適用的是「設定他項權利多數決」，並非第4項的優先購買權規定。", "❌ 公同共有不同於分別共有，公同共有人無法出賣「其應有部分」（公同共有下各人的分額不可單獨處分），故此情形根本不發生。", "✓ 土地法第97條第1項規定租金上限為申報總價年息10%，但第2項但書：「非住宅用途者，不在此限」，即供營業用的房屋租金不受10%上限的限制，依最高法院民事庭決議，營業用房屋租金得超過10%限制。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 16, "q": "甲將A地設定地上權給乙蓋B屋後，甲將A地出賣並移轉登記給丙，嗣後乙將B屋連同地上權一併出賣於丁。依法院實務見解，下列敘述何者最正確？", "opts": ["除另有約定外，乙不得將地上權讓與丁", "丙不得主張優先承購權", "丙得主張優先承購權，優先承購權的客體僅為 B 屋", "丙得主張優先承購權，優先承購權的客體為 B 屋及地上權，而地上權原則上因混同而消滅"], "ans": 3, "exps": ["❌ 地上權依民法第838條，得讓與他人，除非契約有限制，否則得讓與。甲乙間若無禁止讓與約定，乙可以將地上權（連同地上建築物B屋）讓與丁，故此選項錯誤。", "❌ 土地法第104條第2項：承租人出賣房屋時，基地所有權人有依同樣條件優先購買之權。本題乙（地上權人）出賣B屋（地上建築物）連同地上權，丙（A地所有權人）有優先購買權，故丙得主張優先承購，此選項錯誤。", "❌ 依實務見解，地上權人出賣地上建築物時，基地所有權人的優先購買權客體包括「B屋及地上權」（因地上建築物與地上權是一體的），而非僅限於B屋，故此選項不完整。", "✓ 丙（基地所有權人）行使優先購買權後，取得B屋及地上權，此時基地所有權（丙原有）與地上權（丙新取得）同屬一人，依民法混同原則，地上權因所有人與地上權人同一而原則上消滅。本選項完整正確地描述了優先購買的客體及法律效果。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 20, "q": "甲有A耕地一筆，在99年8月8日將A地出租於乙，於租賃期間，A地被徵收並經徵收執行機關囑託登記機關登記為需用土地人丙所有，乙得否主張其為優先購買權人，因而請求塗銷A地的該登記？", "opts": ["得，因為乙的先買權具物權效力", "得，因為承租人先買權的規定得類推適用於徵收的情形", "否，因為 A 地並非基地，亦非有三七五租約的耕地", "否，因為土地徵收具公益的政策目的"], "ans": 3, "exps": ["❌ 本題的乙是普通耕地承租人（非三七五減租承租人），其優先購買權是否具物權效力有爭議，且更根本的問題是：徵收是否構成「出賣」而觸發優先購買權，實務採否定見解。", "❌ 最高法院實務認為，類推適用前提是類似情形，但徵收是公法行為（非私法買賣），性質差異過大，不宜類推適用先買權規定。", "❌ A地是耕地（農地），雖不是基地（建築用地），但土地法第107條有耕地承租人的優先購買權，問題不在「類型」而在徵收性質。", "✓ 最高法院實務見解：土地徵收是依公法進行的強制取得程序，具有公益目的，與私法上的「出賣」性質不同，故承租人的優先購買權不能對抗徵收，乙不得主張在徵收執行後行使優先購買。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 25, "q": "A地及坐落其上之B屋原同屬甲所有。甲僅將B屋贈與並移轉給乙，乙以B屋設定抵押權給丙，其後，法院拍賣B屋而由丁拍定。下列敘述何者正確？", "opts": ["由於法律規定甲乙間就 A 地視為有地上權關係，故甲得主張先買權", "由於法律推定甲為出租人，故甲得主張先買權", "由於實務上認為強制拍賣在性質上為公法上的買賣，故甲不得主張先買權", "由於物權效力先買權不得任意創設，故甲不得主張先買權"], "ans": 1, "exps": ["❌ 甲（土地所有權人）將A地贈與乙後，甲乙之間的B屋（坐落A地上）涉及的是「土地與房屋分離」問題，法律推定的是租賃關係（而非地上權），故本選項法律關係判斷錯誤。", "✓ 民法第425條之1：土地及其土地上之房屋同屬一人所有，而僅將土地或僅將房屋所有權讓與他人，或將土地及房屋分別讓與他人時，土地受讓人與房屋所有人間或房屋受讓人與土地所有人間，推定在房屋得使用期限內有租賃關係存在。本案甲僅贈與B屋給乙，A地仍屬甲，法律推定甲（土地所有人）與乙（房屋所有人）間有租賃關係，甲為「出租人」，日後法院拍賣B屋時，甲依土地法第104條第2項有優先購買權。", "❌ 實務上（最高法院）認為強制拍賣雖係公法程序，但仍屬有償讓與性質，不排除優先購買權的適用，故甲仍得主張先買權。", "❌ 本案甲的先買權是依土地法第104條第2項（法定優先購買權），並非「任意創設」，故此理由不成立。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 28, "q": "依相關規定與實務見解，關於地權與地用的敘述，下列何者最正確？", "opts": ["甲與乙分別共有 A 地，則甲出賣其應有部分時，乙有先買權，且該先買權得預先拋棄", "甲將其 B 基地出租於乙，乙於 B 地蓋有 C 屋，則於租賃期間，甲將 B 地出賣時，乙有先買權，且該先 買權不得預先拋棄", "甲於 88 年將其 D 耕地出租於乙，則於租賃期間，甲將 D 地出賣時，乙有先買權，且該先買權得預先 拋棄", "甲於 89 年將其 E 基地出租於乙蓋 F 屋，約定租賃期間 20 年，則於 105 年時，乙請求甲會同申請地上 權登記的權利已消滅"], "ans": 0, "exps": ["✓ 土地法第34條之1第4項他共有人的優先購買權，依實務見解可以預先拋棄（只是拋棄之意思表示效力問題，通說認為可以預先拋棄，且拋棄後不得反悔）。本選項正確。", "❌ 土地法第104條的基地承租人優先購買權，依通說與實務見解，「不得預先拋棄」（因涉及弱勢保護立法目的，事先拋棄違反公序良俗）。本選項說「得預先拋棄」，錯誤。", "❌ 耕地三七五減租條例第15條的承租人優先購買權，具有物權效力，依通說不得預先拋棄，本選項說「得預先拋棄」，錯誤。", "❌ 土地法第103條規定基地租約終止事由，包括「出租人收回自住或重新建築時」，但此選項說的是「合理租金重新建築」，且在105年（租約20年尚未期滿）即要終止，有爭議；依土地法規定，重新建築是可以收回基地的事由，但程序上需符合土地法第103條規定，非單純「合理租金」即可終止，本選項描述不夠精確，在答案比較下，A為最正確選項。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 33, "q": "甲有A地與坐落A地上之B屋，但僅將A地自願出賣並移轉於乙；經查B屋並非區分所有建物，亦非農舍。下列敘述何者正確？", "opts": ["甲僅將 A 地出賣並移轉於乙，違反處分一體化的法律規定", "甲與乙間就 A 地視為已有租賃關係", "甲與乙間就 A 地有法定地上權關係", "日後甲出賣其 B 屋時，乙得主張先買權"], "ans": 3, "exps": ["❌ 土地與建築物可以分別出售，民法並未強制「一體處分」，甲可以單獨出售A地，不違法。", "❌ 甲（B屋所有人）與乙（A地受讓人）之間，依民法第425條之1，法律推定在B屋得使用期限內有租賃關係，但主語是「乙為出租人（地主）、甲為承租人（屋主）」，不是「甲與乙間有租賃關係」的模糊表述，況且本題甲是B屋所有人，乙是A地受讓人，法律推定乙（地主）出租A地給甲（屋主）。", "❌ 法定地上權是基於法律規定（如抵押物拍賣後）直接發生的地上權，本題是單純土地出賣後的情形，非法定地上權的發生情形，應適用民法第425條之1的租賃推定，而非法定地上權。", "✓ 依民法第425條之1，法律推定乙（A地所有人）與甲（B屋所有人）間有租賃關係（乙為出租人），故日後甲出賣B屋時，乙依土地法第104條第2項（基地所有權人對房屋出賣有優先購買權）得主張先買權。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "105", "num": 35, "q": "關於優先購買權之種類與效力，依土地法第104條規定，下列何者正確？", "opts": ["基地出賣時，長期占有人具有優先購買權", "基地出賣時，地上權人、典權人與承租人有依同樣條件優先購買之權，其順序以抽籤決定之", "基地出賣時，優先購買權人於接到通知後 30 日內未表示者，視同放棄優先購買權", "基地出賣時，地上權人之優先購買權效力大於共有土地他共有人之優先購買權效力"], "ans": 3, "exps": ["❌ 土地法第104條第1項列舉有優先購買權者為：地上權人、典權人或承租人，未包含「長期占有人」，占有本身不產生優先購買權。", "❌ 若地上權人、典權人、承租人均主張優先購買時，其順序「依地籍登記先後定之」，而非以抽籤決定。", "❌ 土地法第104條第3項：優先購買權人，於接到出賣通知後「十日」內不表示者，其優先購買權視為放棄。是10日，不是30日。", "✓ 土地法第104條第4項：前項優先購買權，於房屋及基地同屬一人所有，而僅出賣基地時，有優先購買之效力，其優先購買權之效力優於土地法第三十四條之一之優先購買權。明文規定104條地上權人等的優先購買權優先於34條之1的他共有人優先購買權。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "106", "num": 6, "q": "依土地法第100條之規定，出租人因下列何項情形，得收回房屋？", "opts": ["承租人積欠租金額，除擔保金抵償外，達 1 個月", "承租人損壞出租人之房屋或附著財物，為相當之賠償時", "出租人收回自住或重新建築時", "承租人以房屋供合於法令之使用時"], "ans": 2, "exps": ["❌ 土地法第100條房屋租賃（非基地租賃）的收回事由中，積欠租金的標準是「達二個月以上」，1個月尚未達到法定門檻，不得收回。", "❌ 土地法第100條第1項第2款：承租人「毀損房屋或附著財物，不加修繕亦不為相當之賠償」時，出租人才得收回；已為相當賠償，反而不構成收回事由。", "✓ 土地法第100條第1項第3款：出租人收回自住或重新建築時，得收回房屋。這是明文規定的收回事由，出租人自住需求或欲重新建築，均為法定得收回之原因。", "❌ 承租人依法令正常使用房屋，不構成任何收回事由（出租人不得無故干涉承租人合法使用房屋）。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "106", "num": 30, "q": "依土地法第103條規定，租用建築房屋之基地，非因下列何種情形，出租人不得收回？", "opts": ["出租人收回自住或重新建築時", "承租人違反租賃契約時", "承租人積欠租金額，除擔保金抵償外，達 2 個月以上時", "承租人損壞出租人之房屋或附著財物，而不為相當之賠償時"], "ans": 1, "exps": ["❌ 此為土地法第103條基地租賃收回的合法事由（第2款），是「得收回」的情形，不是「不得收回」的情形。", "✓ 土地法第103條列舉出租人「得收回」基地的事由，包括：年限屆滿、收回自住或重新建築、承租人積欠租金達2年總額、以基地供違反法令使用、承租人轉租。「違反租賃契約」雖是民法上租約終止的一般事由，但並未列在土地法第103條的特定列舉事由中，故「僅違反租賃契約」在土地法下「不得收回」基地（土地法對基地承租人保護較強）。", "❌ 本選項說「達2個月以上」，但土地法第103條第3款規定基地租賃收回的積欠租金標準是「達二年之總額」（而非2個月），2個月是「房屋」租賃的標準（土地法第100條），兩者不同。本選項的2個月數字適用在基地租賃是錯誤的，但本題問的是「不得收回」，而積欠2個月確實低於2年的法定門檻，故「積欠2個月」的確是「不得收回」的情形，但這不是本題的答案選項（答案是B）。", "❌ 此為土地法第103條第1款規定（毀損不賠）的收回事由，是得收回的情形，非不得收回。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "107", "num": 8, "q": "為保護基地承租人，依土地法規定，租用基地建築房屋，應由出租人與承租人會同聲請該管直轄市或縣（市）地政機關為何種權利之登記？", "opts": ["租賃權", "地上權", "典權", "不動產役權"], "ans": 1, "exps": ["❌ 租賃權是債權，不是物權，不能辦理物權登記。土地法第102條設計的目的正是將租賃的使用關係轉化為有物權效力的地上權，保護承租人。", "✓ 土地法第102條：租用基地建築房屋，應由出租人與承租人於契約訂立後二個月內，聲請該管地政機關為「地上權之登記」。透過設定地上權登記，承租人取得物權，日後基地所有人更換時，地上權仍有對抗效力，保護租地建屋者的使用利益。", "❌ 典權是以出典為目的的他項權利（典權人支付典價、使用收益典物，期滿回贖），不是租地建屋的適當物權類型。", "❌ 不動產役權（地役權）是為需役地的便宜而在供役地上設定的限制，是相鄰不動產之間的關係，不是租地建屋的適當物權類型。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "107", "num": 9, "q": "依土地法規定，關於租用建築房屋之基地，下列何者，非屬出租人得收回之情形？", "opts": ["出租人收回自行建築時", "契約年限屆滿時", "承租人以基地供違反法令之使用時", "承租人轉租基地於他人時"], "ans": 0, "exps": ["✓ 土地法第103條列舉出租人得收回基地的事由，包括「自住或重新建築」（第2款），但「自行建築」（非重新建築）並非法定事由。本選項說的是「自行建築」（初次建築，非重新建築），這與法條的「重新建築」意義不同，故「自行建築」不是法定收回事由，為本題「非屬得收回之情形」的答案。", "❌ 契約年限屆滿是土地法第103條第1款的法定收回事由，屬得收回的情形。", "❌ 以基地供違反法令使用是土地法第103條第4款的法定收回事由，屬得收回的情形。", "❌ 承租人擅自轉租基地是土地法第103條第5款的法定收回事由，屬得收回的情形。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "108", "num": 4, "q": "下列有關土地徵收條例的優先購買權敘述，何者正確？", "opts": ["行使主體係被徵收之原土地所有權人或其繼承人", "行使原因須被徵收土地經依徵收計畫使用後，依法變更原使用目的而讓售", "行使條件須與讓售條件相同，且應公告三個月", "行使期間須於讓售決定後十日內表示優先購買"], "ans": 0, "exps": ["✓ 土地徵收條例第9條（收回權/優先購買權）的行使主體是被徵收之原土地所有權人或其繼承人，符合本選項描述。", "❌ 收回權的行使原因是「徵收後不依計畫使用」（如未依計畫使用已逾2年），而非「依計畫使用後又變更目的讓售」，後者不是原所有人行使收回權的事由。", "❌ 優先購買是依「同樣條件」，公告期間是「一個月」（非三個月），本選項公告期間數字錯誤。", "❌ 依土地徵收條例相關規定，優先購買權的行使期間是接到通知後「三十日內」表示（非十日），本選項數字錯誤。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "108", "num": 5, "q": "下列有關基地房屋之優先購買權敘述，何者正確？", "opts": ["基地出賣時，抵押權人有依同樣條件優先購買之權", "房屋出賣時，抵押權人有依同樣條件優先購買之權", "優先購買權人，於接到出賣通知後一個月內不表示者，其優先權視為放棄", "出賣人未通知優先購買權人而與第三人訂立買賣契約者，其契約不得對抗優先購買權人"], "ans": 3, "exps": ["❌ 抵押權人不在土地法第104條第1項的列舉範圍內，故抵押權人對基地出賣無優先購買權。", "❌ 房屋抵押權人同樣不在土地法第104條優先購買權的列舉範圍內，無優先購買權。", "❌ 土地法第104條第3項：優先購買權人於接到出賣通知後「十日」內不表示者，其優先購買權視為放棄。是10日不是一個月，此數字是高頻陷阱。", "✓ 土地法第104條第4項：出賣人未通知優先購買權人而與第三人訂立買賣契約，其契約不得對抗優先購買權人。本選項正確描述了未通知時的法律後果（相對無效，對優先購買權人不生效力）。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "109", "num": 14, "q": "甲有A屋一棟，出租給乙居住使用。依土地法第100條之規定，出租人因下列何項情形，得收回房屋？", "opts": ["承租人乙因疾病、意外產生有長期住院療養之需要時", "承租人乙積欠租金額，以擔保金抵償之後，尚有 1 個月租金未繳時", "承租人乙違反民法第 443 條第 1 項規定，將該屋轉租給他高中同學時", "承租人乙因為工作調動，無法繼續居住時"], "ans": 2, "exps": ["❌ 承租人個人的住院需求不是土地法第100條規定的房屋收回事由，出租人不得以此為由收回房屋。", "❌ 土地法第100條第1款：積欠租金額，「除以擔保金抵償外，達二個月以上」始得收回。僅積欠1個月（抵償後）尚未達2個月門檻，不得收回。", "✓ 民法第443條第1項：承租人非經出租人承諾，不得將租賃物轉租於他人。乙未經甲同意擅自轉租，依土地法第100條第1項第4款：承租人違反民法第443條第1項之規定轉租者，出租人得收回房屋。", "❌ 承租人個人工作調動不是出租人可以收回房屋的事由（此為承租人方面的終止租約事由，非出租人收回事由）。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "110", "num": 5, "q": "依土地法規定，房屋租用相關規定，下列何者錯誤？", "opts": ["城市地方房屋之租金，以不超過土地及其建築物申報總價年息百分之十為限", "約定房屋租金，超過土地法規定者，該管直轄市或縣（市）政府得依土地法所定標準強制減定之", "房屋租金擔保之金額，不得超過二個月房屋租金之總額", "以現金為租賃之擔保者，其現金視為租金之一部"], "ans": 3, "exps": ["❌ 本選項描述正確，符合土地法第97條第1項規定，非錯誤。", "❌ 本選項描述正確，符合土地法第97條第2項規定，非錯誤。", "❌ 本選項描述正確，符合土地法第99條第2項規定（不超過2個月），非錯誤。", "✓ 本選項為錯誤敘述：土地法第99條第2項規定，以現金為租賃之擔保者，其「現金利息」視為租金之一部，不是「現金」本身視為租金。本選項漏掉「利息」二字，說「現金視為租金之一部」是錯誤的。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "111", "num": 16, "q": "依土地法規定，租用建築房屋之基地，發生下列何種情形時，出租人不得收回？", "opts": ["承租人以基地供違反法令之使用時", "承租人轉租基地於他人時", "承租人積欠租金額，除以擔保現金抵償外，達二個月以上時", "承租人違反租賃契約時"], "ans": 2, "exps": ["❌ 承租人以基地供違反法令之使用，是土地法第103條第4款的法定收回事由，出租人得收回，不是「不得收回」的情形。", "❌ 承租人擅自轉租基地，是土地法第103條第5款的法定收回事由，出租人得收回。", "✓ 本選項說的是「二個月以上」，但土地法第103條第3款基地租賃的積欠租金收回門檻是「達二年之總額」（不是二個月）。「二個月」是房屋租賃（土地法第100條）的門檻，不是基地租賃（第103條）的門檻。積欠二個月未達二年之總額，故出租人「不得以此收回基地」，本選項為正確答案。", "❌ 「違反租賃契約」一般而言是民法上終止租約的事由，但土地法第103條對基地租賃採列舉主義，一般「違反租賃契約」並不在列舉範圍內（只有特定情形如積欠2年租金、違法使用等才得收回），故本選項亦屬「不得收回」的情形——但官方答案是C，C最明確地對應了數字陷阱（2個月vs2年），為最佳答案。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "113", "num": 10, "q": "依土地法規定，逾期未辦繼承之土地於標售時，有關優先購買權人之順序依序為何？", "opts": ["繼承人、合法使用人、其他共有人", "其他共有人、合法使用人、繼承人", "合法使用人、繼承人、其他共有人", "繼承人、其他共有人、合法使用人"], "ans": 0, "exps": ["✓ 土地法第73條之1第3項但書：標售前應公告一個月，繼承人、合法使用人、其他共有人依序有優先購買權。順序固定：繼承人最優先→合法使用人次之→其他共有人最後，此順序為高頻考點，113年首次以「順序題」形式考出。", "❌ 此順序完全顛倒，為干擾選項。", "❌ 此順序將合法使用人排在繼承人之前，與法條規定相反。", "❌ 此順序將「其他共有人」排在「合法使用人」之前，與法條規定相反。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "113", "num": 15, "q": "依土地法規定，下列有關建築基地出賣時行使優先購買權之敘述，何者錯誤？", "opts": ["地上權人、典權人或承租人有依同樣條件優先購買之權", "優先購買權人，於接到出賣通知後十日內不表示者，其優先權視為放棄", "出賣人未通知優先購買權人而與第三人訂立買賣契約者，其契約不得對抗優先購買權人", "基地承租人與基地共有人行使優先購買權發生競合時，其順序以登記之先後定之"], "ans": 3, "exps": ["❌ 本選項描述正確，符合土地法第104條第1項，非錯誤。", "❌ 本選項描述正確，符合土地法第104條第3項「十日」規定，非錯誤。", "❌ 本選項描述正確，符合土地法第104條第4項，非錯誤。", "✓ 本選項為錯誤敘述：土地法第104條第5項規定，各優先購買權人（地上權人、典權人、承租人）同時主張時，其順序「以地籍登記先後定之」，此部分正確；但本選項說的是「基地承租人（104條）與基地共有人（34條之1）的競合」，依土地法第104條第5項後段，「前項優先購買權，優先於土地法第三十四條之一之優先購買權」，即104條優先購買權優先於34條之1，而非「以登記先後定之」。故本選項的判斷標準（以登記先後定競合順序）錯誤。"]}, {"ch": "A4", "chName": "A4 基地耕地優先購買權", "year": "114", "num": 13, "q": "依土地法規定，有關優先購買權之敘述，下列何者正確？", "opts": ["基地出賣或房屋出賣時，優先購買權人，於接到出賣通知後 15 日內不表示者，其優先購買權視 為放棄", "耕地租用出租人出賣或出典耕地時，優先購買權人，於接到出賣通知後 15 日內不表示者，其優 先購買權視為放棄", "共有土地共有人出賣其應有部分時，優先購買權人，於接到出賣通知後 15 日內不表示者，其優 先購買權視為放棄", "區分所有建物之專有部分連同其基地應有部分之所有權一併移轉與同一人者，他共有人有優先 購買權之適用"], "ans": 2, "exps": ["❌ 土地法第104條第3項規定的通知後不表示期限是「十日」，不是15日。15日是共有土地調處不服後的訴請期限（第34條之2），兩者容易混淆。", "❌ 依耕地三七五減租條例第15條，接到通知後「15日」（非10日）內不表示視為放棄。此選項的數字（15日）看似有爭議——耕地三七五減租條例確實是15日，但選項A也說15日（基地出賣），而基地出賣的法定期限是10日。以官方答案C為最終標準。", "✓ 土地法第34條之1第4項：他共有人於接到出賣通知後「十五日」內不表示者，其優先購買權視為放棄。15日是共有人優先購買權的通知期限（區別於基地租賃的10日），本選項正確。", "❌ 土地法第34條之1第4項但書明文排除：區分所有建物之專有部分連同其基地應有部分之所有權一併移轉與同一人所有者，他共有人無優先購買權（因此種移轉是整套不動產的一體移轉，強制優先購買反而破壞區分所有關係）。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "100", "num": 38, "q": "土地法所定義公有土地與國有土地兩者意涵範圍之關係為何？", "opts": ["公有土地小於國有土地", "公有土地等於國有土地", "公有土地大於國有土地", "公有土地與國有土地無關係"], "ans": 2, "exps": ["❌ 國有只是公有土地的一種（國家所有），公有土地還包含地方政府所有，範圍更大，故公有≥國有，A選項的大小關係顛倒。", "❌ 若公有等於國有，則地方政府（直轄市、縣市、鄉鎮市）所有的土地就不算公有，這顯然不正確。", "✓ 土地法第4條：本法所稱公有土地，為國有、直轄市有、縣（市）有及鄉（鎮、市）有之土地。公有土地包含所有政府層級的土地（國有+地方政府所有），範圍大於僅限中央政府所有的國有土地。", "❌ 國有土地是公有土地的一部分（子集合），兩者有包含關係，非無關係。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "102", "num": 5, "q": "直轄市或縣（市）政府對於其所管公有土地之處理，下列何者依土地法規定免經民意機關同意之程序？", "opts": ["處分", "設定負擔", "撥用", "超過十年期間之租賃"], "ans": 2, "exps": ["❌ 公有土地的「處分」屬於重大行為，依土地法第25條需經民意機關同意及行政院核准，非免除同意程序。", "❌ 公有土地「設定負擔」（如設定抵押、地上權等）同樣屬重大行為，依土地法第25條需民意機關同意，非免除。", "✓ 土地法第25條規定，直轄市或縣市政府對其管公有土地的處分、設定負擔或超過10年的租賃，非經民意機關同意及行政院核准，不得為之；但「撥用」是政府機關內部移撥使用，不屬於本條的限制範圍，無須民意機關同意，也無須行政院核准（另依各機關撥用程序辦理）。", "❌ 超過10年的租賃屬土地法第25條的限制事項，需民意機關同意，非免除。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "103", "num": 32, "q": "下列有關直轄市或縣（市）政府對於其所管公有土地之敘述何者正確？", "opts": ["非經該管區內行政機關同意，不得處分或設定負擔或為超過十年期間之租賃", "非經該管區內行政機關同意，不得處分或設定負擔或為超過二十年期間之租賃", "非經該管區內民意機關同意，並經行政院核准，不得處分或設定負擔或為超過十年期間之租賃", "非經該管區內民意機關同意，並經行政院核准，不得處分或設定負擔或為超過二十年期間之租賃"], "ans": 2, "exps": ["❌ 同意機關是「民意機關」（議會），不是行政機關（政府），且還需行政院核准，本選項機關類型錯誤。", "❌ 機關類型錯誤（應為民意機關），且超過的年限是「十年」，不是二十年。", "✓ 土地法第25條：直轄市或縣（市）政府對於其所管公有土地，非經該管區內民意機關同意，並經行政院核准，不得處分或設定負擔或為超過十年期間之租賃。三個要素：①民意機關同意②行政院核准③超過10年租賃為限制事項，均正確。", "❌ 民意機關同意及行政院核准的部分正確，但年限是「十年」，不是二十年，一字之差為陷阱。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "103", "num": 35, "q": "登記於臺灣糖業股份有限公司名下的土地，依其土地登記之權屬係為：", "opts": ["公有土地", "國有土地", "直轄市有土地", "私有土地"], "ans": 3, "exps": ["❌ 公有土地是政府（國家、地方政府）所有的土地。台灣糖業股份有限公司雖是國營事業，但其法律性質是「公司」，土地登記名義人是公司法人，不是政府機關，故非公有土地。", "❌ 同上，台糖是公司（法人），即使政府持有其股份，土地登記名義人是「台灣糖業股份有限公司」，不是「國有」，故非國有土地。", "❌ 台糖土地登記名義人不是直轄市政府，故非直轄市有土地。", "✓ 台灣糖業股份有限公司是依公司法設立的法人（即使100%政府股份），其所有的土地在法律上屬於公司法人財產，而非政府財產，故屬「私有土地」（私法人所有的土地）。這是一個常見的陷阱題：國營事業≠政府機關，國營事業的土地≠公有土地。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "105", "num": 15, "q": "依土地法規定，直轄市或縣（市）政府對於其所經管公有土地，須經民意機關同意，並經行政院核准後，方得進行一定行為。下列行為何者屬之？", "opts": ["訂定 5 年租約", "無償撥用", "設定負擔", "臨時使用"], "ans": 2, "exps": ["❌ 5年租約未超過10年，不需民意機關同意及行政院核准，無須上述程序。", "❌ 撥用是政府機關內部移撥，不在土地法第25條的限制範圍內（撥用不需要民意機關同意）。", "✓ 土地法第25條：直轄市或縣（市）政府對其所管公有土地，「設定負擔」須經民意機關同意並行政院核准。設定負擔包括設定地上權、抵押等，影響公有土地上的負擔，屬重大行為，故需上述程序。", "❌ 臨時使用通常是短期借用，不屬土地法第25條的限制事項，無須民意機關同意。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "106", "num": 9, "q": "依土地法規定，公有土地之撥用程序為何？", "opts": ["各級政府機關需用公有土地時，應商同該管直轄市或縣（市）民意機關層請行政院核准撥用", "各級政府機關需用公有土地時，應商同該管直轄市或縣（市）政府層請行政院核准撥用", "各級政府機關需用公有土地時，應商同該管直轄市或縣（市）民意機關層請內政部核准撥用", "各級政府機關需用公有土地時，應商同該管直轄市或縣（市）政府層請內政部核准撥用"], "ans": 1, "exps": ["❌ 撥用是機關間協調事項，應商同「政府（行政機關）」，不是「民意機關」，且撥用核准機關是行政院，但協商對象錯誤。", "✓ 土地法第26條：各級政府機關需用公有土地時，應商同「該管直轄市或縣（市）政府」層請行政院核准後撥用之。協商對象是地方政府（行政機關），核准機關是行政院，符合法條規定。", "❌ 協商對象錯誤（應是政府非民意機關），核准機關也錯誤（應是行政院不是內政部）。", "❌ 協商對象正確（政府），但核准機關錯誤（應是行政院，不是內政部）。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "108", "num": 18, "q": "下列土地何者屬於土地法第四條所稱的公有土地？", "opts": ["所有權人登記為台灣糖業股份有限公司", "所有權人登記為臺灣石門農田水利會", "所有權人登記為國家中山科學研究院", "所有權人登記為埔里鎮"], "ans": 3, "exps": ["❌ 台糖是法人（公司），其土地屬私有土地，非公有土地（理由同103-35）。", "❌ 農田水利會在2020年改制前是公法人，改制後成為行政機關，但本題考的是當時認定，以官方答案D為準，農田水利會的土地性質有爭議，以官方答案為準。", "❌ 中山科學研究院是國防部下屬機關，其土地依官方見解為國有土地（屬中央政府所有），但本題官方答案為D，故C非公有土地的「最典型」例子（在此競爭選項下，D是更明確的公有土地）。", "✓ 埔里鎮（鄉鎮市）是地方自治機關，其所有的土地依土地法第4條屬於「鄉（鎮、市）有土地」，進而屬於「公有土地」的範疇。鄉鎮市政府所有的土地是最典型的公有土地（非國有、非私有）。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "109", "num": 23, "q": "依土地法第53條規定，因地籍整理而發現之公有土地，下列敘述何者正確？", "opts": ["視為無主土地", "應辦理囑託登記", "地政機關逕為登記", "登記時所有權人欄註明為縣（市）有"], "ans": 2, "exps": ["❌ 逾限未補繳資料的土地才視為無主土地（土地法第57條），因地籍整理發現的公有土地不是無主土地，而是已知屬公有的土地。", "❌ 囑託登記是由法院或其他政府機關「請求」地政機關辦理的登記，通常用於法院裁定、強制執行等情形。因地籍整理發現之公有土地，是由地政機關主動處理，用「逕為登記」而非囑託登記。", "✓ 土地法第53條：無保管機關之公有土地及因地籍整理而發現之公有土地，由該管直轄市或縣（市）地政機關逕為登記，其所有權人欄，依其土地之性質，分別登記為國有、直轄市有、縣（市）有或鄉（鎮、市）有。「逕為登記」是地政機關主動、不需他人申請即可辦理的登記方式。", "❌ 所有權人欄的記載方式，依土地性質（屬國有、直轄市有、縣市有或鄉鎮市有）分別記載，不一定是縣（市）有，且本選項未描述「逕為登記」的重要特徵，選項不完整。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "110", "num": 3, "q": "依土地法之規定，無保管或使用機關之公有土地及因地籍整理而發現之公有土地，應如何處理？", "opts": ["由該管直轄市或縣（市）地政機關囑託登記，其所有權人欄註明為國有", "由該管直轄市或縣（市）地政機關逕為登記，其所有權人欄註明為國有", "由該管直轄市或縣（市）地政機關囑託登記，其所有權人欄註明為直轄市或縣（市）有", "由該管直轄市或縣（市）地政機關逕為登記，其所有權人欄註明為直轄市或縣（市）有"], "ans": 1, "exps": ["❌ 本選項「囑託登記」錯誤，應是「逕為登記」。且所有權人欄也不一定是「國有」，視土地性質而定。", "✓ 土地法第53條：無保管或使用機關之公有土地及因地籍整理而發現之公有土地，由地政機關「逕為登記」，所有權人欄依土地性質分別登記為國有等。本題的「無保管機關之公有土地」依法屬於國有土地，故所有權人欄登記為「國有」正確。本選項正確描述了逕為登記及國有記載方式。", "❌ 「囑託登記」錯誤（應是逕為登記），所有權人欄也應視土地性質定，不必然是直轄市縣市有。", "❌ 逕為登記正確，但所有權人欄「必然是直轄市或縣市有」的說法不正確，應視土地性質（屬國有者登記國有，屬地方有者登記地方）分別記載。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "113", "num": 12, "q": "依土地法規定，關於地權及地權限制，下列何者正確？", "opts": ["台灣糖業股份有限公司所有土地為公有土地", "私有土地，因天然變遷成為湖澤或可通運之水道時，其所有權絕對消滅", "湖澤及可通運之水道及岸地，如因水流變遷而自然增加時，其接連地之使用權人，有優先依法 取得其所有權或使用受益之權", "私有土地所有權之移轉、設定負擔或租賃，妨害基本國策者，中央地政機關得報請行政院制止之"], "ans": 3, "exps": ["❌ 台糖是法人（公司），其土地屬私有土地，理由同103-35，為常考的觀念誤區。", "❌ 土地法第12條第1項規定，所有權「視為消滅」（非絕對消滅）。視為消滅是擬制性的消滅，若日後水道恢復，原所有人得申請回復所有權（土地法第12條第2項），故非永久絕對消滅。", "❌ 因水流變遷增加的新生地，接連地所有人有「優先依法取得」的機會，但非自動取得（需申請），且法條說的是「所有權人」而非「使用權人」，使用權人（如佃農）未必有此優先取得權。", "✓ 土地法第17條第3項原文即如此規定，中央地政機關（內政部）報請行政院制止，為正確描述。"]}, {"ch": "A5", "chName": "A5 公有土地", "year": "114", "num": 8, "q": "下列有關公有土地撥用之敘述，何者錯誤？", "opts": ["無論國有或地方有之土地均有撥用的可能", "公有土地撥用需經財政部國有財產署核准", "各級政府機關有使用公有土地之需求均得申請撥用公有土地", "公有土地之撥用以無償為原則"], "ans": 1, "exps": ["❌ 本選項描述正確，各層級政府機關有需要時均可申請撥用公有土地（國有或地方有），非錯誤。", "✓ 本選項為錯誤敘述：土地法第26條規定，公有土地撥用須層請「行政院」核准，而非「財政部國有財產署」（財政部國有財產署是管理國有財產的機關，但撥用核准權在行政院）。本選項將核准機關說錯。", "❌ 本選項描述正確，各級政府機關均得申請撥用（不限特定層級），非錯誤。", "❌ 本選項描述正確，公有土地撥用原則上無償移撥政府機關使用，非錯誤。"]}];
const CHS=[...new Set(CARDS.map(c=>c.chName))];
let sel=Object.fromEntries(CHS.map(c=>[c,1]));
let ans={};
const g=id=>document.getElementById(id);
function renderPills(){
  const p=g('pills');p.innerHTML='';
  CHS.forEach(ch=>{
    const b=document.createElement('button');
    b.className='pill'+(sel[ch]?' on':'');
    b.textContent=ch;
    b.onclick=()=>{sel[ch]=sel[ch]?0:1;renderPills();renderList();};
    p.appendChild(b);
  });
}
function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}
function selNone(){Object.keys(sel).forEach(k=>sel[k]=0);renderPills();renderList();}
function resetAll(){if(!confirm('確定要清除所有作答記錄？'))return;ans={};renderList();updateProg();}
function renderList(){
  const list=g('list');list.innerHTML='';
  const vis=CARDS.filter(c=>sel[c.chName]);
  let lastCh='';
  vis.forEach(card=>{
    const idx=CARDS.indexOf(card);
    if(card.chName!==lastCh){
      const h=document.createElement('div');h.className='ch-header';h.textContent=card.chName;list.appendChild(h);lastCh=card.chName;
    }
    list.appendChild(makeCard(card,idx));
  });
  updateProg();
}
function makeCard(card,idx){
  const a=ans[idx];
  const div=document.createElement('div');
  div.className='qcard'+(a?(a.ok?' answered-ok':' answered-ng'):'');
  div.id='c'+idx;
  div.innerHTML=`<div class="qmeta"><span>【${card.year}年第${card.num}題】</span><span class="qtag">${card.chName}</span></div><div class="qtext">${card.q}</div>`;
  const opts=document.createElement('div');opts.className='opts';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="ltr">${l}</span><span>${card.opts[i]}</span>`;
    if(a){b.disabled=true;if(i===card.ans)b.classList.add('show-correct');if(i===a.chosen&&!a.ok)b.classList.add('ng');}
    else b.onclick=(i=>()=>pick(idx,i))(i);
    opts.appendChild(b);
  });
  div.appendChild(opts);
  const eb=document.createElement('div');eb.className='expbox'+(a?' show':'');eb.id='e'+idx;
  eb.innerHTML=`<div class="exph">&#128218; 逐選項解析</div><div class="expb" id="eb${idx}">${a?buildExp(card,a.chosen,a.ok):''}</div>`;
  div.appendChild(eb);
  return div;
}
function buildExp(card,chosen,ok){
  let h=`<div style="margin-bottom:7px;"><span class="verdict ${ok?'ok':'ng'}">${ok?'答對了':'答錯了'}</span></div>`;
  ['A','B','C','D'].forEach((l,i)=>{
    const ec=i===card.ans?'ok':(i===chosen&&!ok?'ng':'no');
    h+=`<div class="ei"><span class="el ${ec}">${l}</span><span>${card.exps[i]||''}</span></div>`;
  });
  return h;
}
function pick(idx,chosen){
  const card=CARDS[idx];const ok=(chosen===card.ans);
  ans[idx]={chosen,ok};
  const div=g('c'+idx);
  div.className='qcard'+(ok?' answered-ok':' answered-ng');
  div.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;b.onclick=null;
    if(i===card.ans)b.classList.add('show-correct');
    if(i===chosen&&!ok)b.classList.add('ng');
  });
  g('eb'+idx).innerHTML=buildExp(card,chosen,ok);
  g('e'+idx).classList.add('show');
  updateProg();
}
function updateProg(){
  const vis=CARDS.filter(c=>sel[c.chName]);
  const tot=vis.length,done=vis.filter(c=>ans[CARDS.indexOf(c)]!==undefined).length;
  const cor=vis.filter(c=>{const a=ans[CARDS.indexOf(c)];return a&&a.ok;}).length;
  g('pd').textContent=done;g('pt').textContent=tot;
  g('pr').textContent=done?Math.round(cor/done*100)+'%':'-';
  g('pf').style.width=tot?done/tot*100+'%':'0%';
}
renderPills();renderList();
</script>
