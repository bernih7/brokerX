<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不動產估價概要｜整批刷題練習・B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F3E9; --paper-deep:#EFE6D5; --ink:#2A2722; --ink-soft:#7A7165;
  --rule:#DED1B9; --stamp:#A8402B; --gold:#BC8A2E; --green:#5C7A4A; --blue:#3E6B8C;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:
    radial-gradient(circle at 10% 6%, rgba(188,138,46,0.06), transparent 40%),
    radial-gradient(circle at 92% 96%, rgba(168,64,43,0.05), transparent 45%),
    var(--paper);
  color:var(--ink); min-height:100vh; padding:24px 14px 60px;
}
.wrap{max-width:720px;margin:0 auto;}
header{text-align:center;margin-bottom:16px;}
.case-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Noto Serif TC',serif;font-weight:700;font-size:12px;
  letter-spacing:.12em;color:var(--stamp);border:1px solid var(--stamp);
  border-radius:999px;padding:3px 12px;margin-bottom:10px;
}
h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:21px;letter-spacing:.04em;}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin-top:4px;font-family:'Noto Sans TC',sans-serif;}
.version-tag{font-size:11px;color:var(--ink-soft);margin-top:8px;letter-spacing:.05em;font-family:'Noto Serif TC',serif;}

.toolbar{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin:16px 0;background:#fff;border:1px solid var(--rule);border-radius:12px;padding:12px;
}
.chip{
  font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;
  border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);
  cursor:pointer;user-select:none;transition:all .15s ease;white-space:nowrap;
}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

.statbar{
  display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin:10px 0 18px;
  font-family:'Noto Serif TC',serif;font-weight:700;font-size:13px;color:var(--ink-soft);
}
.statbar b{color:var(--ink);font-size:16px;}
.statbar .ok{color:var(--green);}
.statbar .ng{color:var(--stamp);}

.controls-top{display:flex;justify-content:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.btn{
  font-family:'Noto Serif TC',serif;font-weight:700;font-size:13px;
  border:1.5px solid var(--ink);background:#fff;color:var(--ink);
  border-radius:9px;padding:9px 16px;cursor:pointer;transition:all .15s ease;
}
.btn:hover{background:var(--ink);color:#fff;}
.btn.primary{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.btn.primary:hover{background:#8c3322;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green);color:#fff;}

.qcard{
  background:#fff;border:1.5px solid var(--rule);border-radius:12px;
  padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(42,39,34,0.04);
}
.qcard.answered.correct{border-left:5px solid var(--green);}
.qcard.answered.wrong{border-left:5px solid var(--stamp);}
.qhead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.qbadge{font-size:11px;font-weight:700;color:#fff;background:var(--blue);padding:3px 10px;border-radius:999px;font-family:'Noto Serif TC',serif;}
.qyear{font-size:11px;font-weight:700;color:var(--ink-soft);border:1px solid var(--rule);border-radius:999px;padding:2px 9px;font-family:'Noto Serif TC',serif;}
.qtext{font-size:14px;line-height:1.8;margin-bottom:12px;font-weight:500;}
.opt-list{display:flex;flex-direction:column;gap:7px;}
.opt{
  display:flex;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--rule);
  background:#fff;font-size:13px;line-height:1.6;cursor:pointer;transition:all .15s ease;
}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--stamp);background:#FBEAE6;}
.opt.correct-answer{border-color:var(--green);background:#EFF4EC;}
.opt.wrong-selected{border-color:var(--stamp);background:#FBEAE6;}
.opt .letter{
  font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;
  width:20px;height:20px;border-radius:50%;border:1.5px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:11px;
}
.note-box{margin-top:10px;padding:8px 10px;border-radius:8px;font-size:12px;line-height:1.7;border:1.5px dashed var(--gold);background:#FBF6E9;color:var(--ink-soft);}
.note-box b{color:var(--gold);}
.explain-box{margin-top:12px;padding:12px;border-radius:10px;background:var(--paper-deep);border:1px solid var(--rule);}
.explain-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:12px;color:var(--blue);margin-bottom:8px;letter-spacing:.05em;}
.explain-item{display:flex;gap:8px;padding:7px 8px;border-radius:7px;font-size:12.5px;line-height:1.7;background:#fff;border:1.5px solid var(--rule);margin-bottom:6px;}
.explain-item:last-child{margin-bottom:0;}
.explain-item.right{border-color:var(--green);background:#EFF4EC;}
.explain-letter{font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;color:var(--stamp);}
.explain-item.right .explain-letter{color:var(--green);}
.error-tag-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.error-tag{
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
  border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);cursor:pointer;
}
.error-tag.active-a{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.error-tag.active-b{background:var(--gold);border-color:var(--gold);color:#fff;}
.error-tag.active-c{background:var(--blue);border-color:var(--blue);color:#fff;}

footer{margin-top:30px;text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.1em;line-height:2;}
footer .reset{text-decoration:underline;cursor:pointer;color:var(--ink-soft);background:none;border:none;font-size:11px;letter-spacing:.1em;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="case-tag">不動產估價概要・整批刷題練習</div>
    <h1>整批刷題練習・B
      <span class="sub">B比較法(B1+B2)含逐選項解析・共 65 題</span>
    </h1>
    <div class="version-tag">📅 最新編輯時間：2026-06-30　｜　版本 v2.0（含逐選項解析）</div>
  </header>

  <div class="toolbar" id="chips"></div>

  <div class="statbar">
    <span>已答 <b id="answeredCount">0</b>/65</span>
    <span class="ok">對 <b id="okCount">0</b></span>
    <span class="ng">錯 <b id="ngCount">0</b></span>
    <span>正確率 <b id="accRate">—</b></span>

  <div class="controls-top">
    <button class="btn primary" id="filterAll">顯示全部</button>
    <button class="btn" id="filterUnanswered">只看未作答</button>
    <button class="btn" id="filterWrong">只看答錯</button>
    <button class="btn green" id="resetAllBtn">清除作答紀錄</button>
  </div>

  <div id="qlist"></div>

  <footer>不動產經紀人考試・不動產估價概要｜點選選項即時判對錯，可依章節篩選與標記錯題類型<br>
    📅 2026-06-30　版本 v2.0（含逐選項解析）<br>
    <button class="reset" id="resetMastery">清除所有作答與標記紀錄</button>
  </footer>
</div>

<script>
const ITEMS = [
{id:"VB1_99_1", cat:"B1", year:"99年第1題", q:"勘估標的選取比較標的價格經情況調整、價格日期調整，並比較分析區域因素及個別因素之差異後計算勘估標的之價格，稱為：", opts:["比較價格", "成本價格", "收益價格", "試算價格"], explains:["比較價格是試算價格經重新檢討確認適當合理後的最終結果，不是「經情況、價格日期、區域、個別因素調整後」這個調整過程本身得出的價格。", "成本價格是成本法的產物（重建/重置成本扣除折舊），與比較法的調整流程無關。", "收益價格是收益法的產物（淨收益除以資本化率），與比較法的調整流程無關。", "技術規則第21條第2項明定：試算價格＝比較標的價格經情況、價格日期、區域因素及個別因素四項調整後所得之價格。題目描述的正是這個定義。"], correct:3, note:null},
{id:"VB1_99_3", cat:"B1", year:"99年第3題", q:"運用比較法時，區域因素、個別因素調整或區域因素及個別因素內之任一單獨項目之價格調整率應該以下列何者為原則來判定該比較標的與勘估標的差異過大應排除該比較標的之適用呢？", opts:["任一單獨項目調整率大於30%", "任一單獨項目調整率大於15%", "總調整率大於15%", "總調整率小於30%"], explains:["30%是「總調整率」（情況+價格日期+區域+個別因素總和）的上限，不是任一單獨項目的判定標準。", "技術規則第25條：區域因素或個別因素內任一單獨項目之價格調整率大於15%，即判定差異過大應排除該比較標的。", "15%是單項調整率的上限，不是總調整率的判定標準，本選項把兩者數字對調。", "「總調整率大於30%」才是排除條件，「小於30%」方向相反，且本題問的是單項調整率判定基準，與此選項描述對象不符。"], correct:1, note:null},
{id:"VB1_99_11", cat:"B1", year:"99年第11題", q:"根據不動產估價技術規則之規定，採取比較法進行區域因素及個別因素差異分析調整時，可以採那種方法為其調整方法呢？", opts:["百分率法", "定率法", "定額法", "差額法"], explains:["技術規則第24條：區域因素及個別因素之差異所為之調整，以百分率法為原則，亦得以差額法調整。", "定率法是成本法折舊計算方法（如初期加速折舊路徑），不是比較法的因素調整方法。", "定額法同樣是折舊計算方法，與比較法的區域/個別因素調整無關。", "差額法是調整方法之一，但屬於例外或補充方式，「原則」仍是百分率法，本題問的是原則方法。"], correct:0, note:null},
{id:"VB1_99_18", cat:"B1", year:"99年第18題", q:"運用比較法進行估價時，將影響勘估標的及比較標的價格差異之區域因素及個別因素逐項比較，並依優劣程度或高低等級所評定之差額進行價格調整之方法，係指：", opts:["百分率法", "差額法", "區域分析法", "個別因素法"], explains:["百分率法是依優劣程度評定「差異百分率」進行調整，本題描述的是評定「差額」，方法名稱不符。", "技術規則第19條第6款：差額法＝依優劣程度評定之差額進行調整，與題目描述「依優劣程度評定差額進行價格調整」完全相符。", "「區域分析法」並非技術規則所定義的調整方法名稱，屬於混淆選項。", "「個別因素法」同樣不是技術規則定義的調整方法名稱，調整方法只有百分率法與差額法兩種。"], correct:1, note:null},
{id:"VB1_99_39", cat:"B1", year:"99年第39題", q:"利用比較法進行估價時，若比較標的之個別因素較勘估標的差5%，則個別因素調整率為多少？", opts:["100/95", "95/100", "100/105", "105/100"], explains:["個別因素調整公式：勘估標的100 ÷ 比較標的(100-5) ＝ 100/95。比較標的較勘估標的差5%，代表勘估標的條件較佳，調整率應為100/95（將比較標的價格向上修正至勘估標的水準）。", "95/100小於1，代表向下修正，但比較標的條件較差，調整方向應該是向上修正比較標的價格，本選項方向錯誤。", "100/105的分母設定錯誤，未正確反映「比較標的較差5%」這個條件差異關係。", "105/100同樣方向與分母分子設定有誤，未對應題目所述比較標的條件較差的情境。"], correct:0, note:null},
{id:"VB1_100_15", cat:"B1", year:"100年第15題", q:"林君將其所有不動產賣給女兒，成交價格為2,000萬元，經判斷此一價格較正常價格便宜2成。請問在其他條件不變下，該不動產之正常價格為多少？", opts:["1,600萬元", "1,666萬元", "2,400萬元", "2,500萬元"], explains:["1,600萬元是用「2,000×0.8」計算，但便宜2成的基準應該是正常價格而非成交價格，此為反向誤算。", "1,666萬元的計算基準錯誤，未正確處理「便宜2成」的還原方向。", "2,400萬元同樣未正確還原，計算基礎有誤。", "成交價格2,000萬元為正常價格打8折（便宜2成）後的結果，故正常價格＝2,000÷(1-20%)＝2,000÷0.8＝2,500萬元。"], correct:3, note:null},
{id:"VB1_100_19", cat:"B1", year:"100年第19題", q:"下列有關比較法之敘述，何者正確？", opts:["經檢討後試算價格之間差距達15%以下者，應排除該試算價格之適用", "進行個別因素調整時，任一單獨項目之價格調整率大於20%時，不應排除該比較標的之適用", "進行區域因素調整時，任一單獨項目之價格調整率大於30%時，不應排除該比較標的之適用", "經檢討後試算價格之間差距達20%以上者，應排除該試算價格之適用"], explains:["技術規則第26條規定差距達「20%以上」應排除，不是「15%以下」，方向與數字皆錯誤。", "技術規則第25條規定任一單獨項目調整率大於15%即應排除，不是「大於20%時不應排除」，本選項邏輯相反。", "區域因素調整率大於15%即應排除（非30%），本選項數字錯誤。", "技術規則第26條：檢討後試算價格之間差距達20%以上者，應排除該試算價格之適用，與本選項描述相符。"], correct:3, note:null},
{id:"VB1_100_21", cat:"B1", year:"100年第21題", q:"下列那些價格不宜直接視為正常交易價格，於無法掌握調整時，應不予採用。①親友間之買賣　②法院拍賣　③賣方支付土地增值稅之交易　④期待變更之價格", opts:["①②③", "①②④", "②③④", "①②③④"], explains:["技術規則第23條列舉之應先調整或不予採用情況包含親友間買賣、法院拍賣、賣方支付土地增值稅之交易（隱含降價誘因）等3項，「期待變更之價格」屬於另一類「受預期因素影響」，性質上雖也需調整但本題答案組合鎖定①②③。", "④期待變更之價格雖然也是技術規則第23條列舉的應調整情況之一，但本題標準答案組合為①②③，不含④。", "本選項未包含①親友間買賣，但①親友間買賣明確屬於第23條應調整情況之一，遺漏不正確。", "全選④項雖然每一項單獨來看皆屬於第23條列舉範圍，但依官方答案僅①②③屬本題情境設定的核心組合。"], correct:0, note:"依官方答案表標示A，惟「法院拍賣」價格實務上多屬「應作適當調整」而非當然排除，作答時請以法條原文及官方答案為準。"},
{id:"VB1_100_22", cat:"B1", year:"100年第22題", q:"勘估標的與比較標的若因樓層之不同，而有100萬元的價格調整。此調整屬於下列何種方法之運用？", opts:["差額法", "定額法", "定率法", "百分率法"], explains:["技術規則第19條第6款：差額法係依優劣程度評定「差額」進行調整。題目明確以「100萬元的價格調整」此一具體金額（差額）描述調整，符合差額法定義。", "定額法是成本法折舊計算方式（年折舊額固定），非比較法的因素調整方法。", "定率法同樣是成本法折舊計算方式，非比較法調整方法。", "百分率法是以「百分比」表示調整幅度，而題目給的是具體金額（100萬元），屬於差額法而非百分率法。"], correct:0, note:null},
{id:"VB1_101_13", cat:"B1", year:"101年第13題", q:"運用比較法選擇實例的條件，下列何者最不適宜？", opts:["必須與勘估標的使用性質相符", "必須為正常價格", "必須與勘估標的地點相近", "必須為一個月以內之實例"], explains:["與勘估標的使用性質相符是技術規則第12條明定之選取比較實例原則之一，屬必要條件。", "必須為正常價格（或可調整為正常價格）也是第12條明定原則之一，屬必要條件。", "位於同一供需圈之近鄰或類似地區同樣是第12條明定原則，屬必要條件。", "「必須為一個月以內之實例」並非技術規則第12條所列的選取原則，第12條只要求「價格形成日期與勘估標的之價格日期接近」，沒有設定「一個月內」這種具體期限，此選項是常見混淆陷阱，故為最不適宜（即正解）。"], correct:3, note:null},
{id:"VB1_101_15", cat:"B1", year:"101年第15題", q:"預售屋的開價如高於市價一成，依此價格進行勘估標的價格調整時，此調整屬於下列何種方法之運用？", opts:["差額法", "定額法", "定率法", "百分率法"], explains:["差額法是依優劣程度評定差額（具體金額）進行調整，題目給的開價「高於市價一成」是百分比表示，不是金額差額。", "定額法是成本法折舊概念，非比較法調整方法。", "定率法同樣是成本法折舊概念，非比較法調整方法。", "「高於市價一成」是以百分比（10%）表示優劣程度的調整，依技術規則第24條，此類調整以百分率法為原則，符合定義。"], correct:3, note:null},
{id:"VB1_101_22", cat:"B1", year:"101年第22題", q:"某甲以1,200萬元將其房屋移轉給弟弟，經判斷正常價格比這價格低二成；於一般不動產估價中，運用此案例進行情況調整後之價格為多少？", opts:["1,440萬元", "1,400萬元", "1,000萬元", "960萬元"], explains:["1,440萬元的計算方向錯誤，本題正常價格應低於成交價格，不應向上調整。", "1,400萬元同樣計算基礎有誤，方向錯誤。", "1,000萬元的計算未正確對應「正常價格比成交價低二成」這個比例關係。", "題目明確指出「正常價格比這價格（1,200萬元）低二成」，故正常價格＝1,200×(1-20%)＝1,200×0.8＝960萬元。本題與一般「成交價比正常價低幾成」的情境相反，須留意題目敘述的比較基準方向（此處是以成交價1,200萬元為基準，正常價格在其之下打8折，而非以正常價格為基準反推成交價）。"], correct:3, note:null},
{id:"VB1_101_29", cat:"B1", year:"101年第29題", q:"使用買賣實例比較法，如訪得之買賣實例其交易價格，係因屋主急於脫手而出售，此係：", opts:["一般購買者不易參加，應進行個別因素修正", "利害關係人交易，應進行情況修正", "交易時具特別動機，應進行情況修正", "將負擔由購買者承受，應進行期日修正"], explains:["「一般購買者不易參加」描述的是市場競價限制，並非屋主急於脫手這種交易動機異常的情況，與個別因素修正無關。", "利害關係人交易（如親友間買賣）才需要情況修正，但題目描述的是屋主自身急於脫手，並非與買方有利害關係。", "技術規則第23條第1款明定：因急買急賣或急出租急承租，致價格顯著偏離正常水準者，應進行情況調整。「屋主急於脫手」正是此類具特別動機之交易，需進行情況修正。", "「將負擔由購買者承受」描述的是交易條件而非價格本身的時間差異，與價格日期調整（因時間差異致價格水準變動）的定義不符。"], correct:2, note:null},
{id:"VB1_102_5", cat:"B1", year:"102年第5題", q:"依不動產估價技術規則規定，不動產估價師蒐集比較實例應依據之原則，下列敘述何者錯誤？", opts:["實例價格形成日期與勘估標的之價格日期接近者", "與勘估標的使用性質或使用分區管制相同或相近者", "與勘估標的位於同一供需圈之近鄰地區或類似地區者", "實例之價格與勘估標的價格種類相同之特定或限定價格者"], explains:["技術規則第12條第3款明定：實例價格形成日期與勘估標的之價格日期接近者，為正確原則。", "技術規則第12條第2款明定：與勘估標的使用性質或使用管制相同或相近者，為正確原則。", "技術規則第12條第2款另一部分：與勘估標的位於同一供需圈之近鄰地區或類似地區者，為正確原則。", "技術規則第12條第1款明定的是「正常價格」或「可調整為正常價格」，而非「特定或限定價格」，本選項將原則內容誤植，故為錯誤敘述（即本題正解）。"], correct:3, note:null},
{id:"VB1_102_6", cat:"B1", year:"102年第6題", q:"因應財政部查稅及不動產資本利得稅改採實價認定之議題發酵，投資客黃先生於兩個月前，以低於當時市價1成急忙出售房地產一筆，成交價格為新臺幣1000萬元。如近兩個月房價又下跌5%，則目前市價行情為何？", opts:["新臺幣950萬元", "新臺幣1100萬元", "新臺幣1045萬元", "新臺幣1056萬元"], explains:["950萬元的計算未正確還原情況調整與價格日期調整兩道程序。", "1,100萬元計算方向錯誤。", "1,045萬元未完整考慮兩階段調整（情況調整還原10%後，再考慮價格日期調整還原5%下跌）。", "成交價1,000萬元是低於市價1成（情況調整），先還原：1,000÷(1-10%)≈1,111.1萬元；該數字代表2個月前的市價，再考慮近2個月房價又下跌5%，目前市價＝1,111.1×(1-5%)≈1,055.6萬元≈1,056萬元。"], correct:3, note:"原成交價1000萬元係市價打9折後之結果，故原市價＝1000÷0.9≈1111.1萬元；其後兩個月房價又下跌5%，目前市價＝1111.1×(1－5%)≈1056萬元。"},
{id:"VB1_102_7", cat:"B1", year:"102年第7題", q:"某份不動產估價報告書比較法三個比較標的價格為：新臺幣12.9、12.6、13.7萬元/坪，所推估勘估標的之試算價格分別為：新臺幣10、9、11.5萬元/坪，下列敘述何者正確？", opts:["比較標的一調幅違反規定", "比較標的二調幅違反規定", "比較標的二及比較標的三試算價格差距違反規定", "勘估標的整體條件較比較標的佳"], explains:["需驗證比較標的一之調幅（12.9→10）是否超過個別/區域因素15%或總調整率30%上限，依官方答案此選項不成立，調幅本身未違規。", "比較標的二之調幅（12.6→9）同樣需檢驗，依官方答案不是本題違規所在。", "比較標的二（試算價格9）與比較標的三（試算價格11.5）之差距＝(11.5-9)÷[(11.5+9)/2]≈24.4%，已超過技術規則第26條的20%差距上限，應予排除，此為本題正解所在之違規態樣。", "本題並未提供足以判斷「勘估標的整體條件較比較標的佳」的資訊，此為無關聯的推論選項。"], correct:2, note:null},
{id:"VB1_102_31", cat:"B1", year:"102年第31題", q:"臺北市政府最近發布之5月份住宅價格指數，中山、松山、南港區標準住宅總價新臺幣1224萬元，萬華、文山、北投區新臺幣1079萬元，其價差達新臺幣145萬元。該價差屬於下列何種方法之運用？", opts:["定額法", "差異法", "差額法", "量化法"], explains:["定額法是成本法折舊計算方法（年折舊額固定），與比較法的房價指數金額差異分析無關。", "「差異法」並非技術規則定義的調整方法名稱。", "兩區域住宅總價直接相減得出具體金額差價（145萬元），依技術規則第19條第6款，以具體差額表示優劣程度差異即為差額法之運用。", "「量化法」並非技術規則定義的調整方法名稱，屬混淆選項。"], correct:2, note:null},
{id:"VB1_102_34", cat:"B1", year:"102年第34題", q:"請問試算價格之調整運算過程中，區域因素或個別因素調整之任一單獨項目之價格調整率大於多少，即應排除該比較案例之適用？", opts:["5%", "10%", "15%", "20%"], explains:["5%遠低於技術規則第25條規定的15%門檻，非本題答案。", "10%同樣低於15%門檻，非本題答案。", "技術規則第25條明定：區域因素或個別因素內任一單獨項目之價格調整率大於15%，應排除該比較標的之適用。", "20%是試算價格差距（技術規則第26條）的判定門檻，並非單項調整率的門檻，本選項混淆了兩條規定的數字。"], correct:2, note:null},
{id:"VB1_103_10", cat:"B1", year:"103年第10題", q:"某一不動產於103年3月1日的正常價格為1000萬元，綜合市場調查並參考不動產價格指數，得知103年3月1日至103年4月1日期間價格上漲一成，在其他條件不變情況下，請問103年4月1日的正常價格為何？", opts:["900萬元", "909萬元", "1100萬元", "1111萬元"], explains:["900萬元計算方向錯誤，未正確處理「上漲一成」的調整方向。", "909萬元同樣計算方向有誤（誤用除法而非乘法處理上漲情境）。", "103年3月1日正常價格1,000萬元，期間上漲一成（10%），4月1日正常價格＝1,000×(1+10%)＝1,100萬元，屬於價格日期調整的直接應用。", "1,111萬元的計算基礎有誤，並非正確的上漲10%結果。"], correct:2, note:null},
{id:"VB1_103_19", cat:"B1", year:"103年第19題", q:"依不動產估價技術規則規定，下列有關勘估標的試算價格之敘述，何者有誤？", opts:["試算價格之間差距達百分之二十以上者，應排除該試算價格之適用", "試算價格間的差距，以高低價格之差除以各價格平均值計算", "試算價格應就價格偏高或偏低者加以重新檢討", "經檢討確認適當合理者，始得作為決定比較價格之基礎"], explains:["技術規則第26條明定：試算價格之間差距達20%以上者，應排除該試算價格之適用，本敘述正確，非本題答案（本題問「何者有誤」）。", "技術規則第26條規定差距計算方式為「高低價格之差除以『高低價格』平均值」，係指最高與最低兩個試算價格的平均值；本選項改寫為「除以『各』價格平均值」，「各」字暗示是把所有試算價格（可能三個以上）全部平均，與規則明定僅取「最高、最低兩者」平均值的範圍不同，屬於用語偷換導致計算基準錯誤的陷阱敘述，即本題正解（有誤之處）。", "試算價格應就偏高或偏低者重新檢討，這是技術規則第26條第1項的明文規定，敘述正確。", "經檢討確認適當合理者才能作為決定比較價格之基礎，這也是技術規則第26條第1項規定，敘述正確。"], correct:1, note:"依官方答案表標示B，惟B選項所述計算方式本身為正確定義；本題詢問「何者有誤」，作答時應留意其他選項是否存在隱藏錯誤之處，建議對照規則原文逐項核對。"},
{id:"VB1_103_20", cat:"B1", year:"103年第20題", q:"甲以2000萬元（比市場行情低二成的價格）買了一戶公寓，請問該公寓之市場行情是多少？", opts:["1600萬元", "2200萬元", "2400萬元", "2500萬元"], explains:["1,600萬元的計算方向錯誤（誤用2,000×0.8）。", "2,200萬元計算基礎有誤。", "2,400萬元同樣未正確還原比例。", "甲以2,000萬元買入，該價格比市場行情低二成（即2,000萬元＝市場行情×80%），故市場行情＝2,000÷0.8＝2,500萬元。"], correct:3, note:null},
{id:"VB1_103_21", cat:"B1", year:"103年第21題", q:"依不動產估價技術規則規定，請問比較法應進行比較、分析及調整之項目為何？①情況調整②價格日期調整③一般因素調整④區域因素調整⑤個別因素調整⑥價格調整", opts:["①②③④", "①②④⑤", "①②③④⑤", "①②③④⑤⑥"], explains:["①②③④缺少⑤個別因素調整，比較法調整流程不可缺少個別因素這一項，故不完整。", "技術規則第19條明定比較法應進行之調整項目為：①情況調整②價格日期調整④區域因素調整⑤個別因素調整，「一般因素調整」與「價格調整」本身並非獨立調整項目名稱（一般因素已內含於價格水準變動的整體判斷中，價格調整是調整後的結果而非調整項目）。", "①②③④⑤包含了③一般因素調整，但技術規則第19條的四大調整項目中並無「一般因素調整」此一獨立項目，一般因素屬於影響全國性價格水準的因素，不在逐項比較調整的範疇內，本選項多算一項。", "全部六項都列入，但③一般因素調整與⑥價格調整皆非技術規則第19條所定義的調整項目，本選項錯誤更多。"], correct:1, note:null},
{id:"VB1_103_24", cat:"B1", year:"103年第24題", q:"依不動產估價技術規則，有關試算價格調整率之限制，何者正確？", opts:["區域因素調整之價格調整率不得大於百分之十五", "情況調整之價格調整率不得大於百分之十五", "價格日期調整之價格調整率不得大於百分之十五", "情況、價格日期、區域因素及個別因素調整總調整率不得大於百分之十五"], explains:["技術規則第25條明定：區域因素或個別因素內任一單獨項目之價格調整率大於15%時，應排除該比較標的之適用，本選項正確描述此規定的核心數字。", "情況調整本身並非單獨設有「不得大於15%」的明文限制，第25條規範的對象是「區域因素或個別因素內之任一單獨項目」，情況調整不在此限制範圍內。", "價格日期調整同樣不在第25條單項調整率15%限制的列舉對象內。", "情況、價格日期、區域因素及個別因素「總調整率」上限是30%而非15%，本選項數字錯誤。"], correct:0, note:null},
{id:"VB1_104_1", cat:"B1", year:"104年第1題", q:"比較、分析勘估標的與比較標的之區域因素及個別因素差異並就其中差異進行價格調整時，其調整以那一種方法為原則？", opts:["比較法", "差額法", "百分率法", "計量模型分析法"], explains:["「比較法」是估價的三大方法之一，並非比較法內部用來調整區域/個別因素差異的具體方法名稱，選項邏輯有誤。", "差額法是調整方法之一，但屬於例外或補充方式（個別項目差額明確時採用），並非原則方法。", "技術規則第24條明定：區域因素及個別因素之差異所為之價格調整，以百分率法為原則。", "計量模型分析法是輔助比較法蒐集分析大量資料的統計工具，並非區域/個別因素調整的具體方法。"], correct:2, note:null},
{id:"VB1_104_9", cat:"B1", year:"104年第9題", q:"如果同一勘估標的運用比較法估價，所得三個試算價格有相當差距時，下列何者是決定其比較價格最好的方法？", opts:["取中間值", "取平均值", "就價格偏高或偏低者重新檢討", "賦予45%、30%、25%加權決定"], explains:["直接取中間值並非技術規則規定的決定方法，未經重新檢討即取中間值缺乏依據。", "直接取平均值同樣缺乏技術規則依據，未經偏高偏低檢討的平均並不合理。", "技術規則第26條規定：試算價格應就價格偏高或偏低者重新檢討，經檢討確認適當合理者，始得作為決定比較價格之基礎，這正是處理試算價格差距過大時的正確程序。", "「賦予45%、30%、25%加權」這種固定權重比例並非技術規則規定的決定方法，屬於虛構的混淆選項。"], correct:2, note:null},
{id:"VB1_104_10", cat:"B1", year:"104年第10題", q:"甲君將其所有一棟透天厝以1,275萬元賣給其小舅子，經判斷比正常價格便宜一成五。試問在其他條件不變下，其正常價格應為多少？", opts:["1,083.75萬元", "1,147.5萬元", "1,500萬元", "1,416.7萬元"], explains:["1,083.75萬元的計算方向錯誤（誤用1,275×0.85計算而非還原除法）。", "1,147.5萬元同樣計算基礎有誤。", "成交價1,275萬元比正常價格便宜一成五（15%），即1,275萬元＝正常價格×(1-15%)＝正常價格×0.85，故正常價格＝1,275÷0.85＝1,500萬元。", "1,416.7萬元的計算分母設定有誤，並非正確的0.85還原值。"], correct:2, note:null},
{id:"VB1_104_11", cat:"B1", year:"104年第11題", q:"一比較標的於102年8月以1,000萬元成交，當時的價格指數為90%；勘估標的價格日期104年8月當期之價格指數為95%。假設其他條件相同，試問該勘估標的經價格日期調整後之價格約為多少？", opts:["947.37萬元", "950.00萬元", "1,000.00萬元", "1,055.56萬元"], explains:["947.37萬元的計算方向錯誤（誤將指數比例顛倒）。", "950.00萬元同樣計算基礎有誤。", "1,000.00萬元代表未經調整的原始成交價，並非考慮指數變動後的結果。", "價格日期調整公式：調整後價格＝比較標的成交價×(勘估標的價格日期指數÷比較標的交易日期指數)＝1,000×(95÷90)≈1,055.56萬元。"], correct:3, note:null},
{id:"VB1_104_12", cat:"B1", year:"104年第12題", q:"依不動產估價技術規則之規定，下列有關比較法個別因素調整及試算價格求取之敘述，何者正確？", opts:["就勘估標的與比較標的差異進行價格調整時，以差額法為原則", "就勘估標的與比較標的差異進行價格調整時，以定性分析法為原則", "偏高或偏低檢討後試算價格間差距仍達百分之十以上者，應排除該試算價格之適用", "偏高或偏低檢討後試算價格間差距仍達百分之二十以上者，應排除該試算價格之適用"], explains:["技術規則第24條規定差異調整以「百分率法」為原則，非「差額法」為原則，本選項方法名稱錯誤。", "「定性分析法」並非技術規則所定義的調整方法名稱，屬虛構選項。", "技術規則第26條規定差距達20%以上才應排除，非10%以上，本選項數字錯誤。", "技術規則第26條明定：偏高或偏低檢討後試算價格間差距仍達20%以上者，應排除該試算價格之適用，與本選項描述相符。"], correct:3, note:null},
{id:"VB1_104_26", cat:"B1", year:"104年第26題", q:"比較標的在不動產估價技術規則中係指可供與勘估標的間，按情況、價格日期及下列那些因素之差異進行比較之標的？①區域因素　②一般因素　③經濟因素　④政治因素　⑤個別因素", opts:["①⑤", "②⑤", "①②③", "②③④⑤"], explains:["技術規則第19條明定比較標的之比較調整項目為情況、價格日期、區域因素①、個別因素⑤，故①⑤為正確組合。", "②一般因素並非比較標的逐項比較調整的對象，一般因素是影響全國性價格水準的宏觀因素，不在第19條逐項調整的列舉範圍內。", "①區域因素正確，但②一般因素、③經濟因素皆非第19條規定的調整項目名稱。", "②③④皆非技術規則第19條規定的調整項目，僅⑤個別因素正確，本選項組合錯誤過多。"], correct:0, note:null},
{id:"VB1_104_36", cat:"B1", year:"104年第36題", q:"在使用比較法估價時，採用下列那些情況下之交易價格時，應先作適當之調整；該影響交易價格之情況無法有效掌握及量化調整時，則應不予採用？①張先生因債務人無力償債而承接其抵押給張先生的廠房　②父子間之不動產買賣　③王先生因為移民急賣手上的不動產　④財政部國有財產署標售土地　⑤臺中市政府向教育部價購土地", opts:["僅③④⑤", "①②③④⑤", "僅①②④", "僅①②③"], explains:["僅③④⑤遺漏了①②兩項，但①（債權人承接抵押廠房，屬受債權債務關係影響之交易）與②（父子間買賣，屬親友間交易）皆屬技術規則第23條列舉之應先調整或不予採用情況，不應遺漏。", "技術規則第23條列舉之情況涵蓋：①受債權債務關係影響的交易、②親友間買賣、③急於脫手具特別動機之交易、④⑤公有土地標售讓售或政府機關間價購（屬特殊交易型態，亦需注意檢視其價格代表性），五項皆屬於應先作適當調整、若無法量化調整則不予採用之情況。", "僅①②④遺漏③⑤，但③（移民急賣）與⑤（政府機關間價購）同樣屬於應檢視調整之特殊交易情況，不應遺漏。", "僅①②③遺漏④⑤，但④⑤之政府機關標售或價購交易，同樣可能因價格形成機制特殊而需要適當調整，不應遺漏。"], correct:1, note:null},
{id:"VB1_105_24", cat:"B1", year:"105年第24題", q:"有關比較法之敘述，下列何者錯誤？", opts:["比較標的價格為基礎，經比較、分析及調整等，以推算勘估標的價格之方法", "不動產估價師應採用五件以上比較標的", "區域因素及個別因素進行價格調整時，其調整以百分率法為原則", "以比較法所求得之價格為比較價格"], explains:["技術規則第18條明定比較法之定義即為「以比較標的價格為基礎，經比較、分析及調整等，以推算勘估標的價格之方法」，敘述正確，非本題答案（本題問「何者錯誤」）。", "技術規則第27條規定原則上應採用「三件以上」比較標的，而非「五件以上」，此為錯誤敘述，即本題正解。", "技術規則第24條規定區域因素及個別因素之調整以百分率法為原則，敘述正確。", "技術規則第18條明定以比較法所求得之價格為比較價格，敘述正確。"], correct:1, note:"依規則規定應採用「三件以上」比較標的，非五件以上，此為本題鑑別點。"},
{id:"VB1_105_37", cat:"B1", year:"105年第37題", q:"依不動產估價技術規則第26條規定，檢討後試算價格之間差距達多少以上者，應排除該試算價格之適用？", opts:["30%", "20%", "15%", "10%"], explains:["30%是「總調整率」（情況+價格日期+區域+個別因素總和）的判定門檻（技術規則第25條），不是試算價格差距的門檻。", "技術規則第26條明定：檢討後試算價格之間差距達20%以上者，應排除該試算價格之適用。", "15%是「單項調整率」（任一單獨項目）的判定門檻（技術規則第25條），不是試算價格差距的門檻。", "10%並非技術規則規定的任何一道門檻數字，屬於混淆選項。"], correct:1, note:null},
{id:"VB1_105_38", cat:"B1", year:"105年第38題", q:"試算價格之調整運算過程中，下列何者符合不動產估價技術規則第25條之規定？", opts:["各項因素內之任一單獨項目之價格調整率為12%時，必須敘明理由", "各項因素內之任一單獨項目之價格調整率為20%時，不須敘明理由", "各項因素內之任一單獨項目之價格調整率為30%時，不須敘明理由", "各項因素內之任一單獨項目之價格調整率為17%時，必須敘明理由"], explains:["12%未超過15%上限，依技術規則第25條規定不須特別敘明理由（僅超過15%時，於「勘估標的性質或區位特殊」前提下才需於報告書敘明），本選項與規則文字不符。", "20%已超過15%單項調整率上限，依規則應排除該比較標的之適用（除非性質特殊並敘明理由），本選項稱「不須敘明理由」與規則意旨相反。", "30%同樣已超過15%上限甚多，更需審慎處理並敘明，本選項「不須敘明理由」明顯錯誤。", "17%已超過技術規則第25條規定的15%單項調整率上限，依規定除非勘估標的性質或區位特殊並於估價報告書中敘明理由，否則應排除該比較標的，故「17%時必須敘明理由」（若性質特殊欲援引例外）符合規則精神，為本題正解。"], correct:3, note:"單項調整率超過15%（如17%）即超出原則上限，須於估價報告書中敘明理由（除非標的性質或區位特殊）。"},
{id:"VB1_106_5", cat:"B1", year:"106年第5題", q:"臺北市政府最近發布之10月份住宅價格指數，中山松山南港區標準住宅總價1,224萬元、萬華文山北投區1,080萬元，其價差達144萬元。以上的價差分析，屬下列何種運用？", opts:["定率法", "比率法", "定額法", "差額法"], explains:["定率法是成本法折舊計算方法（每年依固定比率對前一年餘值計算），與住宅總價直接相減的金額差異分析無關。", "「比率法」並非技術規則明確定義的比較法調整方法名稱。", "定額法是成本法折舊計算方法（年折舊額固定），同樣與比較法調整無關。", "兩區域住宅總價直接相減得出具體金額差價（144萬元），依技術規則第19條第6款定義，此即差額法之運用——依優劣程度評定具體差額進行價格調整分析。"], correct:3, note:null},
{id:"VB1_106_28", cat:"B1", year:"106年第28題", q:"勘估土地時蒐集到一個半年前正常情況下之土地交易案例，以每平方公尺30萬元成交，其與價格日期相比跌了2%，區域條件較勘估標的優5%、個別條件較勘估標的優10%，其試算價格為何？", opts:["（原試題選項OCR辨識不完整，無法呈現具體數值）", "（原試題選項OCR辨識不完整，無法呈現具體數值）", "（原試題選項OCR辨識不完整，無法呈現具體數值）", "（原試題選項OCR辨識不完整，無法呈現具體數值）"], explains:["原始選項因PDF格式問題無法完整呈現具體數值，無法逐項解析個別選項內容。", "同上，選項數值無法辨識，僅能提供計算邏輯架構。", "同上，選項數值無法辨識。", "本題官方公告為「一律給分」，無強制單一正解，題目本身的計算邏輯為：試算價格＝30萬元÷(1-2%)÷(1+5%)÷(1+10%)（先還原半年前案例之價格日期下跌2%，再依區域優5%、個別優10%調整為與勘估標的相同條件下之價格），可作為同類型計算題練習參考。"], correct:0, note:null},
{id:"VB1_106_31", cat:"B1", year:"106年第31題", q:"下列有關勘估標的與比較標的調整及試算價格求取之敘述，何者正確？", opts:["差異調整以差額法為原則", "差異調整以定性分析法為原則", "偏高或偏低檢討後試算價格間差距仍達10%以上者，應排除適用", "偏高或偏低檢討後試算價格間差距仍達20%以上者，應排除適用"], explains:["技術規則第24條規定差異調整以「百分率法」為原則，本選項稱「差額法」為原則，方法名稱錯誤。", "「定性分析法」並非技術規則定義的調整方法，屬虛構選項。", "技術規則第26條規定差距達20%以上才排除，非10%以上，本選項數字錯誤。", "技術規則第26條明定：偏高或偏低檢討後試算價格間差距仍達20%以上者，應排除適用，與本選項相符。"], correct:3, note:null},
{id:"VB1_107_3", cat:"B1", year:"107年第3題", q:"下列何者不屬不動產估價師蒐集比較實例所應依循之原則？", opts:["實例之價格屬限定價格、可調整為限定價格或與勘估標的價格種類相同者", "與勘估標的位於同一供需圈之近鄰地區或類似地區者", "與勘估標的使用性質或使用管制相同或相近者", "實例價格形成日期與勘估標的之價格日期接近者"], explains:["技術規則第12條第1款明定蒐集比較實例之原則為實例價格屬「正常價格」或可調整為正常價格，與勘估標的價格種類相同者，而非「限定價格」，本選項將原則內容誤植為限定價格，是不應依循的錯誤敘述，即本題正解。", "與勘估標的位於同一供需圈之近鄰地區或類似地區者，是第12條明定之正確原則。", "與勘估標的使用性質或使用管制相同或相近者，是第12條明定之正確原則。", "實例價格形成日期與勘估標的之價格日期接近者，是第12條明定之正確原則。"], correct:0, note:null},
{id:"VB1_107_5", cat:"B1", year:"107年第5題", q:"運用比較法在試算價格之調整運算過程中，區域因素調整、個別因素調整或區域因素及個別因素內之任一單獨項目之價格調整率大於百分之(甲)，或情況、價格日期、區域因素及個別因素調整總調整率大於百分之(乙)時，判定該比較標的與勘估標的差異過大，應排除該比較標的之適用。請問甲與乙各為多少？", opts:["甲為10，乙為20", "甲為10，乙為25", "甲為15，乙為25", "甲為15，乙為30"], explains:["甲10、乙20皆與技術規則第25條規定的15%、30%數字不符。", "甲10、乙25同樣與規則規定的數字不符。", "甲15、乙25，乙的數字應為30而非25，本選項僅甲正確。", "技術規則第25條明定：單項調整率上限為15%（甲），總調整率上限為30%（乙），與本選項數字完全相符。"], correct:3, note:null},
{id:"VB1_107_6", cat:"B1", year:"107年第6題", q:"採用比較法經比較調整後求得之勘估標的試算價格，應就價格偏高或偏低者重新檢討，經檢討確認適當合理者，始得作為決定比較價格之基礎。檢討後試算價格之間差距仍達百分之二十以上者，應排除該試算價格之適用。前者所稱百分之二十以上之差距係指：", opts:["高低價格之差除以高低價格平均值達百分之二十以上者", "高低價格之差除以最高價格達百分之二十以上者", "高低價格平均值除以最高價格達百分之二十以上者", "高低價格平均值除以高低價格之差達百分之二十以上者"], explains:["技術規則第26條規定的差距計算方式為「高低價格之差÷高低價格『平均值』」，與本選項描述完全相符。", "除以「最高價格」而非平均值，與規則規定的計算基準不符。", "「高低價格平均值除以最高價格」是另一種計算邏輯，與規則規定的「差÷平均值」公式不符。", "「高低價格平均值除以高低價格之差」是分子分母顛倒，與規則規定不符。"], correct:0, note:null},
{id:"VB1_107_17", cat:"B1", year:"107年第17題", q:"下列有關比較法的敘述，何者錯誤？", opts:["試算價格調整運算過程中，情況因素、價格日期、區域因素、個別因素或區域因素及個別因素內之任一單獨項目之價格調整率不得大於15%，但勘估標的性質或區位特殊，於報告書敘明者，不在此限", "試算價格調整運算過程中，情況因素、價格日期、區域因素及個別因素總調整率不得大於30%，但勘估標的性質或區位特殊，於報告書敘明者，不在此限", "情況調整係指比較標的之價格形成條件中有非屬於一般正常情形而影響價格時，或有其他足以改變比較標的價格之情況存在時，就該影響部分所作之調整", "估價師運用比較法估價時，應採用三件以上比較標的"], explains:["技術規則第25條完整規定即為「任一單獨項目調整率不得大於15%，但勘估標的性質或區位特殊並於報告書敘明者不在此限」，本選項描述完全正確，非本題答案（本題問「何者錯誤」）。", "技術規則第25條同樣規定總調整率不得大於30%（但有同樣的例外但書），本選項描述正確。", "技術規則第19條第1款明定情況調整之定義，與本選項描述相符，敘述正確。", "技術規則第27條明定應採用「三件以上」比較標的，本選項描述「三件以上」與規則相符，看似正確；惟本題標準答案為D，可能命題重點在於規則原文用語為「原則上」採用三件以上而非絕對規定，或本題鑑別點在於其他更細微的文字差異，建議考生對照規則第27條原文逐字確認本題實際鑑別點。"], correct:3, note:"本題依官方答案表標示A為錯誤敘述，惟A選項內容本身大致符合規則原文；推測本題鑑別重點在於其餘選項中存在另一處更明確之錯誤敘述，建議考生對照規則原文第25、26條逐項核對確認。"},
{id:"VB1_107_18", cat:"B1", year:"107年第18題", q:"王先生手中取得一份不動產估價報告書，比較法推估過程中三個比較案例的價格依序為新臺幣63萬元/坪、64.5萬元/坪、68.5萬元/坪，所推估之試算價格依序分別為新臺幣45萬元/坪、50萬元/坪、57.5萬元/坪，下列敘述何者正確？", opts:["比較案例一總調整率不符規定", "比較案例三總調整率不符規定", "比較案例一與比較案例三試算價格之差距不符規定", "比較案例一與比較案例二之試算價格較接近，應給予較高之權重"], explains:["比較案例一（63萬→45萬）調幅約為(63-45)÷63≈28.6%，需綜合判斷是否超過總調整率30%上限，依官方答案此非本題違規所在。", "比較案例三（68.5萬→57.5萬）調幅約為(68.5-57.5)÷68.5≈16.1%，未超過總調整率30%上限，非本題違規所在。", "比較案例一與三之試算價格差距＝(57.5-45)÷[(57.5+45)/2]≈24.4%，已超過技術規則第26條規定的20%上限，應予排除，此為本題正解所在之違規態樣。", "本題並未要求比較案例間的權重分配判斷，此選項與技術規則明文規定的排除規則無關。"], correct:2, note:"比較案例一與三試算價格差距＝(57.5－45)÷[(57.5+45)/2]≈24.4%，已超過20%上限，應排除適用。"},
{id:"VB1_108_7", cat:"B1", year:"108年第7題", q:"經比較調整後求得之勘估標的試算價格，應就價格偏高或偏低者重新檢討，經檢討後試算價格差距如下，何者應排除該試算價格之適用？", opts:["百分之二十五", "百分之十五", "百分之十", "百分之五"], explains:["技術規則第26條規定差距達20%以上者應排除，25%已超過20%門檻，符合排除條件。", "15%未達20%門檻，依規則不須排除，本選項不符題目「應排除」的條件。", "10%同樣未達20%門檻，不符排除條件。", "5%遠低於20%門檻，更不符排除條件。"], correct:0, note:null},
{id:"VB1_108_15", cat:"B1", year:"108年第15題", q:"有關比較法試算價格之調整運算過程中，遇有下列之情形，須判定該比較標的與勘估標的差異過大，應排除該比較標的之適用。何者為正確？", opts:["區域因素調整率、個別因素調整率，各大於百分之三十", "區域因素及個別因素內之任一單獨項目之價格調整率大於百分之十五", "區域因素調整率與個別因素調整率之和，大於百分之三十", "比較標的性質特殊或區位特殊缺乏市場交易資料，並於估價報告書中敘明者，不在此限"], explains:["技術規則第25條規定的是「任一單獨項目」調整率大於15%即排除，並非「各大於30%」這種雙重同時超標的條件設定，本選項條件設定錯誤。", "技術規則第25條明定：區域因素及個別因素內任一單獨項目之價格調整率大於15%，應判定差異過大並排除該比較標的之適用，與本選項完全相符。", "規則規範的是「任一單獨項目」分別判斷是否超過15%，而非「調整率之和」大於30%這種加總後再判斷的方式，本選項描述方式與規則原意不符。", "例外但書「比較標的性質特殊或區位特殊缺乏市場交易資料並於估價報告書中敘明者，不在此限」確實存在於規則中，但本題問的是判定差異過大「應排除」的正確情形，本選項描述的是排除規則的例外狀況，並非本題所問的判定情形本身。"], correct:1, note:null},
{id:"VB1_108_18", cat:"B1", year:"108年第18題", q:"不動產估價師蒐集比較實例時，應依循之原則，下列敘述何者錯誤？", opts:["實例價格形成日期與勘估標的之價格日期接近者", "須蒐集與勘估標的使用性質或使用管制相同者之實例", "須蒐集與勘估標的位於同一供需圈之近鄰地區或類似地區者之實例", "實例價格屬正常價格、可調整為正常價格或與勘估標的價格種類相同者"], explains:["實例價格形成日期與勘估標的之價格日期接近者，是技術規則第12條明定之正確原則，敘述正確，非本題答案（本題問「何者錯誤」）。", "須蒐集與勘估標的使用性質或使用管制相同或相近者之實例，是第12條明定之正確原則，敘述正確。", "須蒐集與勘估標的位於同一供需圈之近鄰地區或類似地區者之實例，是第12條明定之正確原則，敘述正確。", "技術規則第12條規定實例價格應屬「正常價格」、可調整為正常價格、或與勘估標的價格種類相同者，本選項描述與規則原文相符，看似正確；本題官方公告為「一律給分」，無強制單一正解，可能各選項在細部文字上皆有可受公評之處，作答時請以一律給分為準。"], correct:0, note:null},
{id:"VB1_108_19", cat:"B1", year:"108年第19題", q:"有關區域因素之調整，下列敘述何者為正確？", opts:["此項調整，係以比較標的之區域價格水準為基礎，就區域因素不同所產生之價格差異，逐項進行之分析與調整", "此項調整為將勘估標的之價格轉化為與比較標的同一近鄰地區內之價格水準", "所選用之比較標的係位於同一供需圈但不在同一類似地區內", "所謂區域因素，指影響類似地區不動產價格水準之因素"], explains:["技術規則第19條第3款明定區域因素調整之定義：以比較標的之區域價格水準為基礎，就區域因素不同所產生之價格差異，逐項進行分析與調整，與本選項描述完全相符。", "區域因素調整的方向是將「比較標的」價格轉化為與「勘估標的」同一近鄰地區內之價格水準，而非反向將勘估標的轉化為比較標的之水準，本選項調整方向與對象顛倒。", "技術規則要求比較標的應與勘估標的「位於同一供需圈之近鄰地區或類似地區」，並非「位於同一供需圈但不在同一類似地區」這種排除類似地區的限縮敘述，與規則原意不符。", "區域因素的正確定義是「影響『近鄰地區』不動產價格水準之因素」，而非「影響類似地區」，本選項用詞錯誤。"], correct:0, note:null},
{id:"VB1_108_20", cat:"B1", year:"108年第20題", q:"下列敘述何者為正確？", opts:["百分率法與差額法均為將影響勘估標的及比較標的價格差異的一般因素、區域因素與個別因素逐項比較進行價格調整之方法", "採比較法估價時，應先進行「情況調整」，再進行「價格日期調整」、「個別因素修正」，最後是「區域因素修正」", "對勘估標的價格進行情況調整及價格日期調整", "對比較標的價格進行情況調整及價格日期調整"], explains:["技術規則第19條規定的調整對象是「區域因素」與「個別因素」，並不包含「一般因素」逐項調整，本選項多列了一般因素，與規則範圍不符。", "技術規則第19條明定調整流程順序為：情況調整→價格日期調整→區域因素調整→個別因素調整，本選項將區域因素與個別因素順序顛倒（題目稱先個別後區域），與規則規定的順序不符。", "情況調整及價格日期調整的對象應為「比較標的」價格（將其轉化為與勘估標的相同條件下之價格），而非對「勘估標的」價格進行調整，本選項調整對象錯誤。", "技術規則第19條明定情況調整、價格日期調整等四項調整，其調整對象皆為「比較標的」價格，本選項描述調整對象正確，且符合先情況後價格日期之流程順序。"], correct:3, note:null},
{id:"VB1_109_6", cat:"B1", year:"109年第6題", q:"比較法以比較標的價格為基礎，下列那一項比較標的在正常情況下應排除適用？", opts:["比較標的A的比較因素調整中，情況調整率+5%，價格日期調整率-9%，區域因素調整率-12%，個別因素調整率+10%", "比較標的B的比較因素調整中，情況調整率+5%，價格日期調整率-9%，區域因素調整率+12%，個別因素調整率+10%", "比較標的C的比較因素調整中，情況調整率+5%，價格日期調整率+9%，區域因素調整率-12%，個別因素調整率-10%", "比較標的D的比較因素調整中，情況調整率-5%，價格日期調整率-9%，區域因素調整率-12%，個別因素調整率-10%"], explains:["情況+5%、價格日期-9%、區域-12%、個別+10%，總調整率（代數和）＝5-9-12+10＝-6%，絕對值6%遠未超過30%總調整率上限，且任一單項最大值12%未超過15%，不符合排除條件。", "情況+5%、價格日期-9%、區域+12%、個別+10%，總調整率＝5-9+12+10＝18%，未超過30%上限，且任一單項最大值12%未超過15%，不符合排除條件。", "情況+5%、價格日期+9%、區域-12%、個別-10%，總調整率＝5+9-12-10＝-8%，絕對值8%未超過30%上限，且任一單項最大值12%未超過15%，不符合排除條件。", "情況-5%、價格日期-9%、區域-12%、個別-10%，總調整率＝-5-9-12-10＝-36%，絕對值36%已超過技術規則第25條規定的30%總調整率上限，應判定差異過大並排除該比較標的之適用。本題關鍵在於「總調整率」係採各項調整率之代數和（而非絕對值逐項加總），唯有D選項四項調整方向一致（皆為負值），代數和的絕對值才會放大至超標，這正是命題設計的鑑別點。"], correct:3, note:"D選項總調整率絕對值加總＝5+9+12+10=36%，已超過30%總調整率上限，應排除適用；其餘選項加總均未超過30%。"},
{id:"VB1_109_19", cat:"B1", year:"109年第19題", q:"依據不動產估價技術規則規定，試算價格之調整運算過程中，情況、價格日期、區域因素及個別因素等調整的總調整率大於多少幅度時，判定該比較標的與勘估標的差異過大，應排除該比較標的之適用？", opts:["15%", "20%", "25%", "30%"], explains:["15%是「單項調整率」（技術規則第25條）的判定門檻，不是總調整率的門檻。", "20%是「試算價格差距」（技術規則第26條）的判定門檻，不是總調整率的門檻。", "25%並非技術規則規定的任何一道明文門檻數字。", "技術規則第25條明定：情況、價格日期、區域因素及個別因素之總調整率大於30%時，判定差異過大應排除該比較標的之適用，與本選項相符。"], correct:3, note:null},
{id:"VB1_110_12", cat:"B1", year:"110年第12題", q:"比較標的於110年1月以2,000萬元成交，當時之價格指數為95；勘估標的之價格日期為110年9月，價格指數為101。假設其他條件皆相同，請問勘估標的經價格日期調整後之價格約為多少？", opts:["2,020萬元", "2,105萬元", "2,126萬元", "2,188萬元"], explains:["2,020萬元的計算未正確套用價格指數比例公式。", "2,105萬元同樣計算基礎有誤。", "價格日期調整公式：調整後價格＝比較標的成交價×(勘估標的價格日期指數÷比較標的交易日期指數)＝2,000×(101÷95)≈2,126萬元。", "2,188萬元的計算結果超出正確比例換算範圍，數值有誤。"], correct:2, note:null},
{id:"VB1_110_18", cat:"B1", year:"110年第18題", q:"勘估標的乙之價格日期、勘察日期分別為110年8月15日、110年9月15日，若比較標的交易日期為110年7月10日（經查110年7至9月不動產指數分別為：106%、108%、107%），其價格日期調整百分率為何？", opts:["98%", "99%", "101%", "102%"], explains:["98%低於100%代表向下調整，但比較標的交易日期（7月，指數106%）相對於勘估標的價格日期（8月15日附近，指數約108%）應呈現上升趨勢，方向不符。", "99%同樣方向與數值不符合題目給定的指數變化趨勢。", "101%雖為上升方向，但比例計算未精確對應108÷106的結果。", "比較標的交易日期7月10日對應指數106%，勘估標的價格日期8月15日落在7-9月區間需內插或就近取8月指數約108%估算，調整百分率＝108÷106≈102%，與本選項相符。"], correct:3, note:"比較標的交易日期為7月（指數106%），勘估標的價格日期為8月15日（指數約108%），調整百分率＝108÷106≈102%。"},
{id:"VB1_111_11", cat:"B1", year:"111年第11題", q:"不動產估價比較法經比較調整後求得之勘估標的試算價格，應就價格偏高或偏低者重新檢討，經檢討確認適當合理者，始得作為決定比較價格之基礎。檢討後試算價格之間差距仍達多少以上者，應排除該試算價格之適用？", opts:["百分之五", "百分之十", "百分之十五", "百分之二十"], explains:["5%遠低於技術規則第26條規定的20%門檻。", "10%同樣低於20%門檻。", "15%仍低於20%門檻，未達排除標準。", "技術規則第26條明定：檢討後試算價格之間差距仍達20%以上者，應排除該試算價格之適用，與本選項相符。"], correct:3, note:null},
{id:"VB1_111_14", cat:"B1", year:"111年第14題", q:"不動產估價比較法於市場成交資訊充足時廣為運用，有關比較法之敘述，下列何者錯誤？", opts:["通常採用三件以上比較標的", "試算價格之調整運算過程中，任一單獨項目之價格調整率大於百分之十五，應排除該比較標的之適用", "試算價格之調整運算過程中，總調整率大於百分之三十時，應排除該比較標的之適用", "其調整以差額法為原則"], explains:["技術規則第27條規定原則上應採用「三件以上」比較標的，本選項描述正確，非本題答案（本題問「何者錯誤」）。", "技術規則第25條規定任一單獨項目調整率大於15%應排除，本選項描述正確。", "技術規則第25條規定總調整率大於30%應排除，本選項描述正確。", "技術規則第24條明定差異調整以「百分率法」為原則，而非「差額法」為原則，差額法僅用於個別項目差額明確時的補充方式，本選項方法名稱錯誤，即本題正解。"], correct:3, note:"依規則規定，調整以「百分率法」為原則，「差額法」僅用於單獨項目之調整，此為敘述錯誤之處。"},
{id:"VB1_111_24", cat:"B1", year:"111年第24題", q:"有一比較標的於110年10月以800萬元成交，當時的價格指數為103.6%，不動產勘估標的之價格日期為111年3月，當時的價格指數為100.3%。假設其他條件相同，請問該勘估標的經價格日期調整後的價格為多少？", opts:["834.7萬元", "826.3萬元", "789.6萬元", "774.5萬元"], explains:["834.7萬元的計算方向或比例設定有誤。", "826.3萬元同樣計算基礎有誤。", "789.6萬元雖接近正確答案但比例計算略有偏差。", "價格日期調整公式：調整後價格＝800×(100.3÷103.6)≈774.5萬元，指數下降代表市場呈現微幅下跌趨勢，調整後價格應低於原成交價。"], correct:3, note:"調整後價格＝800×(100.3÷103.6)≈774.5萬元。"},
{id:"VB1_112_6", cat:"B1", year:"112年第6題", q:"依不動產估價技術規則規定，比較標的為父親賣給兒子之交易，應進行何種調整？", opts:["情況調整", "價格日期調整", "區域因素調整", "個人因素調整"], explains:["技術規則第23條第4款明定親友間交易（含父母子女間之買賣）應進行情況調整，父親賣給兒子屬於典型的親友間交易情況。", "價格日期調整處理的是時間差異致價格水準變動，與交易雙方關係（父子）無關。", "區域因素調整處理的是區域位置差異，與交易雙方為父子關係無關。", "「個人因素調整」並非技術規則定義的調整項目名稱，技術規則規定的是「個別因素調整」（標的本身條件差異），且與本題交易雙方關係無關。"], correct:0, note:null},
{id:"VB1_112_23", cat:"B1", year:"112年第23題", q:"比較法估價試算價格之調整運算過程中，區域因素調整、個別因素調整或區域因素及個別因素內之任一單獨項目之價格調整率大於（甲），或情況、價格日期、區域因素及個別因素調整總調整率大於（乙）時，判定該比較標的與勘估標的差異過大，應排除該比較標的之適用。請問（甲）與（乙）各為多少？", opts:["（甲）為百分之十五，（乙）為百分之十五", "（甲）為百分之十五，（乙）為百分之三十", "（甲）為百分之三十，（乙）為百分之十五", "（甲）為百分之三十，（乙）為百分之三十"], explains:["甲乙皆為15%與規則規定的甲15%、乙30%不符，乙的數字錯誤。", "技術規則第25條明定：單項調整率上限15%（甲），總調整率上限30%（乙），與本選項完全相符。", "甲乙數字對調，與規則規定相反。", "甲乙皆設為30%，甲的數字應為15%而非30%，本選項甲的數字錯誤。"], correct:1, note:null},
{id:"VB1_113_7", cat:"B1", year:"113年第7題", q:"有關比較法的敘述下列何者錯誤？", opts:["比較標的價格經情況調整、價格日期調整、區域因素調整及個別因素調整後所獲得之價格稱為比較價格", "比較法指以比較標的價格為基礎，經比較、分析及調整等，以推算勘估標的價格之方法", "價格日期調整是指比較標的之交易日期與勘估標的之價格日期因時間之差異，致價格水準發生變動，應以適當之變動率或變動金額，將比較標的價格調整為勘估標的價格日期之價格", "比較標的與勘估標的不在同一近鄰地區內時，為將比較標的之價格轉化為與勘估標的同一近鄰地區內之價格水準的調整稱為區域因素調整"], explains:["比較標的價格經各項調整後所得之價格，依技術規則第21條第2項定義應稱為「試算價格」，須再經第26條重新檢討確認適當合理後才能稱為「比較價格」，本選項將試算價格直接稱為比較價格，混淆了兩個階段的用語，此為錯誤敘述，即本題正解。", "技術規則第18條明定比較法之定義，與本選項描述相符，敘述正確。", "技術規則第19條第2款明定價格日期調整之定義，與本選項描述相符，敘述正確。", "技術規則第19條第3款明定區域因素調整之定義，與本選項描述相符，敘述正確。"], correct:0, note:"依規則規定，比較標的價格經各項調整後所得之價格應稱為「試算價格」，須經重新檢討後才能成為「比較價格」，此為敘述錯誤之處。"},
{id:"VB1_113_8", cat:"B1", year:"113年第8題", q:"不動產估價技術規則第26條第1項：經比較調整後求得之勘估標的試算價格，應就價格偏高或偏低者重新檢討，經檢討確認適當合理者，始得作為決定比較價格之基礎。檢討後試算價格之間差距仍達百分之二十以上者，應排除該試算價格之適用。若比較標的一、二、三之試算價格分別為79萬元/坪，77萬元/坪及95萬元/坪，下列敘述何者正確？", opts:["三個試算價格之間皆符合排除條件", "三個試算價格之間皆不符合排除條件", "比較標的一與三之間符合排除條件", "比較標的二與三之間符合排除條件"], explains:["需逐一檢驗三組差距是否皆達20%以上，依官方答案並非三者皆符合排除條件。", "需逐一檢驗，依官方答案並非三者皆不符合排除條件，至少有一組超過門檻。", "比較標的一（79）與三（95）之差距＝(95-79)÷[(95+79)/2]≈18.4%，未達20%門檻，不符合排除條件。", "比較標的二（77）與三（95）之差距＝(95-77)÷[(95+77)/2]≈20.9%，已超過技術規則第26條規定的20%門檻，符合排除條件，此為本題正解。"], correct:3, note:"二、三差距＝(95－77)÷[(95+77)/2]≈21%，超過20%；一、三差距＝(95－79)÷[(95+79)/2]≈18.4%，未超過20%。故僅二、三符合排除條件。"},
{id:"VB1_113_23", cat:"B1", year:"113年第23題", q:"依據不動產估價技術規則規定試算價格的價格決定，那一項不適用？", opts:["試算價格調整過程中，任一單獨項目之價格調整率大於15%時應排除", "試算價格調整過程中，總調整率大於20%應排除", "試算價格調整過程中，總調整率大於30%應排除", "試算價格調整過程中，試算價格之間差距達20%以上應排除"], explains:["技術規則第25條規定任一單獨項目調整率大於15%應排除，本選項描述正確，適用本規則，非本題答案（本題問「那一項不適用」）。", "技術規則第26條規定的是試算價格「差距」達20%以上應排除，而非「調整過程中總調整率」大於20%應排除，本選項把總調整率的門檻誤植為20%（正確應為30%），與規則規定不符，即本題正解（不適用）。", "技術規則第25條規定總調整率大於30%應排除，本選項描述正確，適用本規則。", "技術規則第26條規定試算價格之間差距達20%以上應排除，本選項描述正確，適用本規則。"], correct:1, note:"總調整率上限應為30%而非20%，此選項不適用（即敘述有誤）。"},
{id:"VB1_113_22", cat:"B1", year:"113年第22題", q:"比較標的於112年9月以3,060萬元售出，當時房價指數為102；勘估標的價格日期為113年5月，房價指數上漲至105。假設其他條件相同，勘估標的經價格日期調整後的應該是多少？", opts:["2,970萬元", "3,150萬元", "3,240萬元", "3,210萬元"], explains:["2,970萬元的計算方向或比例設定有誤。", "價格日期調整公式：調整後價格＝3,060×(105÷102)≈3,150萬元，房價指數上升代表市場呈現上漲趨勢，調整後價格應高於原成交價。", "3,240萬元的計算結果超出正確比例換算範圍。", "3,210萬元同樣與正確比例計算結果有落差。"], correct:1, note:"調整後價格＝3,060×(105÷102)≈3,150萬元。"},
{id:"VB1_114_4", cat:"B1", year:"114年第4題", q:"比較標的為與法定用途不符之交易，應先作適當之調整才能採用，此為何種調整？", opts:["情況調整", "價格日期調整", "區域因素調整", "個別因素調整"], explains:["技術規則第23條第12款明定：比較標的之交易與法定用途不符者，應先作適當調整才能採用，此屬情況調整之範疇。", "價格日期調整處理的是時間差異致價格水準變動，與「法定用途不符」這種交易條件異常無關。", "區域因素調整處理的是區域位置差異，與「法定用途不符」這種交易本身的異常情況無關。", "個別因素調整處理的是標的本身條件差異（面積、形狀等），與交易是否符合法定用途無關，此為交易情況層面的問題，應屬情況調整。"], correct:0, note:null},
{id:"VB1_114_5", cat:"B1", year:"114年第5題", q:"下列價格調整率何者符合不動產估價技術規則之規定？", opts:["區域因素總價格調整率為18%", "個別因素總價格調整率為18%", "個別因素內之任一單獨項目之價格調整率為18%", "情況、價格日期、區域因素及個別因素調整總調整率為18%"], explains:["區域因素總價格調整率18%，若指的是區域因素「內任一單獨項目」調整率，18%已超過技術規則第25條規定的15%單項上限，不符合規定。", "個別因素總價格調整率18%，同樣若指任一單獨項目調整率，18%已超過15%上限，不符合規定。", "個別因素內任一單獨項目之價格調整率18%，已明確超過技術規則第25條規定的15%單項調整率上限，不符合規定。", "情況、價格日期、區域因素及個別因素「調整總調整率」18%，未超過技術規則第25條規定的30%總調整率上限，符合規定。"], correct:3, note:"18%未超過總調整率上限30%，故符合規定；其餘選項18%已超過個別/區域因素單項調整率上限15%，不符合規定。"},
{id:"VB2_100_38", cat:"B2", year:"100年第38題", q:"兩宗土地合併後整體利用，合併後價格為1,000萬元，其合併前價格分別為300萬元及500萬元，則對於原來500萬元之土地，其合併後價格應為：", opts:["600萬元", "700萬元", "625萬元", "425萬元"], explains:["600萬元計算有誤，未正確套用合併增值比例分配公式。", "700萬元計算有誤。", "合併增值法公式：某宗合併後價格＝合併後總價×(該宗合併前價格÷各宗合併前總和)＝1,000×(500÷800)＝625萬元，與本選項相符。", "425萬元計算有誤，方向不正確。"], correct:2, note:"500÷(300+500)＝62.5%；合併後分配價格＝1,000×62.5%＝625萬元。"},
{id:"VB2_106_7", cat:"B2", year:"106年第7題", q:"不動產估價比較法就「畸零地或有合併使用之交易」所進行之調整，是屬於下列何項調整？", opts:["情況調整", "價格日期調整", "區域因素調整", "個別因素調整"], explains:["技術規則明定畸零地或有合併使用之交易，係因買方有合併使用需求而願意支付較高價格，此種因特殊動機造成的價格偏離正常市場，屬於「情況調整」之範疇（交易條件異常須予調整），與題目相符。", "價格日期調整處理的是時間差異致價格水準變動，與合併使用動機無關。", "區域因素調整處理的是區域位置差異，與合併使用動機無關。", "個別因素調整處理的是標的本身條件差異（面積、形狀等），與買方合併使用動機不同（合併使用造成的溢價是情況層面的調整）。"], correct:0, note:null},
{id:"VB2_107_24", cat:"B2", year:"107年第24題", q:"三筆土地分別為1500萬元、2500萬元及6000萬元，今決定將三筆土地合併開發，經評估合併後土地總價值為1億5千萬元，請問相對於原來1500萬元之土地，其合併後價格應為：", opts:["3750萬元", "2250萬元", "9000萬元", "2500萬元"], explains:["3,750萬元計算有誤，可能誤用了不同的計算基礎。", "合併增值法公式：1500萬元那宗合併後價格＝15,000×(1,500÷10,000)＝15,000×0.15＝2,250萬元，與本選項相符。", "9,000萬元明顯偏高，計算有誤。", "2,500萬元計算有誤。"], correct:1, note:"1500÷(1500+2500+6000)＝15%；合併後分配價格＝15,000×15%＝2,250萬元。"},
{id:"VB2_108_4", cat:"B2", year:"108年第4題", q:"設三宗土地合併後整體開發利用，其合併後價格為2,500萬元，合併前價格分別為800萬元、500萬元及700萬元。則對於原來700萬元之土地，其合併後之價格應為何？", opts:["825萬元", "850萬元", "875萬元", "895萬元"], explains:["825萬元計算有誤。", "850萬元計算有誤。", "合併增值法公式：700萬元那宗合併後價格＝2,500×(700÷2,000)＝2,500×0.35＝875萬元，與本選項相符。", "895萬元計算有誤。"], correct:2, note:"700÷(800+500+700)＝35%；合併後分配價格＝2,500×35%＝875萬元。"}
];
const CAT_NAMES = {"B1": "B1 比較法-調整", "B2": "B2 比較法-合併分配"};

let activeCats = new Set(Object.keys(CAT_NAMES));
let answers = {};   // id -> {selected, correct}
let errorTags = {}; // id -> 'A'|'B'|'C'
let viewFilter = 'all'; // all | unanswered | wrong

const qlistEl = document.getElementById('qlist');
const chipsEl = document.getElementById('chips');

async function loadData(){
  try{
    const res = await window.storage.get('valuation_practice_b_v2_answers');
    if(res && res.value) answers = JSON.parse(res.value);
  }catch(e){ answers = {}; }
  try{
    const res2 = await window.storage.get('valuation_practice_b_v2_errortags');
    if(res2 && res2.value) errorTags = JSON.parse(res2.value);
  }catch(e){ errorTags = {}; }
}
async function saveAnswers(){
  try{ await window.storage.set('valuation_practice_b_v2_answers', JSON.stringify(answers)); }catch(e){}
}
async function saveErrorTags(){
  try{ await window.storage.set('valuation_practice_b_v2_errortags', JSON.stringify(errorTags)); }catch(e){}
}

Object.keys(CAT_NAMES).forEach(cat=>{
  const chip = document.createElement('div');
  chip.className = 'chip active';
  chip.textContent = CAT_NAMES[cat];
  chip.dataset.cat = cat;
  chip.addEventListener('click', ()=>{
    if(activeCats.has(cat)){
      if(activeCats.size===1) return;
      activeCats.delete(cat); chip.classList.remove('active');
    } else {
      activeCats.add(cat); chip.classList.add('active');
    }
    renderList();
  });
  chipsEl.appendChild(chip);
});

function updateStatbar(){
  let answeredCount=0, ok=0, ng=0;
  Object.values(answers).forEach(a=>{
    answeredCount++;
    if(a.correct) ok++; else ng++;
  });
  document.getElementById('answeredCount').textContent = answeredCount;
  document.getElementById('okCount').textContent = ok;
  document.getElementById('ngCount').textContent = ng;
  document.getElementById('accRate').textContent = answeredCount ? Math.round(ok/answeredCount*100)+'%' : '—';
}

function renderList(){
  qlistEl.innerHTML = '';
  let pool = ITEMS.filter(it=>activeCats.has(it.cat));
  if(viewFilter==='unanswered') pool = pool.filter(it=>!answers[it.id]);
  if(viewFilter==='wrong') pool = pool.filter(it=>answers[it.id] && !answers[it.id].correct);

  pool.forEach(it=>{
    const a = answers[it.id];
    const div = document.createElement('div');
    div.className = 'qcard' + (a ? ' answered ' + (a.correct?'correct':'wrong') : '');

    const letters = ['A','B','C','D'];
    let optsHtml = '';
    it.opts.forEach((opt,i)=>{
      let cls = 'opt';
      if(a){
        if(i===it.correct) cls += ' correct-answer';
        else if(i===a.selected) cls += ' wrong-selected';
      }
      optsHtml += `<div class="${cls}" data-idx="${i}"><span class="letter">${letters[i]}</span><span>${opt}</span></div>`;
    });

    let explainHtml = '';
    if(a && it.explains && it.explains.some(e=>e)){
      explainHtml = '<div class="explain-box"><div class="explain-title">📚 逐選項解析</div>';
      it.opts.forEach((opt,i)=>{
        const isCorrect = i===it.correct;
        const mark = isCorrect ? '✓' : '✗';
        const cls = isCorrect ? 'explain-item right' : 'explain-item';
        const expText = (it.explains && it.explains[i]) ? it.explains[i] : '';
        explainHtml += `<div class="${cls}"><span class="explain-letter">${letters[i]}${mark}</span><span>${expText}</span></div>`;
      });
      explainHtml += '</div>';
    }

    let noteHtml = '';
    if(a && it.note){
      noteHtml = `<div class="note-box"><b>📌 補充說明：</b>${it.note}</div>`;
    }

    let errorTagHtml = '';
    if(a && !a.correct){
      const tag = errorTags[it.id] || '';
      errorTagHtml = `<div class="error-tag-row">
        <span class="error-tag${tag==='A'?' active-a':''}" data-tag="A">A 法條混淆</span>
        <span class="error-tag${tag==='B'?' active-b':''}" data-tag="B">B 粗心</span>
        <span class="error-tag${tag==='C'?' active-c':''}" data-tag="C">C 真的不熟</span>
      </div>`;
    }

    div.innerHTML = `
      <div class="qhead">
        <span class="qbadge">${CAT_NAMES[it.cat]}</span>
        <span class="qyear">${it.year}</span>
      </div>
      <div class="qtext">${it.q}</div>
      <div class="opt-list">${optsHtml}</div>
      ${explainHtml}
      ${noteHtml}
      ${errorTagHtml}
    `;

    if(!a){
      div.querySelectorAll('.opt').forEach(optEl=>{
        optEl.addEventListener('click', ()=>{
          const idx = parseInt(optEl.dataset.idx);
          const correct = (idx === it.correct);
          answers[it.id] = {selected: idx, correct: correct};
          saveAnswers();
          updateStatbar();
          renderList();
        });
      });
    } else {
      div.querySelectorAll('.error-tag').forEach(tagEl=>{
        tagEl.addEventListener('click', ()=>{
          const tag = tagEl.dataset.tag;
          errorTags[it.id] = (errorTags[it.id]===tag) ? null : tag;
          saveErrorTags();
          renderList();
        });
      });
    }

    qlistEl.appendChild(div);
  });

  if(!pool.length){
    qlistEl.innerHTML = '<p style="text-align:center;color:var(--ink-soft);padding:30px 0;">沒有符合篩選條件的題目</p>';
  }
}

document.getElementById('filterAll').addEventListener('click', ()=>{ viewFilter='all'; setActiveFilterBtn('filterAll'); renderList(); });
document.getElementById('filterUnanswered').addEventListener('click', ()=>{ viewFilter='unanswered'; setActiveFilterBtn('filterUnanswered'); renderList(); });
document.getElementById('filterWrong').addEventListener('click', ()=>{ viewFilter='wrong'; setActiveFilterBtn('filterWrong'); renderList(); });
function setActiveFilterBtn(id){
  ['filterAll','filterUnanswered','filterWrong'].forEach(bid=>{
    document.getElementById(bid).classList.toggle('primary', bid===id);
  });
}

document.getElementById('resetAllBtn').addEventListener('click', resetAll);
document.getElementById('resetMastery').addEventListener('click', resetAll);
async function resetAll(){
  if(!confirm('確定要清除所有作答紀錄與錯題標記嗎？此動作無法復原。')) return;
  answers = {};
  errorTags = {};
  await saveAnswers();
  await saveErrorTags();
  updateStatbar();
  renderList();
}

(async function init(){
  await loadData();
  updateStatbar();
  renderList();
})();
</script>
</body>
</html>
