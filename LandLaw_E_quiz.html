<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandLaw E quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>:root{--paper:#F8F3E9;--ink:#2A2722;--stamp:#A8402B;--gold:#BC8A2E;--green:#4C7A52;--blue:#3A5A7A;--line:#D8CDB8;--expbg:#EDF3F8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;}
.app{max-width:760px;margin:0 auto;padding:14px 14px 60px;}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.25rem;text-align:center;margin:10px 0 2px;}
.sub{text-align:center;font-size:.75rem;color:#6b6354;margin-bottom:12px;}
.badge{background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
.filter-bar{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.filter-label{font-weight:700;font-size:.8rem;margin-bottom:8px;}
.ch-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:.74rem;padding:5px 12px;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--ink);}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.filter-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{font-size:.78rem;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
.btn-sm.red{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.progress-panel{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#6b6354;}
.prog-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}
.prog-text{white-space:nowrap;font-weight:700;color:var(--ink);}
.ch-header{font-family:"Noto Serif TC",serif;font-weight:700;font-size:.9rem;color:var(--blue);padding:10px 0 6px;border-bottom:2px solid var(--blue);margin-bottom:10px;margin-top:16px;}
.qcard{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
.qcard.answered-ok{border-left:4px solid var(--green);}
.qcard.answered-ng{border-left:4px solid var(--stamp);}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#8a7f72;margin-bottom:8px;}
.qtag{background:var(--blue);color:#fff;font-size:.64rem;padding:2px 7px;border-radius:8px;}
.qtext{font-family:"Noto Serif TC",serif;font-size:.96rem;line-height:1.75;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;text-align:left;width:100%;font-size:.88rem;line-height:1.5;color:var(--ink);}
.opt:disabled{cursor:default;}
.ltr{flex-shrink:0;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-weight:700;font-size:.76rem;}
.opt.ok{border-color:var(--green);background:#eef6ef;}
.opt.ok .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.opt.ng{border-color:var(--stamp);background:#fbeeec;}
.opt.ng .ltr{background:var(--stamp);color:#fff;border-color:var(--stamp);}
.opt.show-correct{border-color:var(--green);background:#eef6ef;}
.opt.show-correct .ltr{background:var(--green);color:#fff;border-color:var(--green);}
.expbox{display:none;margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--blue);}
.expbox.show{display:block;}
.exph{background:var(--blue);color:#fff;font-size:.73rem;font-weight:700;padding:6px 12px;}
.expb{background:var(--expbg);padding:10px 12px;}
.ei{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid #d0dae6;font-size:.81rem;line-height:1.6;}
.ei:last-child{border-bottom:none;}
.el{flex-shrink:0;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-weight:700;font-size:.7rem;margin-top:2px;}
.el.ok{background:var(--green);color:#fff;}.el.no{background:#b0b8c4;color:#fff;}.el.ng{background:var(--stamp);color:#fff;}
.verdict{font-family:"Noto Serif TC",serif;font-weight:900;font-size:.82rem;padding:3px 12px;border-radius:6px;margin-bottom:7px;display:inline-block;transform:rotate(-2deg);}
.verdict.ok{border:2px solid var(--green);color:var(--green);}.verdict.ng{border:2px solid var(--stamp);color:var(--stamp);}</style>
</head>
<body>
<div class="app">
<h1>土地法 E篇 考題解析 <span class="badge">可自由瀏覽</span></h1>
<div class="sub">E1 地價稅 ／ E2 土地增值稅｜共 73 題</div>
<div class="filter-bar">
  <div class="filter-label">顯示章節</div>
  <div class="ch-pills" id="pills"></div>
  <div class="filter-actions">
    <button class="btn-sm" onclick="selAll()">全選</button>
    <button class="btn-sm" onclick="selNone()">清空</button>
    <button class="btn-sm red" onclick="resetAll()">重置作答</button>
  </div>
</div>
<div class="progress-panel">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text"><span id="pd">0</span>/<span id="pt">0</span> 已答・正確率 <span id="pr">-</span></div>
</div>
<div id="list"></div>
</div>
<script>const CARDS=[{"ch": "E1 地價稅", "year": "99", "num": 29, "q": "依土地稅法之規定，地價稅或田賦之納稅義務人，下列何者錯誤？", "opts": ["設有典權土地，為出典人", "承領土地，為承領人", "承墾土地，為耕作權人", "土地所有權人"], "ans": 0, "exps": ["✓ 本題問「何者錯誤」。土地稅法第3條：設有典權土地，地價稅納稅義務人為「典權人」（非出典人）。典權人取得使用收益權，故由其負擔地價稅，本選項說出典人是錯誤的，為本題答案。", "❌ 本選項描述正確，承領土地的納稅義務人是承領人，非錯誤。", "❌ 本選項描述正確，承墾土地的納稅義務人是耕作權人，非錯誤。", "❌ 本選項描述正確，一般土地以所有權人為納稅義務人，這是最基本原則，非錯誤。"]}, {"ch": "E1 地價稅", "year": "100", "num": 2, "q": "下列何種用地不得申請適用優惠稅率課徵地價稅？", "opts": ["私立動物園用地", "農會辦公廳用地", "國民住宅用地", "勞工宿舍用地"], "ans": 1, "exps": ["❌ 私立動物園是供事業直接使用的用地類型之一，可適用千分之十的優惠稅率（不是基本稅率以外的優惠，但題目問的是「不得申請優惠稅率」，動物園仍可申請）。", "✓ 農會辦公廳是農會的行政辦公場所，不屬於土地稅法規定可申請優惠稅率（如自用住宅、勞工宿舍、工業用地、私立動物園等）的法定類型，故不得申請優惠稅率課徵地價稅。", "❌ 國民住宅用地可適用千分之二的優惠稅率，屬於得申請優惠稅率的類型。", "❌ 企業或公營事業興建之勞工宿舍用地可適用千分之二優惠稅率，屬於得申請優惠稅率的類型。"]}, {"ch": "E1 地價稅", "year": "100", "num": 3, "q": "依土地稅法規定，下列何者非為地價稅或田賦之納稅義務人？", "opts": ["土地所有權人", "設有抵押權土地，為抵押權人", "設有典權土地，為典權人", "承領土地，為承領人"], "ans": 1, "exps": ["❌ 土地所有權人是地價稅最基本的納稅義務人，屬於法定納稅義務人。", "✓ 抵押權人不在土地稅法第3條規定的納稅義務人清單內。抵押權是擔保物權，抵押權人不使用收益土地，故不負擔地價稅；地價稅仍由土地所有權人（設定抵押權的債務人）繳納。本選項「抵押權人」是虛構的納稅義務人類型，為本題正確答案。", "❌ 設有典權土地，典權人是法定納稅義務人（因典權人使用收益土地），屬之。", "❌ 承領土地的納稅義務人是承領人，屬法定納稅義務人。"]}, {"ch": "E1 地價稅", "year": "100", "num": 24, "q": "有關都市計畫公共設施保留地之使用及稅賦，下列何者有誤？", "opts": ["不得為妨礙其指定目的之使用", "未取得前，得申請為臨時建築使用", "一般非住宅使用依基本稅率課徵地價稅", "未作任何使用並與使用中之土地隔離者，免徵地價稅"], "ans": 2, "exps": ["❌ 本選項描述正確，公設保留地不得為妨礙指定目的之使用，符合都市計畫法規定，非有誤。", "❌ 本選項描述正確，公設保留地未取得前得申請臨時建築使用，非有誤。", "✓ 本選項為錯誤敘述：公設保留地若仍為「建築使用」者（非住宅），是按「千分之十（10‰）統一稅率」課徵（不適用累進稅率），不是「基本稅率」（基本稅率10‰看似相同但本質不同——基本稅率是累進稅率的第一級，公設保留地的10‰是「不累進」的固定稅率）。本題的陷阱在於混淆了「基本稅率」（會累進）和「公設保留地統按10‰不累進」兩個概念。", "❌ 本選項描述正確，與使用中土地隔離且未作使用的公設保留地免徵地價稅，非有誤。"]}, {"ch": "E1 地價稅", "year": "101", "num": 24, "q": "依土地稅法規定，以土地為信託財產，信託利益之受益人為委託人者，其地價稅之計算，該土地應與誰在同一直轄市或縣（市）轄區內所有之土地合併計算地價總額？", "opts": ["委託人", "受託人", "受益人", "由受託人與受益人推派一人"], "ans": 0, "exps": ["✓ 土地稅法第3條之1：以土地為信託財產，受益人與委託人不同人時，地價稅納稅義務人為受託人；但「信託利益之受益人為委託人」時（即委託人＝受益人，自益信託），該土地應與「委託人」在同一直轄市或縣市所有之土地合併計算地價總額（避免委託人透過信託把土地分散到受託人名下，規避累進稅率）。", "❌ 一般情形（受益人非委託人）的納稅義務人是受託人沒錯，但本題問的是「信託利益之受益人為委託人」這種特殊情形下，地價總額應與誰合併計算，答案是委託人（因為實質受益人就是委託人本人），非受託人。", "❌ 本題情形下受益人即委託人本人，但合併計算地價總額的對象法條明文是「委託人」（強調身分的合併計算目的），非單純說「受益人」。", "❌ 此選項為虛構規定，法條並無「推派一人」的機制。"]}, {"ch": "E1 地價稅", "year": "101", "num": 26, "q": "依土地稅法地價稅稅率之規定，下列敘述何者錯誤？", "opts": ["公有土地供公共使用者，稅率千分之十", "基本稅率為百分之一", "自用住宅用地稅率為千分之二", "地價總額超過累進起點地價未逹五倍者，就其超過部分課徵千分之十五"], "ans": 0, "exps": ["✓ 本選項為本題「錯誤」的答案：公有土地供公共使用者是「免徵」地價稅（非按10‰課徵），這是土地稅法第19條的明文規定。本選項把「免徵」誤植為「課徵10‰」，為本題答案。", "❌ 本選項描述有誤：基本稅率應為「千分之十（10‰）」，不是「百分之一（1%，等於10‰）」——雖然數值相同，但題目陷阱在於用詞混淆，但官方答案是A，故B選項在數值上其實等同10‰，並非本題錯誤答案的重點。", "❌ 本選項描述正確，自用住宅用地優惠稅率為2‰，非錯誤。", "❌ 本選項描述正確，符合地價稅累進稅率第二級規定，非錯誤。"]}, {"ch": "E1 地價稅", "year": "102", "num": 16, "q": "依土地稅法規定，企業或公營事業興建之勞工宿舍，自動工興建或取得土地所有權之日起，其用地之地價稅適用何項稅率計徵？", "opts": ["千分之二", "千分之十", "千分之六", "千分之十五"], "ans": 0, "exps": ["✓ 土地稅法第18條：國民住宅、企業或公營事業興建之勞工宿舍用地，自動工興建或取得土地所有權之日起，按「千分之二」優惠稅率計徵地價稅。2‰與自用住宅用地稅率相同，是對勞工居住權益的保障性規定。", "❌ 10‰是基本稅率，不是勞工宿舍用地的優惠稅率。", "❌ 6‰不是法定的勞工宿舍優惠稅率。", "❌ 15‰是累進稅率第二級，不是優惠稅率。"]}, {"ch": "E1 地價稅", "year": "102", "num": 18, "q": "都市計畫公共設施保留地，在保留期間未作任何使用並與使用中之土地隔離者，其地價稅之課徵如何處理？", "opts": ["按千分之二", "按千分之六", "免徵地價稅", "減半徵收地價稅"], "ans": 2, "exps": ["❌ 2‰是自用住宅用地稅率，不是公設保留地未作使用且隔離情形的稅率。", "❌ 6‰不是法定稅率，為干擾選項。", "✓ 土地稅法第19條：都市計畫公共設施保留地，在保留期間「未作任何使用並與使用中之土地隔離者」，免徵地價稅。這是與「仍為建築使用」（按10‰課徵）相對的另一種情形，務必區分清楚：有使用（仍為建築使用）→10‰；無使用且隔離→免徵。", "❌ 減半徵收不是公設保留地未作使用情形的處理方式，正確是免徵（全免，不是減半）。"]}, {"ch": "E1 地價稅", "year": "102", "num": 23, "q": "某甲所有土地之申報地價總額，超過當地累進起點地價五倍至十倍者，就其超過部分課徵之地價稅稅率為何？", "opts": ["千分之三十五", "千分之四十五", "千分之二十五", "千分之十五"], "ans": 2, "exps": ["❌ 35‰是超過10倍至15倍的稅率，不是5倍至10倍的稅率。", "❌ 45‰是超過15倍至20倍的稅率。", "✓ 地價稅累進稅率第三級：超過累進起點地價5倍至10倍者，就超過部分課徵「25‰」。這是最常見的數字陷阱——很多人誤以為應該是20‰（按等差5‰遞增），但實際上第一級到第二級是+5‰（10→15），第二級到第三級卻是+10‰（15→25），之後每級距固定+10‰（25→35→45→55）。", "❌ 15‰是超過起點未達5倍的稅率（第二級），不是5至10倍的稅率。"]}, {"ch": "E1 地價稅", "year": "102", "num": 40, "q": "土地稅法所稱公共設施尚未完竣前之「公共設施」，係指下列何者？", "opts": ["道路、自來水、排水系統、電信", "自來水、排水系統、電力、焚化設施", "電力、電信、排水系統、焚化設施", "道路、自來水、排水系統、電力"], "ans": 3, "exps": ["❌ 電信不在法定四項公共設施清單內，正確是電力，非電信。", "❌ 焚化設施不在法定四項清單內，且缺少道路。", "❌ 電信和焚化設施都不在法定清單內，且缺少道路和自來水。", "✓ 土地稅法施行細則所稱「公共設施尚未完竣前」的公共設施，係指「道路、自來水、排水系統、電力」四項基礎建設。這四項是判斷田賦或地價稅課徵與否的重要基準（公共設施未完竣前仍課徵田賦）。"]}, {"ch": "E1 地價稅", "year": "103", "num": 12, "q": "某甲擁有A、B兩筆住宅區土地，A地當年度課徵地價稅之申報地價為5,000元/m2，面積100m2，B地當年度課徵地價稅之申報地價為2,000元/m2，面積200m2，某甲將B地信託與某乙，某乙名下無任何土地，某甲享有全部信託利益，信託10年，目前尚有3年信託期滿，若A、B兩筆土地均在同一縣市，該縣市當年度累進起點地價為100萬元，若某甲當年度未申請A、B兩地為自用住宅用地，則某甲當年度應繳地價稅為：", "opts": ["5,000元", "9,000元", "4,000元", "3,000元"], "ans": 0, "exps": ["✓ 計算過程：甲名下用於計算地價稅的土地只有A地（B地已信託給乙，依信託土地的地價稅計算規則，若信託利益受益人非委託人本人，地價稅是用受託人名義計算，B地的地價稅不會併入甲的地價總額）。A地申報地價5,000元/m2×100m2=50萬元，未達累進起點地價100萬元，故按基本稅率10‰計算：50萬×10‰=5,000元。本題的陷阱是B地信託給乙（乙無其他土地），乙才是B地地價稅的計算對象，不併入甲的計算。", "❌ 此數字是把A、B兩地地價合併計算的結果（50萬+40萬=90萬，未達100萬，90萬×10‰=9,000元），但B地已信託給乙，不應併入甲的計算基礎。", "❌ 數字計算有誤，不符合正確的計算邏輯。", "❌ 數字計算有誤，不符合正確的計算邏輯。"]}, {"ch": "E1 地價稅", "year": "103", "num": 13, "q": "依據土地稅法及相關法律之規定，下列有關地價稅稅率之敘述何者正確？", "opts": ["工業用地按目的事業主管機關核定規劃使用者，地價稅稅率為千分之十且不累進", "經主管機關依法指定之私有古蹟及歷史建築所定著之土地，免徵地價稅", "企業或公營事業興建之勞工宿舍用地，自動工興建或取得土地所有權之日起，其用地免徵地價稅", "都市計畫公共設施保留地，在保留期間仍為建築使用，除自用住宅用地外，地價稅稅率為千分之十且不累進"], "ans": 0, "exps": ["✓ 土地稅法第18條：工業用地、礦業用地、私立公園動物園體育場等供事業直接使用之用地，按「千分之十（10‰）」計徵地價稅，且「不適用累進稅率」（固定稅率，不論面積大小都是10‰）。本選項正確描述了工業用地稅制的兩個關鍵：稅率10‰、不累進。", "❌ 本選項描述正確（古蹟歷史建築用地免徵），但本題要選「正確」的答案，A、B兩選項描述都正確，以官方答案A為準（A最直接對應題目核心，工業用地不累進是高頻考點）。", "❌ 勞工宿舍用地是按「千分之二（2‰）優惠稅率」計徵，不是「免徵」，本選項描述錯誤。", "❌ 本選項描述其實也大致正確（10‰不累進），但「不累進」與「免徵」的差異是本題重點，以官方答案A為唯一正確選項。"]}, {"ch": "E1 地價稅", "year": "103", "num": 14, "q": "小張在某縣市僅擁有一筆住宅區之土地，面積為400平方公尺，當年度課徵地價稅的申報地價為2,000元/m2，土地上未有建物，小張想申請適用自用住宅優惠稅率，該縣市當年度累進起點地價為100萬元，小張當年度在該縣市應繳地價稅為：", "opts": ["1,600元", "8,000元", "3,200元", "4,000元"], "ans": 1, "exps": ["❌ 此數字未正確套用自用住宅用地優惠稅率2‰計算。", "✓ 計算過程：申報地價2,000元/m2×400m2=80萬元，未超過累進起點地價100萬元，可適用自用住宅用地優惠稅率2‰。但需注意：小張「未有建物」（土地上未有建物），這與自用住宅用地要件（須有合法建物供本人居住）不符——若依此邏輯應無法適用優惠稅率，但官方答案仍以80萬×10‰=8萬元計算（按基本稅率），但選項給的是8,000元，代表計算基準應重新檢視：80萬×10‰=8萬元（80,000元）不等於8,000元。正確解法：小張未申請自用住宅優惠（因無建物不符要件），故按基本稅率10‰計算：80萬×10‰=8,000元（這裡的「萬」單位應理解為總價80萬元，乘以10‰=8,000元的計算，與面積400m2和申報地價2,000元/m2相乘的80萬元一致）。本題答案8,000元是按基本稅率10‰計算（非自用住宅2‰），因小張未有建物不符自用住宅要件。", "❌ 此數字若用80萬×4‰計算，但4‰非任何法定稅率，不符合計算邏輯。", "❌ 此數字若用80萬×5‰計算，5‰也非法定稅率，不符合計算邏輯。"]}, {"ch": "E1 地價稅", "year": "103", "num": 22, "q": "老王有兩筆公共設施保留地，A地100m2及B地150m2，分別位於桃園縣及苗栗縣，A地為自用住宅使用，且地上有合法建物為老王所有，供全家居住，B地則未作任何使用並與鄰地隔離，若老王名下只有這兩筆公共設施保留地，A地當年度公告地價為40,000元/m2，B地當年度公告地價為20,000元/m2，若老王未申報地價，請問對老王當年度最低應繳之地價稅總額為：", "opts": ["免繳地價稅", "6,400元", "8,000元", "3,200元"], "ans": 1, "exps": ["❌ A地有合法建物供居住，依公設保留地未作使用免徵的規則不適用於A地（A地有使用），故A地仍須課稅，不可能全部免繳。", "✓ A地：自用住宅使用且為公設保留地，依規定除自用住宅優惠依土地稅法第17條外，公設保留地統按10‰計徵（不適用累進，但若同時符合自用住宅要件可適用更低的2‰，本題以最低應繳稅額計算，採2‰）。A地100m2×40,000元/m2=400萬元，但老王未申報地價，依規定以公告地價80%為申報地價：400萬×80%=320萬元，按自用住宅2‰計算：320萬×2‰=6,400元。B地未作使用且與鄰地隔離，符合免徵地價稅要件（B地150m2×20,000元/m2不需計算，因為免徵）。故老王最低應繳地價稅總額=A地6,400元+B地0元=6,400元。", "❌ 此數字未正確扣除B地的免徵部分，或計算基礎有誤。", "❌ 此數字計算過程有誤，未正確反映題目條件。"]}, {"ch": "E1 地價稅", "year": "103", "num": 24, "q": "下列有關都市土地徵收田賦之敘述，何者正確？", "opts": ["公共設施完竣仍作農業用地使用者", "依法限制建築或不能建築，仍作農業用地使用者", "依都市計畫編為農業區及保護區之所有土地使用者", "依都市計畫編為公共設施保留地之所有土地使用者"], "ans": 1, "exps": ["❌ 公共設施已完竣的都市土地，即使仍作農業使用，原則上應改課地價稅（非田賦），因為公共設施完竣代表該地已具備建築發展條件。", "✓ 土地稅法第22條：都市土地合於下列規定者徵收田賦：依法限制建築，仍作農業用地使用者；依法不能建築使用，仍作農業用地使用者；公共設施尚未完竣前，仍作農業用地使用者；依都市計畫編為公共設施保留地，仍作農業用地使用者。本選項「依法限制建築或不能建築」是徵收田賦（而非地價稅）的法定情形之一。", "❌ 都市計畫農業區、保護區「使用」不是徵收田賦的完整要件，需「仍作農業用地使用」且符合其他條件（限制建築等），單純劃定為農業區保護區不等於課田賦。", "❌ 公設保留地若仍作農業使用才課田賦，「所有土地使用者」的描述過於籠統，不夠精確（且公設保留地若有其他使用如臨時建築，則不適用田賦）。"]}, {"ch": "E1 地價稅", "year": "103", "num": 27, "q": "按千分之十計徵地價稅之供事業直接使用之土地，不包括下列那一項？", "opts": ["工業用地", "農業用地", "礦業用地", "動物園"], "ans": 1, "exps": ["❌ 工業用地是按10‰計徵的供事業直接使用土地之一，屬之。", "✓ 土地稅法第18條「供事業直接使用，按10‰計徵」的清單包括：工業用地、礦業用地、私立公園、動物園、體育場等，但「不包括農業用地」。農業用地另有專屬的田賦或農地地價稅優惠規定，不適用10‰供事業使用的條款。", "❌ 礦業用地是按10‰計徵的供事業直接使用土地之一，屬之。", "❌ 私立動物園是按10‰計徵的供事業直接使用土地之一，屬之。"]}, {"ch": "E1 地價稅", "year": "103", "num": 33, "q": "下列關於地價稅累進課徵之規定，何者正確？", "opts": ["超過累進起點地價未達五倍者，就其超過部分課徵千分之十五", "超過累進起點地價五倍至十倍者，就其超過部分課徵千分之二十", "超過累進起點地價十倍至十五倍者，就其超過部分課徵千分之二十五", "超過累進起點地價十五倍以上者，就其超過部分課徵千分之三十"], "ans": 0, "exps": ["✓ 地價稅累進稅率第二級：超過起點未達5倍，課徵15‰。本選項正確描述了第二級稅率。", "❌ 5至10倍的稅率是25‰（不是20‰），這是最常見的混淆陷阱，因為直覺上會以為每級遞增5‰，但實際上第二到第三級是遞增10‰。", "❌ 25‰是5至10倍的稅率，10至15倍應為35‰，本選項數字錯位。", "❌ 30‰不是任何級距的法定稅率，且「十五倍以上」應再分15-20倍（45‰）和20倍以上（55‰）兩級，本選項描述籠統且數字錯誤。"]}, {"ch": "E1 地價稅", "year": "104", "num": 31, "q": "工業用地之土地所有權人申請按千分之十計徵地價稅，應於何時提出申請，逾期申請者，自申請之次年期開始適用？", "opts": ["每年八月三十一日", "每年九月三十日", "每年（期）地價稅開徵四十日前", "每年（期）地價稅開徵六十日前"], "ans": 2, "exps": ["❌ 8月31日不是法定申請期限。", "❌ 9月30日不是法定申請期限。", "✓ 工業用地申請按10‰計徵地價稅，應於「每年（期）地價稅開徵四十日前」提出申請，逾期申請者自次年期才開始適用。40日是本題的固定數字考點。", "❌ 60日不是法定申請期限，為干擾選項。"]}, {"ch": "E1 地價稅", "year": "105", "num": 3, "q": "有關地價稅之特別稅率，下列何項用地不適用千分之二之特別稅率？", "opts": ["公有供公共使用土地", "國民住宅用地", "自用住宅用地", "公共設施保留地供自用住宅使用者"], "ans": 0, "exps": ["✓ 公有土地供公共使用者，依土地稅法第19條是「免徵」地價稅（不是按2‰課徵），故不適用2‰特別稅率，這正是本題「不適用2‰」的答案。", "❌ 國民住宅用地適用2‰特別稅率，屬於適用範圍。", "❌ 自用住宅用地是2‰特別稅率最典型的適用對象，屬於適用範圍。", "❌ 公設保留地若同時符合自用住宅要件，仍可適用2‰特別稅率（除外規定），屬於適用範圍。"]}, {"ch": "E1 地價稅", "year": "105", "num": 7, "q": "地價稅採累進稅率，關於累進起點地價之規定，下列何者正確？", "opts": ["以各該直轄市或縣（市）土地扣除工業用地、礦業用地、農業用地及免稅土地後5公畝之平均地價為準", "以各該直轄市或縣（市）土地扣除工業用地、礦業用地、農業用地及免稅土地後7公頃之平均地價為準", "以各該直轄市或縣（市）土地扣除工業用地、礦業用地、農業用地及免稅土地後7公畝之平均地價為準", "以各該直轄市或縣（市）土地扣除工業用地、礦業用地、農業用地及免稅土地後5公頃之平均地價為準"], "ans": 2, "exps": ["❌ 5公畝不是法定數字，正確是7公畝。", "❌ 公頃（100倍於公畝）的單位錯誤，正確單位是公畝，不是公頃。", "✓ 平均地權條例第16條／土地稅法施行細則：累進起點地價以各該直轄市或縣市土地，扣除工業用地、礦業用地、農業用地及免稅土地後，「7公畝」之平均地價為準。7公畝是固定數字，單位是公畝（非公頃），這是E1最基本的數字考點。", "❌ 5公頃既數字錯誤又單位錯誤，雙重不符。"]}, {"ch": "E1 地價稅", "year": "106", "num": 18, "q": "甲之土地於106年10月1日贈與並移轉登記予乙，請問106年期地價稅之納稅義務人為何？", "opts": ["甲", "乙", "甲乙協議", "甲乙依持有月數分別負擔"], "ans": 0, "exps": ["✓ 土地稅法第4條之2精神／地價稅以「課稅年度（期）開始時」的土地登記名義人為納稅義務人。106年地價稅開徵基準日通常是每年8月31日（地價稅以每年8月31日為納稅義務基準日，課稅期間是當年1月1日至12月31日），土地在106年10月1日才移轉登記給乙，此時已過了地價稅的納稅義務基準日，故106年期地價稅仍由「甲」（原所有權人）負擔，乙要等到107年（次年期）才開始負擔。", "❌ 乙是10月1日後才取得所有權，已過該年度地價稅的納稅義務基準日，故106年期地價稅不由乙負擔。", "❌ 地價稅的納稅義務人是依法定基準日認定，不是由雙方協議決定。", "❌ 地價稅不是按持有月數比例分擔（這是田賦或部分稅捐才有的按月比例計算方式），地價稅是以基準日認定整年度的納稅義務人，非比例分擔。"]}, {"ch": "E1 地價稅", "year": "106", "num": 34, "q": "下列敘述之地價稅稅率，何者錯誤？", "opts": ["自用住宅用地之地價稅稅率是2‰", "依都市計畫法規定設置供公眾使用之停車場用地之地價稅稅率是10‰", "公有非公用土地之地價稅稅率是10‰", "都市計畫公共設施保留地，在保留期間仍為建築使用者，地價稅稅率是10‰"], "ans": 3, "exps": ["❌ 本選項描述正確，2‰是自用住宅用地的法定優惠稅率，非錯誤。", "❌ 本選項描述正確，停車場用地按10‰計徵，符合法定規定，非錯誤。", "❌ 本選項描述正確，公有非公用土地按基本稅率10‰課徵（區別於公有「供公共使用」土地是免徵），非錯誤。", "✓ 本選項看似正確（10‰確實是公設保留地仍建築使用的稅率），但本題問「何者錯誤」——本選項缺少了「不適用累進稅率」的重要限定詞，若考生理解為「按10‰累進」則是錯誤的，因為公設保留地的10‰是「統一不累進」的固定稅率，與一般土地超過起點才按10‰起跳並逐級累進的概念不同。本題以此細微差異為陷阱，列為「錯誤」的選項。"]}, {"ch": "E1 地價稅", "year": "107", "num": 19, "q": "下列土地關係人，何者非屬土地稅法第3條所定之地價稅納稅義務人？", "opts": ["承領土地，為承領人", "承墾土地，為耕作權人", "權屬不明土地，為主管稅捐稽徵機關指定之土地使用人", "設有典權土地，為典權人"], "ans": 2, "exps": ["❌ 本選項描述正確，承領人是法定納稅義務人，非錯誤。", "❌ 本選項描述正確，耕作權人是法定納稅義務人，非錯誤。", "✓ 本選項為錯誤敘述：土地稅法第3條規定的「納稅義務人」是所有權人、典權人、承領人、耕作權人、受託人這幾種固定身分；「土地使用人」是在權屬不明等特殊情形下被「指定代繳」的人，屬於土地稅法第4條的「代繳義務人」，不是第3條規定的「納稅義務人」。本選項混淆了「納稅義務人」與「代繳義務人」兩個不同概念，為本題答案。", "❌ 本選項描述正確，典權人是法定納稅義務人，非錯誤。"]}, {"ch": "E1 地價稅", "year": "107", "num": 20, "q": "土地為信託財產者，於信託關係存續中，以何人為地價稅或田賦之納稅義務人？", "opts": ["委託人", "受託人", "受益人", "信託監察人"], "ans": 1, "exps": ["❌ 一般情形委託人不是地價稅納稅義務人（除非是「受益人為委託人」的特殊情形，此時是合併計算地價總額的對象，但納稅義務人本身仍是受託人）。", "✓ 土地稅法第3條之1：土地為信託財產者，於信託關係存續中，以「受託人」為地價稅或田賦之納稅義務人。受託人是信託財產的名義持有人，負責土地的管理使用，故由其負擔地價稅。", "❌ 受益人享有信託利益，但不是地價稅的法定納稅義務人，除非受益人同時為委託人時才有合併計算地價總額的特殊處理（但仍非「納稅義務人」本身）。", "❌ 信託監察人是監督信託執行的角色，不是地價稅納稅義務人。"]}, {"ch": "E1 地價稅", "year": "107", "num": 22, "q": "自用住宅用地得適用優惠稅率課徵地價稅，下列有關自用住宅用地要件之敘述，何者錯誤？", "opts": ["須土地所有權人或其配偶、直系親屬於該地有居住事實並辦竣戶籍登記", "須為無出租或供營業使用之住宅用地", "土地面積，都市土地未超過三公畝部分，非都市土地未超過七公畝部分", "土地上之建築改良物屬土地所有權人或其配偶、直系親屬所有者為限"], "ans": 0, "exps": ["✓ 本選項為錯誤敘述：自用住宅用地的要件是「辦竣戶籍登記」，法條並未要求「有居住事實」這個額外條件（雖然實務上通常同時存在，但法條文字僅要求戶籍登記要件，未明文要求「居住事實」作為審查標準，本選項加了「有居住事實」這個非法條明文要求的條件，使描述變得不準確，為本題錯誤答案）。", "❌ 本選項描述正確，無出租無營業是法定要件之一，非錯誤。", "❌ 本選項描述正確，3公畝/7公畝是法定面積上限，非錯誤。", "❌ 本選項描述正確，建物所有權須屬本人配偶或直系親屬，符合法定要件，非錯誤。"]}, {"ch": "E1 地價稅", "year": "108", "num": 7, "q": "下列有關平均地權條例及土地稅法中有關累進課地價稅之敘述，何者正確？", "opts": ["超過累進起點地價未達五倍者，就其超過部分課徵千分之三十", "超過累進起點地價五倍至十倍者，就其超過部分課徵千分之三十五", "超過累進起點地價十倍至十五倍者，就其超過部分課徵千分之四十", "超過累進起點地價十五倍至二十倍者，就其超過部分課徵千分之四十五"], "ans": 3, "exps": ["❌ 未達5倍應課徵15‰，不是30‰，數字錯誤。", "❌ 5至10倍應課徵25‰，不是35‰，數字錯位。", "❌ 10至15倍應課徵35‰，不是40‰，數字錯誤。", "✓ 地價稅累進稅率第五級：超過15倍至20倍，課徵45‰。本選項正確對應到此級距的稅率，這六級稅率分別是：10‰（基本）、15‰、25‰、35‰、45‰、55‰，依序遞增5‰、10‰、10‰、10‰、10‰。"]}, {"ch": "E1 地價稅", "year": "108", "num": 11, "q": "依土地稅法規定，關於地價稅之納稅義務人，下列何項敘述錯誤？", "opts": ["信託土地，於信託關係存續中，為受託人", "設有典權土地，為出典人", "承領土地，為承領人", "承墾土地，為耕作權人"], "ans": 1, "exps": ["❌ 本選項描述正確，受託人是信託土地的法定納稅義務人，非錯誤。", "✓ 本選項為錯誤敘述：設有典權土地的納稅義務人是「典權人」（非出典人），這是E1最常考的固定陷阱，與99-29考點相同。", "❌ 本選項描述正確，承領人是法定納稅義務人，非錯誤。", "❌ 本選項描述正確，耕作權人是法定納稅義務人，非錯誤。"]}, {"ch": "E1 地價稅", "year": "109", "num": 4, "q": "依土地稅法規定，有關地價稅優惠稅率與減免，下列敘述何者錯誤？", "opts": ["依都市計畫法劃設並經目的事業主管機關核准供公眾停車使用之停車場用地，按千分之十計徵地價稅", "經目的事業主管機關核准設立之私立公園、體育場所使用範圍內之土地，免徵地價稅", "公有土地按基本稅率徵收地價稅。但公有土地供公共使用者，免徵地價稅", "都市計畫公共設施保留地，在保留期間仍為建築使用者，除自用住宅用地依第17條之規定外，統按千分之六計徵地價稅"], "ans": 1, "exps": ["❌ 本選項描述正確，停車場用地按10‰計徵，非錯誤。", "✓ 本選項為錯誤敘述：私立公園、體育場所等供事業直接使用之土地，是按「千分之十（10‰）」計徵（屬土地稅法第18條清單），不是「免徵」。本選項把10‰課徵誤植為免徵，為本題答案。", "❌ 本選項描述正確：公有非公用土地按基本稅率課徵，公有供公共使用土地免徵，這是正確的對比描述，非錯誤。", "❌ 本選項數字有誤：應是「千分之十（10‰）」，不是「千分之六（6‰）」，但本題官方答案是B，故D雖也有誤但非答案，以官方公告B為唯一答案。"]}, {"ch": "E1 地價稅", "year": "110", "num": 7, "q": "依平均地權條例規定，應納地價稅額因公告地價調整致納稅義務人繳納困難者，得於規定繳納期間內，向稅捐稽徵機關申請延期繳納，延期繳納期間最長不得逾多久？", "opts": ["3個月", "6個月", "1年", "3年"], "ans": 1, "exps": ["❌ 3個月不是法定延期繳納的最長期間。", "✓ 平均地權條例規定：應納地價稅額因公告地價調整致納稅義務人繳納困難者，得申請延期繳納，延期繳納期間最長不得逾「6個月」。半年是法定上限，是E1的固定數字考點。", "❌ 1年超過法定上限，為干擾選項。", "❌ 3年遠超法定上限，為干擾選項。"]}, {"ch": "E1 地價稅", "year": "112", "num": 1, "q": "都市計畫公共設施保留地，未作任何使用並與使用中之土地隔離者，其地價稅之計徵，下列何者正確？", "opts": ["免徵", "按千分之六稅率計徵", "按千分之十稅率計徵", "按千分之二稅率計徵"], "ans": 0, "exps": ["✓ 同102-18，都市計畫公共設施保留地，未作任何使用並與使用中之土地隔離者，免徵地價稅，這是土地稅法第19條的明文規定，是E1高頻考點之一。", "❌ 6‰不是法定稅率。", "❌ 10‰是公設保留地「仍為建築使用」（有使用）的稅率，不是「未作任何使用並隔離」的稅率，本題情形應免徵。", "❌ 2‰是自用住宅用地的優惠稅率，不適用於未作任何使用的公設保留地。"]}, {"ch": "E1 地價稅", "year": "112", "num": 5, "q": "依土地稅法規定，地價稅之稅率，下列何者錯誤？", "opts": ["地價稅之基本稅率為千分之十", "土地所有權人之地價總額未超過土地所在地直轄市或縣（市）累進起點地價者，其地價稅按千分之十稅率徵收", "土地所有權人之地價總額超過土地所在地直轄市或縣（市）累進起點地價五倍者，就其超過部分課徵千分之十五", "土地所有權人之地價總額超過土地所在地直轄市或縣（市）累進起點地價十五倍至二十倍者，就其超過部分課徵千分之四十五"], "ans": 2, "exps": ["❌ 本選項描述正確，10‰是基本稅率，非錯誤。", "❌ 本選項描述正確，未超過起點按基本稅率10‰課徵，非錯誤。", "✓ 本選項為錯誤敘述：超過起點「五倍者」課徵的稅率是「千分之二十五（25‰，第三級）」，不是「千分之十五（15‰）」——15‰是「未達5倍」的稅率，恰好滿5倍時應適用更高一級的25‰。注意臨界點的歸屬：「未達5倍」屬第二級（15‰），「滿5倍至10倍」屬第三級（25‰）。本選項把「超過5倍者」錯誤地歸入第二級稅率，為本題答案。", "❌ 本選項描述正確，15至20倍課徵45‰，非錯誤。"]}, {"ch": "E1 地價稅", "year": "112", "num": 24, "q": "依土地稅法之規定，主管稽徵機關得指定土地使用人負責代繳其使用部分之地價稅或田賦，下列何項非屬所規範者？", "opts": ["土地進行訴訟者", "權屬不明者", "納稅義務人行蹤不明者", "土地所有權人申請由占有人代繳者"], "ans": 0, "exps": ["✓ 此選項依官方答案為本題「非屬」代繳規範的情形。土地稅法第4條規定主管稽徵機關得指定代繳的情形包括：權屬不明、納稅義務人行蹤不明、土地所有權人申請由占有人代繳，但「土地在訴訟中」雖在某些版本的條文中有列入，依本題官方答案A，土地進行訴訟者並非本條規範的指定代繳事由（以官方答案為準，可能屬於法條修正後的版本差異）。", "❌ 本選項是土地稅法第4條規定的指定代繳事由之一，屬之。", "❌ 本選項是法定指定代繳事由之一，屬之。", "❌ 本選項是法定指定代繳事由之一，屬之。"]}, {"ch": "E1 地價稅", "year": "114", "num": 4, "q": "依土地稅法之規定，一般地價稅的基本稅率為多少？", "opts": ["百分之十", "百分之五", "千分之十", "千分之十五"], "ans": 2, "exps": ["❌ 百分之十（10%）並非地價稅基本稅率的正確表示方式，地價稅率慣用「千分之」表示，百分之十相當於100‰，數值錯誤。", "❌ 百分之五（5%＝50‰）數值過高，不是基本稅率。", "✓ 土地稅法第16條：地價稅基本稅率為「千分之十（10‰）」，這是最基礎的數字，也是E1反覆出現的核心考點，未超過累進起點地價者，均按此基本稅率課徵。", "❌ 千分之十五是累進稅率第二級（超過起點未達5倍），不是基本稅率。"]}, {"ch": "E2 土地增值稅", "year": "99", "num": 20, "q": "受託人就受託土地，於信託關係存續中有償移轉所有權時，以何者為納稅義務人，課徵土地增值稅？", "opts": ["免徵", "受託人", "委託人", "監察人"], "ans": 1, "exps": ["❌ 信託土地在受託人有償移轉時，不是免徵，而是要正常課徵土地增值稅，只是納稅義務人特定為受託人。", "✓ 土地稅法第5條之2：受託人就受託土地，於信託關係存續中有償移轉所有權時，以受託人為納稅義務人，課徵土地增值稅。信託財產名義上屬受託人所有，受託人是法律上的處分主體，故由其負擔納稅義務（但實質上稅款來源仍由信託財產支付）。", "❌ 委託人雖是信託財產的實質規劃者，但有償移轉時的法定納稅義務人是受託人，不是委託人。", "❌ 信託監察人是監督信託執行的角色，不是納稅義務人。"]}, {"ch": "E2 土地增值稅", "year": "99", "num": 22, "q": "依規定每年何時公告土地現值表？", "opts": ["1月1日", "2月1日", "7月1日", "8月1日"], "ans": 0, "exps": ["✓ 土地稅法第46條：直轄市或縣市政府應於每年「1月1日」公告土地現值，作為該年度土地移轉或設定典權時申報土地移轉現值的依據。1月1日是固定的公告日期，是E2最基本的數字考點。", "❌ 2月1日不是法定公告日期。", "❌ 7月1日不是法定公告日期。", "❌ 8月1日不是法定公告日期（8月31日是地價稅基準日，容易與此混淆）。"]}, {"ch": "E2 土地增值稅", "year": "99", "num": 30, "q": "依土地稅法之規定，土地所有權人因重購土地退還土地增值稅者，其重購之土地，自完成移轉登記之日起，幾年內再行移轉時，除就該次移轉之漲價總數額課徵土地增值稅外，並應追繳原退還稅款？", "opts": ["2年", "3年", "4年", "5年"], "ans": 3, "exps": ["❌ 2年不是重購退稅後追繳原退稅款的法定年限。", "❌ 3年不是法定年限。", "❌ 4年不是法定年限。", "✓ 土地稅法第35條：因重購退稅取得的土地，自完成移轉登記之日起「5年內」再行移轉或改作其他用途者，除課徵該次移轉的土地增值稅外，並應追繳原退還稅款。5年是防止短期套利規避稅負的監管期間。"]}, {"ch": "E2 土地增值稅", "year": "99", "num": 32, "q": "依土地稅法之規定，土地增值稅納稅義務人於收到土地增值稅繳納通知書後，應於幾日內向公庫繳納？", "opts": ["10日", "15日", "20日", "30日"], "ans": 3, "exps": ["❌ 10日不是法定繳納期限。", "❌ 15日不是法定繳納期限。", "❌ 20日是核定應納稅額的延長期限（自用住宅案件），不是繳納期限。", "✓ 土地稅法第49條：納稅義務人接到土地增值稅繳納通知書後，應於「30日」內向公庫繳納。30日是E2標準的繳納期限，與許多其他稅法的繳納期限一致。"]}, {"ch": "E2 土地增值稅", "year": "99", "num": 35, "q": "土地買賣未辦竣權利移轉登記，再行出售者，處再行出售移轉現值多少比率之罰鍰？", "opts": ["免罰", "百分之一", "百分之二", "百分之五"], "ans": 2, "exps": ["❌ 違法行為仍有罰則，不是免罰。", "❌ 1%不是法定罰鍰比率。", "✓ 土地稅法第55條之2：土地買賣未辦竣權利移轉登記，再行出售者，處再行出售移轉現值「2%」之罰鍰。這是針對連續轉售規避稅負（俗稱「轉約」）的罰則，2%是E2的固定數字考點。", "❌ 5%不是法定罰鍰比率。"]}, {"ch": "E2 土地增值稅", "year": "100", "num": 4, "q": "土地所有權人出售其自用住宅用地適用自用住宅用地稅率繳納土地增值稅後，再出售其自用住宅用地時，應已持有該土地最少幾年以上，才能再適用此優惠稅率？", "opts": ["一年", "五年", "六年", "十年"], "ans": 2, "exps": ["❌ 1年不是再次適用自用住宅優惠的最低持有期限。", "❌ 5年不是本題（已使用過一生一次優惠後再次出售）的持有期限。", "✓ 土地稅法第34條第5項（一生一屋）：已使用過一生一次自用住宅優惠後再出售，欲再次適用優惠稅率，須符合「持有該自用住宅連續滿6年」等要件。6年是「一生一屋」優惠的關鍵年限，與一般「一生一次」不要求持有年限不同。", "❌ 10年不是法定持有年限。"]}, {"ch": "E2 土地增值稅", "year": "100", "num": 5, "q": "依土地稅法規定，關於土地增值稅之納稅義務人，何者為正確？", "opts": ["土地設定典權時之典權人", "受託人就受託土地於信託關係存續中，有償移轉時之委託人", "土地贈與時之贈與人", "土地交換時之原所有權人"], "ans": 3, "exps": ["❌ 設定典權時的土地增值稅納稅義務人是「出典人」（預繳），不是典權人。", "❌ 此情形的納稅義務人是「受託人」本人，不是委託人，同99-20考點。", "❌ 贈與（無償移轉）的納稅義務人是「取得所有權人（受贈人）」，不是贈與人，這是常見的反直覺考點。", "✓ 土地稅法第5條：土地交換時，以原所有權人為納稅義務人（交換雙方互為原所有權人各自負擔自己交出土地部分的稅額）。本選項是唯一正確描述納稅義務人的選項。"]}, {"ch": "E2 土地增值稅", "year": "100", "num": 6, "q": "受贈土地之財團法人若未按捐贈目的使用土地，除追補應納稅額外，並處應納土地增值稅額多少倍之罰鍰?", "opts": ["一倍", "二倍", "三倍", "五倍"], "ans": 1, "exps": ["❌ 1倍不是法定罰鍰倍數。", "✓ 平均地權條例第35條之1：私人捐贈財團法人供興辦社會福利事業使用之土地免徵土地增值稅，若未按捐贈目的使用，除追補應納稅額外，並處應納土地增值稅額「2倍」罰鍰。2倍是固定的處罰倍數，是E2重要的罰則考點。", "❌ 3倍不是法定罰鍰倍數。", "❌ 5倍不是法定罰鍰倍數。"]}, {"ch": "E2 土地增值稅", "year": "100", "num": 7, "q": "作農業使用之農業用地，移轉與自然人時，得申請不課徵土地增值稅。主管稽徵機關核准不課徵土地增值稅之農業用地後，應於核准後多久時間內，將有關資料送直轄市、縣（市）農業主管機關？", "opts": ["一個月", "二個月", "三個月", "六個月"], "ans": 0, "exps": ["✓ 土地稅法第39條之2：農業用地移轉與自然人申請不課徵土地增值稅，主管稽徵機關核准後，應於核准後「1個月內」將有關資料送直轄市縣市農業主管機關。1個月是固定的行政作業期限。", "❌ 2個月不是法定期限。", "❌ 3個月不是法定期限。", "❌ 6個月不是法定期限。"]}, {"ch": "E2 土地增值稅", "year": "101", "num": 25, "q": "父親贈與一幢透天建築物給兒子，在正常情況下依土地稅法與契稅條例之規定，下列有關應納稅負之敘述，何者最正確？", "opts": ["父親應繳納土地增值稅與契稅", "父親應繳納土地增值稅，兒子應繳納契稅", "兒子應繳納土地增值稅，父親應繳納契稅", "兒子應繳納土地增值稅與契稅"], "ans": 3, "exps": ["❌ 父親（贈與人）不負擔土地增值稅（贈與時納稅義務人是受贈人），父親更不會繳契稅（契稅與土地增值稅是不同稅目，契稅針對房屋部分）。", "❌ 土地增值稅納稅義務人應是兒子（受贈人），不是父親，此選項把納稅義務人說反了。", "❌ 契稅納稅義務人在贈與情形是「受贈人」（兒子），不是贈與人（父親），此選項把契稅納稅義務人也說反了。", "✓ 贈與一幢透天建築物（含土地與房屋）：土地部分課土地增值稅，無償移轉（贈與）的納稅義務人是「取得所有權人」（兒子）；房屋部分課契稅，贈與契稅的納稅義務人是「受贈人」（兒子）。兩稅目的納稅義務人都是兒子，本選項完全正確。"]}, {"ch": "E2 土地增值稅", "year": "101", "num": 27, "q": "關於土地增值稅之規定，下列何者只規定在平均地權條例中？", "opts": ["公告土地現值應調整至一般正常交易價格", "公告土地現值，不得低於一般正常交易價值之一定比例。是項一定比例，應逐年接近一般正常交易價格", "全國平均之公告土地現值調整達一般正常交易價格百分之九十以上時，第33條第1項之稅率應檢討修正", "因修正稅率造成直轄市政府及縣（市）政府稅收之實質損失，於財政收支劃分法修正擴大中央統籌分配稅款規模之規定施行前，由中央政府補足之"], "ans": 1, "exps": ["❌ 此規定在土地稅法和平均地權條例都有提及，不是「只規定在平均地權條例」。", "✓ 此項漸進調整機制（公告現值逐年接近市價的比例規定），是平均地權條例（而非土地稅法）的特有規定，土地稅法本身沒有這個「逐年調整比例」的條文，故本選項「只規定在平均地權條例中」是正確的。", "❌ 此為土地稅法本身的稅率檢討條款，不是只在平均地權條例。", "❌ 此為配套財政補償規定，與本題核心考點無關，非答案。"]}, {"ch": "E2 土地增值稅", "year": "101", "num": 28, "q": "依土地稅法規定，下列敘述何者最正確？", "opts": ["設有典權土地，以出典人為地價稅納稅義務人", "設有典權土地，以典權人為土地增值稅納稅義務人", "配偶相互贈與之土地，免徵土地增值稅", "經重劃之土地，於重劃後第一次移轉時，其土地增值稅減徵百分之四十"], "ans": 3, "exps": ["❌ 設有典權土地的地價稅納稅義務人是「典權人」，不是出典人，本選項描述錯誤。", "❌ 設定典權時的土地增值稅納稅義務人是「出典人」（預繳），不是典權人，本選項把地價稅和土增稅的典權相關規定混淆顛倒了。", "❌ 配偶相互贈與之土地是「不課徵」（得申請），不是「免徵」，兩個用語在土地稅法上是不同的法律效果（不課徵將來再移轉仍要回溯課稅；免徵則永久不課），此選項用語錯誤。", "✓ 平均地權條例第42條：經市地重劃之土地，於重劃後第一次移轉時，土地增值稅減徵40%。40%是固定的減徵比例，與區段徵收抵價地第一次移轉減徵40%的規定相同。"]}, {"ch": "E2 土地增值稅", "year": "101", "num": 29, "q": "主管稽徵機關應於申報土地移轉現值收件之日起七日內，核定應納土地增值稅額，但申請按自用住宅用地稅率課徵之案件，其期間得延長為多少日？", "opts": ["十日", "二十日", "二十一日", "三十日"], "ans": 1, "exps": ["❌ 10日不是延長後的期限。", "✓ 土地稅法第49條：主管稽徵機關應於收件之日起7日內核定應納土地增值稅額；但申請按自用住宅用地稅率課徵之案件，因須審查戶籍、面積等較複雜的要件，期間得延長為「20日」。從7日延長到20日，差距是13天，這個20日是固定考點。", "❌ 21日不是法定延長期限。", "❌ 30日是繳納稅款的期限，不是核定延長的期限，兩者容易混淆。"]}, {"ch": "E2 土地增值稅", "year": "101", "num": 39, "q": "依土地稅法規定，法院判決移轉登記者，其申報移轉現值之審核標準，以那一天當期之公告土地現值為準？", "opts": ["契約訂約日", "受理申報機關收件日", "法院判決確定日", "法院起訴日"], "ans": 3, "exps": ["❌ 契約訂約日是一般買賣（30日內申報）的審核標準，不是法院判決移轉的標準。", "❌ 收件日是逾30日才申報情形的審核標準，不是法院判決移轉的標準。", "❌ 此選項與108-22的官方答案相符（判決確定日），但本題101年的官方答案是D（起訴日），顯示不同年度題目的標準用語版本不同，須以各題官方公告答案為準——101年題答案為「法院起訴日」。", "✓ 依本題（101年）官方答案，法院判決移轉登記的申報移轉現值審核標準，以「申報人向法院起訴日」當期之公告土地現值為準。注意：108年同類題的官方答案是「判決確定日」，不同年度題目的法定用語在修法前後略有不同，務必依各題年度的官方公告答案分別記憶。"]}, {"ch": "E2 土地增值稅", "year": "101", "num": 40, "q": "有關長期持有土地之土地增值稅減徵，依平均地權條例第40條之規定，下列敘述何者最正確？", "opts": ["持有土地年限超過二十年以上者，就其土地增值稅超過第一項最低稅率部分減徵百分之二十", "持有土地年限超過三十年以上者，就其土地增值稅超過第一項最低稅率部分減徵百分之四十", "持有土地年限超過四十年以上者，就其土地增值稅超過第一項最低稅率部分減徵百分之六十", "持有土地年限超過五十年以上者，就其土地增值稅超過第一項最低稅率部分減徵百分之八十"], "ans": 0, "exps": ["✓ 平均地權條例第40條（與土地稅法第33條第5項相呼應）：長期持有減徵規定，超過20年減徵20%、超過30年減徵30%、超過40年減徵40%。本選項正確對應20年減徵20%的級距。", "❌ 超過30年應減徵30%，不是40%，數字錯位。", "❌ 超過40年應減徵40%，不是60%，數字過高。", "❌ 法律沒有「超過50年」這個級距，最高級距是「超過40年減徵40%」，沒有更高的級距，本選項為虛構規定。"]}, {"ch": "E2 土地增值稅", "year": "102", "num": 19, "q": "下列敘述何者錯誤？", "opts": ["甲將一筆建地信託於乙，不課徵土地增值稅", "受託人乙依信託契約將受託之建地移轉給歸屬人丙，不課徵土地增值稅", "受託人乙將受託之建地移轉還給委託人甲，不課徵土地增值稅", "受託人乙將受託之建地移轉給新受託人丁，不課徵土地增值稅"], "ans": 1, "exps": ["❌ 本選項描述正確：信託行為成立時，委託人移轉給受託人不課徵土增稅，非錯誤。", "✓ 本選項為錯誤敘述：受託人依信託本旨移轉財產給「委託人以外之歸屬權利人」（本題的丙），是應該「課徵」土地增值稅的情形，不是「不課徵」。信託土地增值稅的不課徵情形限於：成立時委託人→受託人、受託人變更、消滅時受託人→委託人、消滅時委託人→受益人（受益人為委託人本人時）；移轉給「委託人以外的歸屬人」則應正常課稅，本選項描述錯誤。", "❌ 本選項描述正確：信託關係消滅，受託人歸還委託人，不課徵土增稅，非錯誤。", "❌ 本選項描述正確：信託存續中受託人變更（原受託人→新受託人），不課徵土增稅，非錯誤。"]}, {"ch": "E2 土地增值稅", "year": "102", "num": 34, "q": "甲夫將其名下土地贈與乙妻，乙妻又將該土地賣給丙友人，則下列敘述何者正確？", "opts": ["甲乙間，乙丙間之移轉，免徵土地增值稅", "甲乙間，乙丙間之移轉，不課徵土地增值稅", "甲乙間之移轉，不課徵土地增值稅，乙丙間之移轉，應課徵土地增值稅", "乙丙間之移轉，以移轉時之移轉現值為原地價"], "ans": 2, "exps": ["❌ 甲乙間（夫妻贈與）是「不課徵」（非「免徵」），乙丙間（出售給友人）應正常課徵土地增值稅，本選項兩處都錯。", "❌ 甲乙間是不課徵沒錯，但乙丙間（賣給第三人丙）應正常課稅，不是不課徵，本選項後半段錯誤。", "✓ 配偶相互贈與（甲乙間）得申請不課徵土地增值稅；但乙再移轉給第三人丙（乙丙間）時，已經不是配偶間移轉，應正常課徵土地增值稅，計算漲價總數額時以「第一次贈與前之原地價」為原地價（追溯計算，不因配偶贈與而重新設定原地價）。", "❌ 乙丙間移轉計算漲價總數額時，「原地價」應以「甲乙贈與前的原地價」為準（追溯原始基期），不是用「移轉時的移轉現值」作為原地價（這會讓配偶贈與成為規避漲價總數額的工具，違反立法目的）。"]}, {"ch": "E2 土地增值稅", "year": "103", "num": 9, "q": "下列關於地價稅及土地增值稅納稅義務人之敘述，何者為是？", "opts": ["設有典權土地，地價稅之納稅義務人為出典人", "贈與土地，土地增值稅之納稅義務人為贈與人", "土地為分別共有者，地價稅之納稅義務人為管理人", "土地買賣約定由買方負擔者，土地增值稅之納稅義務人為原所有權人"], "ans": 3, "exps": ["❌ 地價稅的典權土地納稅義務人是「典權人」，不是出典人，此為E1的固定陷阱。", "❌ 贈與（無償移轉）的納稅義務人是「取得所有權人（受贈人）」，不是贈與人。", "❌ 分別共有土地的地價稅納稅義務人是「各共有人」（按應有部分），得推定一人繳納，不是「管理人」這個概念。", "✓ 即使雙方私下約定由買方（取得人）負擔土地增值稅，這只是私法上的契約約定（債權效力），法定的納稅義務人「仍是原所有權人」（賣方）。稅捐機關向法定納稅義務人（賣方）課稅，賣方再依約定向買方求償（民事問題）。"]}, {"ch": "E2 土地增值稅", "year": "103", "num": 10, "q": "土地所有權人出售其自用住宅用地，經使用過一生一次的土地增值稅優惠稅率後，如再出售其自用住宅用地，仍要適用優惠稅率，應符合之條件何者正確？", "opts": ["出售都市土地面積未超過300平方公尺", "出售時土地所有權人與其配偶及未成年子女，無該自用住宅以外之房屋", "出售前一年內，無供營業使用或出租", "土地所有權人於土地出售前，在該地設有戶籍，且持有該自用住宅連續滿五年"], "ans": 1, "exps": ["❌ 「一生一屋」的面積限制是「都市土地未超過1.5公畝（即150平方公尺）」，不是300平方公尺，數字錯誤（300平方公尺接近一般用地的3公畝＝300平方公尺，與一生一屋的1.5公畝混淆）。", "✓ 「一生一屋」優惠的核心要件之一：出售時申請人與配偶及未成年子女名下「無該自用住宅以外之房屋」（即僅有這一戶自住房屋）。這是「一生一屋」與「一生一次」最大的差異——一生一屋強調「僅此一屋」的身分狀態。", "❌ 「一生一屋」要求的是出售前「5年內」無供營業使用或出租（比一生一次的1年更長），本選項說1年是錯誤的（這是一生一次的要件，非一生一屋）。", "❌ 「一生一屋」要求持有並設籍滿「6年」（不是5年），本選項數字錯誤。"]}, {"ch": "E2 土地增值稅", "year": "103", "num": 26, "q": "土地為信託財產者，下列各款信託關係人間移轉所有權，不課徵土地增值稅之敘述，何者正確？", "opts": ["因信託行為成立，委託人與受託人間", "信託關係存續中委託人變更時，原受託人與新受託人間", "因遺囑成立之信託，於信託關係消滅時，受託人與委託人", "信託契約明定信託財產之受益人為委託人者，信託關係消滅時，委託人與受益人間"], "ans": 0, "exps": ["✓ 信託成立時，委託人移轉信託財產給受託人，雖然名義上有所有權移轉，但實質上是信託財產的形式性轉移（受託人僅是名義持有人，不享有實質利益），故此移轉「不課徵」土地增值稅。本選項是同類四個信託土增稅不課徵情形中最基本的一項。", "❌ 此選項描述有誤：應該是「受託人變更」（不是委託人變更）時，「原受託人與新受託人間」不課徵土增稅。委託人通常不會變更，本選項把「委託人變更」和「受託人變更」搞混了，故描述不正確（雖然D選項與本選項僅一字之差，但官方答案是A，本題的核心錯誤在於B選項誤植了「委託人變更」）。", "❌ 因遺囑成立之信託，消滅時應是「受託人移轉給」委託人「之繼承人」（因為以遺囑設立信託時，委託人通常已過世），本選項說「受託人與委託人」的對象描述不夠精確。", "❌ 此情形下受益人即委託人本人，移轉對象應正確描述為「委託人（也是受益人）」，本選項描述方式雖然方向接近，但官方答案唯一為A，以A為準。"]}, {"ch": "E2 土地增值稅", "year": "104", "num": 32, "q": "依都市計畫法指定之公共設施保留地，尚未被徵收前之移轉，其土地增值稅之課徵，下列何者正確？", "opts": ["減徵百分之四十", "準用被徵收之土地予以免徵之", "減半徵收之", "以該土地之原地價計算漲價總數額課徵之"], "ans": 1, "exps": ["❌ 40%減徵是重劃後第一次移轉或區段徵收抵價地第一次移轉的優惠，不是公設保留地尚未被徵收前移轉的優惠方式。", "✓ 土地稅法第39條第2項：依都市計畫法指定之公共設施保留地，尚未被徵收前之移轉，準用「被徵收之土地」免徵土地增值稅的規定，予以免徵。公設保留地雖然還沒被徵收，但既然遲早會被徵收，法律提前給予免稅優惠，鼓勵土地流通並減輕地主負擔。", "❌ 減半徵收不是公設保留地尚未被徵收前移轉的處理方式，正確是「免徵」（全免，比減半更優惠）。", "❌ 既然是免徵，就不需要計算漲價總數額課稅，本選項與「免徵」的法律效果矛盾。"]}, {"ch": "E2 土地增值稅", "year": "104", "num": 33, "q": "依土地稅法規定，作農業使用之農業用地，移轉與自然人時，下列有關土地增值稅之課徵，何者正確？", "opts": ["不課徵土地增值稅", "得申請不課徵土地增值稅", "免徵土地增值稅", "得申請免徵土地增值稅"], "ans": 1, "exps": ["❌ 本選項缺少「得申請」這個程序要件——農業用地移轉與自然人不是自動不課徵，而是「得申請」不課徵，須經主管稽徵機關核准。", "✓ 土地稅法第39條之2：作農業使用之農業用地，移轉與自然人時，「得申請」不課徵土地增值稅（需要主動申請，經核准後才不課徵，不是自動發生）。「得申請」是這類優惠規定共通的關鍵字。", "❌ 農業用地移轉是「不課徵」，不是「免徵」，兩者法律效果不同（不課徵在將來移轉時要追溯計算）。", "❌ 應是「得申請不課徵」，不是「得申請免徵」，用語上的細微差異是重要陷阱。"]}, {"ch": "E2 土地增值稅", "year": "104", "num": 35, "q": "土地所有權移轉或設定典權時，倘雙方當事人共同申報之移轉現值，經審核超過當期公告土地現值者，應以下列何者為準，依規定徵收土地增值稅？", "opts": ["按當期公告土地現值", "按前次移轉現值", "按雙方當事人自行申報之移轉現值", "按稅捐機關查證之移轉現值"], "ans": 2, "exps": ["❌ 若雙方申報移轉現值超過當期公告現值，不是按公告現值課稅（這樣會少課），而是按更高的申報現值課稅。", "❌ 前次移轉現值是計算原地價用的，不是本次申報審核的依據。", "✓ 土地稅法第30條第2項：申報移轉現值經審核「超過」當期公告土地現值者，以雙方自行申報的移轉現值為準徵稅（從高課稅原則，避免雙方故意低報規避稅負，但若高報則依其高報金額課稅，不會幫納稅人打折）。", "❌ 稅捐機關沒有另外「查證」一個移轉現值的程序，是直接以雙方自行申報的數字為準。"]}, {"ch": "E2 土地增值稅", "year": "105", "num": 11, "q": "有關土地增值稅之優惠規定，下列何者正確？", "opts": ["土地所有權人出售其自用住宅用地，得享一生一次之百分之五土地增值稅優惠稅率", "土地所有權人於土地重劃後第一次移轉，得享土地增值稅減半徵收之優惠稅率", "因繼承而移轉之土地，得免徵土地增值稅", "政府出售公有土地，得享土地增值稅減半之優惠稅率"], "ans": 2, "exps": ["❌ 自用住宅優惠稅率是「10%」，不是5%，數字錯誤。", "❌ 重劃後第一次移轉是「減徵40%」，不是「減半徵收（50%）」，兩者比例不同。", "✓ 土地稅法第28條：因繼承而移轉之土地，免徵土地增值稅。繼承是法定財產移轉（非自願性質），免徵是對繼承人的基本保障，這是E2最基礎的免徵情形之一。", "❌ 政府出售公有土地是「免徵」（依官方答案以「各級政府出售或依法贈與之公有土地」免徵土增稅），不是「減半」。"]}, {"ch": "E2 土地增值稅", "year": "105", "num": 39, "q": "甲有A地一筆，並將A地出賣給乙，約定由乙負擔以應辦理所有權移轉登記日當期之公告土地現值計算之土地增值稅；但甲遲延辦理A地所有權移轉登記，致乙多繳稅額。下列敘述何者正確？", "opts": ["依目前最高法院見解，由乙負擔土地增值稅的約定係屬無效", "依目前行政法院見解，由乙負擔土地增值稅的約定係屬違憲", "依目前最高法院見解，乙得向甲請求給付遲延的損害賠償", "依目前最高法院見解，乙不得向甲請求賠償"], "ans": 2, "exps": ["❌ 私法上約定由買方負擔稅捐是有效的契約安排，不會因此被認定無效，本選項描述錯誤。", "❌ 此約定純屬私法契約自由範疇，不涉及違憲問題，本選項描述錯誤。", "✓ 依最高法院實務見解，雙方約定由買方（乙）負擔以「移轉登記日」當期公告現值計算的土地增值稅，若因賣方（甲）遲延辦理移轉登記，導致登記日延後而公告現值上漲，使乙多繳了稅額，乙得依民法給付遲延的規定，向甲請求賠償因遲延所生的損害（多繳的稅額差距）。這是契約法上常考的「遲延損害賠償」概念與土地稅法案例結合的考題。", "❌ 與官方答案C相反，乙是可以請求賠償的，本選項描述錯誤。"]}, {"ch": "E2 土地增值稅", "year": "106", "num": 10, "q": "下列何者不符合申請自用住宅用地之土地增值稅稅率規定？", "opts": ["出售前1年內，未營業使用或出租", "都市土地面積未超過3公畝部分或非都市土地面積未超過7公畝部分", "土地所有權人與其配偶及未成年之受扶養親屬，適用自用住宅用地稅率者，以一處為限", "土地所有權人或其配偶、直系親屬於該地辦竣戶籍登記"], "ans": 2, "exps": ["❌ 本選項描述正確，1年內無出租無營業使用是法定要件之一，非「不符合」。", "❌ 本選項描述正確，3公畝/7公畝是法定面積上限，非「不符合」。", "✓ 本選項為錯誤敘述（本題問「何者不符合規定」）：依法應是「以一處為限」，但本選項本身的文字描述其實與法律規定方向一致（限定一處），表面上不算錯誤敘述，但官方答案C被列為「不符合規定」，可能依官方解讀此處用語或適用範圍與法條原意有出入（如「未成年之受扶養親屬」與法定「未成年子女」用語有差異），故視為本題答案。", "❌ 本選項描述正確，戶籍登記是法定要件之一，非「不符合」。"]}, {"ch": "E2 土地增值稅", "year": "106", "num": 12, "q": "下列何者是土地增值稅的課稅基礎？", "opts": ["累進起點地價", "公告土地現值", "土地漲價總數額", "申報地價"], "ans": 2, "exps": ["❌ 累進起點地價是地價稅的概念，不是土地增值稅的課稅基礎。", "❌ 公告土地現值是計算土地增值稅的「參考依據之一」（用於申報核定），但「課稅基礎」本身是漲價總數額，不是公告現值本身。", "✓ 土地稅法明文規定，土地增值稅的課稅基礎（稅基）是「土地漲價總數額」，即土地移轉時申報現值減去原地價（經物價指數調整）及相關可扣除費用後的餘額，這是E2最核心的基本概念。", "❌ 申報地價是地價稅的概念，不是土地增值稅的課稅基礎。"]}, {"ch": "E2 土地增值稅", "year": "106", "num": 21, "q": "土地稅法規定農業用地移轉與自然人時，得申請不課徵土地增值稅。此處所稱農業用地，下列規定何者錯誤？", "opts": ["農業發展條例第3條第11款所稱之耕地", "依區域計畫法劃定為各種使用分區內所編定之林業用地、養殖用地、水利用地、生態保護用地、國土保安用地及供農路使用之土地，或上開分區內暫未依法編定用地別之土地", "依區域計畫法劃定為農業區、山坡地保育區、森林區以外之分區內所編定之農牧用地", "依都市計畫法劃定為農業區、保護區內之土地"], "ans": 2, "exps": ["❌ 此為法定農業用地範圍之一，屬之。", "❌ 此為法定農業用地範圍之一，屬之。", "✓ 本選項為錯誤敘述：依土地稅法施行細則對「農業用地」的定義，農牧用地必須是位於「農業區、山坡地保育區、森林區」等特定使用分區內所編定，本選項說的是「以外之分區」所編定的農牧用地，這與法定範圍相反，故本選項描述錯誤，為本題答案。", "❌ 此為法定農業用地範圍之一，屬之。"]}, {"ch": "E2 土地增值稅", "year": "107", "num": 21, "q": "配偶相互贈與之土地，得申請不課徵土地增值稅。但於再移轉第三人時，以該土地第一次贈與前之原規定地價或前次移轉現值為原地價，計算下列何種數值或數額，課徵土地增值稅？", "opts": ["公告現值", "申報移轉現值", "現值數額", "漲價總數額"], "ans": 3, "exps": ["❌ 公告現值不是計算漲價總數額的最終結果，而是計算過程中的參考價格之一，本題問的是計算「何種數值」課稅，答案應是整個課稅基礎的名稱。", "❌ 申報移轉現值是計算漲價總數額的其中一個輸入值（被減數），不是課稅的最終標的。", "❌ 「現值數額」不是法定用語，為虛構選項。", "✓ 同106-12，土地增值稅的課稅基礎是「漲價總數額」。本題情境是配偶贈與不課徵後再移轉第三人，計算漲價總數額時要以「第一次贈與前」的原地價為原地價（不能用配偶贈與時的現值重設基期），最終仍是計算並課徵「漲價總數額」對應的稅額。"]}, {"ch": "E2 土地增值稅", "year": "108", "num": 6, "q": "下列有關土地所有權移轉或設定典權，申報移轉現值之審核標準，係以何時之當期公告土地現值為準？", "opts": ["申報人逾訂定契約之日起三十日始申報者，以訂約日", "遺贈之土地，以遺贈人死亡後六個月", "依法院判決移轉登記者，以申報人向法院起訴日", "經法院拍賣之土地，以強制執行日"], "ans": 2, "exps": ["❌ 本選項描述錯誤：逾30日才申報者，審核標準應以「受理申報機關收件日」當期的公告現值為準，不是以訂約日（訂約日是30日內申報才適用的標準），本題問「以何時為準」，此選項雖然有誤但本題官方答案是C，故聚焦在C選項。", "❌ 遺贈之土地審核標準是以「遺贈人死亡日」為準，不是「死亡後六個月」，本選項時點描述錯誤。", "✓ 同101-39，依本題（108年）官方答案，法院判決移轉登記的申報移轉現值審核標準，以「申報人向法院起訴日」為準。值得注意：108-22題的官方答案卻是「判決確定日」，顯示同一年度的不同題目可能採用不同版本的標準描述（法條修正前後差異），需以各題的官方公告答案為最終依據。", "❌ 經法院拍賣之土地審核標準是以「拍定日」為準，不是「強制執行日」，這是常見的混淆陷阱。"]}, {"ch": "E2 土地增值稅", "year": "108", "num": 22, "q": "土地所有權辦理買賣移轉登記時，申報土地移轉現值之審核標準，下列何項敘述錯誤？", "opts": ["申報人於訂定契約之日起三十日內申報者，以訂約日當期之公告土地現值為準", "申報人逾訂定契約之日起三十日始申報者，以受理申報機關收件日當期之公告土地現值為準", "遺贈之土地，以遺贈人死亡日當期之公告土地現值為準", "依法院判決移轉登記者，以判決確定日當期之公告土地現值為準"], "ans": 3, "exps": ["❌ 本選項描述正確，30日內申報以訂約日為準，符合規定，非錯誤。", "❌ 本選項描述正確，逾期申報以收件日為準，符合規定，非錯誤。", "❌ 本選項描述正確，遺贈以死亡日為準，符合規定，非錯誤。", "✓ 本選項為錯誤敘述：依本題（108年第22題，與第6題對照）官方答案，法院判決移轉登記的審核標準應以「申報人向法院起訴日」為準，不是「判決確定日」，本選項描述與官方答案不符，為本題錯誤之答案。"]}, {"ch": "E2 土地增值稅", "year": "109", "num": 10, "q": "依平均地權條例之規定，土地所有權移轉或設定典權時，權利人及義務人應於訂定契約之日起幾日內，檢同契約及有關文件，共同申請土地所有權移轉或設定典權登記，並共同申報其土地移轉現值？", "opts": ["10日", "20日", "30日", "40日"], "ans": 2, "exps": ["❌ 10日不是法定申報期限。", "❌ 20日不是法定申報期限（20日是自用住宅核定延長期限，與本題不同）。", "✓ 平均地權條例第47條：土地所有權移轉或設定典權時，權利人及義務人應於訂定契約之日起「30日」內，共同申請所有權移轉或設定典權登記，並共同申報土地移轉現值。30日是申報的基本期限，無論一般買賣或實價登錄都採此期限。", "❌ 40日不是法定申報期限（40日是工業用地申請優惠稅率的期限，與本題不同章節）。"]}, {"ch": "E2 土地增值稅", "year": "110", "num": 8, "q": "平均地權條例第35條之1規定，私人捐贈予財團法人供興辦社會福利事業使用之土地，免徵土地增值稅；但有三種情形之一者，除追補應納之土地增值稅外，並處應納土地增值稅額二倍之罰鍰。下列何者不是規範中的情形？", "opts": ["未辦理用地變更者", "未按捐贈目的使用土地者", "違反各該事業設立宗旨者", "土地收益未全部用於各該事業者"], "ans": 0, "exps": ["✓ 本選項依官方答案，「未辦理用地變更」不在平均地權條例第35條之1規定的三種應追補稅額並處2倍罰鍰的情形內。法定三種情形是：未按捐贈目的使用、違反設立宗旨、土地收益未全部用於該事業，這三項都與「使用情形」有關，而「用地變更」屬於都市計畫或地政程序的範疇，不在此罰則規範內。", "❌ 此為法定三種情形之一，屬之。", "❌ 此為法定三種情形之一，屬之。", "❌ 此為法定三種情形之一，屬之。"]}, {"ch": "E2 土地增值稅", "year": "110", "num": 19, "q": "依土地稅法規定，土地所有權人第一次出售其自用住宅用地，其適用自用住宅用地特別稅率之要件，下列敘述何者正確？①都市土地面積未超過三公畝部分和非都市土地面積未超過七公畝部分②其土地增值稅統就該部分之土地漲價總數額按百分之十徵收之③需土地於出售前5年內，不曾供營業使用或出租者④土地所有權人與其配偶及未成年直系親屬需於該地辦竣戶籍登記", "opts": ["②", "①②", "①②④", "③④"], "ans": 0, "exps": ["✓ 本題以①②③④四個選項組合考驗對自用住宅優惠要件的精確記憶。逐一檢視：①面積限制「三公畝/七公畝」是正確的法定數字，但本題若選①需確認其他選項是否同時正確；②稅率「按百分之十徵收」完全正確（10%是固定稅率）；③「出售前5年內」不得供營業或出租，但「一生一次」的法定要件是「出售前1年內」（不是5年），5年是「一生一屋」的要件，本題若是問一般「第一次出售」的一生一次優惠，③的5年是錯誤的；④「未成年直系親屬」用語不夠精確（法條原文是「配偶、直系親屬」設籍，不限未成年）。經比對後，官方答案僅②單獨成立，顯示①③④在嚴格法條對照下均有用語或數字上的瑕疵，僅②是完全準確無誤的敘述。", "❌ ①的面積描述雖大致正確，但與②合併呈現時，依官方答案僅②單獨正確，①可能因表述方式與法條有出入而不被認可。", "❌ ④的「未成年直系親屬」用語與法條「配偶、直系親屬」不同，不應包含在內。", "❌ ③的「5年」是一生一屋的要件（非一般第一次出售的一生一次要件，應為1年），④用語也有誤，故③④組合均不正確。"]}, {"ch": "E2 土地增值稅", "year": "111", "num": 22, "q": "依平均地權條例規定，土地所有權移轉或設定典權時，有關申報移轉現值之審核標準，下列敘述何者正確？", "opts": ["遺贈之土地，以遺贈人簽立遺囑當期之公告土地現值為準", "申報人逾訂定契約之日起三十日始申報者，以訂約日當期之公告土地現值為準", "依法院判決移轉登記者，以法院終局判決日當期之公告土地現值為準", "經法院拍賣之土地，以拍定日當期之公告土地現值為準"], "ans": 3, "exps": ["❌ 遺贈之土地審核標準是以「遺贈人死亡日」為準，不是「簽立遺囑當期」（簽立遺囑後到死亡可能間隔很久，地價會變動，故應以死亡日這個確定法律效果發生的時點為準）。", "❌ 逾30日才申報者，應以「收件日」當期公告現值為準，不是「訂約日」（訂約日是30日內申報才適用的標準）。", "❌ 依官方答案，法院判決移轉登記的審核標準依不同年度題目而有「起訴日」或「判決確定日」兩種版本，本題（111年）官方答案非C選項，「終局判決日」的描述本身也不夠精確（應為「判決確定日」或「起訴日」，視題目版本而定）。", "✓ 平均地權條例及土地稅法明文：經法院拍賣之土地，申報移轉現值之審核標準，以「拍定日」當期之公告土地現值為準。拍定日是法院拍賣程序中得標確定的時點，這是E2關於審核標準系列考點中最沒有爭議、各年度題目答案一致的選項。"]}, {"ch": "E2 土地增值稅", "year": "112", "num": 2, "q": "關於土地所有權人出售自用住宅用地時，土地增值稅適用「一生一次」之優惠稅率，下列何者正確？", "opts": ["土地增值稅之優惠稅率為千分之二", "僅限於都市土地面積未超過三公畝部分或非都市土地面積未超過七公畝部分", "土地於出售前一年內，曾供營業使用或出租", "出售前應持有該土地三年以上"], "ans": 1, "exps": ["❌ 「一生一次」的優惠稅率是「百分之十（10%）」，不是「千分之二（2‰）」，2‰是地價稅自用住宅優惠稅率，本選項混淆了地價稅與土地增值稅兩種不同稅目的優惠稅率。", "✓ 土地稅法第34條：自用住宅用地優惠稅率「一生一次」適用範圍，限於都市土地面積未超過3公畝部分，或非都市土地面積未超過7公畝部分（超過部分仍按一般累進稅率課稅）。3公畝/7公畝是固定面積上限，與地價稅自用住宅優惠的面積限制相同。", "❌ 「一生一次」的要件是出售前1年內「無」供營業使用或出租，本選項說「曾」供營業使用或出租，恰好與要件相反。", "❌ 「一生一次」並無持有年限的要求（這是「一生一屋」才有的6年持有要件），本選項對「一生一次」增加了不存在的持有期限要求，描述錯誤。"]}, {"ch": "E2 土地增值稅", "year": "112", "num": 4, "q": "土地所有權經法院判決移轉登記者，土地增值稅申報移轉現值之審核標準，下列何者正確？", "opts": ["以法院判決日當期之公告土地現值為準", "以申報人向法院起訴日當期之公告土地現值為準", "以法院判決送達日當期之公告土地現值為準", "以申報人向主管稽徵機關申報日當期之公告土地現值為準"], "ans": 1, "exps": ["❌ 依112年官方答案，正確標準是「起訴日」，不是「判決日」，本選項與答案不符。", "✓ 同101-39、108-6，依本題（112年）官方答案，法院判決移轉登記的審核標準以「申報人向法院起訴 const CHS=[...new Set(CARDS.map(c=>c.ch))];

function selAll(){Object.keys(sel).forEach(k=>sel[k]=1);renderPills();renderList();}

function renderList(){

function makeCard(card,idx){
  const a=ans[idx];

function buildExp(card,chosen,ok){

function pick(idx,chosen){

}
function updateProg(){
  const vis=CARDS.filter(c=>sel[c.ch]);
  const tot=vis.length,done=vis.filter(c=>ans[CARDS.indexOf(c)]!==undefined).length;
  const cor=vis.filter(c=>{const a=ans[CARDS.indexOf(c)];return a&&a.ok;}).length;
  g('pd').textContent=done;g('pt').textContent=tot;
  g('pr').textContent=done?Math.round(cor/done*100)+'%':'-';
  g('pf').style.width=tot?done/tot*100+'%':'0%';
}
