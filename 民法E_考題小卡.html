<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民法概要｜歷屆考題小卡（E・親屬繼承編）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F3E9;
  --paper-deep:#EFE6D5;
  --ink:#2A2722;
  --ink-soft:#7A7165;
  --rule:#DED1B9;
  --stamp:#A8402B;
  --gold:#BC8A2E;
  --green:#5C7A4A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:
    radial-gradient(circle at 12% 8%, rgba(188,138,46,0.06), transparent 40%),
    radial-gradient(circle at 90% 95%, rgba(168,64,43,0.05), transparent 45%),
    var(--paper);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 16px 48px;
}
.wrap{width:100%;max-width:560px;}
header{text-align:center;margin-bottom:14px;}
.case-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Noto Serif TC',serif;font-weight:700;font-size:12px;
  letter-spacing:.12em;color:var(--stamp);
  border:1px solid var(--stamp);border-radius:999px;
  padding:3px 12px;margin-bottom:10px;
}
h1{
  font-family:'Noto Serif TC',serif;font-weight:900;
  font-size:21px;letter-spacing:.04em;line-height:1.5;
}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);
  letter-spacing:.06em;margin-top:4px;font-family:'Noto Sans TC',sans-serif;}

/* filter chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 6px;}
.chip{
  font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;
  border:1.5px solid var(--rule);background:#fff;color:var(--ink-soft);
  cursor:pointer;user-select:none;transition:all .15s ease;white-space:nowrap;
}
.chip.active{color:#fff;border-color:transparent;}
.filter-row{display:flex;justify-content:center;margin-bottom:14px;}
.filter-row .chip{border-color:var(--ink);color:var(--ink);font-weight:700;}
.filter-row .chip.active{background:var(--ink);color:#fff;}

/* progress */
.progress{
  text-align:center;font-family:'Noto Serif TC',serif;font-weight:700;
  font-size:13px;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:10px;
}
.progress b{color:var(--ink);font-size:15px;}
.progress-bar{height:3px;background:var(--rule);border-radius:2px;overflow:hidden;margin:0 auto 18px;max-width:200px;}
.progress-fill{height:100%;background:var(--stamp);transition:width .25s ease;}

/* card */
.scene{perspective:1800px;width:100%;}
.card{
  position:relative;width:100%;min-height:540px;
  transition:transform .55s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;
}
.card.flipped{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:14px;border:1.5px solid var(--rule);
  background:#fff;display:flex;flex-direction:column;
  padding:20px;box-shadow:0 4px 18px rgba(42,39,34,0.07);
  overflow-y:auto;
}
.face.back{transform:rotateY(180deg);background:var(--paper-deep);}
.face.back{border-left:6px solid var(--cat-color,var(--stamp));}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{
  font-size:11px;font-weight:700;color:#fff;padding:4px 12px;border-radius:999px;
  letter-spacing:.06em;font-family:'Noto Serif TC',serif;
}
.year-badge{
  font-size:11px;font-weight:700;color:var(--ink-soft);border:1px solid var(--rule);
  border-radius:999px;padding:3px 10px;font-family:'Noto Serif TC',serif;
}
.mastery-badge{font-size:18px;line-height:1;}
.q-text{font-size:14px;line-height:1.8;margin-bottom:14px;font-weight:500;}
.opt-list{display:flex;flex-direction:column;gap:8px;}
.opt{
  display:flex;gap:8px;padding:9px 10px;border-radius:8px;border:1.5px solid var(--rule);
  background:#fff;font-size:13px;line-height:1.6;cursor:pointer;transition:all .15s ease;
}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--stamp);background:#FBEAE6;}
.opt .letter{
  font-family:'Noto Serif TC',serif;font-weight:900;flex-shrink:0;
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:12px;
}
.hint{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;letter-spacing:.1em;font-family:'Noto Serif TC',serif;}

/* back face */
.answer-banner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px;
  padding:10px;border-radius:8px;margin-bottom:12px;
}
.answer-banner.correct{background:#EFF4EC;color:var(--green);border:1.5px solid var(--green);}
.answer-banner.wrong{background:#FBEAE6;color:var(--stamp);border:1.5px solid var(--stamp);}
.exp-list{display:flex;flex-direction:column;gap:8px;}
.exp-item{padding:9px 10px;border-radius:8px;font-size:12.5px;line-height:1.75;border:1.5px solid var(--rule);background:#fff;}
.exp-item.right{border-color:var(--green);background:#EFF4EC;}
.exp-item .exp-head{font-weight:900;font-family:'Noto Serif TC',serif;margin-bottom:3px;}
.exp-item.right .exp-head{color:var(--green);}
.exp-item:not(.right) .exp-head{color:var(--stamp);}

/* controls */
.controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{
  font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;
  border:1.5px solid var(--ink);background:#fff;color:var(--ink);
  border-radius:10px;padding:10px 16px;cursor:pointer;transition:all .15s ease;
}
.btn:hover{background:var(--ink);color:#fff;}
.btn.primary{background:var(--stamp);border-color:var(--stamp);color:#fff;}
.btn.primary:hover{background:#8c3322;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green);color:#fff;}
.btn.icon{padding:10px 14px;}

.quiz-stats{
  text-align:center;font-size:13px;color:var(--ink-soft);margin-top:14px;
  display:flex;justify-content:center;gap:14px;flex-wrap:wrap;
}
.quiz-stats b{font-family:'Noto Serif TC',serif;}
.quiz-stats .ok{color:var(--green);}
.quiz-stats .ng{color:var(--stamp);}

footer{margin-top:28px;text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.12em;line-height:2;}
footer .reset{text-decoration:underline;cursor:pointer;color:var(--ink-soft);background:none;border:none;font-size:11px;letter-spacing:.12em;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="case-tag">案號 E・歷屆試題精選</div>
    <h1>民法概要 考題小卡
      <span class="sub">99-114年不動產經紀人考題・共 18 題</span>
    </h1>
  </header>

  <div class="filter-row" id="resetRow"><div class="chip active" id="resetBtn">全部分類</div></div>
  <div class="chips" id="chips"></div>

  <div class="progress"><b id="curNum">1</b> / <span id="totalNum">18</span>　<span id="catName"></span></div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>

  <div class="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="top-row">
          <span class="cat-badge" id="badgeFront"></span>
          <span class="year-badge" id="yearFront"></span>
          <span class="mastery-badge" id="badgeMasteryFront"></span>
        </div>
        <div class="q-text" id="qText"></div>
        <div class="opt-list" id="optList"></div>
        <div class="hint">點選一個選項　看詳解 ▸</div>
      </div>
      <div class="face back">
        <div class="top-row">
          <span class="cat-badge" id="badgeBack"></span>
          <span class="year-badge" id="yearBack"></span>
          <span class="mastery-badge" id="badgeMasteryBack"></span>
        </div>
        <div class="answer-banner" id="answerBanner"></div>
        <div class="exp-list" id="expList"></div>
        <div class="hint">◂ 點擊卡片　回題目</div>
      </div>
    </div>
  </div>

  <div class="controls" id="masteryControls">
    <button class="btn icon" id="markReview">🔄 待複習</button>
    <button class="btn green icon" id="markMastered">✅ 已掌握</button>
  </div>

  <div class="controls">
    <button class="btn icon" id="prevBtn">◂ 上一題</button>
    <button class="btn primary" id="shuffleBtn">🔀 隨機</button>
    <button class="btn icon" id="nextBtn">下一題 ▸</button>
  </div>

  <div class="quiz-stats" id="quizStatsBar">
    <span>本輪：<b class="ok" id="quizOk">0</b> 對　<b class="ng" id="quizNg">0</b> 錯</span>
    <span style="cursor:pointer;text-decoration:underline;" id="resetQuiz">重新測驗</span>
  </div>
  <div class="quiz-stats" id="overallStatsBar">
    <span>累積：已作答 <b id="totalAttempts">0</b> 題次・正確率 <b id="overallAcc">—</b>・已掌握 <b id="masteredCount">0</b>/<b id="totalCards">0</b></span>
  </div>

  <footer>不動產經紀人考試・民法概要｜每題附A-D逐選項詳解，點選答案後自動判對錯並標記掌握度<br>
    <button class="reset" id="resetMastery">清除所有「已掌握」標記</button>
  </footer>
</div>

<script>
const CARDS = [
{id:"EE01", cat:"親屬通則", year:"104年第33題", q:"甲之兄長乙與丙結婚，丙有兄長丁。關於四人之親系及親等關係，下列敘述，何者錯誤？",
 opts:["甲與乙為旁系血親二親等","乙與丁為旁系姻親二親等","甲與丙為旁系姻親二親等","甲與丁為旁系姻親二親等"], correct:3,
 exps:[
 "甲、乙為兄弟，依民法967條第2項，旁系血親係與己身出於同源之血親，兄弟間屬旁系血親二親等，敘述正確。",
 "丁是丙（乙之配偶）的兄長，依970條第1款「血親之配偶，從其配偶之親系及親等」反向理解，乙與丁的關係應「從丙與丁的關係」計算——丙丁為兄妹（旁系血親二親等），故乙與丁為旁系姻親二親等，敘述正確。",
 "丙是乙（甲之兄）的配偶，依970條第1款「血親之配偶，從其配偶之親系及親等」，丙與甲的關係從乙與甲的關係計算——乙甲為兄弟（旁系血親二親等），故甲與丙為旁系姻親二親等，敘述正確。",
 "（本題答案，敘述錯誤）丁是丙之兄長，丙是甲兄長乙之配偶。丁與甲之間：丁不是甲的血親之配偶、配偶之血親、或配偶之血親之配偶（970條三款），甲與丁之間不存在血親或姻親關係，並非「旁系姻親二親等」——這是親屬關係計算中容易過度延伸的常見陷阱。"
 ]},
{id:"EE02", cat:"親屬通則", year:"102年第34題", q:"關於姻親關係，下列敘述何者正確？",
 opts:["甲之兒子乙與丙女結婚，甲與丙無姻親關係","甲之配偶乙，乙有一個哥哥丙，甲與丙無姻親關係","甲之配偶乙，乙有一個哥哥丙，丙有配偶丁，甲與丁無姻親關係","甲之兒子乙與丙女結婚，丙女之父親為丁，甲與丁無姻親關係"], correct:3,
 exps:[
 "丙是乙（甲之子）的配偶，依970條第1款「血親之配偶，從其配偶之親系及親等」，丙與甲的關係從乙與甲的關係計算——乙是甲的直系血親卑親屬，故甲與丙為直系姻親，並非「無姻親關係」，本選項敘述錯誤，但本題問的是哪個選項「正確」，本選項不是答案。",
 "丙是乙（甲之配偶）的兄長，依970條第2款「配偶之血親，從其與配偶之親系及親等」，丙與甲的關係從乙與丙的關係計算——乙丙為兄妹（旁系血親），故甲與丙應為旁系姻親，本選項稱「無姻親關係」是錯的，不是答案。",
 "丁是丙（乙之兄長）的配偶，依970條第3款「配偶之血親之配偶，從其與配偶之親系及親等」，丁與甲的關係從丙與甲的關係計算——丙甲已成立旁系姻親，故甲丁亦為旁系姻親，本選項稱「無姻親關係」同樣錯誤，不是答案。",
 "（本題答案，敘述正確）丁是丙女（乙之配偶）的父親，丁屬於丙的血親。民法第969條規定姻親限於「血親之配偶、配偶之血親、配偶之血親之配偶」三種類型，並未包含「配偶之血親之血親」（也就是配偶父母的父母輩以外、配偶兄弟姊妹之外的血親延伸關係）。本題丁是丙（乙之配偶）的血親（父親），丁本身並非乙的血親、也非乙配偶的血親之配偶，丁與甲之間不屬於970條列舉的三類姻親關係，故甲與丁「無姻親關係」之敘述正確。"
 ]},
{id:"EE03", cat:"婚姻", year:"105年第19題", q:"關於結婚，下列敘述何者正確？",
 opts:["男未滿17歲，女未滿15歲者，不得結婚","結婚應以公開儀式為之","直系血親及直系姻親在6親等以內者，不得結婚","當事人之一方，於結婚時不能人道而不能治者，他方得向法院請求撤銷之"], correct:3,
 exps:[
 "現行民法980條已修正為男女一致：未滿18歲者，不得結婚——並非男女訂有不同年齡門檻（此為已修正前的舊條文內容，是常見的時空背景混淆陷阱）。",
 "「公開儀式」是現已刪除之舊法982條對結婚「形式要件」的部分內容，現行法結婚採登記主義（982條：應由雙方當事人向戶政機關為結婚之登記），不要求公開儀式。",
 "民法983條：直系血親及直系姻親「不問親等遠近」，一律禁婚（並非限於「6親等以內」這種有上限的講法）；旁系血親在6親等以內、旁系姻親在5親等以內輩分不相同者，才適用親等門檻限制。",
 "民法995條：當事人之一方，於結婚時不能人道而不能治者，他方得向法院請求撤銷之——這是結婚得撤銷事由之一，敘述正確。"
 ]},
{id:"EE04", cat:"離婚", year:"105年第31題", q:"下列何者違反近親禁婚範圍之規定？",
 opts:["甲先收養丙男，再收養丁女，丙與丁之結婚","甲有一子乙，再收養一女丙，之後乙育有一子丁，丙育有一女戊，丁與戊之結婚","乙有一女丙，另外收養一女丁，戊有一子己，另外收養一子庚。未久，甲收養乙與戊，丙與己之結婚，丁與庚之結婚","甲與前妻育有一子乙，丙與前夫育有一女丁，甲與丙後來結婚，未久，乙與丁欲結婚"], correct:0,
 exps:[
 "（本題答案，違反禁婚規定）丙、丁均為甲之養子女，兩人因法律擬制而成為旁系血親（民法1077條：養子女與養父母之關係，除法律另有規定外，與婚生子女同），依983條養子女間視為旁系血親二親等，禁止結婚——這是「擬制血親」禁婚的典型考點。",
 "乙、丙均非甲之婚生子女但其下一代丁、戊之間並非由甲直接收養，丁戊之間不具直系或法定禁婚的旁系血親關係（隔代且非直接擬制血親範圍），未違反禁婚規定。",
 "丙己、丁庚之間並非彼此的擬制血親或姻親直系尊親屬卑親屬關係，本題描述的複雜收養關係實際上未落入983條禁婚範圍。",
 "乙、丁分屬甲、丙之前婚生子女，甲丙結婚後，乙丁之間僅因為甲丙婚姻而成為「旁系姻親」（彼此父母再婚的子女關係），並非直系血親或直系姻親，且旁系姻親限制僅及於5親等以內輩分不相同者，乙丁同輩，不在禁婚之列。"
 ]},
{id:"EE05", cat:"父母子女", year:"105年第36題", q:"隱瞞已婚之乙女與甲同居數年後，某日生下丙隨即離甲而去，甲獨力扶養丙，俟丙19歲生日，甲對丙告知其生母為乙，當日丙因思母心切隨即趕赴乙家要求相認，相認時刻被乙女丈夫丁撞見，一切東窗事發，乙丁大吵。過了2年後，上述相關人等決心為此事作一了結。試問此刻以下何人有資格提起婚生否認之訴？",
 opts:["甲","乙","丙","丁"], correct:2,
 exps:[
 "甲並非乙丁婚姻關係中的當事人，亦非丙在法律上的「父或母」（丙是乙丁推定的婚生子女），甲不是1063條所定得提起否認之訴的主體（僅限夫妻一方或子女本人），不具起訴資格。",
 "民法1063條第3項：夫妻之一方應自知悉該子女非為婚生子女時起2年內為之。乙身為丙的生母，從丙出生那一刻起就確實知道丙非乙丁所生，乙知悉非婚生子女的時點是在「丙出生時」，距離本題情境的處理時點（丙19歲生日後又過2年，即丙約21歲時）早已遠遠超過2年，乙的否認之訴除斥期間早已屆滿，不再具備起訴資格。",
 "（本題答案，敘述正確）丙身為「子女本人」，依1063條第3項，子女應自知悉非為婚生子女時起2年內為之；但若子女於「未成年時」知悉，依但書規定，仍得於成年後2年內為之。本題丙是在19歲生日當天（已成年）才從甲處得知生母身分，亦即丙的知悉時點即為相認當日，題目敘述「過了2年後」上述相關人等才決心處理此事，依除斥期間「相當日之前一日為期間末日」之計算方式，丙自知悉時起算的2年期間，在「過了2年」這個時點仍屬期限屆滿當下或剛好在期限內，丙仍具備起訴資格，為本題最終認定的正確答案。",
 "丁是在「相認時刻被撞見」當下才知悉丙非自己婚生子女，丁知悉的時點與丙相同（同一天），依1063條第3項，丁應自知悉時起2年內為之；題目情境發展到「過了2年後」，丁的2年期限與丙同步起算、同步面臨期限將屆或剛屆滿的狀態，但本題標準答案僅認定丙具資格，這代表丁的主體適格認定上仍以「夫妻之一方」之身分回歸1063條規定，本題鎖定答案為丙，丁不是本題答案。"
 ]},
{id:"EE06", cat:"父母子女", year:"107年第25題", q:"甲有子女乙丙二人，乙與丁結婚後育有一女戊，丙收養一女己；然乙卻因工時過長，過勞而亡。甲於乙死亡後兩年亦病逝。有關甲遺產之繼承，下列敘述何者正確？",
 opts:["戊、己得以代位繼承","丙、戊為甲的遺產繼承人","丙、戊、己為甲的遺產繼承人","丙、丁、戊、己均為甲的遺產繼承人"], correct:1,
 exps:[
 "民法1140條代位繼承僅限「第一順序之繼承人，於繼承開始前死亡或喪失繼承權」者，由其直系血親卑親屬代位。乙（甲之子，第一順序）確實先於甲死亡，故乙之直系血親卑親屬戊得代位繼承；但己是丙收養之養女，丙本身並未先於甲死亡或喪失繼承權，己沒有可代位的基礎，「己得以代位繼承」的敘述不正確。",
 "丙（甲現存之子，第一順序繼承人）與戊（代位乙繼承之孫女，依1140條代位繼承乙之應繼分）共同為甲之遺產繼承人——己是丙之養女，丙本人健在，己不會與丙一同成為甲的繼承人（己是丙的子女，不是甲的子女或代位繼承人）。",
 "己不應列入甲的繼承人，本選項多列了己，不正確。",
 "丁（乙之配偶，已因乙死亡而成為「過去的兒媳」，且丁並非甲的直系血親卑親屬亦非配偶）不是甲的法定繼承人；本選項列入丁、己皆屬錯誤。"
 ]},
{id:"EE07", cat:"夫妻財產制", year:"105年第34題", q:"有關法定夫妻財產制之敘述，下列何者錯誤？",
 opts:["夫或妻各自管理、使用、收益及處分其財產","夫妻就其婚前財產及婚後財產，互負報告之義務","不論夫或妻之婚前財產或婚後財產，均屬夫或妻各自所有","夫或妻之婚前財產，於婚姻關係存續中所生之孳息，視為婚後財產"], correct:1,
 exps:[
 "民法1018條：夫或妻各自管理、使用、收益及處分其財產，敘述正確。",
 "（本題答案，敘述錯誤）民法1022條：夫妻就其「婚後財產」，互負報告之義務——法條僅限於「婚後財產」，並不包含「婚前財產」，本選項把報告義務的範圍誤擴大到婚前財產，與法條不符。",
 "法定財產制下，無論婚前或婚後財產，原則上均由夫或妻「各自所有」（1017條），僅在計算剩餘財產分配時才區分婚前/婚後財產的計算範圍，敘述正確。",
 "民法1017條第2項：夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為婚後財產——這是常考的易混淆點，敘述正確。"
 ]},
{id:"EE08", cat:"夫妻財產制", year:"110年第20題", q:"分別財產制有關夫妻債務的敘述，下列何者正確？",
 opts:["夫妻於行為時明知有損於婚姻關係消滅後他方之剩餘財產分配請求權者，以受益人受益時亦知其情事者為限，他方得聲請法院撤銷之","夫妻之一方以自己財產清償他方之債務時，於婚姻關係存續中，不得請求償還。但於婚姻關係消滅時，夫或妻現存之婚後財產，扣除婚姻關係存續所負債務後，如有剩餘，其雙方剩餘財產之差額，應平均分配","夫妻之一方以自己財產清償他方之債務時，於婚姻關係存續中，不得請求償還。但於婚姻關係消滅時，應分別納入現存之婚後財產或婚姻關係存續中所負債務計算","夫妻各自對其債務負清償之責"], correct:3,
 exps:[
 "本選項描述的是「法定財產制」下1020-1條撤銷權的規定（針對有償/無償行為損害剩餘財產分配請求權），並非「分別財產制」的規定——分別財產制本身不適用剩餘財產分配請求權制度，本選項混淆了兩種財產制。",
 "「剩餘財產之差額應平均分配」是法定財產制特有的效果（1030-1條），分別財產制當事人之間並不適用剩餘財產分配請求權，本選項把法定財產制的規則誤用在分別財產制情境。",
 "同樣是混淆法定財產制與分別財產制的規定，分別財產制下沒有「納入現存婚後財產或所負債務計算」這種操作。",
 "民法1023條第1項：夫妻各自對其債務負清償之責——這是適用於所有夫妻財產制（包括分別財產制）的共通規定，且第2項規定夫妻之一方以自己財產清償他方之債務時，「雖於婚姻關係存續中，亦得請求償還」（與其他選項所述「不得請求償還」恰好相反），本選項是唯一正確敘述。"
 ]},
{id:"EE09", cat:"夫妻財產制", year:"99年第33題", q:"甲（男）乙（女）於民國94年3月結婚，甲乙依法約定分別財產制為其夫妻財產制。下列敘述，何者正確？",
 opts:["甲乙就其婚後財產，互負報告之義務","甲乙各自保有其財產之所有權","甲乙之債務，應由甲乙共同清償","家庭生活費用由甲負擔，甲得請求乙為相當之負擔"], correct:1,
 exps:[
 "婚後財產報告義務（1022條）是「法定財產制」特有的規定，並非分別財產制的規定——分別財產制下夫妻財產各自獨立，沒有此項報告義務的明文要求。",
 "民法1044條：分別財產制下，夫或妻各自保有其財產之所有權，各自管理、使用、收益及處分——這是分別財產制的核心特徵，敘述正確。",
 "民法1023條第1項：夫妻各自對其債務負清償之責，並非「應由甲乙共同清償」。",
 "家庭生活費用的負擔方式，依1003-1條，原則上由夫妻雙方依其經濟能力、家事勞動或其他情事分擔，並非當然「由甲負擔，甲得請求乙為相當之負擔」這種片面規定方式。"
 ]},
{id:"EE10", cat:"繼承順序與應繼分", year:"102年第40題", q:"甲與乙結婚，並無子女，甲死亡時，甲之父母丙、丁尚健在；設甲遺有財產新臺幣1200萬元，並無任何債務。請問如何繼承？",
 opts:["乙得新臺幣600萬元，丙、丁各得新臺幣300萬元","乙得新臺幣800萬元，丙、丁各得新臺幣200萬元","乙得新臺幣1200萬元，丙、丁各得新臺幣0元","乙、丙、丁各得新臺幣400萬元"], correct:0,
 exps:[
 "民法1144條第2款：配偶與第1138條所定第二順序（父母）之繼承人同為繼承時，配偶應繼分為遺產「二分之一」。甲無子女（無第一順序繼承人），父母丙丁健在屬第二順序，故乙得1200萬×1/2＝600萬；丙丁平分剩餘600萬，各得300萬——與本選項數字相符。",
 "本選項把配偶應繼分算成2/3，不符合1144條第2款「與第二順序同為繼承時為遺產1/2」的規定（2/3是配偶與第四順序祖父母同為繼承時的比例，1144條第3款）。",
 "本選項等同於丙丁完全不能繼承，但本題第一順序（子女）不存在，第二順序父母丙丁仍健在、有繼承資格，不會發生「配偶單獨繼承全部遺產」的情形（這只在「無第一至第四順序繼承人時」才適用，1144條第4款）。",
 "三人均分並非1144條規定的計算方式，配偶與血親各順序繼承人同為繼承時的比例是依「順序」決定（與第一順序平均、與第二三順序各1/2、與第四順序2/3），不是單純依人數平均分配。"
 ]},
{id:"EE11", cat:"繼承順序與應繼分", year:"99年第32題", q:"繼承人於下列何者情形，並不喪失繼承權？",
 opts:["乙酒駕騎乘機車，不小心於家門口將其父甲撞死因而受刑之宣告","乙為獨占全部遺產，欺騙其父甲其他兄弟丙丁與外人勾結圖謀財產，其父甲因此作成遺囑，將財產全部遺留給乙","乙為獨占全部遺產，私下塗改父甲之遺囑","乙與其父甲素來相處不洽，屢次於大庭廣眾之下辱罵父甲豬狗不如，令父甲心灰意冷，向其友人A表示遺產絕不留給乙"], correct:0,
 exps:[
 "（本題答案，不喪失繼承權）民法1145條第1款喪失繼承權須是「故意」致被繼承人於死。乙酒駕「不小心」撞死甲，是過失致死，並非故意——過失致死不符合1145條第1款的喪失繼承權要件，乙不喪失繼承權（僅受刑事過失致死罪之處罰）。",
 "乙以詐欺手段（欺騙父親丙丁與外人勾結）使被繼承人甲「為關於繼承之遺囑」（將財產全留給乙），符合1145條第1項第2款「以詐欺使被繼承人為關於繼承之遺囑」，喪失繼承權。",
 "乙私下「塗改」遺囑，符合1145條第1項第4款「變造...被繼承人關於繼承之遺囑」，喪失繼承權。",
 "乙對甲有「重大虐待或侮辱情事」，且甲已「向友人表示遺產絕不留給乙」（即符合1145條第1項第5款要求的「被繼承人表示其不得繼承」），喪失繼承權。"
 ]},
{id:"EE12", cat:"繼承順序與應繼分", year:"99年第34題", q:"因他人拋棄繼承而為繼承人者，其主張拋棄繼承之法定期間為何？",
 opts:["於知悉其得繼承之日起2個月內","自繼承開始時起3個月內，必要時得向法院聲請延展","於知悉其得繼承之日起3個月內","自繼承開始時起2個月內，必要時得向法院聲請延展"], correct:2,
 exps:[
 "拋棄繼承的期間起算點是「知悉其得繼承之時」，並非自繼承開始時起算；且期間是3個月而非2個月。",
 "拋棄繼承的期間起算點應為「知悉其得繼承之時起」，並非「自繼承開始時起」；且1174條規定的3個月期間並無「向法院聲請延展」的明文（延展制度是1156條遺產清冊陳報期限的規定，不適用於拋棄繼承）。",
 "民法1174條第2項：繼承之拋棄，應於知悉其得繼承之時起3個月內，以書面向法院為之。因他人拋棄繼承而成為繼承人者（如次親等卑親屬因前一親等的人拋棄而取得繼承資格），其拋棄繼承的期間，同樣是「自知悉其得繼承之日起3個月內」。",
 "期間起算點錯誤（應為知悉時起，非繼承開始時起），且期間應為3個月非2個月，亦無延展之明文規定。"
 ]},
{id:"EE13", cat:"繼承順序與應繼分", year:"99年第35題", q:"甲（被繼承人）生前對乙（繼承人）所為之何種贈與，於計算甲之應繼遺產時，係屬應歸扣之生前特種贈與？",
 opts:["乙結婚時，甲贈與乙100萬元","乙生日時，甲贈與乙100萬元","乙生子時，甲贈與乙100萬元","乙參加競賽奪冠，甲贈與乙100萬元"], correct:0,
 exps:[
 "民法1173條第1項：繼承人中有在繼承開始前因「結婚、分居或營業」，已從被繼承人受有財產之贈與者，應將該贈與價額加入為應繼遺產，於分割時由該繼承人之應繼分中扣除——結婚贈與正屬於法條明文列舉的三種歸扣原因之一。",
 "生日贈與屬於一般性質的贈與（恩惠性質），並非1173條所列舉的「結婚、分居、營業」三種原因，不屬於應歸扣的生前特種贈與。",
 "生子（生育）並非1173條列舉的歸扣原因，不屬於應歸扣範圍。",
 "競賽奪冠的獎勵性贈與，同樣不在1173條列舉的「結婚、分居、營業」三種原因之內，不屬於應歸扣範圍。"
 ]},
{id:"EE14", cat:"繼承順序與應繼分", year:"103年第34題", q:"甲男婚外情，甲妻丁得知忿而與甲離婚，並完成登記。甲旋即與乙女於教堂牧師見證下，宣布結為夫妻，並請鄰近攤販丙、戊於結婚證書上簽名。下列敘述，何者正確？",
 opts:["甲、乙婚姻有效成立，因甲、乙有公開之儀式及二人以上之證人","甲、乙婚姻有效成立，因甲、丁已離婚，且甲、乙有結婚證書","甲、乙婚姻不成立，因甲不得同時與二人結婚","甲、乙婚姻不成立，因甲、乙未辦理結婚登記"], correct:3,
 exps:[
 "現行民法982條結婚採登記主義，「公開儀式及二人以上證人」是舊法已刪除的形式要件，現行法不再以此作為結婚成立要件，本選項依據已失效的舊法判斷，錯誤。",
 "雖甲丁已合法離婚，且甲乙有「結婚證書」，但結婚證書（私文書）不等於「向戶政機關辦理結婚登記」——現行法下，結婚的成立要件是辦理結婚登記，不是簽署結婚證書。",
 "本題甲丁已完成離婚登記，甲已非有配偶之人，與乙結婚並非「同時與二人結婚」（重婚）的情形，本選項對事實描述有誤。",
 "民法982條：結婚應向戶政機關為結婚之登記。甲乙雖有教堂儀式、證人簽名及結婚證書，但題目並未提及辦理戶政結婚登記，依現行法婚姻於「登記」時才成立，未登記者婚姻不成立——這是現行法婚姻成立要件的核心，常考陷阱。"
 ]},
{id:"EE15", cat:"遺囑與特留分", year:"99年第31題", q:"甲之配偶早死，有乙丙丁3名子女，其中乙與A結婚，有兩子X及Y，丙丁則尚未結婚，甲有財產3000萬元。以下敘述何者錯誤？",
 opts:["甲死亡時，其子丙已先死亡時，則甲之遺產由乙丁繼承","甲死亡後，其子乙因悲傷過度亦於1個月後死亡，則甲之3000萬元遺產，由丙、丁各繼承1000萬元，剩餘1000萬元由A及X、Y共同繼承","甲死亡前，其子乙已先死亡時，則甲之3000萬元遺產，由丙、丁各繼承1000萬元，剩餘1000萬元由A及X、Y共同繼承","甲得以遺囑自由處分其財產，但不得侵害繼承人之特留分"], correct:2,

const CAT_COLORS = {
  "親屬通則":"#5C7A4A",
  "婚姻":"#C17A2E",
  "離婚":"#A8402B",
  "父母子女":"#4F7CAC",
  "夫妻財產制":"#7C6A8E",
  "繼承順序與應繼分":"#5B7A99",
  "遺囑與特留分":"#B08D57"
};

let activeCats = new Set(Object.keys(CAT_COLORS));
let mastery = {};
let deck = [...CARDS];
let idx = 0;
let flipped = false;
let selectedOpt = null;
let quizStats = {ok:0, ng:0};

const chipsEl = document.getElementById('chips');
const resetBtn = document.getElementById('resetBtn');
const cardEl = document.getElementById('card');
const qText = document.getElementById('qText');
const optList = document.getElementById('optList');
const badgeFront = document.getElementById('badgeFront');
const badgeBack = document.getElementById('badgeBack');
const yearFront = document.getElementById('yearFront');
const yearBack = document.getElementById('yearBack');
const badgeMasteryFront = document.getElementById('badgeMasteryFront');
const badgeMasteryBack = document.getElementById('badgeMasteryBack');
const answerBanner = document.getElementById('answerBanner');
const expList = document.getElementById('expList');
const curNum = document.getElementById('curNum');
const totalNum = document.getElementById('totalNum');
const catName = document.getElementById('catName');
const progFill = document.getElementById('progFill');
const quizOk = document.getElementById('quizOk');
const quizNg = document.getElementById('quizNg');

async function loadMastery(){
  try{
    const res = await window.storage.get('exam_mastery_data_e');
    if(res && res.value) mastery = JSON.parse(res.value);
  }catch(e){ mastery = {}; }
}
async function saveMastery(){
  try{ await window.storage.set('exam_mastery_data_e', JSON.stringify(mastery)); }
  catch(e){ console.error('storage save failed', e); }
}

Object.keys(CAT_COLORS).forEach(cat=>{
  const count = CARDS.filter(c=>c.cat===cat).length;
  const chip = document.createElement('div');
  chip.className='chip active';
  chip.style.background=CAT_COLORS[cat];
  chip.style.borderColor=CAT_COLORS[cat];
  chip.style.color='#fff';
  chip.textContent=`${cat} (${count})`;
  chip.dataset.cat=cat;
  chip.addEventListener('click',()=>{
    if(activeCats.has(cat)){
      if(activeCats.size===1) return;
      activeCats.delete(cat);
      chip.classList.remove('active');
      chip.style.background='#fff';
      chip.style.color=CAT_COLORS[cat];
    } else {
      activeCats.add(cat);
      chip.classList.add('active');
      chip.style.background=CAT_COLORS[cat];
      chip.style.color='#fff';
    }
    rebuildDeck();
  });
  chipsEl.appendChild(chip);
});

resetBtn.addEventListener('click',()=>{
  activeCats = new Set(Object.keys(CAT_COLORS));
  document.querySelectorAll('.chip[data-cat]').forEach(chip=>{
    const cat=chip.dataset.cat;
    chip.classList.add('active');
    chip.style.background=CAT_COLORS[cat];
    chip.style.color='#fff';
  });
  rebuildDeck();
});

function getStat(id){
  const m = mastery[id];
  if(!m) return {status:null, attempts:0, correct:0};
  if(typeof m === 'string') return {status:m, attempts:1, correct:(m==='mastered'?1:0)};
  return m;
}
function masteryIcon(stat){
  if(!stat.status) return '';
  const icon = stat.status==='mastered' ? '✅' : '🔄';
  return stat.attempts>0 ? `${icon}×${stat.attempts}` : icon;
}
function updateOverallStats(){
  let attempts=0, correct=0, mastered=0;
  CARDS.forEach(c=>{
    const s = getStat(c.id);
    attempts += s.attempts;
    correct += s.correct;
    if(s.status==='mastered') mastered++;
  });
  document.getElementById('totalAttempts').textContent = attempts;
  document.getElementById('overallAcc').textContent = attempts ? Math.round(correct/attempts*100)+'%' : '—';
  document.getElementById('masteredCount').textContent = mastered;
  document.getElementById('totalCards').textContent = CARDS.length;
}

function rebuildDeck(){
  deck = CARDS.filter(c=>activeCats.has(c.cat));
  idx = 0;
  render();
}

function render(){
  const c = deck[idx];
  const color = CAT_COLORS[c.cat];
  flipped = false;
  selectedOpt = null;
  cardEl.classList.remove('flipped');
  qText.textContent = c.q;
  badgeFront.textContent = c.cat;
  badgeFront.style.background = color;
  badgeBack.textContent = c.cat;
  badgeBack.style.background = color;
  yearFront.textContent = c.year;
  yearBack.textContent = c.year;
  document.querySelector('.face.back').style.borderLeftColor = color;
  const stat = getStat(c.id);
  const icon = masteryIcon(stat);
  badgeMasteryFront.textContent = icon;
  badgeMasteryBack.textContent = icon;
  curNum.textContent = idx+1;
  totalNum.textContent = deck.length;
  catName.textContent = '・' + c.cat;
  progFill.style.width = ((idx+1)/deck.length*100)+'%';

  optList.innerHTML = '';
  const letters = ['A','B','C','D'];
  c.opts.forEach((opt,i)=>{
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    div.addEventListener('click', ()=> selectOption(i));
    optList.appendChild(div);
  });
}

function selectOption(i){
  if(flipped) return;
  const c = deck[idx];
  selectedOpt = i;
  const correct = (i === c.correct);
  document.querySelectorAll('.opt')[i].classList.add('selected');

  // build back face
  answerBanner.className = 'answer-banner ' + (correct ? 'correct' : 'wrong');
  const letters = ['A','B','C','D'];
  answerBanner.textContent = correct
    ? `✅ 答對！正解是 ${letters[c.correct]}`
    : `❌ 答錯了，你選 ${letters[i]}，正解是 ${letters[c.correct]}`;

  expList.innerHTML = '';
  c.exps.forEach((exp,j)=>{
    const div = document.createElement('div');
    div.className = 'exp-item' + (j===c.correct ? ' right' : '');
    const mark = j===c.correct ? '✓ 正解' : '✗';
    div.innerHTML = `<div class="exp-head">${letters[j]}. ${mark}</div><div>${exp}</div>`;
    expList.appendChild(div);
  });

  // stats + mastery
  if(correct) quizStats.ok++; else quizStats.ng++;
  const stat = getStat(c.id);
  stat.attempts += 1;
  if(correct) stat.correct += 1;
  stat.status = correct ? 'mastered' : 'review';
  mastery[c.id] = stat;
  saveMastery();
  quizOk.textContent = quizStats.ok;
  quizNg.textContent = quizStats.ng;
  updateOverallStats();

  setTimeout(()=>{ flipped=true; cardEl.classList.add('flipped'); }, 150);

  const icon = masteryIcon(stat);
  badgeMasteryFront.textContent = icon;
  badgeMasteryBack.textContent = icon;
}

cardEl.addEventListener('click',()=>{
  if(flipped){ flipped=false; cardEl.classList.remove('flipped'); }
});

function goNext(){ idx=(idx+1)%deck.length; render(); }
function goPrev(){ idx=(idx-1+deck.length)%deck.length; render(); }
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('shuffleBtn').addEventListener('click',()=>{
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  idx=0; render();
});
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight') goNext();
  if(e.key==='ArrowLeft') goPrev();
});

document.getElementById('markMastered').addEventListener('click',()=>{
  const c = deck[idx];
  const stat = getStat(c.id);
  stat.status='mastered';
  mastery[c.id]=stat; saveMastery();
  const icon = masteryIcon(stat);
  badgeMasteryFront.textContent=icon; badgeMasteryBack.textContent=icon;
  updateOverallStats();
});
document.getElementById('markReview').addEventListener('click',()=>{
  const c = deck[idx];
  const stat = getStat(c.id);
  stat.status='review';
  mastery[c.id]=stat; saveMastery();
  const icon = masteryIcon(stat);
  badgeMasteryFront.textContent=icon; badgeMasteryBack.textContent=icon;
  updateOverallStats();
});

document.getElementById('resetQuiz').addEventListener('click',()=>{
  quizStats = {ok:0, ng:0};
  quizOk.textContent=0; quizNg.textContent=0;
});

document.getElementById('resetMastery').addEventListener('click',async ()=>{
  if(!confirm('確定要清除所有學習記錄（已掌握/待複習/作答次數）嗎？此動作無法復原。')) return;
  mastery = {};
  await saveMastery();
  render();
  updateOverallStats();
});

(async function init(){
  await loadMastery();
  rebuildDeck();
  updateOverallStats();
})();
</script>
</body>
</html>
